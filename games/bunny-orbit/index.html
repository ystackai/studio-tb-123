<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bunny Orbit — Hop to the Carrot Moon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
canvas{display:block;width:100%;height:100%}

/* HUD overlay */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:12px 18px;display:flex;justify-content:space-between;align-items:flex-start}
.hud-box{background:rgba(8,8,30,0.75);border:1px solid rgba(255,200,120,0.25);padding:6px 14px;border-radius:8px}
.hud-box .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;opacity:.5}
.hud-box .val{font-size:20px;font-weight:700;color:#ffd580}

/* Fuel bar */
#fuel-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:220px;height:14px;border-radius:7px;background:rgba(8,8,30,0.7);border:1px solid rgba(255,200,120,0.2);overflow:hidden;z-index:10}
#fuel-bar{height:100%;width:100%;background:linear-gradient(90deg,#ff6a00,#ffb84d);border-radius:7px;transition:width .15s}
#fuel-label{position:fixed;bottom:38px;left:50%;transform:translateX(-50%);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;opacity:.55;z-index:10}

/* Screens */
.screen-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(5,5,16,0.92);transition:opacity .4s}
.screen-overlay.hidden{opacity:0;pointer-events:none}
.screen-overlay h1{font-size:clamp(28px,5vw,48px);color:#ffd580;margin-bottom:8px;text-shadow:0 0 20px rgba(255,213,128,0.4)}
.screen-overlay p{font-size:clamp(14px,2vw,18px);opacity:.7;max-width:420px;text-align:center;line-height:1.5}
.btn-start{margin-top:28px;padding:12px 36px;font-size:18px;font-weight:700;color:#050510;background:linear-gradient(135deg,#ffd580,#ff9a3c);border:none;border-radius:28px;cursor:pointer;pointer-events:all;letter-spacing:1px;transition:transform .1s}
.btn-start:hover{transform:scale(1.06)}
.btn-start:active{transform:scale(0.97)}

/* Debrief */
#debrief-stats{display:flex;gap:20px;margin:16px 0}
.debrief-stat{text-align:center}
.debrief-stat .ds-val{font-size:32px;font-weight:800;color:#ffd580}
.debrief-stat .ds-lbl{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:1px}
.debrief-class{font-size:22px;color:#ffd580;margin:8px 0 0;font-weight:600}

/* Touch thrust button for mobile */
#thrust-btn{position:fixed;bottom:60px;right:24px;width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,#ffd580,#ff9a3c);border:3px solid rgba(255,255,255,0.3);z-index:15;display:none;align-items:center;justify-content:center;font-size:24px;user-select:none;-webkit-user-select:none;pointer-events:all;opacity:.85}
#thrust-btn:active{opacity:1;transform:scale(0.93)}
</style>
</head>
<body>

<!-- Title screen -->
<div id="title-screen" class="screen-overlay">
  <h1>🐰 Bunny Orbit</h1>
  <p>Hop between planets to reach the <span style="color:#ff8c42;font-weight:700">Carrot Moon</span>.<br>Hold <b>Space</b> or <b>tap</b> to burn. Release to drift.</p>
  <button class="btn-start" id="btn-start">Launch!</button>
</div>

<!-- Debrief screen -->
<div id="debrief-screen" class="screen-overlay hidden">
  <h1 id="debrief-title">Mission Complete!</h1>
  <div id="debrief-stats">
    <div class="debrief-stat"><div class="ds-val" id="ds-visited">0</div><div class="ds-lbl">Planets Visited</div></div>
    <div class="debrief-stat"><div class="ds-val" id="ds-fuel">0%</div><div class="ds-lbl">Fuel Left</div></div>
    <div class="debrief-stat"><div class="ds-val" id="ds-time">0s</div><div class="ds-lbl">Time</div></div>
  </div>
  <div class="debrief-class" id="debrief-class"></div>
  <button class="btn-start" id="btn-replay">Play Again</button>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="hud-box"><div class="lbl">Planets</div><div class="val" id="hud-visited">0 / 6</div></div>
  <div class="hud-box"><div class="lbl">Nearest</div><div class="val" id="hud-nearest">—</div></div>
</div>
<div id="fuel-label">FUEL</div>
<div id="fuel-wrap"><div id="fuel-bar"></div></div>

<!-- Mobile thrust button -->
<div id="thrust-btn">🔥</div>

<!-- Three.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============================================================
// Bunny Orbit — 3D Browser Game
// Creative intent: This should feel like a gentle space
// adventure where you pilot a cute bunny astronaut between
// small planets to reach a glowing carrot moon.
// ============================================================

// --- Constants ---
const FUEL_MAX = 100;
const FUEL_DRAIN = 8;           // per second while thrusting
const THRUST_POWER = 18;         // acceleration while thrusting
const DRAG = 0.995;              // very light drag for feel
const PLANET_GRAVITY = 6;        // gravity pull at planet surface
const LANDING_RADIUS_FACTOR = 1.6;
const TRANSFER_THRESHOLD = 8;    // distance to trigger orbit transfer

// --- State ---
let scene, camera, renderer, clock;
let bunny = null;               // the protagonist mesh/group
let bunnyThruster = null;      // particle/light for thrust
let planets = [];
let carrotMoon = null;

// Thrust particles (3D)
let thrustParticles = [];
const THRUST_PARTICLE_POOL_SIZE = 40;
const thrustParticleGeos = [];
const thrustParticleMats = [];

// Screen shake state
let shakeAmount = 0;
let shakeDecay = 0.9;

// Landing flash overlay
let landingFlash = null;
let landingFlashTimer = 0;

// Planet visit ring effect
let visitRings = [];
let stars = null;

let gameState = 'title';        // title | playing | debrief
let fuel = FUEL_MAX;
let isThrusting = false;
let velocity = new THREE.Vector3();
let planetsVisited = new Set();
let startTime = 0;
let audioCtx = null;
let musicGain = null;
let thrustNode = null;
let landingNode = null;
let payoffNode = null;

// Asset paths (updated when foundry jobs complete)
const ASSET_BASE = 'assets/generated/';
const BUNNY_GLB = 'assets/generated/bunny_companion.glb';
const AUDIO_FILES = {
  music: 'assets/generated/foundry_music_loop.wav',
  thrust: 'assets/generated/sfx_movement.wav',
  landing: 'assets/generated/soft_impact_puff.wav',
  payoff: 'assets/generated/sfx_payoff.wav',
  bounce: 'assets/generated/pickup_chime_bright.wav',
};

// ============================================================
// Audio Manager
// ============================================================
const AudioMgr = {
  ctx: null,
  musicGain: null,
  buffers: {},
  activeSources: {},
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.15;
    this.musicGain.connect(this.ctx.destination);
  },
  async loadAll() {
    for (const [name, url] of Object.entries(AUDIO_FILES)) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) continue;
        const buf = await resp.arrayBuffer();
        this.buffers[name] = await this.ctx.decodeAudioData(buf);
      } catch(e) {
        console.warn(`Audio load failed for ${name}: ${e.message}`);
      }
    }
  },
  playMusic() {
    if (!this.buffers.music) return;
    if (this.activeSources.music) return;
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers.music;
    src.loop = true;
    src.connect(this.musicGain);
    src.start();
    this.activeSources.music = src;
  },
  playSFX(name) {
    if (!this.buffers[name]) { this.fallbackSFX(name); return; }
    const src = this.ctx.createBufferSource();
    src.buffer = this.buffers[name];
    src.connect(this.ctx.destination);
    src.start();
  },
  // Fallback oscillator SFX when foundry audio not yet available
  fallbackSFX(name) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.connect(g);
    g.connect(this.ctx.destination);
    const t = this.ctx.currentTime;
    if (name === 'thrust') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, t);
      g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    } else if (name === 'landing') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.2);
      g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
    } else if (name === 'payoff') {
      // Bright ascending chime
      for (let i = 0; i < 4; i++) {
        const o = this.ctx.createOscillator();
        const gg = this.ctx.createGain();
        o.connect(gg); gg.connect(this.ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(523 + i * 120, t + i * 0.12);
        gg.gain.setValueAtTime(0.1, t + i * 0.12);
        gg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
        o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.35);
      }
      return;
    } else {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, t);
      g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
    }
  }
};

// ============================================================
// Planet Definitions
// ============================================================
const PLANET_DEFS = [
  { name: 'Asteros', color: 0x88ccff, radius: 1.8, pos: [12, 2, -8], ringColor: 0x66aadd },
  { name: 'Bloom', color: 0xffb86a, radius: 2.2, pos: [-10, -3, -14], ringColor: 0xffd4a0 },
  { name: 'Crater', color: 0xcc9966, radius: 1.5, pos: [8, 5, -22], ringColor: 0xaa7744 },
  { name: 'Dusk', color: 0xdd6699, radius: 2.0, pos: [-14, 1, -30], ringColor: 0xff99bb },
  { name: 'Ember', color: 0xff6633, radius: 1.6, pos: [6, -4, -38], ringColor: 0xffaa66 },
  { name: 'Frost', color: 0xaaddff, radius: 2.5, pos: [-8, 3, -48], ringColor: 0x88bbdd },
];

// ============================================================
// Scene Setup
// ============================================================
function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050510, 0.008);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 6, 18);
  camera.lookAt(0, 0, -10);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.prepend(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
  sun.position.set(20, 30, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x4466aa, 0.4);
  fill.position.set(-15, 10, -20);
  scene.add(fill);

  // Stars background
  createStars();

  // Planets
  PLANET_DEFS.forEach((d, i) => {
    const planet = createPlanet(d, i);
    planets.push(planet);
    scene.add(planet.group);
  });

  // Carrot Moon (final destination)
  carrotMoon = createCarrotMoon();
  scene.add(carrotMoon.group);

  // Bunny astronaut
  createBunny();

  clock = new THREE.Clock();
}

function createStars() {
  const geo = new THREE.BufferGeometry();
  const verts = [];
  const colors = [];
  for (let i = 0; i < 2000; i++) {
    const r = 100 + Math.random() * 150;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    verts.push(r * Math.sin(phi) * Math.cos(theta),
               r * Math.sin(phi) * Math.sin(theta),
               r * Math.cos(phi));
    const c = 0.6 + Math.random() * 0.4;
    colors.push(c, c, c * (0.8 + Math.random() * 0.2));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size: 0.4, vertexColors: true, sizeAttenuation: true });
  stars = new THREE.Points(geo, mat);
  scene.add(stars);
}

function createPlanet(def, idx) {
  const group = new THREE.Group();
  group.position.set(...def.pos);

  // Main sphere
  const geo = new THREE.SphereGeometry(def.radius, 24, 24);
  const mat = new THREE.MeshStandardMaterial({
    color: def.color, roughness: 0.7, metalness: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // Subtle ring for some planets
  if (idx % 2 === 0) {
    const ringGeo = new THREE.RingGeometry(def.radius * 1.4, def.radius * 1.9, 48);
    const ringMat = new THREE.MeshBasicMaterial({
      color: def.ringColor, side: THREE.DoubleSide, transparent: true, opacity: 0.3
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2.5;
    group.add(ring);
  }

  // Name label (small sprite)
  const labelGeo = new THREE.PlaneGeometry(3, 0.8);
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 28px system-ui, sans-serif';
  ctx.fillStyle = '#ffd580';
  ctx.textAlign = 'center';
  ctx.fillText(def.name, 128, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.y = def.radius + 2;
  group.add(label);

  // Glow
  const glowGeo = new THREE.SphereGeometry(def.radius * 1.15, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: def.color, transparent: true, opacity: 0.08
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  group.add(glow);

  return {
    group, def, mesh,
    orbitAngle: idx * 0.8,
    orbitSpeed: 0.05 + Math.random() * 0.03,
    landCount: 0
  };
}

function createCarrotMoon() {
  const group = new THREE.Group();
  const targetZ = -62;
  group.position.set(0, 4, targetZ);

  // Carrot body (elongated shape)
  const bodyGeo = new THREE.CylinderGeometry(0.6, 0.3, 3.5, 12);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0xff6622, roughness: 0.5, metalness: 0.0, emissive: 0x331100, emissiveIntensity: 0.3
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.z = Math.PI / 6;
  body.castShadow = true;
  group.add(body);

  // Carrot tip
  const tipGeo = new THREE.ConeGeometry(0.3, 1.2, 12);
  const tipMat = new THREE.MeshStandardMaterial({
    color: 0xff8833, emissive: 0x331100, emissiveIntensity: 0.2
  });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.y = 2.2;
  tip.rotation.z = Math.PI / 6;
  group.add(tip);

  // Carrot leaves (green top)
  for (let i = 0; i < 3; i++) {
    const leafGeo = new THREE.PlaneGeometry(0.25, 1.5);
    const leafMat = new THREE.MeshStandardMaterial({
      color: 0x44cc44, side: THREE.DoubleSide
    });
    const leaf = new THREE.Mesh(leafGeo, leafMat);
    leaf.position.set((i - 1) * 0.2, 2.8, 0);
    leaf.rotation.z = (i - 1) * 0.3;
    group.add(leaf);
  }

  // Glow ring
  const glowGeo = new THREE.SphereGeometry(2.5, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xff8844, transparent: true, opacity: 0.06
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  // Point light for glow
  const glowLight = new THREE.PointLight(0xff8844, 2, 15);
  group.add(glowLight);

  // Label
  const labelGeo = new THREE.PlaneGeometry(4, 1);
  const canvas = document.createElement('canvas');
  canvas.width = 384; canvas.height = 96;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 32px system-ui, sans-serif';
  ctx.fillStyle = '#ff8c42';
  ctx.textAlign = 'center';
  ctx.fillText('🥕 Carrot Moon', 192, 58);
  const tex = new THREE.CanvasTexture(canvas);
  const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.y = 4.5;
  group.add(label);

  // Gentle bob
  group.userData.bobPhase = 0;

  return { group, z: targetZ };
}

// ============================================================
// Bunny Astronaut (Procedural + GLB)
// ============================================================
function createBunny() {
  const group = new THREE.Group();

  // Try to load GLB; fall back to procedural bunny
  const loader = new THREE.GLTFLoader();
  loader.load(BUNNY_GLB,
    (gltf) => {
      // Foundry asset loaded — replace procedural with GLB
      while (group.children.length) group.remove(group.children[0]);
      const model = gltf.scene;
      model.scale.set(1.2, 1.2, 1.2);
      model.castShadow = true;
      group.add(model);
      console.log('Bunny GLB loaded from foundry!');
    },
    undefined,
    (err) => {
      // Fallback: build procedural bunny astronaut
      buildProceduralBunny(group);
      console.log('Using procedural bunny (GLB not yet available)');
    }
  );

  // Thruster light
  const thrusterLight = new THREE.PointLight(0xff6600, 0, 6);
  thrusterLight.position.set(0, -0.8, 0);
  thrusterLight.visible = false;
  group.add(thrusterLight);
  bunnyThruster = thrusterLight;

  // Thruster flame (cone)
  const flameGeo = new THREE.ConeGeometry(0.25, 1, 8);
  const flameMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.7 });
  const flame = new THREE.Mesh(flameGeo, flameMat);
  flame.position.set(0, -1.2, 0);
  flame.rotation.x = Math.PI;
  flame.visible = false;
  group.add(flame);
  bunnyThruster.flame = flame;

  // Position bunny
  group.position.set(0, 0, 5);
  scene.add(group);
  bunny = group;
}

function buildProceduralBunny(group) {
  // Body
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf5f0eb, roughness: 0.8 });
  const bodyGeo = new THREE.SphereGeometry(0.55, 12, 12);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.scale.set(1, 1.1, 0.9);
  group.add(body);

  // Helmet
  const helmetMat = new THREE.MeshStandardMaterial({
    color: 0xccddee, roughness: 0.3, metalness: 0.6, transparent: true, opacity: 0.7
  });
  const helmetGeo = new THREE.SphereGeometry(0.5, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.6);
  const helmet = new THREE.Mesh(helmetGeo, helmetMat);
  helmet.position.y = 0.15;
  group.add(helmet);

  // Ears
  const earMat = bodyMat.clone();
  for (let side of [-1, 1]) {
    const earGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.7, 8);
    const ear = new THREE.Mesh(earGeo, earMat);
    ear.position.set(side * 0.2, 0.8, 0);
    ear.rotation.z = side * -0.2;
    group.add(ear);

    // Inner ear
    const innerGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 8);
    const innerMat = new THREE.MeshStandardMaterial({ color: 0xffb8c8, roughness: 0.8 });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.set(side * 0.2, 0.78, 0);
    inner.rotation.z = side * -0.2;
    group.add(inner);
  }

  // Eyes
  for (let side of [-1, 1]) {
    const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(side * 0.18, 0.15, 0.4);
    group.add(eye);
  }

  // Nose
  const noseGeo = new THREE.SphereGeometry(0.05, 8, 8);
  const noseMat = new THREE.MeshStandardMaterial({ color: 0xff99aa });
  const nose = new THREE.Mesh(noseGeo, noseMat);
  nose.position.set(0, 0.02, 0.48);
  group.add(nose);

  // Feet
  for (let side of [-1, 1]) {
    const footGeo = new THREE.SphereGeometry(0.18, 8, 8);
    const foot = new THREE.Mesh(footGeo, bodyMat);
    foot.scale.set(0.8, 0.6, 1);
    foot.position.set(side * 0.25, -0.65, 0.1);
    group.add(foot);
  }

  // Backpack
  const bpGeo = new THREE.BoxGeometry(0.5, 0.55, 0.3);
  const bpMat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.5, metalness: 0.3 });
  const bp = new THREE.Mesh(bpGeo, bpMat);
  bp.position.set(0, 0, -0.45);
  group.add(bp);

  // Backpack antenna
  const antGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.5, 6);
  const ant = new THREE.Mesh(antGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5 }));
  ant.position.set(0.15, 0.5, -0.45);
  group.add(ant);

  // Antenna light
  const antLightGeo = new THREE.SphereGeometry(0.04, 6, 6);
  const antLightMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  const antLight = new THREE.Mesh(antLightGeo, antLightMat);
  antLight.position.set(0.15, 0.78, -0.45);
  antLight.name = 'antenna_light';
  group.add(antLight);
}

// ============================================================
// Input Handling
// ============================================================
const input = {
  thrusting: false,
  init() {
    // Keyboard
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.key === 'ArrowUp') {
        e.preventDefault();
        this.thrusting = true;
      }
    });
    window.addEventListener('keyup', e => {
      if (e.code === 'Space' || e.key === 'ArrowUp') {
        this.thrusting = false;
      }
    });
    // Pointer / touch
    const btn = document.getElementById('thrust-btn');
    const startThrust = (e) => { e.preventDefault(); this.thrusting = true; };
    const endThrust = (e) => { e.preventDefault(); this.thrusting = false; };
    document.addEventListener('mousedown', (e) => { if (gameState === 'playing') startThrust(e); });
    document.addEventListener('mouseup', endThrust);
    btn.addEventListener('touchstart', startThrust, { passive: false });
    btn.addEventListener('touchend', endThrust, { passive: false });
    btn.addEventListener('mousedown', startThrust);
    btn.addEventListener('mouseup', endThrust);
  }
};

// ============================================================
// Game Logic
// ============================================================
let currentOrbit = null;   // planet currently orbiting
let orbitPhase = 0;
let orbitRadius = 5;
let orbitSpeed = 0.4;

function startGame() {
  gameState = 'playing';
  fuel = FUEL_MAX;
  velocity.set(0, 0, 0);
  planetsVisited.clear();

  // Reset bunny position
  bunny.position.set(0, 0, 5);
  bunny.rotation.set(0, 0, 0);

  // Hide screens
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('debrief-screen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('thrust-btn').style.display = window.innerWidth < 800 ? 'flex' : 'none';

  // Start audio
  if (!AudioMgr.ctx) AudioMgr.init();
  if (AudioMgr.ctx.state === 'suspended') AudioMgr.ctx.resume();
  AudioMgr.loadAll().then(() => {
    AudioMgr.playMusic();
  });

  // Start orbiting first planet
  currentOrbit = planets[0];
  orbitPhase = 0;
  orbitRadius = currentOrbit.def.radius + 3;
  startTime = performance.now();

  updateHUD();
}

function updatePhysics(dt) {
  if (gameState !== 'playing') return;

  // Thrust
  isThrusting = input.thrusting && fuel > 0;
  if (isThrusting) {
    fuel = Math.max(0, fuel - FUEL_DRAIN * dt);
    // Accelerate toward Carrot Moon (negative Z)
    velocity.z -= THRUST_POWER * dt;
    // Visual feedback
    bunnyThruster.visible = true;
    bunnyThruster.flame.visible = true;
    bunnyThruster.intensity = 1.5 + Math.random() * 0.5;
    bunnyThruster.flame.scale.y = 0.8 + Math.random() * 0.5;
    bunnyThruster.flame.material.opacity = 0.5 + Math.random() * 0.3;

    // Thrust SFX (throttled)
    if (!thrustSFXTimer || performance.now() - thrustSFXTimer > 800) {
      AudioMgr.playSFX('thrust');
      thrustSFXTimer = performance.now();
    }
  } else {
    bunnyThruster.visible = false;
    bunnyThruster.flame.visible = false;
  }

  // Drag
  velocity.multiplyScalar(DRAG);

  // Check planet proximity for orbit capture
  let nearestDist = Infinity;
  let nearestPlanet = null;
  for (const p of planets) {
    const d = bunny.position.distanceTo(p.group.position);
    if (d < nearestDist) { nearestDist = d; nearestPlanet = p; }
    // Landing check
    if (d < p.def.radius * LANDING_RADIUS_FACTOR && !planetsVisited.has(p.def.name)) {
      // Land on planet
      landOnPlanet(p);
    }
  }

  // Update HUD with nearest planet
  if (nearestPlanet) {
    document.getElementById('hud-nearest').textContent = nearestPlanet.def.name;
  }

  // Check Carrot Moon arrival
  if (carrotMoon) {
    const distToMoon = bunny.position.distanceTo(carrotMoon.group.position);
    if (distToMoon < 4) {
      // Victory!
      triggerDebrief(true);
      return;
    }
  }

  // Check out of bounds (too far positive Z)
  if (bunny.position.z > 30) {
    // Drifted too far back — gentle nudge forward
    velocity.z -= 5 * dt;
  }

  // Apply velocity
  bunny.position.addScaledVector(velocity, dt);

  // Tilt bunny based on velocity
  const tiltX = THREE.MathUtils.clamp(velocity.z * 0.03, -0.4, 0.4);
  const tiltZ = THREE.MathUtils.clamp(velocity.x * 0.03, -0.3, 0.3);
  bunny.rotation.x = THREE.MathUtils.lerp(bunny.rotation.x, tiltX, 0.1);
  bunny.rotation.z = THREE.MathUtils.lerp(bunny.rotation.z, -tiltZ, 0.1);

  // Camera follows bunny with smooth offset
  const camTarget = new THREE.Vector3(
    bunny.position.x * 0.3,
    bunny.position.y + 5,
    bunny.position.z + 12
  );
  camera.position.lerp(camTarget, 0.03);
  camera.lookAt(bunny.position);

  // Update fuel bar
  document.getElementById('fuel-bar').style.width = (fuel / FUEL_MAX * 100) + '%';
}

let thrustSFXTimer = 0;

function landOnPlanet(planet) {
  planetsVisited.add(planet.def.name);
  planet.landCount++;
  AudioMgr.playSFX('landing');

  // Visual feedback: brief scale pulse
  planet.mesh.scale.set(1.1, 1.1, 1.1);
  setTimeout(() => { planet.mesh.scale.set(1, 1, 1); }, 300);

  // Add fuel when landing
  fuel = Math.min(FUEL_MAX, fuel + 15);

  updateHUD();

  // Move to next planet
  const visitedArr = Array.from(planetsVisited);
  const nextIdx = visitedArr.length;
  if (nextIdx < planets.length) {
    // Gentle transition: nudge toward next planet
    const next = planets[nextIdx];
    const dir = new THREE.Vector3().subVectors(next.group.position, bunny.position).normalize();
    velocity.addScaledVector(dir, 3);
  }
}

function updateHUD() {
  document.getElementById('hud-visited').textContent = `${planetsVisited.size} / ${planets.length}`;
}

function triggerDebrief(victory) {
  gameState = 'debrief';
  AudioMgr.playSFX('payoff');
  AudioMgr.playSFX('reveal');
  shakeAmount = 0.5;

  const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
  const fuelPct = Math.round(fuel / FUEL_MAX * 100);

  document.getElementById('hud').style.display = 'none';
  document.getElementById('thrust-btn').style.display = 'none';

  const screen = document.getElementById('debrief-screen');
  screen.classList.remove('hidden');

  document.getElementById('debrief-title').textContent = victory ? '🥕 You Reached the Carrot Moon!' : '🐰 Mission Incomplete';
  document.getElementById('ds-visited').textContent = planetsVisited.size;
  document.getElementById('ds-fuel').textContent = fuelPct + '%';
  document.getElementById('ds-time').textContent = elapsed + 's';

  // Classification
  let cls = '';
  if (victory && planetsVisited.size >= planets.length) {
    cls = '⭐⭐⭐ Legendary Orbit-Hopper!';
  } else if (victory) {
    cls = '⭐⭐ Stellar Explorer';
  } else if (planetsVisited.size >= 3) {
    cls = '⭐ Space Cadet';
  } else {
    cls = '🐰 Bunny Trainee';
  }
  document.getElementById('debrief-class').textContent = cls;
}

// ============================================================
// Animation
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05); // cap dt
  const t = clock.elapsedTime;

  if (gameState === 'playing') {
    updatePhysics(dt);

    // Planet bobbing
    planets.forEach(p => {
      p.group.position.y = p.def.pos[1] + Math.sin(t * 0.3 + p.orbitAngle) * 0.5;
      p.mesh.rotation.y += dt * 0.15;
    });

    // Carrot moon bob
    if (carrotMoon) {
      carrotMoon.group.userData.bobPhase += dt * 0.5;
      carrotMoon.group.position.y = 4 + Math.sin(carrotMoon.group.userData.bobPhase) * 1.2;
      carrotMoon.group.rotation.y += dt * 0.1;
    }

    // Stars slow rotation
    if (stars) stars.rotation.y += dt * 0.005;

    // Antenna light blink
    if (bunny) {
      const antLight = bunny.getObjectByName('antenna_light');
      if (antLight) {
        antLight.material.color.setHex(
          Math.sin(t * 3) > 0 ? 0x00ff88 : 0x004422
        );
      }
    }
  }

  renderer.render(scene, camera);
}

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// UI Bindings
// ============================================================
document.getElementById('btn-start').addEventListener('click', () => {
  startGame();
});
document.getElementById('btn-replay').addEventListener('click', () => {
  startGame();
});

// ============================================================
// Init
// ============================================================
initScene();
input.init();
animate();
</script>
