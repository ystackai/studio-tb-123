<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games - Beat District</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a15;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
h1{color:#0ff;font-size:36px;margin-bottom:10px;text-shadow:0 0 20px #0ff}
.subtitle{color:#888;font-size:16px;margin-bottom:40px}
.game-card{
  background:linear-gradient(135deg,rgba(30,10,50,0.9),rgba(10,20,40,0.9));
  border:2px solid rgba(0,255,255,0.3);border-radius:16px;padding:30px;
  width:100%;max-width:600px;text-align:center;cursor:pointer;
  transition:all 0.3s;
}
.game-card:hover{border-color:#0ff;transform:scale(1.02);box-shadow:0 0 30px rgba(0,255,255,0.3)}
.game-card h2{color:#f0f;font-size:28px;margin-bottom:10px}
.game-card p{color:#aaa;font-size:14px;line-height:1.6}
.game-card .tag{display:inline-block;background:rgba(0,255,255,0.15);color:#0ff;padding:4px 12px;border-radius:20px;font-size:12px;margin-top:15px}
.back-link{color:#888;font-size:14px;margin-top:30px;text-decoration:none}
.back-link:hover{color:#0ff}
</style>
</head>
<body>
<h1>🎮 Games</h1>
<p class="subtitle">Browser-based 3D experiences</p>
<a href="dance-battle/" class="game-card">
  <h2>Beat District</h2>
  <p>A GTA-style 3D open-city game where you explore a neon-lit city and resolve encounters through dance battles. Walk around, find NPCs, and challenge them to rhythm dance-offs!</p>
  <span class="tag">🎵 Dance Battle</span>
  <span class="tag">🏙️ Open World</span>
  <span class="tag">3D</span>
</a>
<a href="../" class="back-link">← Back to Factory</a>
</body>
</html>
