<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rotor Chrome Night Canyon</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    canvas{display:block;width:100%;height:100%}
    #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;
      background:rgba(0,0,8,0.85);transition:opacity .4s}
    #overlay.hidden{opacity:0;pointer-events:none}
    #overlay h1{color:#88ccff;font-size:2.4rem;letter-spacing:.08em;margin-bottom:.3em;font-family:monospace}
    #overlay p{color:#aabbcc;font-size:1rem;font-family:monospace;margin:.3em 0}
    #overlay .start-btn{margin-top:1.2em;padding:.8em 2.4em;font-size:1.1rem;font-family:monospace;
      background:#112244;color:#88ccff;border:1px solid #3366aa;cursor:pointer;letter-spacing:.06em}
    #overlay .start-btn:hover{background:#224466}
    #hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:5;font-family:monospace}
    #hud .bar{display:flex;gap:1.5em;padding:.6em 1em;color:#88ccff;font-size:.85rem;
      background:linear-gradient(180deg,rgba(0,0,20,0.6),transparent)}
    #hud .bar span{letter-spacing:.04em}
    #hud .stems{display:flex;gap:.4em;margin-top:.3em;padding:0 1em}
    #hud .stem-slot{width:60px;height:6px;background:#112;border-radius:3px;transition:background .3s}
    #hud .stem-slot.active{background:#44ffaa;box-shadow:0 0 6px #44ffaa}
    #debrief{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:10;background:rgba(0,0,15,0.9);opacity:0;pointer-events:none;transition:opacity .5s;font-family:monospace}
    #debrief.show{opacity:1;pointer-events:auto}
    #debrief h2{color:#88ccff;font-size:1.6rem;margin-bottom:.3em}
    #debrief p{color:#aabbcc;font-size:.95rem;margin:.2em 0}
    #debrief .restart-btn{margin-top:1em;padding:.6em 2em;font-family:monospace;font-size:1rem;
      background:#112244;color:#88ccff;border:1px solid #3366aa;cursor:pointer}
  </style>
</head>
<body>
  <div id="overlay">
    <h1>ROTOR CHROME</h1>
    <p>Night Canyon Run</p>
    <p style="font-size:.8rem;color:#667788;margin-top:.6em">WASD / Arrows — fly &nbsp;|&nbsp; Space — boost</p>
    <button class="start-btn" id="startBtn">LAUNCH</button>
  </div>
  <div id="hud">
    <div class="bar">
      <span id="hudScore">SCORE 0</span>
      <span id="hudStems">STEMS 0/4</span>
      <span id="hudGates">GATES 0/0</span>
    </div>
    <div class="stems" id="stemSlots"></div>
  </div>
  <div id="debrief">
    <h2 id="debTitle">RUN COMPLETE</h2>
    <p id="debScore"></p>
    <p id="debStems"></p>
    <p id="debGates"></p>
    <button class="restart-btn" id="restartBtn">RELAUNCH</button>
  </div>
  <script type="importmap">
  {
    "imports":{
      "three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
