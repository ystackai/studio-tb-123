<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bunny One</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e1a; overflow: hidden; }
  #game { width: 100%; height: 100%; display: block; touch-action: none; cursor: pointer; }
  #hud {
    position: absolute; inset: 0; pointer-events: none;
    font-family: Georgia, 'Times New Roman', serif; color: #f5e9d0;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 18px 22px; box-sizing: border-box;
  }
  #title { font-size: clamp(22px, 4.5vw, 40px); letter-spacing: 0.06em; text-shadow: 0 2px 12px rgba(0,0,0,0.6); transition: opacity 1.2s; }
  #subtitle { font-size: clamp(12px, 2vw, 17px); opacity: 0.85; margin-top: 6px; font-style: italic; transition: opacity 1.2s; }
  #carrots { font-size: clamp(14px, 2.4vw, 20px); text-align: right; opacity: 0; transition: opacity 0.8s; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  .faded { opacity: 0 !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div>
    <div id="title">BUNNY ONE</div>
    <div id="subtitle">hold to burn &middot; release to drift &middot; reach the carrot moon</div>
  </div>
  <div id="carrots"></div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
