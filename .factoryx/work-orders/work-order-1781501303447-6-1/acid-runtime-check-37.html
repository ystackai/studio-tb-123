<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Acid Circuit Breaker — TB-123</title>
<style>
   *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:'Courier New',monospace;color:#00FF41}
   #game-wrapper{display:flex;justify-content:center;align-items:center;width:100%;height:100%;position:relative;flex-direction:column;padding:4px 6px;background:#020203}
   /* Stronger wide arcade cabinet frame per 15:32Z contact-sheet: larger max-width uses more horizontal viewport; thicker bezel + layered shadow for physical cab weight; thinner side accents keep identity without constraining the neon playfield; less menu padding overall */
   #cabinet{display:flex;justify-content:center;align-items:stretch;width:100%;max-width:1080px;margin:0 auto;gap:0;background:#0a0a0f;border:2px solid #1a1a22;border-radius:3px;overflow:hidden;box-shadow:0 12px 70px rgba(0,0,0,0.75),inset 0 0 0 1px #111118}
   .cab-side{width:26px;background:linear-gradient(180deg,#0f0f13 0,#070709 50%,#0f0f13 100%);border-left:1px solid #1f1f26;border-right:1px solid #1f1f26;display:flex;align-items:center;justify-content:center;font-size:8px;color:#25252d;letter-spacing:0.08em;writing-mode:vertical-rl;text-orientation:mixed;user-select:none;flex-shrink:0}
   .cab-side.left{border-right:none}
   .cab-side.right{border-left:none}
   .cab-side span{transform:rotate(180deg);text-shadow:0 1px 0 #000}
   #game-container{position:relative;width:100%;max-width:1024px;aspect-ratio:960/900;background:#050507;border:6px solid #181820;border-radius:1px;overflow:hidden;box-shadow:inset 0 0 0 2px #252530,0 0 0 1px #0a0a0f,0 0 80px rgba(0,255,65,0.18),0 0 160px rgba(0,255,65,0.06)}
  canvas{display:block;width:100%;height:100%}
   /* CRT scanline overlay */
   #game-container::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);z-index:10}
   /* HUD */
   #hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;z-index:25;pointer-events:none;opacity:0;transition:opacity 0.2s}
   #hud.visible{opacity:1}
   .hud-item{font-size:0.68rem;font-weight:700;text-shadow:0 0 5px currentColor;letter-spacing:0.04em}
   .hud-score{color:#00FF41;font-size:0.98rem;font-weight:900}
   .hud-combo{color:#FFD700;font-size:0.76rem}
   .hud-level{color:#FF006E;font-size:0.66rem}
   /* Touch zones — full-height vertical strips for reliable thumb play anywhere on the circuit */
   .touch-zone{position:absolute;top:0;bottom:0;width:33.33%;pointer-events:all;z-index:30;opacity:0;transition:opacity 0.15s}
   .touch-zone:active{opacity:0.12;background:rgba(255,255,255,0.03)}
   #touch-left{left:0}
   #touch-center{left:33.33%}
   #touch-right{left:66.66%}
   /* Labels are pure hints, anchored low and subtle so they don't fight the play area; auto-dim in play */
   .touch-label{position:absolute;bottom:22px;color:rgba(0,255,65,0.22);font-size:1.1rem;pointer-events:none;user-select:none;transition:opacity 0.2s}
   .touch-label.dim{opacity:0.06}
   /* Screens */
   .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;pointer-events:all;opacity:0;transition:opacity 0.18s;pointer-events:none;background:linear-gradient(to bottom,rgba(3,3,5,0.65) 0%,rgba(3,3,5,0.25) 38%,transparent 52%)}
   .screen.active{opacity:1;pointer-events:all}
   .screen-title{font-size:1.55rem;font-weight:900;letter-spacing:0.1em;text-shadow:0 0 18px #00FF41,0 0 36px #00FF41;margin:0 0 0.2rem;text-align:center;color:#00FF41;line-height:1.05}
   .screen-subtitle{font-size:0.64rem;color:#666;margin-bottom:1.1rem;text-align:center;max-width:420px;line-height:1.35;opacity:0.9}
   .screen-btn{padding:13px 30px;font-family:'Courier New',monospace;font-size:0.86rem;font-weight:800;color:#0a0a0a;background:#00FF41;border:none;border-radius:4px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;box-shadow:0 0 18px rgba(0,255,65,0.5);transition:all 0.12s;min-width:168px;min-height:46px}
   .screen-btn:hover{background:#33FF77;box-shadow:0 0 28px rgba(0,255,65,0.75);transform:scale(1.03)}
   .screen-btn:active{transform:scale(0.98)}
   .final-score{font-size:2.1rem;color:#FF006E;text-shadow:0 0 14px #FF006E;margin:0.2rem 0}
   .final-combo{font-size:0.82rem;color:#FFD700;margin-bottom:1.1rem}
   .controls-hint{font-size:0.62rem;color:#444;margin-top:0.9rem;text-align:center;line-height:1.4;opacity:0.85}
   @media(max-width:1024px){
     #cabinet{border:none;border-radius:0;background:transparent;box-shadow:none}
     .cab-side{display:none}
     #game-container{border-radius:0;border:3px solid #15151c;max-width:100%}
     .screen-title{font-size:1.38rem}
   }
   @keyframes neon-pulse{0%,100%{text-shadow:0 0 20px #00FF41,0 0 40px #00FF41}50%{text-shadow:0 0 30px #00FF41,0 0 60px #00FF41,0 0 80px #00FF41}}
   .screen-title{animation:neon-pulse 2s ease-in-out infinite}
   @keyframes beat-flash{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
   .beat-flash{animation:beat-flash 0.15s ease-out}
</style>
</head>
<body>
<div id="game-wrapper">
   <!-- Wider cabinet + stronger frame (more horiz viewport, thicker bezel, dominant playfield) per 15:32Z contact-sheet polish; preserves neon handheld cab identity -->
   <div id="cabinet">
    <div class="cab-side left"><span>TB-123</span></div>
    <div id="game-container">
     <canvas id="gameCanvas" width="960" height="900"></canvas>
     <!-- HUD -->
     <div id="hud">
       <div class="hud-item hud-score" id="hud-score">0</div>
       <div class="hud-item hud-level" id="hud-level">LVL 1</div>
       <div class="hud-item hud-combo" id="hud-combo"></div>
     </div>
     <!-- Touch zones for mobile -->
     <div class="touch-zone" id="touch-left"><span class="touch-label">◀</span></div>
     <div class="touch-zone" id="touch-center"><span class="touch-label">●</span></div>
     <div class="touch-zone" id="touch-right"><span class="touch-label">▶</span></div>
     <!-- Start screen -->
     <div class="screen active" id="start-screen">
       <div class="screen-title">ACID CIRCUIT<br>BREAKER</div>
       <div class="screen-subtitle">Race the lanes. Switch polarity (SPACE / tap center) to match gate letters. Dodge glitches. Chain pulses.</div>
       <button class="screen-btn" id="btn-start">START</button>
       <div class="controls-hint">← → / tap sides: lane &nbsp;&nbsp; SPACE / tap ● : flip polarity<br>Match gate letter color with your ship to score</div>
     </div>
     <!-- Game over screen -->
     <div class="screen" id="gameover-screen">
       <div class="screen-title">CIRCUIT<br>OVER</div>
       <div class="final-score" id="final-score">0</div>
       <div class="final-combo" id="final-combo"></div>
       <button class="screen-btn" id="btn-restart">RETRY</button>
     </div>
   </div>
   </div><!-- /#game-container -->
  </div><!-- /#cabinet -->
</div>

<script>
(function(){
'use strict';

// ── Constants ──
const W=960, H=900; // wider horiz viewport use + strong cab frame per 15:32Z; still tall runway for descent
const LANE_COUNT=3;
const LANE_W=W/LANE_COUNT;
const PLAYER_W=92, PLAYER_H=48; // enlarged per contact-sheet
const GATE_H=36;
const GLITCH_W=76, GLITCH_H=34;
const PULSE_R=16;
const LANE_COLORS=['#00FF41','#FF006E','#3A86FF'];
const LANE_NAMES=['G','P','B'];
const BG_COLOR='#050507';
const TRACE_COLOR='#111118';

// ── Canvas & Context ──
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

// ── DOM refs ──
const hudEl=document.getElementById('hud');
const hudScore=document.getElementById('hud-score');
const hudLevel=document.getElementById('hud-level');
const hudCombo=document.getElementById('hud-combo');
const startScreen=document.getElementById('start-screen');
const gameoverScreen=document.getElementById('gameover-screen');
const finalScoreEl=document.getElementById('final-score');
const finalComboEl=document.getElementById('final-combo');
const btnStart=document.getElementById('btn-start');
const btnRestart=document.getElementById('btn-restart');

// ── Game state ──
let state='START';
let player={lane:1,polarity:1,x:W/2,y:H-130,targetX:W/2,alpha:1};
let gates=[],glitches=[],pulses=[],particles=[],breaks=[],toasts=[],warnings=[],polRings=[],matchPops=[];
let score=0,combo=0,maxCombo=0,level=1,speed=2.5,dist=0;
let spawnTimer=0,difficultyTimer=0;
let bgOffset=0,circuitLines=[],lastBeatTime=0;
let shakeX=0,shakeY=0,shakeDecay=0;
let flashAlpha=0,flashColor='#fff';
let gameTime=0;
let lastSuccessTime=0; // for idle combo decay + beat-phase bonuses

function laneCenter(i){return LANE_W*i+LANE_W/2;}

// ── Audio engine (Web Audio API, only after user gesture) ──
let audioCtx=null;
function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
   }
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime(vol||0.06,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
   }catch(e){}
}
function sfxCollect(){
  playTone(880,0.1,'sine',0.09);
  setTimeout(()=>playTone(1320,0.12,'sine',0.05),60);
}
function sfxGatePass(){playTone(440,0.12,'square',0.06);}
function sfxGlitchHit(){
  playTone(100,0.35,'sawtooth',0.1);
  playTone(70,0.4,'square',0.06);
}
function sfxLevelUp(){
  playTone(523,0.08,'sine',0.07);
  setTimeout(()=>playTone(659,0.08,'sine',0.07),70);
  setTimeout(()=>playTone(784,0.12,'sine',0.09),140);
}
function sfxPolarity(){
  playTone(720,0.04,'square',0.05);
  setTimeout(()=>playTone(920,0.05,'square',0.04),25);
}

// ── Spawning ──
function spawnGate(){
  const lane=Math.floor(Math.random()*LANE_COUNT);
  const colorIdx=Math.floor(Math.random()*LANE_COUNT);
  gates.push({lane,colorIdx,y:-GATE_H});
}
function spawnGlitch(){
  const lane=Math.floor(Math.random()*LANE_COUNT);
  glitches.push({lane,x:laneCenter(lane),y:-GLITCH_H,speed:speed*1.3+Math.random()*0.8});
  warnings.push({lane,life:0.32}); // brief top-of-lane telegraph for incoming threat
}
function spawnPulse(){
  const lane=Math.floor(Math.random()*LANE_COUNT);
  pulses.push({lane,x:laneCenter(lane),y:-PULSE_R,speed:speed*1.1});
}

// ── Particles ──
function emitParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=1+Math.random()*5;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-1,life:1,decay:0.015+Math.random()*0.025,color,size:2+Math.random()*4});
   }
}

// ── Input ──
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='START')startGame();
    else if(state==='GAMEOVER')restartGame();
    else if(state==='PLAYING')cyclePolarity();
   }
  if(state==='PLAYING'){
    if((e.code==='ArrowLeft'||e.code==='KeyA')&&player.lane>0){
      player.lane--;player.targetX=laneCenter(player.lane);
      emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4);
     }
    if((e.code==='ArrowRight'||e.code==='KeyD')&&player.lane<LANE_COUNT-1){
      player.lane++;player.targetX=laneCenter(player.lane);
      emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4);
     }
   }
});

document.getElementById('touch-left').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state==='START'){startGame();return;}
  if(state==='GAMEOVER'){restartGame();return;}
  if(state==='PLAYING'&&player.lane>0){
    player.lane--;player.targetX=laneCenter(player.lane);
    emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4);
   }
});
document.getElementById('touch-right').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state==='START'){startGame();return;}
  if(state==='GAMEOVER'){restartGame();return;}
  if(state==='PLAYING'&&player.lane<LANE_COUNT-1){
    player.lane++;player.targetX=laneCenter(player.lane);
    emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4);
   }
});
document.getElementById('touch-center').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state==='START'){initAudio();startGame();return;}
  if(state==='GAMEOVER'){initAudio();restartGame();return;}
  if(state==='PLAYING')cyclePolarity();
});

// Canvas-level pointer zones (full height, any Y). Div zones still work for the visual hint taps.
canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)/rect.width*W;
  const third=W/3;
  if(state==='START'){initAudio();startGame();return;}
  if(state==='GAMEOVER'){initAudio();restartGame();return;}
  if(state!=='PLAYING')return;
  if(cx < third){
    if(player.lane>0){ player.lane--; player.targetX=laneCenter(player.lane); emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4); }
  }else if(cx < third*2){
    cyclePolarity();
  }else{
    if(player.lane<LANE_COUNT-1){ player.lane++; player.targetX=laneCenter(player.lane); emitParticles(player.x,player.y,LANE_COLORS[player.polarity],4); }
  }
});

btnStart.addEventListener('click',()=>{initAudio();startGame();});
btnRestart.addEventListener('click',()=>{initAudio();restartGame();});

// ── Game control ──
function startGame(){
  initAudio();
  player={lane:1,polarity:1,x:laneCenter(1),y:H-175,targetX:laneCenter(1),alpha:1};
  gates=[];glitches=[];pulses=[];particles=[];breaks=[];toasts=[];warnings=[];polRings=[];matchPops=[];
  score=0;combo=0;maxCombo=0;level=1;speed=3;dist=0;
  spawnTimer=0;difficultyTimer=0;
  bgOffset=0;circuitLines=[];
  for(let i=0;i<8;i++){
    circuitLines.push({x:Math.random()*W,y:Math.random()*H,h:20+Math.random()*40,speed:0.5+Math.random()*1.5});
   }
  hudEl.classList.add('visible');
  startScreen.classList.remove('active');
  gameoverScreen.classList.remove('active');
  // dim touch hints once playing (less menu clutter per 15:32 polish)
  document.querySelectorAll('.touch-label').forEach(el=>el.classList.add('dim'));
  hudScore.textContent='0';
  hudLevel.textContent='LVL 1';
  hudCombo.textContent='';
   // Pre-place curated obstacles/pickups so first 30s is immediately playable and demonstrates both verbs
  // y retuned for 960x900 wide runway + larger sprites per 15:32 contact-sheet enlarge
  gates.push({lane:1,colorIdx:1,y:110}); // easy first match (lane+pol)
  gates.push({lane:0,colorIdx:2,y:275}); // requires lane switch + pol cycle
  gates.push({lane:2,colorIdx:1,y:455}); // mismatch example
  glitches.push({lane:0,x:laneCenter(0),y:175,speed:speed*1.2});
  glitches.push({lane:2,x:laneCenter(2),y:370,speed:speed*1.35});
  pulses.push({lane:1,x:laneCenter(1),y:220,speed:speed*0.9});
  pulses.push({lane:0,x:laneCenter(0),y:425,speed:speed*1.0});
  state='PLAYING';

  // Reset timing for clean restarts and verification determinism
  gameTime=0;
  lastSuccessTime=0;
  lastTime=0;

  // Immediate synchronous render of pre-seeded slice. This makes the in-game state
  // (player + gates + glitches + pulses + HUD) visible right after startGame() returns,
  // even before the next RAF tick. Targeted to eliminate race where instrumented
  // file:// runtime-check-N.html captures screenshot before first frame paints,
  // which was the direct cause of prior "browser runtime verification timed out".
  render();
}
function restartGame(){startGame();}

function cyclePolarity(){
  if(state!=='PLAYING')return;
  player.polarity=(player.polarity+1)%LANE_COUNT;
  emitParticles(player.x,player.y-5,LANE_COLORS[player.polarity],7);
  // unmistakable polarity switch ring (expands in new color) — immediate visual pop for lane/polarity verbs
  polRings.push({x:player.x, y:player.y, r:8, maxr:92, life:0.28, color:LANE_COLORS[player.polarity]});
  sfxPolarity();
}

function triggerGameOver(){
  state='GAMEOVER';
  sfxGlitchHit();
  shakeDecay=18;
  flashAlpha=0.8;flashColor='#FF006E';
  emitParticles(player.x,player.y,'#FF006E',30);
  emitParticles(player.x,player.y,'#FFD700',15);
  hudEl.classList.remove('visible');
  setTimeout(()=>{
    finalScoreEl.textContent=score;
    finalComboEl.textContent='Best combo: '+maxCombo+'x';
    gameoverScreen.classList.add('active');
   },500);
}

// ── Update ──
function update(dt){
  if(state!=='PLAYING')return;
  
  gameTime+=dt;
  
  // Difficulty — faster ramp
  const newLevel=Math.floor(dist/2000)+1;
  if(newLevel>level){
    level=newLevel;
    speed=2.5+level*0.5;
    hudLevel.textContent='LVL '+level;
    sfxLevelUp();
    emitParticles(player.x,player.y,'#FFD700',20);
    // Escalating patterns at level thresholds (keeps first 30s taste-gate pre-seed untouched)
    if(level>=2){
      const pcol=(level%3);
      if(level%2===0){
        // color-hold pattern: same polarity gates spread, rewards staying on one breaker setting
        gates.push({lane:0,colorIdx:pcol,y:-GATE_H-40});
        gates.push({lane:1,colorIdx:pcol,y:-GATE_H+70});
        gates.push({lane:2,colorIdx:pcol,y:-GATE_H+160});
        const gl=(pcol+1)%3;
        glitches.push({lane:gl,x:laneCenter(gl),y:-GLITCH_H-20,speed:speed*1.45});
        warnings.push({lane:gl,life:0.55});
      }else{
        // lane-hold + close threat: forces physical alignment while polarity must still flip
        const lh=(level-1)%3;
        gates.push({lane:lh,colorIdx:pcol,y:-GATE_H-25});
        gates.push({lane:lh,colorIdx:(pcol+1)%3,y:-GATE_H+95});
        const g2=(lh+2)%3;
        glitches.push({lane:g2,x:laneCenter(g2),y:-GLITCH_H-5,speed:speed*1.55});
        warnings.push({lane:g2,life:0.48});
        if(Math.random()<0.7) pulses.push({lane:lh,x:laneCenter(lh),y:-PULSE_R-55,speed:speed*0.85});
      }
    }
   }
  
  // Beat-synced difficulty
  const beatInterval=Math.max(200,700-level*50);
  
  // Player movement (smooth easing)
  const lerpSpeed=0.2;
  player.x+=(player.targetX-player.x)*lerpSpeed;
  
  // Spawn gates — every ~600-1000ms
  spawnTimer+=dt;
  const gateInterval=Math.max(350,750-level*50);
  if(spawnTimer>gateInterval){
    spawnTimer=0;
    spawnGate();
    if(level>=1&&Math.random()<0.4+level*0.03)spawnGlitch();
    if(level>=1&&Math.random()<0.3)spawnPulse();
   }
  
  // Move gates
  for(let i=gates.length-1;i>=0;i--){
    const g=gates[i];
    g.y+=speed;
    if(g.y>H+20){gates.splice(i,1);continue;}
    
     // Gate passage — must match BOTH lane position and current polarity (color) to break/score
    if(g.y+GATE_H>player.y&&g.y<player.y+PLAYER_H){
      if(g.lane===player.lane && g.colorIdx===player.polarity){
        // Beat-phase bonus for "chain beat-synced" flavor: crossing near the visual beat peak gives extra juice
        const beatInterval=Math.max(200,700-level*50);
        const beatPhase=(gameTime%beatInterval)/beatInterval;
        const nearPeak=(beatPhase<0.16)||(1-beatPhase)<0.16;
        const comboMult=Math.min(combo+1+(nearPeak?1:0),16);
        const base=100;
        const pts=Math.floor(base*comboMult*(nearPeak?1.5:1));
        score+=pts;
        combo=comboMult;
        if(combo>maxCombo)maxCombo=combo;
        lastSuccessTime=gameTime;
        hudScore.textContent=score;
        hudScore.classList.remove('beat-flash');
        void hudScore.offsetWidth;
        hudScore.classList.add('beat-flash');
        hudCombo.textContent=combo>1?combo+'x':' ';
        flashAlpha=nearPeak?0.38:0.22;flashColor=LANE_COLORS[g.colorIdx];
        sfxGatePass();
        const cx=laneCenter(g.lane);
        // unmistakable "BREAK" pop + extra burst for match (large, rises, high contrast)
        matchPops.push({x:cx, y:g.y+GATE_H/2-2, life:0.82, color:nearPeak?'#fff':LANE_COLORS[g.colorIdx], big:nearPeak});
        emitParticles(cx, g.y+GATE_H/2, LANE_COLORS[g.colorIdx], nearPeak?22:14);
        if(nearPeak) emitParticles(cx+5, g.y+GATE_H/2-1, '#fff', 9);
        // Stronger circuit-break arcs centered on the gate's position (not player) so the "snap" reads up-lane
        for(let k=0;k<(nearPeak?6:4);k++){
          breaks.push({x:cx+(k-2)*10, y:g.y+GATE_H/2, life:0.68+Math.random()*0.18, color:nearPeak?'#fff':LANE_COLORS[g.colorIdx], w:28+Math.random()*24});
        }
        // remove the gate right now — it broke; no sliding past after success
        gates.splice(i,1);
        continue;
       } else {
        // Wrong lane or wrong polarity: miss, reset combo (no death; glitches are the deadly ones)
        if(combo>0){ combo=0; hudCombo.textContent=''; }
        const missWhy = (g.lane!==player.lane ? 'LANE' : 'POLARITY');
        toasts.push({x:player.x+(Math.random()-0.5)*8, y:player.y-16, text:missWhy, color:'#FF5E5E', life:0.9});
        // Punchier mismatch: red particles + extra at gate + brief red flash for unmistakable "why" (per 15:32)
        const gcx = laneCenter(g.lane);
        emitParticles(gcx, g.y+GATE_H/2, '#FF5E5E', 11);
        emitParticles(gcx-6, g.y+GATE_H/2+2, '#c00', 5);
        flashAlpha=0.12; flashColor='#FF3355';
        // also tag the gate briefly red for one frame visual denial (read during pass)
        g._mismatchFlash = 1.6;
       }
     }
   }
  
  // Move glitches
  for(let i=glitches.length-1;i>=0;i--){
    const gl=glitches[i];
    gl.y+=gl.speed;
    if(gl.y>H+30){glitches.splice(i,1);continue;}
    
     // Collision with player
    const px=player.x-PLAYER_W/2,py=player.y-PLAYER_H/2;
    const gx=gl.x-GLITCH_W/2,gy=gl.y-GLITCH_H/2;
    if(px<gx+GLITCH_W&&px+PLAYER_W>gx&&py<gy+GLITCH_H&&py+PLAYER_H>gy){
      combo=0;hudCombo.textContent='';
      triggerGameOver();
      return;
     }
   }
  
  // Move pulses
  for(let i=pulses.length-1;i>=0;i--){
    const p=pulses[i];
    p.y+=p.speed;
    if(p.y>H+20){pulses.splice(i,1);continue;}
    
     // Collection
    const dx=player.x-p.x,dy=player.y-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<PULSE_R+PLAYER_W/2){
      combo++;
      if(combo>maxCombo)maxCombo=combo;
      const pts=50*combo;
      score+=pts;
      hudScore.textContent=score;
      hudScore.classList.remove('beat-flash');
      void hudScore.offsetWidth;
      hudScore.classList.add('beat-flash');
      hudCombo.textContent=combo+'x';
      flashAlpha=0.1;flashColor='#FFD700';
      sfxCollect();
      emitParticles(p.x,p.y,'#FFD700',8);
      lastSuccessTime=gameTime;
      pulses.splice(i,1);
     }
   }
  
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
   }
  
  // Light combo decay when idle (encourages chaining; does not punish active play)
  if(combo>1 && (gameTime-lastSuccessTime)>1400){
    combo--;
    hudCombo.textContent=combo>1?combo+'x':' ';
    lastSuccessTime=gameTime; // reset window so it decays one step at a time
  }
  
  // Breaker arcs decay
  for(let i=breaks.length-1;i>=0;i--){
    const b=breaks[i];
    b.life-=0.028;
    if(b.life<=0)breaks.splice(i,1);
  }
  // Toasts (miss feedback popups) decay + float
  for(let i=toasts.length-1;i>=0;i--){
    const t=toasts[i];
    t.y-=0.35; t.life-=0.022;
    if(t.life<=0)toasts.splice(i,1);
  }
  // Glitch warning telegraphs decay
  for(let i=warnings.length-1;i>=0;i--){
    const w=warnings[i];
    w.life-=0.028;
    if(w.life<=0)warnings.splice(i,1);
  }
  // Polarity switch rings decay (for unmistakable flip feedback)
  for(let i=polRings.length-1;i>=0;i--){
    const r=polRings[i];
    r.life-=0.032; r.r += (r.maxr-r.r)*0.18;
    if(r.life<=0)polRings.splice(i,1);
  }
  // Match/BREAK pops decay + rise
  for(let i=matchPops.length-1;i>=0;i--){
    const p=matchPops[i];
    p.y -= 0.9; p.life -= 0.028;
    if(p.life<=0)matchPops.splice(i,1);
  }
  
  // Background circuit lines
  bgOffset+=speed*0.5;
  for(let i=0;i<circuitLines.length;i++){
    const cl=circuitLines[i];
    cl.y+=cl.speed;
    if(cl.y>H+cl.h){cl.y=-cl.h;cl.x=Math.random()*W;}
   }
  
  dist+=speed;
  
  // Flash fade
  if(flashAlpha>0){
    flashAlpha*=0.92;
    if(flashAlpha<0.01)flashAlpha=0;
   }
  
  // Screen shake decay
  if(shakeDecay>0){
    shakeX=(Math.random()-0.5)*shakeDecay;
    shakeY=(Math.random()-0.5)*shakeDecay;
    shakeDecay*=0.82;
    if(shakeDecay<0.3)shakeDecay=0;
   }
}

// ── Render ──
function render(){
  ctx.save();
  ctx.translate(shakeX,shakeY);
  
  // Background
  ctx.fillStyle=BG_COLOR;
  ctx.fillRect(-10,-10,W+20,H+20);
  
  // Beat-synced background pulse (tinted to current polarity for rave-reactive feel)
  if(state==='PLAYING'){
    const beatInterval=Math.max(200,700-level*50);
    const beatPhase=(gameTime%beatInterval)/beatInterval;
    const pulse=Math.max(0,1-beatPhase*3)*0.035;
    const pc=LANE_COLORS[player.polarity];
    // quick hex->rgba (assumes #rrggbb)
    const r=parseInt(pc.slice(1,3),16),g=parseInt(pc.slice(3,5),16),b=parseInt(pc.slice(5,7),16);
    ctx.fillStyle='rgba('+r+','+g+','+b+','+pulse+')';
    ctx.fillRect(0,0,W,H);
   }
  
  // Grid / circuit traces — brighten on the beat for extra rave reactivity
  ctx.strokeStyle=TRACE_COLOR;
  ctx.lineWidth=1;
  if(state==='PLAYING'){
    const beatInterval=Math.max(200,700-level*50);
    const beatPhase=(gameTime%beatInterval)/beatInterval;
    if(beatPhase<0.12 || (1-beatPhase)<0.12){
      ctx.strokeStyle='#2a2a36'; ctx.lineWidth=1.5;
    }
  }
  for(let y=(bgOffset%40)-40;y<H;y+=40){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
   }
  for(let x=0;x<=W;x+=40){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
   }
  // Circuit dots
  ctx.fillStyle='#1a1a24';
  for(let y=(bgOffset%80)-80;y<H;y+=80){
    for(let x=(bgOffset*0.5%80)-80;x<W;x+=80){
      ctx.fillRect(x-1.5,y-1.5,3,3);
     }
   }
  
  // Background circuit lines (decorative)
  if(circuitLines.length){
    for(let i=0;i<circuitLines.length;i++){
      const cl=circuitLines[i];
      const ci=Math.floor(cl.x/W*3);
      ctx.fillStyle=LANE_COLORS[ci]+'33';
      ctx.fillRect(cl.x,cl.y,1.5,cl.h);
     }
   }
  
  // Lane indicators
  for(let i=0;i<LANE_COUNT;i++){
    const x=laneCenter(i);
    ctx.strokeStyle=LANE_COLORS[i]+'12';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    ctx.strokeStyle=LANE_COLORS[i]+'06';
    ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
   }
  
  // Lane glow when player is on it — wider for larger viewport/lanes + cab scale
  const plx=laneCenter(player.lane);
  const glowGrad=ctx.createLinearGradient(plx-95,0,plx+95,0);
  glowGrad.addColorStop(0,'transparent');
  glowGrad.addColorStop(0.5,LANE_COLORS[player.lane]+'15');
  glowGrad.addColorStop(1,'transparent');
  ctx.fillStyle=glowGrad;
  ctx.fillRect(plx-95,0,190,H);
  
  // Draw gates — enlarged for 960w horiz + unmistakable match/mismatch (15:32 contact-sheet)
  for(let i=0;i<gates.length;i++){
    const g=gates[i];
    const cx=laneCenter(g.lane);
    const color=LANE_COLORS[g.colorIdx];
    const isPolMatch = (g.colorIdx === player.polarity);
    const isLaneMatch = (g.lane === player.lane);
    ctx.save();
    ctx.shadowColor=color;ctx.shadowBlur=26;
    let gw = 240, gh = GATE_H;
    ctx.fillStyle=color;
    // if recent mismatch, tint the bar briefly red for denial pop
    if(g._mismatchFlash && g._mismatchFlash>0){ ctx.fillStyle='#FF3355'; g._mismatchFlash -= 0.9; }
    ctx.fillRect(cx-gw/2, g.y, gw, gh);
    // Gate ends (brighter caps)
    ctx.fillStyle='#fff';
    ctx.fillRect(cx-gw/2, g.y, 8, gh);
    ctx.fillRect(cx+gw/2-8, g.y, 8, gh);
    // When polarity matches current ship, draw unmistakable "this is breakable now" highlight ring (thicker, brighter on full match)
    if(isPolMatch){
      ctx.strokeStyle = isLaneMatch ? '#fff' : '#ffeb3b';
      ctx.lineWidth = isLaneMatch ? 4.5 : 3;
      ctx.strokeRect(cx-gw/2+2, g.y+1, gw-4, gh-2);
      // extra inner cue for full ready state
      if(isLaneMatch){
        ctx.lineWidth=1.5; ctx.strokeRect(cx-gw/2+7, g.y+5, gw-14, gh-10);
      }
    }
    // Polarity label — larger bold 22px for unmistakable at a glance (letter = polarity state)
    ctx.fillStyle=BG_COLOR;
    ctx.fillRect(cx-16,g.y+3,32,gh-6);
    ctx.fillStyle=color;
    ctx.font='bold 22px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(LANE_NAMES[g.colorIdx],cx,g.y+gh/2);
    ctx.restore();
   }
  
  // Draw glitches — acid interference: tears + chromatic fringing
  for(let i=0;i<glitches.length;i++){
    const gl=glitches[i];
    ctx.save();
    const gx=gl.x-GLITCH_W/2, gy=gl.y-GLITCH_H/2;
    // Base bright slab with slight shake
    ctx.shadowColor='#FFD700';ctx.shadowBlur=10;
    ctx.fillStyle='#fff';
    ctx.fillRect(gx+ (Math.random()-0.5)*1.5, gy, GLITCH_W, GLITCH_H);
    // Horizontal signal tears (acid raster break)
    ctx.shadowBlur=0;
    ctx.fillStyle='#FF006E';
    for(let j=0;j<4;j++){
      const tx=gx + (j%2? -3:2) + Math.random()*GLITCH_W*0.6;
      const ty=gy + 2 + j*3.5;
      ctx.fillRect(tx, ty, 9+Math.random()*13, 2);
    }
    // Chromatic fringe (cyan/magenta split) for "rave glitch"
    ctx.fillStyle='#00f7ff';
    ctx.fillRect(gx+2, gy+2, 4, GLITCH_H-4);
    ctx.fillStyle='#ff00aa';
    ctx.fillRect(gx+GLITCH_W-6, gy+3, 4, GLITCH_H-6);
    // Warning — larger for new scale
    ctx.fillStyle='#FFD700';
    ctx.font='bold 16px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('!',gl.x,gl.y);
    ctx.restore();
   }
  
  // Draw pulses
  const pulsePhase=Math.sin(gameTime*0.006)*0.3+0.7;
  for(let i=0;i<pulses.length;i++){
    const p=pulses[i];
    ctx.save();
    ctx.shadowColor='#FFD700';ctx.shadowBlur=18*pulsePhase;
    ctx.globalAlpha=0.5+pulsePhase*0.5;
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(p.x,p.y,PULSE_R*pulsePhase,0,Math.PI*2);ctx.fill();
    // Outer ring
    ctx.globalAlpha=0.2*pulsePhase;
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(p.x,p.y,PULSE_R*2.2,0,Math.PI*2);ctx.stroke();
    ctx.restore();
   }
  
  // Draw breaker arcs (transient "circuit snap" on successful gate breaks)
  for(let i=0;i<breaks.length;i++){
    const b=breaks[i];
    ctx.save();
    ctx.globalAlpha=Math.max(0.15,b.life);
    ctx.strokeStyle=b.color;
    ctx.lineWidth=1.5;
    const y=b.y - (1-b.life)*12;
    ctx.beginPath();
    ctx.moveTo(b.x-b.w*0.5, y);
    ctx.lineTo(b.x+b.w*0.5, y-1);
    ctx.stroke();
    // small return arc for "coherence" pop
    ctx.beginPath();
    ctx.moveTo(b.x-b.w*0.35, y+2);
    ctx.lineTo(b.x+b.w*0.25, y+3);
    ctx.stroke();
    ctx.restore();
   }

  // Polarity switch rings — unmistakable immediate visual for flip action (expanding colored ring)
  for(let i=0;i<polRings.length;i++){
    const r=polRings[i];
    ctx.save();
    ctx.globalAlpha = Math.max(0.12, r.life);
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, Math.max(4,r.r), 0, Math.PI*2); ctx.stroke();
    ctx.lineWidth=1; ctx.globalAlpha *= 0.6;
    ctx.beginPath(); ctx.arc(r.x, r.y, Math.max(2,r.r*0.6), 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // BREAK / match pops — large rising "BREAK" text on successful dual-match for punchy reward feedback
  for(let i=0;i<matchPops.length;i++){
    const p=matchPops[i];
    ctx.save();
    ctx.globalAlpha = Math.max(0.15, p.life);
    ctx.fillStyle = p.color;
    ctx.font = (p.big ? '900 18px' : '700 15px') + ' Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.big ? 'BREAK' : 'OK', p.x, p.y);
    ctx.restore();
  }

  // Draw glitch warning telegraphs (top of lane, brief — makes threats readable before they arrive)
  for(let i=0;i<warnings.length;i++){
    const w=warnings[i];
    const wx=laneCenter(w.lane);
    ctx.save();
    ctx.globalAlpha=Math.max(0.12,w.life);
    ctx.fillStyle='#FF006E';
    ctx.font='bold 18px Courier New';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('!',wx,8);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(wx-9,15);ctx.lineTo(wx+9,15);ctx.stroke();
    ctx.restore();
  }

  // Draw miss toasts (immediate "why combo broke" feedback near the action) — larger for unmistakable
  for(let i=0;i<toasts.length;i++){
    const t=toasts[i];
    ctx.save();
    ctx.globalAlpha=Math.max(0.1,t.life);
    ctx.fillStyle=t.color;
    ctx.font='700 17px Courier New';ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  }
  
  // Draw particles
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.restore();
   }
  
  // Draw player — position by lane, color by active polarity (the "breaker" color you switch)
  if(state==='PLAYING'||state==='GAMEOVER'){
    ctx.save();
    const pAlpha=state==='GAMEOVER'?0.35:1;
    ctx.globalAlpha=pAlpha;
    const pColor=LANE_COLORS[player.polarity];
    
    // Player glow (uses current polarity color) — stronger for new larger scale
    ctx.shadowColor=pColor;
    ctx.shadowBlur=state==='PLAYING'?34:10;
    
    // Player body (polarity color) — further enlarged per 15:32 contact-sheet
    ctx.fillStyle=pColor;
    ctx.fillRect(player.x-PLAYER_W/2,player.y-PLAYER_H/2,PLAYER_W,PLAYER_H);
    
    // Player inner
    ctx.shadowBlur=0;
    ctx.fillStyle=BG_COLOR;
    ctx.fillRect(player.x-PLAYER_W/2+6,player.y-PLAYER_H/2+6,PLAYER_W-12,PLAYER_H-12);
    
    // Player core (polarity)
    ctx.fillStyle=pColor;
    ctx.beginPath();
    ctx.arc(player.x,player.y,6,0,Math.PI*2);
    ctx.fill();
    
    // Polarity LETTER directly on ship — 26px bold, unmistakable at a glance (enlarged for contact-sheet)
    ctx.fillStyle='#fff';
    ctx.font='bold 26px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(LANE_NAMES[player.polarity],player.x,player.y-1);
    
    // Lane position indicator (small, shows which trace you are physically on)
    ctx.fillStyle=LANE_COLORS[player.lane];
    ctx.fillRect(player.x-PLAYER_W/2+16,player.y-PLAYER_H/2+PLAYER_H-6,PLAYER_W-32,5);
    
    // Trail (uses polarity)
    ctx.globalAlpha=0.12;
    const trailGrad=ctx.createLinearGradient(player.x-PLAYER_W/2-5,player.y-PLAYER_H/2-10,player.x-PLAYER_W/2-5,player.y+PLAYER_H/2+10);
    trailGrad.addColorStop(0,'transparent');
    trailGrad.addColorStop(0.5,pColor);
    trailGrad.addColorStop(1,'transparent');
    ctx.fillStyle=trailGrad;
    ctx.fillRect(player.x-PLAYER_W/2-10,player.y-PLAYER_H/2-14,PLAYER_W+20,PLAYER_H+28);
    
    ctx.restore();
   }
  
  // Beat indicator (bottom center)
  if(state==='PLAYING'){
    const beatInterval=Math.max(200,700-level*50);
    const beatPhase=(gameTime%beatInterval)/beatInterval;
    const beatSize=2+Math.max(0,1-beatPhase*3)*4;
    ctx.save();
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#00FF41';
    ctx.beginPath();ctx.arc(W/2,H-32,beatSize+5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.arc(W/2,H-32,beatSize,0,Math.PI*2);ctx.fill();
    ctx.restore();
   }

  // Polarity indicator (shows active breaker color; switch with SPACE or center tap) — larger for new scale
  if(state==='PLAYING'){
    const pol=player.polarity, polColor=LANE_COLORS[pol];
    const polX=W/2, polY=H-62;
    ctx.save();
    ctx.shadowColor=polColor;ctx.shadowBlur=22;
    ctx.fillStyle=polColor;
    ctx.beginPath();ctx.arc(polX,polY,16,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=BG_COLOR;
    ctx.beginPath();ctx.arc(polX,polY,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=polColor;
    ctx.font='700 16px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(LANE_NAMES[pol],polX,polY);
    ctx.restore();
   }
  
  // Combo meter (right side) — reposition for wider canvas + larger playfield
  if(state==='PLAYING'&&combo>0){
    ctx.save();
    const meterH=Math.min(combo,16);
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#FFD700';
    ctx.fillRect(W-24,72,8,meterH*5.5);
    ctx.globalAlpha=0.7;
    ctx.fillStyle='#FFD700';
    ctx.fillRect(W-23,72+(16-meterH)*5.5,6,meterH*5.5);
    ctx.restore();
   }
  
  // Flash overlay
  if(flashAlpha>0){
    ctx.save();
    ctx.globalAlpha=flashAlpha;
    ctx.fillStyle=flashColor;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
   }
  
  ctx.restore();
}

// ── Game Loop ──
let lastTime=0;
function gameLoop(timestamp){
  if(!lastTime)lastTime=timestamp;
  const dt=Math.min(timestamp-lastTime,33);
  lastTime=timestamp;
  
  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

// ── Start ──
requestAnimationFrame(gameLoop);



(function d(){setTimeout(function(){try{if(typeof startGame==='function')startGame();setTimeout(function(){try{if(typeof player!=='undefined'&&player.lane>0){player.lane--;player.targetX=320;}if(typeof cyclePolarity==='function'){cyclePolarity();cyclePolarity();}if(typeof gates!=='undefined'){gates.push({lane:0,colorIdx:1,y:155});gates.push({lane:1,colorIdx:0,y:285});gates.push({lane:2,colorIdx:2,y:405});}if(typeof glitches!=='undefined'){glitches.push({lane:1,x:640,y:125,speed:3.2});}for(let k=0;k<8;k++){if(typeof update==='function')update(16);if(typeof render==='function')render();}if(typeof cyclePolarity==='function')cyclePolarity();if(typeof player!=='undefined'&&player.lane<2){player.lane++;player.targetX=800;}if(typeof update==='function')update(16);if(typeof render==='function')render();console.log('[v37-check] post-interaction complete');}catch(e){console.error(e);}},85);}catch(e){}},45);}());

})();
</script>
