<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB-123</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="logo">TB-123</h1>
      <div id="transport">
        <button id="btn-play" class="ctrl-btn">PLAY</button>
        <button id="btn-stop" class="ctrl-btn">STOP</button>
        <button id="btn-clear" class="ctrl-btn">CLEAR</button>
        <label class="ctrl-label">
          BPM
          <input id="tempo-input" type="number" value="120" min="60" max="240" step="1">
        </label>
      </div>
    </header>

    <section id="mode-toggle">
      <button id="mode-kick" class="mode-btn active" data-mode="kick">KICK</button>
      <button id="mode-snare" class="mode-btn" data-mode="snare">SNARE</button>
      <button id="mode-hihat" class="mode-btn" data-mode="hihat">HH</button>
      <button id="mode-synth" class="mode-btn" data-mode="synth">SYNTH</button>
    </section>

    <section id="sequencer">
      <div id="step-labels"></div>
      <div id="track-kick" class="track" data-track="kick">
        <span class="track-label">KICK</span>
        <div class="steps"></div>
      </div>
      <div id="track-snare" class="track" data-track="snare">
        <span class="track-label">SNARE</span>
        <div class="steps"></div>
      </div>
      <div id="track-hihat" class="track" data-track="hihat">
        <span class="track-label">HH</span>
        <div class="steps"></div>
      </div>
      <div id="track-synth" class="track" data-track="synth">
        <span class="track-label">SYNTH</span>
        <div class="steps"></div>
      </div>
    </section>

    <section id="synth-controls">
      <h2>SYNTH</h2>
      <div id="synth-params">
        <div class="param-group">
          <label class="param-label">WAVE
            <select id="osc-waveform">
              <option value="saw" selected>SAW</option>
              <option value="square">SQ</option>
              <option value="sine">SIN</option>
              <option value="triangle">TRI</option>
            </select>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">CUTOFF
            <input id="filter-cutoff" type="range" min="50" max="10000" value="2000" step="1">
            <span id="cutoff-value">2000 Hz</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">RES
            <input id="filter-res" type="range" min="0.1" max="20" value="1" step="0.1">
            <span id="res-value">1.0</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">ATTACK
            <input id="env-attack" type="range" min="0" max="1000" value="5" step="1">
            <span id="attack-value">5 ms</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">DECAY
            <input id="env-decay" type="range" min="10" max="2000" value="200" step="1">
            <span id="decay-value">200 ms</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">SUSTAIN
            <input id="env-sustain" type="range" min="0" max="100" value="60" step="1">
            <span id="sustain-value">60%</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">RELEASE
            <input id="env-release" type="range" min="10" max="3000" value="200" step="1">
            <span id="release-value">200 ms</span>
          </label>
        </div>
      </div>

      <h2>PATTERN MIDI</h2>
      <div id="synth-note-grid">
        <div class="note-row" data-note="C2">
          <span class="note-label">C2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="D2">
          <span class="note-label">D2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="E2">
          <span class="note-label">E2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="F2">
          <span class="note-label">F2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="G2">
          <span class="note-label">G2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="A2">
          <span class="note-label">A2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="B2">
          <span class="note-label">B2</span>
          <div class="note-steps"></div>
        </div>
        <div class="note-row" data-note="C3">
          <span class="note-label">C3</span>
          <div class="note-steps"></div>
        </div>
      </div>
    </section>

    <section id="drum-controls">
      <h2>DRUMS</h2>
      <div id="drum-params">
        <div class="param-group">
          <label class="param-label">KICK DECAY
            <input id="kick-decay" type="range" min="50" max="500" value="200" step="1">
            <span id="kick-decay-value">200 ms</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">SNARE DECAY
            <input id="snare-decay" type="range" min="30" max="400" value="150" step="1">
            <span id="snare-decay-value">150 ms</span>
          </label>
        </div>
        <div class="param-group">
          <label class="param-label">HH OPEN
            <input id="hh-open" type="range" min="30" max="400" value="80" step="1">
            <span id="hh-open-value">80 ms</span>
          </label>
        </div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
