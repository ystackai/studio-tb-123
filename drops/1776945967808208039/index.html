<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Synth Grid</title>
  <link rel="stylesheet" href="styles.css">
<style id="ystack-repair-hint-style">.ystack-repair-hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:9999;padding:6px 10px;border:1px solid rgba(255,255,255,.28);background:rgba(0,0,0,.66);color:rgba(255,255,255,.9);font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0;border-radius:4px;pointer-events:none;max-width:min(92vw,520px);text-align:center}</style>
</head>
<body>
  <main id="app">
    <canvas id="trail-canvas"></canvas>
    <div id="grid" role="grid"></div>
    <button id="bypass-knob" aria-label="Decay bypass" title="">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
        <path d="M3 12h6l3-9 3 18 3-9h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </main>
  <script src="game.js"></script>
<div class="ystack-repair-hint">Click, tap, drag, or use the controls to interact.</div>
</body>
</html>
