<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rhythm Grid</h1>
        <p>Tap pads to build your beat</p>
        <div class="grid" id="rhythmGrid"></div>
        <div class="controls">
            <button id="playButton">Play</button>
            <button id="stopButton">Stop</button>
            <button id="clearButton">Clear</button>
        </div>
        <div class="sequence-display">
            <h3>Beat Sequence:</h3>
            <div id="sequence"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
