<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Open Circuit</title>
<style>
/* ============================================================
   COVER LOOK — Design System Tokens
   Museum-grade geometry. High-contrast typographic hierarchy.
   "Dark Stage, Bright Performer" — locked for hero screenshot.
   ============================================================ */

   /* -- Palette -- */
   :root {
      /* Stage (gallery walls) */
      --cover-stage: #000000;
      --cover-stage-vignette: #050510;
      --cover-stage-haze: rgba(99,102,241,0.04);
      --cover-stage-haze-deep: rgba(168,85,247,0.012);

      /* Grid container (the instrument frame) */
      --cover-frame-bg: rgba(4,4,10,0.97);
      --cover-frame-border: rgba(99,102,241,0.06);
      --cover-frame-radius: 2px;

      /* Cell (idle state — dark, absorbs light) */
      --cover-cell-idle-bg: rgba(6,6,14,0.98);
      --cover-cell-idle-border: rgba(99,102,241,0.04);
      --cover-cell-radius: 1px;

      /* Cell (active — the performer, bright) */
      --cover-cell-active-bg-1: 99,102,241;    /* indigo core  */
      --cover-cell-active-bg-2: 168,85,247;     /* violet edge   */
      --cover-cell-active-glow-1: 192,132,255;  /* highlight     */
      --cover-cell-active-glow-2: 139,92,246;   /* deep violet   */
      --cover-cell-active-glow-3: 217,169,255;  /* white-violet  */

      /* Typography */
      --cover-type-display: 'SF Pro Display', 'Helvetica Neue', 'Inter', system-ui, sans-serif;
      --cover-type-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --cover-type-track-wide: 0.34em;
      --cover-type-track-normal: 0.08em;

      /* Spacing (locked for album-cover grid proportions) */
      --cover-gap: 4px;
      --cover-pad: 10px;
   }

   * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

   html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--cover-stage);
      font-family: var(--cover-type-display);
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
   }

   /* ---- Stage ---- */
   #stage {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease-out;
      background:
         radial-gradient(ellipse 32% 42% at 50% 18%, rgba(99,102,241,0.05) 0%, rgba(99,102,241,0.015) 35%, transparent 65%),
         radial-gradient(ellipse 65% 75% at 50% 58%, rgba(168,85,247,0.01) 0%, transparent 55%),
         radial-gradient(ellipse 90% 100% at 50% 50%, var(--cover-stage) 0%, var(--cover-stage-vignette) 100%);
   }
   #stage.visible { opacity: 1; }

   /* ---- Grid Frame ---- */
   #grid-wrap {
      display: flex; align-items: center; justify-content: center;
      position: relative;
   }

   #grid {
      display: grid;
      gap: var(--grid-gap, var(--cover-gap));
      padding: var(--grid-pad, var(--cover-pad));
      border-radius: var(--grid-radius, var(--cover-frame-radius));
      background: var(--cover-frame-bg);
      border: var(--grid-border, 1px) solid var(--cover-frame-border);
      box-shadow:
         0 0 50px rgba(99,102,241,0.03),
         0 0 100px rgba(99,102,241,0.02),
         0 0 180px rgba(99,102,241,0.012),
        inset 0 0 30px rgba(0,0,0,0.6);
      will-change: transform, box-shadow;
      transition: box-shadow 0.15s ease-out;
      transform-origin: center center;
   }

   @media (max-width: 480px) {
      #grid {
         --grid-gap: 3px; --grid-pad: 7px; --grid-radius: 2px; --grid-border: 1px;
      }
   }
   @media (max-width: 370px) {
      #grid {
         --grid-gap: 2px; --grid-pad: 5px; --grid-radius: 1px; --grid-border: 1px;
      }
   }
   @media (min-width: 768px) {
      #grid { --grid-gap: 5px; --grid-pad: 12px; --grid-radius: 2px; }
   }
   @media (min-width: 1200px) {
      #grid { --grid-gap: 6px; --grid-pad: 14px; --grid-radius: 2px; }
   }

   /* ---- Cell (idle) ---- */
   .cell {
      position: relative;
      border-radius: var(--cover-cell-radius);
      background: var(--cover-cell-idle-bg);
      border: var(--grid-border, 1px) solid var(--cover-cell-idle-border);
      transition: background 0.03s, border-color 0.03s, box-shadow 0.03s;
      cursor: pointer;
      will-change: background, box-shadow;
      min-width: 0; min-height: 0;
      overflow: hidden;
   }
   .cell::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: var(--cover-cell-radius);
      box-shadow: inset 0 0 4px rgba(99,102,241,0.02);
      pointer-events: none;
      transition: box-shadow 0.1s;
   }

   /* ---- Cell (active — Bright Performer) ---- */
   .cell:active, .cell.active {
      background: rgba(99,102,241,0.65);
      border-color: rgba(168,85,247,1);
      box-shadow:
         0 0 20px rgba(99,102,241,0.95),
         0 0 48px rgba(99,102,241,0.55),
         0 0 88px rgba(168,85,247,0.35),
         0 0 125px rgba(139,92,246,0.15),
        inset 0 0 12px rgba(192,132,255,0.65),
        inset 0 0 30px rgba(168,85,247,0.35),
        inset 0 0 50px rgba(217,169,255,0.12);
   }
   .cell:active::after, .cell.active::after {
      box-shadow: inset 0 0 8px rgba(255,255,255,0.18);
   }

   /* ---- Cell Labels (Cover typography) ---- */
   .cell-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--cover-type-mono);
      font-size: clamp(0.55rem, 1.4vw, 0.7rem);
      font-weight: 600;
      letter-spacing: var(--cover-type-track-wide);
      text-transform: uppercase;
      color: rgba(255,255,255,0.07);
      pointer-events: none;
      transition: color 0.06s, text-shadow 0.06s;
      text-rendering: geometricPrecision;
   }
   .cell.active .cell-label {
      color: rgba(235,235,255,0.95);
      text-shadow:
         0 0 6px rgba(192,132,255,0.9),
         0 0 16px rgba(99,102,241,0.5),
         0 0 28px rgba(168,85,247,0.25);
   }

   /* ---- Launch Overlay (Cover aesthetic) ---- */
   #launch-overlay {
      position: fixed; inset: 0;
      background: #000000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 9999;
      transition: opacity 0.8s ease-in;
      gap: 0;
   }
   #launch-overlay.fade-out { opacity: 0; pointer-events: none; }

   #launch-label {
      font-family: var(--cover-type-display);
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 800;
      letter-spacing: var(--cover-type-track-wide);
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      text-shadow:
         0 0 32px rgba(99,102,241,0.65),
         0 0 64px rgba(99,102,241,0.28),
         0 0 100px rgba(168,85,247,0.12);
      text-rendering: geometricPrecision;
      user-select: none;
      line-height: 1.1;
   }

   #launch-sublabel {
      font-family: var(--cover-type-mono);
      font-size: clamp(0.45rem, 1.1vw, 0.58rem);
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(99,102,241,0.35);
      margin-top: 0.8rem;
      margin-bottom: 2rem;
      text-rendering: geometricPrecision;
      user-select: none;
   }

   #launch-prompt {
      font-family: var(--cover-type-mono);
      font-size: clamp(0.48rem, 1.1vw, 0.6rem);
      font-weight: 400;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-rendering: geometricPrecision;
      animation: promptPulse 2.5s ease-in-out infinite;
   }
   @keyframes promptPulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
   }
</style>
</head>
<body>
<div id="launch-overlay">
      <div id="launch-label">Open Circuit</div>
      <div id="launch-sublabel">Browser as Stage — Grid as Instrument</div>
      <div id="launch-prompt">Tap Anywhere to Open</div>
</div>

<div id="stage">
    <div id="grid-wrap"><div id="grid"></div></div>
</div>

<script>
(function() {
    'use strict';

    const ENV = {
       NODE: 'production',
       SAMPLE_RATE_TARGET: 48000,
       MAX_VOICES: 40,
       LAUNCH_TIMEOUT_MS: 1000,
       STAGE_BG: '#010108',
       OVERLAY_BG: '#000003',
       GRID_ROWS: 5,
       GRID_COLS: 8,
       MIN_TOUCH_TARGET: 44,
       LOOKAHEAD_SEC: 0.08,
       SCHEDULE_INTERVAL_MS: 25,
       SEQ_INTERVAL_SEC: 0.38,
       MASTER_GAIN: 0.28,
       SOFT_CLIP_THRESHOLD: 0.82,
       COMPRESSOR_THRESHOLD_DB: -8,
       COMPRESSOR_RATIO: 8,
       PRE_DELAY_MS: 1.5,
       LFO_FREQ_HZ: 0.2,
       LFO_DEPTH_FACTOR: 0.5,
       MAX_Q: 3.8,
       MIN_Q: 1.0,
      // Pitch bend range in semitones (±1st mapped to sub-cell X position)
       PITCH_BEND_SEMITONES: 1,
      // Filter cutoff modulation depth multiplier from touch Y position
       FILTER_CUTOFF_MOD_DEPTH: 3,
       BUILD_SHA: 'open-circuit-v2-pitchbend',
        DROP_ID: '1777634912055739822',
        AESTHETIC: 'Dark Stage, Bright Performer',
        COVER_LOOK: 'v1-locked',
        LOCKED_AT: '2026-05-01T00:00:00Z'
        };

    const ROWS = ENV.GRID_ROWS;
    const COLS = ENV.GRID_COLS;
    const SCALE_DEGREES = [0, 2, 4, 7, 9];
    const NOTE_NAMES = ['C', 'D', 'E', 'G', 'A'];
    const ROW_FREQS = [130.81, 196.00, 261.63, 392.00, 523.25];
    const BEND_SEMITONES = ENV.PITCH_BEND_SEMITONES;
    const CUTOFF_MOD_DEPTH = ENV.FILTER_CUTOFF_MOD_DEPTH;

    // ========================================
    //  Drag Latency Profiler
    // ========================================
    const LatencyProfiler = (function() {
      const samples = [];
      const MAX_SAMPLES = 500;
      let lastDownTime = 0;

      function recordDown(ts) {
        lastDownTime = ts;
      }

      function recordMove(ts, audioCallTime) {
        const raw = ts - lastDownTime;
        const audioDelta = audioCallTime - ts;
        samples.push({
          touchToAudio: raw + audioDelta,
          touchDelta: raw,
          audioDelta: audioDelta
        });
        if (samples.length > MAX_SAMPLES) samples.shift();
        lastDownTime = ts;
      }

      function recordRelease(ts) {
        logBenchmark();
      }

      function getBenchmarks() {
        if (!samples.length) return { p50: 0, p95: 0, p99: 0, max: 0, min: 0, n: 0 };
        const sorted = samples.map(function(s) { return s.touchToAudio; }).sort(function(a, b) { return a - b; });
        return {
          p50: sorted[Math.floor(sorted.length * 0.5)],
          p95: sorted[Math.floor(sorted.length * 0.95)],
          p99: sorted[Math.floor(sorted.length * 0.99)],
          max: sorted[sorted.length - 1],
          min: sorted[0],
          n: sorted.length
        };
      }

      function logBenchmark() {
        var b = getBenchmarks();
        console.log('[LatencyProfiler] Benchmarks:',
          'p50=' + b.p50.toFixed(2) + 'ms',
          'p95=' + b.p95.toFixed(2) + 'ms',
          'p99=' + b.p99.toFixed(2) + 'ms',
          'max=' + b.max.toFixed(2) + 'ms',
          'min=' + b.min.toFixed(2) + 'ms',
          'samples=' + b.n);
      }

      function reset() { samples.length = 0; }

      return {
        recordDown: recordDown,
        recordMove: recordMove,
        recordRelease: recordRelease,
        getBenchmarks: getBenchmarks,
        logBenchmark: logBenchmark,
        reset: reset
      };
    })();

    // ========================================
    //  Performance Monitor
    // ========================================
    const PerfMonitor = (function() {
      let frameCount = 0;
      let lastFpsTime = performance.now();
      let fps = 60;
      let lastFrameTime = 0;
      let frameTimes = [];
      const MAX_FRAME_SAMPLES = 60;
      let running = false;
      let rafId = null;
      let tickCount = 0;

      function countAudioNodes() {
        if (!audioCtx) return 0;
        try {
          return Object.keys(activeVoices).length + 7;
        } catch(e) { return 0; }
      }

      function getActiveVoiceCount() {
        return Object.keys(activeVoices).length;
      }

      function tick(ts) {
        if (!running) return;
        tickCount++;
        frameCount++;

        var now = performance.now();
        lastFrameTime = now - lastFpsTime;
        frameTimes.push(lastFrameTime);
        if (frameTimes.length > MAX_FRAME_SAMPLES) frameTimes.shift();

        if (now - lastFpsTime >= 500) {
          fps = Math.round((frameCount * 1000) / (now - lastFpsTime));
          frameCount = 0;
          lastFpsTime = now;

          var frameP50 = 0, frameP95 = 0;
          if (frameTimes.length) {
            var ft = frameTimes.slice().sort(function(a, b) { return a - b; });
            frameP50 = ft[Math.floor(ft.length * 0.5)];
            frameP95 = ft[Math.floor(ft.length * 0.95)];
          }

          var nodeCount = countAudioNodes();
          if (tickCount % 1200 === 0) {
            console.log('[PerfMonitor]',
              'fps=' + fps,
              'frameP50=' + frameP50.toFixed(2) + 'ms',
              'frameP95=' + frameP95.toFixed(2) + 'ms',
              'voices=' + getActiveVoiceCount(),
              'nodes=' + nodeCount);
          }
        }

        rafId = requestAnimationFrame(tick);
      }

      return {
        start: function() {
          if (running) return;
          running = true;
          lastFpsTime = performance.now();
          rafId = requestAnimationFrame(tick);
        },
        stop: function() {
          running = false;
          if (rafId) cancelAnimationFrame(rafId);
        },
        getStats: function() {
          return {
            fps: fps,
            activeVoices: getActiveVoiceCount(),
            audioNodes: countAudioNodes(),
            lastFrameMs: lastFrameTime,
            latencyProfiler: LatencyProfiler.getBenchmarks()
          };
        }
      };
    })();

    let audioCtx = null;
    let masterGain = null;
    let preDelayNode = null;
    let analyser = null;
    let analyserData = null;
    let limiter = null;
    let compressor = null;
    const activeVoices = {};

    // ========================================
    //  Sequencer State
    // ========================================
    let sequencerRunning = false;
    let seqStep = 0;
    let nextStepTime = 0;
    let seqScheduleTimer = null;
    const LOOKAHEAD = 0.08;
    const SCHEDULE_INTERVAL = 25;

    // Harmony-resolving 16-step pattern
    const seqSteps = [
      [{ r: 2, c: 0 }],
      [{ r: 2, c: 2 }],
      [{ r: 2, c: 3 }],
      [{ r: 2, c: 4 }, { r: 3, c: 0 }],
      [{ r: 2, c: 3 }],
      [{ r: 2, c: 2 }],
      [{ r: 2, c: 0 }],
      [{ r: 2, c: 2 }, { r: 2, c: 3 }],
      [{ r: 2, c: 3 }],
      [{ r: 1, c: 0 }, { r: 2, c: 4 }],
      [{ r: 2, c: 0 }],
      [{ r: 2, c: 2 }],
      [{ r: 2, c: 4 }],
      [{ r: 3, c: 0 }],
      [{ r: 2, c: 3 }],
      [{ r: 2, c: 0 }, { r: 2, c: 2 }, { r: 2, c: 3 }],
    ];

    // ========================================
    //  Launch Sequence
    // ========================================
    const overlay = document.getElementById('launch-overlay');
    const stage = document.getElementById('stage');
    let launched = false;
    let audioCtxPromise = null;
    let audioCtxReady = false;

    function getAudioCtxPromise() {
      if (audioCtxReady) return Promise.resolve();
      if (!audioCtxPromise) {
        audioCtxPromise = (function() {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.28;

            preDelayNode = audioCtx.createDelay(0.02);
            preDelayNode.delayTime.value = 0.0015;

            limiter = audioCtx.createWaveShaper();
            limiter.curve = buildSoftClipCurve();
            limiter.oversample = '4x';

            compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -8;
            compressor.knee.value = 10;
            compressor.ratio.value = 8;
            compressor.attack.value = 0.001;
            compressor.release.value = 0.03;

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.75;
            analyserData = new Uint8Array(analyser.frequencyBinCount);

            // VCA → PreDelay (1.5ms) → masterGain → SoftClip → Compressor → Analyser → Destination
            preDelayNode.connect(masterGain);
            masterGain.connect(limiter);
            limiter.connect(compressor);
            compressor.connect(analyser);
            analyser.connect(audioCtx.destination);
          }
          var resumePromise = (audioCtx.state === 'suspended') ? audioCtx.resume() : Promise.resolve();
          return resumePromise.then(function() {
            audioCtxReady = true;
            audioCtxPromise = null;
            return audioCtx;
          }).catch(function() {
            audioCtxReady = true;
            audioCtxPromise = null;
            return audioCtx;
          });
        })();
      }
      return audioCtxPromise;
    }

    function launch() {
      if (launched) return;
      launched = true;

      overlay.classList.add('fade-out');

      getAudioCtxPromise().then(function() {
        stage.classList.add('visible');
        startSequence();
      });

      setTimeout(function() {
        overlay.style.display = 'none';
      }, 1000);
    }

    document.addEventListener('pointerdown', launch, { passive: true });
    document.addEventListener('touchstart', launch, { passive: true });
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'F5' && e.key !== 'F12') launch();
    });

    // ========================================
    //  Helper Functions
    // ========================================

    function getFrequency(row, col) {
      const degreeIdx = col % SCALE_DEGREES.length;
      const scaleSemitones = SCALE_DEGREES[degreeIdx];
      const octaveOffset = Math.floor(col / SCALE_DEGREES.length);
      return ROW_FREQS[row] * Math.pow(2, scaleSemitones / 12 + octaveOffset);
    }

    function noteName(row, col) {
      return NOTE_NAMES[col % NOTE_NAMES.length];
    }

    // ========================================
    //  Touch-Driven Pitch & Filter Mapping
    // ========================================

    // Calculates continuous pitch bend from touch X position within a cell.
    // xFrac = 0.5 (center) → no bend. xFrac = 0 (left edge) → -BEND_SEMITONES. xFrac = 1 (right edge) → +BEND_SEMITONES.
    function calcBentFrequency(baseFreq, xFrac) {
      var bendSemis = (xFrac - 0.5) * 2 * BEND_SEMITONES;
      return baseFreq * Math.pow(2, bendSemis / 12);
    }

    // Calculates filter cutoff modulation from touch Y position within a cell.
    // yFrac = 0 (top) → cutoff multiplied by (1 + CUTOFF_MOD_DEPTH) → brighter
    // yFrac = 1 (bottom) → cutoff at base value → darker
    function calcModulatedCutoff(baseFreq, yFrac) {
      return baseFreq * CUTOFF_MOD_DEPTH * (1 + (1 - yFrac) * 2);
    }

    // Calculates amplitude from touch force/intensity (0-1) and row position.
    // When force is available (pressure-sensitive touch), it directly modulates VCA.
    // Fallback: uses row position (lower rows = louder).
    function calcAmplitude(row, col, force) {
      var rowFactor = 1 - (row / (ROWS - 1)) * 0.4;
      var colFactor = 0.8 + 0.2 * Math.sin(Math.PI * col / (COLS - 1));
      var baseAmp = 0.32 * rowFactor * colFactor;
      // Touch force/intensity overrides row-based amplitude
      if (force !== undefined && force > 0 && force <= 1) {
        return baseAmp * (0.3 + force * 0.7);
      }
      return baseAmp;
    }

    function getAntiAliasedParams(freq) {
      var nyquist = audioCtx.sampleRate * 0.5;
      var freqRatio = freq / nyquist;
      var maxQ = 3.8;
      var minQ = 1.0;
      var q;
      if (freqRatio > 0.12) {
        var t = Math.min(1, (freqRatio - 0.12) / 0.13);
        q = maxQ - (maxQ - minQ) * t;
      } else {
        q = maxQ;
      }
      var cutoffCeiling = nyquist * 0.38;
      var cutoff = Math.min(freq * 5, 10000, cutoffCeiling);
      return { q: Math.max(q, 0.5), cutoff: cutoff };
    }

    // ========================================
    //  Audio Context Init
    // ========================================

    function ensureAudio() {
      return audioCtx && audioCtxReady;
    }

    function buildSoftClipCurve() {
      var n = audioCtx.sampleRate * 2;
      var curve = new Float32Array(n);
      var threshold = 0.82;
      for (var i = 0; i < n; i++) {
        var x = (i / (n - 1)) * 2 - 1;
        if (Math.abs(x) < 0.01) {
          curve[i] = x;
        } else if (Math.abs(x) <= threshold) {
          curve[i] = x;
        } else {
          var t = (Math.abs(x) - threshold) / (1 - threshold);
          curve[i] = Math.sign(x) * (threshold + (1 - threshold) * (1 - Math.exp(-6 * t)));
        }
      }
      return curve;
    }

    // ========================================
    //  Voice: Oscillator → Filter → VCA → PreDelay → Master
    // ========================================

    // Touch modulation state carried by each voice for continuous updates
    function createVoice(freq, amplitude, isSeq, row, col) {
      if (!ensureAudio()) return null;
      var now = audioCtx.currentTime;
      var seqVol = isSeq ? 0.5 : 1;
      var vol = amplitude * seqVol;

      var aaParams = getAntiAliasedParams(freq);

      // Primary oscillator — sawtooth for dense harmonics
      var osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = -3;

      // Sub oscillator — triangle for warmth
      var subOsc = audioCtx.createOscillator();
      subOsc.type = 'triangle';
      subOsc.frequency.value = freq * 0.5;
      subOsc.detune.value = 0;

      var subGain = audioCtx.createGain();
      subGain.gain.value = 0.1;
      subOsc.connect(subGain);

      // Lowpass filter — the creative engine
      var filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.Q.value = aaParams.q;
      filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

      // Slow LFO modulates cutoff for singing harmonic movement
      var lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.2;

      var lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq * 0.5;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);

      // VCA with woody, breathing decay envelope (4-phase)
      var vca = audioCtx.createGain();

      vca.gain.setValueAtTime(0, now);
      vca.gain.linearRampToValueAtTime(vol, now + 0.002);
      vca.gain.setValueAtTime(vol, now + 0.002);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.45, 0.001), now + 0.082);
      var p3Start = now + 0.082;
      vca.gain.setValueAtTime(Math.max(vol * 0.45, 0.001), p3Start);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.15, 0.001), p3Start + 0.52);
      var p4Start = p3Start + 0.52;
      vca.gain.setValueAtTime(Math.max(vol * 0.15, 0.001), p4Start);
      vca.gain.exponentialRampToValueAtTime(0.0001, p4Start + 1.2);

      // Signal chain: osc + sub → filter → vca → preDelay → masterGain
      osc.connect(filter);
      subGain.connect(filter);
      filter.connect(vca);
      vca.connect(preDelayNode);

      osc.start(now);
      subOsc.start(now);
      lfo.start(now);

      var stopTime = p4Start + 0.75;
      osc.stop(stopTime);
      subOsc.stop(stopTime);
      lfo.stop(stopTime);

      return {
        osc: osc, subOsc: subOsc, subGain: subGain, filter: filter, vca: vca, lfo: lfo, lfoGain: lfoGain,
        stopTime: stopTime, isSeq: !!isSeq,
        // Touch modulation: base freq and cell row/col for continuous pitch/filter mapping
        baseFreq: freq, baseRow: row || 0, baseCol: col || 0
      };
    }

    // Schedule a voice for a future play time
    function createScheduledVoice(freq, amplitude, isSeq, playTime) {
      if (!ensureAudio()) return null;
      var t0 = Math.max(playTime, audioCtx.currentTime);
      var seqVol = isSeq ? 0.5 : 1;
      var vol = amplitude * seqVol;

      var aaParams = getAntiAliasedParams(freq);

      var osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = -3;

      var subOsc = audioCtx.createOscillator();
      subOsc.type = 'triangle';
      subOsc.frequency.value = freq * 0.5;
      subOsc.detune.value = 0;

      var subGain = audioCtx.createGain();
      subGain.gain.value = 0.1;
      subOsc.connect(subGain);

      var filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.Q.value = aaParams.q;
      filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

      var lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.2;

      var lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq * 0.5;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);

      var vca = audioCtx.createGain();
      vca.gain.setValueAtTime(0, t0);
      vca.gain.linearRampToValueAtTime(vol, t0 + 0.002);
      vca.gain.setValueAtTime(vol, t0 + 0.002);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
      vca.gain.setValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
      vca.gain.setValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
      vca.gain.exponentialRampToValueAtTime(0.0005, t0 + 1.167);

      osc.connect(filter);
      subGain.connect(filter);
      filter.connect(vca);
      vca.connect(preDelayNode);

      osc.start(t0);
      subOsc.start(t0);
      lfo.start(t0);

      var stopTime = t0 + 1.22;
      osc.stop(stopTime);
      subOsc.stop(stopTime);
      lfo.stop(stopTime);

      return {
        osc: osc, subOsc: subOsc, subGain: subGain, filter: filter, vca: vca, lfo: lfo, lfoGain: lfoGain,
        stopTime: stopTime, isSeq: !!isSeq,
        baseFreq: freq, baseRow: 0, baseCol: 0
      };
    }

    // ========================================
    //  Touch-Driven Voice Update
    // ========================================
    // Core function: maps touch coordinates directly to pitch bend + filter cutoff + amplitude.
    // Signal flow: Touch → Pitch (via xFrac) → Filter (via yFrac) → VCA (via force/amp) → Decay
    function updateVoiceWithTouch(voice, baseFreq, row, col, xFrac, yFrac, force) {
      if (!voice) return;
      var now = audioCtx.currentTime;

      // Pitch bend: xFrac (0=left, 1=right) maps to ±BEND_SEMITONES around base frequency
      var bentFreq = calcBentFrequency(baseFreq, xFrac);

      // Filter cutoff: yFrac (0=top, 1=bottom) modulates cutoff depth
      var modCutoff = calcModulatedCutoff(baseFreq, yFrac);
      var aaParams = getAntiAliasedParams(bentFreq);
      var finalCutoff = Math.min(modCutoff, aaParams.cutoff);

      // Amplitude: touch force/intensity + row position → VCA pre-delay gain
      var amp = calcAmplitude(row, col, force);

      // Touch → Pitch: oscillators track bent frequency with 3ms time constant
      voice.osc.frequency.setTargetAtTime(bentFreq, now, 0.003);
      voice.subOsc.frequency.setTargetAtTime(bentFreq * 0.5, now, 0.003);

      // Touch → Filter: cutoff follows y position with 5ms time constant
      voice.filter.frequency.setTargetAtTime(finalCutoff, now, 0.005);
      voice.filter.Q.setTargetAtTime(aaParams.q, now, 0.008);
      voice.lfoGain.gain.setTargetAtTime(bentFreq * 0.5, now, 0.005);

      // Touch → Amplitude: VCA pre-delay gain responds to touch intensity with 1ms time constant
      voice.vca.gain.setTargetAtTime(amp, now, 0.001);
    }

    // Compatibility wrapper for sequencer-style calls
    function updateVoice(voice, freq, amplitude) {
      if (!voice) return;
      var now = audioCtx.currentTime;
      var aaParams = getAntiAliasedParams(freq);

      voice.osc.frequency.setTargetAtTime(freq, now, 0.003);
      voice.subOsc.frequency.setTargetAtTime(freq * 0.5, now, 0.003);
      voice.filter.frequency.setTargetAtTime(Math.min(freq * 3, aaParams.cutoff), now, 0.005);
      voice.filter.Q.setTargetAtTime(aaParams.q, now, 0.008);
      voice.lfoGain.gain.setTargetAtTime(freq * 0.5, now, 0.005);
      voice.vca.gain.setTargetAtTime(amplitude, now, 0.001);
    }

    function killVoice(cellIndex) {
      var v = activeVoices[cellIndex];
      if (!v) return;
      var now = audioCtx.currentTime;
      try {
        v.vca.gain.cancelScheduledValues(now);
        v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
        v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
        var stopT = now + 0.25;
        v.osc.disconnect();
        v.subOsc.disconnect();
        v.subGain.disconnect();
        v.filter.disconnect();
        v.vca.disconnect();
        v.lfo.disconnect();
        v.lfoGain.disconnect();
        v.osc.stop(stopT);
        v.subOsc.stop(stopT);
        v.lfo.stop(stopT);
      } catch(e) {}
      delete activeVoices[cellIndex];
    }

    // ========================================
    //  Grid UI
    // ========================================

    var gridEl = document.getElementById('grid');
    var gridWrap = document.getElementById('grid-wrap');
    var allCells = [];
    var gridBuilt = false;
    var MIN_TOUCH_TARGET = 44;

    function getGridGapPx() {
      var w = window.innerWidth;
      if (w <= 370) return 2;
      if (w <= 480) return 3;
      if (w >= 1200) return 8;
      if (w >= 768) return 6;
      return 5;
    }

    function getGridPadPx() {
      var w = window.innerWidth;
      if (w <= 370) return 5;
      if (w <= 480) return 8;
      if (w >= 1200) return 16;
      if (w >= 768) return 14;
      return 12;
    }

    function buildGrid() {
      if (gridBuilt) return;
      gridBuilt = true;

      gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';
      gridEl.style.gridTemplateRows = 'repeat(' + ROWS + ', 1fr)';

      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          var idx = r * COLS + c;
          var el = document.createElement('div');
          el.className = 'cell';
          el.dataset.index = idx;
          el.dataset.row = r;
          el.dataset.col = c;

          var label = document.createElement('span');
          label.className = 'cell-label';
          label.textContent = noteName(r, c);
          el.appendChild(label);

          gridEl.appendChild(el);
          allCells.push(el);
        }
      }

      resizeGrid();
    }

    function resizeGrid() {
      if (!gridBuilt) return;

      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var pad = getGridPadPx();
      var gap = getGridGapPx();

      var availW = Math.min(vw * 0.92, 680) - 2 * pad;
      var gapTotalW = (COLS - 1) * gap;
      var rawCellW = (availW - gapTotalW) / COLS;
      var cellH = rawCellW * 0.78;

      var availH = vh * 0.62;
      var totalGapH = (ROWS - 1) * gap;
      var rawTotalH = ROWS * cellH + totalGapH;
      var hScale = Math.min(1, (availH - 2 * pad) / rawTotalH);
      var scale = Math.min(1, hScale);

      var finalW = Math.max(MIN_TOUCH_TARGET, rawCellW * scale);
      var finalH = finalW * 0.78;

      gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', ' + finalW + 'px)';
      gridEl.style.gridTemplateRows = 'repeat(' + ROWS + ', ' + finalH + 'px)';
      gridEl.style.setProperty('--grid-gap', gap + 'px');
      gridEl.style.setProperty('--grid-pad', pad + 'px');

      if (scale < 0.85) {
        var borderRadius = Math.max(4, 14 * scale * scale);
        gridEl.style.setProperty('--grid-radius', borderRadius + 'px');
        var borderW = Math.max(0, 1 - (0.85 - scale) * 10);
        gridEl.style.setProperty('--grid-border', borderW + 'px');
      } else {
        gridEl.style.setProperty('--grid-radius', '14px');
        gridEl.style.setProperty('--grid-border', '1px');
      }
    }

    // Cell-label typography is now defined in main <style> block as .cell-label / .cell.active .cell-label

    // ========================================
    //  Lookahead Sequencer
    // ========================================

    function scheduleStep(stepIdx, playTime) {
      var notes = seqSteps[stepIdx % seqSteps.length];
      var visualDelays = [];

      for (var n = 0; n < notes.length; n++) {
        var note = notes[n];
        var idx = note.r * COLS + note.c;
        var cell = allCells[idx];
        var freq = getFrequency(note.r, note.c);
        var amp = calcAmplitude(note.r, note.c, undefined);

        var voice = createScheduledVoice(freq, amp, true, playTime);
        if (voice) {
          activeVoices['seq_' + stepIdx + '_' + n] = voice;
          var cleanupDelay = (voice.stopTime - audioCtx.currentTime) * 1000 + 50;
          setTimeout(function() {
            // eslint-disable-next-line no-loop-func
            delete activeVoices['seq_' + stepIdx + '_' + n];
          }, cleanupDelay);
        }

        var delayUntil = Math.max(0, (playTime - audioCtx.currentTime)) * 1000;
        visualDelays.push({ cell: cell, delay: delayUntil });
      }

      for (var d = 0; d < visualDelays.length; d++) {
        (function(cd) {
          setTimeout(function() {
            if (cd.cell) cd.cell.classList.add('active');
          }, cd.delay);
          setTimeout(function() {
            if (cd.cell) cd.cell.classList.remove('active');
          }, cd.delay + 550);
        })(visualDelays[d]);
      }
    }

    function seqScheduler() {
      if (!sequencerRunning) return;

      var now = audioCtx.currentTime;
      while (nextStepTime < now + LOOKAHEAD) {
        scheduleStep(seqStep, nextStepTime);
        seqStep++;
        nextStepTime += 0.38;
      }
    }

    function startSequence() {
      if (!ensureAudio()) return;
      sequencerRunning = true;
      seqStep = 0;
      nextStepTime = audioCtx.currentTime + 0.05;

      if (seqScheduleTimer) clearInterval(seqScheduleTimer);
      seqScheduleTimer = setInterval(seqScheduler, SCHEDULE_INTERVAL);
    }

    function stopSequence() {
      sequencerRunning = false;
      if (seqScheduleTimer) {
        clearInterval(seqScheduleTimer);
        seqScheduleTimer = null;
      }

      var toKill = [];
      for (var key in activeVoices) {
        if (activeVoices[key].isSeq && key.indexOf('seq_') === 0) {
          toKill.push(key);
        }
      }
      for (var i = 0; i < toKill.length; i++) {
        var v = activeVoices[toKill[i]];
        if (v) {
          var now = audioCtx.currentTime;
          try {
            v.vca.gain.cancelScheduledValues(now);
            v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
            v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            var stopT = now + 0.2;
            v.osc.disconnect();
            v.subOsc.disconnect();
            v.subGain.disconnect();
            v.filter.disconnect();
            v.vca.disconnect();
            v.lfo.disconnect();
            v.lfoGain.disconnect();
            v.osc.stop(stopT);
            v.subOsc.stop(stopT);
            v.lfo.stop(stopT);
          } catch(e) {}
        }
        delete activeVoices[toKill[i]];
      }
    }

    // ========================================
    //  Touch-Driven Input Handling
    // ========================================
    // Signal flow: Touch → Pitch (x-axis bend) → Filter (y-axis cutoff) → VCA (amplitude via force/position)

    var dragVoice = null;
    var dragCellIndex = -1;
    var dragBaseFreq = 0;
    var dragRow = 0;
    var dragCol = 0;
    var dragCellEl = null;
    var mouseDown = false;

    // Compute fractional touch position within a cell: xFrac, yFrac ∈ [0,1]
    function getTouchFracInCell(cell, clientX, clientY) {
      var rect = cell.getBoundingClientRect();
      var x = clientX - rect.left;
      var y = clientY - rect.top;
      return {
        xFrac: Math.min(1, Math.max(0, x / rect.width)),
        yFrac: Math.min(1, Math.max(0, y / rect.height))
      };
    }

    function getCellFromCoords(clientX, clientY) {
      var el = document.elementFromPoint(clientX, clientY);
      if (!el) return null;
      var cell = el.classList && el.classList.contains('cell') ? el : (el.closest ? el.closest('.cell') : null);
      return (cell && cell.classList && cell.classList.contains('cell')) ? cell : null;
    }

    // Core touch/mouse handler: reads cell + sub-cell position, applies touch-driven modulation
    function processTouchMove(clientX, clientY, force) {
      var touchTs = performance.now();
      LatencyProfiler.recordDown(touchTs);

      var cell = getCellFromCoords(clientX, clientY);
      if (!cell || !dragVoice) {
        return;
      }

      var r = parseInt(cell.dataset.row);
      var c = parseInt(cell.dataset.col);
      var idx = r * COLS + c;

      // Switch active cell if we moved to a different one
      if (idx !== dragCellIndex) {
        if (dragCellEl) dragCellEl.classList.remove('active');
        dragCellIndex = idx;
        dragCellEl = cell;
        dragBaseFreq = getFrequency(r, c);
        dragRow = r;
        dragCol = c;
        cell.classList.add('active');
      }

      // Touch → Pitch → Filter → VCA: sub-cell position drives continuous modulation
      var fracs = getTouchFracInCell(cell, clientX, clientY);

      var audioT = performance.now();
      updateVoiceWithTouch(dragVoice, dragBaseFreq, dragRow, dragCol, fracs.xFrac, fracs.yFrac, force);
      LatencyProfiler.recordMove(touchTs, audioT);
    }

    function startDrag(cell, clientX, clientY, force) {
      touchStartX = clientX;
      touchStartY = clientY;
      touchMoved = false;

      var idx = parseInt(cell.dataset.index);
      var r = parseInt(cell.dataset.row);
      var c = parseInt(cell.dataset.col);

      var baseFreq = getFrequency(r, c);
      var amp = calcAmplitude(r, c, force);

      dragBaseFreq = baseFreq;
      dragRow = r;
      dragCol = c;
      dragCellIndex = idx;
      dragCellEl = cell;
      cell.classList.add('active');

      if (activeVoices[idx] && !activeVoices[idx].isSeq) {
        dragVoice = activeVoices[idx];
        var audioT = performance.now();
        // Re-trigger the voice with fresh envelope for re-strike
        var fracs = getTouchFracInCell(cell, clientX, clientY);
        updateVoiceWithTouch(dragVoice, baseFreq, r, c, fracs.xFrac, fracs.yFrac, force);
        LatencyProfiler.recordMove(performance.now(), audioT);
      } else {
        dragVoice = createVoice(baseFreq, amp, false, r, c);
        activeVoices[idx] = dragVoice;
      }
    }

    function releaseCell() {
      if (dragVoice) {
        if (dragCellEl) dragCellEl.classList.remove('active');
        var v = dragVoice;
        dragVoice = null;
        var releaseIdx = dragCellIndex;
        dragCellIndex = -1;
        dragCellEl = null;
        if (v && audioCtx) {
          killVoice(releaseIdx);
        }
      }
    }

    var touchStartX = 0;
    var touchStartY = 0;
    var touchMoved = false;

    // --- Pointer Event handlers (primary: desktop + pointer-capable mobile) ---
    if (window.PointerEvent) {
      gridEl.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        LatencyProfiler.recordDown(performance.now());
        var cell = (e.target.closest && e.target.closest('.cell')) || null;
        if (!cell) return;

        gridEl.setPointerCapture(e.pointerId);
        getAudioCtxPromise().then(function() {
          if (!ensureAudio()) return;
          // Use pointer's force property if available, otherwise default to 0.5
          var force = (typeof e.pressure === 'number' && e.pressure > 0) ? e.pressure : undefined;
          startDrag(cell, e.clientX, e.clientY, force);
        });
      });

      // DEBOUNCE RIPPED — direct pointermove → touch-driven modulation
      gridEl.addEventListener('pointermove', function(e) {
        if (!dragVoice) return;
        var force = (typeof e.pressure === 'number' && e.pressure > 0) ? e.pressure : undefined;
        processTouchMove(e.clientX, e.clientY, force);
      });

      gridEl.addEventListener('pointerup', function(e) {
        LatencyProfiler.recordRelease(performance.now());
        releaseCell();
        try { gridEl.releasePointerCapture(e.pointerId); } catch(ex) {}
      });

      gridEl.addEventListener('pointercancel', function(e) {
        LatencyProfiler.recordRelease(performance.now());
        releaseCell();
        try { gridEl.releasePointerCapture(e.pointerId); } catch(ex) {}
      });

    } else {
      // --- Touch fallback for non-pointer devices ---

      function handleTouchStart(e) {
        e.preventDefault();
        var touchTs = performance.now();
        LatencyProfiler.recordDown(touchTs);
        getAudioCtxPromise();

        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          touchStartX = t.clientX;
          touchStartY = t.clientY;
          touchMoved = false;
        }

        for (var j = 0; j < e.changedTouches.length; j++) {
          var touch = e.changedTouches[j];
          if (touch.radiusX && touch.radiusX > 50) continue;
          if (touch.force !== undefined && touch.force < 0.01) continue;

          var cell = getCellFromCoords(touch.clientX, touch.clientY);
          if (cell) {
            var force = (touch.force !== undefined && touch.force > 0) ? touch.force : undefined;
            startDrag(cell, touch.clientX, touch.clientY, force);
          }
        }
      }

      // DEBOUNCE RIPPED — direct touchmove → touch-driven modulation
      function handleTouchMove(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var touch = e.changedTouches[i];
          touchMoved = true;
          var force = (touch.force !== undefined && touch.force > 0) ? touch.force : undefined;
          processTouchMove(touch.clientX, touch.clientY, force);
        }
      }

      function handleTouchEnd(e) {
        e.preventDefault();
        LatencyProfiler.recordRelease(performance.now());
        releaseCell();
      }

      gridEl.addEventListener('touchstart', handleTouchStart, { passive: false });
      gridEl.addEventListener('touchmove', handleTouchMove, { passive: false });
      gridEl.addEventListener('touchend', handleTouchEnd, { passive: false });
      gridEl.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    }

    // --- Mouse fallback (non-pointer desktop) ---
    gridEl.addEventListener('mousedown', function(e) {
      if (window.PointerEvent) return;
      e.preventDefault();
      LatencyProfiler.recordDown(performance.now());
      getAudioCtxPromise();
      mouseDown = true;

      var cell = getCellFromCoords(e.clientX, e.clientY);
      if (cell) {
        startDrag(cell, e.clientX, e.clientY, undefined);
      }
    });

    gridEl.addEventListener('mousemove', function(e) {
      if (!mouseDown || window.PointerEvent) return;
      processTouchMove(e.clientX, e.clientY, undefined);
    });

    gridEl.addEventListener('mouseup', function() {
      if (window.PointerEvent) return;
      LatencyProfiler.recordRelease(performance.now());
      releaseCell();
      mouseDown = false;
    });

    gridEl.addEventListener('mouseleave', function() {
      if (window.PointerEvent) return;
      if (mouseDown) {
        LatencyProfiler.recordRelease(performance.now());
        releaseCell();
      }
      mouseDown = false;
    });

    // ========================================
    //  Audio-Reactive Visual Loop
    // ========================================
    // Dirty-flag: skip frame when signal unchanged. Per-cell glow modulated by signal + LFO.

    var lfoPhase = 0;
    var prevSignalLevel = 0;
    var smoothedHigh = 0;
    var lastGlowIntensity = -1;

    // Pre-allocate per-cell metadata
    var cellMeta = new Array(ROWS * COLS);
    for (var _cm = 0; _cm < cellMeta.length; _cm++) {
      cellMeta[_cm] = { row: _cm % ROWS, col: Math.floor(_cm / ROWS) % COLS };
    }

    var cellLastGlow = new Float32Array(ROWS * COLS);

    function audioVisualLoop() {
      lfoPhase += 0.03;

      var signalLevel = 0;
      var highLevel = 0;
      if (analyser && analyserData) {
        analyser.getByteFrequencyData(analyserData);
        var sum = 0;
        for (var i = 0; i < analyserData.length; i++) {
          sum += analyserData[i];
        }
        signalLevel = sum / (analyserData.length * 255);

        var highSum = 0;
        var startBin = Math.floor(analyserData.length * 0.5);
        for (var ii = startBin; ii < analyserData.length; ii++) {
          highSum += analyserData[ii];
        }
        highLevel = highSum / ((analyserData.length - startBin) * 255);
      }

      var smoothing = signalLevel > prevSignalLevel ? 0.5 : 0.75;
      prevSignalLevel = prevSignalLevel * (1 - smoothing) + signalLevel * smoothing;
      smoothedHigh = smoothedHigh * 0.8 + highLevel * 0.2;

      var glowIntensity = Math.min(1, prevSignalLevel * 3.5);

      if (Math.abs(glowIntensity - lastGlowIntensity) < 0.015) {
        requestAnimationFrame(audioVisualLoop);
        return;
      }
      lastGlowIntensity = glowIntensity;

      // Grid-level glow reactive to signal
      var baseGlow = 0.04;
      var glowBoost = glowIntensity * 0.08;
      var deepGlow = 0.025 + glowIntensity * 0.04;
      var outerGlow = 0.015 + glowIntensity * 0.03;
      var insetGlow = glowIntensity * 0.18;

      gridEl.style.boxShadow =
          '0 0 ' + (55 + glowIntensity * 50 | 0) + 'px rgba(99,102,241,' + (baseGlow + glowBoost).toFixed(3) + '),' +
          '0 0 ' + (130 + glowIntensity * 90 | 0) + 'px rgba(99,102,241,' + deepGlow.toFixed(3) + '),' +
          '0 0 ' + (200 + glowIntensity * 60 | 0) + 'px rgba(168,85,247,' + outerGlow.toFixed(3) + '),' +
          'inset 0 0 ' + (35 + glowIntensity * 35 | 0) + 'px rgba(168,85,247,' + insetGlow.toFixed(3) + ')';

      var colorFactor = Math.min(1, smoothedHigh * 2.5);
      var numCells = allCells.length;

      for (var ci = 0; ci < numCells; ci++) {
        var cell = allCells[ci];
        var isActive = cell.classList.contains('active');

        if (isActive) {
          var breathe = Math.sin(lfoPhase + cellMeta[ci].row * 1.1) * 0.15 + 0.85;
          var cellGlow = Math.min(1, (glowIntensity + 0.3) * breathe);
          if (Math.abs(cellGlow - cellLastGlow[ci]) < 0.02) continue;
          cellLastGlow[ci] = cellGlow;

          var innerR = 99 + colorFactor * 93 | 0;
          var innerG = 102 + colorFactor * 31 | 0;
          var innerB = 241 + colorFactor * 14 | 0;
          var violetR = 168 + colorFactor * 40 | 0;
          var violetG = 85 + colorFactor * 60 | 0;
          var violetB = 247 + colorFactor * 8 | 0;

          var blur1 = (20 + cellGlow * 25 | 0);
          var blur2 = (45 + cellGlow * 40 | 0);
          var blur3 = (75 + cellGlow * 50 | 0);
          var blur4 = (110 + cellGlow * 40 | 0);
          var iBlur1 = (10 + cellGlow * 16 | 0);
          var iBlur2 = (28 + cellGlow * 25 | 0);

          cell.style.background = 'rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.45 + cellGlow * 0.35).toFixed(2) + ')';
          cell.style.borderColor = 'rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.6 + cellGlow * 0.4).toFixed(2) + ')';
          cell.style.boxShadow =
             '0 0 ' + blur1 + 'px rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.7 + cellGlow * 0.3).toFixed(2) + '),' +
             '0 0 ' + blur2 + 'px rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.35 + cellGlow * 0.25).toFixed(2) + '),' +
             '0 0 ' + blur3 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.18 + cellGlow * 0.2).toFixed(2) + '),' +
             '0 0 ' + blur4 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.06 + cellGlow * 0.1).toFixed(2) + '),' +
             'inset 0 0 ' + iBlur1 + 'px rgba(' + (violetR + 24) + ',' + (violetG + 47) + ',' + (violetB + 8) + ',' + (0.4 + cellGlow * 0.35).toFixed(2) + '),' +
             'inset 0 0 ' + iBlur2 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.15 + cellGlow * 0.25).toFixed(2) + ')';

        } else {
          var row = cellMeta[ci].row;
          var reactive = Math.sin(lfoPhase + row * 0.7) * 0.5 + 0.5;
          var edgeGlow = glowIntensity * reactive;
          if (Math.abs(edgeGlow - cellLastGlow[ci]) < 0.02) continue;
          cellLastGlow[ci] = edgeGlow;

          if (edgeGlow > 0.04) {
            cell.style.borderColor = 'rgba(99,102,241,' + (0.05 + edgeGlow * 0.12).toFixed(3) + ')';
            cell.style.boxShadow = '0 0 ' + (4 + edgeGlow * 8 | 0) + 'px rgba(99,102,241,' + (edgeGlow * 0.06).toFixed(3) + ')';
          } else {
            cell.style.borderColor = '';
            cell.style.boxShadow = '';
          }
        }
      }

      requestAnimationFrame(audioVisualLoop);
    }
    audioVisualLoop();

    // ========================================
    //  Init
    // ========================================

    function init() {
      buildGrid();
      PerfMonitor.start();

      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeGrid, 80);
      });
      if (window.matchMedia) {
        window.matchMedia('(orientation: portrait)').addEventListener('change', resizeGrid);
        window.matchMedia('(orientation: landscape)').addEventListener('change', resizeGrid);
      }

      if (!Element.prototype.closest) {
        Element.prototype.closest = function(s) {
          var el = this;
          var matchesFn = Element.prototype.matches || Element.prototype.msMatchesSelector;
          do {
            if (matchesFn.call(el, s)) return el;
            el = el.parentElement || el.parentNode;
          } while (el !== null && el.nodeType === 1);
          return null;
        };
      }
    }

    init();
})();
</script>
</body>
