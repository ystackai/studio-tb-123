<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Open Circuit — Browser Synthesizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #05050a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 30% 50% at 50% 30%, rgba(99,102,241,0.06) 0%, transparent 80%),
        radial-gradient(ellipse 50% 80% at 50% 50%, rgba(15,15,25,1) 0%, rgba(5,5,10,1) 100%);
    }

    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 1rem 1rem 0.5rem;
      z-index: 10;
    }

    #header h1 {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 0 20px rgba(99,102,241,0.6);
    }

    #header p {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      margin-top: 0.15rem;
    }

    #grid-container {
      position: relative;
      z-index: 5;
    }

    #grid {
      display: grid;
      gap: 4px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(15,15,30,0.8);
      border: 1px solid rgba(99,102,241,0.1);
      box-shadow:
        0 0 60px rgba(99,102,241,0.05),
        inset 0 0 40px rgba(10,10,20,0.5);
      will-change: transform;
    }

    .cell {
      position: relative;
      border-radius: 6px;
      background: rgba(30,30,50,0.6);
      border: 1px solid rgba(99,102,241,0.08);
      transition: background 0.08s, border-color 0.08s, box-shadow 0.08s;
      cursor: pointer;
      will-change: background, box-shadow;
    }

    .cell:active, .cell.active {
      background: rgba(99,102,241,0.35);
      border-color: rgba(99,102,241,0.7);
      box-shadow:
        0 0 16px rgba(99,102,241,0.5),
        inset 0 0 8px rgba(168,85,247,0.3);
    }

    @keyframes cellGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(99,102,241,0.4), inset 0 0 6px rgba(168,85,247,0.2); }
      50% { box-shadow: 0 0 24px rgba(99,102,241,0.7), inset 0 0 12px rgba(168,85,247,0.4); }
    }

    .cell.active {
      animation: cellGlow 1.2s ease-in-out infinite;
    }

    .cell-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 600;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
      transition: color 0.1s;
    }

    .cell.active .cell-label {
      color: rgba(255,255,255,0.8);
    }

    #hint {
      position: absolute;
      bottom: 12%;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #hint.hidden { opacity: 0; }

    #params {
      position: absolute;
      bottom: 2%;
      display: flex;
      gap: 1.5rem;
      z-index: 10;
      color: rgba(255,255,255,0.3);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }

    #params span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    #params .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(99,102,241,0.5);
    }

    #params .dot.live {
      background: #6366f1;
      box-shadow: 0 0 6px rgba(99,102,241,0.6);
    }

    @media (max-width: 600px) {
      #grid { gap: 3px; padding: 6px; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="header">
      <h1>Open Circuit</h1>
      <p>Browser as stage · Grid as instrument</p>
    </div>
    <div id="grid-container">
      <div id="grid"></div>
    </div>
    <div id="hint">Touch the grid to play</div>
    <div id="params">
      <span><div class="dot" id="dot-lfo"></div> LFO</span>
      <span><div class="dot" id="dot-decay"></div> Decay</span>
      <span><div class="dot" id="dot-filter"></div> Filter</span>
    </div>
  </div>

  <script>
(function() {
  'use strict';

  // ========================================
  //  Audio Context & Signal Chain
  // ========================================

  let audioCtx = null;
  let masterGain = null;

  // Active voice map: cellIndex -> { osc, filter, vca, lfo, lfoGain }
  const activeVoices = {};

  // Note grid configuration — pentatonic / triad-friendly mapping
  // 5 rows (octaves/frets), 8 cols (scale degrees)
  const ROWS = 5;
  const COLS = 8;

  // Major pentatonic + 3rd for singing triad character
  // Scale degrees: 1, 2, 3, 5, 6  (in semitones)
  const SCALE_DEGREES = [0, 2, 4, 7, 9];

  // Base frequencies for 5 rows (C2-C6, transposed for a warm woody range)
  const ROW_FREQS = [130.81, 196.00, 261.63, 392.00, 523.25];

  function getFrequency(row, col) {
    const degreeIdx = col % SCALE_DEGREES.length;
    const scaleSemitones = SCALE_DEGREES[degreeIdx];
    const octaveOffset = Math.floor(col / SCALE_DEGREES.length);
    return ROW_FREQS[row] * Math.pow(2, scaleSemitones / 12 + octaveOffset);
  }

  function noteName(row, col) {
    const notes = ['C', 'D', 'E', 'G', 'A'];
    return notes[col % notes.length];
  }

  // ========================================
  //  Initialize Audio Context
  // ========================================

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Master chain: slight pre-delay buffer (tight), then master gain
      const preDelay = audioCtx.createDelay(0.01);
      preDelay.delayTime.value = 0.0015; // 1.5ms tight pre-delay

      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.35;

      // Soft limiter to prevent any clipping even at resonance peak
      const limiter = audioCtx.createDynamicsCompressor();
      limiter.threshold.value = -6;
      limiter.knee.value = 8;
      limiter.ratio.value = 12;
      limiter.attack.value = 0.001;
      limiter.release.value = 0.05;

      preDelay.connect(masterGain);
      masterGain.connect(limiter);
      limiter.connect(audioCtx.destination);

      window._preDelay = preDelay;
      window._limiter = limiter;
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // ========================================
  //  Voice: Oscillator → Filter → VCA → Pre-Delay → Master
  // ========================================

  function createVoice(freq, amplitude) {
    ensureAudio();

    const now = audioCtx.currentTime;

    // --- Oscillator: "woody" = sawtooth for harmonics, detuned for warmth ---
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    // Slight detune for singing warmth
    osc.detune.value = -2;

    // Secondary osc for richness, one octave lower, very quiet
    const oscSub = audioCtx.createOscillator();
    oscSub.type = 'triangle';
    oscSub.frequency.value = freq * 0.5;

    const oscSubGain = audioCtx.createGain();
    oscSubGain.gain.value = 0.12;

    oscSub.connect(oscSubGain);

    // --- Filter: Low-pass with resonance just below clipping ---
    // Cutoff follows the frequency loosely for singing tone
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 4.5; // resonance: singing but below screech
    filter.frequency.value = Math.min(freq * 6, 12000);

    // --- LFO modulating filter cutoff for harmonic movement ---
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.15 + Math.random() * 0.2; // slow: 0.15-0.35 Hz

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = freq * 0.8; // LFO range scales with note

    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // --- VCA (Amplitude Envelope) ---
    const vca = audioCtx.createGain();
    // Tight attack = key-strike feel
    vca.gain.setValueAtTime(0, now);
    vca.gain.linearRampToValueAtTime(amplitude, now + 0.003); // 3ms attack
    // Woody decay: slow tail, breathes not rings
    vca.gain.exponentialRampToValueAtTime(amplitude * 0.6, now + 0.15);
    vca.gain.exponentialRampToValueAtTime(amplitude * 0.1, now + 1.2);

    // --- Signal path: Osc → Filter → VCA → PreDelay → Master ---
    osc.connect(filter);
    oscSubGain.connect(filter);
    filter.connect(vca);
    vca.connect(window._preDelay);

    osc.start(now);
    oscSub.start(now);
    lfo.start(now);

    // Auto-stopper
    const stopTime = now + 3.5;
    vca.gain.setValueAtTime(amplitude * 0.01, stopTime - 0.3);
    osc.stop(stopTime);
    oscSub.stop(stopTime);
    lfo.stop(stopTime);

    return { osc, oscSub, filter, vca, lfo, lfoGain, lfoGainNode: lfoGain, stopTime };
  }

  function updateVoice(voice, freq, amplitude) {
    if (!voice) return;
    const now = audioCtx.currentTime;
    voice.osc.frequency.setTargetAtTime(freq, now, 0.005);
    voice.oscSub.frequency.setTargetAtTime(freq * 0.5, now, 0.005);

    // Brightness: position along row maps to filter cutoff
    voice.filter.frequency.setTargetAtTime(Math.min(freq * 6, 12000), now, 0.008);

    voice.vca.gain.setTargetAtTime(amplitude, now, 0.003);
  }

  function killVoice(cellIndex) {
    const v = activeVoices[cellIndex];
    if (!v) return;
    const now = audioCtx.currentTime;
    try {
      v.vca.gain.cancelScheduledValues(now);
      v.vca.gain.setValueAtTime(v.vca.gain.value, now);
      v.vca.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      v.osc.stop(now + 0.45);
      v.oscSub.stop(now + 0.45);
      v.lfo.stop(now + 0.45);
    } catch(e) {}
    delete activeVoices[cellIndex];
  }

  // ========================================
  //  Grid UI
  // ========================================

  const gridEl = document.getElementById('grid');
  const cells = [];

  function buildGrid() {
    // Responsive cell sizing
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxW = Math.min(vw * 0.85, 600);
    const cellW = Math.floor((maxW - (COLS + 1) * 4) / COLS);
    const cellH = cellW * 0.78;

    const totalH = ROWS * cellH + (ROWS + 1) * 4;
    const maxH = vh * 0.65;
    const scaleFactor = Math.min(1, maxH / totalH);

    const finalCellW = Math.round(cellW * scaleFactor);
    const finalCellH = Math.round(cellH * scaleFactor);

    gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${finalCellW}px)`;
    gridEl.style.gridTemplateRows = `repeat(${ROWS}, ${finalCellH}px)`;

    gridEl.innerHTML = '';
    cells.length = 0;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.index = idx;
        el.dataset.row = r;
        el.dataset.col = c;

        // Label
        const label = document.createElement('span');
        label.className = 'cell-label';
        label.textContent = noteName(r, c);
        el.appendChild(label);

        gridEl.appendChild(el);
        cells.push(el);
      }
    }
  }

  // ========================================
  //  Touch / Mouse Input Handling
  // ========================================

  let touchStartTime = 0;
  let hintEl = document.getElementById('hint');
  let firstTouch = true;

  function getCellFromEvent(e) {
    const target = e.target || e.touches?.[0]?.target;
    if (!target) return null;
    const cell = target.closest?.('.cell') || target;
    if (!cell.classList || !cell.classList.contains('cell')) return null;
    return cell;
  }

  function getAmplitudeFromPosition(r, c, cellW, cellH) {
    // Amplitude: lower rows are louder (bass), edges are slightly attenuated
    const rowFactor = 1 - (r / (ROWS - 1)) * 0.4;
    const colFactor = 0.8 + 0.2 * Math.sin(Math.PI * c / (COLS - 1));
    return 0.35 * rowFactor * colFactor;
  }

  let dragVoice = null;
  let dragCellIndex = -1;

  function showLiveDots() {
    const dotLfo = document.getElementById('dot-lfo');
    const dotDecay = document.getElementById('dot-decay');
    const dotFilter = document.getElementById('dot-filter');
    if (dotLfo) dotLfo.classList.add('live');
    if (dotDecay) dotDecay.classList.add('live');
    if (dotFilter) dotFilter.classList.add('live');
   }

  function clearLiveDotsIfIdle() {
    const hasDrag = !!dragVoice;
    const hasVoices = Object.keys(activeVoices).length > 0;
    if (!hasDrag && !hasVoices) {
      const dotLfo = document.getElementById('dot-lfo');
      const dotDecay = document.getElementById('dot-decay');
      const dotFilter = document.getElementById('dot-filter');
      if (dotLfo) dotLfo.classList.remove('live');
      if (dotDecay) dotDecay.classList.remove('live');
      if (dotFilter) dotFilter.classList.remove('live');
     }
   }

  function hitCell(cell) {
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    const idx = parseInt(cell.dataset.index);
    const freq = getFrequency(r, c);
    const amp = getAmplitudeFromPosition(r, c);

    if (firstTouch) {
      firstTouch = false;
      if (hintEl) hintEl.classList.add('hidden');
     }

     // During drag: morph the single drag voice
    if (dragVoice) {
      if (idx !== dragCellIndex) {
        cells[dragCellIndex]?.classList.remove('active');
        dragCellIndex = idx;
       }
      cell.classList.add('active');
      updateVoice(dragVoice, freq, amp);
      return;
     }

    // Single tap: create or update cell voice
    cell.classList.add('active');
    showLiveDots();

    if (activeVoices[idx]) {
      const freq2 = getFrequency(r, c);
      const amp2 = getAmplitudeFromPosition(r, c);
      updateVoice(activeVoices[idx], freq2, amp2);
      return;
     }

    const voice = createVoice(freq, amp);
    activeVoices[idx] = voice;
   }

  function releaseCell() {
    if (dragVoice) {
      if (dragCellIndex >= 0) {
        cells[dragCellIndex]?.classList.remove('active');
       }
      const v = dragVoice;
      dragVoice = null;
      dragCellIndex = -1;
       // Let the voice decay naturally on release
      if (v) {
        const now = audioCtx.currentTime;
        try {
          v.vca.gain.cancelScheduledValues(now);
          v.vca.gain.setValueAtTime(v.vca.gain.value, now);
          v.vca.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          v.osc.stop(now + 0.85);
          v.oscSub.stop(now + 0.85);
          v.lfo.stop(now + 0.85);
         } catch(e) {}
       }
       // Clean up any other dead voices
      clearLiveDotsIfIdle();
      return;
     }
    clearLiveDotsIfIdle();
   }

  // --- Touch handlers ---
  function handleTouchStart(e) {
    e.preventDefault();
    ensureAudio();
    touchStartTime = performance.now();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const cell = el?.closest?.('.cell');
      if (cell) {
        const idx = parseInt(cell.dataset.index);
        dragVoice = null;
        dragCellIndex = -1;

         // If this cell already has a voice, morph it
        if (activeVoices[idx]) {
          dragVoice = activeVoices[idx];
          dragCellIndex = idx;
          const r = parseInt(cell.dataset.row);
          const c = parseInt(cell.dataset.col);
          updateVoice(dragVoice, getFrequency(r, c), getAmplitudeFromPosition(r, c));
        } else {
          dragVoice = createVoice(getFrequency(parseInt(cell.dataset.row), parseInt(cell.dataset.col)), getAmplitudeFromPosition(parseInt(cell.dataset.row), parseInt(cell.dataset.col)));
          dragCellIndex = idx;
          delete activeVoices[idx];
         }
        cell.classList.add('active');
        showLiveDots();
       }
     }
   }

  function handleTouchMove(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const cell = el?.closest?.('.cell');
      if (cell) hitCell(cell);
     }
   }

  function handleTouchEnd(e) {
    e.preventDefault();
    releaseCell();
   }

  // --- Mouse handlers ---
  let mouseDown = false;

  gridEl.addEventListener('mousedown', function(e) {
    e.preventDefault();
    ensureAudio();
    mouseDown = true;
    const cell = getCellFromEvent(e);
    if (cell) {
      const idx = parseInt(cell.dataset.index);
      dragVoice = null;
      dragCellIndex = -1;

      if (activeVoices[idx]) {
        dragVoice = activeVoices[idx];
        dragCellIndex = idx;
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        updateVoice(dragVoice, getFrequency(r, c), getAmplitudeFromPosition(r, c));
      } else {
        dragVoice = createVoice(getFrequency(parseInt(cell.dataset.row), parseInt(cell.dataset.col)), getAmplitudeFromPosition(parseInt(cell.dataset.row), parseInt(cell.dataset.col)));
        dragCellIndex = idx;
        delete activeVoices[idx];
       }
      cell.classList.add('active');
      showLiveDots();
     }
   });

  gridEl.addEventListener('mousemove', function(e) {
    if (!mouseDown) return;
    const cell = getCellFromEvent(e);
    if (cell) hitCell(cell);
   });

  gridEl.addEventListener('mouseup', function() {
    releaseCell();
    mouseDown = false;
   });

  gridEl.addEventListener('mouseleave', function() {
    if (mouseDown) {
      releaseCell();
     }
    mouseDown = false;
   });

  // Touch events directly on grid
  gridEl.addEventListener('touchstart', handleTouchStart, { passive: false });
  gridEl.addEventListener('touchmove', handleTouchMove, { passive: false });
  gridEl.addEventListener('touchend', handleTouchEnd, { passive: false });
  gridEl.addEventListener('touchcancel', handleTouchEnd, { passive: false });

  // ========================================
  //  LFO Visualization (visual feedback for LFO speed)
  // ========================================

  let lfoPhase = 0;
  function lfoVisualLoop() {
    lfoPhase += 0.03;
    const brightness = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(lfoPhase));
    const dotLfo = document.getElementById('dot-lfo');
    if (dotLfo && dotLfo.classList.contains('live')) {
      dotLfo.style.opacity = brightness.toFixed(2);
    }
    requestAnimationFrame(lfoVisualLoop);
  }
  lfoVisualLoop();

  // ========================================
  //  Sequence (auto-play triad pattern)
  // ========================================

  let sequencerRunning = false;
  let seqInterval = null;
  let seqStep = 0;
  const seqPattern = [
    // Triad-based sequence: C-E-G across rows
    { r: 0, c: 0 }, // C
    { r: 2, c: 0 }, // E
    { r: 0, c: 3 }, // G
    { r: 2, c: 3 }, // G (higher)
    { r: 1, c: 0 }, // D
    { r: 3, c: 0 }, // E (higher)
    { r: 1, c: 3 }, // G (higher)
    { r: 4, c: 0 }, // C (high)
  ];

  function toggleSequence() {
    if (sequencerRunning) {
      stopSequence();
    } else {
      startSequence();
    }
  }

  function startSequence() {
    ensureAudio();
    sequencerRunning = true;
    seqStep = 0;
    seqInterval = setInterval(function() {
      const step = seqPattern[seqStep % seqPattern.length];
      const idx = step.r * COLS + step.c;
      const cell = cells[idx];
      if (cell) {
        const freq = getFrequency(step.r, step.c);
        const amp = getAmplitudeFromPosition(step.r, step.c);
        cell.classList.add('active');
        const voice = createVoice(freq, amp * 0.6);
        voice._autoStop = idx;
        setTimeout(function() {
          cell.classList.remove('active');
          killVoice(idx);
        }, 900);
      }
      seqStep++;
    }, 420);

    // Auto-stop after 2 loops
    setTimeout(stopSequence, seqPattern.length * 420 * 2);
  }

  function stopSequence() {
    sequencerRunning = false;
    if (seqInterval) {
      clearInterval(seqInterval);
      seqInterval = null;
    }
    seqStep = 0;
  }

  // Double-tap / double-click to start sequence
  let clickCount = 0;
  let clickTimer = null;
  gridEl.addEventListener('click', function(e) {
    clickCount++;
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(function() {
      if (clickCount >= 2) {
        toggleSequence();
      }
      clickCount = 0;
    }, 350);
  });

  // ========================================
  //  Init
  // ========================================

  function init() {
    buildGrid();

    // Rebuild on resize
    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(buildGrid, 200);
    });
  }

  // Polyfill closest for older browsers
  if (!Element.prototype.closest) {
    Element.prototype.closest = function(s) {
      var el = this;
      var matchesFn = Element.prototype.matches || Element.prototype.msMatchesSelector;
      do {
        if (matchesFn.call(el, s)) return el;
        el = el.parentElement || el.parentNode;
      } while (el !== null && el.nodeType === 1);
      return null;
    };
  }

  init();
})();
  </script>
</body>
</html>
