<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Open Circuit</title>
<style>
/* ============================================================
   COVER LOOK — Design System Tokens
   Museum-grade geometry. High-contrast typographic hierarchy.
   "Dark Stage, Bright Performer" — locked for hero screenshot.
  ============================================================ */

    /* -- Palette -- */
    :root {
        --cover-stage: #000000;
         --cover-stage-vignette: #020208;
         --cover-stage-haze: rgba(99,102,241,0.035);
         --cover-stage-haze-deep: rgba(168,85,247,0.01);

       --cover-frame-bg: rgba(3,3,8,0.98);
          --cover-frame-border: rgba(99,102,241,0.08);
          --cover-frame-radius: 3px;

          --cover-cell-idle-bg: rgba(4,4,10,0.99);
          --cover-cell-idle-border: rgba(99,102,241,0.05);
          --cover-cell-radius: 2px;

       --cover-cell-active-bg-1: 99,102,241;
       --cover-cell-active-bg-2: 168,85,247;
       --cover-cell-active-glow-1: 192,132,255;
       --cover-cell-active-glow-2: 139,92,246;
       --cover-cell-active-glow-3: 217,169,255;

       --cover-type-display: 'SF Pro Display', 'Helvetica Neue', 'Inter', system-ui, sans-serif;
       --cover-type-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
       --cover-type-track-wide: 0.34em;
       --cover-type-track-normal: 0.08em;

       --cover-gap: 4px;
       --cover-pad: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

   html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--cover-stage);
      font-family: var(--cover-type-display);
     -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
      touch-action: none;
      overscroll-behavior: none;
     -webkit-font-smoothing: antialiased;
     -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Stage ---- */
      #stage {
       position: relative; width: 100%; height: 100%;
       display: flex; align-items: center; justify-content: center;
       flex-direction: column;
       opacity: 0;
       transition: opacity 0.8s ease-out;
       will-change: opacity;
        background:
          radial-gradient(ellipse 28% 38% at 50% 12%, rgba(99,102,241,0.045) 0%, rgba(99,102,241,0.012) 30%, transparent 60%),
          radial-gradient(ellipse 55% 65% at 50% 50%, rgba(168,85,247,0.008) 0%, transparent 50%),
          radial-gradient(ellipse 85% 95% at 50% 48%, var(--cover-stage) 0%, var(--cover-stage-vignette) 100%);
    }
    #stage.visible { opacity: 1; }

    /* ---- Grid Container ---- */
    #grid-container {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    #grid-wrap {
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    #grid {
      display: grid;
      gap: var(--grid-gap, var(--cover-gap));
      padding: var(--grid-pad, var(--cover-pad));
      border-radius: var(--grid-radius, var(--cover-frame-radius));
      background: var(--cover-frame-bg);
      border: var(--grid-border, 1px) solid var(--cover-frame-border);
      box-shadow:
          0 0 50px rgba(99,102,241,0.03),
          0 0 100px rgba(99,102,241,0.02),
          0 0 180px rgba(99,102,241,0.012),
        inset 0 0 30px rgba(0,0,0,0.6);
      will-change: transform, box-shadow;
      transition: box-shadow 0.15s ease-out;
      transform-origin: center center;
    }

    @media (max-width: 480px) {
       #grid { --grid-gap: 3px; --grid-pad: 7px; --grid-radius: 2px; --grid-border: 1px; }
    }
    @media (max-width: 370px) {
       #grid { --grid-gap: 2px; --grid-pad: 5px; --grid-radius: 1px; --grid-border: 1px; }
    }
    @media (min-width: 768px) {
       #grid { --grid-gap: 5px; --grid-pad: 12px; --grid-radius: 2px; }
    }
    @media (min-width: 1200px) {
       #grid { --grid-gap: 6px; --grid-pad: 14px; --grid-radius: 2px; }
    }

         /* ---- Idle cell breathing pulse (compositor-only, 0 JS cost) ---- */
       @keyframes idleCellPulse {
          0%, 100% { box-shadow: inset 0 0 4px rgba(99,102,241,0.04); }
          50% { box-shadow: inset 0 0 8px rgba(99,102,241,0.1); }
       }

         /* ---- Cell (idle) ---- */
       .cell {
       position: relative;
       border-radius: var(--cover-cell-radius);
       background: var(--cover-cell-idle-bg);
       border: var(--grid-border, 1px) solid var(--cover-cell-idle-border);
       transition: background 0.03s, border-color 0.03s, box-shadow 0.03s;
       cursor: pointer;
       will-change: transform, background, box-shadow;
       transform: translateZ(0);
       min-width: 0; min-height: 0;
       overflow: hidden;
       backface-visibility: hidden;
       animation: idleCellPulse 3s ease-in-out infinite;
       }
      .cell::after {
       content: '';
       position: absolute; inset: 0;
       border-radius: var(--cover-cell-radius);
       box-shadow: inset 0 0 4px rgba(99,102,241,0.02);
       pointer-events: none;
       transition: box-shadow 0.1s;
       transform: translateZ(0);
      }

       /* ---- Cell (active) ---- */
      .cell:active, .cell.active {
       background: rgba(99,102,241,0.78);
       border-color: rgba(168,85,247,1);
       box-shadow:
           0 0 18px rgba(99,102,241,1),
           0 0 44px rgba(99,102,241,0.72),
           0 0 82px rgba(168,85,247,0.52),
           0 0 120px rgba(139,92,246,0.32),
           0 0 160px rgba(139,92,246,0.18),
         inset 0 0 14px rgba(192,132,255,0.85),
         inset 0 0 36px rgba(168,85,247,0.52),
         inset 0 0 60px rgba(217,169,255,0.22);
      }
      .cell:active::after, .cell.active::after {
       box-shadow: inset 0 0 10px rgba(255,255,255,0.28);
      }

      /* ---- Cell (sequencer pattern step) ---- */
      .cell.seq-active {
       background: rgba(168,85,247,0.35);
       border-color: rgba(168,85,247,0.8);
       box-shadow:
           0 0 14px rgba(168,85,247,0.6),
           0 0 32px rgba(99,102,241,0.3),
           0 0 55px rgba(139,92,246,0.15),
         inset 0 0 8px rgba(192,132,255,0.4),
         inset 0 0 20px rgba(168,85,247,0.2);
      }

      /* ---- Cell (misuse / feedback loop active) ---- */
      @keyframes feedbackPulse {
        0%, 100% { box-shadow: 0 0 22px rgba(244,63,94,0.8), 0 0 52px rgba(168,85,247,0.5), 0 0 90px rgba(99,102,241,0.3), inset 0 0 18px rgba(244,63,94,0.3); }
        50% { box-shadow: 0 0 28px rgba(244,63,94,1), 0 0 65px rgba(168,85,247,0.7), 0 0 110px rgba(99,102,241,0.45), inset 0 0 24px rgba(244,63,94,0.5); }
      }
      .cell.feedback-active {
        background: rgba(244,63,94,0.35);
        border-color: rgba(244,63,94,0.9);
        animation: feedbackPulse 0.6s ease-in-out infinite;
      }

        /* ---- Feedback Loop Visual Indicator ---- */
        #feedback-indicator {
         position: fixed;
         bottom: 14px; left: 50%; transform: translateX(-50%);
         font-family: var(--cover-type-mono);
         font-size: 0.55rem; font-weight: 700;
         letter-spacing: 0.3em;
         text-transform: uppercase;
         color: rgba(244,63,94,0.25);
         transition: color 0.2s, text-shadow 0.2s, transform 0.2s;
         pointer-events: none;
         text-rendering: geometricPrecision;
         text-align: center;
         white-space: nowrap;
         z-index: 100;
        }
        #feedback-indicator.live {
         color: rgba(244,63,94,0.95);
         text-shadow:
           0 0 8px rgba(244,63,94,0.9),
           0 0 22px rgba(244,63,94,0.6),
           0 0 40px rgba(168,85,247,0.35),
           0 0 64px rgba(99,102,241,0.18);
         animation: indicatorPulse 0.5s ease-in-out infinite;
        }
        @keyframes indicatorPulse {
         0%, 100% { transform: translateX(-50%) translateY(0); }
         50% { transform: translateX(-50%) translateY(-1px); }
        }

        /* ---- Feedback Energy Ring (wraps grid) ---- */
        #feedback-ring {
         position: absolute;
         inset: -6px;
         border-radius: 14px;
         border: 1px solid rgba(244,63,94,0);
         box-shadow: none;
         pointer-events: none;
         transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
         opacity: 0;
         z-index: 5;
        }
        #feedback-ring.live {
         opacity: 1;
         border-color: rgba(244,63,94,0.25);
         box-shadow:
           0 0 12px rgba(244,63,94,0.15),
           0 0 36px rgba(244,63,94,0.08),
           0 0 60px rgba(168,85,247,0.05),
           inset 0 0 10px rgba(244,63,94,0.05);
         animation: ringBreathe 1.2s ease-in-out infinite;
        }
        @keyframes ringBreathe {
         0%, 100% { box-shadow: 0 0 12px rgba(244,63,94,0.15), 0 0 36px rgba(244,63,94,0.08), 0 0 60px rgba(168,85,247,0.05), inset 0 0 10px rgba(244,63,94,0.05); }
         50% { box-shadow: 0 0 18px rgba(244,63,94,0.35), 0 0 50px rgba(244,63,94,0.2), 0 0 85px rgba(168,85,247,0.12), inset 0 0 16px rgba(244,63,94,0.12); }
        }

        /* ---- Misuse mode grid override (highest specificity) ---- */
        .misuse-mode {
         box-shadow:
           0 0 55px rgba(244,63,94,0.06),
           0 0 100px rgba(168,85,247,0.04),
           0 0 180px rgba(99,102,241,0.02),
           0 0 50px rgba(99,102,241,0.03),
           0 0 100px rgba(99,102,241,0.02),
           0 0 180px rgba(99,102,241,0.012),
           inset 0 0 30px rgba(0,0,0,0.6);
         transition: box-shadow 0.25s ease-out;
        }

        /* ---- Misuse-mode cell feedback-active overrides (highest specificity) ---- */
        #grid.misuse-mode .cell.feedback-active {
         background: rgba(244,63,94,0.38) !important;
         border-color: rgba(244,63,94,0.92) !important;
         animation: feedbackPulse 0.6s ease-in-out infinite !important;
        }
        #grid.misuse-mode .cell.feedback-active .cell-label {
         color: rgba(255,220,220,0.95) !important;
         text-shadow:
           0 0 6px rgba(244,63,94,0.9),
           0 0 16px rgba(244,63,94,0.5),
           0 0 28px rgba(168,85,247,0.25) !important;
        }

      /* ---- Feedback Gain Slider ---- */
      #feedback-wrap {
        display: flex; align-items: center; gap: 8px;
      }
      #feedback-label {
        font-family: var(--cover-type-mono);
        font-size: 0.5rem;
        color: rgba(244,63,94,0.35);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        transition: color 0.3s;
      }
      #feedback-label.live {
        color: rgba(244,63,94,0.85);
      }
      #feedback-display {
        font-family: var(--cover-type-mono);
        font-size: 0.6rem;
        color: rgba(244,63,94,0.5);
        font-weight: 700;
        min-width: 36px;
        text-align: center;
        transition: color 0.3s;
      }
      #feedback-display.live {
        color: rgba(244,63,94,0.9);
      }
     input[type="range"]#feedback-gain-slider {
       -webkit-appearance: none; appearance: none;
       width: 70px; height: 3px;
       background: rgba(244,63,94,0.15);
       border-radius: 2px;
       outline: none;
       cursor: pointer;
       transition: background 0.3s;
     }
     input[type="range"]#feedback-gain-slider:hover {
       background: rgba(244,63,94,0.3);
     }
    input[type="range"]#feedback-gain-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: rgba(244,63,94,0.7);
      box-shadow: 0 0 5px rgba(244,63,94,0.5);
      cursor: pointer;
    }
    input[type="range"]#feedback-gain-slider::-moz-range-thumb {
      width: 11px; height: 11px;
      border: none; border-radius: 50%;
      background: rgba(244,63,94,0.7);
      box-shadow: 0 0 5px rgba(244,63,94,0.5);
      cursor: pointer;
    }

    /* ---- Cell Labels ---- */
    .cell-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--cover-type-mono);
      font-size: clamp(0.55rem, 1.4vw, 0.7rem);
      font-weight: 600;
      letter-spacing: var(--cover-type-track-wide);
      text-transform: uppercase;
      color: rgba(255,255,255,0.07);
      pointer-events: none;
      transition: color 0.06s, text-shadow 0.06s;
      text-rendering: geometricPrecision;
    }
    .cell.active .cell-label, .cell.seq-active .cell-label {
      color: rgba(235,235,255,0.95);
      text-shadow:
          0 0 6px rgba(192,132,255,0.9),
          0 0 16px rgba(99,102,241,0.5),
          0 0 28px rgba(168,85,247,0.25);
    }

    /* ---- Step Indicators ---- */
    #step-indicators {
      display: flex; gap: 6px; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.1);
      transition: background 0.06s, box-shadow 0.06s, transform 0.06s;
    }
    .step-dot.current {
      background: rgba(99,102,241,0.8);
      box-shadow:
          0 0 8px rgba(99,102,241,0.9),
          0 0 20px rgba(168,85,247,0.5),
        inset 0 0 3px rgba(217,169,255,0.5);
      transform: scale(1.3);
    }
    .step-dot.current.playing {
      animation: stepPulse 0.38s ease-out infinite;
    }
    @keyframes stepPulse {
       0% { transform: scale(1.35); }
      50% { transform: scale(1.15); }
     100% { transform: scale(1.3); }
    }

    /* ---- Controls Bar ---- */
    #seq-controls {
      display: flex; gap: 16px; align-items: center; justify-content: center;
      margin-top: 8px; flex-wrap: wrap;
    }
    .seq-btn {
      font-family: var(--cover-type-mono);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      background: rgba(6,6,14,0.9);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 2px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.08s, border-color 0.08s, box-shadow 0.08s, background 0.08s;
      user-select: none; -webkit-user-select: none;
    }
    .seq-btn:hover {
      color: rgba(255,255,255,0.6);
      border-color: rgba(99,102,241,0.3);
    }
    .seq-btn.active {
      color: rgba(230,225,255,0.95);
      border-color: rgba(168,85,247,0.9);
      background: rgba(99,102,241,0.2);
      box-shadow:
          0 0 10px rgba(99,102,241,0.4),
          0 0 24px rgba(168,85,247,0.2),
        inset 0 0 6px rgba(192,132,255,0.3);
    }
    #tempo-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    #tempo-label {
      font-family: var(--cover-type-mono);
      font-size: 0.5rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    #tempo-display {
      font-family: var(--cover-type-mono);
      font-size: 0.65rem;
      color: rgba(99,102,241,0.7);
      font-weight: 700;
      min-width: 48px;
      text-align: center;
    }
    input[type="range"]#tempo-slider {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 3px;
      background: rgba(99,102,241,0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]#tempo-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(99,102,241,0.8);
      box-shadow: 0 0 6px rgba(168,85,247,0.6);
      cursor: pointer;
    }
    input[type="range"]#tempo-slider::-moz-range-thumb {
      width: 12px; height: 12px;
      border: none; border-radius: 50%;
      background: rgba(99,102,241,0.8);
      box-shadow: 0 0 6px rgba(168,85,247,0.6);
      cursor: pointer;
    }

    /* ---- Launch Overlay ---- */
      #launch-overlay {
       position: fixed; inset: 0;
       background: #000000;
       display: flex; align-items: center; justify-content: center;
       flex-direction: column; z-index: 9999;
       transition: opacity 0.8s ease-in;
       gap: 0;
       will-change: opacity;
       }
    #launch-overlay.fade-out { opacity: 0; pointer-events: none; }

    #launch-label {
      font-family: var(--cover-type-display);
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 800;
      letter-spacing: var(--cover-type-track-wide);
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      text-shadow:
          0 0 32px rgba(99,102,241,0.65),
          0 0 64px rgba(99,102,241,0.28),
          0 0 100px rgba(168,85,247,0.12);
      text-rendering: geometricPrecision;
      user-select: none;
      line-height: 1.1;
    }

    #launch-sublabel {
      font-family: var(--cover-type-mono);
      font-size: clamp(0.45rem, 1.1vw, 0.58rem);
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(99,102,241,0.35);
      margin-top: 0.8rem;
      margin-bottom: 2rem;
      text-rendering: geometricPrecision;
      user-select: none;
    }

    #launch-prompt {
      font-family: var(--cover-type-mono);
      font-size: clamp(0.48rem, 1.1vw, 0.6rem);
      font-weight: 400;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-rendering: geometricPrecision;
      animation: promptPulse 2.5s ease-in-out infinite;
    }
      @keyframes promptPulse {
         0%, 100% { opacity: 0.35; }
         50% { opacity: 0.9; }
      }

      /* ---- Signal Graph Overlay Canvas ---- */
      #signal-graph {
       position: absolute;
       top: 0; left: 0;
       width: 100%; height: 100%;
       pointer-events: none;
       z-index: 2;
       opacity: 0.35;
       will-change: opacity;
      }

      /* ---- Profiler HUD ---- */
      #profiler-hud {
       position: fixed;
       top: 8px; right: 10px;
       font-family: var(--cover-type-mono);
       font-size: 0.52rem;
       font-weight: 600;
       letter-spacing: 0.1em;
       color: rgba(99,102,241,0.45);
       pointer-events: none;
       z-index: 50;
       text-rendering: geometricPrecision;
       text-align: right;
       line-height: 1.6;
       opacity: 0;
       transition: opacity 0.4s;
       text-shadow: 0 0 6px rgba(99,102,241,0.3);
      }
      #profiler-hud.visible { opacity: 1; }
      #profiler-hud strong { color: rgba(168,85,247,0.7); }
</style>
</head>
<body>
<div id="launch-overlay">
       <div id="launch-label">Open Circuit</div>
       <div id="launch-sublabel">Browser as Stage — Grid as Instrument</div>
       <div id="launch-prompt">Tap Anywhere to Open</div>
</div>

<div id="stage">
     <div id="grid-container">
        <div id="step-indicators"></div>
          <div id="grid-wrap">
            <div id="grid">
                <div id="feedback-ring"></div>
              </div>
              <!-- Signal Graph Overlay: renders Osc→Filter→VCA→Decay flow on the dark stage -->
              <canvas id="signal-graph" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0.35"></canvas>
              <!-- Profiler HUD: shows drag latency stats in real time -->
              <div id="profiler-hud"></div>
          </div>
          <div id="seq-controls">
             <button class="seq-btn" id="btn-loop" data-mode="loop">LOOP ON</button>
             <button class="seq-btn" id="btn-misuse" data-mode="misuse">MISUSE</button>
             <button class="seq-btn" id="btn-edit" data-mode="edit">EDIT</button>
             <div id="tempo-wrap">
                <span id="tempo-label">TEMPO</span>
                <input type="range" id="tempo-slider" min="40" max="240" value="158" step="1">
                <span id="tempo-display">158 BPM</span>
             </div>
             <div id="feedback-wrap">
                <span id="feedback-label">FB</span>
                <input type="range" id="feedback-gain-slider" min="0" max="100" value="35" step="1">
                <span id="feedback-display">0.35</span>
             </div>
          </div>
       </div>
       <div id="feedback-indicator">FEEDBACK OFF</div>
 </div>

<script>
(function() {
     'use strict';

    const ENV = {
       NODE: 'production',
       SAMPLE_RATE_TARGET: 48000,
       MAX_VOICES: 40,
       LAUNCH_TIMEOUT_MS: 1000,
       STAGE_BG: '#010108',
       OVERLAY_BG: '#000003',
       GRID_ROWS: 5,
       GRID_COLS: 8,
       MIN_TOUCH_TARGET: 44,
       LOOKAHEAD_SEC: 0.08,
       SCHEDULE_INTERVAL_MS: 25,
       SEQ_INTERVAL_SEC: 0.38,
       MASTER_GAIN: 0.28,
       SOFT_CLIP_THRESHOLD: 0.82,
       COMPRESSOR_THRESHOLD_DB: -8,
       COMPRESSOR_RATIO: 8,
       PRE_DELAY_MS: 1.5,
       LFO_FREQ_HZ: 0.2,
       LFO_DEPTH_FACTOR: 0.5,
        MAX_Q: 3.8,
        MIN_Q: 1.0,
        PITCH_BEND_SEMITONES: 1,
        FILTER_CUTOFF_MOD_DEPTH: 3,
        RESONANCE_DRIFT_GUARD_Q_BASE: 3.8,
        RESONANCE_DRIFT_GUARD_Q_MIN: 1.0,
        RESONANCE_DRIFT_GUARD_Q_MAX: 3.8,
        RESONANCE_DRIFT_GUARD_THRESHOLD_DB: -18,
        RESONANCE_DRIFT_GUARD_DECAY_MS: 150,
        SINGING_HARMONIC_RING_THRESHOLD: 0.65,

            audioCtxPromise = null;
            return audioCtx;
            });
          });
        }
       return audioCtxPromise;
       }

           // ========================================
           //  Resonance Drift Guard — computes safe Q given LFO cutoff modulation
           // ========================================
     function computeDriftGuardedQ(freq, currentCutoff, lfoDepth) {
       var nyquist = audioCtx.sampleRate * 0.5;
       var freqRatio = freq / nyquist;
       var cutoffRatio = currentCutoff / nyquist;

       var maxQ = 3.8, minQ = 1.0, q;

       if (freqRatio > 0.12) {
         var t = Math.min(1, (freqRatio - 0.12) / 0.13);
         q = maxQ - (maxQ - minQ) * t;
          } else {
         q = maxQ;
          }
       q = Math.max(q, 0.5);

       var lfoModulationIndex = (lfoDepth / Math.max(currentCutoff, 1));
       if (lfoModulationIndex > 0.4) {
         var clampFactor = 1 - (lfoModulationIndex - 0.4) * 0.5;
         q = q * Math.max(0.3, clampFactor);
          }

       if (cutoffRatio > 0.1) {
         var cutoffClamp = 1 - ((cutoffRatio - 0.1) / 0.4) * 0.5;
         q = q * Math.max(0.3, cutoffClamp);
          }

       return { q: Math.max(q, minQ), safe: q < 3.0 };
        }

           // ========================================
           //  Singing Harmonic Stabilizer — detects ringing and hard-stops decay tails
           // ========================================
     var stabilizerState = {
       lastRingEnergy: 0,
       ringCount: 0,
       lastRingTime: 0,
       isStabilizing: false
        };

     function detectRinging(highLevel, signalLevel) {
       var ringEnergy = highLevel * 100;
       var now = performance.now();

       if (ringEnergy > ENV.SINGING_HARMONIC_RING_THRESHOLD) {
         stabilizerState.ringCount++;
         if (now - stabilizerState.lastRingTime < 200) {
           stabilizerState.ringCount++;
             }
         stabilizerState.lastRingTime = now;
         stabilizerState.lastRingEnergy = ringEnergy;
          } else {
         stabilizerState.ringCount = Math.max(0, stabilizerState.ringCount - 0.5);
          }

       if (stabilizerState.ringCount > 3 && ringEnergy > ENV.SINGING_HARMONIC_RING_THRESHOLD) {
         return { ringing: true, severity: ringEnergy, shouldMute: !hasActiveTouch() };
          }
       return { ringing: false, severity: ringEnergy, shouldMute: false };
        }

     function hasActiveTouch() {
       var keys = Object.keys(activeTouchVoices);
       return keys.length > 0;
        }

     function hardStopRinging() {
       if (!guardMaster || !audioCtx) return;
       var now = audioCtx.currentTime;
       try {
         guardMaster.gain.cancelScheduledValues(now);
         guardMaster.gain.setValueAtTime(Math.max(guardMaster.gain.value, 0.001), now);
         guardMaster.gain.exponentialRampToValueAtTime(0.0001, now + ENV.SINGING_HARMONIC_STABILIZE_DECAY_MS / 1000);
          } catch(e) {}
        }

     function resumeFromHardStop() {
       if (!guardMaster || !audioCtx) return;
       var now = audioCtx.currentTime;
       try {
         guardMaster.gain.cancelScheduledValues(now);
         guardMaster.gain.setValueAtTime(0.0001, now);
         guardMaster.gain.linearRampToValueAtTime(1, now + 0.01);
          } catch(e) {}
        }

     // ========================================
     //  Pattern Matrix Rendering
     // ========================================
    function renderPatternMatrix() {
      // In edit mode, show the pattern matrix: columns = steps, rows = pitch rows
      // Cells that are part of the current step pattern glow .seq-active
      var all = allCells;
      for (var i = 0; i < all.length; i++) {
        all[i].classList.remove('seq-active');
       }

      if (!editMode) return;

       // Highlight cells for current edit step only
      var currentNotes = seqSteps[currentEditStep];
        for (var n = 0; n < currentNotes.length; n++) {
          var nc = currentNotes[n];
          var idx = nc.r * COLS + nc.c;
          if (all[idx]) {
            all[idx].classList.add('seq-active');
              }
            }
         }

         // ========================================
         //  Misuse Mode — Feedback Loop Visuals (Batched)
         // ========================================
      var lastFeedbackVisualState = { active: false, gain: 0, cells: [] };
      var _feedbackVisualsTimer = null;
      var _feedbackVisualsPending = false;
      var _feedbackVisualsFrameBudget = 6;
      var _feedbackVisualsThrottleMs = 16;
      var _lastFeedbackVisualUpdate = 0;

      function updateFeedbackVisuals() {
        if (!misuseMode) return;

        var now = performance.now();
        if (now - _lastFeedbackVisualUpdate < _feedbackVisualsThrottleMs) {
          _feedbackVisualsPending = true;
          return;
          }
        _lastFeedbackVisualUpdate = now;

        var frameStart = now;
        var snap = getAllActiveVoicesSnapshot();
        var keys = Object.keys(snap);
        var activeIndices = [];

        for (var i = 0; i < keys.length; i++) {
          var s = snap[keys[i]];
          if (s && s.row !== undefined) {
            var ci = s.row * COLS + s.col;
            activeIndices.push(ci);
          }
         }

        var gainChanged = Math.abs(feedbackGainValue - lastFeedbackVisualState.gain) > 0.02;
        var prev = lastFeedbackVisualState.cells.slice();
        var cellsChanged = (activeIndices.length !== prev.length) || (function() {
          var sorted = activeIndices.slice().sort(function(a, b) { return a - b; });
          for (var k = 0; k < sorted.length; k++) if (sorted[k] !== prev[k]) return true;
          return false;
         })();

        if (!gainChanged && !cellsChanged) {
          if (_feedbackVisualsPending) {
            _feedbackVisualsPending = false;
            scheduleBatchedFeedbackUpdate();
            }
          return;
          }

        scheduleBatchedFeedbackUpdate();
       }

      function scheduleBatchedFeedbackUpdate() {
        if (_feedbackVisualsTimer) return;
        _feedbackVisualsTimer = requestAnimationFrame(applyBatchedFeedbackVisuals);
      }

      function applyBatchedFeedbackVisuals() {
        _feedbackVisualsTimer = null;
        _feedbackVisualsPending = false;

        var frameStart = performance.now();
        var snap = getAllActiveVoicesSnapshot();
        var keys = Object.keys(snap);
        var newIndices = [];

        for (var i = 0; i < keys.length; i++) {
          var s = snap[keys[i]];
          if (s && s.row !== undefined) {
            newIndices.push(s.row * COLS + s.col);
            }
          }

        var oldCells = lastFeedbackVisualState.cells.slice();
        newIndices.sort(function(a, b) { return a - b; });

        for (var r = 0; r < oldCells.length; r++) {
          var idx = oldCells[r];
          var found = false;
          for (var f = 0; f < newIndices.length; f++) if (newIndices[f] === idx) { found = true; break; }
          if (!found && allCells[idx]) {
            allCells[idx].classList.remove('feedback-active');
            allCells[idx].style.boxShadow = '';
           }
          }

        var intensity = Math.min(1, 0.4 + feedbackGainValue * 0.6);
        var domWrites = 0;
        var MAX_FB_WRITES = 10;

        for (var m = 0; m < newIndices.length; m++) {
          if (performance.now() - frameStart > _feedbackVisualsFrameBudget) {
            _feedbackVisualsTimer = requestAnimationFrame(applyBatchedFeedbackVisuals);
            return;
            }
          if (domWrites >= MAX_FB_WRITES) {
            _feedbackVisualsTimer = requestAnimationFrame(applyBatchedFeedbackVisuals);
            return;
            }

          var ci = newIndices[m];
          var cel = allCells[ci];
          if (!cel) continue;

          if (!cel.classList.contains('feedback-active')) cel.classList.add('feedback-active');
          cel.style.boxShadow =
             '0 0 ' + (22 + intensity * 20 | 0) + 'px rgba(244,63,94,' + (0.6 + intensity * 0.4).toFixed(2) + '),' +
             '0 0 ' + (40 + intensity * 40 | 0) + 'px rgba(168,85,247,' + (0.3 + intensity * 0.4).toFixed(2) + '),' +
             '0 0 ' + (75 + intensity * 35 | 0) + 'px rgba(99,102,241,' + (0.15 + intensity * 0.2).toFixed(2) + '),' +
             'inset 0 0 ' + (12 + intensity * 18 | 0) + 'px rgba(244,63,94,' + (0.2 + intensity * 0.3).toFixed(2) + ')';
          domWrites++;
           }

        lastFeedbackVisualState = { active: true, gain: feedbackGainValue, cells: newIndices.slice() };

        if (_feedbackVisualsPending) {
          _feedbackVisualsPending = false;
          scheduleBatchedFeedbackUpdate();
          }
       }

      function clearFeedbackVisuals() {
        for (var i = 0; i < allCells.length; i++) {
          allCells[i].classList.remove('feedback-active');
          allCells[i].style.boxShadow = '';
        }
        lastFeedbackVisualState = { active: false, gain: 0, cells: [] };
        feedbackIndicator.textContent = 'FEEDBACK OFF';
        feedbackIndicator.classList.remove('live');
        gridEl.classList.remove('misuse-mode');
        feedbackRing.classList.remove('live');
       }

       // ========================================
       //  Helper Functions
       // ========================================
    function getFrequency(row, col) {
      var degreeIdx = col % SCALE_DEGREES.length;
      var scaleSemitones = SCALE_DEGREES[degreeIdx];
      var octaveOffset = Math.floor(col / SCALE_DEGREES.length);
      return ROW_FREQS[row] * Math.pow(2, scaleSemitones / 12 + octaveOffset);
    }

    function noteName(row, col) {
      return NOTE_NAMES[col % NOTE_NAMES.length];
    }

     // ========================================
     //  Touch-Driven Pitch & Filter Mapping
     // ========================================
    function calcBentFrequency(baseFreq, xFrac) {
      var bendSemis = (xFrac - 0.5) * 2 * BEND_SEMITONES;
      return baseFreq * Math.pow(2, bendSemis / 12);
    }

    function calcModulatedCutoff(baseFreq, yFrac) {
      return baseFreq * CUTOFF_MOD_DEPTH * (1 + (1 - yFrac) * 2);
    }

    var _smoothing = new Float32Array(COLS);
    function calcAmplitude(row, col, force) {
      var rowFactor = 1 - (row / (ROWS - 1)) * 0.4;
      var colFactor = 0.8 + 0.2 * Math.sin(Math.PI * col / (COLS - 1));
      var baseAmp = 0.32 * rowFactor * colFactor;
      if (force !== undefined && force > 0 && force <= 1) {
        var raw = 0.15 + force * 0.85;
        var cube = raw * raw * (3 - 2 * raw);
        var prev = _smoothing[col];
        _smoothing[col] = prev * 0.7 + cube * 0.3;
        return baseAmp * _smoothing[col];
       }
      return baseAmp;
    }

    function getAntiAliasedParams(freq) {
      var nyquist = audioCtx.sampleRate * 0.5;
      var freqRatio = freq / nyquist;
      var maxQ = 3.8, minQ = 1.0, q;
      if (freqRatio > 0.12) {
        var t = Math.min(1, (freqRatio - 0.12) / 0.13);
        q = maxQ - (maxQ - minQ) * t;
       } else {
        q = maxQ;
       }
      var cutoffCeiling = nyquist * 0.38;
      var cutoff = Math.min(freq * 5, 10000, cutoffCeiling);
      return { q: Math.max(q, 0.5), cutoff: cutoff };
    }

     // ========================================
     //  Audio Context
     // ========================================
    function ensureAudio() { return audioCtx && audioCtxReady; }

    function buildSoftClipCurve() {
      var n = audioCtx.sampleRate * 2;
      var curve = new Float32Array(n);
      var threshold = 0.82;
      for (var i = 0; i < n; i++) {
        var x = (i / (n - 1)) * 2 - 1;
        if (Math.abs(x) < 0.01) {
          curve[i] = x;
         } else if (Math.abs(x) <= threshold) {
          curve[i] = x;
         } else {
          var t = (Math.abs(x) - threshold) / (1 - threshold);
          curve[i] = Math.sign(x) * (threshold + (1 - threshold) * (1 - Math.exp(-6 * t)));
         }
       }
      return curve;
    }

     // ========================================
     //  Voice: Oscillator → Filter → VCA → PreDelay → Master
     // ========================================
    function createVoice(freq, amplitude, isSeq, row, col) {
      if (!ensureAudio()) return null;
      var now = audioCtx.currentTime;
      var seqVol = isSeq ? 0.5 : 1;
      var vol = amplitude * seqVol;

      var aaParams = getAntiAliasedParams(freq);
      var osc = audioCtx.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = -3;
      var subOsc = audioCtx.createOscillator();
      subOsc.type = 'triangle'; subOsc.frequency.value = freq * 0.5; subOsc.detune.value = 0;
      var subGain = audioCtx.createGain();
      subGain.gain.value = 0.1;
      subOsc.connect(subGain);

      var filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.Q.value = aaParams.q;
      filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

      var lfo = audioCtx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 0.2;
      var lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq * 0.5;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);

      var vca = audioCtx.createGain();
      vca.gain.setValueAtTime(0, now);
      vca.gain.linearRampToValueAtTime(vol, now + 0.002);
      vca.gain.setValueAtTime(vol, now + 0.002);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.45, 0.001), now + 0.082);
      var p3Start = now + 0.082;
      vca.gain.setValueAtTime(Math.max(vol * 0.45, 0.001), p3Start);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.15, 0.001), p3Start + 0.52);
      var p4Start = p3Start + 0.52;
      vca.gain.setValueAtTime(Math.max(vol * 0.15, 0.001), p4Start);
      vca.gain.exponentialRampToValueAtTime(0.0001, p4Start + 1.2);

      osc.connect(filter);
      subGain.connect(filter);
      filter.connect(vca);
      vca.connect(preDelayNode);

      osc.start(now); subOsc.start(now); lfo.start(now);
      var stopTime = p4Start + 0.75;
      osc.stop(stopTime); subOsc.stop(stopTime); lfo.stop(stopTime);

      return {
        osc: osc, subOsc: subOsc, subGain: subGain, filter: filter, vca: vca, lfo: lfo, lfoGain: lfoGain,
        stopTime: stopTime, isSeq: !!isSeq, baseFreq: freq, baseRow: row || 0, baseCol: col || 0,
        birthTime: now, decayPhase: 0, glowIntensity: 1, filterCutoff: Math.min(freq * 3, aaParams.cutoff)
        };
      }

    function createScheduledVoice(freq, amplitude, isSeq, playTime) {
      if (!ensureAudio()) return null;
      var t0 = Math.max(playTime, audioCtx.currentTime);
      var seqVol = isSeq ? 0.5 : 1;
      var vol = amplitude * seqVol;

      var aaParams = getAntiAliasedParams(freq);
      var osc = audioCtx.createOscillator();
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = -3;
      var subOsc = audioCtx.createOscillator();
      subOsc.type = 'triangle'; subOsc.frequency.value = freq * 0.5; subOsc.detune.value = 0;
      var subGain = audioCtx.createGain();
      subGain.gain.value = 0.1;
      subOsc.connect(subGain);

      var filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.Q.value = aaParams.q;
      filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

      var lfo = audioCtx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 0.2;
      var lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq * 0.5;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);

      var vca = audioCtx.createGain();
      vca.gain.setValueAtTime(0, t0);
      vca.gain.linearRampToValueAtTime(vol, t0 + 0.002);
      vca.gain.setValueAtTime(vol, t0 + 0.002);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
      vca.gain.setValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
      vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
      vca.gain.setValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
      vca.gain.exponentialRampToValueAtTime(0.0005, t0 + 1.167);

      osc.connect(filter);
      subGain.connect(filter);
      filter.connect(vca);
      vca.connect(preDelayNode);

      osc.start(t0); subOsc.start(t0); lfo.start(t0);
      var stopTime = t0 + 1.22;
      osc.stop(stopTime); subOsc.stop(stopTime); lfo.stop(stopTime);

      return {
        osc: osc, subOsc: subOsc, subGain: subGain, filter: filter, vca: vca, lfo: lfo, lfoGain: lfoGain,
        stopTime: stopTime, isSeq: !!isSeq, baseFreq: freq, baseRow: 0, baseCol: 0
       };
    }

     // ========================================
     //  Touch-Driven Voice Update
     // ========================================
    var _lastTouchUpdateTs = 0;
    function updateVoiceWithTouch(voice, baseFreq, row, col, xFrac, yFrac, force) {
      if (!voice) return;
      var touchTs = performance.now();
      var latencySinceLast = touchTs - _lastTouchUpdateTs;
      LatencyGuard.check(latencySinceLast, voice);
      _lastTouchUpdateTs = touchTs;
      var now = audioCtx.currentTime;

      var bentFreq = calcBentFrequency(baseFreq, xFrac);
      var modCutoff = calcModulatedCutoff(baseFreq, yFrac);
      var aaParams = getAntiAliasedParams(bentFreq);
      var finalCutoff = Math.min(modCutoff, aaParams.cutoff);
      var guardResult = computeDriftGuardedQ(bentFreq, finalCutoff, bentFreq * 0.5);
      var safeQ = guardResult.q;
      var amp = calcAmplitude(row, col, force);

      voice.osc.frequency.setTargetAtTime(bentFreq, now, 0.003);
      voice.subOsc.frequency.setTargetAtTime(bentFreq * 0.5, now, 0.003);
      voice.filter.frequency.setTargetAtTime(finalCutoff, now, 0.005);
      voice.filter.Q.setTargetAtTime(safeQ, now, 0.008);
      voice.lfoGain.gain.setTargetAtTime(bentFreq * 0.5, now, 0.005);
      voice.vca.gain.setTargetAtTime(amp, now, 0.001);
      var audioT = performance.now();
      LatencyProfiler.recordMove(touchTs, audioT);
          }

    function updateVoice(voice, freq, amplitude) {
      if (!voice) return;
      var now = audioCtx.currentTime;
      var aaParams = getAntiAliasedParams(freq);

    var SignalGraph = (function() {

            filterFreq += v.filter.frequency.value;
            filterQ += v.filter.Q.value;
            vcaGain += v.vca.gain.value;

          var rA3 = (0.05 + ringIntensity * 0.1).toFixed(3);
          var rAI = (0.05 + ringIntensity * 0.12).toFixed(3);
          feedbackRing.style.boxShadow =
            '0 0 ' + rBlur1 + 'px rgba(244,63,94,' + rA1 + '),' +
           '0 0 ' + rBlur2 + 'px rgba(244,63,94,' + rA2 + '),' +
            '0 0 ' + rBlur3 + 'px rgba(168,85,247,' + rA3 + '),' +
           'inset 0 0 ' + rBlurI + 'px rgba(244,63,94,' + rAI + ')';
         }
          } else if (!misuseMode && lastFeedbackVisualState.active) {
          clearFeedbackVisuals();
          }

       var glowIntensity = Math.min(1, prevSignalLevel * 3.5);

      if (Math.abs(glowIntensity - lastGlowIntensity) < 0.015) {
        requestAnimationFrame(audioVisualLoop);
        return;
        }
      lastGlowIntensity = glowIntensity;

       // Grid-level glow reactive to signal
      var baseGlow = 0.04;
      var glowBoost = glowIntensity * 0.08;
      var deepGlow = 0.025 + glowIntensity * 0.04;
      var outerGlow = 0.015 + glowIntensity * 0.03;
      var insetGlow = glowIntensity * 0.18;
      var gBlur1 = 55 + glowIntensity * 50 | 0;
      var gBlur2 = 130 + glowIntensity * 90 | 0;
      var gBlur3 = 200 + glowIntensity * 60 | 0;
      var gBlurI = 35 + glowIntensity * 35 | 0;

      gridEl.style.boxShadow =
            '0 0 ' + gBlur1 + 'px rgba(99,102,241,' + (baseGlow + glowBoost).toFixed(3) + '),' +
            '0 0 ' + gBlur2 + 'px rgba(99,102,241,' + deepGlow.toFixed(3) + '),' +
            '0 0 ' + gBlur3 + 'px rgba(168,85,247,' + outerGlow.toFixed(3) + '),' +
            'inset 0 0 ' + gBlurI + 'px rgba(168,85,247,' + insetGlow.toFixed(3) + ')';

      var colorFactor = Math.min(1, smoothedHigh * 2.5);
      var numCells = allCells.length;
      var domWritesThisFrame = 0;
      var MAX_DOM_WRITES = 12;

      for (var ci = 0; ci < numCells; ci++) {
        var frameElapsed = performance.now() - _frameStart;
        if (frameElapsed > _frameBudgetMs) {
          requestAnimationFrame(audioVisualLoop);
          return;
        }

        var cell = allCells[ci];

          // Skip feedback-active cells during misuse mode — CSS animation drives them
         if (cell.classList.contains('feedback-active')) continue;

         var isActive = cell.classList.contains('active');

         if (isActive) {
          var breathe = Math.sin(lfoPhase + cellMeta[ci].row * 1.1) * 0.15 + 0.85;
          var cellGlow = Math.min(1, (glowIntensity + 0.3) * breathe);
          if (Math.abs(cellGlow - cellLastGlow[ci]) < 0.02) continue;
          cellLastGlow[ci] = cellGlow;

          if (domWritesThisFrame >= MAX_DOM_WRITES) {
            requestAnimationFrame(audioVisualLoop);
            return;
          }

          var innerR = 99 + colorFactor * 93 | 0;
          var innerG = 102 + colorFactor * 31 | 0;
          var innerB = 241 + colorFactor * 14 | 0;
          var violetR = 168 + colorFactor * 40 | 0;
          var violetG = 85 + colorFactor * 60 | 0;
          var violetB = 247 + colorFactor * 8 | 0;

          var blur1 = 20 + cellGlow * 25 | 0;
          var blur2 = 45 + cellGlow * 40 | 0;
          var blur3 = 75 + cellGlow * 50 | 0;
          var blur4 = 110 + cellGlow * 40 | 0;
          var iBlur1 = 10 + cellGlow * 16 | 0;
          var iBlur2 = 28 + cellGlow * 25 | 0;

          cell.style.background = 'rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.45 + cellGlow * 0.35).toFixed(2) + ')';
          cell.style.borderColor = 'rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.6 + cellGlow * 0.4).toFixed(2) + ')';
          cell.style.boxShadow =
               '0 0 ' + blur1 + 'px rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.7 + cellGlow * 0.3).toFixed(2) + '),' +
               '0 0 ' + blur2 + 'px rgba(' + innerR + ',' + innerG + ',' + innerB + ',' + (0.35 + cellGlow * 0.25).toFixed(2) + '),' +
               '0 0 ' + blur3 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.18 + cellGlow * 0.2).toFixed(2) + '),' +
               '0 0 ' + blur4 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.06 + cellGlow * 0.1).toFixed(2) + '),' +
               'inset 0 0 ' + iBlur1 + 'px rgba(' + (violetR + 24) + ',' + (violetG + 47) + ',' + (violetB + 8) + ',' + (0.4 + cellGlow * 0.35).toFixed(2) + '),' +
               'inset 0 0 ' + iBlur2 + 'px rgba(' + violetR + ',' + violetG + ',' + violetB + ',' + (0.15 + cellGlow * 0.25).toFixed(2) + ')';
          domWritesThisFrame++;

          } else {
          var row = cellMeta[ci].row;
          var reactive = Math.sin(lfoPhase + row * 0.7) * 0.5 + 0.5;
          var edgeGlow = glowIntensity * reactive * 1.4;
          if (Math.abs(edgeGlow - cellLastGlow[ci]) < 0.02) continue;
          cellLastGlow[ci] = edgeGlow;

          if (domWritesThisFrame >= MAX_DOM_WRITES) {
            requestAnimationFrame(audioVisualLoop);
            return;
          }

          if (edgeGlow > 0.03) {
            cell.style.borderColor = 'rgba(99,102,241,' + (0.06 + edgeGlow * 0.18).toFixed(3) + ')';
            cell.style.boxShadow = '0 0 ' + (5 + edgeGlow * 10 | 0) + 'px rgba(99,102,241,' + (edgeGlow * 0.09).toFixed(3) + ')';
            domWritesThisFrame++;
            } else {
            cell.style.borderColor = '';
            cell.style.boxShadow = '';
            }
          }
        }

      requestAnimationFrame(audioVisualLoop);
     }
    requestAnimationFrame(audioVisualLoop);

     // ========================================
     //  Init
     // ========================================
     function init() {
        buildStepIndicators();
        buildGrid();
        PerfMonitor.start();
        SignalGraph.init();
        ProfilerHUD.init();

         // Invalidate rect cache on resize
      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        invalidateRectCache();
        resizeTimer = setTimeout(resizeGrid, 80);
         }, { passive: true });
      if (window.matchMedia) {
        window.matchMedia('(orientation: portrait)').addEventListener('change', function() {
          invalidateRectCache(); resizeGrid();
         });
        window.matchMedia('(orientation: landscape)').addEventListener('change', function() {
          invalidateRectCache(); resizeGrid();
         });
         }

         // Stress test keyboard shortcut: Ctrl+Alt+S
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.altKey && e.key === 's') {
          e.preventDefault();
          getAudioCtxPromise().then(function() {
            if (ensureAudio()) StressTest.start();
             });
            return;
           }
         if (e.key === 'q' && e.shiftKey) {
          e.preventDefault();
          document.getElementById('tempo-slider').focus();
          return;
          }
         if (e.key !== 'F5' && e.key !== 'F12') launch();
      });

         // Dev-mode: expose stress test to console
      if (window.location.hash.indexOf('stress') >= 0) {
        setTimeout(function() {
          getAudioCtxPromise().then(function() {
            if (ensureAudio()) StressTest.start();
             });
          }, 2000);
          }

      if (!Element.prototype.closest) {
        Element.prototype.closest = function(s) {
          var el = this;
          var matchesFn = Element.prototype.matches || Element.prototype.msMatchesSelector;
          do {
            if (matchesFn.call(el, s)) return el;
            el = el.parentElement || el.parentNode;
            } while (el !== null && el.nodeType === 1);
          return null;
          };
         }
      }

    init();
})();
</script>
