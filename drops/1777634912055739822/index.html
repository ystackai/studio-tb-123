<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Open Circuit — Dark Stage, Bright Performer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #010108;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
      }
      #stage {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 25% 40% at 50% 25%, rgba(99,102,241,0.03) 0%, transparent 70%),
          radial-gradient(ellipse 80% 100% at 50% 50%, #010108 0%, #000005 100%);
      }
      #header { position: absolute; top: 0; left: 0; right: 0; text-align: center; padding: 1rem 1rem 0.5rem; z-index: 10; }
      #header h1 { font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.85); text-shadow: 0 0 20px rgba(99,102,241,0.6); }
      #header p { font-size: 0.7rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; margin-top: 0.15rem; }
      #grid-container { position: relative; z-index: 5; }
      #grid {
        display: grid; gap: 5px; padding: 10px; border-radius: 14px;
        background: rgba(8,8,18,0.9); border: 1px solid rgba(99,102,241,0.06);
        box-shadow: 0 0 80px rgba(99,102,241,0.03), 0 0 200px rgba(99,102,241,0.02), inset 0 0 60px rgba(0,0,10,0.6);
        will-change: transform;
      }
      .cell {
        position: relative; border-radius: 7px;
        background: rgba(12,12,24,0.9); border: 1px solid rgba(99,102,241,0.04);
        transition: background 0.04s, border-color 0.04s, box-shadow 0.04s; cursor: pointer; will-change: background, box-shadow;
      }
      .cell:active, .cell.active {
        background: rgba(99,102,241,0.55); border-color: rgba(168,85,247,0.9);
        box-shadow: 0 0 20px rgba(99,102,241,0.8), 0 0 50px rgba(99,102,241,0.4), 0 0 90px rgba(168,85,247,0.2), inset 0 0 12px rgba(192,132,255,0.5), inset 0 0 30px rgba(168,85,247,0.25);
      }
      @keyframes cellGlow {
        0%, 100% { box-shadow: 0 0 14px rgba(99,102,241,0.6), 0 0 40px rgba(99,102,241,0.3), inset 0 0 8px rgba(168,85,247,0.3); }
        50% { box-shadow: 0 0 28px rgba(99,102,241,1), 0 0 70px rgba(99,102,241,0.6), 0 0 110px rgba(168,85,247,0.3), inset 0 0 16px rgba(192,132,255,0.6), inset 0 0 40px rgba(168,85,247,0.35); }
      }
      .cell.active { animation: cellGlow 0.9s ease-in-out infinite; }
      .cell.signal-glow {
        background: rgba(99,102,241,0.2);
        box-shadow: 0 0 8px rgba(99,102,241,0.3), inset 0 0 4px rgba(168,85,247,0.15);
      }
      .cell-label {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 0.55rem; font-weight: 600; color: rgba(255,255,255,0.15); pointer-events: none; transition: color 0.1s;
      }
      .cell.active .cell-label { color: rgba(255,255,255,0.8); }
      #hint {
        position: absolute; bottom: 12%; text-align: center; font-size: 0.75rem;
        color: rgba(255,255,255,0.25); letter-spacing: 0.05em; z-index: 10; pointer-events: none; transition: opacity 0.5s;
      }
      #hint.hidden { opacity: 0; }
      #params {
        position: absolute; bottom: 2%; display: flex; gap: 1.5rem; z-index: 10;
        color: rgba(255,255,255,0.3); font-size: 0.65rem; letter-spacing: 0.05em;
      }
      #params span { display: flex; align-items: center; gap: 0.3rem; }
      #params .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(99,102,241,0.5); }
      #params .dot.live { background: #6366f1; box-shadow: 0 0 6px rgba(99,102,241,0.6); }

      @media (max-width: 600px) {
        #grid { gap: 3px; padding: 6px; }
      }
    </style>
</head>
<body>
    <div id="stage">
      <div id="header">
        <h1>Open Circuit</h1>
        <p>Browser as stage · Grid as instrument</p>
      </div>
      <div id="grid-container">
        <div id="grid"></div>
      </div>
      <div id="hint">Touch the grid to play</div>
      <div id="params">
        <span><div class="dot" id="dot-lfo"></div> LFO</span>
        <span><div class="dot" id="dot-decay"></div> Decay</span>
        <span><div class="dot" id="dot-filter"></div> Filter</span>
      </div>
    </div>

    <script>
(function() {
    'use strict';

    // ========================================
    //  Audio Context & Signal Chain
    // ========================================

    let audioCtx = null;
    let masterGain = null;
    let analyser = null;
    let analyserData = null;
    let preDelay = null;
    let limiter = null;

    // Active voice map: cellIndex -> { osc, subOsc, filter, vca, lfo, lfoGain }
    const activeVoices = {};

    // Grid: 5 rows x 8 columns
    const ROWS = 5;
    const COLS = 8;

    // Major triad scale degrees (C major: C, D, E, G, A)
    const SCALE_DEGREES = [0, 2, 4, 7, 9];
    const NOTE_NAMES = ['C', 'D', 'E', 'G', 'A'];

    // Base frequencies tuned for warm woody range
    const ROW_FREQS = [130.81, 196.00, 261.63, 392.00, 523.25];

    // Major triad default pattern: C4, E4, G4, with passing tones
    const TRIAD_NOTES = [
      { r: 2, c: 0 }, // C4 (root)
      { r: 2, c: 2 }, // E4 (third)
      { r: 2, c: 3 }, // G4 (fifth)
      { r: 2, c: 2 }, // E4 (passing down)
      { r: 2, c: 0 }, // C4 (passing down)
      { r: 2, c: 4 }, // A4 (passing up)
      { r: 2, c: 3 }, // G4 (fall back)
      { r: 2, c: 2 }, // E4 (resolve)
    ];

    function getFrequency(row, col) {
      const degreeIdx = col % SCALE_DEGREES.length;
      const scaleSemitones = SCALE_DEGREES[degreeIdx];
      const octaveOffset = Math.floor(col / SCALE_DEGREES.length);
      return ROW_FREQS[row] * Math.pow(2, scaleSemitones / 12 + octaveOffset);
    }

    function noteName(row, col) {
      return NOTE_NAMES[col % NOTE_NAMES.length];
    }

    // ========================================
    //  Initialize Audio Context
    // ========================================

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Tight pre-delay: 1.5ms so signal hits immediately
        preDelay = audioCtx.createDelay(0.02);
        preDelay.delayTime.value = 0.0015;

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;

        // Hard limiter curve via WaveShaper: prevents clipping at resonance peak
        limiter = audioCtx.createWaveShaper();
        limiter.curve = buildSoftClipCurve();
        limiter.oversample = '4x';

        // Compressor for headroom
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.value = -8;
        compressor.knee.value = 10;
        compressor.ratio.value = 8;
        compressor.attack.value = 0.002;
        compressor.release.value = 0.04;

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.75;
        analyserData = new Uint8Array(analyser.frequencyBinCount);

        // Chain: preDelay -> masterGain -> softClip -> compressor -> analyser -> destination
        preDelay.connect(masterGain);
        masterGain.connect(limiter);
        limiter.connect(compressor);
        compressor.connect(analyser);
        analyser.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // Soft clipping curve: singing harmonic just below clipping threshold
    function buildSoftClipCurve() {
      const n = audioCtx.sampleRate * 2;
      const curve = new Float32Array(n);
      const threshold = 0.82;
      for (let i = 0; i < n; i++) {
        const x = (i / (n - 1)) * 2 - 1;
        if (Math.abs(x) < 0.01) {
          curve[i] = x;
        } else if (Math.abs(x) <= threshold) {
          curve[i] = x;
        } else {
          const t = (Math.abs(x) - threshold) / (1 - threshold);
          curve[i] = Math.sign(x) * (threshold + (1 - threshold) * (1 - Math.exp(-6 * t)));
        }
      }
      return curve;
    }

    // ========================================
    //  Voice: Oscillator → Filter → VCA → PreDelay → Master
    // ========================================

    function createVoice(freq, amplitude) {
      ensureAudio();
      const now = audioCtx.currentTime;

      // Main oscillator: sawtooth for harmonic richness (woody character)
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = -3; // slight flatness for warmth

      // Sub oscillator: triangle, one octave down, quiet for body
      const subOsc = audioCtx.createOscillator();
      subOsc.type = 'triangle';
      subOsc.frequency.value = freq * 0.5;
      subOsc.detune.value = 0;

      const subGain = audioCtx.createGain();
      subGain.gain.value = 0.1;
      subOsc.connect(subGain);

      // Filter: lowpass with resonance singing just below clipping
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.Q.value = 3.8; // singing harmonic, below screech threshold
      filter.frequency.value = Math.min(freq * 5, 10000);

      // Slow LFO modulating filter cutoff for harmonic movement
      // 0.2Hz = 5s period, very slow organic drift
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.2;

      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = freq * 0.5; // LFO depth scales with note pitch

      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);

      // VCA: Amplitude envelope — woody, breathing, NOT ringing
      const vca = audioCtx.createGain();

      // Attack: tight 2ms for key-strike feel
      vca.gain.setValueAtTime(0, now);
      vca.gain.linearRampToValueAtTime(amplitude, now + 0.002);

      // Decay: woody and breathing
      // Phase 1: quick initial drop (percussive attack)
      vca.gain.exponentialRampToValueAtTime(amplitude * 0.45, now + 0.08);
      // Phase 2: long slow breath tail
      vca.gain.exponentialRampToValueAtTime(amplitude * 0.15, now + 0.6);
      // Phase 3: gentle release to near-zero
      vca.gain.exponentialRampToValueAtTime(amplitude * 0.02, now + 1.8);

      // Signal path: Osc → Filter → VCA → PreDelay → Master
      osc.connect(filter);
      subGain.connect(filter);
      filter.connect(vca);
      vca.connect(preDelay);

      osc.start(now);
      subOsc.start(now);
      lfo.start(now);

      // Auto-stop after full tail
      const stopTime = now + 2.5;
      osc.stop(stopTime);
      subOsc.stop(stopTime);
      lfo.stop(stopTime);

      return { osc, subOsc, filter, vca, lfo, lfoGain, stopTime };
    }

    function updateVoice(voice, freq, amplitude) {
      if (!voice) return;
      const now = audioCtx.currentTime;
      voice.osc.frequency.setTargetAtTime(freq, now, 0.004);
      voice.subOsc.frequency.setTargetAtTime(freq * 0.5, now, 0.004);
      voice.filter.frequency.setTargetAtTime(Math.min(freq * 5, 10000), now, 0.006);
      voice.vca.gain.setTargetAtTime(amplitude, now, 0.002);
    }

    function killVoice(cellIndex) {
      const v = activeVoices[cellIndex];
      if (!v) return;
      const now = audioCtx.currentTime;
      try {
        v.vca.gain.cancelScheduledValues(now);
        v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
        v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        const stopT = now + 0.35;
        v.osc.stop(stopT);
        v.subOsc.stop(stopT);
        v.lfo.stop(stopT);
      } catch(e) {}
      delete activeVoices[cellIndex];
    }

    // ========================================
    //  Grid UI
    // ========================================

    const gridEl = document.getElementById('grid');
    const allCells = [];

    function buildGrid() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const maxW = Math.min(vw * 0.85, 600);
      const cellW = Math.floor((maxW - (COLS + 1) * 4) / COLS);
      const cellH = cellW * 0.78;

      const totalH = ROWS * cellH + (ROWS + 1) * 4;
      const maxH = vh * 0.65;
      const scaleFactor = Math.min(1, maxH / totalH);

      const finalCellW = Math.round(cellW * scaleFactor);
      const finalCellH = Math.round(cellH * scaleFactor);

      gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', ' + finalCellW + 'px)';
      gridEl.style.gridTemplateRows = 'repeat(' + ROWS + ', ' + finalCellH + 'px)';

      gridEl.innerHTML = '';
      allCells.length = 0;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const idx = r * COLS + c;
          const el = document.createElement('div');
          el.className = 'cell';
          el.dataset.index = idx;
          el.dataset.row = r;
          el.dataset.col = c;

          const label = document.createElement('span');
          label.className = 'cell-label';
          label.textContent = noteName(r, c);
          el.appendChild(label);

          gridEl.appendChild(el);
          allCells.push(el);
        }
      }
    }

    // ========================================
    //  Touch / Mouse Input
    // ========================================

    let touchStartTime = 0;
    let hintEl = document.getElementById('hint');
    let firstTouch = true;

    function getCellFromEvent(e) {
      const target = e.target || (e.touches && e.touches[0] && e.touches[0].target);
      if (!target) return null;
      const cell = (target.closest && target.closest('.cell')) || target;
      if (!cell.classList || !cell.classList.contains('cell')) return null;
      return cell;
    }

    function getAmplitudeFromPosition(r, c) {
      const rowFactor = 1 - (r / (ROWS - 1)) * 0.4;
      const colFactor = 0.8 + 0.2 * Math.sin(Math.PI * c / (COLS - 1));
      return 0.32 * rowFactor * colFactor;
    }

    let dragVoice = null;
    let dragCellIndex = -1;
    let mouseDown = false;

    function showLiveDots() {
      const dotLfo = document.getElementById('dot-lfo');
      const dotDecay = document.getElementById('dot-decay');
      const dotFilter = document.getElementById('dot-filter');
      if (dotLfo) dotLfo.classList.add('live');
      if (dotDecay) dotDecay.classList.add('live');
      if (dotFilter) dotFilter.classList.add('live');
    }

    function clearLiveDotsIfIdle() {
      const hasDrag = !!dragVoice;
      const hasVoices = Object.keys(activeVoices).length > 0;
      if (!hasDrag && !hasVoices) {
        const dotLfo = document.getElementById('dot-lfo');
        const dotDecay = document.getElementById('dot-decay');
        const dotFilter = document.getElementById('dot-filter');
        if (dotLfo) dotLfo.classList.remove('live');
        if (dotDecay) dotDecay.classList.remove('live');
        if (dotFilter) dotFilter.classList.remove('live');
      }
    }

    function hitCell(cell) {
      const r = parseInt(cell.dataset.row);
      const c = parseInt(cell.dataset.col);
      const idx = parseInt(cell.dataset.index);
      const freq = getFrequency(r, c);
      const amp = getAmplitudeFromPosition(r, c);

      if (firstTouch) {
        firstTouch = false;
        if (hintEl) hintEl.classList.add('hidden');
      }

      // During drag: morph the single drag voice
      if (dragVoice) {
        if (idx !== dragCellIndex) {
          if (allCells[dragCellIndex]) allCells[dragCellIndex].classList.remove('active');
          dragCellIndex = idx;
        }
        cell.classList.add('active');
        updateVoice(dragVoice, freq, amp);
        return;
      }

      // Single tap: create or update cell voice
      cell.classList.add('active');
      showLiveDots();

      if (activeVoices[idx]) {
        updateVoice(activeVoices[idx], freq, amp);
        return;
      }

      const voice = createVoice(freq, amp);
      activeVoices[idx] = voice;
    }

    function releaseCell() {
      if (dragVoice) {
        if (dragCellIndex >= 0 && allCells[dragCellIndex]) {
          allCells[dragCellIndex].classList.remove('active');
        }
        const v = dragVoice;
        dragVoice = null;
        dragCellIndex = -1;
        if (v && audioCtx) {
          const now = audioCtx.currentTime;
          try {
            v.vca.gain.cancelScheduledValues(now);
            v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
            v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            const stopT = now + 0.65;
            v.osc.stop(stopT);
            v.subOsc.stop(stopT);
            v.lfo.stop(stopT);
          } catch(e) {}
        }
        clearLiveDotsIfIdle();
        return;
      }
      clearLiveDotsIfIdle();
    }

      // Touch handlers
    function handleTouchStart(e) {
      e.preventDefault();
      ensureAudio();
      startSequenceOnInteraction();
      touchStartTime = performance.now();

      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const cell = el && el.closest && el.closest('.cell');
        if (cell) {
          const idx = parseInt(cell.dataset.index);
          dragVoice = null;
          dragCellIndex = -1;

          if (activeVoices[idx]) {
            dragVoice = activeVoices[idx];
            dragCellIndex = idx;
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            updateVoice(dragVoice, getFrequency(r, c), getAmplitudeFromPosition(r, c));
           } else {
            dragVoice = createVoice(
              getFrequency(parseInt(cell.dataset.row), parseInt(cell.dataset.col)),
              getAmplitudeFromPosition(parseInt(cell.dataset.row), parseInt(cell.dataset.col))
             );
            dragCellIndex = idx;
            delete activeVoices[idx];
           }
          cell.classList.add('active');
          showLiveDots();
         }
       }
     }

    function handleTouchMove(e) {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const cell = el && el.closest && el.closest('.cell');
        if (cell) hitCell(cell);
       }
     }

    function handleTouchEnd(e) {
      e.preventDefault();
      releaseCell();
     }

    gridEl.addEventListener('touchstart', handleTouchStart, { passive: false });
    gridEl.addEventListener('touchmove', handleTouchMove, { passive: false });
    gridEl.addEventListener('touchend', handleTouchEnd, { passive: false });
    gridEl.addEventListener('touchcancel', handleTouchEnd, { passive: false });

     // Mouse handlers
    gridEl.addEventListener('mousedown', function(e) {
      e.preventDefault();
      ensureAudio();
      startSequenceOnInteraction();
      mouseDown = true;
      const cell = getCellFromEvent(e);
      if (cell) {
        const idx = parseInt(cell.dataset.index);
        dragVoice = null;
        dragCellIndex = -1;

        if (activeVoices[idx]) {
          dragVoice = activeVoices[idx];
          dragCellIndex = idx;
          const r = parseInt(cell.dataset.row);
          const c = parseInt(cell.dataset.col);
          updateVoice(dragVoice, getFrequency(r, c), getAmplitudeFromPosition(r, c));
         } else {
          dragVoice = createVoice(
            getFrequency(parseInt(cell.dataset.row), parseInt(cell.dataset.col)),
            getAmplitudeFromPosition(parseInt(cell.dataset.row), parseInt(cell.dataset.col))
           );
          dragCellIndex = idx;
          delete activeVoices[idx];
         }
        cell.classList.add('active');
        showLiveDots();
       }
     });

    gridEl.addEventListener('mousemove', function(e) {
      if (!mouseDown) return;
      const cell = getCellFromEvent(e);
      if (cell) hitCell(cell);
     });

    gridEl.addEventListener('mouseup', function() {
      releaseCell();
      mouseDown = false;
     });

    gridEl.addEventListener('mouseleave', function() {
      if (mouseDown) releaseCell();
      mouseDown = false;
     });

    // ========================================
    //  Audio-Reactive Visual Loop
    // ========================================

    let lfoPhase = 0;
    let prevSignalLevel = 0;

    function audioVisualLoop() {
      lfoPhase += 0.03;

      let signalLevel = 0;
      if (analyser && analyserData) {
        analyser.getByteFrequencyData(analyserData);
        let sum = 0;
        for (let i = 0; i < analyserData.length; i++) {
          sum += analyserData[i];
        }
        signalLevel = sum / (analyserData.length * 255);
      }

      prevSignalLevel = prevSignalLevel * 0.7 + signalLevel * 0.3;

      const lfoBrightness = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(lfoPhase));
      const dotLfo = document.getElementById('dot-lfo');
      if (dotLfo && dotLfo.classList.contains('live')) {
        dotLfo.style.opacity = lfoBrightness.toFixed(2);
      }

      const dotDecay = document.getElementById('dot-decay');
      if (dotDecay && dotDecay.classList.contains('live')) {
        const decayPulse = Math.min(1, prevSignalLevel * 4);
        dotDecay.style.transform = 'scale(' + (0.8 + decayPulse * 0.4) + ')';
        dotDecay.style.filter = 'brightness(' + (0.8 + decayPulse) + ')';
      }

      const dotFilter = document.getElementById('dot-filter');
      if (dotFilter && dotFilter.classList.contains('live')) {
        let highSum = 0;
        const startBin = Math.floor(analyserData.length * 0.5);
        for (let i = startBin; i < analyserData.length; i++) {
          highSum += analyserData[i];
        }
        const highLevel = highSum / ((analyserData.length - startBin) * 255);
        dotFilter.style.transform = 'scale(' + (0.8 + highLevel * 3) + ')';
      }

      if (prevSignalLevel > 0.02) {
        const glowIntensity = Math.min(1, prevSignalLevel * 3);
        gridEl.style.boxShadow =
          '0 0 ' + (60 + glowIntensity * 40) + 'px rgba(99,102,241,' + (0.03 + glowIntensity * 0.07).toFixed(3) + '),' +
          '0 0 ' + (150 + glowIntensity * 80) + 'px rgba(99,102,241,' + (0.02 + glowIntensity * 0.05).toFixed(3) + '),' +
          'inset 0 0 ' + (40 + glowIntensity * 30) + 'px rgba(168,85,247,' + (glowIntensity * 0.15).toFixed(3) + ')';
      }

      requestAnimationFrame(audioVisualLoop);
    }
    audioVisualLoop();

    // ========================================
    //  Default Sequence: Major Triad Passing
    // ========================================

    let sequencerRunning = false;
    let seqInterval = null;
    let seqStep = 0;

    // Major triad passing: C-E-G-A in C major with resolving harmony
    // Uses row 2 (C4 octave) with scale degrees mapping to triad tones
    const seqPattern = [
      { r: 2, c: 0 },  // C4 - root
      { r: 2, c: 2 },  // E4 - third (up)
      { r: 2, c: 3 },  // G4 - fifth (up)
      { r: 2, c: 4 },  // A4 - passing tone up
      { r: 2, c: 3 },  // G4 - descent
      { r: 2, c: 2 },  // E4 - descent
      { r: 2, c: 0 },  // C4 - resolve home
      { r: 2, c: 2 },  // E4 - re-engage third
      { r: 2, c: 3 },  // G4 - climb
      { r: 1, c: 0 },  // C3 - octave drop (warm bass)
      { r: 2, c: 0 },  // C4 - return
      { r: 2, c: 2 },  // E4 - final cadence
    ];

    function startSequence() {
      ensureAudio();
      sequencerRunning = true;
      seqStep = 0;

      function tick() {
        if (!sequencerRunning) return;

        const step = seqPattern[seqStep % seqPattern.length];
        const idx = step.r * COLS + step.c;
        const cell = allCells[idx];
        if (cell) {
          const freq = getFrequency(step.r, step.c);
          const amp = getAmplitudeFromPosition(step.r, step.c);
          cell.classList.add('active');
          const voice = createVoice(freq, amp * 0.55);
          seqStep++;
          seqInterval = setTimeout(tick, 380);

          // Visual: fade out after decay
          setTimeout(function() {
            if (cell) cell.classList.remove('active');
          }, 800);
        }
      }

      tick();
    }

    function stopSequence() {
      sequencerRunning = false;
      if (seqInterval) {
        clearTimeout(seqInterval);
        seqInterval = null;
      }
      seqStep = 0;

      // Kill any sequence-triggered voices
      for (const idx in activeVoices) {
        killVoice(parseInt(idx));
      }
    }

    // ========================================
    //  Start sequence on first user interaction
    // ========================================

    let sequenceStarted = false;

    function startSequenceOnInteraction() {
      if (!sequenceStarted) {
        sequenceStarted = true;
        startSequence();
      }
    }

      // ========================================
      //  Init
      // ========================================

    function init() {
      buildGrid();

      let resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(buildGrid, 200);
      });

      // Polyfill closest
      if (!Element.prototype.closest) {
        Element.prototype.closest = function(s) {
          var el = this;
          var matchesFn = Element.prototype.matches || Element.prototype.msMatchesSelector;
          do {
            if (matchesFn.call(el, s)) return el;
            el = el.parentElement || el.parentNode;
          } while (el !== null && el.nodeType === 1);
          return null;
        };
      }
    }

    init();
})();
    </script>
</body>
