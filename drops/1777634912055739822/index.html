<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Open Circuit</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #010108;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
}
#stage {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease-out;
  background:
    radial-gradient(ellipse 35% 45% at 50% 20%, rgba(99,102,241,0.06) 0%, rgba(99,102,241,0.02) 40%, transparent 70%),
    radial-gradient(ellipse 70% 80% at 50% 60%, rgba(168,85,247,0.015) 0%, transparent 60%),
    radial-gradient(ellipse 90% 100% at 50% 50%, #010108 0%, #000003 100%);
}
#stage.visible { opacity: 1; }

/* Hero-stage container — locks layout for screenshot at all sizes */
#grid-wrap {
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#grid {
  display: grid; gap: var(--grid-gap, 5px); padding: var(--grid-pad, 12px); border-radius: var(--grid-radius, 14px);
  background: rgba(6,6,15,0.95);
  border: var(--grid-border, 1px) solid rgba(99,102,241,0.08);
  box-shadow:
      0 0 60px rgba(99,102,241,0.04),
      0 0 120px rgba(99,102,241,0.025),
      0 0 200px rgba(99,102,241,0.015),
    inset 0 0 40px rgba(0,0,10,0.5);
  will-change: transform, box-shadow;
  transition: box-shadow 0.15s ease-out;
  transform-origin: center center;
}

/* Responsive breakpoints — CSS-driven, no JS resize thrash */
@media (max-width: 480px) {
  #grid {
    --grid-gap: 3px; --grid-pad: 8px; --grid-radius: 10px; --grid-border: 1px;
  }
}
@media (max-width: 370px) {
  #grid {
    --grid-gap: 2px; --grid-pad: 5px; --grid-radius: 8px; --grid-border: 1px;
  }
}
@media (min-width: 768px) {
  #grid { --grid-gap: 6px; --grid-pad: 14px; --grid-radius: 16px; }
}
@media (min-width: 1200px) {
  #grid { --grid-gap: 8px; --grid-pad: 16px; --grid-radius: 18px; }
}

/* Cell min-touch-target: 44px minimum for finger accuracy */
.cell {
  position: relative; border-radius: 6px;
  background: rgba(10,10,22,0.95);
  border: var(--grid-border, 1px) solid rgba(99,102,241,0.05);
  transition: background 0.03s, border-color 0.03s, box-shadow 0.03s;
  cursor: pointer; will-change: background, box-shadow;
  min-width: 0; min-height: 0;
}
.cell::after {
  content: '';
  position: absolute; inset: 0; border-radius: 6px;
  box-shadow: inset 0 0 6px rgba(99,102,241,0.03);
  pointer-events: none; transition: box-shadow 0.1s;
}
.cell:active, .cell.active {
  background: rgba(99,102,241,0.6);
  border-color: rgba(168,85,247,1);
  box-shadow:
      0 0 24px rgba(99,102,241,0.9),
      0 0 55px rgba(99,102,241,0.5),
      0 0 95px rgba(168,85,247,0.3),
      0 0 130px rgba(168,85,247,0.12),
    inset 0 0 14px rgba(192,132,255,0.6),
    inset 0 0 35px rgba(168,85,247,0.3);
}
.cell:active::after, .cell.active::after {
  box-shadow: inset 0 0 10px rgba(255,255,255,0.15);
}
@keyframes cellGlow {
  0%, 100% {
    box-shadow:
        0 0 18px rgba(99,102,241,0.8),
        0 0 48px rgba(99,102,241,0.4),
        0 0 80px rgba(168,85,247,0.2),
      inset 0 0 10px rgba(168,85,247,0.35);
  }
  50% {
    box-shadow:
        0 0 32px rgba(99,102,241,1),
        0 0 75px rgba(99,102,241,0.7),
        0 0 120px rgba(168,85,247,0.35),
        0 0 160px rgba(168,85,247,0.15),
      inset 0 0 20px rgba(192,132,255,0.7),
      inset 0 0 45px rgba(168,85,247,0.4);
  }
}
.cell.active { animation: cellGlow 0.85s ease-in-out infinite; }

/* Launch overlay — dark stage curtain */
#launch-overlay {
  position: fixed; inset: 0;
  background: #000003;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 9999;
  transition: opacity 0.8s ease-in;
}
#launch-overlay.fade-out { opacity: 0; pointer-events: none; }
#launch-label {
  font-size: clamp(1.1rem, 3vw, 1.6rem);
  font-weight: 900;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  text-shadow:
      0 0 30px rgba(99,102,241,0.6),
      0 0 60px rgba(99,102,241,0.25);
  user-select: none;
}
#launch-prompt {
  margin-top: 1.5rem;
  font-size: clamp(0.6rem, 1.4vw, 0.72rem);
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  animation: promptPulse 2.5s ease-in-out infinite;
}
@keyframes promptPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}
</style>
</head>
<body>
<div id="launch-overlay">
  <div id="launch-label">Open Circuit</div>
  <div id="launch-prompt">Tap anywhere to open</div>
</div>

<div id="stage">
  <div id="grid-wrap"><div id="grid"></div></div>
</div>

<script>
(function() {
  'use strict';

  const ROWS = 5;
  const COLS = 8;
  const SCALE_DEGREES = [0, 2, 4, 7, 9];
  const NOTE_NAMES = ['C', 'D', 'E', 'G', 'A'];
  const ROW_FREQS = [130.81, 196.00, 261.63, 392.00, 523.25];

  let audioCtx = null;
  let masterGain = null;
  let preDelay = null;
  let analyser = null;
  let analyserData = null;
  let limiter = null;
  let compressor = null;
  const activeVoices = {};

  // ========================================
  //  Sequencer State
  // ========================================
  let sequencerRunning = false;
  let seqStep = 0;
  let nextStepTime = 0;
  let seqIntervalMs = 0.38;
  let seqScheduleTimer = null;
  const LOOKAHEAD = 0.08;
  const SCHEDULE_INTERVAL = 20;

  // Harmony-resolving 16-step pattern with chord voicings.
  // Each step is an array of {r, c} positions for simultaneous notes.
  // The pattern is a C-major triad that ascends, resolves, descends, and returns.
  const seqSteps = [
    [{ r: 2, c: 0 }],           // C  — root
    [{ r: 2, c: 2 }],           // E  — third
    [{ r: 2, c: 3 }],           // G  — fifth
    [{ r: 2, c: 4 }, { r: 3, c: 0 }], // A + C5 — ascending resolution
    [{ r: 2, c: 3 }],           // G  — step down
    [{ r: 2, c: 2 }],           // E  — third
    [{ r: 2, c: 0 }],           // C  — root return
    [{ r: 2, c: 2 }, { r: 2, c: 3 }], // E + G — triad
    [{ r: 2, c: 3 }],           // G  — fifth
    [{ r: 1, c: 0 }, { r: 2, c: 4 }], // E3 + A4 — lower register bridge
    [{ r: 2, c: 0 }],           // C  — root
    [{ r: 2, c: 2 }],           // E  — third
    [{ r: 2, c: 4 }],           // A  — dominant
    [{ r: 3, c: 0 }],           // C5 — octave resolution
    [{ r: 2, c: 3 }],           // G  — fifth
    [{ r: 2, c: 0 }, { r: 2, c: 2 }, { r: 2, c: 3 }], // C + E + G — full triad cadence
  ];

  // ========================================
  //  Launch Sequence
  // ========================================
  const overlay = document.getElementById('launch-overlay');
  const stage = document.getElementById('stage');
  let launched = false;
  let audioCtxPromise = null;
  let audioCtxReady = false;

  function getAudioCtxPromise() {
    if (audioCtxReady) return Promise.resolve();
    if (!audioCtxPromise) {
      audioCtxPromise = (function() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();

          masterGain = audioCtx.createGain();
          masterGain.gain.value = 0.25;

          // Tight pre-delay — 1.5ms protective cushion to prevent scheduler conflation
          preDelay = audioCtx.createDelay(0.02);
          preDelay.delayTime.value = 0.0015;

          limiter = audioCtx.createWaveShaper();
          limiter.curve = buildSoftClipCurve();
          limiter.oversample = '4x';

          compressor = audioCtx.createDynamicsCompressor();
          compressor.threshold.value = -8;
          compressor.knee.value = 10;
          compressor.ratio.value = 8;
          compressor.attack.value = 0.001;
          compressor.release.value = 0.03;

          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          analyser.smoothingTimeConstant = 0.75;
          analyserData = new Uint8Array(analyser.frequencyBinCount);

          // Signal chain: VCA → preDelay → masterGain → SoftClip → Compressor → Analyser → Destination
          preDelay.connect(masterGain);
          masterGain.connect(limiter);
          limiter.connect(compressor);
          compressor.connect(analyser);
          analyser.connect(audioCtx.destination);
        }
        var resumePromise = (audioCtx.state === 'suspended') ? audioCtx.resume() : Promise.resolve();
        return resumePromise.then(function() {
          audioCtxReady = true;
          audioCtxPromise = null;
          return audioCtx;
        }).catch(function() {
          audioCtxReady = true;
          audioCtxPromise = null;
          return audioCtx;
        });
      })();
    }
    return audioCtxPromise;
  }

  function launch() {
    if (launched) return;
    launched = true;

    overlay.classList.add('fade-out');

    getAudioCtxPromise().then(function() {
      stage.classList.add('visible');
      startSequence();
    });

    setTimeout(function() {
      overlay.style.display = 'none';
    }, 1000);
  }

  document.addEventListener('pointerdown', launch, { passive: true });
  document.addEventListener('touchstart', launch, { passive: true });
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'F5' && e.key !== 'F12') launch();
  });

  // ========================================
  //  Helper Functions
  // ========================================

  function getFrequency(row, col) {
    const degreeIdx = col % SCALE_DEGREES.length;
    const scaleSemitones = SCALE_DEGREES[degreeIdx];
    const octaveOffset = Math.floor(col / SCALE_DEGREES.length);
    return ROW_FREQS[row] * Math.pow(2, scaleSemitones / 12 + octaveOffset);
  }

  function noteName(row, col) {
    return NOTE_NAMES[col % NOTE_NAMES.length];
  }

  function getAmplitudeFromPosition(r, c) {
    const rowFactor = 1 - (r / (ROWS - 1)) * 0.4;
    const colFactor = 0.8 + 0.2 * Math.sin(Math.PI * c / (COLS - 1));
    return 0.32 * rowFactor * colFactor;
  }

  function getAntiAliasedParams(freq) {
    const nyquist = audioCtx.sampleRate * 0.5;
    const freqRatio = freq / nyquist;
    const maxQ = 3.5;
    const minQ = 1.0;
    let q;
    if (freqRatio > 0.1) {
      const t = Math.min(1, (freqRatio - 0.1) / 0.15);
      q = maxQ - (maxQ - minQ) * t;
    } else {
      q = maxQ;
    }
    const cutoffCeiling = nyquist * 0.38;
    let cutoff = Math.min(freq * 4.5, 9500, cutoffCeiling);
    return { q: Math.max(q, 0.5), cutoff };
  }

  // ========================================
  //  Initialize Audio Context
  // ========================================

  function ensureAudio() {
    return audioCtx && audioCtxReady;
  }

  function buildSoftClipCurve() {
    const n = audioCtx.sampleRate * 2;
    const curve = new Float32Array(n);
    const threshold = 0.82;
    for (let i = 0; i < n; i++) {
      const x = (i / (n - 1)) * 2 - 1;
      if (Math.abs(x) < 0.01) {
        curve[i] = x;
      } else if (Math.abs(x) <= threshold) {
        curve[i] = x;
      } else {
        const t = (Math.abs(x) - threshold) / (1 - threshold);
        curve[i] = Math.sign(x) * (threshold + (1 - threshold) * (1 - Math.exp(-6 * t)));
      }
    }
    return curve;
  }

  // ========================================
  //  Voice: Oscillator → Filter → VCA → PreDelay → Master
  // ========================================

  function createVoice(freq, amplitude, isSeq) {
    if (!ensureAudio()) return null;
    const now = audioCtx.currentTime;
    const seqVol = isSeq ? 0.5 : 1;
    const vol = amplitude * seqVol;

    const aaParams = getAntiAliasedParams(freq);

    // Primary oscillator — sawtooth for dense harmonics
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    osc.detune.value = -3;

    // Sub oscillator — triangle one octave below for warmth
    const subOsc = audioCtx.createOscillator();
    subOsc.type = 'triangle';
    subOsc.frequency.value = freq * 0.5;
    subOsc.detune.value = 0;

    const subGain = audioCtx.createGain();
    subGain.gain.value = 0.08;
    subOsc.connect(subGain);

    // Lowpass filter — the creative engine
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = aaParams.q;
    filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

    // Slow LFO modulates cutoff for singing harmonic movement
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.18;

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = freq * 0.3;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    // VCA with woody, breathing decay envelope
    const vca = audioCtx.createGain();

    // Phase 1: attack — 2ms linear ramp (tight, key-strike feel)
    vca.gain.setValueAtTime(0, now);
    vca.gain.linearRampToValueAtTime(vol, now + 0.002);
    // Phase 2: percussive drop — 65ms exponential to 40% (fast energy release, mallet-on-wood)
    vca.gain.setValueAtTime(vol, now + 0.002);
    vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.40, 0.001), now + 0.067);
    // Phase 3: breath — 400ms exponential to 12% (organic dissipation, no flat sustain)
    const p3Start = now + 0.067;
    vca.gain.setValueAtTime(Math.max(vol * 0.40, 0.001), p3Start);
    vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.12, 0.001), p3Start + 0.4);
    // Phase 4: tail — 700ms exponential to silence (loose, bendable, no ring)
    const p4Start = p3Start + 0.4;
    vca.gain.setValueAtTime(Math.max(vol * 0.12, 0.001), p4Start);
    vca.gain.exponentialRampToValueAtTime(0.0005, p4Start + 0.7);

    // Signal chain: osc + sub → filter → vca → preDelay (shared) → master chain
    osc.connect(filter);
    subGain.connect(filter);
    filter.connect(vca);
    vca.connect(preDelay);

    osc.start(now);
    subOsc.start(now);
    lfo.start(now);

    const stopTime = p4Start + 0.75;
    osc.stop(stopTime);
    subOsc.stop(stopTime);
    lfo.stop(stopTime);

    return {
      osc, subOsc, subGain, filter, vca, lfo, lfoGain,
      stopTime, isSeq: !!isSeq
    };
  }

  // Schedule a voice for a future play time. Oscillators start/stop at schedule time.
  function createScheduledVoice(freq, amplitude, isSeq, playTime) {
    if (!ensureAudio()) return null;
    const t0 = Math.max(playTime, audioCtx.currentTime);
    const seqVol = isSeq ? 0.5 : 1;
    const vol = amplitude * seqVol;

    const aaParams = getAntiAliasedParams(freq);

    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    osc.detune.value = -3;

    const subOsc = audioCtx.createOscillator();
    subOsc.type = 'triangle';
    subOsc.frequency.value = freq * 0.5;
    subOsc.detune.value = 0;

    const subGain = audioCtx.createGain();
    subGain.gain.value = 0.08;
    subOsc.connect(subGain);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = aaParams.q;
    filter.frequency.value = Math.min(freq * 3, aaParams.cutoff);

    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.18;

    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = freq * 0.3;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    const vca = audioCtx.createGain();

    // Woody envelope scheduled from play time
    vca.gain.setValueAtTime(0, t0);
    vca.gain.linearRampToValueAtTime(vol, t0 + 0.002);
    vca.gain.setValueAtTime(vol, t0 + 0.002);
    vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
    vca.gain.setValueAtTime(Math.max(vol * 0.40, 0.001), t0 + 0.067);
    vca.gain.exponentialRampToValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
    vca.gain.setValueAtTime(Math.max(vol * 0.12, 0.001), t0 + 0.467);
    vca.gain.exponentialRampToValueAtTime(0.0005, t0 + 1.167);

    osc.connect(filter);
    subGain.connect(filter);
    filter.connect(vca);
    vca.connect(preDelay);

    osc.start(t0);
    subOsc.start(t0);
    lfo.start(t0);

    const stopTime = t0 + 1.22;
    osc.stop(stopTime);
    subOsc.stop(stopTime);
    lfo.stop(stopTime);

    return {
      osc, subOsc, subGain, filter, vca, lfo, lfoGain,
      stopTime, isSeq: !!isSeq
    };
  }

  function updateVoice(voice, freq, amplitude) {
    if (!voice) return;
    const now = audioCtx.currentTime;
    const aaParams = getAntiAliasedParams(freq);

    voice.osc.frequency.setTargetAtTime(freq, now, 0.003);
    voice.subOsc.frequency.setTargetAtTime(freq * 0.5, now, 0.003);
    voice.filter.frequency.setTargetAtTime(Math.min(freq * 3, aaParams.cutoff), now, 0.005);
    voice.filter.Q.setTargetAtTime(aaParams.q, now, 0.008);
    voice.lfoGain.gain.setTargetAtTime(freq * 0.3, now, 0.005);
    voice.vca.gain.setTargetAtTime(amplitude, now, 0.001);
  }

  function killVoice(cellIndex) {
    const v = activeVoices[cellIndex];
    if (!v) return;
    const now = audioCtx.currentTime;
    try {
      v.vca.gain.cancelScheduledValues(now);
      v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
      v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      const stopT = now + 0.25;
      v.osc.disconnect();
      v.subOsc.disconnect();
      v.subGain.disconnect();
      v.filter.disconnect();
      v.vca.disconnect();
      v.lfo.disconnect();
      v.lfoGain.disconnect();
      v.osc.stop(stopT);
      v.subOsc.stop(stopT);
      v.lfo.stop(stopT);
    } catch(e) {}
    delete activeVoices[cellIndex];
  }

  // ========================================
  //  Grid UI
  // ========================================

  const gridEl = document.getElementById('grid');
  const gridWrap = document.getElementById('grid-wrap');
  const allCells = [];
  let gridBuilt = false;
  const MIN_TOUCH_TARGET = 44;
  const TOUCH_DEADZONE = 6;

  function getGridGapPx() {
    const w = window.innerWidth;
    if (w <= 370) return 2;
    if (w <= 480) return 3;
    if (w >= 1200) return 8;
    if (w >= 768) return 6;
    return 5;
  }

  function getGridPadPx() {
    const w = window.innerWidth;
    if (w <= 370) return 5;
    if (w <= 480) return 8;
    if (w >= 1200) return 16;
    if (w >= 768) return 14;
    return 12;
  }

  function buildGrid() {
    if (gridBuilt) return;
    gridBuilt = true;

    gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';
    gridEl.style.gridTemplateRows = 'repeat(' + ROWS + ', 1fr)';

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const el = document.createElement('div');
        el.className = 'cell';
        el.dataset.index = idx;
        el.dataset.row = r;
        el.dataset.col = c;

        const label = document.createElement('span');
        label.className = 'cell-label';
        label.textContent = noteName(r, c);
        el.appendChild(label);

        gridEl.appendChild(el);
        allCells.push(el);
      }
    }

    resizeGrid();
  }

  function resizeGrid() {
    if (!gridBuilt) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const pad = getGridPadPx();
    const gap = getGridGapPx();

    const availW = Math.min(vw * 0.92, 680) - 2 * pad;
    const gapTotalW = (COLS - 1) * gap;
    const rawCellW = (availW - gapTotalW) / COLS;
    const cellH = rawCellW * 0.78;

    const availH = vh * 0.62;
    const totalGapH = (ROWS - 1) * gap;
    const rawTotalH = ROWS * cellH + totalGapH;
    const hScale = Math.min(1, (availH - 2 * pad) / rawTotalH);
    const scale = Math.min(1, hScale);

    const finalW = Math.max(MIN_TOUCH_TARGET, rawCellW * scale);
    const finalH = finalW * 0.78;

    gridEl.style.gridTemplateColumns = 'repeat(' + COLS + ', ' + finalW + 'px)';
    gridEl.style.gridTemplateRows = 'repeat(' + ROWS + ', ' + finalH + 'px)';
    gridEl.style.setProperty('--grid-gap', gap + 'px');
    gridEl.style.setProperty('--grid-pad', pad + 'px');

    if (scale < 0.85) {
      const borderRadius = Math.max(4, 14 * scale * scale);
      gridEl.style.setProperty('--grid-radius', borderRadius + 'px');
      const borderW = Math.max(0, 1 - (0.85 - scale) * 10);
      gridEl.style.setProperty('--grid-border', borderW + 'px');
    } else {
      gridEl.style.setProperty('--grid-radius', '14px');
      gridEl.style.setProperty('--grid-border', '1px');
    }
  }

  (function injectCellLabelStyle() {
    const styleEl = document.createElement('style');
    styleEl.textContent =
      '.cell-label { ' +
      '  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; ' +
      '  font-size: clamp(0.5rem, 1.2vw, 0.65rem); ' +
      '  font-weight: 700; letter-spacing: 0.06em; ' +
      '  color: rgba(255,255,255,0.12); ' +
      '  pointer-events: none; transition: color 0.08s, text-shadow 0.08s; ' +
      '  text-transform: uppercase; ' +
      '} ' +
      '.cell.active .cell-label { ' +
      '  color: rgba(255,255,255,0.9); ' +
      '  text-shadow: ' +
      '     0 0 8px rgba(192,132,255,0.8), ' +
      '     0 0 20px rgba(99,102,241,0.4); ' +
      '}';
    document.head.appendChild(styleEl);
  })();

  // ========================================
  //  Lookahead Sequencer — Optimized
  // ========================================
  // Uses a strict schedule-ahead pattern. nextStepTime tracks the scheduled
  // time for the next step. Each scheduler tick schedules all notes ahead
  // that fall within the look-ahead window.

  function scheduleStep(stepIdx, playTime) {
    const notes = seqSteps[stepIdx % seqSteps.length];
    const visualDelays = [];

    for (let n = 0; n < notes.length; n++) {
      const note = notes[n];
      const idx = note.r * COLS + note.c;
      const cell = allCells[idx];
      const freq = getFrequency(note.r, note.c);
      const amp = getAmplitudeFromPosition(note.r, note.c);

      const voice = createScheduledVoice(freq, amp, true, playTime);
      if (voice) {
        activeVoices['seq_' + stepIdx + '_' + n] = voice;
        // Auto-cleanup after sound ends
        const cleanupDelay = (voice.stopTime - audioCtx.currentTime) * 1000 + 50;
        setTimeout(function() {
          delete activeVoices['seq_' + stepIdx + '_' + n];
        }, cleanupDelay);
      }

      const delayUntil = Math.max(0, (playTime - audioCtx.currentTime)) * 1000;
      visualDelays.push({ cell: cell, delay: delayUntil });
    }

    // Schedule visual feedback in sync with audio
    for (let d = 0; d < visualDelays.length; d++) {
      (function(cd) {
        setTimeout(function() {
          if (cd.cell) cd.cell.classList.add('active');
        }, cd.delay);
        setTimeout(function() {
          if (cd.cell) cd.cell.classList.remove('active');
        }, cd.delay + 550);
      })(visualDelays[d]);
    }
  }

  function seqScheduler() {
    if (!sequencerRunning) return;

    const now = audioCtx.currentTime;

    // Schedule all notes within the look-ahead window
    while (nextStepTime < now + LOOKAHEAD) {
      scheduleStep(seqStep, nextStepTime);
      seqStep++;
      nextStepTime += seqIntervalMs;
    }
  }

  function startSequence() {
    if (!ensureAudio()) return;
    sequencerRunning = true;
    seqStep = 0;
    nextStepTime = audioCtx.currentTime + 0.05;

    if (seqScheduleTimer) clearInterval(seqScheduleTimer);
    seqScheduleTimer = setInterval(seqScheduler, SCHEDULE_INTERVAL);
  }

  function stopSequence() {
    sequencerRunning = false;
    if (seqScheduleTimer) {
      clearInterval(seqScheduleTimer);
      seqScheduleTimer = null;
    }

    // Kill all sequencer voices
    const toKill = [];
    for (const key in activeVoices) {
      if (activeVoices[key].isSeq && key.startsWith('seq_')) {
        toKill.push(key);
      }
    }
    for (let i = 0; i < toKill.length; i++) {
      const v = activeVoices[toKill[i]];
      if (v) {
        const now = audioCtx.currentTime;
        try {
          v.vca.gain.cancelScheduledValues(now);
          v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
          v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
          const stopT = now + 0.2;
          v.osc.disconnect();
          v.subOsc.disconnect();
          v.subGain.disconnect();
          v.filter.disconnect();
          v.vca.disconnect();
          v.lfo.disconnect();
          v.lfoGain.disconnect();
          v.osc.stop(stopT);
          v.subOsc.stop(stopT);
          v.lfo.stop(stopT);
        } catch(e) {}
      }
      delete activeVoices[toKill[i]];
    }
  }

  // ========================================
  //  Touch / Mouse Input
  // ========================================

  let dragVoice = null;
  let dragCellIndex = -1;
  let mouseDown = false;
  let touchStartX = 0;
  let touchStartY = 0;
  let touchMoved = false;

  function getCellFromEvent(e) {
    const target = e.target || (e.touches && e.touches[0] && e.touches[0].target);
    if (!target) return null;
    const cell = (target.closest && target.closest('.cell')) || target;
    if (!cell.classList || !cell.classList.contains('cell')) return null;
    return cell;
  }

  function hitCell(cell) {
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    const idx = parseInt(cell.dataset.index);
    const freq = getFrequency(r, c);
    const amp = getAmplitudeFromPosition(r, c);

    if (dragVoice) {
      if (idx !== dragCellIndex) {
        if (allCells[dragCellIndex]) allCells[dragCellIndex].classList.remove('active');
        dragCellIndex = idx;
      }
      cell.classList.add('active');
      updateVoice(dragVoice, freq, amp);
      return;
    }

    cell.classList.add('active');

    if (activeVoices[idx] && !activeVoices[idx].isSeq) {
      updateVoice(activeVoices[idx], freq, amp);
      return;
    }

    const voice = createVoice(freq, amp, false);
    activeVoices[idx] = voice;
  }

  function releaseCell() {
    if (dragVoice) {
      if (dragCellIndex >= 0 && allCells[dragCellIndex]) {
        allCells[dragCellIndex].classList.remove('active');
      }
      const v = dragVoice;
      dragVoice = null;
      dragCellIndex = -1;
      if (v && audioCtx) {
        const now = audioCtx.currentTime;
        try {
          v.vca.gain.cancelScheduledValues(now);
          v.vca.gain.setValueAtTime(Math.max(v.vca.gain.value, 0.001), now);
          v.vca.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
          const stopT = now + 0.35;
          v.osc.stop(stopT);
          v.subOsc.stop(stopT);
          v.lfo.stop(stopT);
        } catch(e) {}
      }
      return;
    }
  }

  if (window.PointerEvent) {
    gridEl.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      touchStartX = e.clientX;
      touchStartY = e.clientY;
      touchMoved = false;
      const cell = e.target.closest && e.target.closest('.cell');
      if (!cell) return;
      const idx = parseInt(cell.dataset.index);
      dragVoice = null;
      dragCellIndex = -1;
      cell.classList.add('active');
      gridEl.setPointerCapture(e.pointerId);

      getAudioCtxPromise().then(function() {
        if (!ensureAudio()) return;
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        const freq = getFrequency(r, c);
        const amp = getAmplitudeFromPosition(r, c);

        if (activeVoices[idx] && !activeVoices[idx].isSeq) {
          dragVoice = activeVoices[idx];
          dragCellIndex = idx;
          updateVoice(dragVoice, freq, amp);
        } else {
          dragVoice = createVoice(freq, amp, false);
          dragCellIndex = idx;
          activeVoices[idx] = dragVoice;
        }
      });
    });

    gridEl.addEventListener('pointermove', function(e) {
      if (!touchMoved && Math.abs(e.clientX - touchStartX) < TOUCH_DEADZONE && Math.abs(e.clientY - touchStartY) < TOUCH_DEADZONE) return;
      touchMoved = true;
      const cell = e.target.closest && e.target.closest('.cell');
      if (cell) hitCell(cell);
    });

    gridEl.addEventListener('pointerup', function(e) {
      releaseCell();
      try { gridEl.releasePointerCapture(e.pointerId); } catch(ex) {}
    });

    gridEl.addEventListener('pointercancel', function(e) {
      releaseCell();
      try { gridEl.releasePointerCapture(e.pointerId); } catch(ex) {}
    });
  } else {
    function handleTouchStart(e) {
      e.preventDefault();
      getAudioCtxPromise();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const t = e.changedTouches[i];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchMoved = false;
      }

      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (touch.radiusX && touch.radiusX > 50) continue;
        if (touch.force !== undefined && touch.force < 0.01) continue;
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const cell = el && el.closest && el.closest('.cell');
        if (cell) {
          const idx = parseInt(cell.dataset.index);
          dragVoice = null;
          dragCellIndex = -1;

          const r = parseInt(cell.dataset.row);
          const c = parseInt(cell.dataset.col);
          const freq = getFrequency(r, c);
          const amp = getAmplitudeFromPosition(r, c);

          if (activeVoices[idx] && !activeVoices[idx].isSeq) {
            dragVoice = activeVoices[idx];
            dragCellIndex = idx;
            updateVoice(dragVoice, freq, amp);
          } else {
            dragVoice = createVoice(freq, amp, false);
            dragCellIndex = idx;
            activeVoices[idx] = dragVoice;
          }
          cell.classList.add('active');
        }
      }
    }

    function handleTouchMove(e) {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        if (!touchMoved && Math.abs(touch.clientX - touchStartX) < TOUCH_DEADZONE && Math.abs(touch.clientY - touchStartY) < TOUCH_DEADZONE) continue;
        touchMoved = true;
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const cell = el && el.closest && el.closest('.cell');
        if (cell) hitCell(cell);
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      releaseCell();
    }

    gridEl.addEventListener('touchstart', handleTouchStart, { passive: false });
    gridEl.addEventListener('touchmove', handleTouchMove, { passive: false });
    gridEl.addEventListener('touchend', handleTouchEnd, { passive: false });
    gridEl.addEventListener('touchcancel', handleTouchEnd, { passive: false });

    gridEl.addEventListener('mousedown', function(e) {
      e.preventDefault();
      getAudioCtxPromise();
      mouseDown = true;
      const cell = getCellFromEvent(e);
      if (cell) {
        const idx = parseInt(cell.dataset.index);
        const r = parseInt(cell.dataset.row);
        const c = parseInt(cell.dataset.col);
        const freq = getFrequency(r, c);
        const amp = getAmplitudeFromPosition(r, c);

        dragVoice = null;
        dragCellIndex = -1;

        if (activeVoices[idx] && !activeVoices[idx].isSeq) {
          dragVoice = activeVoices[idx];
          dragCellIndex = idx;
          updateVoice(dragVoice, freq, amp);
        } else {
          dragVoice = createVoice(freq, amp, false);
          dragCellIndex = idx;
          activeVoices[idx] = dragVoice;
        }
        cell.classList.add('active');
      }
    });

    gridEl.addEventListener('mousemove', function(e) {
      if (!mouseDown) return;
      const cell = getCellFromEvent(e);
      if (cell) hitCell(cell);
    });

    gridEl.addEventListener('mouseup', function() {
      releaseCell();
      mouseDown = false;
    });

    gridEl.addEventListener('mouseleave', function() {
      if (mouseDown) releaseCell();
      mouseDown = false;
    });
  }

  // ========================================
  //  Audio-Reactive Visual Loop
  // ========================================

  let lfoPhase = 0;
  let prevSignalLevel = 0;
  let smoothedHigh = 0;

  function audioVisualLoop() {
    lfoPhase += 0.03;

    let signalLevel = 0;
    let highLevel = 0;
    if (analyser && analyserData) {
      analyser.getByteFrequencyData(analyserData);
      let sum = 0;
      for (let i = 0; i < analyserData.length; i++) {
        sum += analyserData[i];
      }
      signalLevel = sum / (analyserData.length * 255);

      let highSum = 0;
      const startBin = Math.floor(analyserData.length * 0.5);
      for (let i = startBin; i < analyserData.length; i++) {
        highSum += analyserData[i];
      }
      highLevel = highSum / ((analyserData.length - startBin) * 255);
    }

    const smoothing = signalLevel > prevSignalLevel ? 0.5 : 0.75;
    prevSignalLevel = prevSignalLevel * (1 - smoothing) + signalLevel * smoothing;
    smoothedHigh = smoothedHigh * 0.8 + highLevel * 0.2;

    const glowIntensity = Math.min(1, prevSignalLevel * 3.5);

    const baseGlow = 0.04;
    const glowBoost = glowIntensity * 0.08;
    const deepGlow = 0.025 + glowIntensity * 0.04;
    const outerGlow = 0.015 + glowIntensity * 0.03;
    const insetGlow = glowIntensity * 0.18;

    gridEl.style.boxShadow =
      '0 0 ' + (55 + glowIntensity * 50) + 'px rgba(99,102,241,' + (baseGlow + glowBoost).toFixed(3) + '),' +
      '0 0 ' + (130 + glowIntensity * 90) + 'px rgba(99,102,241,' + deepGlow.toFixed(3) + '),' +
      '0 0 ' + (200 + glowIntensity * 60) + 'px rgba(168,85,247,' + outerGlow.toFixed(3) + '),' +
      'inset 0 0 ' + (35 + glowIntensity * 35) + 'px rgba(168,85,247,' + insetGlow.toFixed(3) + ')';

    if (glowIntensity > 0.05) {
      for (let i = 0; i < allCells.length; i++) {
        const cell = allCells[i];
        if (!cell.classList.contains('active')) {
          const rowIdx = parseInt(cell.dataset.row);
          const reactive = Math.sin(lfoPhase + rowIdx * 0.7) * 0.5 + 0.5;
          cell.style.borderColor = 'rgba(99,102,241,' + (0.05 + glowIntensity * reactive * 0.12).toFixed(3) + ')';
          cell.style.boxShadow = '0 0 ' + (4 + glowIntensity * reactive * 8) + 'px rgba(99,102,241,' + (glowIntensity * reactive * 0.06).toFixed(3) + ')';
        }
      }
    } else {
      for (let i = 0; i < allCells.length; i++) {
        const cell = allCells[i];
        if (!cell.classList.contains('active')) {
          cell.style.borderColor = '';
          cell.style.boxShadow = '';
        }
      }
    }

    requestAnimationFrame(audioVisualLoop);
  }
  audioVisualLoop();

  // ========================================
  //  Init
  // ========================================

  function init() {
    buildGrid();

    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeGrid, 80);
    });
    if (window.matchMedia) {
      window.matchMedia('(orientation: portrait)').addEventListener('change', resizeGrid);
      window.matchMedia('(orientation: landscape)').addEventListener('change', resizeGrid);
    }

    if (!Element.prototype.closest) {
      Element.prototype.closest = function(s) {
        var el = this;
        var matchesFn = Element.prototype.matches || Element.prototype.msMatchesSelector;
        do {
          if (matchesFn.call(el, s)) return el;
          el = el.parentElement || el.parentNode;
        } while (el !== null && el.nodeType === 1);
        return null;
      };
    }
  }

  init();
})();
</script>
</body>
</html>
