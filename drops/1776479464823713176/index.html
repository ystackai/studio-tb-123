<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth Minor Third Resolve</title>
<style>
     * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #e0e0e0;
       /* Monospaced brutalist typography */
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    }

     #stage { text-align: center; }

     #stage .title {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.1;
       /* Transition is disabled at trigger moment via JS for hard-cut snap */
    }

     #stage .freq {
    margin-top: 0.75rem;
    font-size: 1.1rem;
    color: #888;
    font-variant-numeric: tabular-nums;
    }

     #trigger {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    padding: 0.75rem 2rem;
    background: #1a1a2e;
    color: #ccc;
    border: 1px solid #333;
       /* Brutalist — sharp edges, no border-radius */
    border-radius: 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    }

     #trigger:hover {
    background: #252545;
    border-color: #555;
    }

     #status {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    font-size: 0.8rem;
    color: #555;
    font-variant-numeric: tabular-nums;
    }

     /* Visual flash overlay — instant on/off, no transition */
     #flash {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 70%);
    opacity: 0;
    pointer-events: none;
    }

     #flash.active {
    opacity: 1;
    transition: none;
    }
</style>
</head>
<body>

<div id="stage">
     <div class="title" id="label">Sawtooth Minor Third Resolve</div>
     <div class="freq" id="freqDisplay">&mdash; Hz</div>
</div>

<div id="flash"></div>
<div id="status">ready</div>
<button id="trigger">&#9654; Trigger</button>

<script type="module">
import { attachOnEndedSnap } from './snap.js';

/* ── Constants ─────────────────────────────────────────────── */
const BASE_FREQ          = 349.23;                  // F4 — start pitch
const MINOR_THIRD        = Math.pow(2, 3 / 12);     // 3 semitones
const TARGET_FREQ        = BASE_FREQ * MINOR_THIRD; // ~415 Hz (G♯4/Ab4)
const DECAY_MS           = 10;                      // exact 10 ms decay window

/* ── DOM refs ──────────────────────────────────────────────── */
const label       = document.getElementById('label');
const freqDisp    = document.getElementById('freqDisplay');
const flash       = document.getElementById('flash');
const statusEl    = document.getElementById('status');
const triggerBtn  = document.getElementById('trigger');

let audioCtx = null;

/* ── Pre-render sawtooth: sample-accurate freq sweep + zero-crossing hard-cut
     Uses AudioBufferSourceNode (not live OscillatorNode) because
     the Web Audio API clamps frequency automation ramps to ≥20 ms,
     while our precision target is 10 ms. Pre-rendering guarantees
     exact exponential interpolation and sample-accurate timing.
*/
function buildSawBuffer(ctx) {
  const sr       = ctx.sampleRate;
  const dur      = DECAY_MS / 1000;          // 0.010 s
  const len      = Math.round(sr * dur);
  const buf      = ctx.createBuffer(1, len, sr);
  const data     = buf.getChannelData(0);

    /* Frequency sweep: exponential ramp from BASE → TARGET over DECAY_MS */
  const ratio = TARGET_FREQ / BASE_FREQ;           // ~1.1892
  const lnr   = Math.log(ratio);                    // natural log of ratio

  let phase = 0;                                  // cumulative radian phase

    /* Unity amplitude — envelope kept flat so the zero-crossing hard-cut
     is the sole silencing mechanism, guaranteeing sample-accurate timing. */
  for (let i = 0; i < len; i++) {
    const t    = i / sr;
    const prog = t / dur;                       // 0 → 1 over window

      /* Exponential frequency interpolation: f(t) = f₀ · exp(ln(r)·t/tₑ) */
    const freq = BASE_FREQ * Math.exp(lnr * prog);

      /* Incremental phase accumulation (sample-accurate, no drift) */
    phase += 2 * Math.PI * freq / sr;

      /* Sawtooth waveform in (-1, 1] — slopes upward */
    const saw = ((phase % (2 * Math.PI)) / Math.PI - 1);

    data[i] = saw;
    }

    /* ── Zero-crossing hard-cut ─────────────────────────────── */
    /* Find the last sign-change so truncation to zero produces
     no audible click at playback end. Trims to exact sample.   */
  let cutIdx = len;
  for (let i = len - 2; i > 0; i--) {
    if (data[i] * data[i + 1] <= 0) {     // sign change or exact zero-crossing
      cutIdx = Math.min(i + 1, len);       // sample just after crossing
      break;
      }
    }

  const trimmed = ctx.createBuffer(1, cutIdx, sr);
  trimmed.getChannelData(0).set(data.subarray(0, cutIdx));
  return trimmed;
}

/* ── Trigger: schedule oscillator (pre-rendered BufferSource)
       → GainNode → zero-crossing hard-cut via AudioClock tick.
     AudioClock = the OS-level audio hardware clock driving the
     AudioContext's currentTime. All scheduling is locked to it. */
function start() {
  if (audioCtx) { audioCtx.close(); }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const now   = audioCtx.currentTime;

    /* Pre-render: sawtooth oscillator, freq sweep, zero-crossing hard-cut */
  const buf = buildSawBuffer(audioCtx);

    /* Audio graph: BufferSource → GainNode → analyser → destination */
  const source   = audioCtx.createBufferSource();
  source.buffer  = buf;

  const gainNode = audioCtx.createGainNode();
  gainNode.gain.value  = 1.0;                // unity — no envelope, hard-cut at buffer end

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize     = 256;

  source.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);

    /* Synchronized visual snap at exact AudioClock tick (onended fires sample-accurate) */
  attachOnEndedSnap(source, 'label');

    /* Schedule playback at precise audio clock time — no drift from performance.now */
  source.start(now);

  flash.classList.add('active');
  statusEl.textContent   = 'decaying';

    /* Live frequency readout: exponential interpolation matching the buffer render */
  const lnr          = Math.log(TARGET_FREQ / BASE_FREQ);
  const t0           = performance.now();
  const fReader      = analyser.getByteFrequencyData(new Uint8Array(analyser.frequencyBinCount));

  function freqTick() {
    const elapsed  = performance.now() - t0;
    if (elapsed < DECAY_MS) {
      const prog       = elapsed / DECAY_MS;          // 0 → 1
      const hz         = BASE_FREQ * Math.exp(lnr * prog); /* exponential ramp */
      freqDisp.textContent   = Math.round(hz) + ' Hz';
      requestAnimationFrame(freqTick);
      } else {
      freqDisp.textContent   = '\u2014 Hz';
      }
    }

  requestAnimationFrame(freqTick);

    /* Teardown after buffer playback completes */
  const teardownDelay = (buf.duration * 1000) + 50;
  setTimeout(() => {
    if (audioCtx && audioCtx.state === 'running') audioCtx.close();
    audioCtx = null;
    }, teardownDelay);
}

/* ── Stop / teardown ───────────────────────────────────────── */
function stop() {
  flash.classList.remove('active');
  label.style.fontWeight   = '';
  label.style.transition   = '';
  if (audioCtx)       { audioCtx.close(); audioCtx = null; }
  statusEl.textContent   = 'ready';
}

triggerBtn.addEventListener('click', start);
</script>
</body>
</html>
