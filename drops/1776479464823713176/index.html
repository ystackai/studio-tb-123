<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third Zero-Cross Hard-Cut</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', Courier, 'Lucida Console', Monaco, monospace;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#trigger {
  background: transparent;
  border: 2px solid #e0e0e0;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 18px;
  padding: 16px 32px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

#trigger:hover {
  border-color: #fff;
  background: #1a1a1a;
}

#sync-display {
  margin-top: 32px;
  font-size: 72px;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: none !important;
}

#sync-display.font-snap {
  font-weight: 700 !important;
  transition: none !important;
}

#log {
  margin-top: 24px;
  font-size: 11px;
  color: #666;
  max-width: 500px;
  text-align: left;
  white-space: pre-wrap;
  line-height: 1.8;
  min-height: 60px;
}

.stressed {
  font-weight: 700 !important;
  color: #ff3333 !important;
}

.snapped {
  font-weight: 400 !important;
  color: #e0e0e0 !important;
}

#viz-canvas {
  margin-top: 16px;
  border: 1px solid #333;
  background: #000;
}
</style>
</head>
<body>

<button id="trigger">[ TRIGGER ]</button>
<canvas id="viz-canvas" width="512" height="64"></canvas>
<div id="sync-display" class="">- - -</div>
<div id="log"></div>

<script>
(function() {
   'use strict';

  var BASE_FREQ           = 440;                    // A4
  var MINOR_THIRD_RATIO    = Math.pow(2, 3 / 12);   // ≈1.189207
  var DECAY_MS             = 10;                     // 10ms decay window

  var audioCtx     = null;
  var logEl        = document.getElementById('log');
  var displayEl    = document.getElementById('sync-display');
  var triggerBtn   = document.getElementById('trigger');
  var vizCanvas    = document.getElementById('viz-canvas');
  var vizCtx       = vizCanvas.getContext('2d');

  function timestamp() {
    return performance.now().toFixed(6);
   }

  function log(msg) {
    logEl.textContent += '[' + timestamp() + '] ' + msg + '\n';
   }

  /** Draw a synthetic sawtooth waveform on the canvas. */
  function drawWaveform(freq, sampleRate, numSamples) {
    vizCtx.fillStyle = '#000';
    vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);

    var halfH = vizCanvas.height / 2;
    vizCtx.strokeStyle = '#0f0';
    vizCtx.lineWidth = 1;
    vizCtx.beginPath();

    for (var x = 0; x < numSamples; x++) {
      var t     = x / sampleRate;
      var phase = (t * freq) % 1;
      var sample = 2 * phase - 1;   // sawtooth ∈ [-1, 1]

      var px = (x / numSamples) * vizCanvas.width;
      var py = halfH - sample * (halfH - 2);

      if (x === 0) {
        vizCtx.moveTo(px, py);
       } else {
        vizCtx.lineTo(px, py);
       }
     }
    vizCtx.stroke();
   }

  /**
    * Find the nearest zero-crossing strictly after decaySamples.
    * Scans the sawtooth waveform and interpolates the exact crossing point
    * where it transitions from positive to negative.
    */
  function findZeroCrossingAfter(decaySamples, sampleRate) {
    var freq   = BASE_FREQ;
    var lastSn = 0;

    for (var i = decaySamples; i < decaySamples + sampleRate; i++) {
      var t     = i / sampleRate;
      var phase = (t * freq) % 1;
      var sn    = 2 * phase - 1;

      if (lastSn > 0 && sn < 0) {
        // Linear interpolation: exact crossing between lastSn→sn
        var fraction = lastSn / (lastSn - sn);
        var exactIdx = i - fraction;
        return {
          sampleIndex : Math.round(exactIdx),
          offsetMs    : (exactIdx / sampleRate * 1000).toFixed(4),
          fraction    : fraction
        };
       }
      if (i >= decaySamples) {
        lastSn = sn;
       }
     }

    // Fallback: cut at the decay boundary itself
    return {
      sampleIndex : decaySamples,
      offsetMs    : (decaySamples / sampleRate * 1000).toFixed(4),
      fraction    : 1
    };
   }

  /**
    * Core synthesis trigger.
    * 1. Single sawtooth OscillatorNode at BASE_FREQ.
    * 2. During the 10ms decay window, frequency linearly shifts to a minor third above.
    * 3. At t = DECAY_MS, a zero-crossing hard-cut kills gain instantly — no fade.
    */
  function trigger() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 48000
      });
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    var now          = audioCtx.currentTime;
    var decaySec     = DECAY_MS / 1000;
    var endTime      = now + decaySec;
    var sampleRate   = audioCtx.sampleRate;
    var decaySamples = Math.ceil(decaySec * sampleRate);

    // — Oscillator: single sawtooth, frequency sweep during decay —
    var osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(BASE_FREQ, now);
    osc.frequency.linearRampToValueAtTime(
      BASE_FREQ * MINOR_THIRD_RATIO, endTime
    );

    // — Gain: amplitude held, then hard-cut at zero-crossing —
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.5, now);

    // Routing: osc → gain → destination
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    // — Zero-crossing hard-cut calculation —
    var zc         = findZeroCrossingAfter(decaySamples, sampleRate);
    var cutTime    = now + (zc.sampleIndex / sampleRate);

    // Ramp gain to 0 at the exact zero-crossing sample for a click-free hard-cut
    if (cutTime > now) {
      gain.gain.setValueAtTime(0.5, Math.max(now, cutTime - 0.0001));
      gain.gain.linearRampToValueAtTime(0, cutTime);
    }

    // — Visual sync —
    var startTimeMs = performance.now();
    var targetLatencySec = (cutTime - now);

    displayEl.textContent = '▓ ▓ ▓';
    displayEl.className   = 'stressed';
    drawWaveform(BASE_FREQ, sampleRate, 480);

    setTimeout(function() {
      var snapWallMs = performance.now();
      displayEl.className   = 'snapped';
      displayEl.textContent = '- - -';

      var expectedCutMs    = targetLatencySec * 1000;
      var actualSnapDelta  = snapWallMs - startTimeMs;
      var discrepancy      = Math.abs(actualSnapDelta - expectedCutMs);

      log('Oscillator: sawtooth, ' + BASE_FREQ + 'Hz → '
        + (BASE_FREQ * MINOR_THIRD_RATIO).toFixed(2) + 'Hz');
      log('Minor third ratio: ' + MINOR_THIRD_RATIO.toFixed(6));
      log('Sample rate: ' + sampleRate + ' Hz');
      log('Decay window: ' + DECAY_MS + 'ms');
      log('Zero-cross sample: #' + zc.sampleIndex);
      log('Hard-cut time: ' + cutTime.toFixed(6) + 's (context.currentTime)');
      log('Visual snap wall-clock: ' + snapWallMs.toFixed(3) + 'ms');
      log('Clock tick discrepancy: ' + discrepancy.toFixed(4) + 'ms');
      log('PASS | discrepancy < 1ms: ' + (discrepancy < 1 ? 'YES' : 'NO'));
    }, targetLatencySec * 1000);

    // Start the oscillator and hold through decay; hard-cut at ZC kills everything.
    osc.start(now);
    osc.stop(cutTime + 0.001);
   }

  triggerBtn.addEventListener('click', function() {
    logEl.textContent      = '';
    displayEl.className    = '';
    displayEl.textContent  = '- - -';
    trigger();
  });

})();
</script>
</body>
</html>
