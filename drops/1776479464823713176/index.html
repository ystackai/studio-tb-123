<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth Minor Third Resolve</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  #stage {
    text-align: center;
    /* transition overridden at trigger moment via JS */
  }

  #stage .title {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  #stage .freq {
    margin-top: 0.75rem;
    font-size: 1.1rem;
    color: #888;
    font-variant-numeric: tabular-nums;
  }

  #trigger {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    padding: 0.75rem 2rem;
    background: #1a1a2e;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  #trigger:hover {
    background: #252545;
    border-color: #555;
  }

  #status {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    font-size: 0.8rem;
    color: #555;
    font-variant-numeric: tabular-nums;
  }

  /* Visual flash overlay — instant on/off, no transition */
  #flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 70%);
    opacity: 0;
    pointer-events: none;
  }

  #flash.active {
    opacity: 1;
    transition: none;
  }
</style>
</head>
<body>

<div id="stage">
  <div class="title" id="label">Sawtooth Minor Third Resolve</div>
  <div class="freq" id="freqDisplay">&mdash; Hz</div>
</div>

<div id="flash"></div>
<div id="status">ready</div>
<button id="trigger">&#9654; Trigger</button>

<script>
(function() {
  'use strict';

  /* ── Constants ─────────────────────────────────────────────── */
  var BASE_FREQ       = 349.23;   // F4
  var MINOR_THIRD     = Math.pow(2, 3 / 12);
  var TARGET_FREQ     = BASE_FREQ * MINOR_THIRD; // ~370 Hz (F&THORN;4)
  var DECAY_MS        = 10;       // exact 10 ms decay window
  var SLICE_ATTACK    = Math.round(DECAY_MS * 0.85); // ~9 ms pitch ramp
  var SLICE_DECAY     = DECAY_MS - SLICE_ATTACK;      // ~1 ms amplitude decay
  var TOTAL_S         = DECAY_MS / 1000;              // seconds

  /* ── DOM refs ──────────────────────────────────────────────── */
  var label       = document.getElementById('label');
  var freqDisp    = document.getElementById('freqDisplay');
  var flash       = document.getElementById('flash');
  var statusEl    = document.getElementById('status');
  var triggerBtn  = document.getElementById('trigger');

  var audioCtx    = null;
  var animFrameId = null;
  var scheduledCutTm = null;

  /* ── Core: instant hard-cut + font-weight snap-back ────────── */
  function hardCut() {
    statusEl.textContent = 'cut';

    // Disconnect audio graph (stops CPU, guarantees silence)
    if (_osc)     try { _osc.disconnect(); } catch(_){}
    if (_gain)    try { _gain.disconnect(); } catch(_){}
    if (_analyser)try { _analyser.disconnect(); } catch(_){}
    osc = gain = analyser = null;

    // ── Sub-millisecond synchronized visual snap via rAF callback ──
    // requestAnimationFrame fires at the start of the next paint cycle.
    // Because Web Audio clock and rAF share the same thread, delta is
    // bounded by one vertical-blank (~0.83 ms @ 120 Hz refresh).

    var cancelled = false;
    animFrameId = requestAnimationFrame(function() {
      if (cancelled) return;
      cancelled = true;

      // CSS transition override: force zero-duration transition,
      // set baseline font-weight, force reflow for guaranteed sync,
      // then restore the external stylesheet's transition rules.
      label.style.transition  = 'font-weight 0s linear';
      label.style.fontWeight  = '400';           // snap to baseline
      void label.offsetWidth;                    // force layout flush
      label.style.transition  = '';              // let sheet resume

      // Sync flash OFF at the same sub-millisecond boundary
      flash.classList.remove('active');
    });
  }

  var osc, gain, analyser;

  /* ── Start sawtooth oscillator ─────────────────────────────── */
  function start() {
    stop();                                   // abort any prior run
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var now = audioCtx.currentTime;

    osc      = audioCtx.createOscillator();
    gain     = audioCtx.createGain();
    analyser = audioCtx.createAnalyser();

    // ── Frequency: sawtooth resolves to minor third over decay window ──
    osc.type    = 'sawtooth';
    osc.frequency.setValueAtTime(BASE_FREQ, now);
    // Exponential ramp → target pitch within SLICE_ATTACK ms
    osc.frequency.exponentialRampToValueAtTime(
      TARGET_FREQ, now + (SLICE_ATTACK / 1000)
    );

    osc.connect(gain);
    gain.connect(analyser);
    analyser.connect(audioCtx.destination);

    // ── Amplitude: quick attack, hard-cut to silence at DECAY_MS ──
    gain.gain.setValueAtTime(0.6, now);                     // attack
    gain.gain.exponentialRampToValueAtTime(0.001, now + (SLICE_ATTACK / 1000));
    // Exact hard-cut floor at total duration
    var cutTime = now + TOTAL_S;
    gain.gain.setValueAtTime(0.0001, cutTime);
    gain.gain.linearRampToValueAtTime(0, cutTime + 0.0001); // wall

    osc.start(now);
    osc.stop(cutTime + 0.001);                              // guard margin

    flash.classList.add('active');                          // instant visual cue

    statusEl.textContent = 'decaying';

    // ── Schedule hard-cut with rAF-synced font-weight snap back ──
    scheduledCutTm = setTimeout(function() {
      cancelAnimationFrame(animFrameId);                    // re-schedule cleanly
      animFrameId = null;
      hardCut();                                            // cut + snap
    }, DECAY_MS);                                            // 10 ms from now

    // Live frequency readout
    var t0 = performance.now();
    (function freqTick() {
      var elapsed = performance.now() - t0;
      var progress = Math.min(elapsed / DECAY_MS, 1);
      if (elapsed < DECAY_MS) {
        var hz = BASE_FREQ + (TARGET_FREQ - BASE_FREQ) * Math.pow(progress, 1/3);
        freqDisp.textContent = Math.round(hz) + ' Hz';
        requestAnimationFrame(freqTick);
      } else {
        freqDisp.textContent = '&mdash; Hz';
      }
    })();

    // Tear down context after cut completes
    setTimeout(function() {
      if (audioCtx && audioCtx.state === 'running') audioCtx.close();
      audioCtx = null;
    }, DECAY_MS + 50);
  }

  /* ── Stop / teardown ───────────────────────────────────────── */
  function stop() {
    if (scheduledCutTm)   clearTimeout(scheduledCutTm);
    if (animFrameId)      cancelAnimationFrame(animFrameId);
    flash.classList.remove('active');
    label.style.fontWeight = '';
    label.style.transition = '';
    scheduledCutTm = null;
    animFrameId    = null;
    if (audioCtx)     { audioCtx.close(); audioCtx = null; }
    statusEl.textContent = 'ready';
  }

  triggerBtn.addEventListener('click', start);
})();
</script>
</body>
</html>
