<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third</title>
<style>
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; font-family: system-ui, sans-serif; color: #eee; }
  button { padding: 1rem 2rem; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; background: #e94560; color: #fff; transition: background .2s; }
  button:hover { background: #c73650; }
</style>
</head>
<body>
<button id="trigger">▶ Trigger</button>
<script>
/**
 * Web Audio API saw-tooth oscillator with minor-third resolution over
 * exactly 10 ms, followed by an instant hard-cut to silence.
 *
 * Signal chain:
 *   Oscillator (sawtooth) → GainNode (envelope gate) → Destination
 *
 * Timing (sample-accurate via AudioContext.currentTime):
 *   t = now        : osc starts at BASE_FREQ, gain = 1.0
 *   t = now + 10ms : freq reaches minor third (BASE × 2^(3/12)),
 *                    gain jumps to 0.0 → instant hard-cut
 */

const BASE_FREQ    = 220;                 // A3
const SEMITONES    = 3;                   // minor third interval
const FREQ_RATIO   = Math.pow(2, SEMITONES / 12);  // ≈ 1.1892
const DECAY_MS     = 10;                  // precise decay window in ms

document.getElementById('trigger').addEventListener('click', () => {
  const ctx  = new AudioContext();
  const now  = ctx.currentTime;
  const end  = now + DECAY_MS / 1000;      // exact 10 ms mark

  /* --- Oscillator: linear frequency sweep to minor third --- */
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(BASE_FREQ,          now);
  osc.frequency.linearRampToValueAtTime(
    BASE_FREQ * FREQ_RATIO,                       // resolves to minor third
    end                                           // at exactly 10 ms
  );

  /* --- GainNode envelope: instant hard-cut to silence at t=end --- */
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(1.0, now);
  gain.gain.setValueAtTime(0.0, end);              // instantaneous drop

  osc.connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(end);                                   // safety kill at 10 ms
});
</script>
</body>
</html>
