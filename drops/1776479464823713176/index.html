<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth &rarr; Minor Third Zero-Cross Hard-Cut</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  /* Monospaced brutalist font stack */
  font-family: 'Courier New', Courier, 'Lucida Console', Monaco, monospace;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#trigger {
  background: transparent;
  border: 2px solid #e0e0e0;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 18px;
  padding: 16px 32px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

#trigger:hover {
  border-color: #fff;
  background: #1a1a1a;
}

#sync-display {
  margin-top: 32px;
  font-size: 72px;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  /* Do NOT transition font-weight — instant snap only */
  transition: color 8ms linear, font-size 0s;
}

#sync-display.decay-active {
  font-weight: 700 !important;
  color: #ff3333 !important;
}

/* Snap-complete: zero-transition on everything to guarantee instant snap */
#sync-display.snap-complete {
  font-weight: 400 !important;
  color: #e0e0e0 !important;
}

#log {
  margin-top: 24px;
  font-size: 11px;
  color: #666;
  max-width: 500px;
  text-align: left;
  white-space: pre-wrap;
  line-height: 1.8;
  min-height: 60px;
}

#viz-canvas {
  margin-top: 16px;
  border: 1px solid #333;
  background: #000;
}
</style>
</head>
<body>

<button id="trigger">[ TRIGGER ]</button>
<canvas id="viz-canvas" width="512" height="64"></canvas>
<div id="sync-display">- - -</div>
<div id="log"></div>

<script>
(function() {
  'use strict';

  /* Core synthesis constants */
  var BASE_FREQ          = 440;                           // A4 reference
  var MINOR_THIRD_RATIO  = Math.pow(2, 3 / 12);            // ≈1.189207 → C#5
  var DECAY_MS           = 10;                             // 10 ms decay window

  /* DOM references */
  var audioCtx         = null;
  var logEl            = document.getElementById('log');
  var displayEl        = document.getElementById('sync-display');
  var triggerBtn       = document.getElementById('trigger');
  var vizCanvas        = document.getElementById('viz-canvas');
  var vizCtx           = vizCanvas.getContext('2d');

  /* ------------------------------------------------------------------ */
  /* Helpers                                                             */
  /* ------------------------------------------------------------------ */

  function timestamp() { return performance.now().toFixed(6); }

  function log(msg) {
    logEl.textContent += '[' + timestamp() + '] ' + msg + '\n';
  }

  /**
   * Phase-accurate zero-crossing finder for a linearly-ramped sawtooth.
   *
   * During the decay window [0, DECAY_MS] the oscillator frequency sweeps
   * linearly from f0 to f1 = f0 × minor-third-ratio.  After the window it
   * holds at constant f1.
   *
   * Accumulated cycles at t = DECAY_MS:
   *     integral(f(t) dt, t=0..DECAY_MS) = T · (f0+f1)/2
   *
   * The sawtooth waveform 2*phase-1 crosses zero when phase = 0.5 mod 1.
   * After decay ends we project forward at constant f1 to the next such
   * crossing and return its absolute sample index from trigger time.
   */
  function findZeroCrossingAfter(decaySamples, sampleRate) {
    var f0         = BASE_FREQ;
    var f1         = f0 * MINOR_THIRD_RATIO;
    var decaySec   = DECAY_MS / 1000;

    /* Total oscillator cycles accumulated during the ramped window */
    var accumCycles     = (f0 + f1) / 2.0 * decaySec;

    /* Fractional position within the current cycle at decay end */
    var phaseInCycle    = accumCycles % 1.0;                 // ∈ [0, 1)

    /* Sawtooth zeroes: phase = 0.5 mod 1. Walk forward from current
       phase to the next zero-crossing (phase=0.5). */
    var toTarget        = ((0.5 - phaseInCycle) % 1.0 + 1.0) % 1.0;

    /* Convert fraction-of-cycle → integer sample offset at constant f1 */
    var zcOffset        = Math.round(toTarget * sampleRate / f1);

    return {
      sampleIndex: decaySamples + zcOffset,
      offsetMs   : ((decaySamples + zcOffset) / sampleRate * 1000).toFixed(4)
    };
  }

  /** Draw the expected sawtooth waveform over the full decay window. */
  function drawWaveform(sampleRate, freqStart, freqEnd, decaySamples) {
    vizCtx.fillStyle = '#000';
    vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);

    var halfH   = vizCanvas.height / 2;
    vizCtx.strokeStyle = '#0f0';
    vizCtx.lineWidth   = 1;
    vizCtx.beginPath();

    for (var x = 0; x < vizCanvas.width; x++) {
      var frac     = x / (vizCanvas.width - 1);
      var t        = frac * decaySamples / sampleRate;
      var freqAtT  = freqStart + (freqEnd - freqStart) * frac;

      /* Accumulated phase: exact integral of linearly-ramped frequency */
      var accumulatedPhase = t * (freqStart + freqAtT) / 2.0;
      var normPh   = accumulatedPhase - Math.floor(accumulatedPhase); // [0,1)

      /* Sawtooth: 2*phase - 1 ∈ [-1, +1]; zeroes at phase=0.5 */
      var sample   = 2 * normPh - 1;

      var px       = (x / vizCanvas.width) * vizCanvas.width;
      var py       = halfH - sample * (halfH - 2);

      if (x === 0) {
        vizCtx.moveTo(px, py);
      } else {
        vizCtx.lineTo(px, py);
      }
    }
    vizCtx.stroke();

    /* Annotate the computed zero-crossing sample with a red marker */
    var zc     = findZeroCrossingAfter(decaySamples, sampleRate);
    var zcFrac = zc.sampleIndex / (sampleRate * DECAY_MS / 1000);
    if (zcFrac > 1) zcFrac = 1;
    var zcX    = zcFrac * vizCanvas.width;
    vizCtx.strokeStyle = '#f44';
    vizCtx.lineWidth     = 2;
    vizCtx.beginPath();
    vizCtx.moveTo(zcX, 0);
    vizCtx.lineTo(zcX, vizCanvas.height);
    vizCtx.stroke();
  }

  /* ------------------------------------------------------------------ */
  /* Core synthesis trigger (sample-accurant within 1 ms)               */
  /* ------------------------------------------------------------------ */

  function trigger() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)(
        { sampleRate: 48000 }
      );
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    var now         = audioCtx.currentTime;
    var decaySec    = DECAY_MS / 1000;
    var endTime     = now + decaySec;
    var sampleRate  = audioCtx.sampleRate;
    var decaySamples = Math.ceil(decaySec * sampleRate);

    /* -- OscillatorNode: sawtooth, freq ramps to minor third -------- */
    var osc      = audioCtx.createOscillator();
    osc.type     = 'sawtooth';
    osc.frequency.setValueAtTime(BASE_FREQ, now);
    osc.frequency.linearRampToValueAtTime(
      BASE_FREQ * MINOR_THIRD_RATIO, endTime
    );

    /* -- GainNode: hold at 0.5 during decay ------------------------- */
    var gain     = audioCtx.createGain();
    gain.gain.setValueAtTime(0.5, now);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    /* -- Zero-crossing hard-cut at sample-accurate instant ---------- */
    var zc       = findZeroCrossingAfter(decaySamples, sampleRate);
    var cutTime  = now + (zc.sampleIndex / sampleRate);

    /* Instant gain drop: one-sample step from 0.5 → 0 at exact ZC.
     * Web Audio schedules setValueAtTime with sample-accuracy; a
     * two-point pair creates an instantaneous hard-cut (no ramp),
     * preserving waveform purity. */
    gain.gain.setValueAtTime(0.5, cutTime - 1 / sampleRate);
    gain.gain.setValueAtTime(0,   cutTime);

    osc.start(now);
    osc.stop(cutTime);

    /* -- Visual sync: font-weight snap at the exact audio cut ------- */
    var visualDelayMs = (cutTime - now) * 1000;

    displayEl.textContent = '▓ ▓ ▓';
    displayEl.className   = 'decay-active';
    drawWaveform(sampleRate, BASE_FREQ,
                 BASE_FREQ * MINOR_THIRD_RATIO, decaySamples);

    var snapScheduled = false;

    /* Schedule the font-weight snap at precisely cutTime.
     * We use AudioContext.currentTime as the sole time reference so that
     * audio and visuals are driven by the same clock.  A rAF poll catches
     * the boundary within ±1 ms of the sample-accurant deadline. */
    function scheduleSnap() {
      if (snapScheduled) return;
      var audioElapsed = (audioCtx.currentTime - now) * 1000;

      /* Earliest-frame policy: fire when audio clock has caught up or
         passed the cut deadline.  The rAF guarantee keeps jitter ≤ 1 ms
         on modern browsers when the deadline is imminent. */
      if (audioElapsed >= visualDelayMs - 0.5) {
        snapScheduled = true;

        /* CRITICAL: disable ALL transitions before changing font-weight.
         * This guarantees an instantaneous snap with zero easing. */
        displayEl.style.transition           = 'none';
        displayEl.className                  = 'snap-complete';
        displayEl.textContent                = '- - -';

        /* Write metadata while the DOM is in a consistent state */
        log('Sawtooth:        ' + BASE_FREQ + ' Hz → ' +
            (BASE_FREQ * MINOR_THIRD_RATIO).toFixed(2) + ' Hz');
        log('Minor third ratio:   ' + MINOR_THIRD_RATIO.toFixed(6));
        log('Sample rate:         ' + sampleRate + ' Hz');
        log('Decay window:        ' + DECAY_MS + ' ms');
        log('Zero-cross sample:   #' + zc.sampleIndex);
        log('Hard-cut time:       ' + cutTime.toFixed(6) + ' s');

        /* Restore transitions after one paint so next decay animate */
        requestAnimationFrame(function() {
          displayEl.style.transition = '';
        });
      } else {
        requestAnimationFrame(scheduleSnap);
      }
    }

    requestAnimationFrame(scheduleSnap);
  }

  /* ------------------------------------------------------------------ */
  /* Bind trigger                                                        */
  /* ------------------------------------------------------------------ */

  triggerBtn.addEventListener('click', function() {
    logEl.textContent     = '';
    displayEl.style.transition  = '';
    displayEl.className         = '';
    displayEl.textContent       = '- - -';
    trigger();
  });

})();
</script>
</body>
</html>
