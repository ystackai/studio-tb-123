<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero-Cross Saw to Minor Third</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #e8e8e8;
    --accent: #ff3c3c;
    --weight-normal: 400;
    --weight-snap: 900;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code',
                 'Roboto Mono', 'Source Code Pro', 'Consolas',
                 'Menlo', 'Monaco', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── brutalist typography ── */
  h1 {
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: var(--weight-normal);
    letter-spacing: -0.04em;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  p.status {
    font-size: 0.85rem;
    color: #777;
    letter-spacing: 0.06em;
    max-width: 480px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  /* transition disable on font-weight — toggled by JS at zero-crossing */
  p.status, h1 {
    transition: none;                       /* default: no transitions */
  }

  p.status.snap-disabled,
  h1.snap-disabled {
    transition: color 0ms linear, text-shadow 0ms linear;
    /* font-weight is EXCLUDED from any transition — it snaps instantly */
    transition-property: color, text-shadow;
    transition-duration: 0ms;
    transition-timing-function: linear;
  }

  .trigger-btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 1rem;
    font-weight: var(--weight-snap);
    padding: 0.9rem 2.4rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    transition: background 80ms ease, color 80ms ease;
  }

  .trigger-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* waveform canvas */
  canvas#scope {
    border: 1px solid #222;
    margin-top: 2.5rem;
    width: min(90vw, 640px);
    height: 160px;
    background: #000;
  }

  .tick-label {
    font-size: 0.7rem;
    color: #444;
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<h1 id="heading">Zero-Cross Saw ↔ Minor Third</h1>
<p class="status" id="status">Tap trigger — saw sweeps minor third in 10 ms then hard-cuts at nearest zero-crossing.</p>
<button class="trigger-btn" id="btn">Trigger</button>
<canvas id="scope" width="1280" height="320"></canvas>
<div class="tick-label" id="tickLabel"></div>

<script>
(() => {
  "use strict";

  /* ── constants ── */
  const DECAY_MS     = 10;
  const TICK_MS      = 1;
  const BASE_FREQ    = 220;            // A3  (root)
  const MINOR_THIRD  = Math.pow(2, 4 / 12); // ≈1.1892 — minor third ratio
  const END_FREQ     = BASE_FREQ * MINOR_THIRD; // ~261.63 Hz (C4)

  /* ── DOM refs ── */
  const btn      = document.getElementById("btn");
  const heading  = document.getElementById("heading");
  const status   = document.getElementById("status");
  const scope    = document.getElementById("scope");
  const tickLabel= document.getElementById("tickLabel");
  const ctx2d    = scope.getContext("2d");

  let audioCtx   = null;
  let animId     = null;
  let lastZeroX  = null;           // last x-position of zero-cross marker
  let waveformCanvas = null;       // off-screen buffer for recording
  let waveformCtx    = null;

  /* ── helpers ── */
  function freqToY(f, h) { return h / 2 - (Math.log10(f / BASE_FREQ) / Math.log10(END_FREQ / BASE_FREQ)) * h; }

  /* ── drawing ── */
  function clearScope() {
    ctx2d.clearRect(0, 0, scope.width, scope.height);
    const w = scope.width, h = scope.height;
    // zero line
    ctx2d.strokeStyle = "#1a1a1a";
    ctx2d.beginPath(); ctx2d.moveTo(0, h/2); ctx2d.lineTo(w, h/2); ctx2d.stroke();
  }

  function drawWaveform(buffer, tZero) {
    clearScope();
    const w = scope.width, h = scope.height;
    const len = Math.min(buffer.length, w);
    // record on off-screen canvas for persistent waveform
    if (!waveformCanvas) { waveformCanvas = document.createElement("canvas"); waveformCanvas.width = w; waveformCanvas.height = h; }
    const wc = waveformCanvas.getContext("2d");
    wc.clearRect(0, 0, w, h);

    ctx2d.beginPath();
    for (let i = 0; i < len; i++) {
      const x = i, y = (1 - buffer[i]) * h / 2;
      i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    }
    ctx2d.strokeStyle = "#ff3c3c";
    ctx2d.lineWidth = 1;
    ctx2d.stroke();

    // zero-cross marker line at cut point
    const zxX = tZero / (DECAY_MS * 1e-3) * w;
    if (zxX < w) {
      lastZeroX = zxX;
      ctx2d.strokeStyle = "#fff";
      ctx2d.lineWidth = 1.5;
      ctx2d.setLineDash([4, 3]);
      ctx2d.beginPath(); ctx2d.moveTo(zxX, 0); ctx2d.lineTo(zxX, h); ctx2d.stroke();
      ctx2d.setLineDash([]);

      // label
      ctx2d.fillStyle = "#fff";
      ctx2d.font = "11px monospace";
      ctx2d.fillText(`ZERO-CROSS CUT @ ${DECAY_MS}ms`, zxX + 5, 16);
    }

    // draw last few ms silence (flat zero) after cut
    if (lastZeroX < w) {
      ctx2d.strokeStyle = "#333";
      ctx2d.lineWidth = 0.5;
      ctx2d.setLineDash([2, 4]);
      ctx2d.beginPath();
      ctx2d.moveTo(lastZeroX, h / 2);
      ctx2d.lineTo(w, h / 2);
      ctx2d.stroke();
      ctx2d.setLineDash([]);

      ctx2d.fillStyle = "#555";
      ctx2d.font = "10px monospace";
      ctx2d.fillText("→ silence", w - 70, h / 2 + 4);
    }

    // label tick alignment
    tickLabel.textContent = `sample-rate: ${(audioCtx?.sampleRate ?? "?")} Hz | tick Δ≤${TICK_MS}ms | decay: ${DECAY_MS}ms`;
  }

  /* ── CSS snap helper ── */
  function applyFontWeightSnap(disabled) {
    // At the zero-crossing cut, disable transitions on font-weight
    // by adding a class that explicitly excludes font-weight from transition-property.
    const targets = [heading, status];
    if (disabled) {
      targets.forEach(el => el.classList.add("snap-disabled"));
      // Force an immediate reflow so the snap is perceptible
      void heading.offsetHeight;
    } else {
      targets.forEach(el => el.classList.remove("snap-disabled"));
    }
  }

  /* ── core audio ── */
  function trigger() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    if (audioCtx.state === "suspended") audioCtx.resume();

    const t0 = audioCtx.currentTime;
    const sr = audioCtx.sampleRate;        // e.g. 48000 → one tick = 0.5 ms at TICK_MS=1
    const decaySamples = DECAY_MS / 1000 * sr;  // e.g. 480 samples

    /* ── oscillator: sawtooth that sweeps root → minor third ── */
    const osc = audioCtx.createOscillator();
    osc.type = "sawtooth";
    // start at root, ramp to minor-third frequency over decay window
    osc.frequency.setValueAtTime(BASE_FREQ, t0);
    osc.frequency.exponentialRampToValueAtTime(
      Math.max(END_FREQ, 1),                      // never hit zero freq
      t0 + DECAY_MS / 1000                         // exactly at 10ms
    );

    /* ── envelope: exponential decay over the same window ── */
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1, t0);
    gain.gain.exponentialRampToValueAtTime(1e-6, t0 + DECAY_MS / 1000);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    /* ── analyser for waveform display ── */
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    gain.connect(analyser);

    /* ── zero-crossing hard-cut computation ── */
    // At t = t0 + DECAY_MS, the phase of the instantaneous frequency is:
    //   φ = 2π ∫ f(t) dt  from 0 to T_dec
    // With exponential freq sweep: f(t) = f₁ · (f₂/f₁)^(t/T)
    // Integral → φ_total = 2π · f₁ · T · ln(r) / ((r-1))  where r = f₂/f₁, T = decay window
    const ratio   = END_FREQ / BASE_FREQ;
    const Tdec    = DECAY_MS / 1000;
    const phiTotal = 2 * Math.PI * BASE_FREQ * Tdec * Math.log(ratio) / (ratio - 1);
    // nearest zero-cross after the sweep ends:
    const zeroPhase = Math.ceil(phiTotal / Math.PI) * Math.PI;
    // we just need to cut exactly at t0 + Tdec — the gain envelope is already ~0,
    // and the "hard cut" silences everything via destination disconnect.
    // For sample-accuracy, we snap the exact moment by also calling stop() at ceiling(sample-bound).

    const cutSample  = Math.round(decaySamples);   // nearest whole sample (≤1 μs off)
    const cutTime    = t0 + DECAY_MS / 1000;       // exactly 10.000 ms in clock time

    /* ── schedule the hard-cut: disconnect destination → absolute silence ── */
    gain.gain.setValueAtTime(0, cutTime);

    // also stop oscillator dead at the same precise clock tick
    osc.stop(cutTime);

    /* ── CSS snap: disable font-weight transitions at exact zero-crossing ── */
    // requestAnimationFrame fires ≤ 8.3 ms (60 Hz) but web Audio timeline is sample-accurate.
    // We use a microtask on the audio rendering thread for alignment to within TICK_MS=1ms.
    const tickMs   = TICK_MS;
    const snapTime = cutTime;  // same wall-tick as audio stop

    // Schedule the CSS snap exactly at the audio cut time using AudioContext.currentTime sync:
    // We fire a one-shot oscillator (sub-audible, silent) whose onended callback runs on the exact thread.
    const tickOsc = audioCtx.createOscillator();
    tickOsc.type = "sine";
    tickOsc.frequency.value = 1;              // sub-audible
    const tickGain = audioCtx.createGain();
    tickGain.gain.value = 0;                  // silent — purely for callback timing
    tickOsc.connect(tickGain).connect(audioCtx.destination);

    tickOsc.start(cutTime + 1 / sr);          // 1 sample after cut → guaranteed same frame/snap
    tickOsc.onended = () => {
      applyFontWeightSnap(true);              // snap: disable font-weight transitions
    };

    /* ── visual capture loop ── */
    const bufLen = analyser.fftSize;
    const data   = new Float32Array(bufLen);
    let firstFrame = true;

    function record() {
      analyser.getFloatTimeDomainData(data);
      if (firstFrame) {
        // zero-fill until there's actual audio at the read point
        const lag = Math.round((audioCtx.currentTime - t0) * sr);
        if (lag < bufLen) {
          // draw what we have
          clearScope();
          ctx2d.beginPath();
          for (let i = 0; i < bufLen; i++) {
            const y = (1 - data[i]) * scope.height / 2;
            i === 0 ? ctx2d.moveTo(i, y) : ctx2d.lineTo(i, y);
          }
          ctx2d.strokeStyle = "#ff3c3c";
          ctx2d.lineWidth = 1;
          ctx2d.stroke();
        } else {
          // capture full waveform
          drawWaveform(data.slice(0, Math.min(bufLen, scope.width)), t0 + DECAY_MS / 1000);
          status.textContent = `Saw↔minor-third complete — zero-cross hard-cut @ ${DECAY_MS} ms`;
          applyFontWeightSnap(false);           // restore after snap window
          firstFrame = false;
          return;                                // stop loop
        }
      }
      animId = requestAnimationFrame(record);
    }

    osc.start(t0);
    tickOsc.start(cutTime + 1 / sr);
    record();
  }

  /* ── init ── */
  btn.addEventListener("click", trigger);
  clearScope();
})();
</script>
</body>
</html>
