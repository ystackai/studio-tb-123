<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third Zero-Cross Hard-Cut</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', Courier, 'Lucida Console', Monaco, monospace;
  font-size: 14px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

#trigger {
  background: transparent;
  border: 2px solid #e0e0e0;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 18px;
  padding: 16px 32px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

#trigger:hover {
  border-color: #fff;
  background: #1a1a1a;
}

/* 
  Snap-sync display – transitions are ON by default for the decay phase,
  then explicitly disabled at the cut moment so font-weight snaps instantly.
*/
#sync-display {
  margin-top: 32px;
  font-size: 72px;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  /* Active transitions for the decay → stressed build */
  transition: font-weight 8ms linear, color 8ms linear;
}

/* Decay phase: go to bold (stressed). Transitions remain active. */
#sync-display.decay-active {
  font-weight: 700 !important;
  color: #ff3333 !important;
}

/* Snap-complete: at the hard-cut instant, transitions are disabled so
   font-weight reverts to 400 with zero latency (brutalist snap). */
#sync-display.snap-complete {
  transition: none !important;
  font-weight: 400 !important;
  color: #e0e0e0 !important;
}

#log {
  margin-top: 24px;
  font-size: 11px;
  color: #666;
  max-width: 500px;
  text-align: left;
  white-space: pre-wrap;
  line-height: 1.8;
  min-height: 60px;
}

#viz-canvas {
  margin-top: 16px;
  border: 1px solid #333;
  background: #000;
}
</style>
</head>
<body>

<button id="trigger">[ TRIGGER ]</button>
<canvas id="viz-canvas" width="512" height="64"></canvas>
<div id="sync-display">- - -</div>
<div id="log"></div>

<script>
(function() {
  'use strict';

  /* ── Constants ─────────────────────────────────────────── */
  var BASE_FREQ       = 440;                              // A4
  var MINOR_THIRD_RATIO = Math.pow(2, 3 / 12);            // ≈1.189207 → C♯5
  var DECAY_MS        = 10;                               // 10 ms decay window

  /* ── DOM refs ──────────────────────────────────────────── */
  var audioCtx     = null;
  var logEl        = document.getElementById('log');
  var displayEl    = document.getElementById('sync-display');
  var triggerBtn   = document.getElementById('trigger');
  var vizCanvas    = document.getElementById('viz-canvas');
  var vizCtx       = vizCanvas.getContext('2d');

  /* ── Helpers ───────────────────────────────────────────── */
  function timestamp() { return performance.now().toFixed(6); }

  function log(msg) {
    logEl.textContent += '[' + timestamp() + '] ' + msg + '\n';
  }

  function drawWaveform(freq, sampleRate, numSamples) {
    vizCtx.fillStyle = '#000';
    vizCtx.fillRect(0, 0, vizCanvas.width, vizCanvas.height);

    var halfH = vizCanvas.height / 2;
    vizCtx.strokeStyle = '#0f0';
    vizCtx.lineWidth   = 1;
    vizCtx.beginPath();

    for (var x = 0; x < numSamples; x++) {
      var t        = x / sampleRate;
      var phase    = (t * freq) % 1;
      var sample   = 2 * phase - 1;           // saw ∈ [-1, 1]

      var px = (x / numSamples) * vizCanvas.width;
      var py = halfH - sample * (halfH - 2);

      if (x === 0) {
        vizCtx.moveTo(px, py);
      } else {
        vizCtx.lineTo(px, py);
      }
    }
    vizCtx.stroke();
  }

    /**
     * Phase-accurate zero-crossing finder for a linearly-ramped sawtooth.
     * During decay (0→DECAY_MS), freq ramps f0→f1. We compute the exact
     * accumulated phase at decay end, then project forward from there using
     * the post-decay constant frequency to find the next zero-crossing.
     */
  function findZeroCrossingAfter(decaySamples, sampleRate) {
    var f0          = BASE_FREQ;
    var f1          = f0 * MINOR_THIRD_RATIO;    // minor third above f0
    var decaySec    = DECAY_MS / 1000;

      // Accumulated oscillator cycles at the exact end of the ramped window.
      // With linear frequency sweep: ∫₀ᵀ(f0 + (f1-f0)·t/T) dt = T·(f0+f1)/2
    var accumulatedCycles = (f0 + f1) / 2.0 * decaySec;
    var phaseInCycle       = accumulatedCycles % 1.0;        // ∈ [0, 1)

      // Our sawtooth (2·phase − 1) crosses zero exactly at phase = 0.5.
      // After decay the frequency is constant at f1.
    var targetPhase = 0.5;
    var toTarget     = ((targetPhase - phaseInCycle) % 1.0 + 1.0) % 1.0;

    return {
        sampleIndex: decaySamples + Math.round(toTarget / f1 * sampleRate),
        offsetMs:     (((decaySamples + Math.round(toTarget / f1 * sampleRate)) / sampleRate * 1000)).toFixed(4)
      };
    }

  /* ── Core synthesis trigger ────────────────────────────── */
  function trigger() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    var now       = audioCtx.currentTime;
    var decaySec  = DECAY_MS / 1000;
    var endTime   = now + decaySec;
    var sampleRate = audioCtx.sampleRate;
    var decaySamples = Math.ceil(decaySec * sampleRate);

    /* ── Oscillator: sawtooth, freq sweeps to minor third ── */
    var osc     = audioCtx.createOscillator();
    osc.type    = 'sawtooth';
    osc.frequency.setValueAtTime(BASE_FREQ, now);
    osc.frequency.linearRampToValueAtTime(BASE_FREQ * MINOR_THIRD_RATIO, endTime);

    /* ── Gain: hold during decay, zero at hard-cut sample ─ */
    var gain   = audioCtx.createGain();
    gain.gain.setValueAtTime(0.5, now);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    /* ── Zero-crossing hard-cut ─────────────────────────── */
    var zc     = findZeroCrossingAfter(decaySamples, sampleRate);
    var cutTime = now + (zc.sampleIndex / sampleRate);

    /* Abrupt zero at the zero-crossing — no ramp needed.
       Web Audio schedules at sample-accuracy; abrupt setValueAtTime(0)
       on the same exact sample is a hard-cut. */
    gain.gain.setValueAtTime(0.5, cutTime - 1 / sampleRate);
    gain.gain.setValueAtTime(0, cutTime);

    osc.start(now);
    osc.stop(cutTime);

    /* ── Visual sync: font-weight snap at exact audio cut ─ */
    var visualDelayMs = (cutTime - now) * 1000;

    // Phase 1: decay-active — bold, transitions ON for stressed build
    displayEl.textContent = '▓ ▓ ▓';
    displayEl.className   = 'decay-active';
    drawWaveform(BASE_FREQ, sampleRate, 480);

    // Phase 2: at the hard-cut instant → kill transitions, snap to normal weight
    var snapScheduled = false;
    var snapFrameId   = null;

    function scheduleSnap() {
      if (snapScheduled) return;
      var elapsed = performance.now();

      /* Use AudioContext.currentTime for sample-accurate comparison.
         The difference between audio clock and wall-clock is bounded
         to < 1 ms on modern browsers because current time is derived
         from the same hardware timer. */
      var audioElapsed = (audioCtx.currentTime - now) * 1000;

      if (audioElapsed >= visualDelayMs - 0.5) {  // 0.5 ms safety margin
        snapScheduled = true;

        /* Kill all CSS transitions for zero-latency hard-cut */
        displayEl.style.transition    = 'none';
        displayEl.className           = 'snap-complete';   // font-weight 400 !important
        displayEl.textContent         = '- - -';

        log('Oscillator: sawtooth, ' + BASE_FREQ + 'Hz → ' + (BASE_FREQ * MINOR_THIRD_RATIO).toFixed(2) + 'Hz');
        log('Minor third ratio: ' + MINOR_THIRD_RATIO.toFixed(6));
        log('Sample rate: ' + sampleRate + ' Hz');
        log('Decay window: ' + DECAY_MS + ' ms');
        log('Zero-cross sample: #' + zc.sampleIndex);
        log('Hard-cut (audio clock): ' + cutTime.toFixed(6) + ' s');

        /* Verify audio-wall-clock alignment */
        var wallElapsed = performance.now() - (now * 1000);   // approximate wall base
        var discrepancy = Math.abs(audioElapsed - visualDelayMs);
        log('Audio-to-snap delta: ' + (audioElapsed - visualDelayMs).toFixed(3) + ' ms');
        log('Clock tick alignment: ' + (discrepancy < 1 ? 'PASS ≤1ms' : 'WARN >1ms'));

        /* Re-enable transitions for the next trigger */
        displayEl.style.transition = '';
      } else {
        snapFrameId = requestAnimationFrame(scheduleSnap);
      }
    }

    requestAnimationFrame(scheduleSnap);
  }

  /* ── Bind trigger ──────────────────────────────────────── */
  triggerBtn.addEventListener('click', function() {
    logEl.textContent         = '';
    displayEl.style.transition = '';
    displayEl.className       = '';
    displayEl.textContent     = '- - -';
    trigger();
  });

})();
</script>
</body>
</html>
