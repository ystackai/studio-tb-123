<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third — TB-123</title>
<style>
   * { font-family: 'Courier New', Courier, 'Lucida Sans Typewriter', monospace; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #0d0d0d;
    color: #e0e0e0;
  }

   #title {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: font-weight 0.05s linear;
  }

   #trigger {
    display: block;
    margin-top: 2rem;
    padding: 1rem 2.4rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: 3px solid #e94560;
    background: transparent;
    color: #e94560;
    outline: none;
  }

   #trigger:active { background: #e94560; color: #0d0d0d; }

   .snap-active *,
   .snap-active #title {
    transition: none !important;
  }
</style>
</head>
<body>

<h1 id="title">Saw &rarr; M3 &nbsp;&starf;&nbsp; TB-123</h1>
<button id="trigger">&#9654; Trigger</button>

<script type="module">
import { attachOnEndedSnap } from './snap.js';

const BASE_FREQ = 220;                  // A3
const SEMITONES = 3;                    // minor third
const FREQ_RATIO = Math.pow(2, SEMITONES / 12);  // ~1.1892
const DECAY_MS  = 10;

/** Pre-compute exact sawtooth buffer with logarithmic freq sweep. */
function buildSawBuffer(sr) {
  const N = Math.round(DECAY_MS / 1000 * sr);
  const data = new Float32Array(N);
  const logRatio = Math.log(FREQ_RATIO) / N;

  for (let i = 0; i < N; i++) {
    const freq = BASE_FREQ * Math.exp(logRatio * i);
    data[i] = ((freq / sr) * i) % 1.0;
  }

  const buf = new AudioBuffer({ length: N, sampleRate: sr, channelCount: 1 });
  buf.getChannelData(0).set(data);
  return buf;
}

/** Find next zero-crossing to trim for hard-cut silence. */
function trimToZeroCrossing(buf) {
  const d = buf.getChannelData(0);
  for (let i = 2; i < d.length; i++) {
    if ((d[i-1] >= 0 && d[i] <= 0) || (d[i-1] <= 0 && d[i] >= 0)) {
      return Math.min(i, d.length);
    }
  }
  return d.length;
}

/** Trigger audio + visual snap. */
function play() {
  const ctx = new AudioContext();
  const now = ctx.currentTime;

  const buf = buildSawBuffer(ctx.sampleRate);
  const trimAt = trimToZeroCrossing(buf);

  // Trim to zero-crossing for sample-accurate hard-cut silence
  const trimmed = new AudioBuffer({ length: trimAt, sampleRate: ctx.sampleRate, channelCount: 1 });
  trimmed.getChannelData(0).set(buf.getChannelData(0), 0);

  const srcNode = ctx.createBufferSource();
  srcNode.buffer = trimmed;
  srcNode.connect(ctx.destination);
  srcNode.start(now + 0);

  document.body.classList.add('snap-active');
  attachOnEndedSnap(srcNode, 'title');
}

document.getElementById('trigger').addEventListener('click', play);
</script>
</body>
</html>
