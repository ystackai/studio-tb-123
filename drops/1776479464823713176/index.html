<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third — TB-123</title>
<style>
 /* ── Brutalist monospace stack ─────────────────────────────── */
 * {
   font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code',
                'IBM Plex Mono', 'Source Code Pro', 'Consolas',
                'Liberation Mono', 'Courier New', monospace;
 }

 body {
   display: flex;
   justify-content: center;
   align-items: center;
   min-height: 100vh;
   margin: 0;
   background: #0d0d0d;
   color: #e0e0e0;
 }

 #title {
   font-size: 2.4rem;
   font-weight: 700;
   letter-spacing: 0.08em;
   transition: font-weight 0.05s linear;
 }

 #trigger {
   display: block;
   margin-top: 2rem;
   padding: 1rem 2.4rem;
   font-size: 1rem;
   font-weight: 700;
   letter-spacing: 0.12em;
   text-transform: uppercase;
   cursor: pointer;
   border: 3px solid #e94560;
   background: transparent;
   color: #e94560;
   outline: none;
 }

 #trigger:active { background: #e94560; color: #0d0d0d; }

 /* Disable all transitions on body while snap is active */
.snap-active * {
  transition: none !important;
}
</style>
</head>
<body>

<h1 id="title">Saw → M3 &nbsp;✦&nbsp; TB-123</h1>
<button id="trigger">&#9654; Trigger</button>

<script type="module">
import { attachOnEndedSnap } from './snap.js';

const BASE_FREQ    = 220;                    // A3
const SEMITONES    = 3;                      // minor third interval
const FREQ_RATIO   = Math.pow(2, SEMITONES / 12);  // ≈ 1.1892 → ~261.6 Hz
const DECAY_MS     = 10;                     // 10 ms linear decay window

/**
 * Render a saw-tooth note on an OfflineAudioContext.
 * Pitch sweeps BASE_FREQ → BASE_FREQ × minor-third over DECAY_MS.
 * Amplitude decays from 1→0 in the same window.
 * Buffer is trimmed to the next zero-crossing after decay for a hard-cut.
 */
function renderSawOscillator(sr) {
  const decayFrames = Math.round(DECAY_MS / 1000 * sr);
  const margin      = Math.max(2, Math.ceil(sr / 1000)); // +1 ms tail for safe stop

  const offline = new OfflineAudioContext(1, decayFrames + margin, sr);
  const t0      = offline.currentTime;

  // ── Sawtooth oscillator with pitch & amplitude ramps ────────
  const osc   = offline.createOscillator();
  const gain  = offline.createGain();

  osc.type     = 'sawtooth';
  osc.frequency.setValueAtTime(BASE_FREQ,          t0);
  osc.frequency.exponentialRampToValueAtTime(
    BASE_FREQ * FREQ_RATIO, t0 + DECAY_MS / 1000   // A3 → minor third ~261.6 Hz
  );

  gain.gain.setValueAtTime(1,            t0);
  gain.gain.linearRampToValueAtTime(0,   t0 + DECAY_MS / 1000);  // 10 ms decay

  osc.connect(gain).connect(offline.destination);
  osc.start(t0);
  osc.stop(t0 + (decayFrames + margin) / sr);

  return offline.startRendering().then(buf => {
    const d = buf.getChannelData(0);

    // ── Find next zero-crossing after decay tail ─────────────
    let cutAt = d.length;
    for (let i = decayFrames; i < d.length - 1; i++) {
      if ((d[i] >= 0 && d[i + 1] <= 0) || (d[i] <= 0 && d[i + 1] >= 0)) {
        cutAt = i;
        break;
      }
    }

    // Hard-cut: silence everything past the zero-crossing
    for (let i = cutAt; i < d.length; i++) d[i] = 0;

    // Trim buffer to the exact crossing boundary
    const trimmed = new AudioBuffer({ length: cutAt, sampleRate: sr, channelCount: 1 });
    trimmed.getChannelData(0).set(d.subarray(0, cutAt));
    return trimmed;
  });
}

/** Trigger synth + visual snap */
async function play() {
  const ctx = new AudioContext();
  document.body.classList.add('snap-active');

  try {
    const buf = await renderSawOscillator(ctx.sampleRate);

    const srcNode = ctx.createBufferSource();
    srcNode.buffer = buf;

    // Final master gain — no reverb, no delay, no effects.
    const finalGain = ctx.createGain();
    finalGain.gain.setValueAtTime(1, ctx.currentTime);

    srcNode.connect(finalGain).connect(ctx.destination);
    srcNode.start(ctx.currentTime + 0);          // sample-accurate trigger
    attachOnEndedSnap(srcNode, 'title');         // visual snap on audio cut
  } catch (err) {
    console.error('Render failed:', err);
    document.body.classList.remove('snap-active');
  }
}

document.getElementById('trigger').addEventListener('click', play);
</script>
</body>
</html>
