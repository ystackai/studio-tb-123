<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawtooth → Minor Third — TB-123</title>
<style>
  /* Monospaced brutalist font stack */
  *, *::before, *::after { font-family: 'Courier New', Courier, 'Lucida Sans Typewriter', monospace; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: #0d0d0d;
    color: #e0e0e0;
  }

  #title {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    transition: font-weight 0.05s linear;        /* fast fallback; snap overrides */
  }

  #trigger {
    display: block;
    margin-top: 2rem;
    padding: 1rem 2.4rem;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border: 3px solid #e94560;
    background: transparent;
    color: #e94560;
    outline: none;
  }

  #trigger:active { background: #e94560; color: #0d0d0d; }

  /* Disable ALL transitions during snap event (font-weight is the target) */
  .snap-active *,
  .snap-active #title {
    transition: none !important;
  }
</style>
</head>
<body>

<h1 id="title">Saw → M3 &nbsp;✦&nbsp; TB-123</h1>
<button id="trigger">&#9654; Trigger</button>

<script type="module">
import { attachOnEndedSnap } from './snap.js';

/* ─── constants ──────────────────────────────────────────────── */
const BASE_FREQ   = 220;               // A3
const SEMITONES   = 3;                 // minor third interval
const FREQ_RATIO  = Math.pow(2, SEMITONES / 12);  // ≈ 1.1892
const DECAY_MS    = 10;

/* ─── zero-crossing finder (sample-accurate) ────────────────── */
function findNextZeroCrossing(buffer, fromSample) {
  for (let i = fromSample + 1; i < buffer.length; i++) {
    if ((buffer[i - 1] >= 0 && buffer[i] <= 0) ||
        (buffer[i - 1] <= 0 && buffer[i] >= 0)) {
      return i;
    }
  }
  // fallback: hard-cut at last captured sample boundary
  return Math.max(fromSample, buffer.length - 1);
}

/* ─── audio engine (called on each user click) ──────────────── */
function play() {
  const ctx = new AudioContext();
  const now = ctx.currentTime;

  /* --- Oscillator: sawtooth, linear sweep to minor-third --- */
  const osc      = ctx.createOscillator();
  const gain     = ctx.createGain();
  osc.type       = 'sawtooth';
  osc.frequency.setValueAtTime(BASE_FREQ,              now);
  osc.frequency.linearRampToValueAtTime(
    BASE_FREQ * FREQ_RATIO,            // resolves to minor third
    now + DECAY_MS / 1000              // exactly at 10 ms mark
  );

  /* --- Envelope gate: full gain → hard cut at decay end --- */
  const decayEnd = now + DECAY_MS / 1000;
  gain.gain.setValueAtTime(1.0, now);
  gain.gain.setValueAtTime(1.0, decayEnd - (1 / ctx.sampleRate));
  gain.gain.setValueAtTime(0.0, decayEnd);

  /* --- Capture chain: osc → gain → processor ─── destination --- */
  const headroomSamples = Math.ceil((DECAY_MS + 32) / 1000 * ctx.sampleRate);
  const captureBuffer   = ctx.createBuffer(1, headroomSamples, ctx.sampleRate);
  const channelData     = captureBuffer.getChannelData(0);

  let writtenOffset = 0;
  const processor   = ctx.createScriptProcessor(4096, 0, 1);

  processor.onaudioprocess = (e) => {
    const src = e.inputBuffer.getChannelData(0);
    for (let i = 0; i < src.length && writtenOffset < channelData.length; i++, writtenOffset++) {
      channelData[writtenOffset] = src[i];
    }
  };

  osc.connect(gain).connect(processor);
  gain.connect(ctx.destination);        // audible output

  /* --- Schedule: play captured buffer (trimmed to ZC) from t=now ── */
  processor.onaudioprocess = null;      // stop recording
  osc.stop(decayEnd);

  const zcIndex = findNextZeroCrossing(channelData, writtenOffset - 1);
  const zcTrimmed = Math.min(zcIndex, channelData.length);

  const trimmedBuffer = ctx.createBuffer(1, zcTrimmed, ctx.sampleRate);
  trimmedBuffer.getChannelData(0).set(channelData.subarray(0, zcTrimmed));

  /* --- Source node → destination. Playback ends at ZC trim point. --- */
  const srcNode = ctx.createBufferSource();
  srcNode.buffer = trimmedBuffer;
  srcNode.connect(ctx.destination);
  srcNode.start(now + 0);               // sample-accurate start

  /* ─── UI snap: fires at EXACT audio cut (onended) ───────────── */
  document.body.classList.add('snap-active');
  attachOnEndedSnap(srcNode, 'title');
}

document.getElementById('trigger').addEventListener('click', play);
</script>
</body>
</html>
