<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Circuit — Browser Synthesizer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Open Circuit</h1>
      <p class="subtitle">Grid is the instrument. Drag to sweep. Crank to self-oscillate.</p>
    </header>

    <div id="main">
      <div id="grid-container">
        <canvas id="grid-canvas"></canvas>
        <div id="grid-overlay">
          <span id="clip-indicator" class="clip-indicator">CLIP</span>
        </div>
      </div>

      <div id="controls">
        <div class="control-group">
          <label for="cutoff-slider">Filter Cutoff</label>
          <input type="range" id="cutoff-slider" min="50" max="12000" value="2000" step="1">
          <span id="cutoff-value">2000 Hz</span>
        </div>

        <div class="control-group">
          <label for="resonance-slider">Resonance</label>
          <input type="range" id="resonance-slider" min="0" max="30" value="5" step="0.1">
          <span id="resonance-value">5.0</span>
        </div>

        <div class="control-group">
          <label for="decay-slider">Decay / Self-Osc</label>
          <input type="range" id="decay-slider" min="0" max="1" value="0.3" step="0.001">
          <span id="decay-value">0.300</span>
        </div>

        <div class="control-group">
          <label for="gain-slider">Output Gain</label>
          <input type="range" id="gain-slider" min="0" max="1" value="0.5" step="0.01">
          <span id="gain-value">0.50</span>
        </div>

        <div class="control-group">
          <label for="wave-select">Waveform</label>
          <select id="wave-select">
            <option value="sawtooth" selected>Sawtooth</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sine">Sine</option>
          </select>
        </div>

        <button id="start-btn" class="action-btn">Start Audio Engine</button>
      </div>
    </div>

    <div id="status-bar">
      <span id="latency-display">Latency: --</span>
      <span id="osc-state">Self-Osc: OFF</span>
      <span id="chord-display">Chord: Cmaj (C E G)</span>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
