<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="studio-slug" content="sacrificial-buffer">
  <title>The Sacrificial Buffer</title>
  <style>
    /* Sacrificial Buffer specific styles */
    body {
      background-color: #1a1a1a;
      color: #00ffff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      width: 100%;
    }

    #text {
      font-size: 2rem;
      margin-bottom: 2rem;
      transition: transform 0.05s ease-out;
      letter-spacing: 2px;
    }

    #slider-container {
      width: 80%;
      max-width: 400px;
    }

    #tension-slider {
      width: 100%;
      height: 20px;
      -webkit-appearance: none;
      background: #333;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
    }

    #tension-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #00ffff;
      cursor: pointer;
      box-shadow: 0 0 10px #00ffff;
    }

    #fracture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
    }

    .fracture-line {
      position: absolute;
      background: #00ffff;
      box-shadow: 0 0 5px #00ffff;
    }

    /* Reset styles */
    #reset-btn {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 2rem;
      background: #00ffff;
      color: #1a1a1a;
      border: none;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      z-index: 1001;
      box-shadow: 0 0 15px #00ffff;
      transition: all 0.2s;
    }

    #reset-btn:hover {
      transform: translate(-50%, -50%) scale(1.05);
      box-shadow: 0 0 20px #00ffff;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="text">THE SACRIFICIAL BUFFER</div>
    <div id="slider-container">
      <input type="range" id="tension-slider" min="0" max="100" value="0">
    </div>
    <div id="fracture"></div>
    <button id="reset-btn">TAP TO RESTART</button>
  </div>

  <script>
    // Initialize audio context
    let audioContext;
    let oscillator;
    let gainNode;
    let startTime;
    let animationFrame;
    let buffer = new Array(100000); // Simulated buffer
    let isDepleting = false;
    let bufferLevel = 100;
    let lastUpdateTime = 0;

    // DOM elements
    const textElement = document.getElementById('text');
    const slider = document.getElementById('tension-slider');
    const fractureElement = document.getElementById('fracture');
    const resetBtn = document.getElementById('reset-btn');

    // Initialize
    function init() {
      // Initialize audio context on first user interaction
      document.addEventListener('click', initAudio, { once: true });
      document.addEventListener('touchstart', initAudio, { once: true });

      // Slider event
      slider.addEventListener('input', handleSliderInput);

      // Reset button event
      resetBtn.addEventListener('click', reset);

      // Start the buffer depletion animation
      animate();
    }

    function initAudio() {
      // Create audio context
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      oscillator = audioContext.createOscillator();
      gainNode = audioContext.createGain();

      // Connect nodes
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      // Set oscillator type
      oscillator.type = 'sine';

      // Start oscillator
      oscillator.start();

      // Set initial gain
      gainNode.gain.value = 0;

      // Set initial frequency
      oscillator.frequency.value = 220;

      // Start the audio loop
      startTime = audioContext.currentTime;
    }

    function handleSliderInput() {
      if (!audioContext) {
        initAudio();
      }

      const value = parseInt(slider.value);
      bufferLevel = value;

      // Update text stretching
      const scale = 1 + (100 - value) / 50;
      textElement.style.transform = `scaleX(${scale})`;

      // Update audio
      if (oscillator && gainNode) {
        const volume = value / 100;
        gainNode.gain.value = volume;

        // Modulate oscillator frequency based on buffer level
        if (value > 0) {
          // Detune oscillator as buffer depletes
          const detune = (100 - value) * 20;
          oscillator.detune.value = detune;
        } else {
          oscillator.detune.value = 0;
        }
      }

      // Start depletion if not already running
      if (value > 0 && !isDepleting) {
        isDepleting = true;
        startTime = audioContext.currentTime;
      }
    }

    function animate() {
      if (isDepleting) {
        const currentTime = audioContext.currentTime;
        const elapsed = currentTime - startTime;
        const depletionRate = 0.0005; // Rate of depletion per second
        
        // Update buffer level
        bufferLevel = Math.max(0, 100 - elapsed * depletionRate * 10000);
        
        // Update text stretching
        const scale = 1 + (100 - bufferLevel) / 50;
        textElement.style.transform = `scaleX(${scale})`;

        // Modulate audio based on depletion
        if (oscillator && gainNode) {
          // Increase pitch detune as buffer depletes
          const detune = (100 - bufferLevel) * 20;
          oscillator.detune.value = detune;
          
          // Create panic effect - faster pitch changes as buffer depletes
          const panicRate = (100 - bufferLevel) / 50;
          oscillator.frequency.value = 220 + panicRate * 880;
          
          // Modulate volume to simulate "panic" effect
          const volume = Math.min(1, bufferLevel / 100);
          gainNode.gain.value = volume;
        }

        // Check for complete depletion
        if (bufferLevel <= 0) {
          completeDepletion();
          return;
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    function completeDepletion() {
      isDepleting = false;

      // Stop audio
      if (oscillator) {
        oscillator.stop();
      }

      // Create fracture effect
      createFracture();

      // Hide slider and text
      textElement.style.display = 'none';
      slider.parentElement.style.display = 'none';

      // Show reset button
      resetBtn.style.display = 'block';
    }

    function createFracture() {
      // Create fracture lines
      fractureElement.innerHTML = '';

      // Create 20 fracture lines
      for (let i = 0; i < 20; i++) {
        const line = document.createElement('div');
        line.className = 'fracture-line';

        // Random position and size
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const width = Math.random() * 100 + 50;
        const height = Math.random() * 100 + 50;

        // Set initial position and size
        line.style.left = `${x}%`;
        line.style.top = `${y}%`;
        line.style.width = `${width}px`;
        line.style.height = `${height}px`;

        // Random rotation
        const rotation = Math.random() * 360;
        line.style.transform = `rotate(${rotation}deg)`;

        fractureElement.appendChild(line);
      }

      // Fade in fracture
      fractureElement.style.opacity = 1;

      // Hide after 1 second
      setTimeout(() => {
        fractureElement.style.opacity = 0;
      }, 1000);
    }

    function reset() {
      // Reset everything
      slider.value = 0;
      bufferLevel = 100;
      textElement.style.display = 'block';
      textElement.style.transform = 'scaleX(1)';
      slider.parentElement.style.display = 'block';
      resetBtn.style.display = 'none';
      fractureElement.style.opacity = 0;

      // Reset audio
      if (oscillator) {
        oscillator.stop();
      }
      if (audioContext) {
        audioContext.close();
      }

      // Reinitialize
      initAudio();
      isDepleting = false;
      startTime = audioContext.currentTime;

      // Restart animation
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
      }
      animate();
    }

    // Start everything
    init();
  </script>
</body>
</html>
