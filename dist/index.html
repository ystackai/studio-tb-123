<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Glasshouse Frequency</title>
<style>*{margin:0;padding:0}canvas{display:block;background:#0a0a12;margin:auto;cursor:pointer}</style>
</head>
<body><canvas id="c" width="960" height="640"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),W=960,H=640;
const AU=window.AudioContext||window.webkitAudioContext,ac=new AU();
function tone(f,d=0.3,t='sine'){try{const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
const CHANS=[{n:'Alpha',c:'#4af',f:261},{n:'Beta',c:'#f4a',f:329},{n:'Gamma',c:'#af4',f:392}];
const PAYOFFS=[{n:'Clean Pass',d:'Stable (+1 res)',c:'#4f4'},{n:'Harmonic Stack',d:'All channels (+3 or shatter)',c:'#f4a'},{n:'Feedback Loop',d:'Recycle (x2 res or lose)',c:'#ff4'}];
let state='title',round=0,maxRounds=6,signalArrived=false,interference=0,resonance=0;
let particles=[],glassCracks=[],hoveredChan=-1,hoveredPayoff=-1,outcomeType='';
let trace=[],gameStartTime=0,runId=Math.random().toString(36).slice(2,8);
function logTrace(ev){trace.push({event:ev,t:Math.round((Date.now()-gameStartTime)/1000)})}
function burst(x,y,clr,n=12){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:1,clr,s:2+Math.random()*3})}
function tickP(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.02;if(p.life<=0)particles.splice(i,1)}}
function drawP(){particles.forEach(p=>{X.globalAlpha=p.life;X.fillStyle=p.clr;X.beginPath();X.arc(p.x,p.y,p.s,0,Math.PI*2);X.fill()});X.globalAlpha=1}
function drawCracks(){glassCracks.forEach(cr=>{X.strokeStyle='rgba(255,80,80,'+cr.a+')';X.lineWidth=1;X.beginPath();X.moveTo(cr.x,cr.y);X.lineTo(cr.x+cr.dx,cr.y+cr.dy);X.stroke()})}
function drawMeter(){const y=60;X.fillStyle='#222';X.fillRect(280,y,400,20);X.fillStyle='#4af';X.fillRect(280,y,resonance/maxRounds*400,20);X.fillStyle='#fff';X.font='11px monospace';X.textAlign='center';X.fillText('RESONANCE '+Math.round(resonance/maxRounds*100)+'%',480,y+15);X.fillStyle='#f44';X.fillText('Interf: '+interference,780,y+15)}
function drawChans(ly){const lh=70;CHANS.forEach((ch,i)=>{const x=100+i*250,hov=hoveredChan===i;X.strokeStyle=hov?ch.c:'#555';X.lineWidth=hov?3:1;X.strokeRect(x,ly,200,lh);X.fillStyle=ch.c;X.font='15px monospace';X.textAlign='center';X.fillText(ch.n,x+100,ly+22);X.font='11px monospace';X.fillText('f='+ch.f+'Hz',x+100,ly+40);if(hov){X.globalAlpha=0.12;X.fillStyle=ch.c;X.fillRect(x,ly,200,lh);X.globalAlpha=1}})}
function drawHUD(){X.fillStyle='#888';X.font='13px monospace';X.textAlign='left';X.fillText('Round '+(round+1)+'/'+maxRounds,20,25)}
function drawSignal(cx,cy){const pulse=Math.sin(Date.now()/200)*4;X.fillStyle='#ff0';X.beginPath();X.arc(cx,cy,12+pulse,0,Math.PI*2);X.fill();X.fillStyle='#fff';X.font='12px monospace';X.textAlign='center';X.fillText('SIGNAL',cx,cy-22)}
function drawTitle(){X.fillStyle='#aaf';X.font='30px monospace';X.textAlign='center';X.fillText('GLASSHOUSE FREQUENCY',480,140);X.fillStyle='#ddd';X.font='16px monospace';X.fillText('Route frequency signals through crystalline channels',480,200);X.fillStyle='#999';X.font='13px monospace';X.fillText('Each signal must be routed. Rising interference forces',480,260);X.fillText('you to divert or absorb. Build resonance to survive.',480,280);X.fillStyle='#fff';X.font='16px monospace';X.fillText('[ SPACE or CLICK to begin ]',480,420)}
function drawRoute(){drawHUD();drawMeter();const cx=480;if(signalArrived){drawSignal(cx,180);X.strokeStyle='#ff0';X.lineWidth=1;X.setLineDash([4,4]);X.beginPath();X.moveTo(cx,200);X.lineTo(cx,370);X.stroke();X.setLineDash([])}else{X.fillStyle='#888';X.font='14px monospace';X.textAlign='center';X.fillText('Awaiting signal...',cx,180)}drawChans(380);if(signalArrived){X.fillStyle='#ccc';X.font='13px monospace';X.textAlign='center';X.fillText('Decision 1: Route to a channel',cx,540)}}
function drawDivert(){drawHUD();drawMeter();X.fillStyle='#f44';X.font='20px monospace';X.textAlign='center';X.fillText('INTERFERENCE SPIKE',480,120);X.fillStyle='#ddd';X.font='14px monospace';X.fillText('Decision 2: Manage the interference',480,155);const bx=140,by=240;const opts=[{n:'DIVERT',d:'Redirect to empty channel (safe)',c:'#4f4'},{n:'ABSORB',d:'Take hit, boost resonance (+2)',c:'#f4a'},{n:'AMPLIFY',d:'Push through (risk + reward)',c:'#ff4'}];opts.forEach((o,i)=>{const hov=hoveredChan===i;X.strokeStyle=hov?o.c:'#555';X.lineWidth=hov?3:1;X.strokeRect(bx+i*260,by,240,100);X.fillStyle=hov?o.c:'#ccc';X.font='15px monospace';X.textAlign='center';X.fillText(o.n,bx+120+i*260,by+35);X.font='11px monospace';X.fillStyle='#999';X.fillText(o.d,bx+120+i*260,by+60)});X.fillStyle='#aaa';X.font='12px monospace';X.textAlign='center';X.fillText('Choose your interference response',480,560)}
function drawPayoff(){drawHUD();drawMeter();X.fillStyle='#fff';X.font='22px monospace';X.textAlign='center';X.fillText('FINAL RESONANCE',480,100);X.fillStyle='#ccc';X.font='14px monospace';X.fillText('Decision 3: Commit your routing pattern',480,140);const bx=100,by=220;PAYOFFS.forEach((pf,i)=>{const hov=hoveredPayoff===i;X.strokeStyle=hov?pf.c:'#555';X.lineWidth=hov?3:1;X.strokeRect(bx+i*280,by,260,120);X.fillStyle=hov?pf.c:'#ccc';X.font='15px monospace';X.textAlign='center';X.fillText(pf.n,bx+130+i*280,by+35);X.font='11px monospace';X.fillStyle='#999';X.fillText(pf.d,bx+130+i*280,by+60)});X.fillStyle='#ccc';X.font='13px monospace';X.textAlign='center';X.fillText('Choose final strategy',480,560)}
function drawOutcome(){const ok=outcomeType==='success';X.fillStyle=ok?'#4f4':'#f44';X.font='28px monospace';X.textAlign='center';X.fillText(ok?'RESONANCE ACHIEVED':'GLASSHOUSE SHATTERED',480,150);X.fillStyle='#fff';X.font='16px monospace';X.fillText(ok?'The frequencies aligned. The glasshouse sang.':'Interference overwhelmed the channels.',480,200);X.font='14px monospace';X.fillStyle='#aaa';X.fillText('Resonance: '+resonance+'/'+maxRounds,480,260);X.fillText('Run: '+runId,480,290);X.fillStyle='#fff';X.font='16px monospace';X.fillText('[ SPACE or CLICK to restart ]',480,460)}
function startGame(){state='route';round=0;resonance=0;interference=0;glassCracks=[];particles=[];signalArrived=false;hoveredChan=-1;hoveredPayoff=-1;outcomeType='';gameStartTime=Date.now();logTrace('start');setTimeout(()=>{signalArrived=true},1200)}
function doRoute(ci){if(!signalArrived||state!=='route')return;const ch=CHANS[ci];tone(ch.f,0.4);burst(480,380,ch.c,20);logTrace('meaningful_decision');if(round+1>=maxRounds){resonance++;state='payoff';return}if(Math.random()<0.3+interference*0.1){state='divert';logTrace('escalation');tone(120,0.5,'sawtooth');for(let i=0;i<3;i++)glassCracks.push({x:Math.random()*W,y:Math.random()*H,dx:(Math.random()-.5)*60,dy:(Math.random()-.5)*60,a:0.6});interference++;tone(80,0.2,'square')}else{resonance++;round++;signalArrived=false;setTimeout(()=>{signalArrived=true},800)}}
function doDivert(c){if(state!=='divert')return;logTrace('meaningful_decision');tone(200,0.2);if(c===0){tone(300,0.3);resonance++;round++;signalArrived=false;state='route';setTimeout(()=>{signalArrived=true},600)}else if(c===1){tone(400,0.3);resonance+=2;round++;signalArrived=false;state='route';setTimeout(()=>{signalArrived=true},600)}else{if(Math.random()<0.5){tone(500,0.3);resonance+=2;round++;signalArrived=false;state='route';setTimeout(()=>{signalArrived=true},600)}else{tone(100,0.7,'sawtooth');for(let i=0;i<5;i++)glassCracks.push({x:Math.random()*W,y:Math.random()*H,dx:(Math.random()-.5)*80,dy:(Math.random()-.5)*80,a:0.8});round++;signalArrived=false;state='route';setTimeout(()=>{signalArrived=true},600)}}}
function doPayoff(idx){if(state!=='payoff')return;logTrace('payoff');let success=false;switch(PAYOFFS[idx].n){case 'Clean Pass':success=true;resonance++;break;case 'Harmonic Stack':if(Math.random()<0.6){success=true;resonance+=3}else resonance=0;break;case 'Feedback Loop':if(Math.random()<0.4){success=true;resonance+=Math.max(1,Math.round(resonance*0.5))}break}if(success){outcomeType='success';tone(523,0.5,'sine');setTimeout(()=>tone(659,0.5,'sine'),200);setTimeout(()=>tone(784,0.8,'sine'),400);burst(480,320,'#4f4',40)}else{outcomeType='fail';tone(100,1,'sawtooth');for(let i=0;i<15;i++)glassCracks.push({x:Math.random()*W,y:Math.random()*H,dx:(Math.random()-.5)*100,dy:(Math.random()-.5)*100,a:0.9});burst(480,320,'#f44',30)}logTrace('outcome');state='outcome'}
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;if(state==='route'&&signalArrived&&y>370&&y<470)hoveredChan=Math.max(-1,Math.min(2,Math.floor((x-100)/250)));else if(state==='divert'&&y>230&&y<360)hoveredChan=Math.max(-1,Math.min(2,Math.floor((x-140)/260)));else if(state==='payoff'&&y>210&&y<360)hoveredPayoff=Math.max(-1,Math.min(2,Math.floor((x-100)/280)));else{hoveredChan=-1;hoveredPayoff=-1}});
C.addEventListener('click',e=>{const r=C.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;if(state==='title'){startGame();return}if(state==='outcome'){startGame();return}if(state==='route'&&signalArrived&&y>370&&y<470){const c=Math.floor((x-100)/250);if(c>=0&&c<3)doRoute(c);return}if(state==='divert'&&y>230&&y<360){const c=Math.floor((x-140)/260);if(c>=0&&c<3)doDivert(c)}if(state==='payoff'&&y>210&&y<360){const c=Math.floor((x-100)/280);if(c>=0&&c<3)doPayoff(c)}});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(state==='title'||state==='outcome')startGame()}});
function loop(){X.clearRect(0,0,W,H);tickP();if(state==='title')drawTitle();else if(state==='route')drawRoute();else if(state==='divert')drawDivert();else if(state==='payoff')drawPayoff();else drawOutcome();drawCracks();drawP();requestAnimationFrame(loop)}
loop();
</script></body></html>
