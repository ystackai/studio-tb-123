<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #050510;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: none;
  }
  canvas {
    display: block;
  }
  #start-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #050510 80%);
    z-index: 10;
    transition: opacity 1s ease;
  }
  #start-screen h1 {
    color: #ffd060;
    font-size: 3em;
    text-shadow: 0 0 30px #ffd06055;
    margin-bottom: 0.3em;
    letter-spacing: 3px;
  }
  #start-screen p {
    color: #8888cc;
    font-size: 1.2em;
    margin-bottom: 1.5em;
  }
  #start-btn {
    background: linear-gradient(135deg, #ffd060, #ff8800);
    border: none;
    border-radius: 30px;
    padding: 15px 50px;
    font-size: 1.3em;
    font-weight: bold;
    color: #1a0a00;
    cursor: pointer;
    box-shadow: 0 0 25px #ffd06066;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
  }
  #start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px #ffd060aa;
  }
  #game-over {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,16,0.92);
    z-index: 10;
  }
  #game-over h2 {
    font-size: 2.5em;
    margin-bottom: 0.3em;
    text-shadow: 0 0 30px currentColor;
    letter-spacing: 2px;
  }
  #game-over .win h2 { color: #ffd060; }
  #game-over .lose h2 { color: #ff4466; }
  #game-over p {
    color: #aaa;
    font-size: 1.1em;
    margin-bottom: 1.5em;
  }
  #restart-btn {
    background: linear-gradient(135deg, #44aaff, #2266cc);
    border: none;
    border-radius: 30px;
    padding: 12px 40px;
    font-size: 1.1em;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 20px #44aaff55;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #restart-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px #44aaffaa;
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    z-index: 5;
    pointer-events: none;
  }
  .pulse-counter {
    color: #ffd060;
    font-size: 1.4em;
    font-weight: bold;
    text-shadow: 0 0 15px #ffd06055;
  }
  #progress-bar-wrap {
    width: 200px;
    height: 12px;
    background: #1a1a3e;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #333366;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6644, #ffd060);
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  .hint {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: #555588;
    font-size: 0.9em;
    z-index: 5;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Magnetic Moth</h1>
  <p>Guide the moth to the magnetic flowers.<br>Avoid the electric storms.</p>
  <button id="start-btn">Begin</button>
</div>

<div id="hud" style="display:none;">
  <div class="pulse-counter">Pulses: <span id="pulse-count">0</span> / 3</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>
<div class="hint" id="hint-text" style="display:none;">Move your pointer to guide the moth</div>

<div id="game-over">
  <div class="win" id="win-panel" style="display:none;">
    <h2>✨ Pulses Collected ✨</h2>
    <p>The magnetic flowers hum with gratitude.</p>
  </div>
  <div class="lose" id="lose-panel" style="display:none;">
    <h2>⚡ Shocked!</h2>
    <p>The electric storm consumed the moth.</p>
  </div>
  <button id="restart-btn">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
(function() {
  "use strict";

  // ---- Evidence API ----
  const evidence = {
    schema_version: 1,
    phase: 'initial',
    progress: 0,
    target: 3,
    completed: false,
    restart_count: 0
  };
  window.__factoryxEvidence = () => ({...evidence});

  // ---- Constants ----
  const W = 1200, H = 800;
  const GRAVITY = 0;
  const FLOW_FIELD_STRENGTH = 0.012;
  const PARTICLE_COUNT = 80;
  const STAR_COUNT = 120;
  const FLASH_DURATION = 60; // frames
  const PAYOFF_DURATION = 240; // frames

  // ---- Setup Canvas ----
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;

  // ---- DOM refs ----
  const startScreen = document.getElementById('start-screen');
  const startBtn = document.getElementById('start-btn');
  const hud = document.getElementById('hud');
  const pulseCount = document.getElementById('pulse-count');
  const progressBar = document.getElementById('progress-bar');
  const hintText = document.getElementById('hint-text');
  const gameOver = document.getElementById('game-over');
  const winPanel = document.getElementById('win-panel');
  const losePanel = document.getElementById('lose-panel');
  const restartBtn = document.getElementById('restart-btn');

  // ---- Audio Engine (Web Audio API, synthesized) ----
  let audioCtx = null;
  let masterGain = null;
  let musicGain = null;
  let musicNodes = [];
  let musicPlaying = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);

    // Music gain (softer)
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.15;
    musicGain.connect(masterGain);

    // Background ambience pad
    startAmbience();
  }

  function startAmbience() {
    if (musicPlaying) return;
    musicPlaying = true;
    // Two detuned sine waves for a ethereal pad
    const freqs = [150, 152.5, 200];
    freqs.forEach(f => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.value = 0.3;
      osc.connect(gain);
      gain.connect(musicGain);
      osc.start();
      musicNodes.push({osc, gain});
    });
  }

  function stopAmbience() {
    if (!musicPlaying) return;
    musicNodes.forEach(n => { n.osc.stop(); n.gain.disconnect(); });
    musicNodes = [];
    musicPlaying = false;
  }

  function playSFX(type) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(masterGain);

    switch(type) {
      case 'collect':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(1200, t + 0.15);
        osc.frequency.exponentialRampToValueAtTime(1600, t + 0.3);
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
        break;
      case 'buzz':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, t);
        osc.frequency.linearRampToValueAtTime(60, t + 0.2);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
        osc.start(t); osc.stop(t + 0.25);
        break;
      case 'shock':
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
        osc.start(t); osc.stop(t + 0.6);
        // Add noise-like crackle
        const bufSize = audioCtx.sampleRate * 0.3;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/bufSize) * 0.3;
        const noise = audioCtx.createBufferSource();
        const ng = audioCtx.createGain();
        noise.buffer = buf;
        noise.connect(ng); ng.connect(masterGain);
        ng.gain.setValueAtTime(0.3, t);
        ng.gain.linearRampToValueAtTime(0, t + 0.3);
        noise.start(t); noise.stop(t + 0.3);
        break;
      case 'payoff':
        // Arpeggio flourish
        const notes = [523.25, 659.25, 783.99, 1046.5, 783.99, 1046.5, 1318.5];
        notes.forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sine';
          o.frequency.value = f;
          g.gain.setValueAtTime(0.3, t + i * 0.08);
          g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.08 + 0.3);
          o.connect(g); g.connect(masterGain);
          o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.35);
        });
        break;
      case 'start':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(800, t + 0.2);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
        break;
    }
  }

  // ---- Game State ----
  let gameState = 'initial'; // initial, playing, gameOver, payoff
  let mouseX = W / 2, mouseY = H / 2;
  let pulseCountNum = 0;
  let flashTimer = 0;
  let flashColor = '#fff';
  let gameTime = 0;
  let particles = [];
  let stars = [];
  let flowers = [];
  let storms = [];
  let stormTimer = 0;
  let payoffTimer = 0;
  let restartCount = 0;

  // ---- Moth ----
  const moth = {
    x: W / 2,
    y: H / 2,
    vx: 0,
    vy: 0,
    angle: 0,
    wingAngle: 0,
    wingDir: 1,
    radius: 10
  };

  // ---- Star field ----
  function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.005
      });
    }
  }

  // ---- Flowers ----
  function initFlowers() {
    flowers = [];
    // Three flowers at different positions
    const positions = [
      { x: 350, y: 250 },
      { x: 850, y: 300 },
      { x: 600, y: 600 }
    ];
    positions.forEach((pos, i) => {
      flowers.push({
        x: pos.x,
        y: pos.y,
        radius: 50,
        pulsePhase: i * Math.PI * 0.67,
        collected: false,
        collectAnim: 0,
        glowPhase: Math.random() * Math.PI * 2
      });
    });
  }

  // ---- Storms (hazards) ----
  function spawnStorm() {
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const speed = 1.5 + gameTime * 0.005;
    switch(side) {
      case 0: x = -40; y = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * 1; break;
      case 1: x = W + 40; y = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * 1; break;
      case 2: x = Math.random() * W; y = -40; vx = (Math.random() - 0.5) * 1; vy = speed; break;
      case 3: x = Math.random() * W; y = H + 40; vx = (Math.random() - 0.5) * 1; vy = -speed; break;
    }
    storms.push({
      x, y, vx, vy,
      radius: 40 + Math.random() * 30,
      life: 300 + Math.random() * 200,
      angle: Math.random() * Math.PI * 2
    });
  }

  // ---- Particles ----
  function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 40 + Math.random() * 30,
        maxLife: 40 + Math.random() * 30,
        color,
        radius: Math.random() * 3 + 1
      });
    }
  }

  // ---- Reset Game ----
  function resetGame() {
    moth.x = W / 2;
    moth.y = H / 2;
    moth.vx = 0;
    moth.vy = 0;
    pulseCountNum = 0;
    flashTimer = 0;
    gameTime = 0;
    stormTimer = 0;
    payoffTimer = 0;
    gameState = 'playing';
    restartCount++;
    evidence.restart_count = restartCount;
    evidence.phase = 'playing';
    evidence.progress = 0;
    evidence.completed = false;
    evidence.target = 3;

    initFlowers();
    initStars();
    storms = [];
    particles = [];

    pulseCount.textContent = '0';
    progressBar.style.width = '0%';

    hud.style.display = 'flex';
    hintText.style.display = 'block';
    gameOver.style.display = 'none';
    winPanel.style.display = 'none';
    losePanel.style.display = 'none';

    playSFX('start');
    if (!musicPlaying) startAmbience();
  }

  // ---- Input ----
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (W / rect.width);
    mouseY = (e.clientY - rect.top) * (H / rect.height);
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
    mouseY = (e.touches[0].clientY - rect.top) * (H / rect.height);
  }, { passive: false });

  startBtn.addEventListener('click', () => {
    initAudio();
    resetGame();
    startScreen.style.opacity = '0';
    setTimeout(() => { startScreen.style.display = 'none'; }, 1000);
  });

  restartBtn.addEventListener('click', () => {
    resetGame();
  });

  // ---- Drawing helpers ----
  function drawStars(time) {
    stars.forEach(s => {
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle + time * s.speed));
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawMoth(time) {
    ctx.save();
    ctx.translate(moth.x, moth.y);

    // Glow
    const glowR = 30 + Math.sin(time * 0.05) * 5;
    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, glowR);
    glow.addColorStop(0, '#ffd06044');
    glow.addColorStop(1, '#ffd06000');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    moth.wingAngle += moth.wingDir * 0.4;
    if (Math.abs(moth.wingAngle) > 0.5) moth.wingDir *= -1;
    const wingSpread = Math.abs(moth.wingAngle) * 0.8;

    // Left wing
    ctx.save();
    ctx.rotate(-0.3);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-20, -25 * wingSpread - 10, -35, -5, -25, 10);
    ctx.bezierCurveTo(-15, 5, -5, 2, 0, 0);
    ctx.closePath();
    const lwGrad = ctx.createRadialGradient(-10, -5, 0, -10, -5, 25);
    lwGrad.addColorStop(0, '#ffe899');
    lwGrad.addColorStop(0.5, '#ffd060');
    lwGrad.addColorStop(1, '#c0802088');
    ctx.fillStyle = lwGrad;
    ctx.fill();
    ctx.restore();

    // Right wing
    ctx.save();
    ctx.rotate(0.3);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(20, -25 * wingSpread - 10, 35, -5, 25, 10);
    ctx.bezierCurveTo(15, 5, 5, 2, 0, 0);
    ctx.closePath();
    const rwGrad = ctx.createRadialGradient(10, -5, 0, 10, -5, 25);
    rwGrad.addColorStop(0, '#ffe899');
    rwGrad.addColorStop(0.5, '#ffd060');
    rwGrad.addColorStop(1, '#c0802088');
    ctx.fillStyle = rwGrad;
    ctx.fill();
    ctx.restore();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 10, 0, 0, Math.PI * 2);
    const bodyGrad = ctx.createRadialGradient(0, -3, 0, 0, 0, 10);
    bodyGrad.addColorStop(0, '#fff8e0');
    bodyGrad.addColorStop(1, '#cc9030');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#ffd060';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-2, -8);
    ctx.lineTo(-6 - Math.sin(time * 0.08) * 2, -18);
    ctx.moveTo(2, -8);
    ctx.lineTo(6 + Math.sin(time * 0.08 + 1) * 2, -18);
    ctx.stroke();

    ctx.restore();
  }

  function drawFlower(f, time) {
    if (f.collectAnim > 0) {
      // Collect animation - expanding rings
      ctx.save();
      ctx.translate(f.x, f.y);
      const expandR = f.collectAnim * 80;
      const alpha = 1 - f.collectAnim;
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = '#ffd060';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, expandR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      return;
    }

    const pulse = 0.8 + 0.2 * Math.sin(f.pulsePhase + time * 0.03);
    const glowPulse = 0.5 + 0.5 * Math.sin(f.glowPhase + time * 0.02);

    ctx.save();
    ctx.translate(f.x, f.y);

    // Outer glow
    const glowR = f.radius * (1.2 + glowPulse * 0.4);
    const flowerGlow = ctx.createRadialGradient(0, 0, f.radius * 0.3, 0, 0, glowR);
    flowerGlow.addColorStop(0, `rgba(255, 208, 96, ${0.2 * pulse})`);
    flowerGlow.addColorStop(1, 'rgba(255, 208, 96, 0)');
    ctx.fillStyle = flowerGlow;
    ctx.beginPath();
    ctx.arc(0, 0, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Petal rings
    for (let ring = 0; ring < 2; ring++) {
      const petalCount = ring === 0 ? 5 : 8;
      const petalR = ring === 0 ? 18 * pulse : 28 * pulse;
      ctx.save();
      ctx.rotate(time * 0.005 * (ring + 1) * (ring % 2 === 0 ? 1 : -1));
      for (let i = 0; i < petalCount; i++) {
        const angle = (i / petalCount) * Math.PI * 2;
        ctx.save();
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(petalR, 0, petalR * 0.5, 6, 0, 0, Math.PI * 2);
        const petalColor = ring === 0 ? '#ffd060' : '#ff8844';
        ctx.fillStyle = petalColor;
        ctx.globalAlpha = 0.6 + glowPulse * 0.4;
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    // Center
    ctx.beginPath();
    ctx.arc(0, 0, 6 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = '#fff8e0';
    ctx.fill();

    ctx.restore();
  }

  function drawStorm(s, time) {
    ctx.save();
    ctx.translate(s.x, s.y);

    // Electric core glow
    const coreGlow = ctx.createRadialGradient(0, 0, 2, 0, 0, s.radius);
    coreGlow.addColorStop(0, 'rgba(100, 180, 255, 0.9)');
    coreGlow.addColorStop(0.3, 'rgba(60, 120, 255, 0.5)');
    coreGlow.addColorStop(0.7, 'rgba(40, 80, 200, 0.2)');
    coreGlow.addColorStop(1, 'rgba(20, 40, 150, 0)');
    ctx.fillStyle = coreGlow;
    ctx.beginPath();
    ctx.arc(0, 0, s.radius, 0, Math.PI * 2);
    ctx.fill();

    // Lightning arcs
    const arcs = 3 + Math.floor(s.life / 50) % 3;
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.6 + Math.sin(time * 0.2) * 0.4;
    for (let i = 0; i < arcs; i++) {
      const a = s.angle + i * Math.PI * 0.66 + time * 0.05;
      ctx.beginPath();
      let cx = 0, cy = 0;
      ctx.moveTo(cx, cy);
      for (let j = 0; j < 6; j++) {
        cx += Math.cos(a + j * 0.7) * 8;
        cy += Math.sin(a + j * 0.7) * 8;
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Rotating ring
    ctx.strokeStyle = '#6699ff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, s.radius * 0.7, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawBackground(time) {
    // Deep night sky gradient
    const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H));
    bg.addColorStop(0, '#0f0f2e');
    bg.addColorStop(0.5, '#0a0a20');
    bg.addColorStop(1, '#030310');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid (magnetic field lines)
    ctx.strokeStyle = '#1a1a44';
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.3 + 0.15 * Math.sin(time * 0.01);
    for (let x = 0; x < W; x += 60) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 60) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ---- Update ----
  function update() {
    if (gameState !== 'playing') return;

    gameTime++;

    // Moth physics - move toward mouse with inertia and magnetic pull
    const dx = mouseX - moth.x;
    const dy = mouseY - moth.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Magnetic pull (stronger when close)
    const pull = Math.min(0.15, 150 / (dist + 10)) * 0.8;
    moth.vx += dx * pull * 0.01;
    moth.vy += dy * pull * 0.01;

    // Magnetic field wobble (simulated field noise)
    const fieldX = Math.sin(time * 0.015 + moth.y * 0.01) * FLOW_FIELD_STRENGTH * 2;
    const fieldY = Math.cos(time * 0.012 + moth.x * 0.01) * FLOW_FIELD_STRENGTH * 2;
    moth.vx += fieldX;
    moth.vy += fieldY;

    // Damping
    moth.vx *= 0.92;
    moth.vy *= 0.92;

    // Clamp speed
    const speed = Math.sqrt(moth.vx * moth.vx + moth.vy * moth.vy);
    if (speed > 5) {
      moth.vx = (moth.vx / speed) * 5;
      moth.vy = (moth.vy / speed) * 5;
    }

    moth.x += moth.vx;
    moth.y += moth.vy;

    // Keep in bounds (soft)
    if (moth.x < 20) { moth.x = 20; moth.vx *= -0.5; }
    if (moth.x > W - 20) { moth.x = W - 20; moth.vx *= -0.5; }
    if (moth.y < 20) { moth.y = 20; moth.vy *= -0.5; }
    if (moth.y > H - 20) { moth.y = H - 20; moth.vy *= -0.5; }

    // Update flower pulse animation
    flowers.forEach(f => {
      if (f.collectAnim > 0) {
        f.collectAnim += 0.015;
        if (f.collectAnim >= 1) {
          f.collectAnim = 0;
          f.collected = true;
        }
      }
    });

    // Collect pulses
    flowers.forEach(f => {
      if (f.collectAnim === 0 && !f.collected) {
        const fd = Math.sqrt((moth.x - f.x) ** 2 + (moth.y - f.y) ** 2);
        if (fd < f.radius * 0.7) {
          f.collectAnim = 0.01;
          pulseCountNum++;
          playSFX('collect');
          addParticles(f.x, f.y, '#ffd060', 20);
          pulseCount.textContent = String(pulseCountNum);
          progressBar.style.width = `${(pulseCountNum / 3) * 100}%`;

          if (pulseCountNum >= 3) {
            setTimeout(() => triggerPayoff(), 500);
          }
        }
      }
    });

    // Spawn storms with increasing frequency
    const spawnRate = Math.max(60, 200 - gameTime * 0.3);
    stormTimer++;
    if (stormTimer >= spawnRate) {
      stormTimer = 0;
      spawnStorm();
      if (gameTime > 120 && Math.random() < 0.3) spawnStorm();
    }

    // Update storms
    storms = storms.filter(s => {
      s.x += s.vx;
      s.y += s.vy;
      s.life--;
      s.angle += 0.03;

      // Check collision with moth
      const sd = Math.sqrt((moth.x - s.x) ** 2 + (moth.y - s.y) ** 2);
      if (sd < s.radius * 0.5 + moth.radius) {
        triggerGameOver(false);
        return false;
      }

      return s.life > 0 && s.x > -100 && s.x < W + 100 && s.y > -100 && s.y < H + 100;
    });

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life--;
      return p.life > 0;
    });

    // Trail particles from moth
    if (gameTime % 3 === 0) {
      addParticles(moth.x + (Math.random() - 0.5) * 5, moth.y + (Math.random() - 0.5) * 5, '#ffd06033', 1);
    }
  }

  function triggerPayoff() {
    if (gameState !== 'playing') return;
    gameState = 'payoff';
    payoffTimer = 0;
    evidence.phase = 'completed';
    evidence.completed = true;
    evidence.progress = 3;

    playSFX('payoff');
    addParticles(moth.x, moth.y, '#ffd060', 50);
    addParticles(moth.x, moth.y, '#ffaa33', 30);

    // Screen flash
    flashColor = '#ffd060';
    flashTimer = FLASH_DURATION;

    setTimeout(() => {
      gameState = 'gameOver';
      hud.style.display = 'none';
      hintText.style.display = 'none';
      gameOver.style.display = 'flex';
      winPanel.style.display = 'flex';
      losePanel.style.display = 'none';
    }, 2500);
  }

  function triggerGameOver(won) {
    if (gameState === 'gameOver' || gameState === 'payoff') return;
    gameState = 'gameOver';
    evidence.phase = 'completed';
    evidence.completed = !won;
    evidence.progress = pulseCountNum;

    stopAmbience();
    playSFX('shock');

    flashColor = '#ff4466';
    flashTimer = FLASH_DURATION;

    setTimeout(() => {
      hud.style.display = 'none';
      hintText.style.display = 'none';
      gameOver.style.display = 'flex';
      winPanel.style.display = 'none';
      losePanel.style.display = 'flex';
    }, 1000);
  }

  // ---- Render ----
  function render(time) {
    ctx.clearRect(0, 0, W, H);

    drawBackground(time);
    drawStars(time);

    // Draw magnetic field lines (curved paths)
    ctx.strokeStyle = '#2a2a66';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.2;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      const startY = 100 + i * 160;
      for (let x = 0; x <= W; x += 20) {
        const y = startY + Math.sin(x * 0.008 + time * 0.008 + i) * 60 + Math.cos(x * 0.003 + time * 0.005) * 30;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Draw flowers
    flowers.forEach(f => drawFlower(f, time));

    // Draw storms
    storms.forEach(s => drawStorm(s, time));

    // Draw moth trail
    if (gameState === 'playing') {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#ffd060';
      ctx.beginPath();
      const trailLen = 12;
      for (let i = 0; i < trailLen; i++) {
        const tx = moth.x - moth.vx * i * 1.5;
        const ty = moth.y - moth.vy * i * 1.5;
        ctx.lineTo(tx, ty);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    drawParticles();

    // Draw moth
    if (gameState === 'playing' || gameState === 'payoff') {
      drawMoth(time);
    }

    // Flash overlay
    if (flashTimer > 0) {
      ctx.globalAlpha = flashTimer / FLASH_DURATION * 0.5;
      ctx.fillStyle = flashColor;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
      flashTimer--;
    }

    // Payoff glow
    if (gameState === 'payoff') {
      payoffTimer++;
      const glowAlpha = Math.min(0.3, payoffTimer / PAYOFF_DURATION * 0.3);
      const r = payoffTimer * 3;
      const glow = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H));
      glow.addColorStop(0, `rgba(255, 208, 96, ${glowAlpha})`);
      glow.addColorStop(0.5, `rgba(255, 140, 60, ${glowAlpha * 0.5})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ---- Game Loop ----
  function loop(time) {
    update();
    render(time);
    requestAnimationFrame(loop);
  }

  // ---- Init ----
  initStars();
  initFlowers();
  requestAnimationFrame(loop);

})();
</script>
</body>
