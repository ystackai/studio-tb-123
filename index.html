<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
  canvas { display: block; cursor: none; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #startBtn { pointer-events: all; padding: 16px 40px; font-size: 24px; font-family: 'Georgia', serif; color: #ffe58f; background: rgba(20,20,50,0.85); border: 2px solid #ffe58f66; border-radius: 12px; cursor: pointer; letter-spacing: 2px; transition: all 0.3s; }
  #startBtn:hover { background: rgba(40,40,80,0.9); border-color: #ffe58faa; box-shadow: 0 0 20px #ffe58f33; }
  #restartBtn { pointer-events: all; padding: 12px 32px; font-size: 18px; font-family: 'Georgia', serif; color: #ffe58f; background: rgba(20,20,50,0.85); border: 2px solid #ffe58f66; border-radius: 10px; cursor: pointer; letter-spacing: 1px; transition: all 0.3s; margin-top: 12px; }
  #restartBtn:hover { background: rgba(40,40,80,0.9); border-color: #ffe58faa; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
  #overlay.active { display: flex; pointer-events: auto; }
  #overlayText { font-family: 'Georgia', serif; color: #ffe58f; font-size: 28px; text-align: center; text-shadow: 0 0 20px rgba(255,229,143,0.5); margin-bottom: 16px; line-height: 1.6; }
  #overlaySub { font-family: 'Georgia', serif; color: #aab8c8; font-size: 14px; text-align: center; margin-bottom: 20px; }
  #progressBar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; opacity: 0; transition: opacity 0.5s; }
  #progressBar.active { opacity: 1; }
  #progressFill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffe58f, #ff9f1c); border-radius: 3px; transition: width 0.3s; }
  #pulseCounter { position: absolute; top: 20px; right: 24px; font-family: 'Georgia', serif; color: #ffe58f; font-size: 20px; opacity: 0; transition: opacity 0.5s; text-shadow: 0 0 10px rgba(255,229,143,0.4); }
  #pulseCounter.active { opacity: 1; }
  #restartBtn { display: none; }
  #titleText { font-family: 'Georgia', serif; color: #ffe58f; font-size: 42px; text-shadow: 0 0 30px rgba(255,229,143,0.3); margin-bottom: 8px; letter-spacing: 4px; }
  #subtitleText { font-family: 'Georgia', serif; color: #7a8a9a; font-size: 14px; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="startOverlay">
    <div id="titleText">Magnetic Moth</div>
    <div id="subtitleText">Guide the moth through the magnetic garden</div>
    <div id="startBtn" style="margin-top: 36px;">Click to Begin</div>
  </div>
  <div id="overlay">
    <div id="overlayText"></div>
    <div id="overlaySub"></div>
    <div id="restartBtn">Play Again</div>
  </div>
</div>
<div id="progressBar"><div id="progressFill"></div></div>
<div id="pulseCounter">✦ 0 / 3</div>

<script>
// === FactoryX Evidence API ===
window.__factoryxEvidence = function() {
  return { schema_version: 1, phase: game.phase, progress: game.progress, target: game.target, completed: game.completed, restart_count: game.restartCount };
};

// === Audio Engine (Web Audio API) ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    // Ambient drone
    const now = audioCtx.currentTime;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc1.type = 'sine'; osc1.frequency.value = 80;
    osc2.type = 'sine'; osc2.frequency.value = 82;
    gain.gain.value = 0.04;
    osc1.connect(gain); osc2.connect(gain);
    gain.connect(audioCtx.destination);
    osc1.start(now); osc2.start(now);
    game.ambGain = gain;
  }
}

function playCollectSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, t);
  osc.frequency.exponentialRampToValueAtTime(1040, t + 0.15);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.5);
}

function playPayoffSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t + i * 0.12);
    gain.gain.linearRampToValueAtTime(0.12, t + i * 0.12 + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.8);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.8);
  });
}

function playBuzzSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(90, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.3);
  gain.gain.setValueAtTime(0.06, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.3);
}

function playRestartSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.3);
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.4);
}

// === Canvas Setup ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === Game State ===
const game = {
  phase: 'initial', // initial, playing, completed
  progress: 0,
  target: 3,
  completed: false,
  restartCount: 0,
  running: false,
  mouseX: 0,
  mouseY: 0,
  time: 0,
};

// === Flower (Pulse Target) Data ===
let flowers = [];
let particles = [];
let mothTrail = [];
let glowPulse = 0;
let payoffTimer = 0;

function createFlowers() {
  flowers = [];
  const count = 8 + Math.floor(game.restartCount * 2);
  for (let i = 0; i < count; i++) {
    const margin = 100;
    const fx = margin + Math.random() * (W - 2 * margin);
    const fy = margin + Math.random() * (H - 2 * margin);
    const isTarget = i < 3;
    const angle = Math.random() * Math.PI * 2;
    const radius = 60 + Math.random() * 40;
    flowers.push({
      x: fx + Math.cos(angle) * radius * 0.3,
      y: fy + Math.sin(angle) * radius * 0.3,
      radius: 18 + Math.random() * 12,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 1.5 + Math.random() * 1.5,
      isTarget,
      collected: false,
      collectedTime: 0,
      collectedX: 0,
      collectedY: 0,
      color: isTarget
        ? `hsl(${43 + Math.random() * 15}, 80%, 65%)`
        : `hsl(${140 + Math.random() * 30}, 40%, ${35 + Math.random() * 15}%)`,
      glowColor: isTarget ? `hsla(${45}, 80%, 70%, 0.3)` : `hsla(${160}, 40%, 50%, 0.15)`,
      petals: isTarget ? 5 : 3,
      magneticStrength: isTarget ? 0.8 : 0.2 + Math.random() * 0.3,
    });
  }
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      radius: 1.5 + Math.random() * 2,
      color
    });
  }
}

// === Moth Drawing ===
function drawMoth(x, y, time) {
  ctx.save();
  ctx.translate(x, y);

  // Calculate angle from movement
  let angle = 0;
  if (mothTrail.length > 1) {
    const prev = mothTrail[mothTrail.length - 2];
    angle = Math.atan2(y - prev.y, x - prev.x);
  }
  ctx.rotate(angle);

  // Glow
  const glowR = 30 + Math.sin(time * 3) * 5;
  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, glowR);
  grad.addColorStop(0, 'rgba(255, 229, 143, 0.4)');
  grad.addColorStop(1, 'rgba(255, 229, 143, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, glowR, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  const wingFlap = Math.sin(time * 12) * 0.3;
  ctx.fillStyle = 'rgba(255, 240, 180, 0.85)';

  // Left wing
  ctx.beginPath();
  ctx.save();
  ctx.scale(1, wingFlap + 0.7);
  ctx.ellipse(-10, 0, 14, 8, -0.2, 0, Math.PI * 2);
  ctx.restore();
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.save();
  ctx.scale(1, wingFlap + 0.7);
  ctx.ellipse(10, 0, 14, 8, 0.2, 0, Math.PI * 2);
  ctx.restore();
  ctx.fill();

  // Wing inner shimmer
  ctx.fillStyle = 'rgba(255, 255, 240, 0.5)';
  ctx.beginPath();
  ctx.ellipse(-10, -1, 6, 3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, -1, 6, 3, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#ffe58f';
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(3.5, -1.5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3.5, 1.5, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Antennae
  ctx.strokeStyle = '#ffe58f';
  ctx.lineWidth = 1;
  const antWave = Math.sin(time * 5) * 0.15;
  ctx.beginPath();
  ctx.moveTo(4, 0);
  ctx.quadraticCurveTo(12, -4 + antWave * 10, 16, -7);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(4, 0);
  ctx.quadraticCurveTo(12, 4 - antWave * 10, 16, 7);
  ctx.stroke();

  // Antenna tips glow
  ctx.fillStyle = `rgba(255,229,143,${0.6 + Math.sin(time * 6) * 0.3})`;
  ctx.beginPath();
  ctx.arc(16, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(16, 7, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === Flower Drawing ===
function drawFlower(f, time) {
  const pulse = Math.sin(time * f.pulseSpeed + f.pulsePhase) * 0.3 + 0.7;
  const r = f.radius * (f.collected ? Math.max(0, 1 - (time - f.collectedTime) * 0.05) : pulse);

  if (r <= 0) return;

  ctx.save();
  ctx.translate(f.x, f.y);

  // Outer glow
  const glowGrad = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 3);
  glowGrad.addColorStop(0, f.glowColor);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r * 3, 0, Math.PI * 2);
  ctx.fill();

  // Petals
  for (let i = 0; i < f.petals; i++) {
    const a = (Math.PI * 2 / f.petals) * i + time * 0.2;
    ctx.save();
    ctx.rotate(a);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = f.collected ? Math.max(0.2, pulse * 0.5) : pulse;
    ctx.beginPath();
    ctx.ellipse(r * 0.8, 0, r * 0.6, r * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Center
  ctx.globalAlpha = 1;
  ctx.fillStyle = f.isTarget ? '#fff5c0' : '#8a9a7a';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === Background Stars ===
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      r: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5
    });
  }
}
initStars();

function drawBackground(time) {
  // Deep background
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#0f1028');
  bgGrad.addColorStop(0.5, '#0a0b1e');
  bgGrad.addColorStop(1, '#050612');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle nebula
  ctx.globalAlpha = 0.06 + Math.sin(time * 0.2) * 0.02;
  const nebGrad = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, W * 0.4);
  nebGrad.addColorStop(0, '#3a1a4a');
  nebGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = nebGrad;
  ctx.fillRect(0, 0, W, H);

  const nebGrad2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, W * 0.3);
  nebGrad2.addColorStop(0, '#1a2a4a');
  nebGrad2.addColorStop(1, 'transparent');
  ctx.fillStyle = nebGrad2;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Stars
  stars.forEach(s => {
    const twinkle = Math.sin(time * s.speed + s.twinkle) * 0.4 + 0.6;
    ctx.fillStyle = `rgba(220, 230, 255, ${twinkle * 0.7})`;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

// === Magnetic Field Lines (background decoration) ===
let fieldLines = [];
function initFieldLines() {
  fieldLines = [];
  for (let i = 0; i < 6; i++) {
    fieldLines.push({
      points: (() => {
        const pts = [];
        let cx = Math.random() * W;
        let cy = Math.random() * H;
        for (let j = 0; j < 15; j++) {
          pts.push({ x: cx, y: cy });
          cx += (Math.random() - 0.5) * 120;
          cy += (Math.random() - 0.5) * 120;
        }
        return pts;
      })(),
      alpha: 0.03 + Math.random() * 0.03,
      speed: 0.5 + Math.random() * 0.5,
      offset: Math.random() * 100
    });
  }
}
initFieldLines();

function drawFieldLines(time) {
  ctx.strokeStyle = `rgba(100, 120, 180, 0.04)`;
  ctx.lineWidth = 1;
  fieldLines.forEach(fl => {
    ctx.beginPath();
    fl.points.forEach((p, i) => {
      const ox = Math.sin(time * fl.speed + fl.offset + i * 0.3) * 15;
      const oy = Math.cos(time * fl.speed * 0.8 + fl.offset + i * 0.4) * 15;
      const px = p.x + ox;
      const py = p.y + oy;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();
  });
}

// === Game Logic ===
let moth = { x: 0, y: 0, vx: 0, vy: 0 };
const mothRadius = 12;

function resetGame() {
  game.phase = 'initial';
  game.progress = 0;
  game.completed = false;
  flowers = [];
  particles = [];
  mothTrail = [];
  payoffTimer = 0;
  createFlowers();
  initFieldLines();
  moth.x = W / 2;
  moth.y = H / 2;
  moth.vx = 0;
  moth.vy = 0;
  updateEvidenceUI();
}

function updateEvidenceUI() {
  const counter = document.getElementById('pulseCounter');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  if (game.phase === 'playing') {
    counter.classList.add('active');
    bar.classList.add('active');
    counter.textContent = `✦ ${game.progress} / ${game.target}`;
    fill.style.width = `${(game.progress / game.target) * 100}%`;
  } else {
    counter.classList.remove('active');
    bar.classList.remove('active');
  }
}

function updateGame(time, dt) {
  game.time = time;

  if (game.phase === 'playing') {
    // Moth physics
    let targetX = game.mouseX;
    let targetY = game.mouseY;

    // Magnetic forces from all flowers
    let ax = 0, ay = 0;
    flowers.forEach(f => {
      if (f.collected) return;
      const dx = targetX - f.x;
      const dy = targetY - f.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const strength = f.magneticStrength;

      // If mouse is close to flower, flower attracts moth
      if (dist < 300) {
        const force = strength * 0.15 * Math.min(1, 200 / (dist + 50));
        ax += (f.x - moth.x) * force * 0.02;
        ay += (f.y - moth.y) * force * 0.02;
      }
    });

    // Direct mouse attraction (primary control)
    const dx = targetX - moth.x;
    const dy = targetY - moth.y;
    const mouseDist = Math.sqrt(dx * dx + dy * dy);
    const mouseForce = 0.003 * Math.min(3, mouseDist / 100);
    ax += dx * mouseForce;
    ay += dy * mouseForce;

    moth.vx += ax * dt;
    moth.vy += ay * dt;

    // Damping
    moth.vx *= 0.95;
    moth.vy *= 0.95;

    moth.x += moth.vx;
    moth.y += moth.vy;

    // Keep moth in bounds
    moth.x = Math.max(20, Math.min(W - 20, moth.x));
    moth.y = Math.max(20, Math.min(H - 20, moth.y));

    // Trail
    mothTrail.push({ x: moth.x, y: moth.y, age: 0 });
    if (mothTrail.length > 40) mothTrail.shift();

    // Check flower collection
    flowers.forEach(f => {
      if (f.collected) return;
      const fdx = moth.x - f.x;
      const fdy = moth.y - f.y;
      const fdist = Math.sqrt(fdx * fdx + fdy * fdy);
      if (fdist < f.radius + mothRadius) {
        f.collected = true;
        f.collectedTime = time;
        f.collectedX = f.x;
        f.collectedY = f.y;

        if (f.isTarget) {
          game.progress++;
          playCollectSound();
          createParticles(f.x, f.y, '#ffe58f', 15);
          createParticles(f.x, f.y, '#ffcc44', 8);
          glowPulse = 1;
          updateEvidenceUI();

          if (game.progress >= game.target) {
            game.completed = true;
            game.phase = 'completed';
            playPayoffSound();
            showPayoff();
          }
        } else {
          playBuzzSound();
          createParticles(f.x, f.y, '#6a7a5a', 6);
        }
      }
    });
  }

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // Glow pulse decay
  glowPulse *= 0.96;

  // Payoff timer
  if (game.phase === 'completed') {
    payoffTimer += dt;
  }
}

function drawGame(dt) {
  drawBackground(game.time);
  drawFieldLines(game.time);

  // Draw collected flowers (fading)
  flowers.forEach(f => {
    if (f.collected) {
      drawFlower(f, game.time);
    }
  });

  // Draw uncollected flowers
  flowers.forEach(f => {
    if (!f.collected) {
      drawFlower(f, game.time);
    }
  });

  // Draw moth trail
  if (game.phase === 'playing' && mothTrail.length > 1) {
    for (let i = 0; i < mothTrail.length; i++) {
      const t = mothTrail[i];
      const alpha = (i / mothTrail.length) * 0.3;
      const size = (i / mothTrail.length) * 3;
      ctx.fillStyle = `rgba(255, 229, 143, ${alpha})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw moth
  if (game.phase !== 'initial') {
    drawMoth(moth.x, moth.y, game.time);
  }

  // Payoff glow effect
  if (game.phase === 'completed' && payoffTimer < 3) {
    const intensity = Math.max(0, 1 - payoffTimer / 3);
    const grad = ctx.createRadialGradient(
      game.payoffX || W / 2, game.payoffY || H / 2, 0,
      game.payoffX || W / 2, game.payoffY || H / 2, 200 + intensity * 100
    );
    grad.addColorStop(0, `rgba(255, 255, 200, ${intensity * 0.15})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

// === UI ===
const startOverlay = document.getElementById('startOverlay');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const overlaySub = document.getElementById('overlaySub');
const restartBtn = document.getElementById('restartBtn');

function showPayoff() {
  overlay.classList.add('active');
  overlayText.innerHTML = `✦ Pulse Harvest Complete ✦<br><span style="font-size:18px;color:#aab8c8;">The magnetic garden resonates with your guidance.</span>`;
  overlaySub.textContent = `Collected ${game.progress} of ${game.target} pulses`;
  restartBtn.style.display = 'block';
  game.payoffX = moth.x;
  game.payoffY = moth.y;
}

document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  if (!game.running) {
    resetGame();
    game.phase = 'playing';
    game.running = true;
    startOverlay.style.display = 'none';
    overlay.classList.remove('active');
    updateEvidenceUI();
    playRestartSound();
  }
});

restartBtn.addEventListener('click', () => {
  overlay.classList.remove('active');
  restartBtn.style.display = 'none';
  resetGame();
  game.phase = 'initial';
  startOverlay.style.display = 'flex';
  playRestartSound();
});

// === Mouse Handling ===
game.mouseX = W / 2;
game.mouseY = H / 2;

document.addEventListener('mousemove', (e) => {
  game.mouseX = e.clientX;
  game.mouseY = e.clientY;
});

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  game.mouseX = e.touches[0].clientX;
  game.mouseY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener('touchstart', (e) => {
  game.mouseX = e.touches[0].clientX;
  game.mouseY = e.touches[0].clientY;
  initAudio();
  if (!game.running) {
    resetGame();
    game.phase = 'playing';
    game.running = true;
    startOverlay.style.display = 'none';
    overlay.classList.remove('active');
    updateEvidenceUI();
    playRestartSound();
  }
});

// === Main Loop ===
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  updateGame(timestamp / 1000, dt);
  drawGame(dt);

  requestAnimationFrame(loop);
}

// Initial setup
resetGame();
requestAnimationFrame(loop);
</script>
</body>
