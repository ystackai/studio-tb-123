<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #0a0e1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, 'Times New Roman', serif;
  user-select: none;
}
canvas {
  display: block;
  cursor: default;
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#message {
  background: rgba(10, 14, 26, 0.85);
  border: 1px solid rgba(120, 160, 220, 0.4);
  border-radius: 16px;
  padding: 40px 50px;
  text-align: center;
  color: #c0d0e0;
  pointer-events: auto;
  box-shadow: 0 0 40px rgba(60, 120, 200, 0.15);
  transition: opacity 0.5s ease;
}
#message h2 {
  font-size: 28px;
  color: #8ab4e0;
  margin-bottom: 12px;
}
#message p {
  font-size: 16px;
  line-height: 1.6;
  color: #a0b8c8;
}
#message .debrief {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(120, 160, 220, 0.2);
  font-size: 15px;
  color: #90a8b8;
}
#message button {
  margin-top: 20px;
  padding: 12px 36px;
  background: rgba(60, 120, 200, 0.25);
  border: 1px solid rgba(120, 180, 240, 0.4);
  border-radius: 8px;
  color: #90b8e0;
  font-size: 16px;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: all 0.3s ease;
}
#message button:hover {
  background: rgba(60, 120, 200, 0.4);
  color: #b0d0f0;
}
.hidden { opacity: 0; pointer-events: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="message" class="hidden">
    <h2 id="msg-title"></h2>
    <p id="msg-body"></p>
    <p class="debrief" id="msg-debrief"></p>
    <button id="msg-btn" style="display:none;">Play Again</button>
  </div>
</div>

<script>
// === RAIN DIAL - A musical rain-routing game ===
// "This should feel like gently playing a glass chime instrument, 
//  where your careful choices weave a rising melody that resolves into harmony."

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const uiOverlay = document.getElementById('ui-overlay');
const messageEl = document.getElementById('message');
const msgTitle = document.getElementById('msg-title');
const msgBody = document.getElementById('msg-body');
const msgDebrief = document.getElementById('msg-debrief');
const msgBtn = document.getElementById('msg-btn');

// Audio context
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

// Chime notes - a pentatonic scale that sounds pleasant
const CHIME_NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
const CHIME_COLORS = [
  '#7ec8e0', '#a8e6cf', '#f8c680', '#e090a0',
  '#b0a0d0', '#80c0e0', '#f0b878', '#a0d8d0'
];

// Dial positions mapped to chimes
const DIAL_POSITIONS = 8;
const CHIME_COUNT = 5; // 5 chimes to play

// Scale of chimes for the winning melody
const WIN_SEQUENCE = [0, 2, 4, 1, 3, 0, 2, 4]; // indices into CHIME_NOTES - creates a pentatonic melody

// Game state
let W, H;
let gameState = 'start'; // 'start', 'playing', 'win', 'lose'
let chimes = [];
let drops = [];
let particles = [];
let dialAngle = 0;
let dialTargetAngle = 0;
let dialRadius = 70;
let dialCenterX, dialCenterY;
let score = 0;
let targetScore = WIN_SEQUENCE.length;
let timeElapsed = 0;
let dropInterval = 3000;
let lastDropTime = 0;
let gameStartTime = 0;
let chimeTriggers = new Array(CHIME_COUNT).fill(false);
let chimeGlow = new Array(CHIME_COUNT).fill(0);
let comboCount = 0;
let lastChimeTime = 0;
let shakeAmount = 0;
let bgStars = [];
let rainAmbience = null;
let playCount = 0;

let winParticles = [];
let winTime = 0;
let loseTime = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  dialCenterX = W / 2;
  dialCenterY = H / 2;
  positionChimes();
}

function positionChimes() {
  chimes = [];
  const cx = dialCenterX;
  const cy = dialCenterY;
  const radius = Math.min(W, H) * 0.32;
  for (let i = 0; i < CHIME_COUNT; i++) {
    const angle = (i / CHIME_COUNT) * Math.PI * 2 - Math.PI / 2;
    chimes.push({
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      angle: angle,
      radius: radius,
      index: i,
      glow: 0,
      hitAnim: 0,
      label: i + 1
    });
  }
}

// Generate background stars
function initStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.5 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005
    });
  }
}

// Play a single chime sound
function playChimeSound(chimeIndex, volume) {
  if (!audioCtx) return;
  const note = CHIME_NOTES[WIN_SEQUENCE[chimeIndex] || CHIME_NOTES[chimeIndex % CHIME_NOTES.length]];
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  const masterGain = audioCtx.createGain();
  
  // Main tone
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(note, audioCtx.currentTime);
  
  // Harmonic for glass sound
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(note * 2.01, audioCtx.currentTime);
  const harmonicGain = audioCtx.createGain();
  harmonicGain.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);
  harmonicGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
  
  osc1.connect(gainNode);
  osc2.connect(harmonicGain);
  harmonicGain.connect(gainNode);
  
  gainNode.gain.setValueAtTime(volume * 0.4, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
  
  gainNode.connect(audioCtx.destination);
  
  osc1.start(audioCtx.currentTime);
  osc2.start(audioCtx.currentTime);
  osc1.stop(audioCtx.currentTime + 3);
  osc2.stop(audioCtx.currentTime + 3);
}

// Rain ambience using filtered noise
let rainNodes = null;
function startRainAmbience() {
  if (!audioCtx || rainNodes) return;
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.06;
  
  source.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  source.start();
  rainNodes = { source, filter, gainNode };
}

function stopRainAmbience() {
  if (!rainNodes) return;
  rainNodes.gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
  setTimeout(() => {
    try { rainNodes.source.stop(); } catch(e) {}
    rainNodes = null;
  }, 1500);
}

// Create a falling rain drop
function spawnDrop() {
  const targetChime = Math.floor(Math.random() * CHIME_COUNT);
  const chime = chimes[targetChime];
  const startX = chime.x + (Math.random() - 0.5) * 40;
  
  drops.push({
    x: startX,
    y: -20,
    targetChime: targetChime,
    speed: 1.5 + Math.random() * 0.8,
    targetX: chime.x,
    matched: false,
    missed: false,
    alpha: 1,
    size: 3
  });
}

// Create particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      size: Math.random() * 3 + 1,
      color
    });
  }
}

// Dial rotation
function getDialTargetAngle(x, y) {
  const dx = x - dialCenterX;
  const dy = y - dialCenterY;
  let angle = Math.atan2(dy, dx);
  // Snap to nearest position
  const snapAngle = (Math.round(angle / (Math.PI * 2 / DIAL_POSITIONS)) * Math.PI * 2 / DIAL_POSITIONS);
  return snapAngle;
}

function getChimeForDial() {
  let normalizedAngle = (dialAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  // Normalize to 0..2PI from top (-PI/2)
  normalizedAngle = (normalizedAngle + Math.PI / 2) % (Math.PI * 2);
  const chimeIndex = Math.floor(normalizedAngle / (Math.PI * 2 / CHIME_COUNT)) % CHIME_COUNT;
  return chimeIndex;
}

// Game initialization
function startGame() {
  gameState = 'playing';
  score = 0;
  dropInterval = 2500;
  timeElapsed = 0;
  lastDropTime = 0;
  gameStartTime = performance.now();
  drops = [];
  particles = [];
  winParticles = [];
  winTime = 0;
  chimeTriggers = new Array(CHIME_COUNT).fill(false);
  chimeGlow = new Array(CHIME_COUNT).fill(0);
  comboCount = 0;
  lastChimeTime = 0;
  dialAngle = -Math.PI / 2; // Start at top
  dialTargetAngle = -Math.PI / 2;
  initStars();
  
  messageEl.classList.add('hidden');
  msgBtn.style.display = 'none';
  
  if (!audioCtx) initAudio();
  startRainAmbience();
}

// Show end screen
function showEnd(won) {
  gameState = won ? 'win' : 'lose';
  stopRainAmbience();
  
  msgTitle.textContent = won ? '✨ Melody Complete! ✨' : 'Rain Faded Away';
  msgBody.textContent = won
    ? `You routed ${score} drops and completed the resonant pattern.`
    : `You routed ${score} drops before the rain faded.`;
  
  if (won) {
    msgDebrief.textContent = '✨ A beautiful sequence — each chime sang in turn, and together they created a moment of quiet harmony.';
  } else {
    msgDebrief.textContent = 'The drops dissipated back into the clouds, carrying their melody away.';
  }
  
  msgBtn.style.display = 'inline-block';
  msgBtn.textContent = 'Play Again';
  messageEl.classList.remove('hidden');
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  
  resize();
  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (gameState === 'playing') {
    timeElapsed += dt * 1000;
    
    // Escalation: drops come faster over time
    const elapsed = (performance.now() - gameStartTime) / 1000;
    dropInterval = Math.max(800, 2500 - elapsed * 15);
    
    // Spawn drops
    if (timestampNow() - lastDropTime > dropInterval) {
      spawnDrop();
      lastDropTime = timestampNow();
      
      // End condition after ~75 seconds
      if (elapsed > 75 && score < 3) {
        showEnd(false);
        return;
      }
    }
    
    // Update drops
    for (let i = drops.length - 1; i >= 0; i--) {
      const drop = drops[i];
      if (drop.matched || drop.missed) {
        drop.alpha -= 0.05;
        if (drop.alpha <= 0) {
          drops.splice(i, 1);
        }
        continue;
      }
      
      drop.y += drop.speed * 60 * dt;
      // Gentle wind toward target
      drop.x += (drop.targetX - drop.x) * 0.02;
      
      // Check if drop passed the chime area
      const chimeRadius = 30;
      const dist = Math.hypot(drop.x - chimes[drop.targetChime].x, drop.y - chimes[drop.targetChime].y);
      
      if (dist < chimeRadius && !drop.matched) {
        const activeChime = getChimeForDial();
        if (activeChime === drop.targetChime) {
          // Match!
          drop.matched = true;
          score++;
          comboCount++;
          lastChimeTime = timestampNow();
          
          // Check if we completed the sequence
          if (score >= targetScore) {
            setTimeout(() => showEnd(true), 500);
          }
          
          // Trigger chime
          playChimeSound(drop.targetChime, 0.8);
          chimes[drop.targetChime].hitAnim = 1;
          
          // Spawn particles
          spawnParticles(drop.x, drop.y, CHIME_COLORS[drop.targetChime], 10);
        }
      }
      
      // Missed - dropped past the chime
      if (drop.y > H + 30 && !drop.matched) {
        drop.missed = true;
        comboCount = 0;
      }
    }
    
    // Update chime glow
    for (let i = 0; i < CHIME_COUNT; i++) {
      if (chimes[i].hitAnim > 0) {
        chimes[i].hitAnim -= dt * 2;
        chimeGlow[i] = Math.max(0, chimeGlow[i] - dt * 0.8);
      }
    }
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.vy += 0.05; // gravity
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
    
    // Smooth dial rotation
    dialAngle += (dialTargetAngle - dialAngle) * 0.15;
    
    // Shake decay
    shakeAmount *= 0.9;
    
    // Combo timer reset
    if (timestampNow() - lastChimeTime > 3000) {
      comboCount = 0;
    }
    
  } else if (gameState === 'win') {
    winTime += dt;
    // Spawn celebration particles
    if (winTime < 3) {
      const chime = chimes[Math.floor(Math.random() * CHIME_COUNT)];
      spawnParticles(chime.x, chime.y, CHIME_COLORS[Math.floor(Math.random() * CHIME_COUNT)], 5);
    }
    
    // Update existing particles
    for (let i = winParticles.length - 1; i >= 0; i--) {
      winParticles[i].life -= 0.008;
      winParticles[i].y -= 0.5;
      winParticles[i].x += Math.sin(winTime + i) * 0.5;
      if (winParticles[i].life <= 0) {
        winParticles.splice ? null : winParticles.splice(i, 1);
      }
    }
    
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.vy += 0.05;
      if (p.life <= 0) particles.splice(i, 1);
    }
  } else if (gameState === 'lose') {
    loseTime += dt;
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.vy += 0.05;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
}

function timestampNow() {
  return performance.now();
}

// ===== RENDERING =====
function render() {
  // Screen shake
  const shakeX = (Math.random() - 0.5) * shakeAmount;
  const shakeY = (Math.random() - 0.5) * shakeAmount;
  
  ctx.save();
  ctx.translate(shakeX, shakeY);
  
  // Background gradient
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#12192a');
  bgGrad.addColorStop(1, '#080c18');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);
  
  // Stars
  for (const star of bgStars) {
    const twinkle = Math.sin(timestampNow() * star.twinkleSpeed) * 0.3 + 0.7;
    ctx.globalAlpha = star.alpha * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Draw connecting lines between chimes
  ctx.strokeStyle = 'rgba(100, 140, 180, 0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < CHIME_COUNT; i++) {
    for (let j = i + 1; j < CHIME_COUNT; j++) {
      ctx.beginPath();
      ctx.moveTo(chimes[i].x, chimes[i].y);
      ctx.lineTo(chimes[j].x, chimes[j].y);
      ctx.stroke();
    }
  }
  
  // Draw chimes
  for (const chime of chimes) {
    drawChime(chime);
  }
  
  // Draw dial
  drawDial();
  
  // Draw drops
  for (const drop of drops) {
    if (!drop.matched && !drop.missed) {
      drawDrop(drop);
    } else {
      ctx.globalAlpha = drop.alpha;
      drawDrop(drop);
      ctx.globalAlpha = 1;
    }
  }
  
  // Draw particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Draw UI
  drawHUD();
  
  ctx.restore();
}

function drawChime(chime) {
  const cx = chime.x;
  const cy = chime.y;
  const isWinChime = chime.targetChime < WIN_SEQUENCE.length;
  const glowIntensity = chime.hitAnim;
  const glowScale = chimeGlow[chime.index];
  
  // Glow effect
  if (glowIntensity > 0 || glowScale > 0) {
    const glowRadius = 40 + glowIntensity * 20 + glowScale * 15;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
    grad.addColorStop(0, `rgba(140, 200, 240, ${glowIntensity * 0.4 + glowScale * 0.2})`);
    grad.addColorStop(1, 'rgba(140, 200, 240, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Chime body - elegant glass tube shape
  const w = 12;
  const h = 50 + glowIntensity * 8;
  
  // Glass tube
  const tubeGrad = ctx.createLinearGradient(cx - w/2, cy - h/2, cx + w/2, cy + h/2);
  tubeGrad.addColorStop(0, `rgba(${160 + glowIntensity * 40}, ${200 + glowIntensity * 30}, ${220 + glowIntensity * 20}, 0.7)`);
  tubeGrad.addColorStop(0.5, `rgba(${130 + glowIntensity * 60}, ${180 + glowIntensity * 40}, ${210 + glowIntensity * 30}, 0.85)`);
  tubeGrad.addColorStop(1, `rgba(${150 + glowIntensity * 50}, ${190 + glowIntensity * 30}, ${210 + glowIntensity * 25}, 0.6)`);
  
  ctx.fillStyle = tubeGrad;
  ctx.beginPath();
  roundRect(ctx, cx - w/2, cy - h/2, w, h, 6);
  ctx.fill();
  
  // Glass highlight
  ctx.strokeStyle = `rgba(200, 230, 255, ${0.4 + glowIntensity * 0.4})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  roundRect(ctx, cx - w/2 + 1, cy - h/2 + 1, w - 2, h - 2, 5);
  ctx.stroke();
  
  // Chime cap
  ctx.fillStyle = `rgba(180, 200, 220, ${0.6 + glowIntensity * 0.3})`;
  ctx.beginPath();
  ctx.arc(cx, cy - h/2 - 3, 5, 0, Math.PI * 2);
  ctx.fill();
  
  // String
  ctx.strokeStyle = 'rgba(150, 180, 200, 0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy - h/2 - 8);
  ctx.lineTo(cx, cy - h/2 - 3);
  ctx.stroke();
  
  // Number label
  ctx.fillStyle = `rgba(200, 220, 240, ${0.5 + glowIntensity * 0.5})`;
  ctx.font = '11px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(chime.label, cx, cy + h/2 + 20);
  
  // Check indicator for won chimes (subtle fill)
  if (scoresHave(chime.index)) {
    ctx.fillStyle = `rgba(100, 200, 150, ${0.15 + glowScale * 0.1})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
    ctx.fill();
  }
}

function scoresHave(index) {
  // Show scored chimes with a subtle green glow after they're hit
  return chimeGlow[index] > 0.3;
}

function drawDial() {
  const cx = dialCenterX;
  const cy = dialCenterY;
  const r = dialRadius;
  
  // Outer ring
  ctx.strokeStyle = 'rgba(100, 160, 220, 0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r + 5, 0, Math.PI * 2);
  ctx.stroke();
  
  // Dial body
  const dialGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  dialGrad.addColorStop(0, 'rgba(40, 60, 90, 0.9)');
  dialGrad.addColorStop(1, 'rgba(20, 35, 60, 0.95)');
  ctx.fillStyle = dialGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  
  // Border
  ctx.strokeStyle = 'rgba(100, 160, 220, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  
  // Position markers
  for (let i = 0; i < DIAL_POSITIONS; i++) {
    const angle = (i / DIAL_POSITIONS) * Math.PI * 2;
    const markerX = cx + Math.cos(angle) * (r - 10);
    const markerY = cy + Math.sin(angle) * (r - 10);
    
    ctx.fillStyle = i === getChimeForDial() ? 'rgba(140, 200, 240, 0.8)' : 'rgba(80, 120, 160, 0.3)';
    ctx.beginPath();
    ctx.arc(markerX, markerY, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Current direction indicator
  const indX = cx + Math.cos(dialAngle) * (r - 22);
  const indY = cy + Math.sin(dialAngle) * (r - 22);
  
  ctx.fillStyle = '#a0d0f0';
  ctx.beginPath();
  ctx.moveTo(
    cx + Math.cos(dialAngle) * (r - 4),
    cy + Math.sin(dialAngle) * (r - 4)
  );
  ctx.lineTo(
    cx + Math.cos(dialAngle + 2.5) * (r - 18),
    cy + Math.sin(dialAngle + 2.5) * (r - 18)
  );
  ctx.lineTo(
    cx + Math.cos(dialAngle - 2.5) * (r - 18),
    cy + Math.sin(dialAngle - 2.5) * (r - 18)
  );
  ctx.closePath();
  ctx.fill();
  
  // Center hub
  const hubGrad = ctx.createRadialGradient(cx - 3, cy - 3, 0, cx, cy, 16);
  hubGrad.addColorStop(0, 'rgba(120, 160, 200, 0.8)');
  hubGrad.addColorStop(1, 'rgba(60, 90, 130, 0.6)');
  ctx.fillStyle = hubGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 14, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(140, 190, 230, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, 14, 0, Math.PI * 2);
  ctx.stroke();
  
  // Inner dot
  ctx.fillStyle = 'rgba(180, 220, 255, 0.9)';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawDrop(drop) {
  const x = drop.x;
  const y = drop.y;
  
  // Ambient glow
  const glow = ctx.createRadialGradient(x, y, 0, x, y, 15);
  glow.addColorStop(0, 'rgba(120, 180, 240, 0.4)');
  glow.addColorStop(1, 'rgba(120, 180, 240, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 15, 0, Math.PI * 2);
  ctx.fill();
  
  // Drop body
  const dropGrad = ctx.createRadialGradient(x - 1, y - 1, 0, x, y, drop.size + 2);
  dropGrad.addColorStop(0, 'rgba(180, 210, 255, 0.95)');
  dropGrad.addColorStop(0.7, 'rgba(120, 170, 230, 0.8)');
  dropGrad.addColorStop(1, 'rgba(80, 140, 200, 0.6)');
  ctx.fillStyle = dropGrad;
  
  // Teardrop shape
  ctx.beginPath();
  ctx.moveTo(x, y + drop.size + 3);
  ctx.bezierCurveTo(x - drop.size * 1.2, y - drop.size * 0.2, x - drop.size, y - drop.size * 1.2, x, y - drop.size * 1.8);
  ctx.bezierCurveTo(x + drop.size, y - drop.size * 1.2, x + drop.size * 1.2, y - drop.size * 0.2, x, y + drop.size + 3);
  ctx.fill();
  
  // Highlight
  ctx.fillStyle = 'rgba(220, 240, 255, 0.7)';
  ctx.beginPath();
  ctx.arc(x - 1, y - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawHUD() {
  // Score display at top
  const scored = chimeGlow.filter(g => g > 0.3).length;
  ctx.fillStyle = 'rgba(160, 200, 230, 0.7)';
  ctx.font = '16px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(`✦ ${scored} / ${targetScore} chimes resonated ✦`, W / 2, 35);
  
  // Progress indicator - dots
  for (let i = 0; i < targetScore; i++) {
    const dotX = W / 2 - (targetScore - 1) * 12 + i * 24;
    const dotY = 58;
    ctx.fillStyle = i < scored ? 'rgba(100, 200, 160, 0.8)' : 'rgba(100, 140, 180, 0.3)';
    ctx.beginPath();
    ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
    ctx.fill();
    if (i < scored) {
      ctx.fillStyle = 'rgba(140, 230, 180, 0.9)';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // Timer bar at bottom
  const elapsed = gameState === 'playing' ? (performance.now() - gameStartTime) / 1000 : 0;
  const maxTime = 90;
  const barWidth = 200;
  const barX = W / 2 - barWidth / 2;
  const barY = H - 30;
  
  ctx.fillStyle = 'rgba(80, 120, 160, 0.2)';
  ctx.fillRect(barX, barY, barWidth, 4);
  
  const progress = Math.min(elapsed / maxTime, 1);
  const barGrad = ctx.createLinearGradient(barX, barY, barX + barWidth * progress, barY);
  barGrad.addColorStop(0, 'rgba(100, 170, 220, 0.6)');
  barGrad.addColorStop(1, 'rgba(140, 200, 240, 0.6)');
  ctx.fillStyle = barGrad;
  ctx.fillRect(barX, barY, barWidth * progress, 4);
  
  ctx.fillStyle = 'rgba(120, 160, 200, 0.4)';
  ctx.font = '11px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(elapsed)}s / ${Math.floor(maxTime)}s`, W / 2, barY - 8);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== START SCREEN =====
function renderStartScreen() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);
  
  // Animated background rain
  const t = performance.now() / 1000;
  for (let i = 0; i < 30; i++) {
    const x = (i * 50 + Math.sin(t + i) * 10) % W;
    const y = (t * 40 + i * 30) % H;
    ctx.fillStyle = `rgba(100, 160, 200, ${0.1 + Math.sin(t + i * 0.5) * 0.05})`;
    ctx.beginPath();
    ctx.ellipse(x, y, 1.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.fillStyle = 'rgba(140, 190, 230, 0.6)';
  ctx.font = '42px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('☔', W / 2, H / 2 - 80);
  
  ctx.fillStyle = 'rgba(160, 200, 240, 0.85)';
  ctx.font = '32px Georgia';
  ctx.fillText('Rain Dial', W / 2, H / 2 - 20);
  
  ctx.fillStyle = 'rgba(130, 170, 200, 0.6)';
  ctx.font = '16px Georgia';
  ctx.fillText('Rotate the dial to route each raindrop', W / 2, H / 2 + 30);
  ctx.fillText('into the matching glass chime.', W / 2, H / 2 + 55);
  
  ctx.fillStyle = 'rgba(120, 170, 210, 0.8)';
  ctx.font = '18px Georgia';
  ctx.fillText(('▶  Click to Begin'), W / 2, H / 2 + 110);
  
  // Fade UI if not playing
  msgTitle.textContent = '';
  msgBody.textContent = '';
  msgDebrief.textContent = '';
  msgBtn.style.display = 'none';
}

// ===== INPUT HANDLING =====
let isDragging = false;
let dragStartAngle = 0;

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  dialTargetAngle = getDialTargetAngle(e.clientX, e.clientY);
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  
  initAudio();
  
  const dx = e.clientX - dialCenterX;
  const dy = e.clientY - dialCenterY;
  const dist = Math.hypot(dx, dy);
  
  // Clicking dial - rotate it
  if (dist < dialRadius + 30) {
    isDragging = true;
    dialTargetAngle = getDialTargetAngle(e.clientX, e.clientY);
    return;
  }
  
  // Clicking elsewhere
  if (gameState === 'start') {
    startGame();
    return;
  }
  
  if (gameState === 'playing') {
    // Clicking can also set dial angle
    dialTargetAngle = getDialTargetAngle(e.clientX, e.clientY);
    isDragging = true;
    return;
  }
  
  if (gameState === 'win' || gameState === 'lose') {
    // Click anywhere to restart
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    // Restart if they click on the button or anywhere in end screen
    if (!messageEl.classList.contains('hidden')) {
      const msgRect = messageEl.getBoundingClientRect();
      if (cx > msgRect.left && cx < msgRect.right && cy > msgRect.top && cy < msgRect.bottom) {
        startGame();
      }
    }
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  const touch = e.touches[0];
  
  if (gameState === 'start') {
    startGame();
    return;
  }
  
  if (gameState !== 'playing') {
    startGame();
    return;
  }
  
  dialTargetAngle = getDialTargetAngle(touch.clientX, touch.clientY);
  isDragging = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging) return;
  const touch = e.touches[0];
  dialTargetAngle = getDialTargetAngle(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isDragging = false;
});

msgBtn.addEventListener('click', () => {
  initAudio();
  startGame();
});

// ===== MAIN LOOP =====
resize();
initStars();

let mainFrame;
function mainLoop() {
  if (gameState === 'start') {
    renderStartScreen();
  } else {
    update(0.016);
    render();
  }
  mainFrame = requestAnimationFrame(mainLoop);
}

mainFrame = requestAnimationFrame(mainLoop);

// Handle window resize
window.addEventListener('resize', () => {
  resize();
  initStars();
});
</script>
