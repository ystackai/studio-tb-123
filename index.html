<!DOCTYPE html>
<html lang="en">

<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">Orbit Postcard</div>
  <div id="subtitle">Click the sky to launch</div>
  <div id="ring-counter"></div>
</div>
<button id="restart-btn" onclick="restartGame()">Restart</button>

<script>
// ============================================================
// ORBIT POSTCARD — A 60-90s slingshot ring-penetrating game
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const restartBtn = document.getElementById('restart-btn');
const ringCounterEl = document.getElementById('ring-counter');

let W, H, centerX, centerY;
const MAX_W = 1400, MAX_H = 900;

function resize() {
  W = canvas.width = Math.min(window.innerWidth, MAX_W);
  H = canvas.height = Math.min(window.innerHeight, MAX_H);
  centerX = W / 2;
  centerY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// --- Evidence API ---
let evidenceState = {
  schema_version: 1,
  phase: 'initial',
  progress: 0,
  target: 3,
  completed: false,
  restart_count: 0
};

function updateEvidence() {
  window.__factoryxEvidence = () => ({...evidenceState});
}
updateEvidence();

// --- Audio Engine ---
let audioCtx = null;
let masterGain = null;
let ambientNodes = [];
let ringChimes = [];
let audioStarted = false;

const SONGS = [
  // Ring 0: Soft minor
  [
    { freq: 130.81, detune: 0, gain: 0.07, type: 'sine' },
    { freq: 155.56, detune: 2, gain: 0.05, type: 'sine' },
    { freq: 196.00, detune: -3, gain: 0.04, type: 'triangle' },
  ],
  // Ring 1: Brighter, wider intervals
  [
    { freq: 146.83, detune: 0, gain: 0.08, type: 'sine' },
    { freq: 174.61, detune: 5, gain: 0.06, type: 'sine' },
    { freq: 220.00, detune: -2, gain: 0.05, type: 'triangle' },
    { freq: 261.63, detune: 3, gain: 0.03, type: 'sine' },
  ],
  // Ring 2: Major feel, rich harmony
  [
    { freq: 164.81, detune: 0, gain: 0.09, type: 'sine' },
    { freq: 196.00, detune: -4, gain: 0.07, type: 'sine' },
    { freq: 246.94, detune: 3, gain: 0.05, type: 'triangle' },
    { freq: 293.66, detune: -2, gain: 0.04, type: 'sine' },
    { freq: 329.63, detune: 1, gain: 0.03, type: 'sine' },
  ],
  // Payoff: Triumphant, expansive
  [
    { freq: 130.81, detune: 0, gain: 0.10, type: 'sine' },
    { freq: 164.81, detune: -1, gain: 0.08, type: 'sine' },
    { freq: 196.00, detune: 2, gain: 0.07, type: 'triangle' },
    { freq: 261.63, detune: -2, gain: 0.06, type: 'sine' },
    { freq: 329.63, detune: 1, gain: 0.05, type: 'sine' },
    { freq: 392.00, detune: -1, gain: 0.03, type: 'triangle' },
  ]
];

const SFX_DEFS = [
  { name: 'slingshot_release', fn: function(t) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.15);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.15);
  }},
  { name: 'ring_pass', fn: function(t) {
    [523.25, 659.25, 783.99].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f + Math.random() * 10 - 5, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(t + i * 0.06);
      osc.stop(t + 0.6 + i * 0.06);
    });
  }},
  { name: 'payoff', fn: function(t) {
    [261.63, 329.63, 392.00, 523.25, 659.25].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i < 2 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(f, t + i * 0.15);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
      gain.gain.setValueAtTime(0.12, t + i * 0.15 + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 2.5);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 2.5);
    });
  }},
  { name: 'fail', fn: function(t) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(60, t + 0.8);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.8);
  }},
  { name: 'click', fn: function(t) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(400, t + 0.02);
    gain.gain.setValueAtTime(0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.04);
  }}
];

function sfx(name) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const t = audioCtx.currentTime;
  const def = SFX_DEFS.find(s => s.name === name);
  if (def) def.fn(t);
}

function startAmbient(songIndex) {
  if (!audioCtx) return;
  stopAmbient();
  const song = SONGS[songIndex];
  if (!song) return;
  song.forEach(note => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = note.type;
    osc.frequency.setValueAtTime(note.freq, audioCtx.currentTime);
    osc.detune.setValueAtTime(note.detune, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(note.gain, audioCtx.currentTime + 1.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    ambientNodes.push({ osc, gain, targetGain: note.gain });
  });
  // Fade out old ambient
  ambientNodes.forEach((n, i) => {
    if (i > noteCount(songIndex)) {
      n.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    }
  });
  // Clean up faded nodes
  setTimeout(() => {
    ambientNodes = ambientNodes.filter(n => n.gain.gain.value > 0.001);
  }, 1500);
}

function noteCount(idx) {
  return [4, 5, 6, 7][Math.min(idx, 3)] || 3;
}

function stopAmbient() {
  ambientNodes.forEach(n => {
    try { n.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); } catch(e) {}
    try { n.osc.stop(); } catch(e) {}
  });
  ambientNodes = [];
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);
  audioCtx.resume();
  audioStarted = true;
}

// --- Game State ---
let gameState = 'initial'; // initial, aim, flying, ring_pass, payoff, failed
let rings = [];
let satellite = { x: 0, y: 0, vx: 0, vy: 0, r: 6, trail: [], alive: false };
let stars = [];
let particles = [];
let trailParticles = [];
let aimStart = { x: 0, y: 0 };
let aimEnd = { x: 0, y: 0 };
let ringsPassed = 0;
let time = 0;
let camera = { x: 0, y: 0, targetX: 0, targetY: 0, zoom: 1, targetZoom: 1 };
let bgHue = 220;
let bgHueTarget = 220;
let screenShake = 0;
let postcardAlpha = 0;
let ringFlashAlpha = 0;
let ringFlashColor = '#000000';
let globalTime = 0;
let lastRingPassTime = 0;
let failed = false;

const RING_CONFIGS = [
  { radius: 120, color: '#4488ff', glow: '#2244aa', particleColor: '#66aaff', speed: 0.35, angle: 0, lineWidth: 3 },
  { radius: 220, color: '#ff44aa', glow: '#aa2266', particleColor: '#ff66cc', speed: -0.25, angle: 1.2, lineWidth: 4 },
  { radius: 340, color: '#44ddaa', glow: '#22aa77', particleColor: '#66ffcc', speed: 0.2, angle: 2.5, lineWidth: 5 }
];

const PAYOFF_CONFIG = {
  colors: ['#ffcc66', '#ff66aa', '#66aaff', '#44ddaa', '#aa88ff'],
  orbits: [100, 180, 280, 380, 480],
  speeds: [0.5, -0.35, 0.28, -0.2, 0.15]
};

// --- Initialize stars ---
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 2 + 0.5,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
initStars();

// --- Ring Drawing ---
function drawRing(ring, i) {
  const rx = ring.x + camera.x;
  const ry = ring.y + camera.y;
  const r = ring.radius * camera.zoom;

  // Glow
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(rx, ry, r + 15, 0, Math.PI * 2);
  ctx.fillStyle = ring.glow;
  ctx.fill();
  ctx.restore();

  // Main ring
  ctx.save();
  ctx.translate(rx, ry);
  ctx.rotate(ring.currentAngle || 0);

  // Outer glow
  ctx.beginPath();
  ctx.ellipse(0, 0, r + 6, r * 0.4 + 6, 0, 0, Math.PI * 2);
  ctx.strokeStyle = ring.glow;
  ctx.lineWidth = ring.lineWidth * camera.zoom + 2;
  ctx.globalAlpha = 0.3 + Math.sin(globalTime * 2 + i) * 0.15;
  ctx.stroke();

  // Bright ring
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.4, 0, 0, Math.PI * 2);
  ctx.strokeStyle = ring.color;
  ctx.lineWidth = ring.lineWidth * camera.zoom;
  ctx.globalAlpha = 0.8 + Math.sin(globalTime * 1.5 + i * 0.7) * 0.2;
  ctx.stroke();

  // Inner accent
  ctx.beginPath();
  ctx.ellipse(0, 0, r - 3, r * 0.4 - 1.5, 0, 0, Math.PI * 2);
  ctx.strokeStyle = ring.particleColor;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.stroke();

  ctx.restore();
}

// --- Saturn-like ring ---
function drawSaturn(cx, cy, radius, angle, color, pulse) {
  ctx.save();
  ctx.translate(cx, cy);

  // Planet body
  const grad = ctx.createRadialGradient(-radius * 0.2, -radius * 0.2, 0, 0, 0, radius);
  grad.addColorStop(0, '#ddbb88');
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, '#1a1020');

  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Shadow
  ctx.beginPath();
  ctx.arc(radius * 0.3, radius * 0.3, radius * 0.9, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Rings
  ctx.save();
  ctx.rotate(angle);
  for (let ri = 0; ri < 3; ri++) {
    const rr = radius * (1.4 + ri * 0.35);
    ctx.beginPath();
    ctx.ellipse(0, 0, rr, rr * 0.35, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,180,140,${0.3 - ri * 0.07})`;
    ctx.lineWidth = 4 - ri;
    ctx.globalAlpha = 0.5;
    ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

// --- Draw satellite ---
function drawSatellite(x, y) {
  const sx = x + camera.x * camera.zoom + camera.x * (1 - camera.zoom);
  const sy = y + camera.y * camera.zoom + camera.y * (1 - camera.zoom);
  const sr = satellite.r * camera.zoom;

  ctx.save();
  ctx.translate(sx, sy);

  // Glow
  const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, sr * 4);
  glowGrad.addColorStop(0, 'rgba(255,200,100,0.4)');
  glowGrad.addColorStop(0.5, 'rgba(100,150,255,0.1)');
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(0, 0, sr * 4, 0, Math.PI * 2);
  ctx.fill();

  // Body
  const bodyGrad = ctx.createRadialGradient(-sr * 0.3, -sr * 0.3, 0, 0, 0, sr);
  bodyGrad.addColorStop(0, '#ffcc66');
  bodyGrad.addColorStop(0.6, '#ff8833');
  bodyGrad.addColorStop(1, '#aa4422');
  ctx.beginPath();
  ctx.arc(0, 0, sr, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Small satellite dish
  ctx.save();
  ctx.rotate(Math.atan2(satellite.vy, satellite.vx) + Math.PI);
  ctx.fillStyle = '#8888aa';
  ctx.fillRect(sr * 0.5, -sr * 0.15, sr * 0.6, sr * 0.3);
  ctx.beginPath();
  ctx.arc(sr * 1.0, 0, sr * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#aabbcc';
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// --- Draw aim line ---
function drawAimLine() {
  if (gameState !== 'aim') return;
  const dx = aimStart.x - aimEnd.x;
  const dy = aimStart.y - aimEnd.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const power = Math.min(dist, 200) / 200;

  ctx.save();

  // Power indicator
  ctx.beginPath();
  ctx.moveTo(aimStart.x, aimStart.y);
  ctx.lineTo(aimStart.x + dx, aimStart.y + dy);
  ctx.strokeStyle = `rgba(255,180,80,${0.3 + power * 0.5})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow head
  if (dist > 20) {
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.moveTo(aimStart.x + dx, aimStart.y + dy);
    ctx.lineTo(aimStart.x + dx - 12 * Math.cos(angle - 0.4), aimStart.y + dy - 12 * Math.sin(angle - 0.4));
    ctx.moveTo(aimStart.x + dx, aimStart.y + dy);
    ctx.lineTo(aimStart.x + dx - 12 * Math.cos(angle + 0.4), aimStart.y + dy - 12 * Math.sin(angle + 0.4));
    ctx.strokeStyle = `rgba(255,200,100,${0.5 + power * 0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Power bar at bottom
  const barW = 120;
  const barH = 4;
  const barX = centerX - barW / 2;
  const barY = H - 30;
  ctx.fillStyle = 'rgba(100,120,200,0.2)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = `rgba(255,${Math.floor(200 - power * 150)},80,0.8)`;
  ctx.fillRect(barX, barY, barW * power, barH);

  ctx.restore();
}

// --- Init rings ---
function initRings() {
  rings = RING_CONFIGS.map((cfg, i) => ({
    ...cfg,
    currentAngle: cfg.angle,
    passed: false,
    x: 0,
    y: 0,
    baseRadius: cfg.radius
  }));
}

// --- Init satellite ---
function initSatellite() {
  satellite = {
    x: centerX,
    y: centerY,
    vx: 0,
    vy: 0,
    r: 6,
    trail: [],
    alive: true
  };
}

// --- Particle system ---
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x: x + camera.x,
      y: y + camera.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
      size: Math.random() * 3 + 1,
      color: color
    });
  }
}

function spawnTrail(x, y, color) {
  trailParticles.push({
    x: x + camera.x,
    y: y + camera.y,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    life: 1,
    decay: 0.015,
    size: Math.random() * 2 + 0.5,
    color: color
  });
}

// --- Background drawing ---
function drawBackground() {
  // Gradient background
  const grad = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, Math.max(W, H) * 0.7);
  const h = bgHue;
  grad.addColorStop(0, `hsl(${h}, 30%, 12%)`);
  grad.addColorStop(0.5, `hsl(${h + 10}, 25%, 7%)`);
  grad.addColorStop(1, `hsl(${h + 20}, 20%, 3%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(star => {
    const twinkle = Math.sin(globalTime * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
    ctx.globalAlpha = star.alpha * twinkle;
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- Draw payoff postcard ---
function drawPayoff() {
  const cx = centerX + camera.x;
  const cy = centerY + camera.y;

  // Central planet
  drawSaturn(cx, cy, 40 * camera.zoom, globalTime * 0.3, '#ddaa55', 0);

  // Orbiting rings with satellites
  PAYOFF_CONFIG.orbits.forEach((orbit, i) => {
    const angle = globalTime * PAYOFF_CONFIG.speeds[i] + i * 1.2;
    const ox = cx + Math.cos(angle) * orbit * camera.zoom;
    const oy = cy + Math.sin(angle) * orbit * camera.zoom * 0.5;
    const satR = 5 * camera.zoom;

    // Ring
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(i * 0.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, orbit * camera.zoom, orbit * camera.zoom * 0.4, 0, 0, Math.PI * 2);
    ctx.strokeStyle = PAYOFF_CONFIG.colors[i];
    ctx.globalAlpha = 0.5 + Math.sin(globalTime * 0.5 + i) * 0.2;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Tiny satellite
    ctx.save();
    ctx.translate(ox, oy);
    const satAngle = Math.atan2(Math.cos(globalTime * PAYOFF_CONFIG.speeds[i]), -Math.sin(globalTime * PAYOFF_CONFIG.speeds[i]));
    ctx.rotate(satAngle);

    // Glow
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, satR * 3);
    glowGrad.addColorStop(0, PAYOFF_CONFIG.colors[i]);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, satR * 3, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.globalAlpha = 1;
    const bodyGrad = ctx.createRadialGradient(-2, -2, 0, 0, 0, satR);
    bodyGrad.addColorStop(0, '#ffdd88');
    bodyGrad.addColorStop(1, PAYOFF_CONFIG.colors[i]);
    ctx.beginPath();
    ctx.arc(0, 0, satR, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Dish
    ctx.fillStyle = '#99aacc';
    ctx.fillRect(satR * 0.4, -satR * 0.12, satR * 0.5, satR * 0.24);
    ctx.beginPath();
    ctx.arc(satR * 0.85, 0, satR * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = '#aab8cc';
    ctx.fill();

    ctx.restore();
  });

  // Postcard title
  ctx.save();
  ctx.globalAlpha = postcardAlpha;
  ctx.fillStyle = '#ffeedd';
  ctx.font = `${14 * camera.zoom}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = '3px';
  ctx.fillText('ORBIT POSTCARD', centerX, centerY + 180 * camera.zoom);
  ctx.font = `${10 * camera.zoom}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = '#aabbcc';
  ctx.fillText('Three rings crossed. The sky remembers.', centerX, centerY + 200 * camera.zoom);
  ctx.restore();
}

// --- Main game loop ---
function update() {
  globalTime += 0.016;
  time += 0.016;

  bgHue += (bgHueTarget - bgHue) * 0.02;

  // Camera
  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.08;
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;

  // Screen shake decay
  screenShake *= 0.95;

  // Update rings
  rings.forEach((ring, i) => {
    if (!ring.passed) {
      ring.currentAngle += ring.speed * 0.016 * (1 + ringsPassed * 0.3);
    }
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    return p.life > 0;
  });

  trailParticles = trailParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Satellite trail
  if (satellite.alive && (gameState === 'flying' || gameState === 'payoff')) {
    const tpx = satellite.x + camera.x + satellite.x * (1 - camera.zoom);
    const tpy = satellite.y + camera.y + satellite.y * (1 - camera.zoom);
    spawnTrail(satellite.x, satellite.y, '#ffaa55');
    if (trailParticles.length > 60) trailParticles.splice(0, 5);
  }

  // Satellite movement
  if (gameState === 'flying' && satellite.alive) {
    satellite.x += satellite.vx;
    satellite.y += satellite.vy;

    // Trail
    if (Math.random() > 0.3) {
      spawnTrail(satellite.x, satellite.y, '#ffcc77');
    }

    // Check ring collisions
    rings.forEach((ring, i) => {
      if (ring.passed) return;

      const dx = satellite.x - ring.x;
      const dy = satellite.y - ring.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Check if satellite is crossing the ring ellipse
      const rotatedDx = dx * Math.cos(-ring.currentAngle) + dy * Math.sin(-ring.currentAngle);
      const rotatedDy = -dx * Math.sin(-ring.currentAngle) + dy * Math.cos(-ring.currentAngle);
      const ringDist = Math.sqrt(
        (rotatedDx / ring.radius) ** 2 + (rotatedDy / (ring.radius * 0.4)) ** 2
      );

      if (Math.abs(ringDist - 1) < 0.15) {
        // Check if satellite is moving toward/through the ring
        const cosAngle = Math.cos(ring.currentAngle);
        const sinAngle = Math.sin(ring.currentAngle);
        const ringNormalX = cosAngle * rotatedDx / ring.radius;
        const ringNormalY = sinAngle * rotatedDy / (ring.radius * 0.4);
        const dotProduct = ringNormalX * satellite.vx + ringNormalY * satellite.vy;

        if (dotProduct < 0) {
          // Ring passed!
          ring.passed = true;
          ringsPassed++;
          sfx('ring_pass');
          spawnParticles(satellite.x, satellite.y, ring.color, 30, 4);
          screenShake = 5;

          // Ring flash
          ringFlashAlpha = 0.6;
          ringFlashColor = ring.color;

          // Update evidence
          evidenceState.progress = ringsPassed;
          updateEvidence();

          // Change camera perspective
          camera.targetX = satellite.x * 0.3;
          camera.targetY = satellite.y * 0.3;

          // Change background hue
          bgHueTarget = 220 + ringsPassed * 45;

          // Change ambient music
          startAmbient(ringsPassed);

          // Next ring camera target
          if (ringsPassed < 3) {
            gameState = 'flying';
          } else {
            // Payoff!
            gameState = 'payoff';
            sfx('payoff');
            evidenceState.completed = true;
            evidenceState.phase = 'completed';
            updateEvidence();
            camera.targetZoom = 0.7;
            postcardAlpha = 0;
          }
        }
      }
    });

    // Check if satellite is lost
    const distFromCenter = Math.sqrt(satellite.x ** 2 + satellite.y ** 2);
    if (distFromCenter > 800) {
      failSatellite();
    }

    // Speed decay
    const speed = Math.sqrt(satellite.vx ** 2 + satellite.vy ** 2);
    if (speed > 0.5) {
      satellite.vx *= 0.999;
      satellite.vy *= 0.999;
    }
  }

  // Postcard fadeIn
  if (gameState === 'payoff') {
    postcardAlpha = Math.min(1, postcardAlpha + 0.01);
  }
}

function failSatellite() {
  if (!satellite.alive) return;
  satellite.alive = false;
  gameState = 'failed';
  evidenceState.phase = 'failed';
  evidenceState.completed = false;
  updateEvidence();
  sfx('fail');
  spawnParticles(satellite.x, satellite.y, '#ff4444', 50, 5);
  screenShake = 10;
  ringFlashAlpha = 0.4;
  ringFlashColor = '#ff2222';
}

function draw() {
  ctx.save();

  // Screen shake
  const shakeX = (Math.random() - 0.5) * screenShake;
  const shakeY = (Math.random() - 0.5) * screenShake;
  ctx.translate(shakeX, shakeY);

  drawBackground();

  // Ring flash effect
  if (ringFlashAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = ringFlashAlpha;
    ctx.fillStyle = ringFlashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    ringFlashAlpha *= 0.93;
  }

  // Draw rings (behind satellite)
  rings.forEach((ring, i) => {
    if (!ring.passed) drawRing(ring, i);
    else {
      // Draw faded/passed ring
      ctx.save();
      const rx = ring.x + camera.x;
      const ry = ring.y + camera.y;
      const r = ring.radius * camera.zoom;
      ctx.translate(rx, ry);
      ctx.rotate(ring.currentAngle || 0);
      ctx.beginPath();
      ctx.ellipse(0, 0, r, r * 0.4, 0, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.globalAlpha = 0.15 + Math.sin(globalTime + i) * 0.05;
      ctx.lineWidth = ring.lineWidth * camera.zoom;
      ctx.stroke();
      ctx.restore();
    }
  });

  // Draw trail particles
  trailParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.5;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw ring particles
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw satellite
  if (satellite.alive && (gameState === 'flying' || gameState === 'payoff')) {
    drawSatellite(satellite.x, satellite.y);
  }

  // Draw payoff
  if (gameState === 'payoff') {
    drawPayoff();
  }

  // Aim line
  drawAimLine();

  // Start hint
  if (gameState === 'aim' && !audioStarted) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(globalTime * 2) * 0.2;
    ctx.fillStyle = '#8888aa';
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Drag to aim • Release to launch', centerX, H - 60);
    ctx.restore();
  }

  // Failed state
  if (gameState === 'failed') {
    ctx.save();
    ctx.globalAlpha = postcardAlpha || 0;
    ctx.fillStyle = '#ff8888';
    ctx.font = '18px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Satellite lost to the void.', centerX, centerY);
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillStyle = '#aa7777';
    ctx.fillText('Tap anywhere to restart', centerX, centerY + 30);
    ctx.restore();
  }

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Launch satellite ---
function launchSatellite(dx, dy) {
  const power = Math.min(Math.sqrt(dx * dx + dy * dy), 200) / 200;
  const angle = Math.atan2(dy, dx);
  const speed = 2 + power * 4;

  satellite.vx = Math.cos(angle) * speed;
  satellite.vy = Math.sin(angle) * speed;

  sfx('slingshot_release');

  // Camera follow target
  camera.targetX = satellite.vx * 30;
  camera.targetY = satellite.vy * 30;

  gameState = 'flying';
  evidenceState.phase = 'playing';
  updateEvidence();
  startAmbient(0);
}

// --- Restart ---
function restartGame() {
  sfx('click');
  stopAmbient();
  evidenceState.restart_count++;
  evidenceState.phase = 'initial';
  evidenceState.progress = 0;
  evidenceState.completed = false;
  ringsPassed = 0;
  gameState = 'aim';
  satellite.alive = false;
  particles = [];
  trailParticles = [];
  postcardAlpha = 0;
  ringFlashAlpha = 0;
  screenShake = 0;
  bgHue = 220;
  bgHueTarget = 220;
  camera = { x: 0, y: 0, targetX: 0, targetY: 0, zoom: 1, targetZoom: 1 };
  initSatellite();
  initRings();
  updateEvidence();
}

// --- Input handling ---
let isDragging = false;

canvas.addEventListener('mousedown', (e) => {
  if (gameState === 'initial') {
    initAudio();
    gameState = 'aim';
    evidenceState.phase = 'playing';
    evidenceState.progress = 0;
    evidenceState.target = 3;
    updateEvidence();
    initSatellite();
    initRings();
    camera.targetX = 0;
    camera.targetY = 0;
    document.getElementById('ui').style.opacity = '0';
    return;
  }

  if (gameState === 'failed') {
    restartGame();
    return;
  }

  if (gameState === 'payoff') {
    // Show restart button
    restartBtn.classList.toggle('visible');
    return;
  }

  if (gameState === 'aim') {
    isDragging = true;
    aimStart = { x: e.clientX, y: e.clientY };
    aimEnd = { x: e.clientX, y: e.clientY };
    sfx('click');
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (isDragging && gameState === 'aim') {
    aimEnd = { x: e.clientX, y: e.clientY };
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (isDragging && gameState === 'aim') {
    isDragging = false;
    const dx = aimStart.x - e.clientX;
    const dy = aimStart.y - e.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 15) {
      launchSatellite(dx, dy);
    }
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', {
    clientX: t.clientX,
    clientY: t.clientY
  }));
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', {
    clientX: t.clientX,
    clientY: t.clientY
  }));
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  canvas.dispatchEvent(new MouseEvent('mouseup', {
    clientX: t.clientX,
    clientY: t.clientY
  }));
}, { passive: false });

// Click to restart on payoff postcard
canvas.addEventListener('click', (e) => {
  if (gameState === 'payoff') {
    restartGame();
  }
});

// --- Start ---
initSatellite();
initRings();
gameLoop();

// Re-expose for verification
updateEvidence();
window.__factoryxEvidence = () => ({...evidenceState});

</script>
