<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Ferry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
  }
  canvas {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0, 180, 255, 0.2);
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// BEAT FERRY — A 60-90s one-screen bridge-betwee-pools game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Canvas sizing
const W = 1200;
const H = 600;
canvas.width = W;
canvas.height = H;

// ---- Audio Engine (Web Audio API) ----
let audioCtx = null;
let audioStarted = false;
const audioNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;
}

function playTone(freq, duration, type, gain, delay) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime + (delay || 0));
  g.gain.linearRampToValueAtTime(gain || 0.15, (audioCtx.currentTime) + (delay || 0) + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, (audioCtx.currentTime) + (delay || 0) + duration);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + (delay || 0));
  osc.stop(audioCtx.currentTime + (delay || 0) + duration);
  audioNodes.push(osc);
  return osc;
}

function playFerryLaunch() {
  if (!audioStarted) return;
  playTone(180, 0.6, 'triangle', 0.2, 0);
  playTone(220, 0.6, 'triangle', 0.15, 0.05);
}

function playLandingPerfect() {
  if (!audioStarted) return;
  // C major arpeggio
  playTone(261.63, 0.8, 'sine', 0.2, 0);
  playTone(329.63, 0.8, 'sine', 0.15, 0.1);
  playTone(392.00, 0.8, 'sine', 0.15, 0.2);
  playTone(523.25, 1.0, 'sine', 0.2, 0.3);
}

function playLandingGood() {
  if (!audioStarted) return;
  playTone(261.63, 0.7, 'sine', 0.18, 0);
  playTone(329.63, 0.7, 'sine', 0.12, 0.12);
  playTone(523.25, 0.9, 'sine', 0.15, 0.2);
}

function playLandingMiss() {
  if (!audioStarted) return;
  playTone(150, 0.5, 'sawtooth', 0.1, 0);
  playTone(100, 0.7, 'sawtooth', 0.08, 0.1);
}

function playPassengerBoard() {
  if (!audioStarted) return;
  const notes = [440, 554.37, 659.25, 698.46, 880];
  notes.forEach((n, i) => {
    playTone(n, 0.3, 'sine', 0.06, i * 0.06);
  });
}

function playHarborFinale() {
  if (!audioStarted) return;
  const chord = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
  chord.forEach((n, i) => {
    playTone(n, 2.5, 'sine', 0.08 + i * 0.01, i * 0.15);
  });
  // Add a shimmer
  setTimeout(() => {
    [1046.50, 1318.51, 1567.98].forEach(n => {
      playTone(n, 1.5, 'sine', 0.04, 0);
    });
  }, 1500);
}

function playRestartSound() {
  if (!audioStarted) return;
  playTone(400, 0.3, 'sine', 0.12, 0);
  playTone(500, 0.2, 'sine', 0.1, 0.1);
}

// ---- Game constants ----
const FERRY_START_X = 120;
const FERRY_START_Y = H - 120;
const FERRY_WIDTH = 50;
const FERRY_HEIGHT = 30;
const HARBOUR_X = W - 180;
const HARBOUR_Y = 200;
const HARBOUR_WIDTH = 120;
const HARBOUR_HEIGHT = 80;
const POOL_RADIUS = 45;
const TIMING_WINDOW = 55; // pixels
const GOOD_TIMING = 40;
const PERFECT_TIMING = 18;

// ---- Game state ----
let state = 'intro'; // intro, playing, landed, failed, harbor, finished
let score = 0;
let passengers = 0;
let ferryTarget = null;
let ferryX = FERRY_START_X;
let ferryY = FERRY_START_Y;
let ferryAngle = -Math.PI / 2;
let ferrySpeed = 0;
let ferryMoving = false;
let ferryStartTime = 0;
let ferryLaunchPos = { x: 0, y: 0 };
let pools = [];
let particles = [];
let time = 0;
let lastTimestamp = 0;
let introTimer = 0;
let harborPhase = 0;
let shakeTimer = 0;
let fadeAlpha = 0;
let feedbackText = '';
let feedbackTimer = 0;
let success = false;
let totalPools = 0;
let landedPools = 0;
let engineOsc = null;
let engineGain = null;
let comboCount = 0;
let comboTimer = 0;
let backgroundStars = [];
let waves = [];

// ---- Background stars ----
for (let i = 0; i < 80; i++) {
  backgroundStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.5 + 0.2
  });
}

// ---- Waves ----
for (let i = 0; i < 12; i++) {
  waves.push({
    x: Math.random() * W,
    y: Math.random() * H,
    radius: 0,
    maxRadius: 60 + Math.random() * 80,
    speed: 30 + Math.random() * 40,
    alpha: 0
  });
}

// ---- Pool colors ----
const PILLAR_COLORS = [
  { glow: '#ff66aa', fill: '#ff3388', wave: '#ff99cc' },
  { glow: '#66ccff', fill: '#3399ff', wave: '#99ddff' },
  { glow: '#ffcc44', fill: '#ff9900', wave: '#ffe680' },
  { glow: '#66ff88', fill: '#33cc55', wave: '#99ffbb' },
  { glow: '#cc88ff', fill: '#aa55ff', wave: '#ddb8ff' },
  { glow: '#ff8844', fill: '#ff5522', wave: '#ffbb99' },
];

// ---- Initialize pools ----
function initPools() {
  pools = [];
  totalPools = 5;
  landedPools = 0;
  passengers = 0;
  score = 0;
  comboCount = 0;
  comboTimer = 0;
  
  const columnY = H / 2;
  const colSpacing = (HARBOUR_X - 350) / (totalPools - 1);
  
  for (let i = 0; i < totalPools; i++) {
    const x = 350 + colSpacing * i;
    const y = columnY + Math.sin(i * 1.2) * 60;
    pools.push({
      x: x,
      y: y,
      landed: false,
      color: PILLAR_COLORS[i % PILLAR_COLORS.length],
      pulsePhase: Math.random() * Math.PI * 2,
      passengers: 0,
      size: POOL_RADIUS,
      ripple: 0,
      glowPulse: 0
    });
  }
}

// ---- Particle system ----
function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life || 1.0,
      maxLife: life || 1.0,
      color: color,
      size: Math.random() * 4 + 2
    });
  }
}

function spawnWaveParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * 2,
      vy: Math.sin(angle) * 2,
      life: 2.5,
      maxLife: 2.5,
      color: color,
      size: Math.random() * 3 + 1,
      ring: true
    });
  }
}

// ---- Drawing functions ----
function drawFerry(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);
  
  // Hull shadow
  ctx.shadowColor = 'rgba(0, 100, 200, 0.5)';
  ctx.shadowBlur = 15;
  
  // Main hull
  ctx.beginPath();
  ctx.moveTo(-15, -8);
  ctx.quadraticCurveTo(-20, 0, -15, 8);
  ctx.lineTo(-5, 10);
  ctx.lineTo(22, 5);
  ctx.quadraticCurveTo(28, 0, 22, -5);
  ctx.lineTo(-5, -10);
  ctx.closePath();
  
  const hullGrad = ctx.createLinearGradient(-20, 0, 25, 0);
  hullGrad.addColorStop(0, '#4488cc');
  hullGrad.addColorStop(0.5, '#66aadd');
  hullGrad.addColorStop(1, '#88ccff');
  ctx.fillStyle = hullGrad;
  ctx.fill();
  
  ctx.shadowBlur = 0;
  
  // Deck
  ctx.fillStyle = '#ffdd88';
  ctx.fillRect(-10, -6, 25, 12);
  
  // Mast
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(5, -6);
  ctx.lineTo(5, -18);
  ctx.stroke();
  
  // Flag
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(5, -18);
  ctx.lineTo(15, -15);
  ctx.lineTo(5, -12);
  ctx.closePath();
  ctx.fill();
  
  // Cabin
  ctx.fillStyle = '#88bbdd';
  ctx.fillRect(-8, -4, 8, 8);
  ctx.strokeStyle = '#6699aa';
  ctx.lineWidth = 1;
  ctx.strokeRect(-8, -4, 8, 8);
  
  // Passengers on deck (small circles)
  if (passengers >= 1) {
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(5, 0, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  if (passengers >= 2) {
    ctx.fillStyle = '#44ffcc';
    ctx.beginPath();
    ctx.arc(12, 2, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
  if (passengers >= 3) {
    ctx.fillStyle = '#ff88cc';
    ctx.beginPath();
    ctx.arc(16, -2, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.restore();
}

function drawPool(pool, t) {
  const pulse = Math.sin(t * 2 + pool.pulsePhase) * 0.3 + 0.7;
  const size = pool.size * (0.9 + pulse * 0.2);
  
  // Outer glow
  ctx.shadowColor = pool.color.glow;
  ctx.shadowBlur = 25 * pulse;
  
  const grad = ctx.createRadialGradient(pool.x, pool.y, 0, pool.x, pool.y, size);
  grad.addColorStop(0, pool.color.fill);
  grad.addColorStop(0.6, pool.color.glow);
  grad.addColorStop(1, 'transparent');
  
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(pool.x, pool.y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Inner core
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(pool.x, pool.y, size * 0.3 * pulse, 0, Math.PI * 2);
  ctx.fill();
  
  // Ripple rings
  for (let i = 0; i < 3; i++) {
    const ripplePhase = (t * 1.5 + i * Math.PI * 2 / 3 + pool.pulsePhase) % (Math.PI * 2);
    const rippleSize = size + (ripplePhase / (Math.PI * 2)) * 30;
    const rippleAlpha = Math.max(0, 1 - ripplePhase / (Math.PI * 2)) * 0.3;
    ctx.strokeStyle = pool.color.wave;
    ctx.globalAlpha = rippleAlpha;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(pool.x, pool.y, rippleSize, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  
  // Landing indicator (when landed)
  if (pool.landed) {
    // Checkered pattern on top
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(pool.x, pool.y, size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    
    // Landed text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('✓', pool.x, pool.y + 4);
  }
  
  // Passenger icons
  if (!pool.landed && pool.passengers > 0) {
    for (let i = 0; i < pool.passengers; i++) {
      const angle = (i / pool.passengers) * Math.PI * 2 + t * 0.5;
      const px = pool.x + Math.cos(angle) * (size + 8);
      const py = pool.y + Math.sin(angle) * (size + 8);
      ctx.fillStyle = ['#ff4488', '#44ff88', '#4488ff', '#ffcc44', '#aa44ff'][i % 5];
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHarbour(t) {
  ctx.save();
  
  // Harbour background area
  ctx.fillStyle = '#1a1a3a';
  ctx.strokeStyle = '#3a3a6a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(HARBOUR_X - 20, HARBOUR_Y - 20, HARBOUR_WIDTH + 40, HARBOUR_HEIGHT + 40, 15);
  ctx.fill();
  ctx.stroke();
  
  // Dock
  ctx.fillStyle = '#886644';
  ctx.fillRect(HARBOUR_X, HARBOUR_Y + 30, HARBOUR_WIDTH, 20);
  
  // Dock posts
  for (let i = 0; i < 5; i++) {
    const px = HARBOUR_X + 20 + i * 22;
    ctx.fillStyle = '#665544';
    ctx.fillRect(px, HARBOUR_Y + 25, 6, 30);
  }
  
  // Harbour light beacon
  const beaconPulse = Math.sin(t * 3) * 0.5 + 0.5;
  ctx.shadowColor = beaconPulse > 0.5 ? '#ffcc00' : '#ff8800';
  ctx.shadowBlur = 20 * beaconPulse;
  ctx.fillStyle = '#ffee88';
  ctx.beginPath();
  ctx.arc(HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y - 10, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#ffdd88';
  ctx.font = 'bold 13px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('HARBOUR', HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y + 15);
  
  ctx.restore();
}

function drawBackground(t) {
  // Deep water gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0a2a');
  bgGrad.addColorStop(0.4, '#0d1535');
  bgGrad.addColorStop(1, '#0a1a30');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Water surface shimmer
  ctx.globalAlpha = 0.1;
  for (let i = 0; i < 15; i++) {
    const shimmerX = (i * 80 + t * 20) % W;
    const shimmerY = 100 + Math.sin(t + i) * 50;
    ctx.fillStyle = '#88ddff';
    ctx.fillRect(shimmerX, shimmerY, 40, 2);
  }
  ctx.globalAlpha = 1;
  
  // Stars (only in upper portion)
  backgroundStars.forEach(star => {
    const twinkle = Math.sin(t * star.speed * 3 + star.twinkle) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(200, 220, 255, ${twinkle * 0.7})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size * twinkle, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Wave ripples in background
  waves.forEach(wave => {
    wave.radius += wave.speed * 0.016;
    wave.alpha = 1 - wave.radius / wave.maxRadius;
    if (wave.radius > wave.maxRadius) {
      wave.radius = 0;
      wave.y = Math.random() * H * 0.6 + H * 0.2;
      wave.x = Math.random() * W;
    }
    if (wave.alpha > 0) {
      ctx.strokeStyle = `rgba(100, 180, 255, ${wave.alpha * 0.15})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
      ctx.stroke();
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    
    if (p.ring) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1 - alpha) * 5, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

function drawHUD(t) {
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  
  // Score
  ctx.fillStyle = '#88ccff';
  ctx.fillText(`Score: ${score}`, 20, 30);
  
  // Passengers
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`Passengers: ${passengers}`, 20, 55);
  
  // Combo
  if (comboCount > 1 && comboTimer > 0) {
    const comboAlpha = Math.min(1, comboTimer);
    ctx.globalAlpha = comboAlpha;
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillText(`${comboCount}x COMBO!`, W / 2, 35);
    ctx.globalAlpha = 1;
    ctx.font = '14px "Segoe UI", sans-serif';
  }
  
  // Progress
  ctx.fillStyle = '#6688aa';
  ctx.fillText(`Stops: ${landedPools}/${totalPools}`, W - 160, 30);
  
  // Progress bar
  const barW = 120;
  const barH = 6;
  const barX = W - 160;
  const barY = 40;
  ctx.fillStyle = '#222244';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#44aaff';
  ctx.fillRect(barX, barY, barW * (landedPools / totalPools), barH);
}

function drawTitleScreen(t) {
  ctx.fillStyle = 'rgba(10, 10, 30, 0.85)';
  ctx.fillRect(0, 0, W, H);
  
  // Title
  ctx.shadowColor = '#44aaff';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦ BEAT FERRY ✦', W / 2, H / 2 - 60);
  ctx.shadowBlur = 0;
  
  // Subtitle
  ctx.fillStyle = '#88bbdd';
  ctx.font = '18px "Segoe UI", sans-serif';
  ctx.fillText('Tap pools of light in sequence to sail to the harbour', W / 2, H / 2);
  
  // Instructions
  ctx.fillStyle = '#aaaacc';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.fillText('Click the glowing pools in order from left to right', W / 2, H / 2 + 40);
  ctx.fillText('Land on pulse for bonus points and passengers', W / 2, H / 2 + 62);
  
  // Start prompt
  const blink = Math.sin(t * 3) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffcc66';
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.fillText('▶  CLICK TO START  ◀', W / 2, H / 2 + 120);
  ctx.globalAlpha = 1;
  
  // Decorative ferry illustration
  drawFerryIllustration(W / 2 - 30, H / 2 + 160, t, -Math.PI / 3);
  drawFerryIllustration(W / 2 + 80, H / 2 + 150, t + 1, -Math.PI / 4);
}

function drawFerryIllustration(x, y, t, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = 0.6;
  
  ctx.beginPath();
  ctx.moveTo(-10, -6);
  ctx.quadraticCurveTo(-14, 0, -10, 6);
  ctx.lineTo(-3, 8);
  ctx.lineTo(16, 4);
  ctx.quadraticCurveTo(20, 0, 16, -4);
  ctx.lineTo(-3, -8);
  ctx.closePath();
  ctx.fillStyle = '#4488bb';
  ctx.fill();
  
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawGameOverScreen(t) {
  ctx.fillStyle = 'rgba(10, 5, 20, 0.85)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#ff6666';
  ctx.font = 'bold 42px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('DRIFTED AWAY', W / 2, H / 2 - 50);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#ccccdd';
  ctx.font = '18px "Segoe UI", sans-serif';
  ctx.fillText(`The ferry couldn't find a pool in time.`, W / 2, H / 2);
  ctx.fillText(`Score: ${score}  •  Passengers: ${passengers}`, W / 2, H / 2 + 35);
  
  const blink = Math.sin(t * 3) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffcc66';
  ctx.font = 'bold 20px "Segoe UI", sans-serif';
  ctx.fillText('CLICK TO SAIL AGAIN', W / 2, H / 2 + 90);
  ctx.globalAlpha = 1;
}

function drawSuccessScreen(t) {
  ctx.fillStyle = 'rgba(5, 15, 30, 0.8)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.shadowColor = '#44ff88';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#88ffbb';
  ctx.font = 'bold 42px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦ SAFE ARRIVAL ✦', W / 2, H / 2 - 65);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#ccccee';
  ctx.font = '18px "Segoe UI", sans-serif';
  ctx.fillText(`All pools connected! The ferry reaches the harbour.`, W / 2, H / 2 - 25);
  ctx.fillText(`Score: ${score}  •  Passengers: ${passengers}`, W / 2, H / 2 + 10);
  
  // Celebration particles
  if (Math.random() < 0.3) {
    spawnParticles(
      Math.random() * W,
      Math.random() * H * 0.5,
      ['#ff4488', '#44ff88', '#4488ff', '#ffcc44', '#ff8844'][Math.floor(Math.random() * 5)],
      3, 60, 1.5
    );
  }
  
  const blink = Math.sin(t * 3) * 0.3 + 0.7;
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffcc66';
  ctx.font = 'bold 20px "Segoe UI", sans-serif';
  ctx.fillText('CLICK TO SAIL AGAIN', W / 2, H / 2 + 90);
  ctx.globalAlpha = 1;
}

function drawHarbourScene(t, phase) {
  drawBackground(t);
  drawHarbour(t);
  
  // Animated ferry arriving
  const ferryArriveX = HARBOUR_X + HARBOUR_WIDTH / 2 - 15;
  const ferryArriveY = HARBOUR_Y + 35;
  
  // Docking animation
  const dockProgress = Math.min(1, phase / 2);
  const actualX = ferryArriveX - (1 - dockProgress) * 200;
  const actualY = ferryArriveY - Math.sin(dockProgress * Math.PI) * 20;
  
  drawFerry(actualX, actualY, -Math.PI / 2 + Math.sin(t * 2) * 0.05);
  
  // Harbour celebration particles
  if (phase > 1) {
    if (Math.random() < 0.4) {
      spawnParticles(
        HARBOUR_X + Math.random() * HARBOUR_WIDTH,
        HARBOUR_Y + Math.random() * HARBOUR_HEIGHT,
        ['#ff4488', '#ffcc44', '#44ffcc', '#4488ff', '#ff8844'][Math.floor(Math.random() * 5)],
        2, 40, 2.0
      );
    }
  }
  
  // Performance text
  if (phase > 1.5) {
    const textAlpha = Math.min(1, (phase - 1.5) * 1.5);
    ctx.globalAlpha = textAlpha;
    
    ctx.shadowColor = '#ffcc44';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 30px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`✦  HARBOUR PERFORMANCE  ✦`, HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y - 50);
    ctx.shadowBlur = 0;
    
    ctx.fillStyle = '#aaccdd';
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText(`Ferry with ${passengers} passengers performs`, HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y + 75);
    ctx.fillText(`in the harbour lights. Score: ${score}`, HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y + 95);
    
    ctx.globalAlpha = 1;
    
    if (phase > 4) {
      const blink = Math.sin(t * 3) * 0.3 + 0.7;
      ctx.globalAlpha = blink;
      ctx.fillStyle = '#ffcc66';
      ctx.font = 'bold 18px "Segoe UI", sans-serif';
      ctx.fillText('CLICK TO SAIL AGAIN', HARBOUR_X + HARBOUR_WIDTH / 2, HARBOUR_Y + 140);
      ctx.globalAlpha = 1;
    }
  }
}

// ---- Update logic ----
function update(dt, t) {
  time = t;
  
  if (state === 'playing') {
    // Update ferry movement
    if (ferryMoving && ferryTarget) {
      const dx = ferryTarget.x - ferryX;
      const dy = ferryTarget.y - ferryY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 180 + landedPools * 15; // Gets slightly faster with each combo
      
      ferryAngle = Math.atan2(dy, dx);
      
      if (dist < 10) {
        // Landed!
        ferryMoving = false;
        ferryTarget.landed = true;
        landedPools++;
        
        // Check landing quality
        const timingDist = dist; // distance at landing is ~0
        let landingQuality = 'miss';
        if (landingDist !== undefined) {
          if (landingDist <= PERFECT_TIMING) {
            landingQuality = 'perfect';
            score += 100;
            playLandingPerfect();
            spawnParticles(ferryTarget.x, ferryTarget.y, ferryTarget.color.wave, 20, 100, 1.5);
          } else if (landingDist <= GOOD_TIMING) {
            landingQuality = 'good';
            score += 50;
            playLandingGood();
            spawnParticles(ferryTarget.x, ferryTarget.y, ferryTarget.color.wave, 12, 70, 1.2);
          } else {
            landingQuality = 'ok';
            score += 20;
            playLandingMiss();
            spawnParticles(ferryTarget.x, ferryTarget.y, '#888', 8, 50, 0.8);
          }
        }
        
        comboTimer = 2;
        if (comboTimer > 0.5) {
          comboCount++;
        } else {
          comboCount = 1;
        }
        comboTimer = 2;
        
        if (landingQuality === 'perfect') {
          passengers++;
          playPassengerBoard();
          feedbackText = '✦ PERFECT ✦';
        } else if (landingQuality === 'good') {
          passengers++;
          feedbackText = 'Good Landing!';
          playPassengerBoard();
        } else {
          feedbackText = 'Safe Landing';
        }
        feedbackTimer = 1.5;
        
        const nextPoolIndex = pools.indexOf(ferryTarget) + 1;
        if (nextPoolIndex < pools.length) {
          ferryTarget = pools[nextPoolIndex];
        } else {
          // Done!
          if (passengers >= 2) {
            state = 'harbour';
            harborPhase = 0;
            setTimeout(() => playHarborFinale(), 500);
          } else {
            state = 'success';
          }
        }
      } else {
        ferryX += (dx / dist) * speed * dt;
        ferryY += (dy / dist) * speed * dt;
        
        // Engine sound
        if (!engineOsc || engineOsc.context !== audioCtx) {
          // Engine sound is generated periodically
        }
      }
    }
    
    // Combo timer
    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) comboCount = 0;
    }
    
    // Feedback timer
    if (feedbackTimer > 0) feedbackTimer -= dt;
    
    // Landing distance tracking
    landingDist = Math.sqrt(
      (ferryX - ferryTarget.x) ** 2 + 
      (ferryY - ferryTarget.y) ** 2
    );
  }
  
  // Update particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.vx *= 0.98;
    p.vy *= 0.98;
  });
  particles = particles.filter(p => p.life > 0);
  
  // Harbour scene
  if (state === 'harbour') {
    harborPhase += dt;
    if (harborPhase > 4.5) {
      state = 'finished';
    }
  }
}

let landingDist = 0;

// ---- Rendering ----
function render(t) {
  ctx.save();
  
  // Screen shake
  if (shakeTimer > 0) {
    const shakeX = (Math.random() - 0.5) * shakeTimer * 10;
    const shakeY = (Math.random() - 0.5) * shakeTimer * 10;
    ctx.translate(shakeX, shakeY);
    shakeTimer -= 0.016;
  }
  
  if (state === 'intro') {
    renderIntro(t);
  } else if (state === 'playing') {
    renderPlaying(t);
  } else if (state === 'failed') {
    renderGameOver(t);
  } else if (state === 'success') {
    renderSuccess(t);
  } else if (state === 'harbour') {
    renderHarbour(t);
  } else if (state === 'finished') {
    renderSuccess(t);
  }
  
  ctx.restore();
}

function renderIntro(t) {
  drawBackground(t);
  drawTitleScreen(t);
}

function renderPlaying(t) {
  drawBackground(t);
  
  // Draw pools
  pools.forEach((pool, i) => {
    // Only highlight the current target
    if (pool === ferryTarget && !pool.landed) {
      // Pulsing highlight
      const pulse = Math.sin(t * 4) * 0.3 + 0.7;
      ctx.strokeStyle = `rgba(255, 255, 255, ${pulse * 0.5})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(pool.x, pool.y, pool.size + 10, 0, Math.PI * 2);
      ctx.stroke();
      
      // Arrows pointing to target from ferry
      const dx = pool.x - ferryX;
      const dy = pool.y - ferryY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const arrowAngle = Math.atan2(dy, dx);
      const arrowDist = 60;
      const ax = ferryX + Math.cos(arrowAngle) * arrowDist;
      const ay = ferryY + Math.sin(arrowAngle) * arrowDist;
      const ab = arrowAngle + 0.4;
      const ac = arrowAngle - 0.4;
      
      ctx.strokeStyle = `rgba(255, 255, 200, ${pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax + Math.cos(ab) * 10, ay + Math.sin(ab) * 10);
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax + Math.cos(ac) * 10, ay + Math.sin(ac) * 10);
      ctx.stroke();
    }
    
    drawPool(pool, t);
  });
  
  // Draw ferry
  drawFerry(ferryX, ferryY, ferryAngle);
  
  // Draw particles
  drawParticles();
  
  // HUD
  drawHUD(t);
  
  // Feedback text
  if (feedbackTimer > 0) {
    const alpha = Math.min(1, feedbackTimer);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#44aaff';
    ctx.shadowBlur = 15;
    ctx.fillText(feedbackText, W / 2, 80);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  
  // Instructions hint at bottom
  ctx.fillStyle = 'rgba(150, 170, 200, 0.5)';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  if (ferryTarget) {
    ctx.fillText(`Next stop: ${pools.indexOf(ferryTarget) + 1} of ${totalPools} — Tap that pool!`, W / 2, H - 30);
  }
}

function renderGameOver(t) {
  drawBackground(t);
  pools.forEach(pool => drawPool(pool, t));
  drawParticles();
  drawHUD(t);
  drawGameOverScreen(t);
}

function renderSuccess(t) {
  drawBackground(t);
  pools.forEach(pool => drawPool(pool, t));
  drawParticles();
  drawHUD(t);
  drawSuccessScreen(t);
}

function renderHarbour(t) {
  drawHarbourScene(t, harborPhase);
}

// ---- Input handling ----
canvas.addEventListener('click', (e) => {
  initAudio();
  
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  
  if (state === 'intro') {
    state = 'playing';
    ferryX = FERRY_START_X;
    ferryY = FERRY_START_Y;
    ferryAngle = 0;
    ferryMoving = false;
    ferryTarget = pools[0];
    initPools();
    ferryX = FERRY_START_X;
    ferryY = FERRY_START_Y;
    ferryMoving = false;
    ferryTarget = pools[0];
    return;
  }
  
  if (state === 'playing') {
    // Check if click is on the current target pool
    if (ferryTarget) {
      const dx = mx - ferryTarget.x;
      const dy = my - ferryTarget.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist <= ferryTarget.size + 15) {
        // Check timing
        const timeSinceLaunch = (Date.now() - ferryStartTime) / 1000;
        const travelTime = Math.sqrt(
          (ferryTarget.x - ferryLaunchPos.x) ** 2 + 
          (ferryTarget.y - ferryLaunchPos.y) ** 2
        ) / (180 + landedPools * 15);
        
        // Calculate how close the ferry is
        const ferryToTargetDist = Math.sqrt(
          (ferryTarget.x - ferryX) ** 2 + 
          (ferryTarget.y - ferryY) ** 2
        );
        
        if (ferryToTargetDist < TIMING_WINDOW) {
          // Valid landing!
          landingDist = ferryToTargetDist;
          if (!ferryMoving) {
            playFerryLaunch();
            ferryLaunchPos = { x: ferryX, y: ferryY };
            ferryStartTime = Date.now();
            ferryMoving = true;
          }
          return;
        } else if (!ferryMoving) {
          // Launch toward target anyway
          playFerryLaunch();
          ferryLaunchPos = { x: ferryX, y: ferryY };
          ferryStartTime = Date.now();
          ferryMoving = true;
          return;
        }
      }
      
      // Clicked elsewhere — ferry still moves, but no extra effect
      if (!ferryMoving) {
        playFerryLaunch();
        ferryLaunchPos = { x: ferryX, y: ferryY };
        ferryStartTime = Date.now();
        ferryMoving = true;
      }
    }
  }
  
  if (state === 'failed' || state === 'success' || state === 'finished' || state === 'harbour') {
    // Restart
    state = 'playing';
    initPools();
    ferryX = FERRY_START_X;
    ferryY = FERRY_START_Y;
    ferryAngle = 0;
    ferryMoving = false;
    ferryTarget = pools[0];
    playRestartSound();
    particles = [];
    landingDist = 0;
  }
});

// ---- Game loop ----
function gameLoop(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;
  
  update(dt, timestamp / 1000);
  render(timestamp / 1000);
  
  requestAnimationFrame(gameLoop);
}

// ---- Initialize ----
initPools();
requestAnimationFrame(gameLoop);

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());
</script>
