<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Moth</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --text-color: #e0e0f0;
            --accent-color: #00ffcc;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px var(--accent-color);
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            opacity: 0.9;
        }
        .status-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .btn {
            pointer-events: auto;
            margin-top: 2rem;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 24px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-color);
        }
        #start-screen {
            background: rgba(10, 10, 18, 0.85);
            backdrop-filter: blur(5px);
        }
        #game-over-screen {
            background: rgba(10, 10, 18, 0.9);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <div class="status-label">COLLECT <span id="pulse-count">0</span> / 3</div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="active">
            <h1>MAGNETIC MOTH</h1>
            <p>Guide the moth to three magnetic flowers.<br>
               Avoid the grey static clouds.</p>
            <p style="font-size: 0.9rem; opacity: 0.6; margin-top: 10px;">Mouse to move. Don't touch static.</p>
            <button id="start-btn" class="btn">Begin Flight</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden">
            <h1 id="end-title">FLIGHT ENDED</h1>
            <p id="end-reason">The moth was consumed by static.</p>
            <button id="restart-btn" class="btn">Try Again</button>
        </div>
    </div>
</div>

<script>
/**
 * MAGNETIC MOTH
 * A compact, self-contained browser game.
 */

// --- Audio Engine ---
const AudioEngine = (() => {
    let ctx = null;
    let masterGain = null;
    
    function init() {
        if (ctx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        ctx = new AudioContext();
        masterGain = ctx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(ctx.destination);
    }

    function playTone(freq, type, duration, startTime = 0, vol = 0.5) {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
        
        gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start(ctx.currentTime + startTime);
        osc.stop(ctx.currentTime + startTime + duration);
    }

    return {
        init,
        collect: () => playTone(880, 'sine', 0.3, 0, 0.4) // High ping
                            .then(() => playTone(1100, 'sine', 0.5, 0.1, 0.3)), // Harmony
        error: () => playTone(150, 'sawtooth', 0.5, 0, 0.5)
                            .then(() => playTone(100, 'sawtooth', 0.6, 0.1, 0.5)), // Low buzz
        win: () => {
            // Arpeggio up
            playTone(440, 'sine', 1.0, 0, 0.5);
            playTone(554, 'sine', 1.0, 0.2, 0.4); // C#
            playTone(659, 'sine', 1.0, 0.4, 0.5); // E
            playTone(880, 'sine', 1.5, 0.6, 0.6); // A
        },
        start: () => playTone(220, 'triangle', 2.0, 0, 0.2) // Ambient drone start
    };
})();

// --- Game Constants ---
const COLORS = {
    bg: '#0a0a12',
    moth: '#ffdd00',
    mothGlow: 'rgba(255, 221, 0, 0.4)',
    flower: '#00ffcc',
    flowerGlow: 'rgba(0, 255, 204, 0.3)',
    flowerInner: '#ffffff',
    static: '#333344',
    staticCore: '#555566'
};

// --- State Management ---
const state = {
    width: 0,
    height: 0,
    mouseX: 0,
    mouseY: 0,
    running: false,
    flowers: [],
    statics: [],
    particles: [],
    score: 0,
    startTime: 0,
    timer: 0, // seconds
    moth: { x: 0, y: 0, trail: [] }
};

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const ui = {
    start: document.getElementById('start-screen'),
    gameOver: document.getElementById('game-over-screen'),
    pulseCount: document.getElementById('pulse-count'),
    endTitle: document.getElementById('end-title'),
    endReason: document.getElementById('end-reason')
};

// --- Resize Handling ---
function resize() {
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    canvas.width = state.width;
    canvas.height = state.height;
    state.mouseX = state.width / 2;
    state.mouseY = state.height / 2;
}
window.addEventListener('resize', resize);
resize();

// --- Input Handling ---
function setMouse(x, y) {
    state.mouseX = x;
    state.mouseY = y;
}

window.addEventListener('mousemove', e => {
    if (state.running) setMouse(e.clientX, e.clientY);
});

window.addEventListener('touchmove', e => {
    if (state.running) {
        e.preventDefault();
        setMouse(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

// --- Game Logic Helpers ---
function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}

function distance(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
}

// --- Game Object Classes ---
class Flower {
    constructor() {
        const margin = 80;
        this.x = randomRange(margin, state.width - margin);
        this.y = randomRange(margin, state.height - margin);
        this.radius = 20;
        this.pulseOffset = randomRange(0, Math.PI * 2);
        this.collected = false;
        this.collectedTime = 0;
    }
    
    draw(time) {
        if (this.collected) {
            // Draw explosion effect
            const progress = (time - this.collectedTime) / 0.5;
            if (progress < 1) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + (progress * 40), 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${1 - progress})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            return;
        }

        const pulse = Math.sin(time * 3 + this.pulseOffset) * 0.3 + 1;
        const r = this.radius * pulse;
        
        // Glow
        ctx.shadowBlur = 20;
        ctx.shadowColor = COLORS.flowerGlow;
        
        // Outer petals
        ctx.fillStyle = COLORS.flower;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fill();
        
        // Inner core
        ctx.fillStyle = COLORS.flowerInner;
        ctx.beginPath();
        ctx.arc(this.x, this.y, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
    }
    
    update() {
        if (this.collected && (Date.now()/1000 - this.collectedTime) > 0.5) {
            return false; // Remove from array
        }
        return true;
    }
}

class StaticCloud {
    constructor() {
        this.x = randomRange(100, state.width - 100);
        this.y = randomRange(100, state.height - 100);
        this.radius = randomRange(40, 70);
        this.vx = randomRange(-0.2, 0.2);
        this.vy = randomRange(-0.2, 0.2);
        this.nodes = [];
        
        // Generate jagged shape
        const nodeCount = 12;
        for(let i=0; i<nodeCount; i++) {
            const angle = (i / nodeCount) * Math.PI * 2;
            const dist = this.radius * randomRange(0.7, 1.3);
            this.nodes.push({
                x: Math.cos(angle) * dist,
                y: Math.sin(angle) * dist,
                offX: randomRange(-10, 10),
                offY: randomRange(-10, 10)
            });
        }
    }
    
    update() {
        this.x += this.vx;
        this.y += this.vy;
        
        // Bounce off edges
        if (this.x < this.radius || this.x > state.width - this.radius) this.vx *= -1;
        if (this.y < this.radius || this.y > state.height - this.radius) this.vy *= -1;
    }
    
    draw() {
        ctx.fillStyle = COLORS.static;
        ctx.strokeStyle = COLORS.staticCore;
        ctx.lineWidth = 2;
        
        ctx.beginPath();
        if (this.nodes.length > 0) {
            ctx.moveTo(this.x + this.nodes[0].x, this.y + this.nodes[0].y);
            for(let i=1; i<this.nodes.length; i++) {
                ctx.lineTo(this.x + this.nodes[i].x, this.y + this.nodes[i].y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }
        
        // Static effect noise inside
        ctx.save();
        ctx.clip();
        for(let i=0; i<8; i++) {
            ctx.fillRect(
                this.x + randomRange(-this.radius, this.radius),
                this.y + randomRange(-this.radius, this.radius),
                randomRange(5, 15),
                2
            );
        }
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = randomRange(0, Math.PI * 2);
        const speed = randomRange(1, 4);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = randomRange(0.02, 0.05);
    }
    
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        return this.life > 0;
    }
    
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

// --- Physics & Update ---
function updateMoth() {
    const moth = state.moth;
    
    // Magnetic attraction to mouse
    const dx = state.mouseX - moth.x;
    const dy = state.mouseY - moth.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    // Move moth towards mouse with smoothing
    const speed = 0.08; // Spring constant
    moth.x += dx * speed;
    moth.y += dy * speed;
    
    // Trail update
    moth.trail.push({ x: moth.x, y: moth.y });
    if (moth.trail.length > 20) moth.trail.shift();
}

function checkCollisions() {
    const moth = state.moth;
    
    // Check flowers
    state.flowers.forEach(flower => {
        if (!flower.collected && distance(moth, flower) < flower.radius + 10) {
            flower.collected = true;
            flower.collectedTime = Date.now() / 1000;
            state.score++;
            
            // Spawn particles
            for(let i=0; i<15; i++) {
                state.particles.push(new Particle(flower.x, flower.y, COLORS.flower));
            }
            
            // Sound
            AudioEngine.collect();
            
            ui.pulseCount.innerText = state.score;
            
            // Check Win Condition
            if (state.score >= 3) {
                endGame(true);
            }
        }
    });
    
    // Check Static
    state.statics.forEach(staticCloud => {
        // Simple circle collision for gameplay feel
        if (distance(moth, staticCloud) < staticCloud.radius + 5) {
            endGame(false);
        }
    });
}

function startGame() {
    AudioEngine.init();
    AudioEngine.start();
    
    state.running = true;
    state.score = 0;
    state.moth = { x: state.width/2, y: state.height/2, trail: [] };
    state.mouseX = state.width/2;
    state.mouseY = state.height/2;
    
    // Spawn Flowers
    state.flowers = [];
    for(let i=0; i<3; i++) state.flowers.push(new Flower());
    
    // Spawn Static Clouds (increases in number/size over time simulated by spawns)
    state.statics = [];
    for(let i=0; i<4; i++) state.statics.push(new StaticCloud());
    
    // UI
    ui.start.classList.add('hidden');
    ui.gameOver.classList.add('hidden');
    ui.pulseCount.innerText = '0';
}

function endGame(win) {
    state.running = false;
    
    ui.gameOver.classList.remove('hidden');
    ui.start.classList.add('hidden'); // Ensure start is hidden
    
    if (win) {
        ui.endTitle.innerText = "HARMONY ACHIEVED";
        ui.endReason.innerText = "The circuit is complete. The moth has awakened.";
        ui.endTitle.style.color = COLORS.flower;
        AudioEngine.win();
        
        // Massive particle explosion at moth's current pos
        for(let i=0; i<50; i++) {
            state.particles.push(new Particle(state.moth.x, state.moth.y, '#fff'));
        }
    } else {
        ui.endTitle.innerText = "DISSIPATED";
        ui.endReason.innerText = "The static consumed the moth's signal.";
        ui.endTitle.style.color = '#ff4444';
        AudioEngine.error();
    }
}

// --- Render Loop ---
let lastTime = 0;
function loop(timestamp) {
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    const time = timestamp / 1000;

    // Clear
    ctx.fillStyle = COLORS.bg; // Slight trail effect if we used alpha, but solid for crispness
    ctx.clearRect(0, 0, state.width, state.height);
    
    // Background subtle grid or stars? Let's do faint stars
    // (Procedural background elements handled in a sub-routine if needed, keeping it clean for now)
    
    if (state.running) {
        updateMoth();
        state.statics.forEach(s => s.update());
        state.flowers = state.flowers.filter(f => f.update());
        state.particles = state.particles.filter(p => p.update());
        
        checkCollisions();
        
        // Draw Trails/Ghosting for motion lines
        ctx.beginPath();
        if (state.moth.trail.length > 1) {
             ctx.moveTo(state.moth.trail[0].x, state.moth.trail[0].y);
             for(let i=1; i<state.moth.trail.length; i++) {
                 ctx.lineTo(state.moth.trail[i].x, state.moth.trail[i].y);
             }
             ctx.strokeStyle = 'rgba(255, 221, 0, 0.2)';
             ctx.lineWidth = 4;
             ctx.stroke();
        }
    }

    // Draw Static
    state.statics.forEach(s => s.draw());
    
    // Draw Flowers
    state.flowers.forEach(f => f.draw(time));
    
    // Draw Particles
    state.particles.forEach(p => p.draw());
    
    // Draw Moth
    if (state.running && state.moth) {
        const m = state.moth;
        
        // Aura
        ctx.shadowBlur = 30;
        ctx.shadowColor = COLORS.mothGlow;
        
        // Wings
        const wingFlap = Math.sin(time * 20) * 5;
        ctx.fillStyle = COLORS.moth;
        
        // Left Wing
        ctx.beginPath();
        ctx.ellipse(m.x - 10, m.y, 12, 6 + wingFlap, Math.PI/4, 0, Math.PI*2);
        ctx.fill();
        
        // Right Wing
        ctx.beginPath();
        ctx.ellipse(m.x + 10, m.y, 12, 6 + wingFlap, -Math.PI/4, 0, Math.PI*2);
        ctx.fill();
        
        // Body
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(m.x, m.y, 6, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
    }

    requestAnimationFrame(loop);
}

// --- Event Listeners ---
document.getElementById('start-btn').addEventListener('click', () => {
    startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
    startGame();
});

// --- Init ---
requestAnimationFrame(loop);

</script>
</body>
</html>
