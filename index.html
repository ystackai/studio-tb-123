<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #e0e8ff;
  }
  canvas {
    display: block;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(100, 140, 255, 0.15);
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
  }
  #score-display {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(200, 220, 255, 0.85);
    text-shadow: 0 0 10px rgba(150, 180, 255, 0.4);
  }
  #restart-btn {
    pointer-events: all;
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.08);
    color: #c0d4ff;
    border: 1px solid rgba(180, 200, 255, 0.25);
    border-radius: 20px;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    display: none;
  }
  #restart-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    box-shadow: 0 0 15px rgba(150, 180, 255, 0.3);
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="1200" height="800"></canvas>
<div id="ui-overlay">
  <div id="score-display">Magnetic Pulses: 0 / 3</div>
  <button id="restart-btn">✦ Restart</button>
</div>

<script>
// ============================================================
// MAGNETIC MOTH - A cozy guided-flight browser game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const scoreDisplay = document.getElementById('score-display');
const restartBtn = document.getElementById('restart-btn');

// --- Audio Engine (Web Audio API) ---
let audioCtx = null;
let masterGain = null;
let ambientNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
  // Ambient drone
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 60;
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 60.5; // slight detune for beating
  const ambGain = audioCtx.createGain();
  ambGain.gain.value = 0.06;
  osc1.connect(ambGain);
  osc2.connect(ambGain);
  ambGain.connect(masterGain);
  osc1.start();
  osc2.start();
  ambientNode = { osc1, osc2, gain: ambGain };
}

function playCollectSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Chime-like ascending tones
  const freqs = [523, 659, 784, 1047]; // C5, E5, G5, C6
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t + i * 0.1);
    g.gain.linearRampToValueAtTime(0.15, t + i * 0.1 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.6);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t + i * 0.1);
    osc.stop(t + i * 0.1 + 0.7);
  });
}

function playPayoffSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Rich chord payoff
  const freqs = [523, 659, 784, 1047, 1319, 1568];
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = i < 3 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.08, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + 2.5);
  });
  // Shimmer up
  const sh = audioCtx.createOscillator();
  sh.type = 'sine';
  sh.frequency.setValueAtTime(800, t);
  sh.frequency.linearRampToValueAtTime(2400, t + 1.5);
  const sg = audioCtx.createGain();
  sg.gain.value = 0.04;
  sh.connect(sg);
  sg.connect(masterGain);
  sh.start(t);
  sh.stop(t + 2);
}

function playRestartSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.linearRampToValueAtTime(200, t + 0.3);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + 0.4);
}

function playHoverSound() {
  if (!audioCtx || !playing) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 300 + Math.sin(Date.now() * 0.003) * 100;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.01, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + 0.2);
}

// --- Game State ---
let gameState = 'initial'; // 'initial', 'playing', 'completed', 'gameover'
let collected = 0;
const TARGET = 3;
let restartCount = 0;
let gameTime = 0;
let mouseX = W / 2, mouseY = H / 2;
let moth = { x: W / 2, y: H / 2, vx: 0, vy: 0, angle: 0, wingPhase: 0, glowPhase: 0 };
let flowerPulses = [];
let particles = [];
let stars = [];
let ambientParticles = [];
let shakeAmount = 0;
let glowIntensity = 0;
let collectedFlowers = [];
let completedTimer = 0;
let hoverTimer = 0;

// Generate stars
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.5 + 0.2
  });
}

// Generate ambient floating particles
for (let i = 0; i < 30; i++) {
  ambientParticles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3 - 0.1,
    alpha: Math.random() * 0.3 + 0.05
  });
}

function initFlowers() {
  flowerPulses = [];
  // Place 6 magnetic flowers at strategic positions
  const positions = [
    { x: 200, y: 200 },
    { x: 500, y: 150 },
    { x: 850, y: 300 },
    { x: 300, y: 550 },
    { x: 700, y: 500 },
    { x: 1050, y: 250 }
  ];
  positions.forEach((p, i) => {
    flowerPulses.push({
      x: p.x,
      y: p.y,
      collected: false,
      radius: 28,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 1.2 + Math.random() * 0.5,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      baseHue: 40 + i * 35, // warm to cool colors
      magnetStrength: 0.0008 + Math.random() * 0.0004,
      collectedAnim: 0 // for collection animation
    });
  });
}

function initParticles() {
  particles = [];
}

function resetGame() {
  gameState = 'initial';
  collected = 0;
  gameTime = 0;
  moth.x = W / 2;
  moth.y = H / 2;
  moth.vx = 0;
  moth.vy = 0;
  glowIntensity = 0;
  shakeAmount = 0;
  completedTimer = 0;
  collectedFlowers = [];
  restartCount++;
  initFlowers();
  initParticles();
  updateScoreDisplay();
  restartBtn.style.display = 'none';
  if (ambientNode) {
    ambientNode.gain.gain.value = 0.06;
  }
}

function startGame() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  gameState = 'playing';
  resetGame();
  // Play a soft start sound
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(350, t);
  osc.frequency.linearRampToValueAtTime(500, t + 0.3);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + 0.6);
}

function updateScoreDisplay() {
  if (gameState === 'completed') {
    scoreDisplay.textContent = '✦ Pulses Collected: 3 / 3 ✦';
  } else if (gameState === 'gameover') {
    scoreDisplay.textContent = `Pulses: ${collected} / 3`;
  } else {
    scoreDisplay.textContent = `Magnetic Pulses: ${collected} / ${TARGET}`;
  }
}

// --- Drawing Functions ---
function drawStars(t) {
  stars.forEach(s => {
    const alpha = 0.3 + 0.4 * Math.sin(s.twinkle + t * s.speed * 0.5);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.fill();
  });
}

function drawAmbientParticles() {
  ambientParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150, 180, 255, ${p.alpha})`;
    ctx.fill();
  });
}

function drawFlower(flower, t) {
  const { x, y, radius, pulsePhase, pulseSpeed, rotation, rotSpeed, baseHue, magnetStrength, collectedAnim } = flower;
  
  if (flower.collected && collectedAnim > 1) return;
  
  const pulse = 1 + 0.25 * Math.sin(t * pulseSpeed + pulsePhase);
  const r = radius * pulse;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation + t * rotSpeed);
  
  // Outer glow
  const glowGrad = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 2.5);
  glowGrad.addColorStop(0, `hsla(${baseHue}, 80%, 60%, ${0.2 * pulse})`);
  glowGrad.addColorStop(1, `hsla(${baseHue}, 80%, 40%, 0)`);
  ctx.beginPath();
  ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
  
  // Petals
  const petalCount = 5;
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2;
    ctx.save();
    ctx.rotate(angle);
    
    // Petal shape
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(r * 0.3, -r * 0.5, r * 0.8, -r * 0.3, r, 0);
    ctx.bezierCurveTo(r * 0.8, r * 0.3, r * 0.3, r * 0.5, 0, 0);
    
    const petalGrad = ctx.createLinearGradient(0, 0, r, 0);
    petalGrad.addColorStop(0, `hsla(${baseHue}, 70%, 55%, ${0.8 * pulse})`);
    petalGrad.addColorStop(1, `hsla(${baseHue + 20}, 90%, 75%, ${0.4 * pulse})`);
    ctx.fillStyle = petalGrad;
    ctx.fill();
    
    // Petal highlight
    ctx.beginPath();
    ctx.moveTo(r * 0.2, 0);
    ctx.bezierCurveTo(r * 0.4, -r * 0.15, r * 0.6, -r * 0.1, r * 0.8, 0);
    ctx.bezierCurveTo(r * 0.6, r * 0.1, r * 0.4, r * 0.15, r * 0.2, 0);
    ctx.fillStyle = `rgba(255, 255, 240, ${0.15 * pulse})`;
    ctx.fill();
    
    ctx.restore();
  }
  
  // Center
  const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
  centerGrad.addColorStop(0, `hsla(${baseHue + 10}, 90%, 85%, ${pulse})`);
  centerGrad.addColorStop(1, `hsla(${baseHue}, 80%, 50%, ${0.6 * pulse})`);
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = centerGrad;
  ctx.fill();
  
  // Magnet field rings
  ctx.strokeStyle = `hsla(${baseHue}, 60%, 70%, ${0.1 * pulse})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2);
  ctx.stroke();
  
  // Collection animation
  if (flower.collected) {
    const expand = collectedAnim * 3;
    const fadeAlpha = 1 - collectedAnim;
    ctx.rotate(-rotation - t * rotSpeed); // counter-rotate
    ctx.beginPath();
    ctx.arc(0, 0, r * 2 * expand, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${baseHue}, 90%, 80%, ${fadeAlpha * 0.6})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Rising particles from flower
    for (let i = 0; i < 3; i++) {
      const px = Math.sin(t * 5 + i * 2) * r;
      const py = -collectedAnim * r * 3 - i * 5;
      ctx.beginPath();
      ctx.arc(px, py, 2 * (1 - collectedAnim), 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${baseHue}, 90%, 80%, ${(1 - collectedAnim) * 0.8})`;
      ctx.fill();
    }
  }
  
  ctx.restore();
}

function drawMoth(t) {
  const { x, y, vx, vy, angle, wingPhase, glowPhase } = moth;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  
  // Outer glow
  const glowR = 40 + glowIntensity * 20;
  const glowGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, glowR);
  glowGrad.addColorStop(0, `rgba(255, 250, 200, ${0.3 + glowIntensity * 0.3})`);
  glowGrad.addColorStop(0.5, `rgba(200, 220, 255, ${0.1 + glowIntensity * 0.15})`);
  glowGrad.addColorStop(1, 'rgba(150, 180, 255, 0)');
  ctx.beginPath();
  ctx.arc(0, 0, glowR, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
  
  // Body
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 5, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath();
  ctx.arc(0, -10, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = `rgba(255, 255, 200, ${0.7 + 0.3 * Math.sin(glowPhase)})`;
  ctx.beginPath();
  ctx.arc(-2, -11, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(2, -11, 1.2, 0, Math.PI * 2);
  ctx.fill();
  
  // Antennae
  ctx.strokeStyle = '#5a5a7a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-2, -13);
  ctx.lineTo(-6, -20);
  ctx.lineTo(-8, -22);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(2, -13);
  ctx.lineTo(6, -20);
  ctx.lineTo(8, -22);
  ctx.stroke();
  
  // Left wing
  const wingAngle = Math.sin(wingPhase) * 0.4;
  ctx.save();
  ctx.rotate(-wingAngle);
  ctx.beginPath();
  ctx.moveTo(3, -3);
  ctx.bezierCurveTo(25, -15, 40, -5, 28, 5);
  ctx.bezierCurveTo(20, 12, 8, 6, 3, 3);
  ctx.closePath();
  const lwGrad = ctx.createRadialGradient(15, 0, 2, 15, 0, 25);
  lwGrad.addColorStop(0, 'rgba(180, 160, 220, 0.7)');
  lwGrad.addColorStop(0.6, 'rgba(120, 100, 180, 0.5)');
  lwGrad.addColorStop(1, 'rgba(80, 60, 140, 0.2)');
  ctx.fillStyle = lwGrad;
  ctx.fill();
  // Wing pattern
  ctx.strokeStyle = 'rgba(200, 180, 255, 0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(15, -2, 8, -0.5, 1.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(10, 2, 5, 0, Math.PI);
  ctx.stroke();
  ctx.restore();
  
  // Right wing
  ctx.save();
  ctx.rotate(wingAngle);
  ctx.beginPath();
  ctx.moveTo(-3, -3);
  ctx.bezierCurveTo(-25, -15, -40, -5, -28, 5);
  ctx.bezierCurveTo(-20, 12, -8, 6, -3, 3);
  ctx.closePath();
  const rwGrad = ctx.createRadialGradient(-15, 0, 2, -15, 0, 25);
  rwGrad.addColorStop(0, 'rgba(180, 160, 220, 0.7)');
  rwGrad.addColorStop(0.6, 'rgba(120, 100, 180, 0.5)');
  rwGrad.addColorStop(1, 'rgba(80, 60, 140, 0.2)');
  ctx.fillStyle = rwGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(200, 180, 255, 0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(-15, -2, 8, -1.5, 0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-10, 2, 5, Math.PI, 2 * Math.PI);
  ctx.stroke();
  ctx.restore();
  
  // Tail trail (dust)
  if (gameState === 'playing') {
    for (let i = 0; i < 3; i++) {
      const trailAlpha = (0.3 - i * 0.1) * (1 - Math.min(1, Math.abs(vx) + Math.abs(vy)) * 0.3);
      if (trailAlpha > 0) {
        ctx.beginPath();
        ctx.arc(
          -Math.cos(angle) * (10 + i * 6) + Math.sin(angle) * (Math.random() - 0.5) * 4,
          -Math.sin(angle) * (10 + i * 6) + Math.cos(angle) * (Math.random() - 0.5) * 4,
          2 - i * 0.5, 0, Math.PI * 2
        );
        ctx.fillStyle = `rgba(200, 220, 255, ${trailAlpha})`;
        ctx.fill();
      }
    }
  }
  
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.life})`;
    ctx.fill();
  });
}

function drawBackground(t) {
  // Deep twilight gradient
  const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, 600);
  bgGrad.addColorStop(0, '#151a30');
  bgGrad.addColorStop(0.5, '#0f1325');
  bgGrad.addColorStop(1, '#080c18');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Subtle ground gradient at bottom
  const groundGrad = ctx.createLinearGradient(0, H - 100, 0, H);
  groundGrad.addColorStop(0, 'transparent');
  groundGrad.addColorStop(1, 'rgba(20, 30, 20, 0.3)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 100, W, 100);
}

// --- Physics & Logic ---
function updateMoth(dt) {
  const targetX = mouseX;
  const targetY = mouseY;
  
  const dx = targetX - moth.x;
  const dy = targetY - moth.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  // Magnetic attraction towards mouse
  const strength = Math.min(0.08, 0.002 + dist * 0.0001);
  moth.vx += dx * strength;
  moth.vy += dy * strength;
  
  // Damping
  moth.vx *= 0.96;
  moth.vy *= 0.96;
  
  // Magnetic pull from uncollected flowers
  flowerPulses.forEach(f => {
    if (f.collected) return;
    const fdx = f.x - moth.x;
    const fdy = f.y - moth.y;
    const fdist = Math.sqrt(fdx * fdx + fdy * fdy);
    if (fdist < 200 && fdist > 5) {
      const pull = f.magnetStrength * (1 - fdist / 200);
      moth.vx += fdx * pull;
      moth.vy += fdy * pull;
    }
  });
  
  // Speed limit
  const speed = Math.sqrt(moth.vx * moth.vx + moth.vy * moth.vy);
  if (speed > 8) {
    moth.vx = (moth.vx / speed) * 8;
    moth.vy = (moth.vy / speed) * 8;
  }
  
  moth.x += moth.vx;
  moth.y += moth.vy;
  
  // Keep in bounds
  moth.x = Math.max(20, Math.min(W - 20, moth.x));
  moth.y = Math.max(20, Math.min(H - 20, moth.y));
  
  // Angle towards movement
  if (speed > 0.5) {
    const targetAngle = Math.atan2(moth.vy, moth.vx);
    let diff = targetAngle - moth.angle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    moth.angle += diff * 0.1;
  }
  
  moth.wingPhase += dt * 8 + speed * 0.5;
  moth.glowPhase += dt * 3;
}

function checkFlowerCollisions() {
  flowerPulses.forEach(f => {
    if (f.collected) return;
    const dx = moth.x - f.x;
    const dy = moth.y - f.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < f.radius + 10) {
      // Collect!
      f.collected = true;
      collected++;
      collectedFlowers.push(f);
      
      // Spawn collection particles
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
          x: f.x, y: f.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: Math.random() * 3 + 1,
          life: 1,
          decay: 0.015 + Math.random() * 0.01,
          hue: f.baseHue
        });
      }
      
      playCollectSound();
      glowIntensity = 1;
      shakeAmount = 3;
      
      updateScoreDisplay();
      
      // Check for payoff
      if (collected >= TARGET) {
        gameState = 'completed';
        completedTimer = 0;
        playPayoffSound();
        restartBtn.style.display = 'block';
        amplitude = 2; // extra shake
      }
    }
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
  
  ambientParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
  });
}

// --- Screen Effects ---
let amplitude = 1;

function drawScreenEffects(t) {
  // Completed screen effect
  if (gameState === 'completed') {
    completedTimer += 0.016;
    const breathe = Math.sin(completedTimer * 2) * 0.1 + 0.9;
    
    // Bright overlay
    ctx.fillStyle = `rgba(200, 220, 255, ${0.05 * breathe})`;
    ctx.fillRect(0, 0, W, H);
    
    // Draw collected flower trails
    collectedFlowers.forEach((f, i) => {
      const age = (completedTimer - i * 0.3);
      if (age < 3) {
        const alpha = Math.min(1, age) * (1 - Math.max(0, (age - 1.5) / 1.5));
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.scale(age * 5, age * 5);
        ctx.rotate(f.rotation + t * f.rotSpeed);
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${f.baseHue}, 90%, 80%, ${alpha * 0.3})`;
        ctx.fill();
        ctx.restore();
      }
    });
    
    // Draw completion text
    if (completedTimer > 0.5) {
      const textAlpha = Math.min(1, (completedTimer - 0.5) * 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // Title
      ctx.font = 'bold 36px "Segoe UI", sans-serif';
      ctx.fillStyle = `rgba(255, 250, 220, ${textAlpha * 0.9})`;
      ctx.shadowColor = `rgba(255, 240, 180, ${textAlpha * 0.5})`;
      ctx.shadowBlur = 20;
      ctx.fillText('✦ Garden Awakened ✦', W / 2, H * 0.35);
      ctx.shadowBlur = 0;
      
      // Subtitle
      ctx.font = '18px "Segoe UI", sans-serif';
      ctx.fillStyle = `rgba(200, 220, 255, ${textAlpha * 0.7})`;
      ctx.fillText('All magnetic pulses have been gathered', W / 2, H * 0.43);
      ctx.fillText('The garden blooms once more.', W / 2, H * 0.48);
      
      // Restart instruction
      if (completedTimer > 1.5) {
        const instrAlpha = Math.min(1, (completedTimer - 1.5) * 2);
        const blink = 0.5 + 0.5 * Math.sin(completedTimer * 4);
        ctx.font = '14px "Segoe UI", sans-serif';
        ctx.fillStyle = `rgba(180, 200, 240, ${instrAlpha * blink * 0.8})`;
        ctx.fillText('Click ✦ Restart ✦ to fly again', W / 2, H * 0.56);
      }
    }
  }
  
  // Initial screen
  if (gameState === 'initial') {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    const titleAlpha = 0.5 + 0.3 * Math.sin(t * 1.5);
    ctx.font = 'bold 32px "Segoe UI", sans-serif';
    ctx.fillStyle = `rgba(220, 230, 255, ${titleAlpha})`;
    ctx.shadowColor = 'rgba(150, 180, 255, 0.4)';
    ctx.shadowBlur = 15;
    ctx.fillText('Magnetic Moth', W / 2, H * 0.35);
    ctx.shadowBlur = 0;
    
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(180, 200, 230, 0.6)';
    ctx.fillText('Guide the moth to collect magnetic pulses', W / 2, H * 0.44);
    ctx.fillText('Move your mouse to lead the flight', W / 2, H * 0.50);
    
    // Pulsing click instruction
    const instrGlow = 0.4 + 0.3 * Math.sin(t * 3);
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillStyle = `rgba(200, 220, 255, ${instrGlow})`;
    ctx.fillText('Click anywhere to begin flight', W / 2, H * 0.60);
  }
}

// --- Main Loop ---
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(0.033, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  const t = timestamp / 1000;
  
  if (gameState === 'playing') {
    gameTime += dt;
    updateMoth(dt);
    checkFlowerCollisions();
    
    // Check timeout (90 seconds)
    if (gameTime > 90) {
      // Time runs out
      gameState = 'gameover';
      restartBtn.style.display = 'block';
      updateScoreDisplay();
      
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 30px "Segoe UI", sans-serif';
      ctx.fillStyle = 'rgba(255, 200, 200, 0.8)';
      ctx.shadowColor = 'rgba(255, 150, 150, 0.4)';
      ctx.shadowBlur = 15;
      ctx.fillText('Time Has Passed', W / 2, H * 0.35);
      ctx.shadowBlur = 0;
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillStyle = 'rgba(200, 210, 230, 0.7)';
      ctx.fillText(`${collected} / ${TARGET} pulses collected`, W / 2, H * 0.44);
    }
  }
  
  // Update animations
  flowerPulses.forEach(f => {
    if (f.collected) {
      f.collectedAnim = Math.min(1, f.collectedAnim + dt * 2);
    }
  });
  
  glowIntensity = Math.max(0, glowIntensity - dt * 0.8);
  shakeAmount = Math.max(0, shakeAmount - dt * 15);
  
  if (gameState === 'completed') {
    completedTimer += dt;
  }
  
  updateParticles(dt);
  
  // --- Render ---
  ctx.save();
  
  // Screen shake
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount * 2,
      (Math.random() - 0.5) * shakeAmount * 2
    );
  }
  
  drawBackground(t);
  drawStars(t);
  drawAmbientParticles();
  
  // Draw flowers
  flowerPulses.forEach(f => drawFlower(f, t));
  
  // Draw particles
  drawParticles();
  
  // Draw moth
  if (gameState !== 'initial') {
    drawMoth(t);
  }
  
  // Draw screen effects (text, overlays)
  drawScreenEffects(t);
  
  ctx.restore();
  
  requestAnimationFrame(gameLoop);
}

// --- Input ---
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
  
  if (gameState === 'playing') {
    hoverTimer += 0.016;
    if (hoverTimer > 0.5) {
      hoverTimer = 0;
      if (Math.random() < 0.3) {
        playHoverSound();
      }
    }
  }
});

canvas.addEventListener('click', (e) => {
  if (gameState === 'initial') {
    startGame();
  } else if (gameState === 'completed' || gameState === 'gameover') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;
    
    // Check restart button area
    const btnX = W / 2 - 60;
    const btnY = H * 0.56 - 15;
    const btnW = 120;
    const btnH = 30;
    
    if (clickX >= btnX && clickX <= btnX + btnW && clickY >= btnY && clickY <= btnY + btnH) {
      playRestartSound();
      resetGame();
    }
  }
});

restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  playRestartSound();
  resetGame();
});

// --- FactoryX Evidence API ---
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: gameState === 'initial' ? 'initial' : (gameState === 'completed' ? 'completed' : 'playing'),
    progress: collected,
    target: TARGET,
    completed: gameState === 'completed',
    restart_count: restartCount
  };
};

// --- Start ---
resetGame();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
