<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
:root {
--bg: #08090a;
--panel: #111316;
--border: #2a2d33;
--accent: #00ff9d;
--accent-dim: #005533;
--text: #e0e6ed;
--text-dim: #6b7c94;
--danger: #ff4f5b;
--gold: #ffd700;
}
body {
margin: 0; padding: 0;
width: 100vw; height: 100vh;
background: var(--bg);
font-family: 'Courier New', Courier, monospace;
color: var(--text);
overflow: hidden;
user-select: none;
-webkit-user-select: none;
cursor: crosshair;
}
#game-container {
position: relative;
width: 100%; height: 100%;
display: flex;
justify-content: center;
align-items: center;
}
canvas {
display: block;
background: var(--bg);
cursor: crosshair;
}
#ui-layer {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 20px;
box-sizing: border-box;
}
#top-bar {
display: flex;
justify-content: space-between;
align-items: center;
width: calc(100% - 40px);
margin: 0 auto;
}
#title {
font-size: 16px;
font-weight: bold;
letter-spacing: 2px;
color: var(--accent);
text-shadow: 0 0 8px var(--accent-dim);
}
#progress-container {
width: 200px;
height: 8px;
background: var(--border);
border-radius: 4px;
overflow: hidden;
position: relative;
}
#progress-fill {
height: 100%;
width: 0%;
background: linear-gradient(90deg, var(--accent-dim), var(--accent));
transition: width 0.3s ease-out;
box-shadow: 0 0 6px var(--accent);
}
#restart-btn {
background: transparent;
border: 1px solid var(--border);
color: var(--text-dim);
padding: 8px 16px;
border-radius: 4px;
cursor: pointer;
font-family: inherit;
font-size: 12px;
transition: all 0.2s;
text-transform: uppercase;
letter-spacing: 1px;
}
#restart-btn:hover {
border-color: var(--accent);
color: var(--accent);
box-shadow: 0 0 8px var(--accent-dim);
}
#message {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
text-align: center;
opacity: 0;
transition: opacity 0.5s ease;
pointer-events: auto;
cursor: pointer;
}
#message.visible {
opacity: 1;
}
#message h1 {
font-size: 32px;
color: var(--accent);
margin-bottom: 10px;
text-shadow: 0 0 20px var(--accent-dim);
}
#message p {
font-size: 14px;
color: var(--text-dim);
margin-top: 8px;
}
#scanlines {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
background: linear-gradient(
to bottom,
rgba(255,255,255,0.03) 50%,
transparent 50%
);
background-size: 100% 4px;
pointer-events: none;
opacity: 0.5;
}
#timeout-timer {
position: absolute;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
font-size: 14px;
color: var(--danger);
}
</style>
</head>
<body>
<div id="game-container">
<canvas id="game-canvas"></canvas>
<div id="scanlines"></div>
<div id="ui-layer">
<div id="top-bar">
<div id="title">SIGNAL GARDEN</div>
<div id="progress-container">
<div id="progress-fill"></div>
</div>
<button id="restart-btn">RESTART</button>
</div>
<div id="message" class="visible">
<h1 id="msg-title">TUNE THE SIGNAL</h1>
<p id="msg-sub">Click then drag the dial to match the signals</p>
</div>
<div id="timeout-timer"></div>
</div>
</div>
<script>
/**
 * SIGNAL GARDEN - A 60-90 second one-screen game
 * Creative intent: This should feel like coaxing a strange electronic plant from soil by tuning signals on an analog dial, culminating in a vibrant bloom with music.
 */

// --- Constants
const SIGNALS = [0.2, 0.4, 0.6, 0.8]; // Normalized dial positions
const SIGNAL_WINDOW = 0.08; // How large is the catch zone
const DURATION_MS = 75000; // 75 seconds total

// --- State
const state = {
  phase: 'initial', // initial, playing, payoff, completed, timeout
  progress: 0,
  target: 1.0,
  completed: false,
  restartCount: 0,
  plant: {
    growProgress: 0,
    bloomCount: 0,
    bloomed: false,
    signalsCaught: [false, false, false, false]
  },
  dial: {
    value: 0, // 0-1
    isDragging: false,
    isHovering: false
  },
  startTime: 0,
  elapsed: 0,
  remaining: DURATION_MS
};

// --- Audio Engine (Web Audio API)
const Audio = {
  ctx: null,
  
  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
  },
  
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  
  // Tonal sounds for signal catches
  playSignal(index, caught) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    
    if (caught) {
      // Pleasant ascending tones
      const baseFreq = 400 + (index * 100);
      [0, 0.1, 0.2].forEach((offset, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = baseFreq + (i * 50);
        gain.gain.setValueAtTime(0, now + offset);
        gain.gain.linearRampToValueAtTime(0.3, now + offset + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, now + offset + 0.4);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now + offset);
        osc.stop(now + offset + 0.4);
      });
    } else {
      // Miss sound - low buzz
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(80, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    }
  },
  
  // Ambient growl
  playAmbience() {
    if (!this.ctx) return;
    this.ambient = this.ctx.createOscillator();
    this.ambGain = this.ctx.createGain();
    this.ambient.type = 'triangle';
    this.ambient.frequency.value = 60;
    this.ambGain.gain.value = 0.05;
    this.ambient.connect(this.ambGain);
    this.ambGain.connect(this.ctx.destination);
    this.ambient.start();
  },
  
  // Bloom chord - rich, satisfying
  playBloom() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const chords = [261.6, 329.6, 392.0, 523.3, 659.3];
    
    chords.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const osc2 = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.type = 'sine';
      osc2.type = 'triangle';
      osc.frequency.value = freq;
      osc2.frequency.value = freq * 1.002; // Slight detune for shimmer
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.08, now + 1);
      gain.gain.linearRampToValueAtTime(0.06, now + 3);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 6);
      
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(this.ctx.destination);
      
      osc.start(now);
      osc2.start(now);
      osc.stop(now + 6);
      osc2.stop(now + 6);
    });
  },
  
  // Failure sound - descending tones
  playFail() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    [200, 150, 100, 50].forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, now + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.5);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now + i * 0.2);
      osc.stop(now + i * 0.2 + 0.5);
    });
  }
};

// --- Visual Engine ---
const Canvas = {
  el: null,
  ctx: null,
  width: 0,
  height: 0,
  centerX: 0,
  centerY: 0,
  particles: [],
  stars: [],
  
  init() {
    this.el = document.getElementById('game-canvas');
    this.ctx = this.el.getContext('2d');
    this.resize();
    this.initStars();
    
    const resize = () => {
      const container = document.getElementById('game-container');
      this.width = container.clientWidth;
      this.height = container.clientHeight;
      this.el.width = this.width * devicePixelRatio;
      this.el.height = this.height * devicePixelRatio;
      this.ctx.scale(devicePixelRatio, devicePixelRatio);
      this.centerX = this.width / 2;
      this.centerY = this.height / 2 + 40;
    };
    
    window.addEventListener('resize', resize);
    resize();
  },
  
  initStars() {
    for (let i = 0; i < 60; i++) {
      this.stars.push({
        x: Math.random() * this.width,
        y: Math.random() * (this.height - 100),
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
        pulse: Math.random() * 0.02 + 0.005
      });
    }
  },
  
  // Spawn burst of particles
  spawnBurst(x, y, count, r, g, b) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const speed = Math.random() * 4 + 2;
      Canvas.particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 1,
        decay: Math.random() * 0.02 + 0.01,
        size: Math.random() * 4 + 2,
        r, g, b
      });
    }
  },
  
  updateParticles() {
    for (let i = Canvas.particles.length - 1; i >= 0; i--) {
      const p = Canvas.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05; // gravity
      p.life -= p.decay;
      
      if (p.life <= 0) {
        Canvas.particles.splice(i, 1);
      }
    }
  },
  
  drawParticles() {
    Canvas.particles.forEach(p => {
      Canvas.ctx.globalAlpha = p.life;
      Canvas.ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
      Canvas.ctx.beginPath();
      Canvas.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      Canvas.ctx.fill();
    });
    Canvas.ctx.globalAlpha = 1;
  },
  
  drawBackground(time) {
    // Night sky gradient
    const grad = Canvas.ctx.createLinearGradient(0, 0, 0, Canvas.height);
    if (state.plant.bloomed) {
      grad.addColorStop(0, '#0a1a3a');
      grad.addColorStop(0.6, '#142844');
      grad.addColorStop(1, '#1a3a2a');
    } else {
      grad.addColorStop(0, '#08090a');
      grad.addColorStop(0.6, '#0d1117');
      grad.addColorStop(1, '#111820');
    }
    Canvas.ctx.fillStyle = grad;
    Canvas.ctx.fillRect(0, 0, Canvas.width, Canvas.height);
    
    // Stars with pulse
    Canvas.stars.forEach(s => {
      s.alpha += s.pulse;
      if (s.alpha > 0.8) s.pulse = -Math.abs(s.pulse);
      if (s.alpha < 0.1) s.pulse = Math.abs(s.pulse);
      
      Canvas.ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
      Canvas.ctx.beginPath();
      Canvas.ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      Canvas.ctx.fill();
    });
    
    // Ground
    const groundY = Canvas.centerY;
    const groundGrad = Canvas.ctx.createLinearGradient(0, groundY, 0, Canvas.height);
    groundGrad.addColorStop(0, state.plant.bloomed ? '#1a3a2a' : '#111815');
    groundGrad.addColorStop(1, '#0a0f08');
    Canvas.ctx.fillStyle = groundGrad;
    Canvas.ctx.fillRect(0, groundY, Canvas.width, Canvas.height - groundY);
    
    // Grass
    Canvas.ctx.strokeStyle = state.plant.bloomed ? '#2a5a3a' : '#1a3a2a';
    Canvas.ctx.lineWidth = 1.5;
    for (let i = 0; i < 40; i++) {
      const x = (Canvas.width / 40) * i + 10;
      const sway = Math.sin(time * 0.001 + i * 0.3) * 4;
      Canvas.ctx.beginPath();
      Canvas.ctx.moveTo(x, groundY);
      Canvas.ctx.quadraticCurveTo(x + sway, groundY - 12, x + sway * 1.5, groundY - 18);
      Canvas.ctx.stroke();
    }
  },
  
  drawDial(time) {
    const { centerX, centerY } = Canvas;
    const radius = 75;
    const dialVal = state.dial.value;
    
    // Outer ring (background)
    Canvas.ctx.strokeStyle = '#1a2030';
    Canvas.ctx.lineWidth = 12;
    Canvas.ctx.beginPath();
    Canvas.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    Canvas.ctx.stroke();
    
    // Progress track
    Canvas.ctx.strokeStyle = '#004433';
    Canvas.ctx.lineWidth = 8;
    Canvas.ctx.lineCap = 'round';
    Canvas.ctx.beginPath();
    Canvas.ctx.arc(centerX, centerY, radius, -Math.PI/2, -Math.PI/2 + dialVal * Math.PI * 2);
    Canvas.ctx.stroke();
    
    // Signal windows (4 positions)
    SIGNALS.forEach((sig, i) => {
      const startAngle = -Math.PI/2 + sig * Math.PI * 2 - SIGNAL_WINDOW * Math.PI * 2;
      const endAngle = -Math.PI/2 + sig * Math.PI * 2 + SIGNAL_WINDOW * Math.PI * 2;
      const caught = state.plant.signalsCaught[i];
      
      Canvas.ctx.strokeStyle = caught ? '#00aa66' : '#331122';
      Canvas.ctx.lineWidth = caught ? 14 : 10;
      Canvas.ctx.beginPath();
      Canvas.ctx.arc(centerX, centerY, radius, startAngle, endAngle);
      Canvas.ctx.stroke();
      
      // Signal number
      const labelAngle = -Math.PI/2 + sig * Math.PI * 2;
      const lx = centerX + Math.cos(labelAngle) * (radius - 18);
      const ly = centerY + Math.sin(labelAngle) * (radius - 18);
      Canvas.ctx.fillStyle = caught ? '#00ffaa' : '#ff5555';
      Canvas.ctx.font = '11px Courier New';
      Canvas.ctx.textAlign = 'center';
      Canvas.ctx.textBaseline = 'middle';
      Canvas.ctx.fillText(`SIG${i+1}`, lx, ly);
    });
    
    // Highlight current target signal
    if (state.phase === 'playing') {
      const currentIdx = state.plant.bloomCount;
      if (currentIdx < SIGNALS.length) {
        const sig = SIGNALS[currentIdx];
        const angle = -Math.PI/2 + sig * Math.PI * 2;
        const lx = centerX + Math.cos(angle) * (radius + 15);
        const ly = centerY + Math.sin(angle) * (radius + 15);
        
        // Pulsing indicator
        const pulse = Math.sin(time * 0.005) * 3 + 3;
        Canvas.ctx.fillStyle = '#00cc88';
        Canvas ctx.beginPath();
        Canvas.ctx.arc(lx, ly, pulse, 0, Math.PI * 2);
        Canvas.ctx.fill();
        
        // Arrow pointing to target
        Canvas.ctx.fillStyle = '#00ff9d';
        Canvas.ctx.beginPath();
        Canvas.ctx.moveTo(lx, ly - pulse - 8);
        Canvas.ctx.lineTo(lx - 5, ly - pulse);
        Canvas.ctx.lineTo(lx + 5, ly - pulse);
        Canvas.ctx.fill();
      }
    }
    
    // Dial knob
    const knobAngle = -Math.PI/2 + dialVal * Math.PI * 2;
    const knobX = centerX + Math.cos(knobAngle) * radius;
    const knobY = centerY + Math.sin(knobAngle) * radius;
    
    // Dial glow
    Canvas.ctx.shadowColor = '#00ff9d';
    Canvas.ctx.shadowBlur = 20;
    Canvas.ctx.fillStyle = '#00ff9d';
    Canvas.ctx.beginPath();
    Canvas.ctx.arc(knobX, knobY, 10, 0, Math.PI * 2);
    Canvas.ctx.fill();
    Canvas.ctx.shadowBlur = 0;
    
    // Dial core
    Canvas.ctx.fillStyle = '#003322';
    Canvas.ctx.beginPath();
    Canvas.ctx.arc(knobX, knobY, 6, 0, Math.PI * 2);
    Canvas.ctx.fill();
    
    // Dial highlight dot
    Canvas.ctx.fillStyle = '#ffffff';
    Canvas.ctx.beginPath();
    Canvas.ctx.arc(knobX, knobY, 2, 0, Math.PI * 2);
    Canvas.ctx.fill();
  },
  
  drawPlant(time) {
    const { centerX, centerY } = Canvas;
    const plant = state.plant;
    
    Canvas.ctx.save();
    Canvas.ctx.translate(centerX, centerY);
    
    // Stem - curves and grows
    const stemHeight = plant.growProgress * 180;
    const sway = Math.sin(time * 0.001) * 5;
    
    Canvas.ctx.strokeStyle = plant.bloomed ? '#00dd88' : '#008855';
    Canvas.ctx.lineWidth = 3 + plant.growProgress * 4;
    Canvas.ctx.lineCap = 'round';
    Canvas.ctx.shadowColor = plant.bloomed ? '#00ffaa' : '#006633';
    Canvas.ctx.shadowBlur = 8;
    
    Canvas.ctx.beginPath();
    Canvas.ctx.moveTo(0, 0);
    Canvas.ctx.bezierCurveTo(
      sway, -stemHeight * 0.3,
      -sway, -stemHeight * 0.6,
      sway * 0.5, -stemHeight
    );
    Canvas.ctx.stroke();
    Canvas.ctx.shadowBlur = 0;
    
    // Leaves
    if (plant.growProgress > 0.15) {
      const leafCount = Math.floor(plant.growProgress * 5);
      for (let i = 0; i < leafCount; i++) {
        const frac = 0.25 + (i / leafCount) * 0.55;
        const lx = sway * 0.5 * frac;
        const ly = -stemHeight * frac;
        
        Canvas.ctx.save();
        Canvas.ctx.translate(lx, ly);
        Canvas.ctx.rotate(Math.sin(time * 0.002 + i) * 0.3 + (i % 2 === 0 ? 0.6 : -0.6));
        
        const leafH = 12 + plant.growProgress * 10;
        const leafW = 6 + plant.growProgress * 6;
        
        Canvas.ctx.fillStyle = '#009966';
        Canvas.ctx.beginPath();
        Canvas.ctx.ellipse(0, -leafH * 0.5, leafW, leafH * 0.4, 0, 0, Math.PI * 2);
        Canvas.ctx.fill();
        
        Canvas.ctx.strokeStyle = '#006644';
        Canvas.ctx.lineWidth = 1;
        Canvas.ctx.beginPath();
        Canvas.ctx.moveTo(0, 0);
        Canvas.ctx.lineTo(0, -leafH);
        Canvas.ctx.stroke();
        
        Canvas.ctx.restore();
      }
    }
    
    // Bloom/Flowers
    if (plant.growProgress > 0.65 || plant.bloomed) {
      const topX = sway * 0.5;
      const topY = -stemHeight;
      
      if (plant.bloomed) {
        // Full bloom - large, colorful, pulsating
        const bloomR = 30 + Math.sin(time * 0.003) * 8;
        
        // Glow
        const glow = Canvas.ctx.createRadialGradient(topX, topY, 0, topX, topY, bloomR * 2);
        glow.addColorStop(0, 'rgba(255,255,150,0.4)');
        glow.addColorStop(0.5, 'rgba(255,200,100,0.1)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        Canvas.ctx.fillStyle = glow;
        Canvas.ctx.beginPath();
        Canvas.ctx.arc(topX, topY, bloomR * 2, 0, Math.PI * 2);
        Canvas.ctx.fill();
        
        // Petals
        Canvas.ctx.shadowColor = '#ffd700';
        Canvas.ctx.shadowBlur = 15;
        
        for (let i = 0; i < 10; i++) {
          const angle = (i / 10) * Math.PI * 2 + time * 0.0005;
          const px = topX + Math.cos(angle) * bloomR * 0.6;
          const py = topY + Math.sin(angle) * bloomR * 0.6;
          
          Canvas.ctx.fillStyle = `hsl(${100 + i * 20}, 70%, 60%)`;
          Canvas.ctx.beginPath();
          Canvas.ctx.ellipse(px, py, bloomR * 0.4, bloomR * 0.2, angle, 0, Math.PI * 2);
          Canvas.ctx.fill();
        }
        
        // Center
        Canvas.ctx.fillStyle = '#ffe744';
        Canvas.ctx.shadowBlur = 20;
        Canvas.ctx.beginPath();
        Canvas.ctx.arc(topX, topY, bloomR * 0.3, 0, Math.PI * 2);
        Canvas.ctx.fill();
        
        Canvas.ctx.shadowBlur = 0;
        
      } else {
        // Bud
        const budR = 8 + plant.growProgress * 12;
        Canvas.ctx.fillStyle = '#00bb77';
        Canvas.ctx.shadowColor = '#00ff99';
        Canvas.ctx.shadowBlur = 10;
        Canvas.ctx.beginPath();
        Canvas.ctx.arc(topX, topY, budR, 0, Math.PI * 2);
        Canvas.ctx.fill();
        Canvas.ctx.shadowBlur = 0;
      }
    }
    
    Canvas.ctx.restore();
    
    // Emit particles when growing
    if (plant.growProgress > 0.5 && Math.random() < 0.03) {
      Canvas.spawnBurst(
        centerX + sway * 0.5,
        centerY - stemHeight,
        2,
        0,
        255,
        150
      );
    }
  },
  
  draw() {
    const time = Date.now();
    
    Canvas.drawBackground(time);
    Canvas.drawPlant(time);
    Canvas.drawDial(time);
    Canvas.drawParticles();
    Canvas.updateParticles();
  },
  
  // Check if point is in dial
  dialHitTest(x, y) {
    const dx = x - Canvas.centerX;
    const dy = y - Canvas.centerY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < 90;
  },
  
  // Get dial value from mouse position
  getDialValue(x, y) {
    const dx = x - Canvas.centerX;
    const dy = y - Canvas.centerY;
    let angle = Math.atan2(dy, dx);
    angle += Math.PI / 2; // Normalize so 12 o'clock = 0
    if (angle < 0) angle += Math.PI * 2;
    return angle / (Math.PI * 2);
  }
};

// --- Game Logic ---
function startGame() {
  Audio.init();
  Audio.resume();
  Audio.playAmbience();
  
  state.phase = 'playing';
  state.startTime = Date.now();
  state.plant.growProgress = 0;
  state.plant.bloomCount = 0;
  state.plant.signalsCaught = [false, false, false, false];
  state.plant.bloomed = false;
  state.dial.value = 0;
  state.elapsed = 0;
  state.remaining = DURATION_MS;
  
  document.getElementById('message').classList.remove('visible');
  updateProgressUI();
}

function checkSignalHit(dialVal) {
  if (state.phase !== 'playing') return;
  
  const idx = state.plant.bloomCount;
  if (idx >= SIGNALS.length) return;
  
  const sigPos = SIGNALS[idx];
  let diff = Math.abs(dialVal - sigPos);
  if (diff > 0.5) diff = 1 - diff; // Account for circular dial
  
  if (diff < SIGNAL_WINDOW) {
    // SUCCESS - Signal caught!
    state.plant.signalsCaught[idx] = true;
    state.plant.bloomCount++;
    
    const caught = true;
    Audio.playSignal(idx, caught);
    
    // Particles
    Canvas.spawnBurst(Canvas.centerX, Canvas.centerY, 30, 0, 255, 150);
    Canvas.spawnBurst(Canvas.centerX, Canvas.centerY, 20, 255, 200, 100);
    
    // Plant growth
    state.plant.growProgress = 0.1 + (state.plant.bloomCount / SIGNALS.length) * 0.85;
    
    // Progress
    state.progress = (state.plant.bloomCount / SIGNALS.length) * state.target;
    updateProgressUI();
    
    // Check for bloom
    if (state.plant.bloomCount >= SIGNALS.length) {
      triggerBloom();
    }
  }
}

function triggerBloom() {
  state.plant.bloomed = true;
  state.plant.growProgress = 1;
  state.progress = state.target;
  state.phase = 'payoff';
  
  // Audio
  Audio.playBloom();
  
  // Massive particle burst
  Canvas.spawnBurst(Canvas.centerX, Canvas.centerY - 200, 80, 255, 255, 100);
  Canvas.spawnBurst(Canvas.centerX, Canvas.centerY - 200, 60, 0, 255, 150);
  Canvas.spawnBurst(Canvas.centerX, Canvas.centerY - 200, 40, 255, 150, 0);
  
  // Show completion message after delay
  setTimeout(() => {
    state.phase = 'completed';
    const msg = document.getElementById('message');
    document.getElementById('msg-title').textContent = '✦ GARDEN BLOOMED ✦';
    document.getElementById('msg-title').style.color = '#ffd700';
    document.getElementById('msg-title').style.textShadow = '0 0 30px #ffd700';
    document.getElementById('msg-sub').textContent = 'All signals harmonized. Your garden has bloomed.';
    msg.classList.add('visible');
  }, 2500);
}

function triggerTimeout() {
  if (state.phase === 'completed' || state.phase === 'payoff') return;
  
  state.phase = 'timeout';
  Audio.playFail();
  
  const msg = document.getElementById('message');
  document.getElementById('msg-title').textContent = 'SIGNAL LOST';
  document.getElementById('msg-title').style.color = '#ff4f5b';
  document.getElementById('msg-title').style.textShadow = '0 0 20px #ff4f5b';
  document.getElementById('msg-sub').textContent = `Only ${state.plant.bloomCount}/${SIGNALS.length} signals tuned. Grow again?`;
  msg.classList.add('visible');
}

function restart() {
  state.restartCount++;
  state.phase = 'initial';
  state.plant.bloomed = false;
  state.plant.growProgress = 0;
  state.progress = 0;
  state.plant.signalsCaught = [false, false, false, false];
  state.plant.bloomCount = 0;
  
  // Reset dial
  state.dial.value = 0;
  
  // Reset UI
  document.getElementById('message').classList.add('visible');
  document.getElementById('msg-title').textContent = 'TUNE THE SIGNAL';
  document.getElementById('msg-title').style.color = '#00ff9d';
  document.getElementById('msg-title').style.textShadow = '0 0 20px #005533';
  document.getElementById('msg-sub').textContent = 'Click and drag the dial to match the signals';
  
  updateProgressUI();
}

function updateProgressUI() {
  const fill = document.getElementById('progress-fill');
  const pct = (state.progress / state.target) * 100;
  fill.style.width = pct + '%';
}

function render() {
  Canvas.draw();
  requestAnimationFrame(render);
}

// --- Event Handlers ---
function getPos(e) {
  const rect = Canvas.el.getBoundingClientRect();
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

Canvas.el.addEventListener('mousedown', (e) => {
  if (state.phase === 'initial') {
    startGame();
    return;
  }
  if (state.phase === 'completed' || state.phase === 'timeout' || state.phase === 'payoff') {
    restart();
    return;
  }
  
  const pos = getPos(e);
  if (Canvas.dialHitTest(pos.x, pos.y)) {
    state.dial.isDragging = true;
    Audio.resume();
  }
});

Canvas.el.addEventListener('mousemove', (e) => {
  const pos = getPos(e);
  
  if (state.dial.isDragging) {
    state.dial.value = Canvas.getDialValue(pos.x, pos.y);
    checkSignalHit(state.dial.value);
  } else {
    state.dial.isHovering = Canvas.dialHitTest(pos.x, pos.y);
    Canvas.el.style.cursor = state.dial.isHovering ? 'grab' : 'crosshair';
  }
});

Canvas.el.addEventListener('mouseup', () => {
  state.dial.isDragging = false;
  state.dial.isHovering = false;
  Canvas.el.style.cursor = 'crosshair';
});

Canvas.el.addEventListener('mouseleave', () => {
  state.dial.isDragging = false;
  state.dial.isHovering = false;
});

Canvas.el.addEventListener('touchstart', (e) => {
  e.preventDefault();
  Canvas.el.dispatchEvent(new MouseEvent('mousedown', {
    view: window,
    clientX: e.touches[0].clientX,
    clientY: e.touches[0].clientY
  }));
}, { passive: false });

Canvas.el.addEventListener('touchmove', (e) => {
  e.preventDefault();
  Canvas.el.dispatchEvent(new MouseEvent('mousemove', {
    view: window,
    clientX: e.touches[0].clientX,
    clientY: e.touches[0].clientY
  }));
}, { passive: false });

Canvas.el.addEventListener('touchend', (e) => {
  e.preventDefault();
  Canvas.el.dispatchEvent(new MouseEvent('mouseup'));
});

// Restart button
document.getElementById('restart-btn').addEventListener('click', () => {
  restart();
});

// Message click to restart
document.getElementById('message').addEventListener('click', () => {
  if (state.phase === 'initial') {
    startGame();
  } else if (state.phase === 'completed' || state.phase === 'timeout') {
    restart();
  }
});

// --- FactoryX Evidence ---
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: state.phase,
    progress: state.progress,
    target: state.target,
    completed: state.phase === 'completed',
    restart_count: state.restartCount
  };
};

// --- Timer ---
function updateTimer() {
  if (state.phase === 'playing') {
    state.elapsed = Date.now() - state.startTime;
    state.remaining = DURATION_MS - state.elapsed;
    
    const t = document.getElementById('timeout-timer');
    if (state.remaining > 0) {
      const secs = Math.ceil(state.remaining / 1000);
      t.textContent = `Time: ${secs}s remaining`;
      t.style.color = secs > 15 ? '#6b7c94' : '#ff4f5b';
    } else {
      t.textContent = '';
      triggerTimeout();
    }
  } else {
    document.getElementById('timeout-timer').textContent = '';
  }
  setTimeout(updateTimer, 1000);
}

// --- Init ---
Canvas.init();
render();
updateTimer();

</script>
</body>
</html>
