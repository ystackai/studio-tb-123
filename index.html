<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Garden</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --ui-text: #c2eacc;
            --accent: #ff79c6;
            --accent-glow: #ff79c680;
            --success: #50fa7b;
            --signal-core: #8be9fd;
            --dial-bg: #282a36;
            --dial-ring: #44475a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--ui-text);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: radial-gradient(circle at center, #1e1f29 0%, #000000 100%);
            border: 2px solid var(--dial-ring);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .score-box {
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--signal-core);
        }

        .instruction {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            transition: opacity 0.5s;
            z-index: 10;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            color: var(--success);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--success);
            text-align: center;
        }

        p.story {
            max-width: 400px;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 30px;
            color: #bd93f9;
        }

        button {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Feedback particles handled in canvas */
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="score-box">FREQ: <span id="score">0</span>%</div>
            <div class="instruction" id="phase-text">Initiate Signal</div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="title-text">SIGNAL GARDEN</h1>
        <p class="story" id="story-text">
            The receiver is silent. The garden is dormant.<br><br>
            Click the points on the tuning dial to inject signals.<br>
            Match the rhythm to grow the electronic bloom.
        </p>
        <button id="start-btn">TUNE SIGNAL</button>
    </div>
</div>

<script>
/**
 * SIGNAL GARDEN
 * A 60-second tactile signal tuning game.
 */

// --- Configuration ---
const CONFIG = {
    dialRadius: 120,
    dialCenterX: 0, // Calculated at runtime
    dialCenterY: 0,
    signalDuration: 1200, // ms
    signalSpacing: 1500, // ms between signals
    totalSignals: 6,
    colors: {
        bad: '#ff5555',
        good: '#50fa7b',
        perfect: '#ffb86c',
        signal: '#8be9fd'
    }
};

// --- State ---
const STATE = {
    phase: 'START', // START, PLAYING, END
    score: 0,
    signals: [],
    currentSignalIndex: 0,
    startTime: 0,
    width: 0,
    height: 0,
    centerX: 0,
    centerY: 0,
    particles: []
};

// --- Audio Context ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// Audio Synthesis Engine
const AUDIO = {
    playTone: (freq, duration, type = 'sine', vol = 0.1) => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    },
    
    playHit: (success) => {
        if (success) {
            // Triumphant major chord arpeggio
            AUDIO.playTone(523.25, 0.5, 'sine', 0.1); // C5
            setTimeout(() => AUDIO.playTone(659.25, 0.5, 'sine', 0.1), 50); // E5
            setTimeout(() => AUDIO.playTone(783.99, 0.8, 'sine', 0.1), 100); // G5
        } else {
            // Discordant low buzz
            AUDIO.playTone(150, 0.3, 'sawtooth', 0.05);
            AUDIO.playTone(140, 0.3, 'sawtooth', 0.05);
        }
    },

    playWin: () => {
        // Cascading arpeggio upwards
        const notes = [261.6, 329.6, 392.0, 523.3, 659.3, 784.0, 1046.5];
        notes.forEach((note, i) => {
            setTimeout(() => AUDIO.playTone(note, 1.5, 'sine', 0.15), i * 100);
        });
        // Noise burst for "bloom"
        setTimeout(() => {
            const bufferSize = audioCtx.sampleRate * 1.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }, 750);
    }
};

// --- Drawing Helpers ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const container = document.getElementById('game-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    STATE.width = canvas.width;
    STATE.height = canvas.height;
    STATE.centerX = STATE.width / 2;
    STATE.centerY = STATE.height / 2;
    CONFIG.dialCenterX = STATE.centerX;
    CONFIG.dialCenterY = STATE.centerY + 20;
}

// --- Game Logic ---

function startGame() {
    initAudio();
    STATE.phase = 'PLAYING';
    STATE.score = 0;
    STATE.currentSignalIndex = 0;
    STATE.signals = [];
    STATE.particles = [];
    STATE.startTime = performance.now();
    
    // Pre-calculate signal timings
    for (let i = 0; i < CONFIG.totalSignals; i++) {
        STATE.signals.push({
            time: 2000 + (i * CONFIG.signalSpacing),
            angle: (Math.PI / 2) + (Math.random() * Math.PI * 1.5), // Random angle in lower arc
            hit: false,
            missed: false
        });
    }

    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('score').innerText = '0';
    document.getElementById('phase-text').innerText = `SIGNAL ${1} / ${CONFIG.totalSignals}`;
    
    update();
}

function getAngleFromPoint(mx, my) {
    const dx = mx - CONFIG.dialCenterX;
    const dy = my - CONFIG.dialCenterY;
    return Math.atan2(dy, dx);
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 20; i++) {
        STATE.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color: color
        });
    }
}

function handleInput(mx, my) {
    if (STATE.phase !== 'PLAYING') return;

    const now = performance.now() - STATE.startTime;
    
    // Find the current active signal
    // We look for the first signal that hasn't been hit/missed yet
    const currentSignal = STATE.signals.find(s => !s.hit && !s.missed);

    if (!currentSignal) return;

    // Check timing
    const timeDiff = Math.abs(now - currentSignal.time);
    
    if (timeDiff < CONFIG.signalDuration * 0.3) {
        // HIT!
        currentSignal.hit = true;
        STATE.score += 20; // 5 hits = 100%
        document.getElementById('score').innerText = STATE.score;
        
        // Visuals
        const hitX = CONFIG.dialCenterX + Math.cos(currentSignal.angle) * CONFIG.dialRadius;
        const hitY = CONFIG.dialCenterY + Math.sin(currentSignal.angle) * CONFIG.dialRadius;
        createExplosion(hitX, hitY, CONFIG.colors.good);
        
        AUDIO.playHit(true);
        
        // Update next phase text
        const nextIdx = STATE.signals.indexOf(currentSignal) + 1;
        if (nextIdx < CONFIG.totalSignals) {
            document.getElementById('phase-text').innerText = `SIGNAL ${nextIdx + 1} / ${CONFIG.totalSignals}`;
        }
    } else {
        // Miss (clicked too early/too late or wrong target)
        currentSignal.missed = true;
        createExplosion(CONFIG.centerX, CONFIG.centerY, CONFIG.colors.bad);
        AUDIO.playHit(false);
        
        // Visual shake
        const container = document.getElementById('game-container');
        container.style.transform = 'translate(5px, 5px)';
        setTimeout(() => container.style.transform = 'translate(0, 0)', 100);
    }
}

// --- Render Loop ---

function drawPlant(bloomLevel) {
    // Dynamic Plant based on bloom level (0.0 to 1.0)
    ctx.save();
    ctx.translate(STATE.centerX, STATE.centerY - 20);
    
    // Glow
    ctx.shadowBlur = 20 + (bloomLevel * 30);
    ctx.shadowColor = CONFIG.colors.signal;
    
    // Stem
    const stemHeight = 60 + (bloomLevel * 80);
    ctx.strokeStyle = CONFIG.colors.signal;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    // Bezier curve for organic stalk
    ctx.bezierCurveTo(20, -stemHeight/2, -20, -stemHeight/2, 0, -stemHeight);
    ctx.stroke();
    
    // Leaves
    const leaves = Math.floor(bloomLevel * 6) + 1;
    for (let i = 1; i <= leaves; i++) {
        const t = i / (leaves + 1);
        const y = -stemHeight * t;
        const side = (i % 2 === 0) ? 1 : -1;
        const x = 0 + (side * 20 * t);
        
        ctx.fillStyle = i % 2 === 0 ? CONFIG.colors.good : CONFIG.colors.signal;
        ctx.globalAlpha = 0.6 + (bloomLevel * 0.4);
        
        ctx.beginPath();
        ctx.ellipse(x, y, 15 * t, 8 * t, side * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Flower Head
    const headY = -stemHeight;
    const petalCount = Math.floor(5 + (bloomLevel * 10));
    const petalSize = 10 + (bloomLevel * 15);
    
    ctx.globalAlpha = 1;
    ctx.fillStyle = bloomLevel > 0.9 ? '#fff' : CONFIG.colors.accent || '#ff79c6';
    
    if (bloomLevel > 0.1) {
        for (let i = 0; i < petalCount; i++) {
            const angle = (i / petalCount) * Math.PI * 2;
            ctx.save();
            ctx.translate(0, headY);
            ctx.rotate(angle);
            ctx.beginPath();
            // Petal shape
            ctx.scale(petalSize, petalSize * 0.4);
            ctx.arc(0, 0, 1, 0, Math.PI * 2);
            ctx.restore();
            ctx.fill();
        }
        // Center
        ctx.beginPath();
        ctx.arc(0, headY, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
    }

    ctx.restore();
}

function drawDial() {
    const { dialCenterX: cx, dialCenterY: cy, dialRadius: r } = CONFIG;
    
    // Dial background ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI + 0.5, 1.5 * Math.PI);
    ctx.strokeStyle = CONFIG.colors.dial_bg || '#282a36';
    ctx.lineWidth = 10;
    ctx.stroke();

    // The "Signal Window" (Active zone)
    const currentSignal = STATE.signals.find(s => !s.hit && !s.missed);
    
    if (currentSignal && STATE.phase === 'PLAYING') {
        const now = performance.now() - STATE.startTime;
        const timeProgress = Math.max(0, Math.min(1, 1 - (currentTime = now - currentSignal.time) / CONFIG.signalDuration));
        // Simple visualizer: ring pulses when close to signal time
        
        const proximity = 1 - (Math.abs(now - currentSignal.time) / (CONFIG.signalDuration * 0.5));
        if (proximity > 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, currentSignal.angle - 0.5, currentSignal.angle + 0.5);
            ctx.strokeStyle = proximity > 0.7 ? CONFIG.colors.perfect : CONFIG.colors.signal;
            ctx.lineWidth = 15;
            ctx.shadowBlur = 20;
            ctx.shadowColor = CONFIG.colors.signal;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Draw target marker at edge
            const tx = cx + Math.cos(currentSignal.angle) * r;
            const ty = cy + Math.sin(currentSignal.angle) * r;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(tx, ty, 6, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    // Draw completed/signal markers
    STATE.signals.forEach(s => {
        if (s.hit) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, s.angle - 0.3, s.angle + 0.3);
            ctx.strokeStyle = CONFIG.colors.good;
            ctx.lineWidth = 5;
            ctx.stroke();
        } else if (s.missed) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, s.angle - 0.3, s.angle + 0.3);
            ctx.strokeStyle = CONFIG.colors.bad;
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    });
}

function drawParticles() {
    for (let i = STATE.particles.length - 1; i >= 0; i--) {
        const p = STATE.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        
        if (p.life <= 0) {
            STATE.particles.splice(i, 1);
            continue;
        }
        
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// --- Main Loop ---
let lastTime = 0;

function update(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;
    
    ctx.clearRect(0, 0, STATE.width, STATE.height);
    
    const now = performance.now() - STATE.startTime;
    
    if (STATE.phase === 'PLAYING') {
        // Check for missed signals
        let allDone = true;
        STATE.signals.forEach(s => {
            if (!s.hit && !s.missed) {
                if (now > s.time + CONFIG.signalDuration) {
                    s.missed = true;
                    AUDIO.playHit(false);
                    // Shake effect for miss
                }
            } else if (!s.hit && !s.missed) {
                allDone = false;
            } else if (s.hit) {
                allDone = false; // Waiting for animation
            }
        });
        
        // Calculate bloom
        const hitCount = STATE.signals.filter(s => s.hit).length;
        const bloom = hitCount / CONFIG.totalSignals;
        drawPlant(bloom);
        
        // Check End Condition
        if (allDone) {
            STATE.phase = 'END';
            setTimeout(showEndScreen, 1000);
        } else {
             // Keep updating plant to make it grow dynamically
             drawPlant(hitCount / CONFIG.totalSignals);
        }

    } else if (STATE.phase === 'END') {
        // Final Bloom
        drawPlant(STATE.score / 100);
    } else {
        // Idle animation
        const idleBloom = 0.2 + Math.sin(timestamp * 0.001) * 0.05;
        drawPlant(idleBloom);
    }
    
    drawDial();
    drawParticles();
    
    requestAnimationFrame(update);
}

function showEndScreen() {
    const overlay = document.getElementById('overlay');
    const title = document.getElementById('title-text');
    const story = document.getElementById('story-text');
    const btn = document.getElementById('start-btn');
    
    overlay.classList.remove('hidden');
    document.getElementById('phase-text').innerText = '';
    
    if (STATE.score >= 80) {
        title.innerText = "SIGNAL ACQUIRED";
        title.style.color = CONFIG.colors.success;
        title.style.textShadow = `0 0 20px ${CONFIG.colors.success}`;
        story.innerText = "The garden has bloomed with your frequency.\n\nThe electronic organism is now self-sustaining.";
        AUDIO.playWin();
    } else if (STATE.score >= 40) {
        title.innerText = "STATIC INTERFERENCE";
        title.style.color = '#bd93f9';
        story.innerText = "The plant struggled to connect.\n\nA weak signal may eventually grow, but the bloom is incomplete.";
    } else {
        title.innerText = "SIGNAL LOST";
        title.style.color = CONFIG.colors.bad;
        story.innerText = "The frequency was too far off.\n\nThe garden returns to the dark. Try again.";
    }
    
    btn.innerText = "RE-TUNE";
}

// --- Initialization ---

window.addEventListener('resize', resize);
resize();

// Input handling
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    handleInput(x, y);
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); // prevent scrolling
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
    const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
    handleInput(x, y);
}, {passive: false});

document.getElementById('start-btn').addEventListener('click', startGame);

// Start loop
requestAnimationFrame(update);

</script>
</body>
</html>
