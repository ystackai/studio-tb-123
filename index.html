<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Garden</title>
    <style>
        :root {
            --bg: #0a0a12;
            --accent: #4ff0c5; /* Cyan */
            --accent2: #f04fd9; /* Magenta */
            --accent3: #f0c54f; /* Gold */
            --text: #e0e0ff;
            --ui-font: 'Courier New', Courier, monospace;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--ui-font);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vmin;
            height: 100vmin;
            max-width: 800px;
            max-height: 800px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            text-shadow: 0 0 10px rgba(79, 240, 197, 0.5);
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
        }
        #status-display {
            text-align: center;
            font-weight: bold;
            color: var(--accent);
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s;
        }
        #restart-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 1s;
        }
        h1 { font-size: 3rem; margin-bottom: 0; color: var(--accent); }
        h2 { font-size: 2rem; margin-bottom: 0; }
        p { max-width: 400px; text-align: center; line-height: 1.5; margin-bottom: 30px; }
        .btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 15px 40px;
            font-family: var(--ui-font);
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 30px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px var(--accent);
        }
        .btn-restart {
            border-color: var(--accent3);
            color: var(--accent3);
        }
        .btn-restart:hover {
            background: var(--accent3);
            box-shadow: 0 0 20px var(--accent3);
        }
        #feedback-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px white;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-text">Signal Garden // <span id="stage-label">Seed</span></div>
        <div id="feedback-overlay"></div>
        <div class="hud-text">Sync Level: <span id="sync-level">0</span>%</div>
    </div>

    <div id="start-screen">
        <h1>SIGNAL GARDEN</h1>
        <p>The machine is dormant. Click the nodes when their signals flare to stimulate growth.</p>
        <button class="btn" id="start-btn">Initialize Sequence</button>
    </div>

    <div id="restart-screen">
        <h2 style="color: var(--accent3)">GARDEN FLOWERS</h2>
        <p id="end-reason">Signal Synchronized.</p>
        <button class="btn btn-restart" id="restart-btn">New Growth Cycle</button>
    </div>
</div>

<script>
/**
 * SIGNAL GARDEN
 * 
 * A 60-second one-screen browser game.
 * Concept: Tuning a dial to wake an electronic plant.
 * Audio: Procedural Web Audio synthesis.
 */

// --- CONFIGURATION ---
const CONFIG = {
    nodeCount: 6,
    nodeRadius: 18,
    dialRadius: 200,
    colors: ['#4ff0c5', '#f04fd9', '#f0c54f', '#ff4f4f', '#4f9cf0', '#ffffff'],
    notes: [130.81, 164.81, 196.00, 261.63, 329.63, 392.00], // C3, E3, G3, C4, E4, G4
    durations: [2000, 1400, 1000, 800, 600, 400] // Getting faster
};

// --- STATE ---
const state = {
    running: false,
    currentNode: 0,
    score: 0,
    timeLeft: 0,
    lastTime: 0,
    bloomProgress: 0,
    bloomState: 'IDLE', // IDLE, TUNING, BLOOM, ENDED
    nodes: [],
    particles: [],
    canvasWidth: 0,
    canvasHeight: 0,
    cx: 0,
    cy: 0
};

// --- AUDIO SYSTEM ---
const Audio = {
    ctx: null,
    masterGain: null,
    droneOsc: null,
    droneLFO: null,
    droneGain: null,
    
    init() {
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AC();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.4;
        this.masterGain.connect(this.ctx.destination);
        this.startDrone();
    },

    startDrone() {
        // Deep background hum
        this.droneGain = this.ctx.createGain();
        this.droneGain.gain.value = 0;
        this.droneGain.connect(this.masterGain);
        
        this.droneOsc = this.ctx.createOscillator();
        this.droneOsc.type = 'sawtooth';
        this.droneOsc.frequency.value = 55; // A1
        
        // LFO to make the drone pulsate
        this.droneLFO = this.ctx.createOscillator();
        this.droneLFO.type = 'sine';
        this.droneLFO.frequency.value = 0.5; // Slow pulse
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 10; // Depth
        this.droneLFO.connect(lfoGain);
        lfoGain.connect(this.droneOsc.frequency);
        
        // Filter to make it muffled and ambient
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 200;
        
        this.droneOsc.connect(filter);
        filter.connect(this.droneGain);
        
        this.droneGain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 4);
        this.droneOsc.start();
        this.droneLFO.start();
    },

    stopDrone() {
        if (this.droneGain) {
            this.droneGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2);
            setTimeout(() => {
                if(this.droneOsc) this.droneOsc.stop();
                if(this.droneLFO) this.droneLFO.stop();
            }, 2000);
        }
    },

    playTone(index) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.value = CONFIG.notes[index % CONFIG.notes.length];
        
        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.6, this.ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 1.5);
    },

    playSuccess() {
        // A shimmering arpeggio
        const now = this.ctx.currentTime;
        [0, 0.1, 0.2, 0.3].forEach((delay, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            // Pentatonic spread
            const freq = 440 * (1 + i * 0.25); 
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, now + delay);
            gain.gain.linearRampToValueAtTime(0.3, now + delay + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, now + delay + 1);
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start(now + delay);
            osc.stop(now + delay + 1);
        });
    },

    playFail() {
        // Dissonant buzz
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 40 + Math.random() * 20;
        gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    },

    playBloom() {
        // Grand crescendo
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const osc3 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc1.frequency.value = 55;
        osc2.frequency.value = 110;
        osc3.frequency.value = 220.2; // Slight detune for richness
        
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.8, now + 2);
        gain.gain.exponentialRampToValueAtTime(0.1, now + 6);
        
        [osc1, osc2, osc3].forEach(o => {
            o.connect(gain);
            o.start(now);
            o.stop(now + 8);
        });
        gain.connect(this.masterGain);
    }
};

// --- GAME LOGIC ---

function resize() {
    const container = document.getElementById('game-container');
    const rect = container.getBoundingClientRect();
    state.canvasWidth = rect.width;
    state.canvasHeight = rect.height;
    state.cx = state.canvasWidth / 2;
    state.cy = state.canvasHeight / 2;
    state.canvas.width = state.canvasWidth;
    state.canvas.height = state.canvasHeight;
    
    setupNodes();
}

function setupNodes() {
    state.nodes = [];
    const r = CONFIG.dialRadius * (STATE_SCALE());
    for (let i = 0; i < CONFIG.nodeCount; i++) {
        const angle = (Math.PI * 2 / CONFIG.nodeCount) * i - (Math.PI / 2);
        state.nodes.push({
            index: i,
            angle: angle,
            x: state.cx + Math.cos(angle) * r,
            y: state.cy + Math.sin(angle) * r,
            active: false,
            hit: false,
            missed: false,
            pulse: 0
        });
    }
}

function STATE_SCALE() {
    return Math.min(state.canvasWidth, state.canvasHeight) / 800;
}

function startGame() {
    Audio.init();
    state.running = true;
    state.currentNode = 0;
    state.score = 0;
    state.bloomState = 'TUNING';
    state.particles = [];
    state.bloomProgress = 0;
    
    document.getElementById('start-screen').style.opacity = 0;
    setTimeout(() => {
        document.getElementById('start-screen').style.display = 'none';
    }, 500);
    document.getElementById('restart-screen').style.display = 'none';
    document.getElementById('restart-screen').style.opacity = 0;
    document.getElementById('stage-label').innerText = "Seed";
    document.getElementById('sync-level').innerText = "0";
    
    nextNode();
    requestAnimationFrame(gameLoop);
}

function nextNode() {
    if (state.currentNode >= CONFIG.nodeCount) {
        triggerBloom();
        return;
    }
    
    // Reset nodes
    state.nodes.forEach(n => {
        n.active = false;
        n.pulse = 0;
    });
    
    // Activate current node
    const node = state.nodes[state.currentNode];
    node.active = true;
    
    // Calculate timer
    // Start generous, reduce as we advance
    const baseTime = 2000;
    const penalty = state.currentNode * 150; 
    state.timeLeft = Math.max(600, baseTime - penalty);
    state.nodeStartTime = performance.now();
}

function triggerBloom() {
    state.bloomState = 'BLOOM';
    state.bloomProgress = 0;
    document.getElementById('stage-label').innerText = "Blooming...";
    Audio.playBloom();
}

function gameLoop(timestamp) {
    if (!state.running) return;
    
    const dt = timestamp - state.lastTime;
    state.lastTime = timestamp;
    
    if (state.bloomState === 'TUNING') {
        updateTuning(dt);
    } else if (state.bloomState === 'BLOOM') {
        updateBloom(dt);
    }
    
    // Update particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt;
        if (p.life <= 0) {
            state.particles.splice(i, 1);
        }
    }
    
    draw();
    
    if (state.bloomState !== 'ENDED') {
        requestAnimationFrame(gameLoop);
    }
}

function updateTuning(dt) {
    // Check active node timing
    const node = state.nodes[state.currentNode];
    const elapsed = performance.now() - state.nodeStartTime;
    
    // Pulse animation
    node.pulse = (Math.sin(elapsed * 0.01) + 1) * 0.5;
    
    if (elapsed > state.timeLeft) {
        // Missed
        node.missed = true;
        Audio.playFail();
        showFeedback("MISS", CONFIG.colors[4]);
        handleFailure("Signal lost.");
    } else {
        // Active visual pulse (slightly faster as we progress)
        const speed = 0.005 + (state.currentNode * 0.002);
        node.pulse = (Math.sin(elapsed * speed) + 1) * 0.5;
    }
    
    // Check UI Sync
    document.getElementById('sync-level').innerText = Math.floor((state.currentNode / CONFIG.nodeCount) * 100);
}

function updateBloom(dt) {
    state.bloomProgress += dt / 3000; // 3 second bloom
    
    if (state.bloomProgress >= 1) {
        state.bloomState = 'ENDED';
        endGame(true);
    }
}

function handleFailure(reason) {
    state.running = false;
    Audio.stopDrone();
    setTimeout(() => {
        showEndScreen(reason, false);
    }, 1000);
}

function endGame(success) {
    state.running = false;
    if (success) {
        Audio.playSuccess();
        showEndScreen("Sequence Complete.", true);
    } else {
        showEndScreen("Signal Lost.", false);
    }
}

function showEndScreen(reason, success) {
    const endScreen = document.getElementById('restart-screen');
    const reasonEl = document.getElementById('end-reason');
    reasonEl.innerText = reason;
    reasonEl.style.color = success ? 'var(--accent3)' : '#ff4f4f';
    
    endScreen.style.display = 'flex';
    // Trigger reflow
    void endScreen.offsetWidth; 
    endScreen.style.opacity = 1;
}

function showFeedback(text, color) {
    const el = document.getElementById('feedback-overlay');
    el.innerText = text;
    el.style.color = color;
    el.style.opacity = 1;
    el.style.transform = 'translate(-50%, -50%) scale(1.2)';
    
    setTimeout(() => {
        el.style.opacity = 0;
        el.style.transform = 'translate(-50%, -50%) scale(1)';
    }, 800);
    
    // Advance logic after miss
    state.currentNode++;
    setTimeout(nextNode, 500);
}

// --- DRAWING ---

function draw() {
    const ctx = document.getElementById('game-canvas').getContext('2d');
    const scale = STATE_SCALE();
    
    // Clear
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, state.canvasWidth, state.canvasHeight);
    
    ctx.save();
    ctx.translate(state.cx, state.cy);
    ctx.scale(scale, scale);
    
    if (state.bloomState === 'TUNING') {
        drawTuningState(ctx);
    } else if (state.bloomState === 'BLOOM') {
        drawBloom(ctx);
    } else if (state.bloomState === 'ENDED') {
        drawFinalState(ctx);
    }
    
    ctx.restore();
    
    drawParticles(ctx);
}

function drawTuningState(ctx) {
    // Draw Dial Base
    ctx.strokeStyle = '#333344';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, CONFIG.dialRadius, 0, Math.PI * 2);
    ctx.stroke();
    
    // Draw Nodes
    state.nodes.forEach(node => {
        const baseColor = CONFIG.colors[node.index];
        
        // Node Glow
        if (node.active) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = baseColor;
            ctx.fillStyle = baseColor;
        } else if (node.missed) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#444';
        } else if (node.hit) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
        } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#222';
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(node.x, node.y, CONFIG.nodeRadius, 0, Math.PI * 2);
            ctx.stroke();
            return; // Fill is done above or default
        }
        
        ctx.beginPath();
        ctx.arc(node.x, node.y, CONFIG.nodeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // Reset
    });
    
    // Draw connections (Plant Sprout)
    ctx.strokeStyle = '#4ff0c5';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // Center hub
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Draw path from center to active/hit nodes
    ctx.beginPath();
    ctx.moveTo(0, 0);
    let started = false;
    for(let i=0; i<=state.currentNode; i++) {
        const n = state.nodes[i];
        if (n.hit || (i === state.currentNode && n.active)) {
            ctx.lineTo(n.x, n.y);
            started = true;
        }
    }
    if (started) ctx.stroke();
    
    // Draw active node timer ring
    if (state.currentNode < CONFIG.nodeCount) {
        const node = state.nodes[state.currentNode];
        const elapsed = performance.now() - state.nodeStartTime;
        const pct = Math.max(0, 1 - (elapsed / state.timeLeft));
        
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(node.x, node.y, CONFIG.nodeRadius + 10, -Math.PI/2, -Math.PI/2 + (Math.PI * 2 * pct));
        ctx.stroke();
    }
}

function drawBloom(ctx) {
    // Draw final plant structure
    
    // Fractal Branch Generator
    function branch(ctx, x, y, angle, depth, maxDepth, width) {
        if (depth > maxDepth) return;
        
        const len = 40 * (maxDepth - depth);
        const endX = x + Math.cos(angle) * len;
        const endY = y + Math.sin(angle) * len;
        
        ctx.strokeStyle = `rgba(79, 240, 197, ${1 - (depth/maxDepth)})`;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        // Branches
        const spread = 0.4 + (state.bloomProgress * 0.5); // Grows wider
        branch(ctx, endX, endY, angle - spread, depth + 1, maxDepth, width * 0.7);
        branch(ctx, endX, endY, angle + spread, depth + 1, maxDepth, width * 0.7);
    }
    
    // Draw main trunk
    const trunkLen = 80 + (state.bloomProgress * 60);
    const endX = Math.cos(-Math.PI/2) * trunkLen;
    const endY = Math.sin(-Math.PI/2) * trunkLen;
    
    ctx.strokeStyle = '#4ff0c5';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    
    // Bloom progress effect
    const depth = Math.floor(state.bloomProgress * 5);
    if (depth > 0) {
        branch(ctx, endX, endY, -Math.PI/2, 1, depth, 4);
    }
}

function drawFinalState(ctx) {
    // Static display of the full tree
    ctx.strokeStyle = '#4ff0c5';
    ctx.lineWidth = 8;
    
    const trunkLen = 140;
    const endX = Math.cos(-Math.PI/2) * trunkLen;
    const endY = Math.sin(-Math.PI/2) * trunkLen;
    
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    
    function branchFinal(ctx, x, y, angle, depth, maxDepth, width) {
        if (depth > maxDepth) return;
        
        const len = 40 * (maxDepth - depth);
        const endX = x + Math.cos(angle) * len;
        const endY = y + Math.sin(angle) * len;
        
        ctx.strokeStyle = ['#4ff0c5', '#f04fd9', '#f0c54f'][depth % 3];
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.strokeStyle;
        
        const spread = 0.9;
        branchFinal(ctx, endX, endY, angle - spread, depth + 1, maxDepth, width * 0.7);
        branchFinal(ctx, endX, endY, angle + spread, depth + 1, maxDepth, width * 0.7);
        ctx.shadowBlur = 0;
    }
    
    branchFinal(ctx, endX, endY, -Math.PI/2, 1, 5, 4);
    
    // Particles
    spawnParticles(ctx, 5);
}

// --- PARTICLES ---

function spawnParticles(ctx, count) {
    for(let i=0; i<count; i++) {
        state.particles.push({
            x: Math.random() * state.canvasWidth,
            y: Math.random() * state.canvasHeight - state.canvasHeight/2, // Start slightly above screen relative to center
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * 2 + 1,
            size: Math.random() * 3 + 1,
            life: 2000,
            color: CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)]
        });
    }
}

function drawParticles(ctx) {
    ctx.fillStyle = 'white';
    state.particles.forEach(p => {
        ctx.globalAlpha = (p.life / 2000);
        ctx.fillStyle = p.color || '#fff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

// --- INPUT ---

function handleClick(e) {
    if (!state.running || state.bloomState !== 'TUNING') return;
    
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left - state.cx;
    const y = e.clientY - rect.top - state.cy;
    
    // Check collision with current node
    const target = state.nodes[state.currentNode];
    const dist = Math.sqrt((x - target.x)**2 + (y - target.y)**2);
    
    if (dist < CONFIG.nodeRadius + 10) {
        // Success
        target.hit = true;
        state.currentNode++;
        state.score += 100;
        Audio.playTone(state.currentNode - 1);
        
        // Spawn particles at hit location
        const screenX = state.cx + target.x * STATE_SCALE();
        const screenY = state.cy + target.y * STATE_SCALE();
        spawnParticlesAt(screenX, screenY, 10);
        
        nextNode();
    }
}

function spawnParticlesAt(x, y, count) {
    for(let i=0; i<count; i++) {
        state.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            size: Math.random() * 4 + 2,
            life: 1000,
            color: CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)]
        });
    }
}

const canvas = document.getElementById('game-canvas');
canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    handleClick({ clientX: touch.clientX, clientY: touch.clientY });
}, {passive: false});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// --- INIT ---
window.addEventListener('resize', resize);
resize();
draw(); // Initial draw

</script>
</body>
