<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    user-select: none;
  }
  canvas {
    display: block;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(100, 150, 255, 0.15);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  #overlay.active { pointer-events: auto; }
  .panel {
    background: rgba(10, 12, 30, 0.92);
    border: 1px solid rgba(140, 180, 255, 0.3);
    border-radius: 12px;
    padding: 40px 50px;
    text-align: center;
    color: #c8d8f0;
    max-width: 500px;
    backdrop-filter: blur(10px);
  }
  .panel h1 {
    font-size: 28px;
    margin-bottom: 12px;
    color: #e0e8ff;
    letter-spacing: 2px;
  }
  .panel p {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: #99a8c4;
  }
  .panel .score-line {
    font-size: 18px;
    color: #b0ccff;
    margin-bottom: 20px;
  }
  .btn {
    background: linear-gradient(135deg, #3a6fd8, #6a4cd8);
    border: none;
    color: white;
    padding: 12px 32px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(100, 130, 255, 0.4);
  }
  #evidence { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay" class="active">
  <div class="panel" id="panel">
    <h1>Orbit Postcard</h1>
    <p>Click anywhere in the sky to choose your satellite's slingshot trajectory.<br>Guide it through three luminous rings to send your postcard to the stars.</p>
    <button class="btn" id="startBtn">Launch Satellite</button>
  </div>
</div>
<div id="evidence"></div>

<script>
// ===== Evidence API =====
const evidenceState = { schema_version: 1, phase: 'initial', progress: 0, target: 3, completed: false, restart_count: 0 };
window.__factoryxEvidence = () => ({...evidenceState});

// ===== Canvas Setup =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
const startBtn = document.getElementById('startBtn');

let W, H;
function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight);
  W = canvas.width = Math.max(600, s);
  H = canvas.height = Math.max(500, s);
}
resize();
window.addEventListener('resize', resize);

// ===== Audio Engine =====
let audioCtx = null;
let musicPlaying = false;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);
}

// Procedural ambient drone
let droneOsc, droneLFO, droneGain;
function startAmbient() {
  if (musicPlaying) return;
  musicPlaying = true;
  droneOsc = audioCtx.createOscillator();
  droneOsc.type = 'sine';
  droneOsc.frequency.value = 80;
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.04;
  droneLFO = audioCtx.createOscillator();
  droneLFO.type = 'sine';
  droneLFO.frequency.value = 0.15;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 8;
  droneLFO.connect(lfoGain);
  lfoGain.connect(droneOsc.frequency);
  droneOsc.connect(droneGain);
  droneGain.connect(masterGain);
  droneOsc.start();
  droneLFO.start();
}

function stopAmbient() {
  musicPlaying = false;
  if (droneOsc) { droneOsc.stop(); droneOsc = null; }
  if (droneLFO) { droneLFO.stop(); droneLFO = null; }
}

function playTone(freq, duration, type, vol, delay = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
  o.connect(g);
  g.connect(masterGain);
  o.start(audioCtx.currentTime + delay);
  o.stop(audioCtx.currentTime + delay + duration);
}

function playLaunch() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(150, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
  o.connect(g);
  g.connect(masterGain);
  o.start();
  o.stop(audioCtx.currentTime + 0.7);
}

function playRingBell(freqShift) {
  playTone(freqShift, 1.2, 'sine', 0.18);
  playTone(freqShift * 1.5, 0.8, 'sine', 0.08);
}

function playChime(freq) {
  playTone(freq, 0.4, 'sine', 0.12);
}

function playSuccessChord() {
  playTone(440, 1.5, 'sine', 0.1);
  playTone(554, 1.5, 'sine', 0.08);
  playTone(659, 1.5, 'sine', 0.08);
  playTone(880, 2.0, 'sine', 0.06);
}

// ===== Game State =====
let state = 'waiting'; // waiting, aiming, launching, passing, completed, failed
let satellite = { x: 0, y: 0, vx: 0, vy: 0, trail: [], radius: 6 };
let aimPoint = { x: 0, y: 0 };
let rings = [];
let stars = [];
let particles = [];
let progress = 0;
let ringIndex = 0;
let trailParticles = [];
let flashAlpha = 0;
let postcardAngle = 0;
let postcardAlpha = 0;
let frameCount = 0;
let restartCount = 0;
let time = 0;
let bgStars = [];

// ===== Generate Background Stars =====
function generateStars() {
  bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.8 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
generateStars();

// ===== Generate Rings =====
function generateRings() {
  rings = [];
  const colors = [
    { ring: '#44d8ff', glow: 'rgba(68, 216, 255, 0.3)' },
    { ring: '#c44dff', glow: 'rgba(196, 77, 255, 0.3)' },
    { ring: '#ff6b44', glow: 'rgba(255, 107, 68, 0.3)' }
  ];
  for (let i = 0; i < 3; i++) {
    rings.push({
      x: W * 0.25 + (W * 0.55) * (i / 3),
      y: H * 0.3 + Math.sin(i * 1.5) * H * 0.12,
      radius: 50 + i * 5,
      color: colors[i].ring,
      glowColor: colors[i].glow,
      glow: 0.3,
      passed: false,
      pulsePhase: 0
    });
  }
}
generateRings();

// ===== Particles =====
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.02 + 0.008,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

// ===== Drawing =====
function drawStars(time) {
  bgStars.forEach(s => {
    const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.alpha * twinkle;
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawSatellite(x, y) {
  // Glow
  const grd = ctx.createRadialGradient(x, y, 0, x, y, 25);
  grd.addColorStop(0, 'rgba(100, 200, 255, 0.6)');
  grd.addColorStop(1, 'rgba(100, 200, 255, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(x, y, 25, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#8ab8f0';
  ctx.beginPath();
  ctx.arc(x, y, satellite.radius, 0, Math.PI * 2);
  ctx.fill();

  // Solar panel
  ctx.strokeStyle = '#a0d0ff';
  ctx.lineWidth = 2;
  const angle = Math.atan2(satellite.vy, satellite.vx);
  ctx.beginPath();
  ctx.moveTo(x + Math.cos(angle) * 8, y + Math.sin(angle) * 8);
  ctx.lineTo(x + Math.cos(angle) * 8 + Math.cos(angle + Math.PI/2) * 12,
             y + Math.sin(angle) * 8 + Math.sin(angle + Math.PI/2) * 12);
  ctx.lineTo(x + Math.cos(angle) * 8 + Math.cos(angle + Math.PI/2) * 12 + Math.cos(angle) * 8,
             y + Math.sin(angle) * 8 + Math.sin(angle + Math.PI/2) * 12 + Math.sin(angle) * 8);
  ctx.lineTo(x + Math.cos(angle) * 8 + Math.cos(angle) * 8,
             y + Math.sin(angle) * 8 + Math.sin(angle) * 8);
  ctx.stroke();

  // Sun glow on solar panel
  ctx.fillStyle = 'rgba(255, 240, 200, 0.4)';
  ctx.fill();
}

function drawRing(ring, time) {
  ring.pulsePhase += 0.03;
  const pulse = Math.sin(ring.pulsePhase) * 0.15 + 0.85;
  const r = ring.radius * pulse;

  // Outer glow
  const grd = ctx.createRadialGradient(ring.x, ring.y, r - 10, ring.x, ring.y, r + 30);
  grd.addColorStop(0, ring.glow);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(ring.x, ring.y, r + 30, 0, Math.PI * 2);
  ctx.fill();

  // Ring
  ctx.strokeStyle = ring.color;
  ctx.lineWidth = 3;
  ctx.shadowColor = ring.color;
  ctx.shadowBlur = 20 * pulse;
  ctx.beginPath();
  ctx.arc(ring.x, ring.y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner decorative ring
  if (!ring.passed) {
    ctx.strokeStyle = ring.color + '44';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, r - 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawTrails() {
  if (satellite.trail.length < 2) return;
  for (let i = 1; i < satellite.trail.length; i++) {
    const t = i / satellite.trail.length;
    ctx.strokeStyle = `rgba(100, 180, 255, ${t * 0.4})`;
    ctx.lineWidth = t * 3;
    ctx.beginPath();
    ctx.moveTo(satellite.trail[i-1].x, satellite.trail[i-1].y);
    ctx.lineTo(satellite.trail[i].x, satellite.trail[i].y);
    ctx.stroke();
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPostcard() {
  if (postcardAlpha <= 0) return;

  const cx = W / 2;
  const cy = H / 2;
  const pw = 260;
  const ph = 180;

  ctx.save();
  ctx.globalAlpha = postcardAlpha;
  ctx.translate(cx, cy);
  ctx.rotate(postcardAngle);

  // Postcard body
  const pg = ctx.createLinearGradient(-pw/2, -ph/2, pw/2, ph/2);
  pg.addColorStop(0, '#1a2040');
  pg.addColorStop(1, '#2a1a40');
  ctx.fillStyle = pg;
  ctx.strokeStyle = 'rgba(180, 200, 255, 0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-pw/2, -ph/2, pw, ph, 8);
  ctx.fill();
  ctx.stroke();

  // Postcard illustration (mini starfield scene)
  const starCount = 40;
  for (let i = 0; i < starCount; i++) {
    const sx = -pw/2 + 20 + Math.sin(i * 3.7 + frameCount * 0.01) * (pw - 40);
    const sy = -ph/2 + 15 + (i * 4.3 % (ph - 30));
    const sz = Math.sin(i + frameCount * 0.02) * 0.5 + 1.2;
    ctx.fillStyle = `rgba(200, 220, 255, ${0.3 + Math.sin(i * 2.1) * 0.3})`;
    ctx.beginPath();
    ctx.arc(sx, sy, sz, 0, Math.PI * 2);
    ctx.fill();
  }

  // Small ring
  ctx.strokeStyle = '#44d8ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(-20, -20, 18, 0, Math.PI * 2);
  ctx.stroke();

  const ringG = ctx.createRadialGradient(-20, -20, 8, -20, -20, 25);
  ringG.addColorStop(0, 'rgba(68, 216, 255, 0.3)');
  ringG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = ringG;
  ctx.beginPath();
  ctx.arc(-20, -20, 25, 0, Math.PI * 2);
  ctx.fill();

  // Satellite on postcard
  drawMiniSatellite(pw/2 - 45, -20, 0.4);

  // Postcard address lines
  ctx.strokeStyle = 'rgba(140, 170, 220, 0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(20, ph/2 - 20 + i * 12);
    ctx.lineTo(pw/2 - 10, ph/2 - 20 + i * 12);
    ctx.stroke();
  }

  ctx.restore();
}

function drawMiniSatellite(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = '#8ab8f0';
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#a0d0ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(5, 0);
  ctx.lineTo(14, -5);
  ctx.lineTo(14, 5);
  ctx.lineTo(5, 0);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255, 240, 200, 0.4)';
  ctx.fill();
  ctx.restore();
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ===== Update =====
function update() {
  time += 0.016;
  frameCount++;

  // Update trail
  if (state === 'launching' || state === 'passing') {
    satellite.trail.push({ x: satellite.x, y: satellite.y });
    if (satellite.trail.length > 40) satellite.trail.shift();
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Satellite movement
  if (state === 'launching' || state === 'passing') {
    satellite.x += satellite.vx;
    satellite.y += satellite.vy;

    // Trail particles
    if (Math.random() < 0.3) {
      trailParticles.push({
        x: satellite.x,
        y: satellite.y,
        vx: satellite.vx * 0.1 + (Math.random() - 0.5) * 0.5,
        vy: satellite.vy * 0.1 + (Math.random() - 0.5) * 0.5,
        life: 0.6,
        decay: 0.015,
        size: Math.random() * 2 + 0.5
      });
    }

    // Update trail particles
    for (let i = trailParticles.length - 1; i >= 0; i--) {
      const p = trailParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) trailParticles.splice(i, 1);
    }
  }

  // Ring collision detection
  if ((state === 'launching' || state === 'passing') && ringIndex < 3) {
    const ring = rings[ringIndex];
    const dx = satellite.x - ring.x;
    const dy = satellite.y - ring.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < ring.radius - 5) {
      ring.passed = true;
      progress = ringIndex + 1;
      evidenceState.progress = progress;
      evidenceState.phase = 'playing';
      ringIndex++;

      playRingBell(520 + ringIndex * 180);
      spawnParticles(ring.x, ring.y, ring.color, 30, 4);
      flashAlpha = 0.3;

      if (ringIndex >= 3) {
        state = 'completed';
        evidenceState.completed = true;
        evidenceState.phase = 'completed';
        playSuccessChord();
        setTimeout(() => {
          postcardAlpha = 0;
          postcardAngle = 0;
          overlay.classList.add('active');
          panel.innerHTML = `
            <h1>✦ Postcard Sent ✦</h1>
            <p>Your satellite has navigated all three luminous rings.<br>The stars received your message.</p>
            <div class="score-line">${restartCount > 0 ? `Restart ${restartCount} time${restartCount>1?'s':''} · ` : ''}All rings cleared · 3/3</div>
            <button class="btn" onclick="newGame()">Send Another</button>
          `;
        }, 1500);
      }
    }

    // Missed ring (satellite went past without going through)
    if (dist > ring.radius + 20 && dist > satellite.radius * 2 && state !== 'failed') {
      state = 'failed';
      evidenceState.progress = ringIndex;
      evidenceState.phase = 'failed';
      flashAlpha = 0.2;
      playTone(200, 0.5, 'sawtooth', 0.1);

      setTimeout(() => {
        overlay.classList.add('active');
        panel.innerHTML = `
          <h1>Missed the Orbit</h1>
          <p>Your satellite drifted past ring ${ringIndex + 1} without threading through it.<br>Try adjusting your aim.</p>
          <div class="score-line">${restartCount > 0 ? `Restart ${restartCount} time${restartCount>1?'s':''} · ` : ''}${ringIndex}/3 rings cleared</div>
          <button class="btn" onclick="newGame()">Try Again</button>
        `;
      }, 800);
    }

    // Out of bounds
    if (satellite.x > W + 50 || satellite.x < -50 || satellite.y < -50 || satellite.y > H + 50) {
      if (state !== 'failed' && state !== 'completed') {
        state = 'failed';
        evidenceState.progress = ringIndex;
        evidenceState.phase = 'failed';
        flashAlpha = 0.2;
        playTone(180, 0.4, 'sawtooth', 0.08);

        setTimeout(() => {
          overlay.classList.add('active');
          panel.innerHTML = `
            <h1>Lost in the Void</h1>
            <p>Your satellite drifted too far from the intended path.<br>Slight adjustments in aim will help.</p>
            <div class="score-line">${restartCount > 0 ? `Restart ${restartCount} time${restartCount>1?'s':''} · ` : ''}${ringIndex}/3 rings cleared</div>
            <button class="btn" onclick="newGame()">Try Again</button>
          `;
        }, 800);
      }
    }
  }

  // Flash fade
  if (flashAlpha > 0) flashAlpha -= 0.01;

  // Postcard animation
  if (postcardAlpha > 0) {
    postcardAlpha += 0.02;
    postcardAngle = Math.sin(time * 0.5) * 0.05;
    if (postcardAlpha > 1) postcardAlpha = 1;
  }
}

// ===== Render =====
function render() {
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080818');
  bg.addColorStop(0.5, '#0e0e24');
  bg.addColorStop(1, '#120e1e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars(time);
  drawTrails();

  // Draw trail particles
  trailParticles.forEach(p => {
    ctx.fillStyle = `rgba(100, 180, 255, ${p.life * 0.5})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw rings
  if (state === 'aiming' || state === 'launching' || state === 'passing' || state === 'completed') {
    rings.forEach((r, i) => {
      if (i >= ringIndex) {
        drawRing(r, time);
      }
    });
  }

  // Draw satellite
  if (state !== 'waiting') {
    drawSatellite(satellite.x, satellite.y);
  }

  drawParticles();
  drawFlash();
  drawPostcard();

  // UI: Aim indicator
  if (state === 'aiming') {
    ctx.strokeStyle = 'rgba(140, 180, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    const tipX = rings[0].x;
    const tipY = rings[0].y;
    const startX = satellite.x;
    const startY = satellite.y;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    // Show aim direction hint (first ring)
    const dx = tipX - startX;
    const dy = tipY - startY;
    const d = Math.sqrt(dx*dx + dy*dy);
    const nx = dx / d;
    const ny = dy / d;
    ctx.lineTo(startX + nx * 100, startY + ny * 100);
    ctx.stroke();
    ctx.setLineDash([]);

    // Aim target reticle
    ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)';
    ctx.lineWidth = 1;
    const retX = mousePos.x;
    const retY = mousePos.y;
    ctx.beginPath();
    ctx.moveTo(retX - 10, retY);
    ctx.lineTo(retX + 10, retY);
    ctx.moveTo(retX, retY - 10);
    ctx.lineTo(retX, retY + 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(retX, retY, 15, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ===== Main Loop =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ===== Input =====
let mousePos = { x: W / 2, y: H / 2 };

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mousePos.x = (e.clientX - rect.left) * (W / rect.width);
  mousePos.y = (e.clientY - rect.top) * (H / rect.height);
});

canvas.addEventListener('click', (e) => {
  if (state === 'aiming') {
    const rect = canvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) * (W / rect.width);
    const clickY = (e.clientY - rect.top) * (H / rect.height);

    // Calculate direction from satellite to click
    const dx = clickX - satellite.x;
    const dy = clickY - satellite.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0) return;

    const speed = 2.5;
    satellite.vx = (dx / dist) * speed;
    satellite.vy = (dy / dist) * speed;
    state = 'launching';
    evidenceState.phase = 'playing';
    playLaunch();
  }
});

// ===== Game Control =====
function newGame() {
  initAudio();
  if (!musicPlaying) startAmbient();

  overlay.classList.remove('active');
  satellite = { x: W * 0.15, y: H * 0.8, vx: 0, vy: 0, trail: [], radius: 6 };
  aimPoint = { x: W * 0.75, y: H * 0.3 };
  ringIndex = 0;
  progress = 0;
  particles = [];
  trailParticles = [];
  flashAlpha = 0;
  postcardAlpha = 0;
  postcardAngle = 0;
  state = 'aiming';

  evidenceState.progress = 0;
  evidenceState.completed = false;
  evidenceState.phase = 'initial';

  generateRings();

  panel.innerHTML = `
    <h1>Orbit Postcard</h1>
    <p>Click in the sky to aim your satellite's trajectory.<br>Guide it through three luminous rings to send your postcard to the stars.</p>
    <div class="score-line">0/3 rings</div>
  `;
}

// Start button
startBtn.addEventListener('click', () => {
  initAudio();
  if (!musicPlaying) startAmbient();
  restartCount = 0;
  evidenceState.restart_count = 0;
  newGame();
});

// Expose newGame globally for button onclick
window.newGame = newGame;

// ===== Init =====
loop();
</script>
</body>
</html>
