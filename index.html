<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  user-select: none;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(100, 150, 255, 0.15);
}
#restartBtn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 32px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #b0c4de;
  font-size: 16px;
  border-radius: 24px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  opacity: 0;
  pointer-events: none;
}
#restartBtn.visible {
  opacity: 1;
  pointer-events: auto;
}
#restartBtn:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="restartBtn">↻ Restart</button>
<script>
// ============================================================
// RAIN DIAL — A 60–90 second one-screen browser game
// ============================================================
// This should feel like a miniature music box where you tune
// rain chimes by routing raindrops through a rotating dial,
// culminating in a resonant harmony.
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restartBtn');

// Canvas sizing
const W = 1200;
const H = 800;
canvas.width = W;
canvas.height = H;
canvas.style.width = Math.min(W, window.innerWidth) + 'px';
canvas.style.height = Math.min(H, window.innerHeight) + 'px';

// ============================================================
// Audio Engine — Web Audio API, no external dependencies
// ============================================================
let audioCtx = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
}

// Chime frequencies — pentatonic scale
const chimeFreqs = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66];
const chimePathOrder = [0, 2, 4, 6, 3, 1, 5]; // the pattern to complete

function playChime(index, vol = 0.35) {
  if (!audioCtx) return;
  const freq = chimeFreqs[chimePathOrder[index]] || 440;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.2);
}

function playClick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playSuccessChord() {
  if (!audioCtx) return;
  const baseTime = audioCtx.currentTime;
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = baseTime + i * 0.12;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 2.5);
  });
}

function playRainAmbient() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.02;
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 0.5;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  source.start();
  return { source, gain };
}

let ambientTrack = null;

// ============================================================
// Game State
// ============================================================
const DIAL_CX = W / 2;
const DIAL_CY = H / 2 - 30;
const DIAL_R = 130;
const PATH_COUNT = 7;
const TARGET_COMPLETION = PATH_COUNT;
let gameState;

function initState() {
  gameState = {
    phase: 'initial', // initial | playing | completed
    progress: 0,
    target: TARGET_COMPLETION,
    completed: false,
    restartCount: 0,
    // Dial
    dialAngle: 0,
    targetAngle: 0,
    lastClickIndex: -1,
    // Drops
    drops: [],
    dropTimer: 0,
    dropInterval: 1.8,
    // Chimes
    chimes: [],
    chimeHits: [],
    // Particles
    particles: [],
    // Payoff
    payoffStartTime: 0,
    payoffComplete: false,
    // Rain background
    bgDrops: [],
    time: 0,
  };
  // Build chime positions along the canvas bottom
  for (let i = 0; i < PATH_COUNT; i++) {
    const angle = -Math.PI * 0.8 + (i / (PATH_COUNT - 1)) * Math.PI * 1.6;
    const x = DIAL_CX + Math.cos(angle) * (DIAL_R + 60);
    const y = DIAL_CY + Math.sin(angle) * (DIAL_R + 60) + 140;
    gameState.chimes.push({
      x, y, angle, active: false, hitTimer: 0,
      index: i, freqIndex: chimePathOrder[i]
    });
  }
  // Build background rain
  for (let i = 0; i < 60; i++) {
    gameState.bgDrops.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 1 + Math.random() * 2,
      len: 8 + Math.random() * 12,
      alpha: 0.1 + Math.random() * 0.2
    });
  }
}

initState();

// ============================================================
// Drawing Helpers
// ============================================================
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawChime(chime, hit) {
  const cx = chime.x;
  const cy = chime.y;
  const len = 50 + (chime.index * 5);
  const width = 8;

  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-width/2 + 3, -len/2 + 3, width, len);

  // Chime bar
  const grad = ctx.createLinearGradient(-width/2, 0, width/2, 0);
  if (hit) {
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.5, '#E8F4FD');
    grad.addColorStop(1, '#87CEEB');
  } else {
    grad.addColorStop(0, '#5a7a9a');
    grad.addColorStop(0.5, '#7a9aba');
    grad.addColorStop(1, '#5a7a9a');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(-width/2, -len/2, width, len);

  // Hook at top
  ctx.strokeStyle = hit ? '#87CEEB' : '#8a9aba';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -len/2 - 5, 5, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawDial() {
  const g = ctx.createRadialGradient(DIAL_CX, DIAL_CY, 20, DIAL_CX, DIAL_CY, DIAL_R + 20);
  g.addColorStop(0, 'rgba(60, 80, 120, 0.9)');
  g.addColorStop(1, 'rgba(30, 45, 75, 0.9)');
  
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(DIAL_CX, DIAL_CY, DIAL_R + 15, 0, Math.PI * 2);
  ctx.fill();

  // Dial face
  ctx.save();
  ctx.translate(DIAL_CX, DIAL_CY);
  ctx.rotate(gameState.dialAngle);

  // Outer ring
  ctx.strokeStyle = 'rgba(150, 180, 220, 0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, DIAL_R, 0, Math.PI * 2);
  ctx.stroke();

  // Inner circle
  ctx.fillStyle = 'rgba(40, 60, 90, 0.8)';
  ctx.beginPath();
  ctx.arc(0, 0, 50, 0, Math.PI * 2);
  ctx.fill();

  // Path indicators on dial
  for (let i = 0; i < PATH_COUNT; i++) {
    const angle = -Math.PI / 2 + (i / PATH_COUNT) * Math.PI * 2;
    const px = Math.cos(angle) * DIAL_R;
    const py = Math.sin(angle) * DIAL_R;
    
    // Is this chime already completed?
    const isComplete = gameState.chimes[i].active;
    
    // Small path marker
    ctx.fillStyle = isComplete ? '#4CAF85' : 'rgba(150, 180, 220, 0.5)';
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI * 2);
    ctx.fill();

    if (isComplete) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✓', px, py);
    }
  }

  // Dial pointer (rotating indicator)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(0, -DIAL_R - 8);
  ctx.lineTo(-8, -DIAL_R - 20);
  ctx.lineTo(8, -DIAL_R - 20);
  ctx.closePath();
  ctx.fill();

  // Center knob
  const knobGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 25);
  knobGrad.addColorStop(0, '#c0d8f0');
  knobGrad.addColorStop(1, '#5a7a9a');
  ctx.fillStyle = knobGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();

  // Title
  ctx.fillStyle = 'rgba(180, 200, 230, 0.7)';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('RAIN DIAL', DIAL_CX, DIAL_CY - DIAL_R - 40);
}

function drawProgressBar() {
  const x = 40;
  const y = 40;
  const w = W - 80;
  const h = 12;

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  drawRoundRect(x, y, w, h, 6);
  ctx.fill();

  const fill = Math.min(gameState.progress / gameState.target, 1);
  if (fill > 0) {
    const grad = ctx.createLinearGradient(x, 0, x + w * fill, 0);
    grad.addColorStop(0, '#4CAF85');
    grad.addColorStop(1, '#66BB6A');
    ctx.fillStyle = grad;
    drawRoundRect(x, y, w * fill, h, 6);
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(200, 220, 240, 0.6)';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(gameState.progress * 100 / gameState.target)}% complete`, W / 2, y + h + 20);
}

function drawBackground() {
  // Dark gradient background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1a2e');
  bg.addColorStop(0.5, '#16213e');
  bg.addColorStop(1, '#0f1628');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Background rain
  gameState.bgDrops.forEach(drop => {
    ctx.strokeStyle = `rgba(150, 180, 220, ${drop.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x - 1, drop.y + drop.len);
    ctx.stroke();
    drop.y += drop.speed;
    if (drop.y > H + 20) {
      drop.y = -20;
      drop.x = Math.random() * W;
    }
  });
}

function drawDrops() {
  gameState.drops.forEach((drop, i) => {
    // Drop trail
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x, drop.y - 15);
    ctx.stroke();

    // Drop head
    const grad = ctx.createRadialGradient(drop.trgX, drop.trgY, 2, drop.trgX, drop.trgY, 6);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.4, '#64b5f6');
    grad.addColorStop(1, 'rgba(100, 180, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(drop.trgX, drop.trgY, 6, 0, Math.PI * 2);
    ctx.fill();

    // Connection to dial
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(drop.trgX, drop.trgY);
    ctx.lineTo(DIAL_CX, DIAL_CY);
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

function drawPayoff() {
  if (gameState.payoffStartTime === 0) return;
  const elapsed = (Date.now() - gameState.payoffStartTime) / 1000;

  // Expanding rings
  for (let i = 0; i < 4; i++) {
    const ringProgress = Math.max(0, elapsed - i * 0.5);
    if (ringProgress < 2) {
      const r = ringProgress * 120;
      const alpha = Math.max(0, 1 - ringProgress / 2);
      ctx.strokeStyle = `rgba(255, 215, 0, ${alpha * 0.5})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(DIAL_CX, DIAL_CY, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // All chimes flash
  gameState.chimes.forEach(ch => {
    ch.hitTimer = Math.max(ch.hitTimer, Date.now() - 200);
  });

  // Text
  if (elapsed > 0.5) {
    const textAlpha = Math.min(1, (elapsed - 0.5) * 2);
    ctx.fillStyle = `rgba(255, 215, 0, ${textAlpha})`;
    ctx.font = 'bold 36px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Harmony Complete!', DIAL_CX, DIAL_CY - DIAL_R - 80);

    ctx.fillStyle = `rgba(180, 210, 240, ${textAlpha * 0.8})`;
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText('All seven chimes are singing in concert.', DIAL_CX, DIAL_CY - DIAL_R - 50);
  }

  if (elapsed > 2 && !gameState.payoffComplete) {
    gameState.payoffComplete = true;
    restartBtn.classList.add('visible');
  }
}

function drawStartPrompt() {
  if (gameState.phase !== 'initial') return;
  
  const pulse = 0.7 + Math.sin(Date.now() / 800) * 0.3;
  ctx.fillStyle = `rgba(180, 210, 240, ${pulse * 0.8})`;
  ctx.font = '20px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Click anywhere on the dial to begin', DIAL_CX, DIAL_CY + 90);

  ctx.fillStyle = 'rgba(150, 180, 220, 0.5)';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.fillText('Click around the dial to route raindrops to chimes', DIAL_CX, DIAL_CY + 115);
  ctx.fillText('Complete all 7 paths to hear the full harmony', DIAL_CX, DIAL_CY + 135);
}

function drawParticles() {
  gameState.particles.forEach((p, i) => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02;
    p.life--;
  });
  gameState.particles = gameState.particles.filter(p => p.life > 0);
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 2;
    gameState.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      size: 2 + Math.random() * 3,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      r: color[0], g: color[1], b: color[2]
    });
  }
}

// ============================================================
// Game Logic
// ============================================================
let lastTime = Date.now();

function update(dt) {
  gameState.time += dt;

  // Dial rotation smooth follow
  const angleDiff = gameState.targetAngle - gameState.dialAngle;
  gameState.dialAngle += angleDiff * 0.08;

  // Drop spawning
  if (gameState.phase === 'playing') {
    gameState.dropTimer += dt;
    const interval = Math.max(0.6, gameState.dropInterval - gameState.progress * 0.15);
    if (gameState.dropTimer >= interval) {
      gameState.dropTimer = 0;
      spawnDrop();
    }

    // Update drops
    gameState.drops.forEach(drop => {
      drop.y += drop.speed * dt * 60;
      if (drop.y >= drop.trgY - 5) {
        drop.hit = true;
      }
    });

    // Check completed drops
    for (let i = gameState.drops.length - 1; i >= 0; i--) {
      const drop = gameState.drops[i];
      if (drop.hit) {
        // Check if drop hit the right chime
        const chime = gameState.chimes[drop.chimeIndex];
        if (chime && !chime.active) {
          chime.active = true;
          gameState.progress++;
          playChime(drop.chimeIndex, 0.3);
          spawnParticles(chime.x, chime.y, 12, [100, 200, 255]);
          setTimeout(() => { if (chime) chime.hitTimer = Date.now(); }, 50);
        }
        gameState.drops.splice(i, 1);

        // Check win condition
        if (gameState.progress >= TARGET_COMPLETION) {
          gameState.phase = 'completed';
          gameState.payoffStartTime = Date.now();
          playSuccessChord();
          spawnParticles(DIAL_CX, DIAL_CY, 40, [255, 215, 0]);
          spawnParticles(DIAL_CX, DIAL_CY, 30, [100, 200, 255]);
        }
      }
    }

    // Update particles
    gameState.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02;
      p.life--;
    });
    gameState.particles = gameState.particles.filter(p => p.life > 0);
  }
}

function spawnDrop() {
  // Find a chime that's not yet active
  const inactiveChimes = gameState.chimes.filter(c => !c.active);
  if (inactiveChimes.length === 0) return;

  const chime = inactiveChimes[Math.floor(Math.random() * inactiveChimes.length)];
  const x = chime.x;
  
  gameState.drops.push({
    x: x + (Math.random() - 0.5) * 20,
    y: -20,
    trgX: x,
    trgY: chime.y - 30,
    speed: 2 + Math.random() * 1.5 + gameState.progress * 0.15,
    chimeIndex: chime.index,
    hit: false
  });
}

function handleClick(screenX, screenY) {
  if (gameState.phase === 'initial') {
    initAudio();
    if (!ambientTrack) ambientTrack = playRainAmbient();
    gameState.phase = 'playing';
    playClick();
    return;
  }

  if (gameState.phase === 'completed') {
    return; // handled by restart button
  }

  // Convert to canvas coords
  const rect = canvas.getBoundingClientRect();
  const canvasX = (screenX - rect.left) * (W / rect.width);
  const canvasY = (screenY - rect.top) * (H / rect.height);

  // Check if click is near the dial
  const dx = canvasX - DIAL_CX;
  const dy = canvasY - DIAL_CY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < DIAL_R + 30 && dist > 15) {
    // Find the nearest chime along the dial circle
    let angle = Math.atan2(dy, dx);
    if (angle < 0) angle += Math.PI * 2;
    
    // Find closest chime index
    let closestIdx = -1;
    let closestDist = Infinity;

    const dialAngle = gameState.dialAngle;

    for (let i = 0; i < PATH_COUNT; i++) {
      const baseAngle = -Math.PI / 2 + (i / PATH_COUNT) * Math.PI * 2;
      const rotatedAngle = baseAngle + dialAngle;
      // Normalize
      let a1 = angle;
      let a2 = rotatedAngle;
      const diff = Math.abs(a1 - a2);
      const nd = Math.min(diff, Math.PI * 2 - diff);
      if (nd < closestDist) {
        closestDist = nd;
        closestIdx = i;
      }
    }

    // Check if click is near a chime's actual target position
    if (closestIdx >= 0) {
      const chime = gameState.chimes[closestIdx];
      const cdx = canvasX - chime.x;
      const cdy = canvasY - chime.y;
      const cdist = Math.sqrt(cdx * cdx + cdy * cdy);

      if (cdist < 60 && !chime.active) {
        playClick();
        // Route a drop to this chime
        dropToChime(closestIdx);
      }
    }
  }
}

function dropToChime(chimeIndex) {
  const chime = gameState.chimes[chimeIndex];
  if (chime.active) return;

  // Spawn a drop that targets this chime
  // Find an appropriate spawn position above
  const spawnX = chime.x + (Math.random() - 0.5) * 30;
  
  gameState.drops.push({
    x: spawnX,
    y: -20,
    trgX: chime.x,
    trgY: chime.y - 30,
    speed: 2.5 + Math.random() + gameState.progress * 0.2,
    chimeIndex: chimeIndex,
    hit: false
  });

  // Animate dial toward the chime angle
  const baseAngle = -Math.PI / 2 + (chimeIndex / PATH_COUNT) * Math.PI * 2;
  gameState.targetAngle = baseAngle;
}

// ============================================================
// Main Loop
// ============================================================
function gameLoop() {
  const now = Date.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  update(dt);

  // Draw
  drawBackground();
  drawDrops();
  
  // Draw chimes
  gameState.chimes.forEach(chime => {
    const hit = Date.now() - chime.hitTimer < 500;
    drawChime(chime, hit);
  });

  drawDial();
  drawProgressBar();
  drawParticles();
  
  if (gameState.phase === 'initial') {
    drawStartPrompt();
  }
  if (gameState.phase === 'completed') {
    drawPayoff();
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// Input Handling
// ============================================================
canvas.addEventListener('click', (e) => {
  handleClick(e.clientX, e.clientY);
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  handleClick(touch.clientX, touch.clientY);
});

restartBtn.addEventListener('click', () => {
  playClick();
  gameState.restartCount++;
  if (ambientTrack) {
    ambientTrack.source.stop();
    ambientTrack = null;
  }
  initState();
  restartBtn.classList.remove('visible');
});

// ============================================================
// Evidence API for the verifier
// ============================================================
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: gameState.phase,
    progress: gameState.progress,
    target: gameState.target,
    completed: gameState.completed,
    restart_count: gameState.restartCount
  };
};

// ============================================================
// Start
// ============================================================
gameLoop();

// Update evidence completed flag when payoff triggers
setInterval(() => {
  if (gameState.phase === 'completed') {
    // evidence is read synchronously so just ensure state is current
  }
}, 200);

</script>
