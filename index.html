<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; overflow: hidden; cursor: none; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
#start-screen, #end-screen {
  background: rgba(10, 10, 18, 0.85);
  padding: 40px 60px; border-radius: 16px; text-align: center;
  pointer-events: auto; border: 1px solid rgba(255, 200, 100, 0.3);
  box-shadow: 0 0 40px rgba(255, 180, 50, 0.15);
}
#end-screen { display: none; }
h1 { color: #ffd070; font-size: 32px; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255, 180, 50, 0.5); }
p { color: #c8b898; font-size: 16px; line-height: 1.6; margin-bottom: 16px; }
.btn {
  background: linear-gradient(135deg, #ff9930, #ff6600);
  color: #1a0a00; border: none; padding: 14px 40px; font-size: 18px;
  border-radius: 30px; cursor: pointer; font-weight: bold;
  box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 140, 0, 0.6); }
pulse-counter {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  color: #ffd070; font-size: 20px; z-index: 5;
  text-shadow: 0 0 10px rgba(255, 180, 50, 0.5);
}
#restart-btn { display: none; pointer-events: auto; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="start-screen">
    <h1>🦋 Magnetic Moth</h1>
    <p>Guide the glowing moth through pulsing flowers.<br>
       Click to start. Move your cursor to steer.<br>
       Collect 3 pulses for a magical payoff!</p>
    <button class="btn" id="start-btn">Begin</button>
  </div>
  <div id="end-screen">
    <h1 id="end-title"></h1>
    <p id="end-msg"></p>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>
</div>
<pulse-counter id="pulse-counter">✦ 0 / 3</pulse-counter>

<script>
(function() {
  // === CANVAS SETUP ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // === AUDIO (Web Audio API) ===
  let audioCtx;
  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, duration, type, vol, delay) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + (delay || 0);
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start(t);
    o.stop(t + duration);
  }

  function sfxCollect() {
    playTone(523, 0.15, 'sine', 0.18, 0);
    playTone(659, 0.15, 'sine', 0.15, 0.08);
    playTone(784, 0.25, 'sine', 0.12, 0.16);
  }

  function sfxFailed() {
    playTone(300, 0.3, 'sawtooth', 0.1, 0);
    playTone(200, 0.5, 'sawtooth', 0.08, 0.15);
  }

  function sfxPayoff() {
    const notes = [523, 659, 784, 1047, 880, 1047, 1319];
    notes.forEach((n, i) => playTone(n, 0.3, 'sine', 0.12, i * 0.12));
    // Ambient hum
    playTone(130, 2.0, 'sine', 0.06, 0);
    playTone(196, 2.0, 'sine', 0.04, 0.1);
  }

  function sfxHover() {
    playTone(440 + Math.random() * 100, 0.08, 'sine', 0.04);
  }

  function sfxAmbient() {
    // Gentle background drone
    playTone(82, 3.0, 'sine', 0.02);
    playTone(110, 3.0, 'sine', 0.015);
  }

  // === GAME STATE ===
  let state = 'start'; // start, playing, ended
  let mouseX = W / 2, mouseY = H / 2;
  let moth = { x: W / 2, y: H / 2, vx: 0, vy: 0, angle: 0, wingPhase: 0, glow: 0 };
  let mouseXT = W / 2, mouseYT = H / 2; // target (mouse) with smoothing
  let pulses = []; // {x, y, phase, collected, radius, maxR, pulseDir}
  let collectCount = 0;
  const MAX_PULSES = 3;
  let time = 0;
  let particles = []; // for collect/expire effects
  let difficulty = 1;
  let gameStartTime = 0;
  let trail = []; // moth trail

  // === FLOWER PLACEMENT ===
  function spawnFlowers() {
    pulses = [];
    const count = 5 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      let x, y, attempts = 0;
      do {
        x = 100 + Math.random() * (W - 200);
        y = 100 + Math.random() * (H - 200);
        attempts++;
      } while (Math.hypot(x - W/2, y - H/2) < 200 && attempts < 20);

      pulses.push({
        x, y,
        phase: Math.random() * Math.PI * 2,
        collected: false,
        radius: 0,
        maxR: 18 + Math.random() * 10,
        pulseDir: 1,
        hue: 20 + Math.random() * 40, // warm gold/orange range
        pulseSpeed: 0.8 + Math.random() * 0.6
      });
    }
    collectCount = 0;
    document.getElementById('pulse-counter').textContent = '✦ 0 / ' + MAX_PULSES;
  }

  // === PARTICLES ===
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        size: 2 + Math.random() * 4,
        color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // === BACKGROUND STARS ===
  const stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      size: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.7
    });
  }

  function drawBackground() {
    // Dark background with subtle gradient
    const grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#12101f');
    grad.addColorStop(1, '#08080f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
      s.twinkle += s.speed * 0.02;
      const alpha = 0.3 + Math.sin(s.twinkle) * 0.25;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffe8b0';
      ctx.shadowColor = '#ffc860';
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // === DRAW FLOWERS ===
  function drawFlower(p, alpha) {
    const r = p.radius;
    const pulseScale = 1 + Math.sin(time * p.pulseSpeed + p.phase) * 0.15;
    const cr = r * pulseScale;

    ctx.save();
    ctx.globalAlpha = (p.collected ? 0.2 : alpha);
    ctx.translate(p.x, p.y);

    // Outer glow
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, cr * 3);
    glowGrad.addColorStop(0, `hsla(${p.hue}, 100%, 60%, 0.3)`);
    glowGrad.addColorStop(1, `hsla(${p.hue}, 100%, 60%, 0)`);
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, cr * 3, 0, Math.PI * 2);
    ctx.fill();

    // Petals
    const petalCount = 5;
    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2 + time * 0.2;
      ctx.save();
      ctx.rotate(angle);
      const petalGrad = ctx.createRadialGradient(cr * 0.4, 0, 0, cr * 0.4, 0, cr * 0.8);
      petalGrad.addColorStop(0, `hsla(${p.hue + 20}, 90%, 75%, 0.8)`);
      petalGrad.addColorStop(1, `hsla(${p.hue}, 80%, 50%, 0.2)`);
      ctx.fillStyle = petalGrad;
      ctx.beginPath();
      ctx.ellipse(cr * 0.6, 0, cr * 0.55, cr * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Center orb
    const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, cr * 0.4);
    centerGrad.addColorStop(0, `hsla(${p.hue - 10}, 100%, 90%, 0.95)`);
    centerGrad.addColorStop(0.5, `hsla(${p.hue}, 100%, 65%, 0.7)`);
    centerGrad.addColorStop(1, `hsla(${p.hue}, 80%, 40%, 0.1)`);
    ctx.fillStyle = centerGrad;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(0, 0, cr * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // === DRAW MOTH ===
  function drawMoth() {
    const mx = moth.x;
    const my = moth.y;
    const wingFlap = Math.sin(moth.wingPhase) * 0.4;

    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(moth.angle);

    // Glow behind moth
    const mothGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 60);
    mothGlow.addColorStop(0, `rgba(255, 220, 100, ${0.3 + moth.glow * 0.3})`);
    mothGlow.addColorStop(0.5, `rgba(255, 180, 50, ${0.1 + moth.glow * 0.1})`);
    mothGlow.addColorStop(1, 'rgba(255, 180, 50, 0)');
    ctx.fillStyle = mothGlow;
    ctx.beginPath();
    ctx.arc(0, 0, 60, 0, Math.PI * 2);
    ctx.fill();

    // Left wing
    ctx.save();
    ctx.rotate(wingFlap);
    const lwGrad = ctx.createRadialGradient(-8, 0, 2, -8, 0, 22);
    lwGrad.addColorStop(0, `rgba(255, 230, 150, 0.9)`);
    lwGrad.addColorStop(0.5, `rgba(255, 180, 60, 0.7)`);
    lwGrad.addColorStop(1, `rgba(200, 120, 40, 0.2)`);
    ctx.fillStyle = lwGrad;
    ctx.filter = 'blur(1px)';
    ctx.beginPath();
    ctx.ellipse(-8, -2, 18, 10 - wingFlap * 3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.filter = 'none';
    ctx.restore();

    // Right wing
    ctx.save();
    ctx.rotate(-wingFlap);
    const rwGrad = ctx.createRadialGradient(8, 0, 2, 8, 0, 22);
    rwGrad.addColorStop(0, `rgba(255, 230, 150, 0.9)`);
    rwGrad.addColorStop(0.5, `rgba(255, 180, 60, 0.7)`);
    rwGrad.addColorStop(1, `rgba(200, 120, 40, 0.2)`);
    ctx.fillStyle = rwGrad;
    ctx.filter = 'blur(1px)';
    ctx.beginPath();
    ctx.ellipse(8, 2, 18, 10 - wingFlap * 3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.filter = 'none';
    ctx.restore();

    // Body
    const bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
    bodyGrad.addColorStop(0, '#ffffe0');
    bodyGrad.addColorStop(0.6, '#ffd060');
    bodyGrad.addColorStop(1, '#c08030');
    ctx.fillStyle = bodyGrad;
    ctx.shadowColor = '#ffc040';
    ctx.shadowBlur = 12 + moth.glow * 8;
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#ffe0a0';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(1, -7);
    ctx.quadraticCurveTo(5, -16, 3 + Math.sin(time * 3) * 2, -20);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-1, -7);
    ctx.quadraticCurveTo(-5, -16, -3 - Math.sin(time * 3) * 2, -20);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // === DRAW TRAIL ===
  function drawTrail() {
    if (trail.length < 2) return;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < trail.length; i++) {
      const t = trail[i];
      const alpha = (i / trail.length) * 0.4;
      ctx.globalAlpha = alpha;
      const s = 2 + (i / trail.length) * 3;
      ctx.fillStyle = `hsl(${35 + (time * 10) % 20}, 80%, 70%)`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // === INPUT HANDLING ===
  document.addEventListener('mousemove', e => {
    mouseXT = e.clientX;
    mouseYT = e.clientY;
  });

  document.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseXT = e.touches[0].clientX;
    mouseYT = e.touches[0].clientY;
  }, { passive: false });

  document.addEventListener('touchstart', e => {
    if (state === 'playing') {
      mouseXT = e.touches[0].clientX;
      mouseYT = e.touches[0].clientY;
    }
  });

  // === START / RESTART ===
  document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    sfxAmbient();
    startGame();
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    sfxAmbient();
    startGame();
  });

  function startGame() {
    state = 'playing';
    time = 0;
    gameStartTime = Date.now();
    mouseX = moth.x = W / 2;
    mouseY = moth.y = H / 2;
    mouseXT = W / 2;
    mouseYT = H / 2;
    moth.vx = 0;
    moth.vy = 0;
    moth.wingPhase = 0;
    moth.glow = 0;
    particles = [];
    trail = [];
    spawnFlowers();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('pulse-counter').style.display = 'block';
  }

  // === COLLECT / FAILED ===
  function showEnd(failed) {
    state = 'ended';
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const endMsg = document.getElementById('end-msg');
    const restartBtn = document.getElementById('restart-btn');

    endScreen.style.display = 'block';
    document.getElementById('pulse-counter').style.display = 'none';

    if (failed) {
      sfxFailed();
      endTitle.textContent = 'Moth Wandering...';
      endTitle.style.color = '#ff8866';
      endMsg.textContent = `The moth drifted away after collecting ${collectCount} of ${MAX_PULSES} pulses. Mouse too far, or time ran out.`;
    } else {
      sfxPayoff();
      endTitle.textContent = '✨ Pulse Collected! ✨';
      endTitle.style.color = '#ffd070';
      endMsg.textContent = `The moth gathered all ${MAX_PULSES} magnetic pulses and glowed with radiant energy! A small victory in the dark garden.`;
    }
    restartBtn.style.display = 'inline-block';
  }

  // === MAIN GAME LOOP ===
  function update() {
    if (state !== 'playing') return;
    time += 0.016;

    // Difficulty increases over time (pressure)
    const elapsed = (Date.now() - gameStartTime) / 1000;
    difficulty = 1 + elapsed * 0.05;

    // Smooth mouse following
    const dx = mouseXT - moth.x;
    const dy = mouseYT - moth.y;
    const dist = Math.hypot(dx, dy);

    // Speed scales with distance but has max
    const maxSpeed = 4 / Math.min(difficulty, 3);
    const speed = Math.min(dist * 0.04 * difficulty, maxSpeed);

    if (dist > 5) {
      moth.vx += (dx / dist) * speed * 0.15;
      moth.vy += (dy / dist) * speed * 0.15;
    }

    // Friction
    moth.vx *= 0.92;
    moth.vy *= 0.92;

    // Move moth
    moth.x += moth.vx;
    moth.y += moth.vy;

    // Angle of movement
    if (Math.abs(moth.vx) > 0.1 || Math.abs(moth.vy) > 0.1) {
      moth.angle = Math.atan2(moth.vy, moth.vx) + Math.PI / 2;
    }

    // Wing flap
    moth.wingPhase += 0.2 + Math.abs(moth.vx) * 0.05 + Math.abs(moth.vy) * 0.05;

    // Glow based on collected pulses
    moth.glow = collectCount / MAX_PULSES;

    // Trail
    trail.push({ x: moth.x, y: moth.y });
    if (trail.length > 30) trail.shift();

    // Check boundaries - if moth goes too far from center, it's "wandering"
    const centerDist = Math.hypot(moth.x - W/2, moth.y - H/2);
    if (centerDist > Math.max(W, H) * 0.45) {
      // Moth has wandered too far
      showEnd(true);
      return;
    }

    // Check time limit (~90 seconds)
    if (elapsed > 90) {
      if (collectCount < MAX_PULSES) {
        showEnd(true);
        return;
      }
    }

    // Check pulse collection
    pulses.forEach(p => {
      if (p.collected) return;
      const pd = Math.hypot(moth.x - p.x, moth.y - p.y);
      if (pd < p.radius + 20) {
        // Magnetic attraction
        const attract = 0.15 / Math.max(pd, 1);
        moth.vx += (p.x - moth.x) * attract;
        moth.vy += (p.y - moth.y) * attract;

        if (pd < p.radius + 15) {
          p.collected = true;
          collectCount++;
          sfxCollect();
          spawnParticles(p.x, p.y, `hsl(${p.hue}, 100%, 70%)`, 20);
          document.getElementById('pulse-counter').textContent = '✦ ' + collectCount + ' / ' + MAX_PULSES;

          if (collectCount >= MAX_PULSES) {
            showEnd(false);
          }
        }
      }
    });

    // Animate pulse radii
    pulses.forEach(p => {
      p.radius += (p.maxR - p.radius) * 0.05;
    });

    updateParticles();
  }

  function render() {
    drawBackground();

    // Draw pulses
    pulses.forEach(p => {
      if (!p.collected) drawFlower(p, 1);
    });

    // Draw trail
    drawTrail();

    // Draw moth
    if (state === 'playing' || state === 'ended') {
      drawMoth();
    }

    // Draw particles
    drawParticles();

    // Cursor indicator
    if (state === 'playing') {
      ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouseX, mouseY - 12);
      ctx.lineTo(mouseX, mouseY + 12);
      ctx.moveTo(mouseX - 12, mouseY);
      ctx.lineTo(mouseX + 12, mouseY);
      ctx.stroke();
    }
  }

  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // Start render loop (game state controls gameplay)
  gameLoop();

})();
</script>
</body>
</html>
