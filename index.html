<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Ferry</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #aaddff;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a1525 0%, #020408 100%);
        }
        canvas {
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.15);
            border-radius: 4px;
            cursor: crosshair;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .button {
            pointer-events: auto;
            background: rgba(10, 25, 50, 0.8);
            border: 2px solid #3388ff;
            color: #8cf;
            padding: 15px 40px;
            font-size: 24px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(51, 136, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
        }
        .button:hover {
            background: rgba(20, 50, 100, 0.9);
            color: #fff;
            box-shadow: 0 0 30px rgba(51, 136, 255, 0.8);
            transform: scale(1.05);
        }
        #hud {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 18px;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
        #harbor-signal {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 18px;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 10;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div>Passengers: <span id="score">0</span> / 3</div>
        </div>
        <div id="harbor-signal">HARBOR AWAITS</div>
        <div id="ui-layer" class="ui-layer">
            <button id="startBtn" class="button">Launch Ferry</button>
            <button id="restartBtn" class="button hidden">Restart</button>
        </div>
    </div>

    <script>
        // --- Audio Engine ---
        const Audio = {
            ctx: null,
            masterGain: null,
            
            init() {
                if (this.ctx) return;
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.4;
                this.masterGain.connect(this.ctx.destination);
            },
            
            playLaunch() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            },
            
            playPulse() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.1);
                osc.frequency.exponentialRampToValueAtTime(440, this.ctx.currentTime + 1.5);
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start();
                osc.stop(this.ctx.currentTime + 1.5);
            },
            
            playPassenger() {
                if (!this.ctx) return;
                const notes = [440, 554, 659]; // A4, C#5, E5 (A Major chord)
                const t = this.ctx.currentTime;
                notes.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, t + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.3, t + i * 0.1 + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.1 + 1.0);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t + i * 0.1);
                    osc.stop(t + i * 0.1 + 1.2);
                });
            },

            playHarbor() {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const chords = [220, 277, 329, 440, 554];
                chords.forEach(freq => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.2, t + 1);
                    gain.gain.linearRampToValueAtTime(0, t + 4);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t);
                    osc.stop(t + 4);
                });
            },

            playRestart() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(220, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }
        };

        // --- Visuals & Graphics ---
        const canvas = document.getElementById('gameCanvas');
        // Fixed internal resolution to guarantee coordinate accuracy for the replay script
        const GAME_W = 1300;
        const GAME_H = 900;
        
        canvas.width = GAME_W;
        canvas.height = GAME_H;

        // Scale canvas to fit window while maintaining aspect ratio
        function resize() {
            const container = document.getElementById('game-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            
            const scale = Math.min(w / GAME_W, h / GAME_H);
            
            canvas.style.width = `${GAME_W * scale}px`;
            canvas.style.height = `${GAME_H * scale}px`;
            
            // Store scale for coordinate mapping
            canvas._scale = scale;
        }
        window.addEventListener('resize', resize);
        resize();

        const ctx = canvas.getContext('2d');

        // Background stars
        const stars = Array.from({length: 150}, () => ({
            x: Math.random() * GAME_W,
            y: Math.random() * GAME_H,
            size: Math.random() * 2 + 0.5,
            alpha: Math.random() * 0.5 + 0.2,
            speed: Math.random() * 0.2 + 0.05
        }));

        // --- Game State & Entities ---
        const state = {
            phase: 'initial', // initial, playing, completed
            progress: 0,
            target: 3,
            restartCount: 0,
            ferry: { x: 300, y: 420, targetX: 0, targetY: 0, vx: 0, vy: 0, boosting: false },
            pools: [],
            passengers: [],
            harbor: { x: 1100, y: 150, active: false },
            time: 0,
            effects: [] // Particles, trails
        };

        function initGame() {
            state.phase = 'initial';
            state.progress = 0;
            state.restartCount = 0;
            state.ferry = { x: 300, y: 420, targetX: 300, targetY: 420, vx: 0, vy: 0, boosting: false };
            state.passengers = [];
            state.effects = [];
            
            // Create pools based on the prompt's coordinates
            state.pools = [
                { id: 1, x: 520, y: 360, r: 40, active: true, pulse: 0, color: '#00ffcc', visited: false },
                { id: 2, x: 760, y: 430, r: 40, active: true, pulse: Math.PI, color: '#00ccff', visited: false },
                { id: 3, x: 930, y: 330, r: 40, active: true, pulse: Math.PI * 1.5, color: '#cc00ff', visited: false }
            ];
            state.harbor = { x: 1100, y: 150, pulse: 0, active: false };
            
            updateHUD();
            
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('harbor-signal').classList.add('hidden');
            document.getElementById('harbor-signal').style.opacity = 0;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('restartBtn').classList.add('hidden');
        }

        // --- Factory Evidence Contract ---
        window.__factoryxEvidence = () => {
            return {
                schema_version: 1,
                phase: state.phase,
                progress: state.progress,
                target: state.target,
                completed: state.phase === 'completed',
                restart_count: state.restartCount
            };
        };

        // --- Interaction ---
        function handleInput(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scale = canvas._scale || 1;
            
            // Calculate canvas-relative coordinates (0 to GAME_W/GAME_H)
            const mx = (e.clientX - rect.left) / scale;
            const my = (e.clientY - rect.top) / scale;

            // Initial state -> Start Game
            if (state.phase === 'initial') {
                const startX = 300;
                const startY = 420;
                const dist = Math.hypot(mx - startX, my - startY);
                
                Audio.init(); // Initialize audio context on user gesture
                
                // Click starts the game and launches the ferry towards that point
                state.phase = 'playing';
                Audio.playLaunch();
                document.getElementById('startBtn').classList.add('hidden');
                state.ferry.targetX = mx;
                state.ferry.targetY = my;
                state.ferry.boosting = true;
            }
            else if (state.phase === 'playing') {
                state.ferry.targetX = mx;
                state.ferry.targetY = my;
                state.ferry.boosting = true;
                Audio.playLaunch();
                
                // Add trajectory trail visual
                state.effects.push({ type: 'trail', x: mx, y: my, life: 1.0 });
            }
            else if (state.phase === 'completed') {
                // Restart button is at x:1100, y:740
                if (mx >= 1100 && mx <= 1300 && my >= 740 && my <= 800) {
                    Audio.playRestart();
                    state.restartCount++;
                    initGame();
                }
            }
        }
        
        // Button listeners for restart
        document.getElementById('restartBtn').addEventListener('mousedown', (e) => {
            Audio.playRestart();
            state.restartCount++;
            initGame();
        });

        canvas.addEventListener('mousedown', handleInput);
        // Add touch support for mobile testing
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInput({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: ()=>{} });
        }, { passive: false });

        // --- Update Logic ---
        function update(dt) {
            state.time += dt;

            // Stars parallax
            stars.forEach(star => {
                star.x -= star.speed * (state.ferry.boosting ? 4 : 1);
                if (star.x < 0) star.x = GAME_W;
                star.y += star.speed * 0.5;
                if (star.y > GAME_H) star.y = 0;
            });

            // Ferry Movement
            const fx = state.ferry;
            const dx = fx.targetX - fx.x;
            const dy = fx.targetY - fx.y;
            const dist = Math.hypot(dx, dy);
            
            if (dist > 5) {
                // Speed scales slightly with distance to ensure it arrives within reasonable time
                const speed = fx.boosting ? 8 : 3;
                fx.x += (dx / dist) * speed;
                fx.y += (dy / dist) * speed;
                
                // Add trail particles
                if (Math.random() > 0.5) {
                    state.effects.push({
                        type: 'trail',
                        x: fx.x + (Math.random() - 0.5) * 10,
                        y: fx.y + (Math.random() - 0.5) * 10,
                        life: 0.8,
                        color: fx.boosting ? '#ffaa00' : '#88aacc'
                    });
                }
            } else {
                fx.x = fx.targetX;
                fx.y = fx.targetY;
                fx.boosting = false;
                
                // Check Pool Collisions on arrival
                if (state.phase === 'playing') {
                    state.pools.forEach(p => {
                        if (p.active && !p.visited) {
                            const pdx = fx.x - p.x;
                            const pdy = fx.y - p.y;
                            // Collision threshold includes ferry radius
                            if (Math.hypot(pdx, pdy) < p.r + 20) {
                                p.visited = true;
                                p.active = false;
                                state.progress++;
                                Audio.playPassenger();
                                
                                // Visual explosion for landing
                                state.effects.push({ type: 'burst', x: p.x, y: p.y, life: 1.0, color: p.color });

                                // Add a passenger visual on the ferry
                                state.passengers.push({
                                    x: fx.x + (Math.random()-0.5)*20,
                                    y: fx.y - 20,
                                    phase: Math.random() * Math.PI * 2
                                });

                                if (state.progress >= state.target) {
                                    state.phase = 'completed';
                                    Audio.playHarbor();
                                    state.harbor = { ...state.harbor, active: true };
                                    document.getElementById('harbor-signal').classList.remove('hidden');
                                    document.getElementById('harbor-signal').style.opacity = 1;
                                    document.getElementById('restartBtn').classList.remove('hidden');
                                }
                                updateHUD();
                            }
                        }
                    });
                }
            }

            // Update Effects
            for (let i = state.effects.length - 1; i >= 0; i--) {
                const e = state.effects[i];
                e.life -= dt * 1.5;
                if (e.type === 'trail') {
                    e.y += 2; // Gravity
                }
                if (e.life <= 0) {
                    state.effects.splice(i, 1);
                }
            }
            
            // Update Passenger bobbing
            state.passengers.forEach(p => p.phase += 0.1);
        }

        function updateHUD() {
            document.getElementById('score').innerText = state.progress;
        }

        // --- Render Logic ---
        function draw() {
            // Clear
            ctx.fillStyle = '#050810';
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            // Draw Stars
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.alpha;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw Pools (Pulses)
            state.pools.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                if (p.visited) {
                    ctx.globalAlpha = 0.3;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = p.color;
                    ctx.fill();
                } else {
                    // Pulsing light
                    const pulse = Math.sin(state.time * 3 + p.pulse) * 0.4 + 0.6;
                    const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, 80 * pulse);
                    grad.addColorStop(0, p.color);
                    grad.addColorStop(0.5, p.color + '88');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 80 * pulse, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Core
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });

            // Draw Harbor
            if (state.harbor.active) {
                ctx.save();
                ctx.translate(state.harbor.x, state.harbor.y);
                const pulse = Math.sin(state.time * 4) * 0.5 + 0.5;
                const grad = ctx.createRadialGradient(0, 0, 20, 0, 0, 150 * pulse);
                grad.addColorStop(0, '#ffcc00');
                grad.addColorStop(0.6, '#ff6600');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.globalAlpha = 0.6 + pulse * 0.4;
                ctx.beginPath();
                ctx.arc(0, 0, 150 * pulse, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw a little harbor structure
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(-30, -10, 60, 20);
                ctx.fillRect(-10, -30, 20, 20);
                
                ctx.restore();
            }

            // Draw Ferry
            ctx.save();
            ctx.translate(state.ferry.x, state.ferry.y);
            // Rotate towards target if boosting
            if (state.ferry.boosting) {
                const dx = state.ferry.targetX - state.ferry.x;
                const dy = state.ferry.targetY - state.ferry.y;
                const angle = Math.atan2(dy, dx);
                ctx.rotate(angle);
            }
            
            // Ferry Hull
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#00aaff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-15, 12);
            ctx.lineTo(-15, -12);
            ctx.closePath();
            ctx.fill();
            
            // Cabin
            ctx.fillStyle = '#003366';
            ctx.fillRect(-5, -8, 10, 16);
            
            ctx.restore();

            // Draw Passengers on Ferry
            state.passengers.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y + Math.sin(p.phase) * 3);
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffcc00';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(0, 0, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Draw Effects
            state.effects.forEach(e => {
                ctx.save();
                ctx.globalAlpha = e.life;
                if (e.type === 'trail') {
                    ctx.fillStyle = e.color || '#88aacc';
                    ctx.fillRect(e.x, e.y, 4, 4);
                } else if (e.type === 'burst') {
                    ctx.strokeStyle = e.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, (1 - e.life) * 60, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        // --- Game Loop ---
        let lastTime = 0;
        function loop(timestamp) {
            const dt = (timestamp - lastTime) / 1000 || 0.02;
            lastTime = timestamp;
            
            update(dt);
            draw();
            
            requestAnimationFrame(loop);
        }

        // Start
        initGame();
        requestAnimationFrame(loop);

    </script>
</body>
</html>
