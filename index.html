<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #gameCanvas {
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0, 255, 120, 0.15);
    cursor: crosshair;
  }
  #restartBtn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    background: rgba(0,255,120,0.1);
    border: 2px solid rgba(0,255,120,0.4);
    color: #00ff78;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.25s;
    display: none;
    z-index: 10;
  }
  #restartBtn:hover {
    background: rgba(0,255,120,0.25);
    border-color: #00ff78;
    box-shadow: 0 0 20px rgba(0,255,120,0.3);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<button id="restartBtn">⟲ RESTART GARDEN</button>
<script>
(function() {
  // ========== GAME CONFIG ==========
  const CANVAS_W = 1200;
  const CANVAS_H = 800;
  const DIAL_CENTER_X = 600;
  const DIAL_CENTER_Y = 420;
  const DIAL_RADIUS = 190;
  const SIGNAL_COUNT = 6;
  const SIGNAL_WINDOW_DURATION = 1800; // ms
  const SIGNAL_GAP_MIN = 2200;
  const SIGNAL_GAP_MAX = 3200;
  const TOTAL_SIGNALS_NEEDED = 6; // target
  const GAME_DURATION_TOTAL = 75000; // 75 seconds max

  // ========== CANVAS SETUP ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;

  // ========== EVIDENCE STATE ==========
  let evidence = {
    schema_version: 1,
    phase: 'initial',
    progress: 0,
    target: TOTAL_SIGNALS_NEEDED,
    completed: false,
    restart_count: 0
  };

  window.__factoryxEvidence = () => ({ ...evidence });

  // ========== AUDIO ENGINE ==========
  let audioCtx = null;
  let masterGain = null;
  let isAudioStarted = false;

  function initAudio() {
    if (isAudioStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
    isAudioStarted = true;
  }

  function playTone(freq, duration, type, vol, detune) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.detune.setValueAtTime(detune || 0, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playBloomBass(freq, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  const NOTE_FREQS = [220, 261.63, 293.66, 329.63, 349.23, 392, 440, 493.88, 523.25];

  function playSuccessSound(signalsMatched) {
    if (!audioCtx) return;
    const freq = NOTE_FREQS[Math.min(signalsMatched, NOTE_FREQS.length - 1)];
    playTone(freq, 0.6, 'sine', 0.25, 0);
    setTimeout(() => playTone(freq * 1.5, 0.5, 'triangle', 0.15, 0), 100);
    setTimeout(() => playSuccessBloom(freq), 200);
  }

  function playSuccessBloom(baseFreq) {
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        playTone(baseFreq * (1 + i * 0.25), 0.8, 'sine', 0.12, -5 + i * 3);
      }, i * 80);
    }
    playBloomBass(baseFreq * 0.5, 1.2);
  }

  function playMissSound() {
    if (!audioCtx) return;
    playTone(120, 0.3, 'sawtooth', 0.15, -20);
    playTone(90, 0.4, 'square', 0.08, 0);
  }

  // Ambient drone
  let droneOsc = null;
  let droneGain = null;

  function startDrone() {
    if (!audioCtx || droneOsc) return;
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    droneOsc.type = 'sine';
    droneOsc.frequency.setValueAtTime(82, audioCtx.currentTime);
    droneGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    droneOsc.connect(droneGain);
    droneGain.connect(masterGain);
    droneOsc.start();
  }

  function setDroneFreq(freq) {
    if (!droneOsc || !audioCtx) return;
    droneOsc.frequency.linearRampToValueAtTime(freq, audioCtx.currentTime + 0.5);
  }

  function setDroneGain(g) {
    if (!droneGain || !audioCtx) return;
    droneGain.gain.linearRampToValueAtTime(g, audioCtx.currentTime + 0.3);
  }

  // ========== SIGNAL TARGETS ==========
  const signalArcs = [];
  let activeSignal = null;
  let nextSignalTime = 0;
  let signalsMatched = 0;
  let signalsMissed = 0;
  let gameTime = 0;
  let gameStartTime = 0;
  let gameRunning = false;
  let gameFinished = false;

  function generateSignalPositions() {
    signalArcs.length = 0;
    const count = SIGNAL_COUNT;
    for (let i = 0; i < count; i++) {
      const angle1 = (Math.PI * 2 / count) * i - Math.PI / 2 + 0.15;
      const angle2 = (Math.PI * 2 / count) * i - Math.PI / 2 + (Math.PI * 2 / count) - 0.15;
      const hue = (360 / count) * i;
      signalArcs.push({ angle1, angle2, hue, locked: i < signalsMatched });
    }
  }

  function spawnActiveSignal() {
    const available = signalArcs.map((a, i) => i).filter(i => !a.locked && i !== activeSignalIndex);
    if (available.length === 0) return;
    const idx = available[Math.floor(Math.random() * available.length)];
    activeSignalIndex = idx;
    activeSignal = {
      index: idx,
      startTime: Date.now(),
      duration: SIGNAL_WINDOW_DURATION - (signalsMatched * 150), // gets shorter
      angle1: signalArcs[idx].angle1,
      angle2: signalArcs[idx].angle2,
      hue: signalArcs[idx].hue
    };
    nextSignalTime = Date.now() + SIGNAL_WINDOW_DURATION + SIGNAL_GAP_MIN + Math.random() * (SIGNAL_GAP_MAX - SIGNAL_GAP_MIN);
  }

  let activeSignalIndex = -1;

  // ========== PARTICLE SYSTEM ==========
  const particles = [];

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.01 + Math.random() * 0.02,
        color,
        size: 2 + Math.random() * 4
      });
    }
  }

  function spawnBloomParticles(cx, cy) {
    const colors = ['#00ff78', '#78ff00', '#00ddff', '#ff7800', '#ff00aa', '#aa78ff'];
    for (let i = 0; i < 80; i++) {
      const angle = (Math.PI * 2 / 80) * i + Math.random() * 0.2;
      const speed = 2 + Math.random() * 6;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.005 + Math.random() * 0.01,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 3 + Math.random() * 6
      });
    }
  }

  // ========== PLANT RENDERING ==========
  function drawPlant(cx, cy, growth, time) {
    const branches = Math.floor(growth * 8);
    const branchLen = growth * 60;
    ctx.save();
    ctx.translate(cx, cy);

    // Root glow
    const rootGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 30 + growth * 20);
    rootGrad.addColorStop(0, `rgba(0,255,120,${0.2 + growth * 0.3})`);
    rootGrad.addColorStop(1, 'rgba(0,255,120,0)');
    ctx.fillStyle = rootGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 30 + growth * 20, 0, Math.PI * 2);
    ctx.fill();

    // Draw branches using recursive fractal
    function branch(x, y, angle, len, depth, phase) {
      if (depth <= 0 || len < 2) return;
      const ex = x + Math.cos(angle) * len;
      const ey = y + Math.sin(angle) * len;
      const alpha = Math.min(1, depth / 3) * (0.4 + growth * 0.6);

      // Branch color
      const hue = 120 + depth * 15 + phase * 30;
      const lightness = 30 + depth * 8;
      ctx.strokeStyle = `hsla(${hue}, 80%, ${lightness}%, ${alpha})`;
      ctx.lineWidth = depth * 1.2;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(x, y);
      // Slight curve for organic feel
      const cpx = x + Math.cos(angle + 0.3) * len * 0.5;
      const cpy = y + Math.sin(angle + 0.3) * len * 0.5;
      ctx.quadraticCurveTo(cpx, cpy, ex, ey);
      ctx.stroke();

      // Leaves at tips
      if (depth <= 2 && depth > 0) {
        const leafAlpha = alpha * 0.7;
        ctx.fillStyle = `hsla(${140 + depth * 10 + Math.sin(phase) * 20}, 90%, 50%, ${leafAlpha})`;
        ctx.beginPath();
        ctx.ellipse(ex, ey, len * 0.2, len * 0.1, angle, 0, Math.PI * 2);
        ctx.fill();
      }

      const nextLen = len * (0.6 + Math.sin(phase) * 0.05);
      branch(ex, ey, angle - 0.4 - Math.sin(time * 0.001 + depth) * 0.15, nextLen, depth - 1, phase + 1);
      branch(ex, ey, angle + 0.4 + Math.sin(time * 0.0013 + depth) * 0.15, nextLen, depth - 1, phase + 1.5);
    }

    // Main stems
    const stemCount = Math.max(1, branches);
    for (let i = 0; i < stemCount; i++) {
      const angle = -Math.PI / 2 + (i - (stemCount - 1) / 2) * 0.25;
      branch(0, 0, angle, branchLen, 5, i * 0.7 + Math.sin(time * 0.0005) * 2);
    }

    // Center glow
    if (growth > 0.5) {
      const glowSize = 10 + growth * 25;
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
      glow.addColorStop(0, `rgba(0,255,200,${growth * 0.6})`);
      glow.addColorStop(0.5, `rgba(100,255,150,${growth * 0.2})`);
      glow.addColorStop(1, 'rgba(0,255,120,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
      ctx.fill();
    }

    // Bloom petals at payoff
    if (growth > 0.95) {
      const petalCount = 8;
      const petalRadius = 20 + growth * 40;
      const petalAlpha = (growth - 0.95) * 20;
      for (let i = 0; i < petalCount; i++) {
        const angle = (Math.PI * 2 / petalCount) * i + time * 0.001;
        const px = Math.cos(angle) * petalRadius;
        const py = Math.sin(angle) * petalRadius;
        ctx.fillStyle = `hsla(${60 + i * 30}, 100%, 70%, ${petalAlpha * 0.5})`;
        ctx.beginPath();
        ctx.ellipse(px, py, 12, 6, angle, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ========== DIAL RENDERING ==========
  function drawDial(cx, cy, radius, time) {
    ctx.save();
    ctx.translate(cx, cy);

    // Outer ring
    ctx.strokeStyle = 'rgba(0,255,120,0.15)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, radius + 10, 0, Math.PI * 2);
    ctx.stroke();

    // Inner circle
    const bgGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
    bgGrad.addColorStop(0, 'rgba(0,20,15,0.9)');
    bgGrad.addColorStop(0.7, 'rgba(0,15,10,0.85)');
    bgGrad.addColorStop(1, 'rgba(0,10,8,0.9)');
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fill();

    // Signal arcs
    signalArcs.forEach((arc, i) => {
      const isMatched = arc.locked;
      const isActive = activeSignal && activeSignal.index === i;

      // Base arc
      ctx.strokeStyle = isMatched
        ? `hsla(${arc.hue}, 80%, 50%, 0.5)`
        : 'rgba(50,80,70,0.4)';
      ctx.lineWidth = isMatched ? 8 : 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(0, 0, radius, arc.angle1, arc.angle2);
      ctx.stroke();

      // Active signal sweep
      if (isActive && activeSignal) {
        const elapsed = Date.now() - activeSignal.startTime;
        const progress = Math.min(1, elapsed / activeSignal.duration);
        const sweepAngle = arc.angle1 + (arc.angle2 - arc.angle1) * progress;

        // Glow arc
        ctx.strokeStyle = `hsla(${activeSignal.hue}, 90%, 60%, ${0.6 * (1 - progress * 0.3)})`;
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.arc(0, 0, radius, arc.angle1, sweepAngle);
        ctx.stroke();

        // Bright arc on top
        ctx.strokeStyle = `hsla(${activeSignal.hue}, 100%, 75%, 0.9)`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, radius, arc.angle1, sweepAngle);
        ctx.stroke();

        // Fade edge glow
        const ex = Math.cos(sweepAngle) * radius;
        const ey = Math.sin(sweepAngle) * radius;
        const edgeGlow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 25);
        edgeGlow.addColorStop(0, `hsla(${activeSignal.hue}, 100%, 80%, 0.8)`);
        edgeGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = edgeGlow;
        ctx.beginPath();
        ctx.arc(ex, ey, 25, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Center decoration
    ctx.fillStyle = 'rgba(0,255,120,0.3)';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();

    // Tick marks around edge
    for (let i = 0; i < 36; i++) {
      const angle = (Math.PI * 2 / 36) * i;
      const innerR = radius - 28;
      const outerR = radius - 22;
      ctx.strokeStyle = 'rgba(0,255,120,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
      ctx.stroke();
    }

    ctx.restore();
  }

  // ========== MAIN RENDER ==========
  let plantGrowth = 0;
  let bloomIntensity = 0;
  let screenShake = 0;
  let startTimeMs = 0;

  function render(time) {
    // Clear
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Background subtle gradient
    const bgGrad = ctx.createRadialGradient(CANVAS_W / 2, CANVAS_H / 2, 100, CANVAS_W / 2, CANVAS_H / 2, 600);
    bgGrad.addColorStop(0, 'rgba(0,30,15,0.3)');
    bgGrad.addColorStop(1, 'rgba(5,5,10,0)');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    ctx.save();

    // Screen shake
    if (screenShake > 0) {
      const shakeX = (Math.random() - 0.5) * screenShake * 3;
      const shakeY = (Math.random() - 0.5) * screenShake * 3;
      ctx.translate(shakeX, shakeY);
      screenShake *= 0.9;
      if (screenShake < 0.1) screenShake = 0;
    }

    // Draw dial
    drawDial(DIAL_CENTER_X, DIAL_CENTER_Y, DIAL_RADIUS, time);

    // Draw plant
    drawPlant(DIAL_CENTER_X, DIAL_CENTER_Y, plantGrowth, time);

    ctx.restore();

    // Draw particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      const alpha = p.life;
      ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('hsl', 'hsla');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }

    // UI overlay
    drawUI(time);
  }

  function drawUI(time) {
    // Title
    ctx.fillStyle = 'rgba(0,255,120,0.7)';
    ctx.font = '18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SIGNAL GARDEN', CANVAS_W / 2, 40);

    // Subtitle
    ctx.fillStyle = 'rgba(0,200,100,0.4)';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillText('tune the dial · match the signals · nurture your garden', CANVAS_W / 2, 62);

    // Progress
    if (gameRunning && !gameFinished) {
      ctx.fillStyle = 'rgba(0,255,120,0.6)';
      ctx.font = '14px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`signal: ${signalsMatched} / ${TOTAL_SIGNALS_NEEDED}`, CANVAS_W / 2, 760);
    }

    if (gameFinished) {
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,255,120,0.8)';
      ctx.font = 'bold 28px "Courier New", monospace';

      if (signalsMatched >= TOTAL_SIGNALS_NEEDED) {
        ctx.fillText('✦ BLOOM ACHIEVED ✦', CANVAS_W / 2, CANVAS_H / 2 - 40);
        ctx.fillStyle = 'rgba(100,255,150,0.6)';
        ctx.font = '16px "Courier New", monospace';
        ctx.fillText('Your garden has flowered in harmony.', CANVAS_W / 2, CANVAS_H / 2 + 10);
      } else {
        ctx.fillText('WITHERED', CANVAS_W / 2, CANVAS_H / 2 - 40);
        ctx.fillStyle = 'rgba(255,100,100,0.6)';
        ctx.font = '16px "Courier New", monospace';
        ctx.fillText(`Only ${signalsMatched} of ${TOTAL_SIGNALS_NEEDED} signals matched. The garden withers.`, CANVAS_W / 2, CANVAS_H / 2 + 10);
      }
    }
  }

  // ========== GAME LOGIC ==========
  function updateGame(time) {
    if (!gameRunning || gameFinished) return;

    const now = Date.now();

    // Check for active signal expiry
    if (activeSignal) {
      const elapsed = now - activeSignal.startTime;
      if (elapsed > activeSignal.duration) {
        // Signal missed
        signsMissed();
      }
    }

    // Spawn next signal
    if (!activeSignal && now >= nextSignalTime) {
      spawnActiveSignal();
    }

    // Time-based pressure
    const elapsed = now - gameStartTime;
    if (elapsed > GAME_DURATION_TOTAL * 0.7) {
      // Increase signal speed near end
      SIGNAL_WINDOW_DURATION; // already shortened by signalsMatched
    }

    // Gradual plant growth from signals
    plantGrowth = signalsMatched / TOTAL_SIGNALS_NEEDED;

    // Bloom pulse
    if (signalsMatched >= TOTAL_SIGNALS_NEEDED && !gameFinished) {
      bloomIntensity = Math.min(1, bloomIntensity + 0.02);
      if (bloomIntensity >= 1) {
        triggerPayoff();
      }
    }
  }

  function signsMissed() {
    signalsMissed++;
    activeSignal = null;
    playMissSound();
    screenShake = 0.5;

    // Reduce plant growth on miss
    plantGrowth = Math.max(0, plantGrowth - 0.05);

    ctx.save();
    spawnParticles(
      DIAL_CENTER_X + Math.cos(activeSignal?.angle1 || 0) * DIAL_RADIUS,
      DIAL_CENTER_Y + Math.sin(activeSignal?.angle1 || 0) * DIAL_RADIUS,
      'rgba(255,80,80,1)', 10
    );
    ctx.restore();

    // Check failure
    if (signalsMissed >= 3) {
      gameFinished = true;
      evidence.phase = 'completed';
      evidence.completed = false;
      evidence.progress = signalsMatched;
      evidence.target = TOTAL_SIGNALS_NEEDED;
    }

    nextSignalTime = Date.now() + SIGNAL_GAP_MIN + Math.random() * (SIGNAL_GAP_MAX - SIGNAL_GAP_MIN);
  }

  function triggerPayoff() {
    gameFinished = true;
    gameRunning = false;
    evidence.phase = 'completed';
    evidence.completed = true;
    evidence.progress = TOTAL_SIGNALS_NEEDED;
    evidence.target = TOTAL_SIGNALS_NEEDED;

    // Massive bloom particle burst
    spawnBloomParticles(DIAL_CENTER_X, DIAL_CENTER_Y);
    spawnBloomParticles(DIAL_CENTER_X, DIAL_CENTER_Y);

    // Audio payoff
    playSuccessBloom(440);
    playBloomBass(110, 2.5);
    setTimeout(() => playBloomBass(82, 2), 400);

    // Shake
    screenShake = 3;

    // Show restart
    document.getElementById('restartBtn').style.display = 'block';
  }

  // ========== INPUT HANDLING ==========
  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    const x = (e.clientX - rect.left) * scaleX - DIAL_CENTER_X;
    const y = (e.clientY - rect.top) * scaleY - DIAL_CENTER_Y;

    const dist = Math.sqrt(x * x + y * y);

    if (!audioCtx) {
      initAudio();
      if (!isAudioStarted) return;
      startDrone();
      gameRunning = true;
      gameFinished = false;
      gameStartTime = Date.now();
      evidence.phase = 'playing';
      signalsMatched = 0;
      signalsMissed = 0;
      plantGrowth = 0;
      bloomIntensity = 0;
      evidence.progress = 0;
      nextSignalTime = Date.now() + 2000;
      spawnActiveSignal();
      playTone(523.25, 0.3, 'sine', 0.2, 0);
      return;
    }

    if (gameFinished) return;
    if (!gameRunning) return;

    // Check if click is on the dial ring
    const dialInner = DIAL_RADIUS - 30;
    const dialOuter = DIAL_RADIUS + 8;
    if (dist < dialInner || dist > dialOuter) return;

    const angle = Math.atan2(y, x);
    // Normalize to 0..2PI
    const normalizedAngle = angle < 0 ? angle + Math.PI * 2 : angle;

    // Find active signal
    if (!activeSignal) return;

    const arcCenter = (activeSignal.angle1 + activeSignal.angle2) / 2;
    let angleDiff = Math.abs(normalizedAngle - arcCenter);
    if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;

    const arcSpan = activeSignal.angle2 - activeSignal.angle1;
    const tolerance = arcSpan * 0.7;

    if (angleDiff < tolerance) {
      // Signal matched!
      signalArcs[activeSignal.index].locked = true;
      signalsMatched++;
      evidence.progress = signalsMatched;
      evidence.phase = 'playing';

      playSuccessSound(signalsMatched);
      spawnParticles(
        DIAL_CENTER_X + Math.cos(arcCenter) * DIAL_RADIUS,
        DIAL_CENTER_Y + Math.sin(arcCenter) * DIAL_RADIUS,
        `hsl(${activeSignal.hue}, 100%, 70%)`, 20
      );

      // Boost drone freq based on progress
      setDroneFreq(82 + signalsMatched * 20);
      setDroneGain(0.06 + signalsMatched * 0.03);

      // Boost plant growth
      plantGrowth = Math.min(1, signalsMatched / TOTAL_SIGNALS_NEEDED);

      // Increase bloom intensity
      bloomIntensity = signalsMatched / TOTAL_SIGNALS_NEEDED;

      activeSignal = null;
      nextSignalTime = Date.now() + SIGNAL_GAP_MIN + Math.random() * (SIGNAL_GAP_MAX - SIGNAL_GAP_MIN);

      // Final signal matched - bloom immediately
      if (signalsMatched >= TOTAL_SIGNALS_NEEDED) {
        bloomIntensity = 1;
        triggerPayoff();
      }
    } else {
      // Clicked wrong signal area - small miss penalty
      // Don't penalize clicks outside signals
    }
  });

  // ========== RESTART ==========
  document.getElementById('restartBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    // Reset everything
    signalsMatched = 0;
    signalsMissed = 0;
    plantGrowth = 0;
    bloomIntensity = 0;
    gameRunning = false;
    gameFinished = false;
    activeSignal = null;
    particles.length = 0;
    screenShake = 0;
    evidence.phase = 'initial';
    evidence.progress = 0;
    evidence.completed = false;
    evidence.restart_count++;
    evidence.target = TOTAL_SIGNALS_NEEDED;
    document.getElementById('restartBtn').style.display = 'none';
    setDroneGain(0.06);
    setDroneFreq(82);
    nextSignalTime = 0;

    // Restart audio
    if (audioCtx) {
      audioCtx.close().then(() => {
        audioCtx = null;
        isAudioStarted = false;
        masterGain = null;
        droneOsc = null;
        droneGain = null;
      });
    }
  });

  // ========== GAME LOOP ==========
  function gameLoop(time) {
    updateGame(time);
    render(time);
    // Update evidence continuously
    evidence.phase = gameFinished ? 'completed' : (gameRunning ? 'playing' : 'initial');
    evidence.progress = signalsMatched;
    evidence.completed = gameFinished && signalsMatched >= TOTAL_SIGNALS_NEEDED;
    evidence.target = TOTAL_SIGNALS_NEEDED;
    evidence.restart_count = document.getElementById('restartBtn').style.display !== 'none' ?
      parseFloat(canvas.getAttribute('data-restarts') || '0') + (gameFinished ? 0 : 0) : 0;

    requestAnimationFrame(gameLoop);
  }

  // Fix restart counter
  let restartCount = 0;
  document.getElementById('restartBtn').addEventListener('click', function() {
    restartCount++;
    evidence.restart_count = restartCount;
    canvas.setAttribute('data-restarts', restartCount.toString());
  });

  // ========== INIT ==========
  generateSignalPositions();
  requestAnimationFrame(gameLoop);

})();
</script>
