<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #080814;
    overflow: hidden;
    font-family: Georgia, serif;
    touch-action: none;
    cursor: crosshair;
}
canvas { display: block; }
.overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 10; transition: opacity 1s ease;
}
.overlay.hidden {
    opacity: 0; pointer-events: none;
}
.overlay h1 {
    color: #ffe4a1;
    font-size: 3rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px #ffaa00;
    letter-spacing: 2px;
    text-align: center;
}
.overlay p {
    color: #aabbcc;
    font-size: 1.2rem;
    margin-bottom: 2rem;
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
}
.overlay button {
    background: transparent;
    border: 2px solid #ffe4a1;
    color: #ffe4a1;
    padding: 12px 32px;
    font-family: inherit;
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
    margin: 5px;
}
.overlay button:hover {
    background: #ffe4a1;
    color: #080814;
    box-shadow: 0 0 20px #ffaa00;
}
</style>
</head>
<body onload="initCanvas()">
<canvas id="gameCanvas" width="1200" height="800"></canvas>
<div class="overlay" id="start-screen">
    <h1>Magnetic Moth</h1>
    <p>Guide the moth through the garden.<br>Collect 3 pulses for a moment of light.<br>Move faster to dodge the shadows.</p>
    <button id="start-btn">Begin</button>
</div>
<div class="overlay hidden" id="end-screen">
    <h1 id="end-title">Goodnight</h1>
    <p id="end-reason">The garden rests.</p>
    <button id="end-restart">Rest Again</button>
</div>
<script>
var canvas, ctx, W, H;
var audioCtx, masterGain, ambientNode;
var state;
var TARGET_PULSES = 3;
var MAX_DURATION = 90;
var MOTH_SIZE = 18;
var FLOWER_SIZE = 40;
var SHADOW_SIZE = 50;
var MAGNETIC_RADIUS = 250;
var MAGNETIC_PULL = 0.08;
var MOTH_SPEED = 4.5;
var SHADOW_SPEED_BASE = 2.8;
var lastTime = 0;
var isMoving = false;
var mouseX = 0, mouseY = 0;
var flowers = [];
var shadows = [];
var particles = [];
var globalPulse = 0;

function initCanvas() {
    canvas = document.getElementById("gameCanvas");
    ctx = canvas.getContext("2d");
    W = 1200;
    H = 800;
    canvas.width = W;
    canvas.height = H;
    document.getElementById("start-btn").addEventListener("click", function(e) {
        e.stopPropagation();
        startGame();
    });
    document.getElementById("end-restart").addEventListener("click", function(e) {
        e.stopPropagation();
        restartGame();
    });
    canvas.addEventListener("click", function() {
        if (state.phase === "initial") startGame();
        else if (state.phase === "completed") restartGame();
    });
    canvas.addEventListener("mousemove", onMove);
    canvas.addEventListener("touchmove", function(e) {
        e.preventDefault();
        var touch = e.touches[0];
        onMove({ clientX: touch.clientX, clientY: touch.clientY });
    });
    canvas.addEventListener("touchstart", function(e) {
        var touch = e.touches[0];
        onMove({ clientX: touch.clientX, clientY: touch.clientY });
        if (state.phase === "initial") startGame();
        else if (state.phase === "completed") restartGame();
    });
    canvas.addEventListener("contextmenu", function(e) { e.preventDefault(); });
    initState();
    requestAnimationFrame(loop);
}

function onMove(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var scaleY = H / rect.height;
    mouseX = (e.clientX - rect.left) * scaleX - W / 2;
    mouseY = (e.clientY - rect.top) * scaleY - H / 2;
}

function initAudio() {
    if (audioCtx) return;
    var Ctx = window.AudioContext || window.webkitAudioContext;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
}

function playCollect() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(523.25, t);
    osc.frequency.exponentialRampToValueAtTime(1046.5, t + 0.1);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.8, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(g).connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.6);
    var osc2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    osc2.type = "triangle";
    osc2.frequency.setValueAtTime(1046.5, t);
    osc2.frequency.exponentialRampToValueAtTime(523.25, t + 0.3);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.4, t + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc2.connect(g2).connect(masterGain);
    osc2.start(t);
    osc2.stop(t + 0.5);
}

function playHit() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.5);
    g.gain.setValueAtTime(0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(g).connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.6);
}

function playPayoff() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    [523.25, 659.25, 783.99].forEach(function(freq) {
        var osc = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
        osc.connect(g).connect(masterGain);
        osc.start(t);
        osc.stop(t + 2.6);
    });
}

function playRestart() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    [440, 554, 659].forEach(function(freq, i) {
        var osc = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t + i * 0.15);
        g.gain.linearRampToValueAtTime(0.3, t + i * 0.15 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 1);
        osc.connect(g).connect(masterGain);
        osc.start(t + i * 0.15);
        osc.stop(t + i * 0.15 + 1.1);
    });
}

function startAmbient() {
    if (ambientNode || !audioCtx) return;
    var bufferSize = 2 * audioCtx.sampleRate;
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    var lastOut = 0;
    for (var i = 0; i < bufferSize; i++) {
        var white = Math.random() * 2 - 1;
        lastOut = (lastOut + 0.02 * white) / 1.02;
        data[i] = lastOut * 3.5;
    }
    ambientNode = audioCtx.createBufferSource();
    ambientNode.buffer = buffer;
    ambientNode.loop = true;
    var gain = audioCtx.createGain();
    gain.gain.value = 0.15;
    ambientNode.connect(gain).connect(masterGain);
    ambientNode.start();
}

function initState() {
    state = {
        phase: "initial",
        progress: 0,
        target: TARGET_PULSES,
        completed: false,
        restartCount: 0,
        running: false,
        time: 0,
        moth: { x: 0, y: 0, vx: 0, vy: 0, angle: 0 },
        intensity: 1,
        globalPulse: 0,
    };
    flowers = [];
    shadows = [];
    particles = [];
    state.flowers = flowers;
    state.shadows = shadows;
    state.particles = particles;
}

function startGame() {
    initAudio();
    gameInit();
    startAmbient();
    state.phase = "playing";
    state.completed = false;
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.add("hidden");
    playRestart();
}

function restartGame() {
    state.restartCount++;
    playRestart();
    gameInit();
    state.phase = "playing";
    state.completed = false;
    document.getElementById("end-screen").classList.add("hidden");
}

function gameInit() {
    state.moth.x = 0;
    state.moth.y = 0;
    state.moth.vx = 0;
    state.moth.vy = 0;
    state.moth.angle = 0;
    flowers = [];
    for (var i = 0; i < 15; i++) {
        flowers.push({
            x: (Math.random() - 0.5) * W * 1.2,
            y: (Math.random() - 0.5) * H * 1.2,
            pulsePhase: Math.random() * Math.PI * 2,
            collected: false,
            color: Math.random() > 0.5 ? "#66ff99" : "#ffcc66",
        });
    }
    shadows = [];
    spawnShadow();
    particles = [];
    state.running = true;
    state.time = 0;
    state.intensity = 1;
    state.progress = 0;
    globalPulse = 0;
}

function spawnShadow() {
    var sx, sy;
    if (Math.random() > 0.5) {
        sx = (Math.random() > 0.5 ? 1 : -1) * W * 0.7;
        sy = (Math.random() - 0.5) * H * 0.5;
    } else {
        sx = (Math.random() - 0.5) * W * 0.5;
        sy = (Math.random() > 0.5 ? 1 : -1) * H * 0.7;
    }
    shadows.push({ x: sx, y: sy, vx: 0, vy: 0, angle: 0 });
}

function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var sp = Math.random() * 4;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * sp,
            vy: Math.sin(angle) * sp,
            life: 1,
            decay: 0.01 + Math.random() * 0.03,
            color: color,
            size: 2 + Math.random() * 3,
        });
    }
}

function gameOver(won) {
    state.phase = "completed";
    state.completed = won;
    state.running = false;
    var endTitle = document.getElementById("end-title");
    var endReason = document.getElementById("end-reason");
    if (won) {
        playPayoff();
        endTitle.textContent = "The Garden Blooms";
        endTitle.style.color = "#ffe4a1";
        endTitle.style.textShadow = "0 0 30px #ffcc00";
        endReason.textContent = "You guided the moths to blooming. A moment of pure light.";
    } else {
        playHit();
        endTitle.textContent = "Faded to Grey";
        endTitle.style.color = "#777";
        endTitle.style.textShadow = "none";
        endReason.textContent = "The shadows consumed you. But light always returns.";
    }
    endTitle.style.display = "block";
    endReason.style.display = "block";
    document.getElementById("end-restart").style.display = "inline-block";
    endReason.textContent = won
        ? "You guided the moths to blooming. A moment of pure light."
        : "The shadows consumed you. But light always returns.";
    setTimeout(function () {
        if (ambientNode) {
            ambientNode.stop();
            ambientNode = null;
        }
    }, 3000);
}

function update(dt) {
    if (!state.running) return;
    state.time += dt;
    if (state.time % 15 < dt && shadows.length < 8) spawnShadow();
    state.intensity = 1 + state.time / 60;
    var chaseSpeed = SHADOW_SPEED_BASE * state.intensity;
    var moth = state.moth;
    var nearestFlower = null;
    var minDist = Infinity;
    for (var i = 0; i < flowers.length; i++) {
        var f = flowers[i];
        if (f.collected) continue;
        var dx = f.x - moth.x;
        var dy = f.y - moth.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MAGNETIC_RADIUS) {
            var pull = (1 - dist / MAGNETIC_RADIUS) * MAGNETIC_PULL;
            moth.vx += dx * pull;
            moth.vy += dy * pull;
            if (dist < minDist) {
                minDist = dist;
                nearestFlower = f;
            }
        }
        if (dist < FLOWER_SIZE / 2 + MOTH_SIZE / 2) {
            f.collected = true;
            playCollect();
            spawnParticles(f.x, f.y, f.color, 15);
            state.progress++;
            if (state.progress >= TARGET_PULSES) {
                gameOver(true);
                return;
            }
        }
    }
    var dxM = mouseX - moth.x;
    var dyM = mouseY - moth.y;
    var distM = Math.sqrt(dxM * dxM + dyM * dyM);
    isMoving = distM > 5;
    if (isMoving) {
        var targetAngle = Math.atan2(dyM, dxM);
        var currentAngle = Math.atan2(moth.vy, moth.vx);
        var diff = targetAngle - currentAngle;
        if (diff > Math.PI) diff -= 2 * Math.PI;
        if (diff < -Math.PI) diff += 2 * Math.PI;
        var newAngle = currentAngle + diff * 0.1;
        moth.vx = Math.cos(newAngle) * MOTH_SPEED;
        moth.vy = Math.sin(newAngle) * MOTH_SPEED;
    } else {
        moth.vx *= 0.92;
        moth.vy *= 0.92;
    }
    var speed = Math.sqrt(moth.vx * moth.vx + moth.vy * moth.vy);
    if (speed > MOTH_SPEED) {
        moth.vx = (moth.vx / speed) * MOTH_SPEED;
        moth.vy = (moth.vy / speed) * MOTH_SPEED;
    }
    moth.x += moth.vx;
    moth.y += moth.vy;
    if (isMoving) {
        var ta = Math.atan2(dyM, dxM);
        moth.angle += (ta - moth.angle) * 0.1;
    }
    if (state.time > MAX_DURATION) {
        gameOver(false);
        return;
    }
    for (var i = 0; i < shadows.length; i++) {
        var s = shadows[i];
        var sdx = moth.x - s.x;
        var sdy = moth.y - s.y;
        var sdist = Math.sqrt(sdx * sdx + sdy * sdy);
        if (sdist > 1) {
            s.vx += (sdx / sdist) * 0.15;
            s.vy += (sdy / sdist) * 0.15;
            var ssp = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
            if (ssp > chaseSpeed) {
                s.vx = (s.vx / ssp) * chaseSpeed;
                s.vy = (s.vy / ssp) * chaseSpeed;
            }
        }
        s.angle += 0.05;
        s.x += s.vx;
        s.y += s.vy;
        if (sdist < FLOWER_SIZE / 2 + MOTH_SIZE / 2) {
            gameOver(false);
            return;
        }
    }
    for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }
    globalPulse = (Math.sin(state.time * 2) + 1) / 2;
}

function drawMoth() {
    var moth = state.moth;
    ctx.save();
    ctx.translate(moth.x, moth.y);
    ctx.rotate(moth.angle);
    var grad = ctx.createRadialGradient(0, 0, 3, 0, 0, MOTH_SIZE * 2.5);
    grad.addColorStop(0, "#ffe4a1");
    grad.addColorStop(0.3, "#ffaa0066");
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, MOTH_SIZE * 2.5, 0, Math.PI * 2);
    ctx.fill();
    var wingFlap = Math.sin(state.time * 20) * 0.7;
    ctx.fillStyle = "#ffe4a1";
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.ellipse(-10, -3, 16, 8 + wingFlap * 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, -3, 16, 8 + wingFlap * 4, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = "#ffcc88";
    ctx.beginPath();
    ctx.ellipse(-8, 5, 12, 6 + wingFlap * 2, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, 5, 12, 6 + wingFlap * 2, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#3a3000";
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#ffe4a1";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(4, -1);
    ctx.quadraticCurveTo(12, -10, 18, -6);
    ctx.moveTo(4, 1);
    ctx.quadraticCurveTo(12, 10, 18, 6);
    ctx.stroke();
    ctx.restore();
}

function drawFlower(f) {
    if (f.collected) return;
    var pulse = (Math.sin(state.time * 3 + f.pulsePhase) + 1) / 2;
    var r = FLOWER_SIZE / 2 + pulse * 6;
    var grad = ctx.createRadialGradient(f.x, f.y, r * 0.2, f.x, f.y, r * 3);
    grad.addColorStop(0, f.color);
    grad.addColorStop(0.3, f.color + "88");
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(f.x, f.y, r * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(f.x, f.y, r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 + pulse * 0.4;
    for (var p = 0; p < 6; p++) {
        var angle = (p / 6) * Math.PI * 2 + state.time * 0.5;
        ctx.beginPath();
        ctx.ellipse(
            f.x + Math.cos(angle) * r * 0.7,
            f.y + Math.sin(angle) * r * 0.7,
            r * 0.5, r * 0.2, angle, 0, Math.PI * 2
        );
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawShadow(s) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.fillStyle = "#0a0015";
    ctx.strokeStyle = "#8800cc";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var j = 0; j < Math.PI * 2; j += 0.3) {
        var r = SHADOW_SIZE * (0.5 + 0.15 * Math.sin(j * 5 + state.time * 2) + 0.1 * Math.cos(j * 3));
        var px = Math.cos(j) * r;
        var py = Math.sin(j) * r;
        if (j === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#ff3344";
    ctx.globalAlpha = 0.6 + Math.sin(state.time * 3) * 0.3;
    ctx.beginPath();
    ctx.arc(-8, -8, 4, 0, Math.PI * 2);
    ctx.arc(8, -8, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ff6677";
    ctx.beginPath();
    ctx.arc(-8, -8, 2, 0, Math.PI * 2);
    ctx.arc(8, -8, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawParticle(p) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
}

function drawHUD() {
    ctx.fillStyle = "#ffe4a1";
    ctx.font = "18px Georgia";
    ctx.textAlign = "left";
    ctx.fillText("Pulses: " + state.progress + " / " + TARGET_PULSES, -W / 2 + 30, -H / 2 + 50);
    ctx.textAlign = "right";
    var timeLeft = Math.max(0, MAX_DURATION - state.time);
    ctx.fillText(Math.ceil(timeLeft) + "s", W / 2 - 30, -H / 2 + 50);
    if (timeLeft < 15) {
        ctx.textAlign = "center";
        var alpha = 0.3 + Math.abs(Math.sin(timeLeft * 3)) * 0.7;
        ctx.fillStyle = timeLeft < 5
            ? "rgba(255, 50, 50, " + alpha + ")"
            : "rgba(255, 180, 50, " + alpha + ")";
        ctx.fillText(
            timeLeft < 5 ? "\u26a0 Time running out!" : "Time flowing...",
            0, -H / 2 + 80
        );
    }
    ctx.textAlign = "center";
    for (var i = 0; i < TARGET_PULSES; i++) {
        ctx.beginPath();
        ctx.arc(-15 + i * 30, H / 2 - 40, 8, 0, Math.PI * 2);
        if (i < state.progress) {
            ctx.fillStyle = "#ffe4a1";
        } else {
            ctx.fillStyle = "transparent";
            ctx.strokeStyle = "#555566";
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        ctx.fill();
    }
}

function draw() {
    ctx.fillStyle = "#080814";
    ctx.fillRect(-W / 2, -H / 2, W, H);
    ctx.save();
    ctx.strokeStyle = "#ffffff";
    var hasUncollected = false;
    for (var i = 0; i < flowers.length; i++) {
        if (!flowers[i].collected) { hasUncollected = true; break; }
    }
    if (hasUncollected) {
        for (var i = 0; i < flowers.length; i++) {
            var f = flowers[i];
            if (f.collected) continue;
            var pulse = (Math.sin(state.time * 2) + 1) / 2;
            var radius = 50 + pulse * 200;
            ctx.globalAlpha = 0.04;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 0.03 + globalPulse * 0.04;
    var mothPulseR = 50 + (Math.sin(state.time * 4) + 1) * 0.5 * MAGNETIC_RADIUS;
    ctx.beginPath();
    ctx.arc(state.moth.x, state.moth.y, mothPulseR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    for (var i = 0; i < flowers.length; i++) drawFlower(flowers[i]);
    for (var i = 0; i < shadows.length; i++) drawShadow(shadows[i]);
    for (var i = 0; i < particles.length; i++) drawParticle(particles[i]);
    ctx.globalAlpha = 1;
    drawMoth();
    drawHUD();
}

function loop(timestamp) {
    var dt = timestamp - lastTime;
    lastTime = timestamp;
    update(dt / 1000);
    draw();
    requestAnimationFrame(loop);
}

// Evidence API for verification
window.__factoryxEvidence = function () {
    return {
        schema_version: 1,
        phase: state.phase,
        progress: state.progress,
        target: state.target,
        completed: state.completed,
        restart_count: state.restartCount
    };
};
</script>
