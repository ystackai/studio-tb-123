<!DOCTYPE html>
<!--
  Magnetic Moth
  Work Order: work-order-1784756620348-7-1
  Experiment: tb123-interaction-learning-v1
  
  A compact, illustrated toy.
  Pointer movement guides a moth through pulsing magnetic flowers.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  :root {
    --bg-deep: #050510;
    --bg-mid: #0a0a1a;
    --text-primary: #e0e0e8;
    --accent-glow: #5555ff;
    --accent-flower: #ffaa55;
    --accent-danger: #ff3333;
    --accent-hub: #55ffaa;
  }
  
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bg-deep);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text-primary);
    user-select: none;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas {
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    cursor: none;
    background: radial-gradient(circle at 50% 50%, var(--bg-mid), var(--bg-deep));
  }

  #ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
  }

  #score-board {
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px var(--accent-glow);
    letter-spacing: 2px;
    transition: opacity 0.3s;
  }

  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: auto;
    transition: opacity 0.4s ease-in-out;
  }

  h1 {
    font-size: 48px;
    margin: 0 0 10px 0;
    color: #fff;
    text-shadow: 0 0 20px #88f;
  }

  p {
    font-size: 18px;
    max-width: 400px;
    line-height: 1.5;
    color: #ccc;
    margin-bottom: 20px;
  }

  button {
    background: transparent;
    color: var(--accent-glow);
    border: 2px solid var(--accent-glow);
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(85, 85, 255, 0.2);
  }

  button:hover {
    background: var(--accent-glow);
    color: #fff;
    box-shadow: 0 0 25px rgba(85, 85, 255, 0.6);
  }

  .hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="score-board">Pulses: <span id="pulseCount">0</span> / 3</div>
    
    <div id="ui-layer">
      <div></div> <!-- Spacer -->
    </div>

    <div id="overlay">
      <h1 id="title">Magnetic Moth</h1>
      <p id="description">Move your cursor to guide the moth.<br>Collect 3 magnetic pulses for a payoff. Avoid the red disturbances.</p>
      <button id="startBtn">Begin Journey</button>
    </div>
  </div>

<script>
/**
 * MAGNETIC MOTH
 * 
 * Core loop:
 * 1. Player moves mouse -> Guides Moth (spring physics)
 * 2. Moth approaches Flowers -> Collects Pulse
 * 3. Collecting 3 -> Audiovisual Payoff -> Win
 * 4. Hitting Red Disturbance -> Shock -> Game Over
 * 
 * Audio:
 * Web Audio API generates ambient drones and interaction SFX.
 * No external assets.
 */

// --- CONFIGURATION ---
const CONFIG = {
  colors: {
    moth: '#aaffdd',
    mothGlow: '#55ffaa',
    flower: '#ffaa55',
    flowerGlow: '#ff8800',
    danger: '#ff3333',
    bg: '#050510'
  },
  mothSpeed: 0.08,
  mothRadius: 8,
  flowerRadius: 25,
  dangerRadius: 20,
  winCount: 3
};

// --- ASSETS & UTILS ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const titleEl = document.getElementById('title');
const descEl = document.getElementById('description');
const startBtn = document.getElementById('startBtn');
const pulseEl = document.getElementById('pulseCount');

let width, height;

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// Random helpers
const rand = (min, max) => Math.random() * (max - min) + min;

// --- AUDIO SYSTEM (Web Audio API) ---
const Audio = {
  ctx: null,
  masterGain: null,
  bgOscillators: [],
  initialized: false,
  
  init() {
    if (this.initialized) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AudioContext();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3; // Master volume
    this.masterGain.connect(this.ctx.destination);
    this.initialized = true;
  },

  startAmbience() {
    if (!this.initialized) return;
    // Deep hum for the "Magnetic" theme
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.value = 60;
    
    const osc2 = this.ctx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = 61; // Slight detune for beat effect
    
    const gain = this.ctx.createGain();
    gain.gain.value = 0.05;
    
    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(this.masterGain);
    
    osc1.start();
    osc2.start();
    
    this.bgOscillators.push(osc1, osc2, gain);
  },

  stopAmbience() {
    this.bgOscillators.forEach(o => {
      try { o.stop(); } catch(e){}
    });
    this.bgOscillators = [];
  },

  playCollect(chordIndex) {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    // Rising pitch based on progress
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(800 + (chordIndex * 100), t + 0.5);
    
    osc.type = 'sine';
    
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    
    osc.connect(gain);
    gain.connect(this.masterGain);
    
    osc.start(t);
    osc.stop(t + 1.5);
  },

  playPayoff() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    // A major chord arpeggio
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.frequency.value = freq;
      osc.type = 'triangle';
      
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 3);
      
      osc.connect(gain);
      gain.connect(this.masterGain);
      
      osc.start(t + i * 0.1);
      osc.stop(t + 3);
    });
  },

  playDeath() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(50, t + 1);
    
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.linearRampToValueAtTime(0, t + 1);
    
    osc.connect(gain);
    gain.connect(this.masterGain);
    
    osc.start(t);
    osc.stop(t + 1);
  }
};

// --- CLASSES ---

class Moth {
  constructor() {
    this.x = width / 2;
    this.y = height / 2;
    this.targetX = width / 2;
    this.targetY = height / 2;
  }

  update() {
    // Springs towards mouse
    this.x += (this.targetX - this.x) * CONFIG.mothSpeed;
    this.y += (this.targetY - this.y) * CONFIG.mothSpeed;
  }

  draw(ctx, time) {
    // Glow
    ctx.shadowBlur = 20;
    ctx.shadowColor = CONFIG.colors.mothGlow;
    
    // Body
    ctx.fillStyle = CONFIG.colors.moth;
    ctx.beginPath();
    ctx.arc(this.x, this.y, CONFIG.mothRadius, 0, Math.PI * 2);
    ctx.fill();
    
    // Wings
    const wingFlap = Math.sin(time * 0.02) * 5;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    
    // Left wing
    ctx.beginPath();
    ctx.ellipse(this.x - 10, this.y - 5, 15 + wingFlap, 8, -0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Right wing
    ctx.beginPath();
    ctx.ellipse(this.x + 10, this.y - 5, 15 + wingFlap, 8, 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
  }
}

class Flower {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type; // 'flower' or 'danger'
    this.collected = false;
    this.radius = CONFIG.flowerRadius;
    this.pulsePhase = Math.random() * 100;
  }

  update(time) {
    // Pulse logic
    this.pulsePhase += 0.05;
  }

  draw(ctx, time) {
    if (this.collected) return;
    
    const pulseScale = Math.sin(this.pulsePhase) * 0.2 + 1;
    const r = this.radius * pulseScale;
    const color = this.type === 'flower' ? CONFIG.colors.flower : CONFIG.colors.danger;
    
    // Magnetic field effect
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.3 + Math.sin(this.pulsePhase) * 0.2;
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, r + 10, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.globalAlpha = 1;
    
    // Core
    ctx.fillStyle = color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = (Math.random() - 0.5) * 5;
    this.life = 1.0;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.02;
  }

  draw(ctx) {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- GAME STATE ---
let state = {
  status: 'menu', // menu, playing, win, lose
  score: 0,
  time: 0,
  moth: null,
  flowers: [],
  particles: [],
  mouse: { x: width/2, y: height/2 }
};

function initGame() {
  state.score = 0;
  state.time = 0;
  state.status = 'playing';
  state.moth = new Moth();
  state.flowers = [];
  state.particles = [];
  
  // Spawn flowers
  for(let i=0; i<CONFIG.winCount; i++) {
    let fx, fy, valid;
    do {
      fx = rand(100, width - 100);
      fy = rand(100, height - 100);
      valid = true;
      // Keep away from center
      if (Math.hypot(fx - width/2, fy - height/2) < 150) valid = false;
    } while(!valid);
    state.flowers.push(new Flower(fx, fy, 'flower'));
  }

  // Spawn initial danger
  spawnDanger();

  pulseEl.innerText = state.score;
  overlay.classList.add('hidden');
  
  Audio.ctx && Audio.ctx.resume();
  Audio.startAmbience();
}

function spawnDanger() {
  // As score increases, add more danger or spawn new ones
  if (state.score === 0 || state.score === 1) {
     let fx, fy, valid;
     do {
      fx = rand(50, width - 50);
      fy = rand(50, height - 50);
      valid = true;
      // Keep away from center
      if (Math.hypot(fx - width/2, fy - height/2) < 150) valid = false;
      // Keep away from flowers
      for(let f of state.flowers) {
        if (Math.hypot(fx - f.x, fy - f.y) < 150) valid = false;
      }
    } while(!valid);
    state.flowers.push(new Flower(fx, fy, 'danger'));
  }
}

function createExplosion(x, y, color, count) {
  for(let i=0; i<count; i++) {
    state.particles.push(new Particle(x, y, color));
  }
}

function handleInput(x, y) {
  state.mouse.x = x;
  state.mouse.y = y;
}

// --- GAME LOOP ---
const loop = () => {
  state.time++;
  
  // Clear
  ctx.clearRect(0, 0, width, height);
  
  if (state.status === 'playing' || state.status === 'win' || state.status === 'lose') {
    
    // Update Entities
    if (state.moth) {
      state.moth.targetX = state.mouse.x;
      state.moth.targetY = state.mouse.y;
      state.moth.update();
      state.moth.draw(ctx, state.time);
    }

    state.flowers.forEach(f => {
      f.update(state.time);
      f.draw(ctx, state.time);
      
      if (state.status === 'playing' && !f.collected) {
        const dist = Math.hypot(state.moth.x - f.x, state.moth.y - f.y);
        if (dist < CONFIG.mothRadius + CONFIG.flowerRadius) {
          f.collected = true;
          
          if (f.type === 'flower') {
            state.score++;
            pulseEl.innerText = state.score;
            Audio.playCollect(state.score);
            createExplosion(f.x, f.y, CONFIG.colors.flower, 20);
            spawnDanger();
            
            if (state.score >= CONFIG.winCount) {
              state.status = 'win';
              showEnd('Success', 'Magnetic resonance achieved.', true);
              Audio.playPayoff();
            }
          } else {
            Audio.playDeath();
            createExplosion(f.x, f.y, CONFIG.colors.danger, 30);
            // Screen shake effect could go here
            state.status = 'lose';
            showEnd('Disruption', 'The magnetic field was destabilized.', false);
          }
        }
      }
    });

    // Particles
    state.particles.forEach((p, i) => {
      p.update();
      p.draw(ctx);
      if (p.life <= 0) state.particles.splice(i, 1);
    });
  } else {
    // Menu background animation
    const t = state.time * 0.01;
    ctx.strokeStyle = 'rgba(85, 85, 255, 0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(width/2, height/2, 50 + Math.sin(t)*10, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(width/2, height/2, 100 + Math.cos(t)*10, 0, Math.PI*2);
    ctx.stroke();
  }

  requestAnimationFrame(loop);
};

function showEnd(title, desc, success) {
  overlay.classList.remove('hidden');
  titleEl.innerText = title;
  descEl.innerHTML = desc + "<br><br>Pulses collected: " + state.score;
  startBtn.innerText = "Restart";
  
  // If win, add a visual cue to background
  if (success) {
    document.body.style.background = 'radial-gradient(circle at center, #1a1a33, #050510)';
  } else {
    document.body.style.background = 'radial-gradient(circle at center, #1a0505, #050510)';
  }
}

function resetVisuals() {
  document.body.style.background = '';
}

// --- EVENTS ---
window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  e.preventDefault(); // Prevent scroll
  handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

startBtn.addEventListener('click', () => {
  Audio.init();
  resetVisuals();
  initGame();
});

// --- START ---
requestAnimationFrame(loop);

</script>
</body>
</html>
