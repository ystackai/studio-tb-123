<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050810;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #c8d8e8;

  canvas {
    display: block;
    cursor: none;
  }
  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;

  #title-screen h1 {

    margin-bottom: 0.3em;
    letter-spacing: 0.05em;
  }
  #title-screen p {
    font-size: 1.2em;

    margin-bottom: 2em;
  }
  #click-start {
    pointer-events: auto;
    background: rgba(74, 158, 255, 0.15);
    border: 1px solid rgba(74, 158, 255, 0.4);

    padding: 16px 48px;

    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.08em;
  }
  #click-start:hover {
    background: rgba(74, 158, 255, 0.3);
    box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
  }
  #hud {
    position: fixed;
    top: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 10;
  }
  #hud.visible { opacity: 1; }
  .hud-item {
    font-size: 0.95em;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8899aa;
  }
  .hud-value {
    color: #e8f4ff;
    font-weight: 600;
    display: inline-block;
    min-width: 20px;
    text-align: center;
  }
  #flower-dots {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .flower-dot {
    width: 14px;

    opacity: 0.6;
    margin-bottom: 1.5em;
  }
  #end-screen.success h2 {
    color: #4aff8a;
    text-shadow: 0 0 30px rgba(74,255,138,0.5);
  }
  #end-screen.failure h2 {
    color: #ff6a4a;

  #time-display {

  #time-display.visible { opacity: 1; }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="hud">
  <div class="hud-item" id="time-display">0:00</div>
  <div class="hud-item">
    <span>Flowers</span>
    <span id="flower-dots" style="display:inline-flex; margin-left:10px; vertical-align:middle;">
      <div class="flower-dot" id="fd-0"></div>
      <div class="flower-dot" id="fd-1"></div>
      <div class="flower-dot" id="fd-2"></div>
    </span>
  </div>
  <div class="hud-item" id="score-display">Pulse: 0</div>
</div>

<div id="ui-overlay">
  <div id="title-screen">
    <h1>Magnetic Moth</h1>
    <p>Guide the moth to the magnetic flowers</p>
    <button id="click-start">Begin</button>
  </div>
  <div id="end-screen">
    <h2 id="end-title"></h2>
    <p class="subtitle" id="end-subtitle"></p>
    <button id="click-restart" style="pointer-events:auto; background:rgba(74,158,255,0.15); border:1px solid rgba(74,158,255,0.4); color:#e8f4ff; padding:12px 36px; font-size:1em; border-radius:25px; cursor:pointer; transition:all 0.3s ease;">Replay</button>
  </div>
</div>

<button id="restart-btn">Restart</button>

<script>
// ============ EVIDENCE STATE ============
const evidence = {
  schema_version: 1,
  phase: 'initial',
  progress: 0,
  target: 3,
  completed: false,
  restart_count: 0
};

window.__factoryxEvidence = () => ({
  schema_version: evidence.schema_version,
  phase: evidence.phase,
  progress: evidence.progress,
  target: evidence.target,
  completed: evidence.completed,
  restart_count: evidence.restart_count
});

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============ AUDIO ENGINE ============
let audioCtx = null;
let masterGain = null;
let ambientNodes = [];
let mothOsc = null;
let mothFilter = null;
let mothGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(audioCtx.destination);

  // Ambient drone
  const droneFreqs = [55, 82.5, 110, 165];
  droneFreqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.value = 0.04;
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    ambientNodes.push({ osc, gain: g });
  });

  // Moth hum
  mothOsc = audioCtx.createOscillator();
  mothOsc.type = 'sine';
  mothOsc.frequency.value = 440;
  mothFilter = audioCtx.createBiquadFilter();
  mothFilter.type = 'lowpass';
  mothFilter.frequency.value = 600;
  mothFilter.Q.value = 2;
  mothGain = audioCtx.createGain();
  mothGain.gain.value = 0;
  mothOsc.connect(mothFilter);
  mothFilter.connect(mothGain);
  mothGain.connect(masterGain);
  mothOsc.start();
}

function setMothVolume(v) {
  if (mothGain) {
    mothGain.gain.setTargetAtTime(Math.max(0, Math.min(1, v)), audioCtx.currentTime, 0.05);
  }
}

function setMothPitch(freq) {
  if (mothOsc) {
    mothOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
  }
  if (mothFilter) {
    mothFilter.frequency.setTargetAtTime(freq * 2.5, audioCtx.currentTime, 0.1);
  }
}

function playPulseSound(x, y) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Bright chime
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  const baseFreq = 880 + Math.random() * 440;
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.15);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.6);

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);

  const pan = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
  if (pan) {
    pan.pan.value = (x / W - 0.5) * 1.2;
    osc.connect(g);
    g.connect(pan);
    pan.connect(masterGain);
  } else {
    osc.connect(g);
    g.connect(masterGain);
  }

  osc.start(t);
  osc.stop(t + 0.8);

  // Harmonic overtone
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(baseFreq * 1.5, t);
  osc2.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, t + 0.5);
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.12, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc2.connect(g2);
  g2.connect(masterGain);
  osc2.start(t);
  osc2.stop(t + 0.5);
}

function playPayoffChord() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const chordFreqs = [261.6, 329.6, 392, 523.3, 659.3];
  chordFreqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.15);
    g.gain.linearRampToValueAtTime(0.08, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + 3);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t);
    osc.stop(t + 3);
  });

  // Shimmer sweep
  const sweep = audioCtx.createOscillator();
  sweep.type = 'sine';
  sweep.frequency.setValueAtTime(800, t);
  sweep.frequency.exponentialRampToValueAtTime(2400, t + 1.5);
  sweep.frequency.exponentialRampToValueAtTime(400, t + 3);
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(0, t);
  sg.gain.linearRampToValueAtTime(0.08, t + 0.3);
  sg.gain.exponentialRampToValueAtTime(0.001, t + 3);
  sweep.connect(sg);
  sg.connect(masterGain);
  sweep.start(t);
  sweep.stop(t + 3);
}

function playFailureRumble() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, t);
  osc.frequency.linearRampToValueAtTime(40, t + 1.5);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.15, t);
  g.gain.linearRampToValueAtTime(0, t + 1.5);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + 1.5);
}

// ============ GAME STATE ============
let gameState = 'initial'; // initial, playing, payoff, failed, complete
let mouseX = W / 2, mouseY = H / 2;
let mothX = W / 2, mothY = H / 2;
let mothAngle = 0;
let collectedCount = 0;
let startTime = 0;
let elapsedMs = 0;
let timeLeft = 90000; // 90 seconds
let flowers = [];
let particles = [];
let wind = { x: 0, y: 0 };
let windTarget = { x: 0, y: 0 };
let windTimer = 0;
let mothTrail = [];
let pulseWaves = [];
let flowerGlowTime = 0;
let mothGlowIntensity = 1;
let payoffStartTime = 0;
let payoffParticles = [];
let hoverTimer = 0;

// ============ FLOWERS ============
function createFlower(x, y) {
  return {
    x, y,
    radius: 22,
    pulsePhase: Math.random() * Math.PI * 2,
    pulseFreq: 1.5 + Math.random() * 1.5,
    collected: false,
    hue: 200 + Math.random() * 60, // blue to teal
    petalCount: 5 + Math.floor(Math.random() * 3),
    rotation: Math.random() * Math.PI * 2,
    collectedAnim: 0, // for collected animation
    spawnAnim: 1.0, // fade in animation (1 = in)
  };
}

function spawnFlowers() {
  flowers = [];
  const cols = 3 + Math.floor(Math.random() * 2);
  const rows = 2 + Math.floor(Math.random() * 2);
  const margin = 80;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = margin + (W - margin * 2) * (c + 0.5) / Math.max(1, cols - 1);
      const y = margin + (H - margin * 2) * (r + 0.5) / Math.max(1, rows - 1);
      // Avoid exact center initially
      flowers.push(createFlower(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60));
    }
  }
}

// ============ PARTICLES ============
function spawnParticles(x, y, count, hue, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.3 + Math.random() * 0.7);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life || 1.5,
      maxLife: life || 1.5,
      hue: hue || (200 + Math.random() * 80),
      size: 1.5 + Math.random() * 3,
    });
  }
}

// ============ BACKGROUND STARS ============
const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    size: 0.5 + Math.random() * 1.5,
    twinkleSpeed: 0.5 + Math.random() * 2,
    twinklePhase: Math.random() * Math.PI * 2,
    brightness: 0.2 + Math.random() * 0.5,
  });
}

// ============ BACKGROUND FLIES (minor hazards) ============
const tinyFlies = [];
for (let i = 0; i < 5; i++) {
  spawnTinyFly();
}

function spawnTinyFly() {
  const edge = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  switch(edge) {
    case 0: x = Math.random() * W; y = -10; vx = (Math.random()-0.5)*2; vy = 0.5+Math.random(); break;
    case 1: x = W+10; y = Math.random()*H; vx = -(0.5+Math.random()); vy = (Math.random()-0.5)*2; break;
    case 2: x = Math.random()*W; y = H+10; vx = (Math.random()-0.5)*2; vy = -(0.5+Math.random()); break;
    case 3: x = -10; y = Math.random()*H; vx = (0.5+Math.random()); vy = (Math.random()-0.5)*2; break;
  }
  tinyFlies.push({
    x, y, vx, vy,
    life: 8 + Math.random() * 12,
    maxLife: 8 + Math.random() * 12,
    size: 2 + Math.random() * 2,
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleSpeed: 2 + Math.random() * 3,
  });
}

// ============ DRAWING ============
function drawBackground(time) {
  // Deep gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.5, '#070e1a');
  grad.addColorStop(1, '#030610');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinklePhase));
    ctx.globalAlpha = s.brightness * twinkle;
    ctx.fillStyle = '#c8d8ff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Subtle vignette
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawFlower(f, time) {
  if (f.collected && f.collectedAnim > 1) return;

  const alpha = f.collected ? Math.max(0, 1 - f.collectedAnim) : Math.min(1, f.spawnAnim);
  const pulse = Math.sin(time * f.pulseFreq + f.pulsePhase) * 0.3 + 0.7;
  const r = f.radius * pulse;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rotation + time * 0.1);

  // Outer glow
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 3);
  glow.addColorStop(0, `hsla(${f.hue}, 80%, 70%, ${0.25 * pulse})`);
  glow.addColorStop(0.5, `hsla(${f.hue}, 80%, 50%, ${0.08 * pulse})`);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, r * 3, 0, Math.PI * 2);
  ctx.fill();

  // Petals
  for (let i = 0; i < f.petalCount; i++) {
    const angle = (i / f.petalCount) * Math.PI * 2;
    ctx.save();
    ctx.rotate(angle);

    const petalGrad = ctx.createRadialGradient(0, 0, 0, 0, r * 0.5, r * 0.7);
    petalGrad.addColorStop(0, `hsla(${f.hue}, 90%, 85%, ${0.9 * pulse})`);
    petalGrad.addColorStop(0.6, `hsla(${f.hue + 10}, 85%, 65%, ${0.5 * pulse})`);
    petalGrad.addColorStop(1, `hsla(${f.hue + 20}, 80%, 40%, 0)`);

    ctx.fillStyle = petalGrad;
    ctx.beginPath();
    ctx.ellipse(r * 0.4, 0, r * 0.45, r * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Center core
  const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
  coreGrad.addColorStop(0, `hsla(${f.hue}, 100%, 95%, ${pulse})`);
  coreGrad.addColorStop(1, `hsla(${f.hue}, 80%, 60%, ${0.3 * pulse})`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawMoth(time) {
  const speed = Math.sqrt((mouseX - mothX) ** 2 + (mouseY - mothY) ** 2);
  const targetVol = Math.min(1, speed / 200);
  setMothVolume(targetVol * 0.3);
  setMothPitch(300 + speed * 0.5);

  ctx.save();
  ctx.translate(mothX, mothY);
  ctx.rotate(mothAngle);

  // Moth glow aura
  const auraPulse = Math.sin(time * 3) * 0.15 + 0.85;
  const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 40 * auraPulse);
  auraGrad.addColorStop(0, `rgba(180, 220, 255, ${0.3 * auraPulse * mothGlowIntensity})`);
  auraGrad.addColorStop(0.5, `rgba(100, 160, 255, ${0.1 * auraPulse * mothGlowIntensity})`);
  auraGrad.addColorStop(1, 'rgba(0, 50, 150, 0)');
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 40 * auraPulse, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = `rgba(200, 220, 255, ${0.9 * mothGlowIntensity})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = `rgba(255, 255, 255, ${0.95 * mothGlowIntensity})`;
  ctx.beginPath();
  ctx.arc(-3, -4, 2, 0, Math.PI * 2);
  ctx.arc(3, -4, 2, 0, Math.PI * 2);
  ctx.fill();

  // Antennae
  ctx.strokeStyle = `rgba(180, 210, 255, ${0.7 * mothGlowIntensity})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-2, -9);
  ctx.quadraticCurveTo(-8, -20, -12, -24 + Math.sin(time * 5) * 2);
  ctx.moveTo(2, -9);
  ctx.quadraticCurveTo(8, -20, 12, -24 + Math.cos(time * 5) * 2);
  ctx.stroke();

  // Wings - animated flutter
  const wingFlap = Math.sin(time * 12) * 0.3;
  const wingFlap2 = Math.sin(time * 8 + 1) * 0.2;

  ctx.save();
  ctx.rotate(wingFlap);

  // Left wing
  const lwGrad = ctx.createRadialGradient(-8, 0, 0, -18, 0, 25);
  lwGrad.addColorStop(0, `rgba(120, 180, 255, ${0.6 * mothGlowIntensity})`);
  lwGrad.addColorStop(0.5, `rgba(80, 140, 220, ${0.35 * mothGlowIntensity})`);
  lwGrad.addColorStop(1, `rgba(40, 100, 180, ${0.1 * mothGlowIntensity})`);
  ctx.fillStyle = lwGrad;
  ctx.beginPath();
  ctx.moveTo(-4, -2);
  ctx.quadraticCurveTo(-30, -22, -35, -8);
  ctx.quadraticCurveTo(-38, 5, -22, 12);
  ctx.quadraticCurveTo(-8, 8, -4, 2);
  ctx.fill();

  // Right wing
  ctx.save();
  ctx.scale(-1, 1);
  ctx.rotate(wingFlap2);
  ctx.fillStyle = lwGrad;
  ctx.beginPath();
  ctx.moveTo(-4, -2);
  ctx.quadraticCurveTo(-30, -22, -35, -8);
  ctx.quadraticCurveTo(-38, 5, -22, 12);
  ctx.quadraticCurveTo(-8, 8, -4, 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();

  ctx.restore();
}

function drawTrail() {
  if (mothTrail.length < 2) return;
  for (let i = 1; i < mothTrail.length; i++) {
    const t = i / mothTrail.length;
    const alpha = t * 0.25;
    const size = t * 3;
    ctx.fillStyle = `rgba(150, 200, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(mothTrail[i].x, mothTrail[i].y, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t * 0.8;
    ctx.fillStyle = `hsl(${p.hue}, 80%, 75%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * t, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPulseWaves() {
  pulseWaves.forEach(w => {
    const t = w.life / w.maxLife;
    ctx.globalAlpha = (1 - t) * 0.4;
    ctx.strokeStyle = `hsl(${w.hue}, 80%, 70%)`;
    ctx.lineWidth = 2 * (1 - t);
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPayoff() {
  if (gameState !== 'payoff') return;
  const elapsed = (Date.now() - payoffStartTime) / 1000;

  // Massive bloom effect
  const bloomSize = Math.min(elapsed * 500, W * 1.5);
  const bloomGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, bloomSize);
  bloomGrad.addColorStop(0, `rgba(255,255,240,${0.3 * Math.min(elapsed * 2, 1)})`);
  bloomGrad.addColorStop(0.3, `rgba(180,255,200,${0.15 * Math.min(elapsed * 2, 1)})`);
  bloomGrad.addColorStop(0.7, `rgba(100,200,255,${0.05 * Math.min(elapsed * 1.5, 1)})`);
  bloomGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bloomGrad;
  ctx.fillRect(0, 0, W, H);

  // Rising particles from center
  payoffParticles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue}, 80%, ${60 + p.brightness * 30}%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Central flower bloom
  const bloomPhase = Math.min(elapsed / 2, 1);
  const bSize = bloomPhase * 80;
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.rotate(elapsed * 0.3);
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    ctx.save();
    ctx.rotate(angle);
    const pGrad = ctx.createRadialGradient(bSize * 0.3, 0, 0, bSize * 0.3, 0, bSize * 0.4);
    pGrad.addColorStop(0, `hsla(${180 + i * 5}, 90%, 85%, ${0.8 * bloomPhase})`);
    pGrad.addColorStop(1, `hsla(${200 + i * 10}, 80%, 50%, 0)`);
    ctx.fillStyle = pGrad;
    ctx.beginPath();
    ctx.ellipse(bSize * 0.3, 0, bSize * 0.35, bSize * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Center
  const cGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, bSize * 0.4);
  cGrad.addColorStop(0, `hsla(60, 100%, 95%, ${bloomPhase})`);
  cGrad.addColorStop(1, `hsla(200, 90%, 60%, 0)`);
  ctx.fillStyle = cGrad;
  ctx.beginPath();
  ctx.arc(0, 0, bSize * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ============ UPDATE ============
function update(timestamp) {
  const now = Date.now();

  if (gameState === 'playing') {
    elapsedMs = now - startTime;
    timeLeft = 90000 - elapsedMs;

    // Wind - changes every ~15 seconds
    windTimer += 1/60;
    if (windTimer > 15) {
      windTimer = 0;
      windTarget.x = (Math.random() - 0.5) * 40;
      windTarget.y = (Math.random() - 0.5) * 40;
    }
    wind.x += (windTarget.x - wind.x) * 0.02;
    wind.y += (windTarget.y - wind.y) * 0.02;

    // Moth movement - attracted to mouse with magnetic pull
    const dx = mouseX - mothX;
    const dy = mouseY - mothY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Magnetic attraction - gets stronger as flowers get closer
    const magneticForce = Math.min(0.12, dist * 0.0008 + 0.01) * Math.min(dist * 0.03, 1);

    mothX += dx * magneticForce + wind.x * 0.015;
    mothY += dy * magneticForce + wind.y * 0.015;

    // Trail
    mothTrail.push({ x: mothX, y: mothY });
    if (mothTrail.length > 35) mothTrail.shift();

    // Angle - smooth rotation
    if (dist > 5) {
      const targetAngle = Math.atan2(dy, dx);
      let angleDiff = targetAngle - mothAngle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      mothAngle += angleDiff * 0.08;
    }

    // Moth glow pulsates
    mothGlowIntensity = 0.7 + Math.sin(timestamp * 0.003) * 0.3;

    // Check flower collection
    flowers.forEach(f => {
      if (f.collected) return;
      const fdx = mothX - f.x;
      const fdy = mothY - f.y;
      const fDist = Math.sqrt(fdx * fdx + fdy * fdy);

      if (fDist < f.radius + 5) {
        f.collected = true;
        f.collectedAnim = 0;
        collectedCount++;
        evidence.progress = collectedCount;

        // Visual feedback
        spawnParticles(f.x, f.y, 25, f.hue, 3, 1.2);
        pulseWaves.push({ x: f.x, y: f.y, radius: f.radius, maxRadius: f.radius * 4, life: 1, maxLife: 1, hue: f.hue });

        // Audio
        playPulseSound(f.x, f.y);

        // Update flower dots
        document.getElementById('fd-' + (collectedCount - 1)).classList.add('collected');

        // Check payoff
        if (collectedCount >= 3) {
          triggerPayoff();
        }
      }
    });

    // Check timeout failure
    if (timeLeft <= 0) {
      triggerFailure();
    }

    // Evidence
    evidence.phase = 'playing';
  }

  // Collecting animations
  flowers.forEach(f => {
    if (f.collected && f.collectedAnim < 1) {
      f.collectedAnim += 0.05;
      f.radius = 22 * (1 + f.collectedAnim * 2);
      f.pulsePhase += 0.1;
    }
    if (f.spawnAnim < 1) {
      f.spawnAnim += 0.03;
    }
  });

  // Pulse wave animation
  pulseWaves.forEach(w => {
    w.life -= 0.025;
    w.radius += (w.maxRadius - w.radius) * 0.08;
  });
  pulseWaves = pulseWaves.filter(w => w.life > 0);

  // Particle animation
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= 0.018;
  });
  particles = particles.filter(p => p.life > 0);

  // Payoff particles
  if (gameState === 'payoff') {
    const elapsed = (Date.now() - payoffStartTime) / 1000;
    if (payoffParticles.length < 60 && elapsed < 4) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 30 + Math.random() * 150;
      payoffParticles.push({
        x: W/2, y: H/2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.6 + Math.random() * 0.8,
        hue: 180 + Math.random() * 100,
        size: 1 + Math.random() * 4,
        brightness: 0.3 + Math.random() * 0.7,
      });
    }
    payoffParticles.forEach(p => {
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;
      p.life -= 0.012;
    });
    payoffParticles = payoffParticles.filter(p => p.life > 0);
  }

  // Tiny flies
  tinyFlies.forEach(fly => {
    fly.x += fly.vx + Math.sin(fly.wobblePhase) * 0.5;
    fly.y += fly.vy + Math.cos(fly.wobblePhase * 0.7) * 0.3;
    fly.wobblePhase += fly.wobbleSpeed * 0.016;
    fly.life -= 0.016;

    // Small hazard: if moth overlaps
    const fdx = mothX - fly.x;
    const fdy = mothY - fly.y;
    const fDist = Math.sqrt(fdx * fdx + fdy * fdy);
    if (fDist < fly.size + 8 && gameState === 'playing') {
      // Slight repulsion
      mothX -= fdx * 0.3;
      mothY -= fdy * 0.3;
      // Flash red
      mothGlowIntensity = 0.3;
    }
  });
  tinyFlies.forEach(fly => {
    if (fly.life <= 0 || fly.x < -50 || fly.x > W + 50 || fly.y < -50 || fly.y > H + 50) {
      spawnTinyFly();
    }
  });
}

// ============ PAYOFF / FAILURE ============
function triggerPayoff() {
  gameState = 'payoff';
  payoffStartTime = Date.now();
  payoffParticles = [];
  evidence.phase = 'completed';
  evidence.completed = true;

  playPayoffChord();

  // Show end screen after delay
  setTimeout(() => {
    const endScreen = document.getElementById('end-screen');
    endScreen.className = 'visible success';
    document.getElementById('end-title').textContent = 'Complete';
    document.getElementById('end-subtitle').textContent = 'The garden blooms. The moth has found its way.';
    document.getElementById('restart-btn').classList.add('visible');
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('time-display').classList.remove('visible');
  }, 2500);
}

function triggerFailure() {
  gameState = 'failed';
  evidence.phase = 'failed';

  playFailureRumble();

  setTimeout(() => {
    const endScreen = document.getElementById('end-screen');
    endScreen.className = 'visible failure';
    document.getElementById('end-title').textContent = 'Fled';
    document.getElementById('end-subtitle').textContent = `Collected ${collectedCount} of 3 pulses before time ran out.`;
    document.getElementById('restart-btn').classList.add('visible');
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('time-display').classList.remove('visible');
  }, 1000);
}

// ============ DRAW ============
function draw(timestamp) {
  drawBackground(timestamp);

  if (gameState === 'playing' || gameState === 'payoff' || gameState === 'failed') {
    drawParticles();
    drawPulseWaves();
    drawTrail();

    flowers.forEach(f => drawFlower(f, timestamp));

    if (gameState !== 'failed') {
      drawMoth(timestamp);
    }

    // Draw remaining tiny flies
    tinyFlies.forEach(fly => {
      const alpha = Math.min(1, fly.life / 3) * 0.4;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(fly.x, fly.y, fly.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    if (gameState === 'payoff') drawPayoff();

    // Time display
    document.getElementById('time-display').textContent = Math.ceil(timeLeft / 1000) + 's';
  }

  // Moth glow on failed
  if (gameState === 'failed') {
    ctx.globalAlpha = 0.3 + Math.sin(timestamp * 0.005) * 0.15;
    ctx.fillStyle = '#ff4422';
    ctx.beginPath();
    ctx.arc(mothX, mothY, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============ MAIN LOOP ============
function gameLoop(timestamp) {
  update(timestamp);
  draw(timestamp);
  requestAnimationFrame(gameLoop);
}

// ============ INIT ============
function startGame() {
  initAudio();
  document.getElementById('title-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
  }, 800);

  document.getElementById('hud').classList.add('visible');
  document.getElementById('time-display').classList.add('visible');

  // Reset
  mothX = W / 2;
  mothY = H / 2;
  mothAngle = 0;
  mouseX = W / 2;
  mouseY = H / 2;
  collectedCount = 0;
  particles = [];
  pulseWaves = [];
  payoffParticles = [];
  mothTrail = [];
  wind = { x: 0, y: 0 };
  windTarget = { x: 0, y: 0 };
  windTimer = 0;

  // Reset flower dots
  for (let i = 0; i < 3; i++) {
    document.getElementById('fd-' + i).classList.remove('collected');
  }

  scoreDisplay();
  spawnFlowers();
  gameState = 'playing';
  startTime = Date.now();
  evidence = {
    schema_version: 1,
    phase: 'playing',
    progress: 0,
    target: 3,
    completed: false,
    restart_count: evidence.restart_count,
  };
}

function scoreDisplay() {
  document.getElementById('score-display').querySelector('.hud-value')
    ? null
    : null;
  // We'll directly set it
  const sd = document.getElementById('score-display');
  sd.innerHTML = `Pulse: <span class="hud-value">${collectedCount}/3</span>`;
}

function restartGame() {
  // Hide end screen
  const endScreen = document.getElementById('end-screen');
  endScreen.className = '';
  endScreen.style.opacity = '0';
  document.getElementById('restart-btn').classList.remove('visible');

  evidence.restart_count++;
  startGame();
}

function startPayoffGame() {
  const endScreen = document.getElementById('end-screen');
  endScreen.className = '';
  endScreen.style.opacity = '0';
  document.getElementById('restart-btn').classList.remove('visible');

  evidence.restart_count++;

  gameState = 'playoff';
  payoffStartTime = Date.now();
  payoffParticles = [];
  evidence = {
    schema_version: 1,
    phase: 'completed',
    progress: 3,
    target: 3,
    completed: true,
    restart_count: evidence.restart_count,
  };

  // Reset flower dots
  for (let i = 0; i < 3; i++) {
    document.getElementById('fd-' + i).classList.remove('collected');
  }

  spawnFlowers();
  setTimeout(() => {
    gameState = 'payoff';
    playPayoffChord();
    setTimeout(() => {
      endScreen.className = 'visible success';
      document.getElementById('end-title').textContent = 'Complete';
      document.getElementById('end-subtitle').textContent = 'The garden blooms. The moth has found its way.';
      document.getElementById('restart-btn').classList.add('visible');
      document.getElementById('hud').classList.remove('visible');
      document.getElementById('time-display').classList.remove('visible');
    }, 3000);
  }, 500);
}

// ============ EVENT LISTENERS ============
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener('touchstart', (e) => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
});

document.getElementById('click-start').addEventListener('click', () => {
  startGame();
});

document.getElementById('click-restart').addEventListener('click', () => {
  restartGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  restartGame();
});

requestAnimationFrame(gameLoop);
</script>
