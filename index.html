<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
  :root {
    --bg: #09090e;
    --frame: #1e1e28;
    --c1: #ff3c6a;
    --c2: #28e8c1;
    --c3: #e8a528;
    --c4: #6a5eff;
    --text: #f0f0f5;
  }
  body { margin:0; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Courier New',monospace; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; }
  #ui { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:none; }
  #btn { pointer-events:all; background:rgba(255,255,255,0.05); border:1px solid var(--c2); color:var(--c2); padding:16px 32px; font-size:1.2rem; cursor:pointer; border-radius:4px; transition:0.2s; text-transform:uppercase; letter-spacing:2px; }
  #btn:hover { background:var(--c2); color:var(--bg); }
  #hud { position:absolute; top:20px; left:50%; transform:translateX(-50%); text-align:center; z-index:5; pointer-events:none; }
  #status { font-size:1.1rem; color:#aaa; text-transform:uppercase; letter-spacing:3px; margin-bottom:8px; transition:0.3s; }
  #prog { width:200px; height:3px; background:#333; border-radius:2px; margin:0 auto; overflow:hidden; }
  #bar { width:0%; height:100%; background:var(--c2); transition:width 0.1s linear; }
  #score-wrap { position:absolute; top:20px; right:20px; font-size:1.5rem; color:var(--c3); z-index:5; font-weight:bold; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><button id="btn">Initialize Sequence</button></div>
<div id="hud"><div id="status">Waiting for input</div><div id="prog"><div id="bar"></div></div></div>
<div id="score-wrap"></div>
<script>
// ==========================================
// SIGNAL GARDEN - Experimental Game
// ==========================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const bar = document.getElementById('bar');
const scoreEl = document.getElementById('score-wrap');
const uiLayer = document.getElementById('ui');

let W, H, cx, cy;
let dpr = Math.min(window.devicePixelRatio, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W/2;
  cy = H/2;
}
window.addEventListener('resize', resize);
resize();

// --- STATE ---

const STATE = { TITLE: 0, PLAY: 1, FINISHED: 2 };
let current = STATE.TITLE;
let score = 0;
let lastTime = 0;

// --- AUDIO ENGINE ---

function initAudio() {
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const master = ac.createGain();
  master.gain.value = 0.25;
  master.connect(ac.destination);
  
  // Pad (Background Atmosphere)
  const pad1 = ac.createOscillator(); pad1.type = 'sine'; pad1.frequency.value = 55;
  const pad2 = ac.createOscillator(); pad2.type = 'sine'; pad2.frequency.value = 55.5;
  const padG = ac.createGain(); padG.gain.value = 0.12;
  
  pad1.connect(padG); pad2.connect(padG); padG.connect(master);
  pad1.start(); pad2.start();
  
  // Chord (Harmonic Layer)
  const harm = ac.createGain(); harm.gain.value = 0;
  harm.connect(master);
  const harmNotes = [220, 277.18, 329.63, 440, 554.36]; // A minor pentatonic
  const harmOscs = harmNotes.map(f => {
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const g = ac.createGain(); g.gain.value = 0.04;
    o.connect(g); g.connect(harm);
    o.start(); return o;
  });
  
  // Kick / Thump
  const kick = () => {
    const o = ac.createOscillator(); o.type = 'sine';
    const g = ac.createGain();
    o.frequency.setValueAtTime(160, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.2);
    g.gain.setValueAtTime(0.8, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.25);
    o.connect(g); g.connect(master);
    o.start(); o.stop(ac.currentTime + 0.3);
  };
  
  // SFX for Hits
  const hit = (octave) => {
    const o = ac.createOscillator(); o.type = 'triangle';
    const g = ac.createGain();
    const baseFreq = [110, 130.81, 164.81, 220][octave] || 220;
    o.frequency.setValueAtTime(baseFreq * 2, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(baseFreq, ac.currentTime + 0.1);
    g.gain.setValueAtTime(0.4, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.3);
    o.connect(g); g.connect(master);
    o.start(); o.stop(ac.currentTime + 0.3);
    
    // High tick
    const o2 = ac.createOscillator(); o2.type = 'square';
    const g2 = ac.createGain();
    o2.frequency.setValueAtTime(baseFreq * 4, ac.currentTime);
    g2.gain.setValueAtTime(0.05, ac.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    o2.connect(g2); g2.connect(master);
    o2.start(); o2.stop(ac.currentTime + 0.1);
  };

  // Bloom Fanfare
  const bloom = () => {
    const f = ac.currentTime;
    const notes = [440, 554.36, 659.25, 880];
    let t2 = f;
    notes.forEach((freq, i) => {
      setTimeout(() => {
        const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
        const g = ac.createGain(); g.gain.setValueAtTime(0, t2);
        g.gain.linearRampToValueAtTime(0.15, t2 + 0.2);
        g.gain.exponentialRampToValueAtTime(0.001, t2 + 1.5);
        o.connect(g); g.connect(master);
        o.start(t2); o.stop(t2 + 1.6);
        t2 += 0.1;
      }, 0);
    });
  };

  // Noise/Texture
  const bufSize = ac.sampleRate * 2.0;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noiseSrc = ac.createBufferSource();
  noiseSrc.buffer = buf; noiseSrc.loop = true;
  const nFilter = ac.createBiquadFilter(); nFilter.type = 'lowpass';
  const nGain = ac.createGain(); nGain.gain.value = 0.02;
  noiseSrc.connect(nFilter); nFilter.connect(nGain); nGain.connect(master);
  noiseSrc.start();

  return {
    setPad: (v) => padG.gain.setTargetAtTime(v, ac.currentTime, 0.1),
    setHarm: (v) => harm.gain.setTargetAtTime(v, ac.currentTime, 0.5),
    kick,
    hit,
    bloom,
    setFilter: (f) => nFilter.frequency.setTargetAtTime(f, ac.currentTime, 0.1)
  };
}

let audio = null;
let audioStarted = false;

function ensureAudio() {
  if (!audioStarted) {
    audio = initAudio();
    audioStarted = true;
  }
}

// --- PARTICLES ---

const particles = [];

class Particle {
  constructor(x, y, color, speed, life) {
    this.x = x; this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = life;
    this.maxLife = life;
    this.size = Math.random() * 3 + 1;
  }
  update(dt) {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= dt;
    this.vx *= 0.98;
    this.vy *= 0.98;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- PLANT DRAWING ---

function drawPlant(ctx, growth, colorHex) {
  const col = colorHex || '#fff';
  ctx.strokeStyle = col;
  ctx.fillStyle = col;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = col;
  ctx.shadowBlur = 15;

  // Main Stem
  const stemH = 100 + growth * 160;
  const stemX = cx;
  const stemBaseY = cy + 100;
  
  // Stem curve (bezier)
  ctx.beginPath();
  ctx.moveTo(stemX, stemBaseY);
  ctx.bezierCurveTo(stemX + 10, stemBaseY - stemH/2, stemX - 10, stemBaseY - stemH*0.75, stemX, stemBaseY - stemH);
  ctx.stroke();

  // Branches
  if (growth > 0.2) {
    const branchH = stemH * 0.4;
    // Left branch
    const blX = stemX - 5, blY = stemBaseY - stemH * 0.4;
    ctx.beginPath();
    ctx.moveTo(blX, blY);
    ctx.quadraticCurveTo(blX - 40, blY - 20, blX - 60, blY - 60);
    ctx.stroke();
    // Leaf
    drawLeaf(ctx, blX - 60, blY - 60, -1, growth * 6);
  }
  
  if (growth > 0.4) {
    const branchH = stemH * 0.3;
    // Right branch
    const brX = stemX + 5, brY = stemBaseY - stemH * 0.6;
    ctx.beginPath();
    ctx.moveTo(brX, brY);
    ctx.quadraticCurveTo(brX + 30, brY - 30, brX + 70, brY - 70);
    ctx.stroke();
    // Leaf
    drawLeaf(ctx, brX + 70, brY - 70, 1, growth * 5);
  }

  if (growth > 0.6) {
    // High branch
    const bhX = stemX, bhY = stemBaseY - stemH * 0.85;
    ctx.beginPath();
    ctx.moveTo(bhX, bhY);
    ctx.quadraticCurveTo(bhX - 20, bhY - 40, bhX - 40, bhY - 80);
    ctx.stroke();
    drawLeaf(ctx, bhX - 40, bhY - 80, -1, growth * 4);
    
    ctx.beginPath();
    ctx.moveTo(bhX, bhY);
    ctx.quadraticCurveTo(bhX + 20, bhY - 40, bhX + 40, bhY - 90);
    ctx.stroke();
    drawLeaf(ctx, bhX + 40, bhY - 90, 1, growth * 4);
  }

  if (growth > 0.8) {
    // Final bloom bud
    const budY = stemBaseY - stemH;
    drawBloom(ctx, stemX, budY, growth);
  }

  ctx.shadowBlur = 0;
}

function drawLeaf(ctx, x, y, dir, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(dir * 0.5);
  ctx.scale(dir * scale, scale);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-10,-10, -10,-25, 0,-35);
  ctx.bezierCurveTo(10,-25, 10,-10, 0,0);
  ctx.fill();
  ctx.restore();
}

function drawBloom(ctx, x, y, growth) {
  ctx.fillStyle = y; // Use the main plant color
  ctx.save();
  ctx.translate(x, y);
  
  // Petals
  for (let i = 0; i < 5; i++) {
    ctx.save();
    ctx.rotate((Math.PI * 2 / 5) * i + Math.sin(Date.now() * 0.002) * 0.2);
    ctx.beginPath();
    ctx.ellipse(0, -25 * growth, 8 * growth, 20 * growth, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  // Center
  ctx.fillStyle = growInfo.accent;
  ctx.beginPath();
  ctx.arc(0, 0, 6 * growth, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

// --- LOOPS ---

const LOOP_ANGLES = [240, 300, 360, 480]; // In degrees, relative to top, or cartesian: 
// 240 deg from top (Left) -> Left
// 300 deg -> Top Right
// 360 deg -> Right
// 480 deg -> Bottom Right (Bottom)
// Let's map to screen coordinates relative to center (cx, cy)
// 240 = 270 - 30. Basically, the dial spans from 7:30 to 4:30.
// Let's define the 4 target points based on the brief and typical dial layout.

// Target points (x, y)
// Based on brief: 360,420 (Left), 600,300 (Top), 840,420 (Right), 600,560 (Bottom). 
// Note: Brief coordinates are absolute.
// Let's define local targets for drawing the dial.

const TARGETS = [
  {x: 360, y: 420, id: 0, accent: '#ff3c6a'}, // Left
  {x: 600, y: 300, id: 1, accent: '#28e8c1'}, // Top
  {x: 840, y: 420, id: 2, accent: '#e8a528'}, // Right
  {x: 600, y: 560, id: 3, accent: '#6a5eff'}  // Bottom
];

// Use the first target's accent for the plant initially, or cycle? Brief says "Silhouette and musical layer".
let growInfo = { accent: '#555' };
const visitedIndices = new Set();
const hitQueue = []; // Stores indices of clicks

let activeLoopIndex = -1; // Index in TARGETS that is currently active
let loopTimer = 0;
const baseLoopTime = 2500; // ms
let loopSpeedMult = 1.0;

// --- GAME LOGIC ---

function startGame() {
  ensureAudio();
  current = STATE.PLAY;
  score = 0;
  visitedIndices.clear();
  hitQueue.length = 0;
  loopSpeedMult = 1.0;
  growInfo.accent = '#888';
  
  spawnLoop(0);
  
  uiLayer.style.display = 'none';
  statusEl.innerText = 'Tune the Signal';
  statusEl.style.color = '#fff';
  scoreEl.innerText = '000';
  bar.style.width = '0%';
}

function spawnLoop(index) {
  activeLoopIndex = index;
  loopTimer = baseLoopTime / loopSpeedMult;
}

// The "Window"
let windowOpen = false;
let windowTimer = 0;
const windowDuration = 800; // 800ms window
let windowPause = 0; // Time spent waiting outside window
let windowActiveLoopRef = -1;

// --- MAIN LOOP ---

function loop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Clear
  ctx.fillStyle = 'rgba(9, 9, 14, 0.25)';
  ctx.fillRect(0, 0, W, H);

  // Pulse Background Elements (The "Garden Floor")
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const t = Date.now() * 0.001;
  for(let i=0; i<4; i++) {
    const angle = (Math.PI * 2 / 4) * i;
    const r = 150 + Math.sin(angle + t) * 10;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    ctx.stroke();
  }
  ctx.restore();

  // Draw Dial
  drawDial(timestamp);

  // Draw Plant
  const plantGrowth = Math.min(1, score * 0.125);
  drawPlant(ctx, plantGrowth, growInfo.accent);

  // Handle Play State
  if (current === STATE.PLAY) {
    const cycle = windowOpen ? windowDuration : (baseLoopTime / loopSpeedMult);
    loopTimer -= dt;

    if (windowOpen) {
      // Inside window
      windowPause += dt;
    } else {
      windowPause = 0;
    }

    if (loopTimer <= 0) {
      windowOpen = false;
      windowPause = 0;
      activeLoopIndex = (activeLoopIndex + 1) % TARGETS.length;
      spawnLoop(activeLoopIndex);
    }

    // Check input queue
    while(hitQueue.length > 0) {
      let click = hitQueue.shift();
      const target = TARGETS[activeLoopIndex];
      const dx = click.x - target.x;
      const dy = click.y - target.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 50) {
        // HIT
        if (!visitedIndices.has(activeLoopIndex)) {
          score++;
          visitedIndices.add(activeLoopIndex);
          
          // Audio
          audio.hit(score % 4);
          
          // Visuals
          growInfo.accent = target.accent;
          
          // Particles
          for(let i=0; i<20; i++) {
            particles.push(new Particle(target.x, target.y, target.accent, Math.random()*5+2, 1.5));
          }

          // Progress bar
          bar.style.width = (score / TARGETS.length * 100) + '%';

          if (score === TARGETS.length) {
            triggerPayoff();
          }
        } else {
          // Already visited this signal point this run - penalty or no-op?
          // Let's do a short "wrong color" feedback
          audio.kick();
          statusEl.innerText = 'Signal Damped';
          statusEl.style.color = '#f00';
        }
      } else {
        // Clicked in active loop but wrong target
        statusEl.innerText = 'Missed';
        statusEl.style.color = '#555';
      }
    }

    // Open window
    if (windowPause > 1200) { // 1.2s delay before window opens
      windowOpen = true;
      windowTimer = loopTimer; // Inverted timer for display
    }
    
    // Window visual
    if (windowOpen) {
      const target = TARGETS[activeLoopIndex];
      ctx.strokeStyle = target.accent;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(target.x, target.y, 60, 0, Math.PI*2);
      ctx.stroke();
      
      // Inner ring fading
      ctx.strokeStyle = windowOpen ? 'rgba(255,255,255,0.5)' : 'transparent';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(target.x, target.y, 50 * (1 - (windowTimer / windowDuration)), 0, Math.PI*2);
      ctx.stroke();
    }

  } else if (current === STATE.FINISHED) {
    drawPayoff(timestamp);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update(dt/1000);
    particles[i].draw(ctx);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // Audio Ambience
  if (audioStarted) {
    // Modulate pad based on score
    audio.setPad(score * 0.05);
    audio.setHarm(score * 0.1);
    
    // Modulate filter based on progress
    const filt = 200 + score * 400;
    audio.setFilter(filt);
  }

  requestAnimationFrame(loop);
}

// --- PAYOFF ---

function triggerPayoff() {
  current = STATE.FINISHED;
  audio.bloom(); // Fanfare
  statusEl.innerText = 'Full Bloom';
  statusEl.style.color = growInfo.accent;
  bar.style.width = '100%';
  
  // Massive particle event
  for(let i=0; i<100; i++) {
    particles.push(new Particle(cx, cy, growInfo.accent, Math.random()*10+2, 2.5));
  }
}

function drawPayoff(timestamp) {
  // Pulsing glow behind plant
  const scale = 1 + Math.sin(timestamp * 0.005) * 0.1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.translate(-cx, -cy);
  
  // Draw final plant
  drawPlant(ctx, 1, '#fff');
  drawBloom(ctx, cx, cy - 260 - (160), '#fff'); // Force full bloom at top
  
  ctx.restore();
}

// --- DIAL DRAWING ---

function drawDial(timestamp) {
  const t = timestamp * 0.002;
  
  // Connecting lines
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(TARGETS[0].x, TARGETS[0].y);
  for(let i=1; i<4; i++) ctx.lineTo(TARGETS[i].x, TARGETS[i].y);
  ctx.closePath();
  ctx.stroke();
  
  // Center hub
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Signal points
  TARGETS.forEach((t, idx) => {
    ctx.beginPath();
    if (idx === activeLoopIndex && windowOpen) {
      // Pulsing highlight
      const pulse = Math.sin(timestamp * 0.01) * 5;
      ctx.arc(t.x, t.y, 25 + pulse, 0, Math.PI*2);
      ctx.fillStyle = t.accent;
    } else if (visitedIndices.has(idx)) {
      ctx.arc(t.x, t.y, 15, 0, Math.PI*2);
      ctx.fillStyle = '#555';
    } else {
      ctx.arc(t.x, t.y, 12, 0, Math.PI*2);
      ctx.fillStyle = '#222';
    }
    ctx.fill();
    ctx.strokeStyle = idx === activeLoopIndex ? '#fff' : '#444';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Label
    ctx.fillStyle = '#555';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('#' + (idx+1), t.x, t.y + 30);
  });

  // Connecting beam animation
  if (current === STATE.PLAY) {
    ctx.save();
    ctx.translate(cx, cy);
    const angle = (Math.PI * 2 / 4) * activeLoopIndex + t;
    ctx.rotate(angle);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(150, 0);
    ctx.stroke();
    ctx.restore();
  }
}

// --- INPUT ---

btn.addEventListener('click', () => {
  startGame();
});

// Track clicks
document.addEventListener('mousedown', (e) => {
  if (current !== STATE.PLAY) return;
  hitQueue.push({x: e.clientX, y: e.clientY});
});

// Touch support
document.addEventListener('touchstart', (e) => {
  if (current !== STATE.PLAY) return;
  // e.preventDefault();
  const t = e.touches[0];
  hitQueue.push({x: t.clientX, y: t.clientY});
}, {passive: true});

// Restart on "game over" or clicking during FINISHED
uiLayer.addEventListener('click', () => {
  if (current === STATE.FINISHED) {
    uiLayer.style.display = 'flex';
    btn.innerText = 'Re-seed Garden';
  }
});

// --- INIT ---

// Show title state background
function drawTitle(timestamp) {
  ctx.fillStyle = '#09090e';
  ctx.fillRect(0,0,W,H);
  
  // Background grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  
  // Floating particles
  for(let i=0; i<20; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const p = Math.sin(timestamp * 0.002 + i) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(40,232,193,${p*0.1})`;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Draw static plant silhouette
  drawPlant(ctx, 0.2, '#222');
}

lastTime = performance.now();
requestAnimationFrame(function loopStart(t) {
  if (current === STATE.TITLE) {
    drawTitle(t);
  }
  // Call the main draw loop
  loop(t);
  // Actually, loop() is called recursively by requestAnimationFrame(loop). 
  // But I need to start it.
  // I'll just call loop once to bootstrap the RAF chain if not inside it.
});

// The loop function above is the RAF handler.
// Just call it once to start.
requestAnimationFrame(loop);

</script>
</body>
</html>
