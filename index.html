<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Ferry</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #gameCanvas {
            background: #0a0e27;
            cursor: pointer;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            width: fit-content;
            backdrop-filter: blur(5px);
        }
        #start-screen, #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 14, 39, 0.9);
            z-index: 10;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #4deeea;
            text-shadow: 0 0 10px #4deeea;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            max-width: 500px;
            color: #ccc;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            background: #4deeea;
            color: #0a0e27;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            font-weight: bold;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #hidden { display: none; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay" style="display:none;">
    <div class="hud-panel" id="hud-score">Passengers: 0/5</div>
    <div class="hud-panel" id="hud-timer">Time: 60</div>
</div>

<div id="start-screen">
    <h1>Beat Ferry</h1>
    <p>Tap the pulsing lights to ferry passengers across the river.<br>
    Land on the beat to pick them up!</p>
    <button id="start-btn">Start Journey</button>
</div>

<div id="end-screen" style="display:none;">
    <h1 id="end-title">Journey's End</h1>
    <p id="end-info">...</p>
    <button id="restart-btn">Sail Again</button>
</div>

<script>
/**
 * BEAT FERRY
 * A 60-second browser game.
 * Core Loop: Tap moving targets on the beat to ferry passengers.
 * Audio: Procedural synth music.
 */

// --- Constants & Config ---
const CANVAS_WIDTH = 1200;
const CANVAS_HEIGHT = 700;
const FERRY_SPEED = 7;
const TARGET_RADIUS = 35;
const FERRY_RADIUS = 20;
const GAME_DURATION = 60; // seconds
const PASSES_REQUIRED = 5;

// Color Palette - Neon/Cyberpunk
const COLORS = {
    bg: '#0a0e27',
    water: '#111638',
    ferry: '#ffffff',
    ferryLight: '#4deeea',
    target: '#ff007f',
    targetInner: '#ffcc00',
    text: '#ffffff',
    passenger: '#00ff9d'
};

// --- Audio Engine (Web Audio API) ---
const Audio = (() => {
    let ctx;
    let masterGain;
    let isMuted = false;
    
    // Pentatonic scale for pleasant procedural music
    const SCALE = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C major pentatonic

    function init() {
        if (ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = ctx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(ctx.destination);
    }

    function playTone(freq, duration = 0.1, type = 'sine', delay = 0) {
        if (!ctx) init();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + duration);

        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + duration);
    }

    function playNoise(duration = 0.1, delay = 0) {
        if (!ctx) init();
        const bufferSize = ctx.sampleRate * duration;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.1, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + duration);
        noise.connect(gain);
        gain.connect(masterGain);
        noise.start(ctx.currentTime + delay);
    }

    return {
        playLaunch: () => {
            playNoise(0.3);
            playTone(150, 0.5, 'sawtooth');
        },
        playPickup: () => {
            playTone(600, 0.1, 'sine');
            playTone(900, 0.1, 'sine', 0.1);
        },
        playMiss: () => {
            playTone(100, 0.3, 'square');
        },
        playWin: () => {
            // Arpeggio finale
            [0, 0.1, 0.2, 0.3, 0.4, 0.6, 0.8].forEach((d, i) => {
                const note = SCALE[i % SCALE.length] * (i > 4 ? 2 : 1);
                playTone(note, 0.4, 'sine', d);
            });
        },
        playLose: () => {
            [300, 250, 200].forEach((n, i) => playTone(n, 0.3, 'sawtooth', i * 0.2));
        },
        // Background beat
        beatInterval: null,
        startBeat: (bpm) => {
            if (!ctx) init();
            if (ctx.state === 'suspended') ctx.resume();
            const interval = 60000 / bpm;
            let tick = 0;
            Audio.beatInterval = setInterval(() => {
                // Kick
                if (tick % 4 === 0) {
                    playTone(60, 0.1, 'sine');
                }
                // Hihat
                if (tick % 2 === 0) {
                    playNoise(0.05);
                }
                // Bassline
                if (tick % 4 === 0) {
                    playTone(60 + (tick % 8 === 0 ? 0 : 20), 0.2, 'triangle');
                }
                tick++;
            }, interval);
        },
        stopBeat: () => {
            clearInterval(Audio.beatInterval);
        }
    };
})();

// --- Game State ---
const State = {
    screen: 'start', // start, game, end
    ferry: { x: 100, y: CANVAS_HEIGHT / 2, targetX: 100, targetY: CANVAS_HEIGHT / 2 },
    targets: [], // { x, y, phase (0-1), active, id }
    passengers: 0,
    timeLeft: GAME_DURATION,
    lastTime: 0,
    beatPhase: 0, // 0 to 1 for current beat
    beatFrequency: 120, // BPM
    particles: [],
    waves: [],
    shake: 0,
    gameOverReason: null
};

// --- Canvas Setup ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    // Maintain aspect ratio or fill? Brief says one-screen.
    // Let's fit window but keep internal resolution fixed for consistency
    const scale = Math.min(window.innerWidth / CANVAS_WIDTH, window.innerHeight / CANVAS_HEIGHT);
    // Actually, let's just fit the screen height and center
    canvas.height = CANVAS_HEIGHT;
    canvas.width = CANVAS_WIDTH;
    
    // CSS scaling for responsiveness
    const scaleW = window.innerWidth / CANVAS_WIDTH;
    const scaleH = window.innerHeight / CANVAS_HEIGHT;
    const s = Math.min(scaleW, scaleH);
    
    canvas.style.width = `${CANVAS_WIDTH * s}px`;
    canvas.style.height = `${CANVAS_HEIGHT * s}px`;
}
window.addEventListener('resize', resize);
resize();

// --- Game Logic ---

function initGame() {
    State.screen = 'game';
    State.ferry = { x: 100, y: CANVAS_HEIGHT / 2, targetX: 100, targetY: CANVAS_HEIGHT / 2 };
    State.passengers = 0;
    State.timeLeft = GAME_DURATION;
    State.targets = [];
    State.particles = [];
    State.waves = [];
    State.beatFrequency = 100;
    State.shake = 0;
    
    // Create initial targets
    spawnTarget();
    spawnTarget();
    
    // UI
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('ui-overlay').style.display = 'flex';
    
    Audio.startBeat(State.beatFrequency);
    updateHUD();
    
    State.lastTime = performance.now();
    requestAnimationFrame(loop);
}

function spawnTarget() {
    // Spawn on the left side, moving right
    // Or spawn randomly and make them drift?
    // Brief: "launch a small ferry between moving pools of light"
    // Let's make targets drift from Left to Right
    
    const lane = Math.random() * (CANVAS_HEIGHT - 100) + 50;
    const speed = 1 + State.passengers * 0.8; // Escalation: gets faster
    
    State.targets.push({
        id: Math.random().toString(36).substr(2, 5),
        x: -50,
        y: lane,
        vx: speed,
        phase: Math.random() * Math.PI * 2,
        active: true,
        size: TARGET_RADIUS
    });
}

function updateHUD() {
    document.getElementById('hud-score').textContent = `Passengers: ${State.passengers}/${PASSES_REQUIRED}`;
    document.getElementById('hud-timer').textContent = `Time: ${Math.ceil(State.timeLeft)}`;
}

function checkCollision(ferry, target) {
    const dx = ferry.x - target.x;
    const dy = ferry.y - target.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    // Beat detection: target pulse is "hot" when phase is near 0 or 2PI
    const beatStrength = 1 - (target.phase % (Math.PI * 2)) / (Math.PI * 2);
    // Normalize beat so 1.0 is peak pulse
    const pulse = Math.sin(target.phase); 
    
    // Check if ferry is ON the target AND the target is pulsing (peak)
    // We define "timing landing on the pulse" as hitting when sin(phase) is high
    return dist < (target.size + FERRY_RADIUS) && pulse > 0.5;
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        State.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color
        });
    }
}

function triggerWin() {
    State.screen = 'end';
    State.gameOverReason = 'success';
    Audio.stopBeat();
    Audio.playWin();
    
    document.getElementById('ui-overlay').style.display = 'none';
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('end-title').textContent = "Harbor Arrival!";
    document.getElementById('end-title').style.color = "#4deeea";
    document.getElementById('end-info').textContent = `You delivered ${State.passengers} passengers to the beat. The harbor is alive with music!`;
}

function triggerLose() {
    State.screen = 'end';
    State.gameOverReason = 'failure';
    Audio.stopBeat();
    Audio.playLose();
    
    document.getElementById('ui-overlay').style.display = 'none';
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('end-title').textContent = "Drift Drifts On...";
    document.getElementById('end-title').style.color = "#ff007f";
    document.getElementById('end-info').textContent = "You ran out of time. The ferry missed more ports than it docked.";
}

function loop(now) {
    if (State.screen !== 'game') return;
    
    const dt = (now - State.lastTime) / 1000;
    State.lastTime = now;
    
    // --- Update ---
    
    // Time
    State.timeLeft -= dt;
    if (State.timeLeft <= 0) {
        State.timeLeft = 0;
        if (State.passengers >= PASSES_REQUIRED) triggerWin();
        else triggerLose();
    }
    
    // Escalation: Increase speed of targets and spawn rate as time passes
    if (State.timeLeft < 40) State.beatFrequency = 120;
    if (State.timeLeft < 20) State.beatFrequency = 140;
    Audio.beatInterval && clearInterval(Audio.beatInterval);
    Audio.startBeat(State.beatFrequency);

    // Ferry Movement (Lerp)
    State.ferry.x += (State.ferry.targetX - State.ferry.x) * 0.1;
    State.ferry.y += (State.ferry.targetY - State.ferry.y) * 0.1;
    
    // Clamp ferry to screen
    State.ferry.x = Math.max(FERRY_RADIUS, Math.min(CANVAS_WIDTH - FERRY_RADIUS, State.ferry.x));
    State.ferry.y = Math.max(FERRY_RADIUS, Math.min(CANVAS_HEIGHT - FERRY_RADIUS, State.ferry.y));

    // Wave Animation (Background)
    const t = now / 1000;
    State.waves = [];
    for (let i = 0; i < 5; i++) {
        State.waves.push({
            y: CANVAS_HEIGHT / 2 + (i - 2) * 60,
            offset: i * 20,
            speed: 0.02 + i * 0.01
        });
    }

    // Target Logic
    let aliveTargets = 0;
    State.targets.forEach(tgt => {
        if (!tgt.active) return;
        
        tgt.x += tgt.vx;
        tgt.phase += dt * (State.beatFrequency / 60) * Math.PI * 2; // Beat sync speed
        
        // Check if off screen
        if (tgt.x > CANVAS_WIDTH + 50) {
            tgt.active = false;
            State.shake = 5; // Miss punishment
        } else {
            aliveTargets++;
        }
    });

    // Respawn targets if too few
    if (aliveTargets < 2 && Math.random() < 0.02) {
        spawnTarget();
    }

    // Particles Update
    State.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt * 2;
    });
    State.particles = State.particles.filter(p => p.life > 0);

    // Screen Shake decay
    if (State.shake > 0) State.shake *= 0.9;
    if (State.shake < 0.1) State.shake = 0;

    updateHUD();

    // --- Draw ---
    
    // Clear
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    
    ctx.save();
    // Shake offset
    ctx.translate(Math.random() * State.shake - State.shake/2, Math.random() * State.shake - State.shake/2);

    // Draw Water
    ctx.strokeStyle = 'rgba(77, 238, 234, 0.1)';
    ctx.lineWidth = 2;
    State.waves.forEach(wave => {
        ctx.beginPath();
        for (let x = 0; x < CANVAS_WIDTH; x += 20) {
            const y = wave.y + Math.sin(x * 0.01 + t * wave.speed + wave.offset) * 20;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    });

    // Draw Targets (Pools of Light)
    State.targets.forEach(tgt => {
        const pulse = Math.sin(tgt.phase);
        const scale = 1 + pulse * 0.3;
        
        ctx.fillStyle = COLORS.target;
        ctx.globalAlpha = 0.2 + pulse * 0.3;
        ctx.beginPath();
        ctx.arc(tgt.x, tgt.y, tgt.size * scale, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 1;
        ctx.fillStyle = pulse > 0.5 ? COLORS.targetInner : COLORS.target;
        ctx.beginPath();
        ctx.arc(tgt.x, tgt.y, tgt.size * 0.4, 0, Math.PI * 2);
        ctx.fill();
        
        // Label
        ctx.fillStyle = 'white';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`${tgt.x > CANVAS_WIDTH/2 ? 'Harbor' : 'Dock'}`, tgt.x, tgt.y + tgt.size + 15);
    });

    // Draw Ferry
    ctx.save();
    ctx.translate(State.ferry.x, State.ferry.y);
    // Tilt based on movement
    const tilt = (State.ferry.targetX - State.ferry.x) * 0.01;
    ctx.rotate(-tilt);
    
    // Ferry Body
    ctx.fillStyle = COLORS.ferry;
    ctx.shadowColor = COLORS.ferryLight;
    ctx.shadowBlur = 20;
    
    // Simple boat shape
    ctx.beginPath();
    ctx.moveTo(-20, -10);
    ctx.lineTo(20, -10);
    ctx.lineTo(25, 0); // Pro
    ctx.lineTo(20, 10);
    ctx.lineTo(-20, 10);
    ctx.lineTo(-25, 0); // Stern
    ctx.fill();
    
    // Cabin
    ctx.fillStyle = '#333';
    ctx.fillRect(-5, -5, 10, 10);
    
    // Passenger lights on top
    ctx.fillStyle = COLORS.passenger;
    for(let i=0; i<State.passengers; i++) {
        ctx.fillRect(-10 + i*5, -8, 3, 3);
    }
    
    ctx.shadowBlur = 0;
    ctx.restore();

    // Draw Particles
    State.particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;

    ctx.restore(); // End Shake
    
    requestAnimationFrame(loop);
}

// --- Input Handling ---

canvas.addEventListener('click', (e) => {
    if (State.screen !== 'game') return;
    
    const rect = canvas.getBoundingClientRect();
    // Scale mouse coords back to canvas resolution
    const scaleX = CANVAS_WIDTH / rect.width;
    const scaleY = CANVAS_HEIGHT / rect.height;
    
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    
    // Set ferry target
    State.ferry.targetX = x;
    State.ferry.targetY = y;
    Audio.playLaunch();
    
    // Check collision AFTER movement (next frame) but we can check proximity now for feedback
    let hit = false;
    State.targets.forEach(tgt => {
        if (!tgt.active) return;
        
        const dist = Math.hypot(tgt.x - State.ferry.targetX, tgt.y - State.ferry.targetY);
        
        // If we clicked very close to a target ON THE BEAT
        if (dist < tgt.size) {
            // We are targeting the right spot. 
            // Real hit happens on update loop, but let's give immediate feedback here?
            // No, keep it logic-based. The ferry moves there. If it lands on beat, score.
        }
    });
});

// Handle the "Beat" hit in the loop
function checkBeatHits() {
    // Called inside loop or manually?
    // Let's do it in the update phase of loop
    State.targets.forEach(tgt => {
        if (!tgt.active) return;
        
        // Check collision
        const dist = Math.hypot(tgt.x - State.ferry.x, tgt.y - State.ferry.y);
        
        // Beat detection: phase is wrapping.
        // Let's say "on beat" is when phase is close to a multiple of PI*2 (0)
        // Or simpler: when the sine wave is > 0.8
        const pulse = Math.sin(tgt.phase);
        
        if (dist < (tgt.size + 15) && pulse > 0.7) {
            // SUCCESSFUL LANDING
            tgt.active = false;
            State.passengers++;
            createParticles(tgt.x, tgt.y, COLORS.passenger, 20);
            Audio.playPickup();
            
            // Escalation: add another target soon
            setTimeout(spawnTarget, 1000);
            
            if (State.passengers >= PASSES_REQUIRED) {
                triggerWin();
            }
        } else if (dist < (tgt.size + 15)) {
            // Close but wrong timing - visual feedback
            createParticles(tgt.x, tgt.y, '#ffcc00', 5);
            Audio.playMiss();
        }
    });
}

// Override loop to include beat check
const originalLoop = loop;
loop = function(now) {
    if (State.screen !== 'game') return;
    
    // ... existing update logic ...
    const dt = (now - State.lastTime) / 1000;
    State.lastTime = now;
    
    State.timeLeft -= dt;
    if (State.timeLeft <= 0) {
        State.timeLeft = 0;
        if (State.passengers >= PASSES_REQUIRED) triggerWin();
        else triggerLose();
        return;
    }
    
    // Escalation
    if (State.timeLeft < 40) State.beatFrequency = 120;
    if (State.timeLeft < 20) State.beatFrequency = 140;
    Audio.beatInterval && clearInterval(Audio.beatInterval);
    Audio.startBeat(State.beatFrequency);

    // Ferry
    State.ferry.x += (State.ferry.targetX - State.ferry.x) * 0.1;
    State.ferry.y += (State.ferry.targetY - State.ferry.y) * 0.1;
    State.ferry.x = Math.max(FERRY_RADIUS, Math.min(CANVAS_WIDTH - FERRY_RADIUS, State.ferry.x));
    State.ferry.y = Math.max(FERRY_RADIUS, Math.min(CANVAS_HEIGHT - FERRY_RADIUS, State.ferry.y));

    // Waves
    const t = now / 1000;
    State.waves = [];
    for (let i = 0; i < 5; i++) {
        State.waves.push({
            y: CANVAS_HEIGHT / 2 + (i - 2) * 60,
            offset: i * 20,
            speed: 0.02 + i * 0.01
        });
    }

    // Targets
    let aliveTargets = 0;
    State.targets.forEach(tgt => {
        if (!tgt.active) return;
        tgt.x += tgt.vx;
        tgt.phase += dt * (State.beatFrequency / 60) * Math.PI * 2;
        
        if (tgt.x > CANVAS_WIDTH + 50) {
            tgt.active = false;
            State.shake = 5;
        } else {
            aliveTargets++;
        }
    });

    checkBeatHits(); // <-- The crucial beat check

    if (aliveTargets < 2 && Math.random() < 0.02) {
        spawnTarget();
    }

    State.particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt * 2;
    });
    State.particles = State.particles.filter(p => p.life > 0);

    if (State.shake > 0) State.shake *= 0.9;
    if (State.shake < 0.1) State.shake = 0;

    updateHUD();

    // Draw
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    
    ctx.save();
    ctx.translate(Math.random() * State.shake - State.shake/2, Math.random() * State.shake - State.shake/2);

    ctx.strokeStyle = 'rgba(77, 238, 234, 0.15)';
    ctx.lineWidth = 2;
    State.waves.forEach(wave => {
        ctx.beginPath();
        for (let x = 0; x < CANVAS_WIDTH; x += 20) {
            const y = wave.y + Math.sin(x * 0.01 + t * wave.speed + wave.offset) * 20;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    });

    State.targets.forEach(tgt => {
        const pulse = Math.sin(tgt.phase);
        const scale = 1 + pulse * 0.3;
        
        // Outer glow
        ctx.fillStyle = pulse > 0.5 ? COLORS.target : '#330022';
        ctx.shadowColor = COLORS.target;
        ctx.shadowBlur = pulse > 0.5 ? 30 : 10;
        ctx.beginPath();
        ctx.arc(tgt.x, tgt.y, tgt.size * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Inner core
        ctx.fillStyle = pulse > 0.5 ? COLORS.targetInner : '#fff';
        ctx.beginPath();
        ctx.arc(tgt.x, tgt.y, tgt.size * 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'white';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(pulse > 0.5 ? "PULSE" : "WAIT", tgt.x, tgt.y - tgt.size - 10);
    });

    ctx.save();
    ctx.translate(State.ferry.x, State.ferry.y);
    const tilt = (State.ferry.targetX - State.ferry.x) * 0.02;
    ctx.rotate(-tilt);
    
    // Hull
    ctx.fillStyle = '#000';
    ctx.strokeStyle = COLORS.ferry;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-20, -10);
    ctx.lineTo(20, -10);
    ctx.lineTo(25, 0);
    ctx.lineTo(20, 10);
    ctx.lineTo(-20, 10);
    ctx.lineTo(-25, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Detail
    ctx.fillStyle = '#4deeea';
    ctx.fillRect(-5, -5, 10, 10);
    
    // Passengers
    ctx.fillStyle = COLORS.passenger;
    for(let i=0; i<State.passengers; i++) {
        ctx.fillRect(-10 + i*5, -8, 3, 3);
    }
    
    ctx.restore();

    State.particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life; // Use global alpha for fading
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();
    
    requestAnimationFrame(loop);
};

// --- UI Events ---
document.getElementById('start-btn').addEventListener('click', () => {
    Audio.init(); // Initialize audio context on user gesture
    initGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
    initGame();
});

</script>
