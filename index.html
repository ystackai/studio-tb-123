<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: 'Georgia', serif; }
  canvas { display: block; width: 100%; height: 100%; }
  #ui-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
  }
  #title-text {
    color: #d0c8f0; font-size: 2.4em; letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(140,120,255,0.6);
    opacity: 1; transition: opacity 0.8s ease;
    text-align: center; line-height: 1.6;
  }
  #subtitle {
    color: #a098c0; font-size: 1em; margin-top: 10px;
    opacity: 0.8; letter-spacing: 0.08em;
  }
  #restart-btn {
    pointer-events: auto; cursor: pointer;
    background: rgba(100,80,200,0.25); border: 1px solid rgba(180,160,255,0.5);
    color: #c8bfff; padding: 12px 36px; border-radius: 30px;
    font-size: 1.1em; letter-spacing: 0.1em; font-family: 'Georgia', serif;
    margin-top: 20px; transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }
  #restart-btn:hover {
    background: rgba(120,100,240,0.4); border-color: rgba(200,180,255,0.8);
    box-shadow: 0 0 20px rgba(140,120,255,0.4);
  }
  #restart-btn { display: none; }
  #ring-counter {
    position: absolute; top: 20px; right: 24px;
    color: rgba(180,170,220,0.6); font-size: 0.9em;
    letter-spacing: 0.1em; font-family: 'Georgia', serif;
    pointer-events: none;
  }
  #progress-bar-wrap {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 4px; background: rgba(100,80,180,0.2);
    border-radius: 2px; overflow: hidden; opacity: 0;
    transition: opacity 0.6s ease; pointer-events: none;
  }
  #progress-bar-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, #6b5ce7, #a78bfa, #f0abfc);
    border-radius: 2px; transition: width 0.3s ease;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer">
  <div id="title-text">
    ORBIT POSTCARD
    <div id="subtitle">click to launch · aim through three rings</div>
  </div>
  <button id="restart-btn">↻ New Postcard</button>
</div>
<div id="ring-counter">✦ 0 / 3</div>
<div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>

<script>
(function() {
  // === WORK ORDER / RUN IDS ===
  const WORK_ORDER_ID = "work-order-1784840723163-7-13";
  const RUN_ID = "run-1784840724734-28-65";

  // === EVIDENCE API ===
  window.__factoryxEvidence = function() {
    return {
      schema_version: 1,
      phase: gameState.phase,
      progress: gameState.progress,
      target: gameState.target,
      completed: gameState.completed,
      restart_count: gameState.restartCount
    };
  };

  // === CANVAS SETUP ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H, CX, CY;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Audio System (Web Audio API) ---
  let audioCtx = null;
  let audioStarted = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, duration, type, vol, detune) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    gain.gain.setValueAtTime(vol || 0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playChime(freq, dur) {
    playTone(freq, dur, 'sine', 0.18);
    playTone(freq * 1.5, dur * 0.7, 'sine', 0.08);
    playTone(freq * 2, dur * 0.5, 'triangle', 0.04);
  }

  function playWhoosh() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.4;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2) * 0.15;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.5;
    src.connect(filter);
    filter.connect(audioCtx.destination);
    src.start();
  }

  function playSuccessChime(ringIndex) {
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    const n = notes[ringIndex] || 523.25;
    playChime(n, 0.8);
    setTimeout(() => playChime(n * 1.25, 0.6), 150);
  }

  function playMiss() {
    playTone(180, 0.6, 'sawtooth', 0.08);
    playTone(160, 0.8, 'square', 0.05);
  }

  function playPostcardFinale() {
    const chords = [
      [261.63, 329.63, 392.00, 523.25], // C major
      [329.63, 392.00, 493.88, 659.25], // E major
      [349.23, 440.00, 523.25, 698.46], // F major
      [261.63, 329.63, 392.00, 523.25, 659.25], // C major add6
    ];
    chords.forEach((chord, ci) => {
      chord.forEach(f => {
        setTimeout(() => playTone(f, 1.5, 'sine', 0.08), ci * 400);
      });
    });
  }

  function playStartWhoosh() {
    playWhoosh();
    playTone(200, 0.5, 'sine', 0.1);
    setTimeout(() => playTone(300, 0.4, 'sine', 0.08), 100);
  }

  function playRestartSound() {
    playTone(440, 0.15, 'sine', 0.1);
    setTimeout(() => playTone(330, 0.15, 'sine', 0.08), 100);
  }

  // --- Stars background ---
  const stars = [];
  function createStars(count) {
    stars.length = 0;
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random(),
        size: Math.random() * 1.5 + 0.3,
        alpha: Math.random() * 0.6 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }
  createStars(200);

  // --- Ring Definitions ---
  function createRing(index, cx, cy) {
    const baseRadius = 60 + index * 25;
    const colors = [
      { stroke: '#8b5cf6', glow: '#7c3aed', light: '#c4b5fd' }, // violet
      { stroke: '#f472b6', glow: '#ec4899', light: '#f9a8d4' }, // pink
      { stroke: '#34d399', glow: '#10b981', light: '#a7f3d0' }, // emerald
    ];
    return {
      index, cx, cy, radius: baseRadius, thickness: 18 - index * 2,
      active: true, passed: false, color: colors[index],
      pulsePhase: Math.random() * Math.PI * 2,
      particles: [],
      angle: 0, // rotation of the ring's "orbit"
      glowIntensity: 0,
      shakeAmount: 0,
    };
  }

  // --- Satellite ---
  function createSatellite() {
    return {
      x: 0, y: 0, targetX: 0, targetY: 0,
      vx: 0, vy: 0,
      speed: 3.5, maxSpeed: 6,
      active: false, launched: false,
      trail: [],
      tailTrail: [],
      size: 5,
      phase: 'idle', // idle, aiming, flying, done
      glowPhase: 0,
    };
  }

  // --- Particles ---
  function spawnParticles(x, y, color, count, spread, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * spread + spread * 0.3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: life || 60,
        maxLife: life || 60,
        color,
        size: Math.random() * 3 + 1,
      });
    }
  }

  let particles = [];

  // --- Ring target markers (the clickable rings in the sky) ---
  // These are the visual targets the player aims towards
  const ringTargets = [];

  function createTargets() {
    ringTargets.length = 0;
    // Position targets at specific coordinates on screen
    ringTargets.push({ x: W * 0.42, y: H * 0.28, passCount: 0 });
    ringTargets.push({ x: W * 0.58, y: H * 0.48, passCount: 0 });
    ringTargets.push({ x: W * 0.62, y: H * 0.72, passCount: 0 });
  }

  // --- Game State ---
  const gameState = {
    phase: 'initial', // initial, playing, completed
    progress: 0,
    target: 3,
    completed: false,
    restartCount: 0,
  };

  let satellite = createSatellite();
  let rings = [];
  let currentTargetIndex = 0;
  let dragStartX = 0, dragStartY = 0;
  let mousePos = { x: 0, y: 0 };
  let isDragging = false;
  let time = 0;
  let celebrationParticles = [];
  let postcardMode = false;
  let postcardTimer = 0;
  let flashIntensity = 0;

  // Initial star positions
  let starXOffsets = [];
  for (let i = 0; i < stars.length; i++) {
    starXOffsets.push(Math.random() * 20 - 10);
  }

  function resetGame() {
    satellite = createSatellite();
    rings = [];
    rings.push(createRing(0, CX, CY - 80));
    rings.push(createRing(1, CX + 120, CY + 40));
    rings.push(createRing(2, CX - 140, CY + 120));
    currentTargetIndex = 0;
    createTargets();
    particles = [];
    celebrationParticles = [];
    postcardMode = false;
    flashIntensity = 0;
    gameState.phase = 'initial';
    gameState.progress = 0;
    gameState.completed = false;
    document.getElementById('title-text').style.opacity = '1';
    document.getElementById('title-text').querySelector('#subtitle').style.display = '';
    document.getElementById('restart-btn').style.display = 'none';
    document.getElementById('ring-counter').textContent = '✦ 0 / 3';
    document.getElementById('progress-bar-wrap').style.opacity = '0';
    document.getElementById('progress-bar-fill').style.width = '0%';
  }

  function launchSatellite() {
    if (satellite.phase !== 'idle' || currentTargetIndex >= 3) return;
    initAudio();
    satellite.phase = 'flying';
    satellite.active = true;
    satellite.launched = true;
    gameState.phase = 'playing';
    gameState.progress = 0;
    document.getElementById('progress-bar-wrap').style.opacity = '1';

    const targetX = ringTargets[currentTargetIndex].x;
    const targetY = ringTargets[currentTargetIndex].y;

    // If dragged, calculate direction. Otherwise, default to target direction.
    if (isDragging) {
      const dx = targetX - satellite.x;
      const dy = targetY - satellite.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        const force = Math.min(Math.sqrt(dx*dx + dy*dy) / 80, 2.5);
        const strength = 1.2 + force * 0.5;
        satellite.vx = (dx / dist) * satellite.speed * strength;
        satellite.vy = (dy / dist) * satellite.speed * strength;
      }
    } else {
      const dx = targetX - satellite.x;
      const dy = targetY - satellite.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        satellite.vx = (dx / dist) * satellite.speed;
        satellite.vy = (dy / dist) * satellite.speed;
      }
    }

    playStartWhoosh();
    gameState.progress = 1; // First ring in progress
    document.getElementById('progress-bar-fill').style.width = '33%';
    document.getElementById('ring-counter').textContent = '✦ 1 / 3';
  }

  // --- Drawing helpers ---
  function drawBackground() {
    // Deep space gradient
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.8);
    grad.addColorStop(0, '#0d0d2b');
    grad.addColorStop(0.5, '#080818');
    grad.addColorStop(1, '#050510');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
      const sx = s.x * W + starXOffsets[i] * Math.sin(time * 0.001);
      const sy = s.y * H + starXOffsets[i] * Math.cos(time * 0.0008);
      ctx.globalAlpha = s.alpha * twinkle;
      ctx.fillStyle = '#e8e0ff';
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Subtle nebula in center
    ctx.globalAlpha = 0.03;
    const nebGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 300);
    nebGrad.addColorStop(0, '#6b5ce7');
    nebGrad.addColorStop(0.5, '#4c1d95');
    nebGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = nebGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  function drawRing(ring) {
    if (!ring.active && !ring.passed) return;

    const pulse = Math.sin(time * 0.03 + ring.pulsePhase) * 0.15 + 0.85;
    const color = ring.passed ? ring.color.light : ring.color.stroke;
    const glowColor = ring.passed ? ring.color.light : ring.color.glow;

    // Outer glow
    ctx.save();
    ctx.globalAlpha = (ring.passed ? 0.3 : 0.15) * pulse;
    ctx.strokeStyle = glowColor;
    ctx.lineWidth = ring.thickness + 20;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 40 * pulse;
    ctx.beginPath();
    ctx.arc(ring.cx, ring.cy, ring.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Main ring
    ctx.save();
    const shake = ring.shakeAmount;
    ctx.strokeStyle = color;
    ctx.lineWidth = ring.thickness;
    ctx.lineCap = 'round';

    // Draw ring with slight dash pattern
    ctx.setLineDash([8, 12]);
    ctx.lineDashOffset = -time * 0.5;
    ctx.beginPath();
    // Apply shake
    if (shake > 0) {
      ctx.save();
      ctx.translate(
        (Math.random() - 0.5) * shake,
        (Math.random() - 0.5) * shake
      );
    }
    ctx.arc(ring.cx, ring.cy, ring.radius, 0, Math.PI * 2);
    ctx.stroke();
    if (shake > 0) ctx.restore();
    ctx.setLineDash([]);
    ctx.restore();

    // Particles around ring
    for (let i = 0; i < ring.particles.length; i++) {
      const p = ring.particles[i];
      ctx.save();
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = ring.color.light;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawSatellite() {
    if (!satellite.active) return;

    const s = satellite;
    const glow = Math.sin(s.glowPhase) * 0.3 + 0.7;

    // Trail
    ctx.save();
    for (let i = 0; i < s.trail.length; i++) {
      const t = s.trail[i];
      const alpha = (i / s.trail.length) * 0.5 * glow;
      const size = (i / s.trail.length) * 3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#a78bfa';
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Satellite body
    ctx.save();
    ctx.translate(s.x, s.y);

    // Glow
    const satGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s.size * 4);
    satGrad.addColorStop(0, `rgba(180,160,255,${0.4 * glow})`);
    satGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = satGrad;
    ctx.beginPath();
    ctx.arc(0, 0, s.size * 4, 0, Math.PI * 2);
    ctx.fill();

    // Core satellite
    ctx.fillStyle = '#e0d8ff';
    ctx.beginPath();
    ctx.arc(0, 0, s.size, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright point
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, s.size * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Simple orbit rings around satellite
    ctx.strokeStyle = `rgba(180,160,255,${0.3 * glow})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 0, s.size * 2.5, s.size * 1.2, time * 0.05, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }

  function drawParticles() {
    ctx.save();
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCelebration() {
    if (!postcardMode) return;

    ctx.save();
    for (let i = 0; i < celebrationParticles.length; i++) {
      const p = celebrationParticles[i];
      const alpha = Math.min(p.life / p.maxLife, 1);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;

      // Draw star shape
      const x = p.x + Math.cos(time * 0.02 + p.phase) * p.orbit;
      const y = p.y + Math.sin(time * 0.02 + p.phase) * p.orbit * 0.6;
      const size = p.size * alpha;

      ctx.beginPath();
      for (let j = 0; j < 5; j++) {
        const ang = (j * Math.PI * 2) / 5 - Math.PI / 2 + time * 0.01;
        const r = j % 2 === 0 ? size : size * 0.4;
        if (j === 0) ctx.moveTo(x + Math.cos(ang) * r, y + Math.sin(ang) * r);
        else ctx.lineTo(x + Math.cos(ang) * r, y + Math.sin(ang) * r);
      }
      ctx.closePath();
      ctx.fill();
    }

    // Postcard text
    if (postcardTimer > 60) {
      const textAlpha = Math.min((postcardTimer - 60) / 60, 1);
      ctx.globalAlpha = textAlpha;
      ctx.fillStyle = '#e8e0ff';
      ctx.font = '14px Georgia';
      ctx.textAlign = 'center';
      ctx.letterSpacing = '2px';

      const textY = CY + 200;
      ctx.fillText('— orbit complete', CX, textY);
      ctx.fillStyle = '#a098c0';
      ctx.font = '11px Georgia';
      ctx.fillText('a constellation of moments captured', CX, textY + 28);

      // Decorative line
      ctx.strokeStyle = '#6b5ce7';
      ctx.lineWidth = 1;
      ctx.globalAlpha = textAlpha * 0.5;
      ctx.beginPath();
      ctx.moveTo(CX - 100, textY + 15);
      ctx.lineTo(CX + 100, textY + 15);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAimLine() {
    if (!isDragging || satellite.phase !== 'idle') return;

    const dx = dragStartX - mousePos.x;
    const dy = dragStartY - mousePos.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 10) return;

    // Direction line from satellite
    const maxPull = 200;
    const pull = Math.min(dist, maxPull) / maxPull;
    const lineLen = pull * 150;

    ctx.save();
    ctx.strokeStyle = `rgba(167,139,250,${0.4 * pull})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.lineDashOffset = -time * 0.5;

    ctx.beginPath();
    ctx.moveTo(satellite.x, satellite.y);
    ctx.lineTo(satellite.x + (dx / dist) * lineLen, satellite.y + (dy / dist) * lineLen);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow head
    const endX = satellite.x + (dx / dist) * lineLen;
    const endY = satellite.y + (dy / dist) * lineLen;
    const ang = Math.atan2(dy, dx);
    ctx.fillStyle = `rgba(167,139,250,${0.5 * pull})`;
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - Math.cos(ang - 0.4) * 10, endY - Math.sin(ang - 0.4) * 10);
    ctx.lineTo(endX - Math.cos(ang + 0.4) * 10, endY - Math.sin(ang + 0.4) * 10);
    ctx.closePath();
    ctx.fill();

    // Target indicator on ring
    if (currentTargetIndex < 3) {
      const target = ringTargets[currentTargetIndex];
      const tx = target.x;
      const ty = target.y;
      const tPulse = Math.sin(time * 0.05) * 0.2 + 0.8;
      ctx.globalAlpha = tPulse * 0.6;
      ctx.strokeStyle = '#f0abfc';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(tx, ty, 30 + Math.sin(time * 0.04) * 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Dotted line to target
      ctx.globalAlpha = 0.2 * tPulse;
      ctx.strokeStyle = '#f0abfc';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 8]);
      ctx.beginPath();
      ctx.moveTo(satellite.x, satellite.y);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }

  function drawStartButton() {
    if (satellite.phase !== 'idle') return;

    const pulse = Math.sin(time * 0.04) * 0.15 + 0.85;
    ctx.save();
    ctx.globalAlpha = pulse;

    // Soft pulsing circle
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 30);
    grad.addColorStop(0, 'rgba(139,92,246,0.15)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(CX, CY, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(180,160,255,${0.5 * pulse})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(CX, CY, 15, 0, Math.PI * 2);
    ctx.stroke();

    // Arrow pointing right (aim direction hint)
    ctx.fillStyle = `rgba(200,180,255,${0.4 * pulse})`;
    ctx.beginPath();
    ctx.moveTo(CX + 8, CY);
    ctx.lineTo(CX - 3, CY - 5);
    ctx.lineTo(CX - 3, CY + 5);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  // --- Update logic ---
  function update() {
    time++;

    // Update satellite if flying
    if (satellite.phase === 'flying') {
      satellite.x += satellite.vx;
      satellite.y += satellite.vy;
      satellite.glowPhase += 0.1;

      // Trail
      satellite.trail.push({ x: satellite.x, y: satellite.y });
      if (satellite.trail.length > 40) satellite.trail.shift();

      // Check ring collisions
      for (let i = currentTargetIndex; i < 3; i++) {
        const ring = rings[i];
        if (!ring.active || ring.passed) continue;

        const dx = satellite.x - ring.cx;
        const dy = satellite.y - ring.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < ring.radius + ring.thickness / 2 && dist > ring.radius - ring.thickness / 2 - 10) {
          // Hit the ring!
          ring.passed = true;
          ring.shakeAmount = 8;
          ring.glowIntensity = 1;

          spawnParticles(ring.cx + Math.cos(time * 0.1) * ring.radius,
                          ring.cy + Math.sin(time * 0.1) * ring.radius,
                          ring.color.light, 20, 3, 50);

          playSuccessChime(i);

          gameState.progress = i + 1;
          document.getElementById('progress-bar-fill').style.width = ((i + 1) / 3 * 100) + '%';
          document.getElementById('ring-counter').textContent = `✦ ${i + 1} / 3`;

          currentTargetIndex = i + 1;
          satellite.speed = 3.5 + (i + 1) * 0.8; // speed increases

          // Alter composition for each ring
          if (i === 0) {
            // First ring: rings begin to orbit slowly
            rings.forEach(r => r.angle = 0.003);
          } else if (i === 1) {
            // Second ring: more movement, background shifts
            rings.forEach(r => r.angle = 0.006);
            starXOffsets = starXOffsets.map(() => Math.random() * 30 - 15);
          } else if (i === 2) {
            // Third ring: final approach - fast and wobbly
            rings.forEach(r => r.angle = 0.01);
          }

          break;
        }
      }

      // Check bounds - satellite went too far without hitting target
      const margin = 200;
      if (satellite.x < -margin || satellite.x > W + margin ||
          satellite.y < -margin || satellite.y > H + margin) {
        if (currentTargetIndex < 3) {
          // Missed - but we let them try again from scratch
          playMiss();
          satellite.phase = 'idle';
          satellite.active = false;
          satellite.trail = [];
          // Reset position for retry
          satellite.x = CX;
          satellite.y = CY;
          gameState.progress = 0;
          document.getElementById('progress-bar-fill').style.width = '0%';
          document.getElementById('ring-counter').textContent = '✦ 0 / 3';
        }
      }

      // Check if all rings passed
      if (currentTargetIndex >= 3 && satellite.phase === 'flying') {
        satellite.phase = 'done';
        // Celebration!
        for (let i = 0; i < 80; i++) {
          const angle = (i / 80) * Math.PI * 2;
          const speed = Math.random() * 4 + 1;
          const colors = ['#8b5cf6', '#f472b6', '#34d399', '#fbbf24', '#ffffff'];
          celebrationParticles.push({
            x: satellite.x, y: satellite.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 120 + Math.random() * 60,
            maxLife: 120 + Math.random() * 60,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 4 + 1,
            phase: Math.random() * Math.PI * 2,
            orbit: Math.random() * 50 + 20,
          });
        }

        // Final position for satellite (center-ish, postcard-like)
        satellite.x = CX + 40;
        satellite.y = CY - 60;
        satellite.vx = 0;
        satellite.vy = 0;

        postcardMode = true;
        postcardTimer = 0;
        gameState.phase = 'completed';
        gameState.completed = true;
        gameState.progress = 3;
        document.getElementById('progress-bar-fill').style.width = '100%';
        document.getElementById('ring-counter').textContent = '✦ 3 / 3';

        setTimeout(() => {
          playPostcardFinale();
          flashIntensity = 1;
        }, 500);

        setTimeout(() => {
          document.getElementById('restart-btn').style.display = 'block';
          document.getElementById('title-text').querySelector('#subtitle').textContent =
            'a constellation of moments captured';
        }, 2000);
      }
    }

    // Update ring particles
    for (let r of rings) {
      r.particles = r.particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vy += 0.02; // gravity
        return p.life > 0;
      });

      // Ring shake decay
      if (r.shakeAmount > 0) {
        r.shakeAmount *= 0.92;
        if (r.shakeAmount < 0.1) r.shakeAmount = 0;
      }

      // Ring rotation
      if (r.angle > 0) {
        r.cx += Math.cos(time * r.angle) * 0.1;
        r.cy += Math.sin(time * r.angle) * 0.1;
      }
    }

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life--;
      return p.life > 0;
    });

    // Update celebration particles
    celebrationParticles = celebrationParticles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life--;
      return p.life > 0;
    });

    if (postcardMode) {
      postcardTimer++;
      if (postcardTimer > 180) {
        // Slow down celebration particles for postcard feel
        celebrationParticles.forEach(p => {
          p.vx *= 0.9;
          p.vy *= 0.9;
        });
      }
    }

    // Flash decay
    if (flashIntensity > 0) {
      flashIntensity *= 0.95;
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // Sort rings by y for depth
    const sortedRings = [...rings].sort((a, b) => a.cy - b.cy);

    // Draw ring particles (behind rings)
    for (let r of sortedRings) {
      for (let p of r.particles) {
        ctx.save();
        ctx.globalAlpha = (p.life / p.maxLife) * 0.8;
        ctx.fillStyle = r.color.light;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw rings
    for (let r of sortedRings) {
      drawRing(r);
    }

    drawAimLine();
    drawSatellite();
    drawStartButton();
    drawParticles();
    drawCelebration();

    // Flash overlay
    if (flashIntensity > 0) {
      ctx.save();
      ctx.globalAlpha = flashIntensity * 0.3;
      ctx.fillStyle = '#c4b5fd';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    update();
    requestAnimationFrame(render);
  }

  // --- Input handling ---
  canvas.addEventListener('mousedown', (e) => {
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);

    if (postcardMode && postcardTimer > 180) {
      // Restart button click handled by button
      return;
    }

    if (satellite.phase === 'idle') {
      isDragging = true;
      dragStartX = CX;
      dragStartY = CY;
      mousePos.x = mx;
      mousePos.y = my;
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = (e.clientX - rect.left) * (W / rect.width);
    mousePos.y = (e.clientY - rect.top) * (H / rect.height);
  });

  canvas.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    launchSatellite();
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const mx = (touch.clientX - rect.left) * (W / rect.width);
    const my = (touch.clientY - rect.top) * (H / rect.height);

    if (satellite.phase === 'idle') {
      isDragging = true;
      dragStartX = CX;
      dragStartY = CY;
      mousePos.x = mx;
      mousePos.y = my;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    mousePos.x = (touch.clientX - rect.left) * (W / rect.width);
    mousePos.y = (touch.clientY - rect.top) * (H / rect.height);
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (isDragging) {
      isDragging = false;
      launchSatellite();
    }
  }, { passive: false });

  // Restart button
  document.getElementById('restart-btn').addEventListener('click', () => {
    if (audioCtx && audioCtx.state === 'running') {
      audioCtx.close().then(() => {
        audioCtx = null;
        audioStarted = false;
        initAudio();
      });
    }
    gameState.restartCount++;
    playRestartSound();
    resetGame();
    satellite.x = CX;
    satellite.y = CY;
  });

  // Start
  satellite.x = CX;
  satellite.y = CY;
  render();
})();
</script>
</body>
</html>
