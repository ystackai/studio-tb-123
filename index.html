<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    cursor: crosshair;
  }
  #restart-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    font-family: 'Georgia', serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
    z-index: 10;
    display: none;
  }
  #restart-btn:hover {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.95);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="restart-btn">↺ Restart</button>
<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const restartBtn = document.getElementById('restart-btn');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Audio context
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, dur, vol, type, detune) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  function playRingPass(index) {
    const baseFreqs = [262, 330, 392]; // C4, E4, G4
    const freqs = [392, 523, 659]; // C5, C6, E6 - rising
    playTone(freqs[index] || 523, 1.2, 0.2, 'sine', -5);
    playTone(freqs[index] * 1.5, 0.8, 0.1, 'triangle', 3);
    // Sparkle
    setTimeout(() => playTone(freqs[index] * 2, 0.3, 0.05, 'sine', 0), 100);
  }

  function playLaunch() {
    playTone(180, 0.5, 0.2, 'sawtooth', 0);
    setTimeout(() => playTone(280, 0.4, 0.15, 'sawtooth', 0), 100);
    setTimeout(() => playTone(350, 0.3, 0.1, 'sawtooth', 0), 200);
  }

  function playPayoff() {
    const notes = [262, 330, 392, 523, 659, 784];
    notes.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 1.5, 0.12, 'sine', 0);
        playTone(f * 2, 1.2, 0.06, 'triangle', 0);
      }, i * 150);
    });
  }

  function playFail() {
    playTone(180, 0.8, 0.15, 'sawtooth', 0);
    setTimeout(() => playTone(120, 1.0, 0.12, 'sawtooth', 0), 200);
  }

  function playClick() {
    playTone(800, 0.08, 0.08, 'sine', 0);
  }

  // Game state
  let state = {
    phase: 'initial', // initial, aiming, playing, ring_pass, payoff, failed, restart_soon
    satellite: { x: 0, y: 0, vx: 0, vy: 0 },
    aimStart: null,
    aimEnd: null,
    rings: [],
    ringIndex: 0,
    progress: 0,
    target: 3,
    completed: false,
    restartCount: 0,
    launchTime: 0,
    trail: [],
    particles: [],
    stars: [],
    ringAnimations: [],
    postcardElements: [],
    elapsed: 0,
    won: false,
    aimLineAlpha: 0,
    bgHue: 240,
    satelliteGlow: 0,
  };

  // Generate stars
  function generateStars() {
    state.stars = [];
    for (let i = 0; i < 200; i++) {
      state.stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        alpha: Math.random() * 0.8 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinklePhase: Math.random() * Math.PI * 2,
      });
    }
  }
  generateStars();

  // Initialize rings
  function initRings() {
    const cx = W / 2;
    const cy = H / 2;
    const ringRadii = [Math.min(W, H) * 0.15, Math.min(W, H) * 0.28, Math.min(W, H) * 0.42];
    const ringColors = ['#44ffcc', '#ff88aa', '#ffcc44'];
    const ringNames = ['Mercury', 'Venus', 'Kepler'];

    state.rings = ringRadii.map((r, i) => ({
      radius: r,
      color: ringColors[i],
      name: ringNames[i],
      passed: false,
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: 0.003 + i * 0.002,
      dashOffset: 0,
      scale: 0,
    }));

    state.satellite = { x: cx, y: H - 120, vx: 0, vy: 0 };
    state.ringIndex = 0;
    state.progress = 0;
    state.completed = false;
    state.won = false;
    state.trail = [];
    state.particles = [];
    state.ringAnimations = [];
    state.postcardElements = [];
    state.elapsed = 0;
  }

  initRings();

  // Handle clicking to aim
  canvas.addEventListener('click', function(e) {
    ensureAudio();
    playClick();

    if (state.phase === 'initial' || state.phase === 'failed' || state.phase === 'payoff') {
      if (state.phase === 'failed' || state.phase === 'payoff') {
        // Restart
        state.restartCount++;
        state.phase = 'aiming';
        state.satellite = { x: W / 2, y: H - 120, vx: 0, vy: 0 };
        state.trail = [];
        state.ringIndex = 0;
        state.progress = 0;
        state.completed = false;
        state.won = false;
        state.elapsed = 0;
        initRings();
        state.phase = 'aiming';
        restartBtn.style.display = 'none';
        return;
      }
    }

    if (state.phase === 'aiming') {
      state.aimStart = { x: state.satellite.x, y: state.satellite.y };
      state.aimEnd = { x: e.clientX, y: e.clientY };
      state.phase = 'aiming_drag';
      return;
    }

    if (state.phase === 'aiming_drag') {
      state.aimEnd = { x: e.clientX, y: e.clientY };

      // Calculate velocity based on drag
      let dx = state.aimEnd.x - state.aimStart.x;
      let dy = state.aimEnd.y - state.aimStart.y;
      const power = Math.min(Math.sqrt(dx * dx + dy * dy), 250) * 0.04;
      const angle = Math.atan2(dy, dx);

      state.satellite.vx = Math.cos(angle) * power;
      state.satellite.vy = Math.sin(angle) * power;

      if (power > 2) {
        state.phase = 'playing';
        state.launchTime = performance.now();
        playLaunch();
        state.aimEnd = null;
        state.aimStart = null;
      } else {
        state.phase = 'aiming';
        state.aimEnd = null;
        state.aimStart = null;
      }
      return;
    }
  });

  restartBtn.addEventListener('click', function() {
    ensureAudio();
    playClick();
    state.restartCount++;
    state.phase = 'aiming';
    state.satellite = { x: W / 2, y: H - 120, vx: 0, vy: 0 };
    state.trail = [];
    state.ringIndex = 0;
    state.progress = 0;
    state.completed = false;
    state.won = false;
    state.elapsed = 0;
    initRings();
    restartBtn.style.display = 'none';
  });

  // FactoryX evidence
  window.__factoryxEvidence = function() {
    return {
      schema_version: 1,
      phase: state.phase === 'playing' || state.phase === 'aiming' || state.phase === 'aiming_drag'
        ? (state.phase === 'playing' ? 'playing' : 'playing')
        : state.phase === 'payoff' || state.phase === 'failed' ? 'completed' : 'initial',
      progress: state.progress,
      target: state.target,
      completed: state.completed,
      restart_count: state.restartCount,
    };
  };

  // Particle system
  function spawnParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + speed * 0.5;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: Math.random() * 0.02 + 0.01,
        color,
        size: Math.random() * 3 + 1,
      });
    }
  }

  // Main game loop
  let lastTime = performance.now();

  function update(now) {
    const dt = Math.min((now - lastTime) / 16.67, 3);
    lastTime = now;
    state.elapsed += dt;

    // Update satellite
    if (state.phase === 'playing') {
      state.satellite.x += state.satellite.vx * dt;
      state.satellite.y += state.satellite.vy * dt;

      // Trail
      state.trail.push({ x: state.satellite.x, y: state.satellite.y, alpha: 1 });
      if (state.trail.length > 80) state.trail.shift();
      state.trail.forEach(t => t.alpha *= 0.97);

      // Satellite glow
      state.satelliteGlow = Math.min(state.satelliteGlow + 0.02, 1);

      // Check ring collisions
      const ring = state.rings[state.ringIndex];
      if (ring) {
        const dist = Math.sqrt(
          (state.satellite.x - W/2) ** 2 + (state.satellite.y - H/2) ** 2
        );

        // Ring rotation
        ring.rotation += ring.rotationSpeed * dt;
        ring.dashOffset -= 2 * dt;

        // Scale in
        if (ring.scale < 1) {
          ring.scale = Math.min(1, ring.scale + 0.02 * Math.sqrt(dt));
        }

        const ringInner = ring.radius - 15;
        const ringOuter = ring.radius + 15;

        if (dist > ringInner && dist < ringOuter && !ring.passed) {
          // Check if satellite is moving away from center (through the ring)
          const dx = state.satellite.x - W/2;
          const dy = state.satellite.y - H/2;
          const velFromCenter = (state.satellite.vx * dx + state.satellite.vy * dy) / (dist || 1);

          if (velFromCenter > 0 || ringInner < dist) {
            ring.passed = true;
            state.progress = state.ringIndex + 1;
            state.ringAnimations.push({
              ringIndex: state.ringIndex,
              startTime: now,
              color: ring.color,
            });
            playRingPass(state.ringIndex);
            spawnParticles(
              state.satellite.x, state.satellite.y,
              ring.color, 30, 3
            );

            state.satelliteGlow = 1;

            state.ringIndex++;
            if (state.ringIndex >= state.rings.length) {
              // Won!
              state.completed = true;
              state.won = true;
              state.phase = 'payoff';
              playPayoff();

              // Create postcard elements
              for (let i = 0; i < 50; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                state.postcardElements.push({
                  x: W/2 + Math.cos(angle) * dist,
                  y: H/2 + Math.sin(angle) * dist,
                  size: Math.random() * 8 + 2,
                  alpha: 0,
                  maxAlpha: Math.random() * 0.8 + 0.2,
                  color: ring.color,
                  angle: angle,
                  speed: Math.random() * 0.01 + 0.005,
                  rotation: Math.random() * Math.PI * 2,
                  rotSpeed: (Math.random() - 0.5) * 0.05,
                });
              }
            }
          }
        }

        // Missed the ring
        if (dist > ringOuter + 50 && !ring.passed) {
          ring.passed = true; // Mark as failed
          state.phase = 'failed';
          playFail();
          spawnParticles(state.satellite.x, state.satellite.y, '#ff4444', 40, 4);
        }
      }

      // Check if satellite is off screen
      if (state.satellite.x < -100 || state.satellite.x > W + 100 ||
          state.satellite.y < -100 || state.satellite.y > H + 100) {
        if (!ring || !ring.passed) {
          ring.passed = true;
          state.phase = 'failed';
          playFail();
          spawnParticles(state.satellite.x, state.satellite.y, '#ff4444', 40, 4);
        }
      }
    }

    // Update aim line fade
    if (state.phase === 'aiming') {
      state.aimLineAlpha = Math.max(0, state.aimLineAlpha - 0.02 * dt);
    }

    // Update particles
    state.particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
      p.vx *= 0.98;
      p.vy *= 0.98;
    });
    state.particles = state.particles.filter(p => p.life > 0);

    // Update postcard elements
    state.postcardElements.forEach(el => {
      el.alpha = Math.min(el.maxAlpha, el.alpha + 0.02 * dt);
      el.rotation += el.rotSpeed * dt;
      el.x += Math.cos(el.angle + state.elapsed * el.speed) * 0.3 * dt;
      el.y += Math.sin(el.angle + state.elapsed * el.speed) * 0.3 * dt;
    });

    // Update rings scale in
    state.rings.forEach(ring => {
      if (!ring.passed && ring.scale < 1) {
        ring.scale = Math.min(1, ring.scale + 0.015 * dt);
      }
    });
  }

  function draw(now) {
    const t = now / 1000;

    // Background
    const bgHueShift = Math.sin(t * 0.1) * 10;
    const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H));
    bgGrad.addColorStop(0, `hsl(${240 + bgHueShift}, 30%, 12%)`);
    bgGrad.addColorStop(0.6, `hsl(${260 + bgHueShift}, 40%, 6%)`);
    bgGrad.addColorStop(1, `hsl(${270 + bgHueShift}, 20%, 3%)`);
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    state.stars.forEach(star => {
      const twinkle = Math.sin(t * star.twinkleSpeed * 10 + star.twinklePhase) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(255, 255, 240, ${star.alpha * twinkle})`;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });

    if (state.phase === 'initial') {
      // Idle screen
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = '48px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText('ORBIT', W/2, H/2 - 60);
      ctx.font = '24px Georgia';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.fillText('POSTCARD', W/2, H/2 - 20);
      ctx.font = '18px Georgia';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.fillText('Click to begin your journey', W/2, H/2 + 40);

      // Draw hint rings
      const ringRadii = [Math.min(W,H) * 0.15, Math.min(W,H) * 0.28, Math.min(W,H) * 0.42];
      const hintColors = ['#44ffcc', '#ff88aa', '#ffcc44'];
      ringRadii.forEach((r, i) => {
        ctx.beginPath();
        ctx.arc(W/2, H/2, r, 0, Math.PI * 2);
        ctx.strokeStyle = hintColors[i] + '33';
        ctx.lineWidth = 30;
        ctx.stroke();
      });

      // Satellite
      ctx.fillStyle = '#ffeedd';
      ctx.beginPath();
      ctx.arc(W/2, H/2 - 140, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffeedd88';
      ctx.beginPath();
      ctx.arc(W/2, H/2 - 140, 20, 0, Math.PI * 2);
      ctx.fill();

      return;
    }

    // Draw rings
    state.rings.forEach((ring, i) => {
      if (ring.passed && i !== state.ringIndex - 1) {
        // Faded passed rings
        ctx.beginPath();
        ctx.arc(W/2, H/2, ring.radius * ring.scale, 0, Math.PI * 2);
        ctx.strokeStyle = ring.color + '22';
        ctx.lineWidth = 30;
        ctx.stroke();
        return;
      }

      const alpha = ring.passed ? 0.15 : 1;
      const glow = ring.passed ? 0 : 1;

      // Outer glow
      if (glow) {
        ctx.beginPath();
        ctx.arc(W/2, H/2, ring.radius * ring.scale, 0, Math.PI * 2);
        ctx.strokeStyle = ring.color + '22';
        ctx.lineWidth = 60;
        ctx.stroke();
      }

      // Main ring
      ctx.beginPath();
      ctx.arc(W/2, H/2, ring.radius * ring.scale, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color + Math.floor(alpha * 255 * 0.8).toString(16).padStart(2, '0');
      ctx.lineWidth = 30;
      ctx.lineDash = [40, 20];
      ctx.lineDashOffset = ring.dashOffset;
      ctx.stroke();
      ctx.lineDash = [];

      // Inner bright line
      if (!ring.passed) {
        ctx.beginPath();
        ctx.arc(W/2, H/2, ring.radius * ring.scale, 0, Math.PI * 2);
        ctx.strokeStyle = ring.color + Math.floor(alpha * 100).toString(16).padStart(2, '0');
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      // Ring name
      if (!ring.passed || ring.scale >= 1) {
        ctx.fillStyle = ring.color + '88';
        ctx.font = '14px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(ring.name.toUpperCase(), W/2, H/2 - ring.radius * ring.scale - 35);
      }
    });

    // Satellite trail
    state.trail.forEach((point, i) => {
      const alpha = point.alpha * 0.5;
      const size = 3 * alpha;
      if (size > 0.5) {
        ctx.fillStyle = `rgba(255, 238, 220, ${alpha})`;
        ctx.beginPath();
        ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Particles
    state.particles.forEach(p => {
      ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });

    // Satellite
    if (state.phase !== 'initial' && state.phase !== 'failed' && state.phase !== 'payoff') {
      const sat = state.satellite;
      const glowSize = 25 + state.satelliteGlow * 20;

      // Glow
      const satGlow = ctx.createRadialGradient(sat.x, sat.y, 0, sat.x, sat.y, glowSize);
      satGlow.addColorStop(0, 'rgba(255, 238, 200, 0.8)');
      satGlow.addColorStop(0.5, 'rgba(255, 200, 150, 0.3)');
      satGlow.addColorStop(1, 'rgba(255, 200, 150, 0)');
      ctx.fillStyle = satGlow;
      ctx.beginPath();
      ctx.arc(sat.x, sat.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Satellite body
      ctx.fillStyle = '#ffeedd';
      ctx.beginPath();
      ctx.arc(sat.x, sat.y, 8, 0, Math.PI * 2);
      ctx.fill();

      // Satellite accent
      ctx.fillStyle = '#ffcc88';
      ctx.beginPath();
      ctx.arc(sat.x, sat.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Aim line
    if (state.phase === 'aiming_drag' && state.aimStart && state.aimEnd) {
      const dx = state.aimEnd.x - state.aimStart.x;
      const dy = state.aimEnd.y - state.aimStart.y;
      const power = Math.min(Math.sqrt(dx*dx + dy*dy), 250);

      ctx.beginPath();
      ctx.moveTo(state.aimStart.x, state.aimStart.y);
      ctx.lineTo(state.aimEnd.x, state.aimEnd.y);
      ctx.strokeStyle = `rgba(255, 200, 100, ${Math.min(power/100, 0.8)})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrow head
      const angle = Math.atan2(dy, dx);
      const arrowX = state.aimEnd.x;
      const arrowY = state.aimEnd.y;
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY);
      ctx.lineTo(arrowX - 12 * Math.cos(angle - 0.4), arrowY - 12 * Math.sin(angle - 0.4));
      ctx.moveTo(arrowX, arrowY);
      ctx.lineTo(arrowX - 12 * Math.cos(angle + 0.4), arrowY - 12 * Math.sin(angle + 0.4));
      ctx.strokeStyle = `rgba(255, 200, 100, ${Math.min(power/100, 0.8)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Postcard payoff
    if (state.phase === 'payoff') {
      // Postcard elements
      state.postcardElements.forEach(el => {
        ctx.save();
        ctx.translate(el.x, el.y);
        ctx.rotate(el.rotation);
        ctx.fillStyle = el.color + Math.floor(el.alpha * 255).toString(16).padStart(2, '0');
        ctx.globalAlpha = el.alpha;

        // Draw a small decorative shape
        const s = el.size;
        ctx.beginPath();
        if (el.size > 5) {
          // Star shape
          for (let j = 0; j < 4; j++) {
            const a = (j / 4) * Math.PI * 2;
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s);
          }
          ctx.strokeStyle = el.color + Math.floor(el.alpha * 255).toString(16).padStart(2, '0');
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          ctx.arc(0, 0, s, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });

      // Center text - Postcard message
      const textAlpha = Math.min(1, (state.elapsed - 2) * 0.5);
      if (textAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = textAlpha;

        ctx.fillStyle = '#ffeedd';
        ctx.font = '28px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('✦ Orbit Complete ✦', W/2, H/2 - 80);

        ctx.font = '16px Georgia';
        ctx.fillStyle = '#ffeedd99';
        ctx.fillText('All rings navigated', W/2, H/2 - 45);

        ctx.font = '14px Georgia';
        ctx.fillStyle = '#ffeedd66';
        ctx.fillText('Press restart to journey again', W/2, H/2 + 20);

        ctx.restore();
      }

      // Restart button
      restartBtn.style.display = 'block';
    }

    if (state.phase === 'failed') {
      const textAlpha = Math.min(1, (state.elapsed - 0.5) * 0.5);
      if (textAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = textAlpha;

        ctx.fillStyle = '#ff8888';
        ctx.font = '28px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Lost in the void', W/2, H/2 - 60);

        ctx.font = '16px Georgia';
        ctx.fillStyle = '#ff888899';
        ctx.fillText('The satellite drifted off course', W/2, H/2 - 25);

        ctx.font = '14px Georgia';
        ctx.fillStyle = '#ff888866';
        ctx.fillText('Press restart to try again', W/2, H/2 + 20);

        ctx.restore();
      }

      restartBtn.style.display = 'block';
    }

    // HUD
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText(`Rings: ${state.progress}/${state.target}`, 20, 30);

    if (state.phase === 'aiming' || state.phase === 'aiming_drag') {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.font = '12px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText('Drag to aim and launch', W/2, H - 25);
    }

    // Progress bar at bottom
    const barW = 200;
    const barH = 4;
    const barX = W/2 - barW/2;
    const barY = H - 70;

    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(barX, barY, barW, barH);

    const progress = state.progress / state.target;
    if (progress > 0) {
      const grad = ctx.createLinearGradient(barX, barY, barX + barW * progress, barY);
      grad.addColorStop(0, '#44ffcc');
      grad.addColorStop(0.5, '#ff88aa');
      grad.addColorStop(1, '#ffcc44');
      ctx.fillStyle = grad;
      ctx.fillRect(barX, barY, barW * progress, barH);
    }
  }

  function loop(now) {
    update(now);
    draw(now);
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
