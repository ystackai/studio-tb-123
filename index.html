<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(200,210,255,0.8); font-size: 18px; pointer-events: none;
    text-align: center; line-height: 1.6; transition: opacity 0.6s;
  }
  #hint.hidden { opacity: 0; }
  #restart-btn {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    padding: 12px 32px; background: rgba(100,140,255,0.2); border: 1px solid rgba(100,140,255,0.5);
    color: #abc; font-size: 16px; border-radius: 8px; cursor: pointer;
    transition: all 0.3s; display: none;
  }
  #restart-btn:hover { background: rgba(100,140,255,0.4); color: #fff; }
  #restart-btn.visible { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">Click in the sky to aim your satellite's orbit</div>
<button id="restart-btn">↺ Replay Orbit</button>

<script>
// ============== ORBIT POSTCARD ==============
// A 60-90s one-screen game: click to sling a satellite through 3 luminous rings.

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hintEl = document.getElementById('hint');
const restartBtn = document.getElementById('restart-btn');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============ AUDIO ENGINE (Web Audio API) ============
let audioCtx = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(audioCtx.destination);
}

function playRingTone(freq, duration, type = 'sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration * 0.3);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playPassSound(ringIndex) {
  const freqs = [440, 554, 660];
  const durations = [0.8, 0.9, 1.2];
  playRingTone(freqs[ringIndex], durations[ringIndex], 'sine');
  // Add a harmonic
  setTimeout(() => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freqs[ringIndex] * 1.5, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.6);
  }, 100);
}

function playFailSound() {
  if (!audioCtx) return;
  for (let i = 0; i < 3; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200 - i * 40, audioCtx.currentTime + i * 0.15);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + i * 0.15 + 0.4);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.4);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(audioCtx.currentTime + i * 0.15);
    osc.stop(audioCtx.currentTime + i * 0.15 + 0.5);
  }
}

function playPayoffSound() {
  if (!audioCtx) return;
  const notes = [523, 659, 784, 1047, 1319, 1568];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const t = audioCtx.currentTime + i * 0.12;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.8);
  });
  // Warm pad
  setTimeout(() => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(262, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(330, audioCtx.currentTime + 2);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 2.5);
  }, 800);
}

function playRestartChime() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

function playAmbientDrone() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(55, audioCtx.currentTime);
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop = () => {}; // Keep playing
  window._ambientDrone = osc;
}

// ============ GAME STATE ============
const RING_COUNT = 3;
let state = {
  phase: 'initial',       // initial | playing | progress | completed | failed
  progress: 0,
  target: RING_COUNT,
  completed: false,
  restartCount: 0,
  rings: [],
  satellite: null,
  trail: [],
  aimLine: null,
  stars: [],
  particles: [],
  time: 0,
  lastTime: 0,
  ambientStarted: false,
  ringFlashes: [],
};

// Postcard text
const postcardText = [
  "You guided your satellite through the cosmos.",
  "Three orbits completed. The heavens applaud.",
  "Orbit Postcard — delivered."
];

function initStars() {
  state.stars = [];
  for (let i = 0; i < 200; i++) {
    state.stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      brightness: Math.random(),
      twinkleSpeed: Math.random() * 2 + 0.5,
    });
  }
}

function createRings() {
  state.rings = [];
  const cx = W / 2;
  const cy = H / 2;
  const maxRadius = Math.min(W, H) * 0.38;
  const minRadius = maxRadius * 0.25;
  for (let i = 0; i < RING_COUNT; i++) {
    const t = i / (RING_COUNT - 1);
    const radius = minRadius + (maxRadius - minRadius) * t;
    const hue = 200 + i * 40;
    state.rings.push({
      radius,
      cx,
      cy,
      hue,
      passed: false,
      flash: 0,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: 0.005 + i * 0.003,
      dashPattern: [8 + i * 4, 4 + i * 2],
    });
  }
}

function initGame() {
  state.phase = 'initial';
  state.progress = 0;
  state.completed = false;
  state.trail = [];
  state.aimLine = null;
  state.particles = [];
  state.ringFlashes = [];
  state.time = 0;
  initStars();
  createRings();
  state.satellite = {
    x: cx,
    y: cy,
    vx: 0,
    vy: 0,
    active: false,
    angle: 0,
    orbitAngle: 0,
    passedCount: 0,
    alive: true,
  };
  hintEl.className = '';
  hintEl.innerHTML = 'Click in the sky to aim your satellite\'s orbit';
  restartBtn.classList.remove('visible');
  if (window._ambientDrone) {
    try { window._ambientDrone.stop(); } catch(e) {}
  }
}

const cx = W / 2;
const cy = H / 2;

initGame();

// ============ INPUT HANDLING ============
canvas.addEventListener('click', (e) => {
  if (state.phase === 'initial') {
    initAudio();
    if (!state.ambientStarted) {
      playAmbientDrone();
      state.ambientStarted = true;
    }
    state.phase = 'playing';
    hintEl.classList.add('hidden');
    state.satellite = {
      x: cx,
      y: cy,
      vx: 0,
      vy: 0,
      active: true,
      angle: 0,
      orbitAngle: 0,
      passedCount: 0,
      alive: true,
    };
    // Initial velocity - satellite starts orbiting around center
    orbitSatellite();
  } else if (state.phase === 'playing') {
    // Set aim direction
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const dx = mx - cx;
    const dy = my - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    state.satellite.vx = (dx / dist) * 3.5;
    state.satellite.vy = (dy / dist) * 3.5;
    state.satellite.angle = Math.atan2(dy, dx);
    state.phase = 'progress';
    state.aimLine = { x1: cx, y1: cy, x2: mx, y2: my, alpha: 1.0 };
  } else if (state.phase === 'completed' || state.phase === 'failed') {
    // Restart
    state.restartCount++;
    initGame();
    playRestartChime();
  }
});

function orbitSatellite() {
  // Start satellite in a circular orbit
  const orbitRadius = 40;
  state.satellite.x = cx + orbitRadius;
  state.satellite.y = cy;
  state.satellite.angle = 0;
  state.satellite.orbitAngle = 0;
  updateSatelliteVelocity();
  state.satellite.active = true;
}

function updateSatelliteVelocity() {
  const orbitRadius = 40;
  // Orbital velocity perpendicular to radius
  const speed = 2.0;
  state.satellite.vx = -Math.sin(state.satellite.orbitAngle) * speed;
  state.satellite.vy = Math.cos(state.satellite.orbitAngle) * speed;
}

// ============ UPDATE LOOP ============
let frameCount = 0;

function update(dt) {
  state.time += dt;
  frameCount++;

  // Update aim line
  if (state.aimLine) {
    state.aimLine.alpha -= dt * 2;
    if (state.aimLine.alpha <= 0) state.aimLine = null;
  }

  // Update rings
  state.rings.forEach((ring, i) => {
    ring.rotation += ring.rotationSpeed;
    if (ring.flash > 0) ring.flash -= dt * 3;
  });

  // Update satellite
  if (state.satellite && state.satellite.active && state.satellite.alive) {
    state.satellite.x += state.satellite.vx;
    state.satellite.y += state.satellite.vy;

    // Trail
    state.trail.push({
      x: state.satellite.x,
      y: state.satellite.y,
      age: 0
    });
    if (state.trail.length > 80) state.trail.shift();
    state.trail.forEach(t => t.age += dt);

    // Check ring passes
    const distFromCenter = Math.sqrt(
      (state.satellite.x - cx) ** 2 + (state.satellite.y - cy) ** 2
    );

    state.rings.forEach((ring, i) => {
      if (!ring.passed) {
        const ringDist = distFromCenter - ring.radius;
        // Ring is passed if satellite was inside and now outside, or vice versa
        if (Math.abs(ringDist) < 15) {
          // Check direction of crossing
          const prevDist = Math.sqrt(
            (state.satellite.x - state.satellite.vx * 2 - cx) ** 2 +
            (state.satellite.y - state.satellite.vy * 2 - cy) ** 2
          ) - ring.radius;
          
          if ((ringDist > 0 && prevDist < 0) || (ringDist < 0 && prevDist > 0)) {
            ring.passed = true;
            ring.flash = 1.0;
            state.satellite.passedCount++;
            state.progress = state.satellite.passedCount;
            
            playPassSound(i);
            
            // Particles burst
            for (let p = 0; p < 30; p++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = Math.random() * 3 + 1;
              state.particles.push({
                x: cx + Math.cos(ring.rotation) * ring.radius,
                y: cy + Math.sin(ring.rotation) * ring.radius,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1.0,
                hue: ring.hue,
              });
            }

            if (state.satellite.passedCount >= RING_COUNT) {
              // All rings passed - PAYOFF!
              triggerPayoff();
            } else if (state.satellite.passedCount > 0) {
              state.phase = 'progress';
            }
          }
        }
      }
    });

    // Check if satellite flew off screen
    const margin = 200;
    if (state.satellite.x < -margin || state.satellite.x > W + margin ||
        state.satellite.y < -margin || state.satellite.y > H + margin) {
      if (state.satellite.passedCount < RING_COUNT) {
        failRun();
      }
      state.satellite.active = false;
    }
  }

  // Update particles
  state.particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= dt * 1.5;
  });
  state.particles = state.particles.filter(p => p.life > 0);

  // Screen shake for pass effect
  if (state.rings.some(r => r.flash > 0.5)) {
    // subtle shake
  }
}

function triggerPayoff() {
  state.phase = 'completed';
  state.completed = true;
  playPayoffSound();
  
  // Big particle burst
  for (let p = 0; p < 100; p++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    const hue = Math.random() * 360;
    state.particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.5,
      hue,
    });
  }

  // Satellite spirals in then goes still at center
  state.satellite.active = false;
  
  // Show postcard after a delay
  setTimeout(() => {
    hintEl.className = '';
    hintEl.innerHTML = postcardText.join('<br>');
    hintEl.style.color = 'rgba(255,240,200,0.9)';
    hintEl.style.fontSize = '22px';
    hintEl.style.textShadow = '0 0 20px rgba(255,200,100,0.5)';
    restartBtn.classList.add('visible');
  }, 1500);
}

function failRun() {
  state.phase = 'failed';
  playFailSound();
  state.satellite.alive = false;
  
  // Explosion particles
  for (let p = 0; p < 40; p++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    state.particles.push({
      x: state.satellite.x,
      y: state.satellite.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.2,
      hue: 0 + Math.random() * 30,
    });
  }

  setTimeout(() => {
    hintEl.className = '';
    hintEl.innerHTML = 'Your satellite drifted past the rings.<br>Click to try again.';
    hintEl.style.color = 'rgba(200,120,120,0.8)';
    hintEl.style.fontSize = '20px';
    restartBtn.classList.add('visible');
  }, 1000);
}

function resetState() {
  state.phase = 'failed';
  state.progress = 0;
  state.completed = false;
  state.restartCount++;
  state.trail = [];
  state.aimLine = null;
  state.particles = [];
  state.time = 0;
  initStars();
  createRings();
  state.satellite = null;
  hintEl.className = '';
  hintEl.innerHTML = 'Click in the sky to aim your satellite\'s orbit';
  hintEl.style.color = 'rgba(200,210,255,0.8)';
  hintEl.style.textShadow = 'none';
  restartBtn.classList.remove('visible');
  if (window._ambientDrone) {
    try { window._ambientDrone.stop(); } catch(e) {}
  }
  state.ambientStarted = false;
}

resetState = function() {
  // Override to fix the restart on fail
};

// Patch the restart button
restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  state.restartCount++;
  initGame();
  if (audioCtx && !state.ambientStarted) {
    playAmbientDrone();
    state.ambientStarted = true;
  }
  playRestartChime();
});

// ============ RENDER ============
function render() {
  const t = state.time;

  // Background
  ctx.fillStyle = '#08081a';
  ctx.fillRect(0, 0, W, H);

  // Background gradient (subtle)
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, 'rgba(30,20,60,0.5)');
  bgGrad.addColorStop(1, 'rgba(8,8,26,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  state.stars.forEach(star => {
    const twinkle = 0.4 + 0.6 * Math.sin(t * star.twinkleSpeed + star.x);
    const alpha = star.brightness * twinkle;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,240,${alpha})`;
    ctx.fill();
  });

  // Draw rings
  state.rings.forEach((ring, i) => {
    const alpha = ring.passed ? 0.3 + ring.flash * 0.7 : 0.6;
    const glow = ring.flash * 30;
    
    // Glow
    ctx.save();
    ctx.translate(ring.cx, ring.cy);
    ctx.rotate(ring.rotation);
    ctx.beginPath();
    ctx.arc(0, 0, ring.radius, 0, Math.PI * 2);
    ctx.shadowColor = `hsla(${ring.hue},80%,60%,${alpha})`;
    ctx.shadowBlur = 20 + glow;
    ctx.strokeStyle = `hsla(${ring.hue},80%,65%,${alpha})`;
    ctx.lineWidth = 2 + (ring.passed ? 1 : 0);
    ctx.setLineDash(ring.dashPattern);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Inner glow
    if (ring.passed || ring.flash > 0) {
      const innerGrad = ctx.createRadialGradient(ring.cx, ring.cy, ring.radius * 0.9, ring.cx, ring.cy, ring.radius * 1.1);
      innerGrad.addColorStop(0, `hsla(${ring.hue},70%,50%,${ring.flash * 0.1})`);
      innerGrad.addColorStop(1, `hsla(${ring.hue},70%,50%,0)`);
      ctx.fillStyle = innerGrad;
      ctx.beginPath();
      ctx.arc(ring.cx, ring.cy, ring.radius * 1.1, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Draw aim line
  if (state.aimLine) {
    ctx.save();
    ctx.globalAlpha = state.aimLine.alpha;
    ctx.beginPath();
    ctx.moveTo(state.aimLine.x1, state.aimLine.y1);
    ctx.lineTo(state.aimLine.x2, state.aimLine.y2);
    ctx.strokeStyle = 'rgba(255,255,180,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 5]);
    ctx.stroke();
    // Arrow head
    const angle = Math.atan2(
      state.aimLine.y2 - state.aimLine.y1,
      state.aimLine.x2 - state.aimLine.x1
    );
    const headLen = 15;
    const headX = state.aimLine.x2;
    const headY = state.aimLine.y2;
    ctx.beginPath();
    ctx.moveTo(headX, headY);
    ctx.lineTo(headX - headLen * Math.cos(angle - 0.4), headY - headLen * Math.sin(angle - 0.4));
    ctx.moveTo(headX, headY);
    ctx.lineTo(headX - headLen * Math.cos(angle + 0.4), headY - headLen * Math.sin(angle + 0.4));
    ctx.strokeStyle = 'rgba(255,255,180,0.8)';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
    ctx.restore();
  }

  // Draw trail
  if (state.satellite && state.satellite.active) {
    for (let i = 0; i < state.trail.length; i++) {
      const t2 = state.trail[i];
      const alpha = (i / state.trail.length) * 0.5;
      const hue = 30 + (i / state.trail.length) * 30;
      ctx.beginPath();
      ctx.arc(t2.x, t2.y, 1.5 + (i / state.trail.length) * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue},80%,70%,${alpha})`;
      ctx.fill();
    }
  }

  // Draw satellite
  if (state.satellite && state.satellite.active) {
    ctx.save();
    ctx.translate(state.satellite.x, state.satellite.y);
    ctx.rotate(state.satellite.angle + Math.PI / 2);
    
    // Satellite body
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 10, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#e8d8c0';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,240,220,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Solar panels
    ctx.fillStyle = 'rgba(100,150,255,0.8)';
    ctx.fillRect(-14, -4, 8, 8);
    ctx.fillRect(6, -4, 8, 8);
    
    // Panel details
    ctx.strokeStyle = 'rgba(150,200,255,0.5)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-14, -4, 8, 8);
    ctx.strokeRect(6, -4, 8, 8);

    // Glow
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    const satGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 15);
    satGrad.addColorStop(0, 'rgba(255,230,180,0.3)');
    satGrad.addColorStop(1, 'rgba(255,230,180,0)');
    ctx.fillStyle = satGrad;
    ctx.fill();

    ctx.restore();
  }

  // Draw particles
  state.particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2 * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},80%,70%,0.8)`;
    ctx.fill();
    ctx.restore();
  });

  // Progress indicator (subtle)
  if (state.satellite) {
    const progressX = W - 60;
    const progressY = 60;
    for (let i = 0; i < RING_COUNT; i++) {
      ctx.beginPath();
      ctx.arc(progressX, progressY + i * 25, 6, 0, Math.PI * 2);
      if (i < state.satellite.passedCount) {
        ctx.fillStyle = `hsla(${200 + i * 40},80%,65%,0.9)`;
        ctx.shadowColor = `hsla(${200 + i * 40},80%,65%,0.5)`;
        ctx.shadowBlur = 10;
      } else {
        ctx.strokeStyle = 'rgba(150,160,200,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// ============ GAME LOOP ============
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// ============ FACTORY X EVIDENCE ============
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: state.phase,
    progress: state.progress,
    target: RING_COUNT,
    completed: state.completed,
    restart_count: state.restartCount,
  };
};

// Override restart to properly reset
const origRestartBtnClick = restartBtn.onclick;
restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
});

// Fix restart function to properly reset everything
const _origInitGame = initGame;
window._resetForRestart = function() {
  state.phase = 'initial';
  state.progress = 0;
  state.target = RING_COUNT;
  state.completed = false;
  state.restartCount++;
  state.trail = [];
  state.aimLine = null;
  state.particles = [];
  state.satellite = null;
  state.time = 0;
  state.rings.forEach(r => { r.passed = false; r.flash = 0; });
  hintEl.className = '';
  hintEl.innerHTML = 'Click in the sky to aim your satellite\'s orbit';
  hintEl.style.color = 'rgba(200,210,255,0.8)';
  hintEl.style.fontSize = '18px';
  hintEl.style.textShadow = 'none';
  restartBtn.classList.remove('visible');
};

// Replace restart button handler
restartBtn.onclick = function(e) {
  e.stopPropagation();
  if (window._ambientDrone) {
    try { window._ambientDrone.stop(); } catch(e) {}
  }
  state.ambientStarted = false;
  window._resetForRestart();
  if (audioCtx) {
    playRestartChime();
  }
};
