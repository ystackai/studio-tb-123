<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
  <div id="score-display">Passengers: 0 / 6</div>
  <div id="progress-bar-container"><div id="progress-bar"></div></div>
  <div id="restart-btn" onclick="restartGame()">Restart Voyage</div>
  <div id="title-screen">
    <h1>🚢 Beat Ferry</h1>
    <p>Click the docks to transport passengers and build a harbor symphony</p>
  </div>
  <button id="start-btn" onclick="startGame()">Set Sail</button>
</div>

<script>
// === WORK ORDER IDENTIFIERS ===
const WORK_ORDER_ID = "work-order-1784833245058-7-7";
const RUN_ID = "run-1784833246186-28-43";
const SESSION_ID = "agent-session-824eac542e25e11c05a56fead4a53016d9bf91f9c89684f3398aadd3bfb6cf1a";

// === FACTORY EVIDENCE API ===
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: gameState,
    progress: progress,
    target: TARGET_PASSENGERS,
    completed: phase === 'completed',
    restart_count: restartCount
  };
};

// === CANVAS SETUP ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// === AUDIO ENGINE (Web Audio API) ===
let audioCtx = null;
let isMuted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// Ferry chord progression: Cmaj -> Am -> F -> G
const CHORDS = [
  [261.63, 329.63, 392.00], // C major
  [220.00, 277.18, 329.63], // A minor
  [174.61, 220.00, 261.63], // F major
  [196.00, 246.94, 293.66], // G major
  [164.81, 196.00, 246.94], // E minor
  [130.81, 164.81, 196.00]  // C minor (payoff)
];
const BASE_FREQ = 130.81;

function playNote(frequency, duration = 0.5, type = 'sine', volume = 0.15) {
  if (!audioCtx || isMuted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = type;
  osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, audioCtx.currentTime);

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playPassengerChord(dockIndex) {
  const chord = CHORDS[Math.min(dockIndex, CHORDS.length - 1)];
  chord.forEach((freq, i) => {
    setTimeout(() => {
      playNote(freq + (i * 0.5), 1.2, 'sine', 0.12);
      playNote(freq * 2, 0.6, 'triangle', 0.06);
      // Add sparkle
      playNote(freq * 3.5, 0.3, 'sine', 0.03);
    }, i * 50);
  });
}

function playDockAmbience(frequency) {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      playNote(frequency * (1 + i * 0.25), 0.8, 'triangle', 0.08);
    }, i * 100);
  }
}

function playPayoffChord() {
  const chord = CHORDS[5]; // C minor
  chord.forEach((freq, i) => {
    setTimeout(() => {
      playNote(freq, 2.0, 'sine', 0.2);
      playNote(freq * 1.5, 1.5, 'sine', 0.15);
      playNote(freq * 2, 1.0, 'triangle', 0.1);
    }, i * 80);
  });
  // Arpeggio ascent
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      playNote(BASE_FREQ * Math.pow(1.05946, i), 0.6, 'sine', 0.1);
    }, i * 120);
  }
}

// Ferry movement SFX
function playLaunchSound() {
  playNote(150, 0.3, 'sawtooth', 0.08);
  setTimeout(() => playNote(120, 0.4, 'sawtooth', 0.06), 100);
}

function playSplashSound() {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      playNote(400 + Math.random() * 300, 0.15, 'sine', 0.04);
    }, i * 30);
  }
}

// === GAME STATE ===
let gameState = 'initial'; // 'initial', 'playing', 'completed', 'failed'
let progress = 0;
let restartCount = 0;
let ferry = {
  x: 0,
  y: 0,
  targetX: 0,
  targetY: 0,
  isMoving: false,
  bobAngle: 0,
  bobSpeed: 0.02
};
let docks = [];
let passengers = [];
let particles = [];
let stars = [];
let waterRipples = [];
let dockPulses = [];
let beatTimer = 0;
let beatInterval = 1200; // ms between beats
let gameStartTime = 0;
let timeScale = 0.8; // Speed multiplier
let ambientParticles = [];
let time = 0;

const TARGET_PASSENGERS = 6;
const FERRY_WIDTH = 60;
const FERRY_HEIGHT = 25;
const DOCK_RADIUS = 30;
const DOCK_COLORS = ['#4ecdc4', '#ffecd2', '#a8e6cf', '#ff8b94', '#c7ceea', '#ffd93d'];

// === DOCK DEFINITIONS ===
const DOCK_DEFS = [
  { angle: 0.3, distance: 280, color: DOCK_COLORS[0], freq: 261.63 },
  { angle: 2.1, distance: 320, color: DOCK_COLORS[1], freq: 220.00 },
  { angle: 4.0, distance: 290, color: DOCK_COLORS[2], freq: 174.61 },
  { angle: 0.8, distance: 260, color: DOCK_COLORS[3], freq: 196.00 },
  { angle: 5.2, distance: 340, color: DOCK_COLORS[4], freq: 164.81 },
  { angle: 3.5, distance: 270, color: DOCK_COLORS[5], freq: 130.81 }
];

// === INITIALIZATION ===
function initGame() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ferry.x = cx;
  ferry.y = cy + 80;
  ferry.targetX = cx;
  ferry.targetY = cy + 80;
  ferry.isMoving = false;

  // Create docks in a circle
  docks = DOCK_DEFS.map((def, i) => ({
    x: cx + Math.cos(def.angle) * def.distance,
    y: cy + Math.sin(def.angle) * def.distance,
    radius: DOCK_RADIUS,
    color: def.color,
    frequency: def.freq,
    index: i,
    hasPassenger: false,
    pulsePhase: Math.random() * Math.PI * 2,
    bobSpeed: 0.015 + Math.random() * 0.005
  }));

  passenger = 0;
  progress = 0;
  particles = [];
  dockPulses = [];
  waterRipples = [];
  time = 0;
  beatTimer = 0;
  gameState = 'initial';
  ferry.isMoving = false;

  updateUI();
  createStars();
  createAmbientParticles();
}

function createStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.4,
      radius: Math.random() * 1.5 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.02 + Math.random() * 0.03
    });
  }
}

function createAmbientParticles() {
  ambientParticles = [];
  for (let i = 0; i < 40; i++) {
    ambientParticles.push({
      x: Math.random() * canvas.width,
      y: canvas.height * 0.3 + Math.random() * canvas.height * 0.5,
      radius: Math.random() * 2 + 1,
      color: `hsla(${170 + Math.random() * 40}, 70%, 60%, ${0.2 + Math.random() * 0.3})`,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -Math.random() * 0.3 - 0.1,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.03 + Math.random() * 0.02
    });
  }

  // Water ripples
  waterRipples = [];
  for (let i = 0; i < 8; i++) {
    waterRipples.push({
      x: Math.random() * canvas.width,
      y: canvas.height * 0.4 + Math.random() * canvas.height * 0.5,
      radius: 20 + Math.random() * 60,
      opacity: 0.1 + Math.random() * 0.1,
      expandSpeed: 0.3 + Math.random() * 0.2
    });
  }
}

function startGame() {
  initAudio();
  initGame();
  gameState = 'playing';
  gameStartTime = Date.now();
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('restart-btn').style.display = 'none';
  playLaunchSound();
}

function restartGame() {
  restartCount++;
  startGame();
}

function completeGame() {
  gameState = 'completed';
  playPayoffChord();
  document.getElementById('score-display').textContent = '🎵 Harbor Symphony Complete! 🎵';
  document.getElementById('restart-btn').style.display = 'block';
  document.getElementById('progress-bar').style.width = '100%';
}

function updateUI() {
  document.getElementById('score-display').textContent = `Passengers: ${progress} / ${TARGET_PASSENGERS}`;
  document.getElementById('progress-bar').style.width = `${(progress / TARGET_PASSENGERS) * 100}%`;
}

function updateEvidence() {
  window.__factoryxEvidence();
}

// === DRAWING FUNCTIONS ===
function drawBackground(cx, cy) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
  skyGrad.addColorStop(0, '#0a0e1a');
  skyGrad.addColorStop(0.5, '#152a3d');
  skyGrad.addColorStop(1, '#1a3a4a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);

  // Stars
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(star.twinkle) * 0.5})`;
    ctx.fill();
    star.twinkle += star.twinkleSpeed;
  });

  // Moon
  const moonX = canvas.width * 0.75;
  const moonY = canvas.height * 0.15;
  const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 40);
  moonGrad.addColorStop(0, 'rgba(255, 255, 220, 0.9)');
  moonGrad.addColorStop(0.5, 'rgba(255, 255, 200, 0.3)');
  moonGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
  ctx.beginPath();
  ctx.arc(moonX, moonY, 40, 0, Math.PI * 2);
  ctx.fillStyle = moonGrad;
  ctx.fill();

  // Water
  const waterGrad = ctx.createLinearGradient(0, canvas.height * 0.45, 0, canvas.height);
  waterGrad.addColorStop(0, '#1a3a4a');
  waterGrad.addColorStop(0.5, '#143040');
  waterGrad.addColorStop(1, '#0e202a');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, canvas.height * 0.45, canvas.width, canvas.height * 0.55);

  // Water reflections
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 5; i++) {
    const reflX = moonX + (i - 2) * 30;
    const reflY = canvas.height * 0.5 + i * 15 + Math.sin(time * 0.02 + i) * 5;
    const reflGrad = ctx.createRadialGradient(reflX, reflY, 0, reflX, reflY, 25);
    reflGrad.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
    reflGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
    ctx.beginPath();
    ctx.arc(reflX, reflY, 25, 0, Math.PI * 2);
    ctx.fillStyle = reflGrad;
    ctx.fill();
  }
  ctx.restore();
}

function drawDocks() {
  docks.forEach(dock => {
    const bobOffset = Math.sin(time * dock.bobSpeed + dock.pulsePhase) * 5;
    const dockY = dock.y + bobOffset;

    // Pulse effects
    const pulseRadius = dock.radius + Math.sin(time * 0.05 + dock.pulsePhase) * 8;
    const pulseGrad = ctx.createRadialGradient(dock.x, dockY, dock.radius * 0.5, dock.x, dockY, pulseRadius * 1.8);
    pulseGrad.addColorStop(0, dock.color);
    pulseGrad.addColorStop(0.7, `rgba(${hexToRgb(dock.color).join(',')}, 0.2)`);
    pulseGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(dock.x, dockY, pulseRadius * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = pulseGrad;
    ctx.fill();

    // Dock platform
    ctx.beginPath();
    ctx.ellipse(dock.x, dockY, dock.radius * 0.6, dock.radius * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${hexToRgb(dock.color).join(',')}, 0.3)`;
    ctx.fill();
    ctx.strokeStyle = dock.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Passenger indicator
    if (dock.hasPassenger) {
      // Passenger stands on dock
      const pX = dock.x;
      const pY = dockY - 15;
      // Body
      ctx.fillStyle = `rgba(255, 255, 255, 0.8)`;
      ctx.beginPath();
      ctx.roundRect(pX - 4, pY, 8, 14, 2);
      ctx.fill();
      // Head
      ctx.beginPath();
      ctx.arc(pX, pY - 5, 4, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      const glowGrad = ctx.createRadialGradient(pX, pY - 2, 0, pX, pY - 2, 12);
      glowGrad.addColorStop(0, 'rgba(255, 255, 200, 0.6)');
      glowGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
      ctx.beginPath();
      ctx.arc(pX, pY - 2, 12, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();
    }
  });
}

function drawFerry() {
  const bobAngle = ferry.bobAngle;
  const ferryY = ferry.y + Math.sin(bobAngle) * 3;

  ctx.save();
  ctx.translate(ferry.x, ferryY);
  ctx.rotate(Math.sin(bobAngle) * 0.03);

  // Hull shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 30, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hull
  const hullGrad = ctx.createLinearGradient(-30, 0, 30, 0);
  hullGrad.addColorStop(0, '#8b6914');
  hullGrad.addColorStop(0.5, '#c49a2e');
  hullGrad.addColorStop(1, '#8b6914');
  ctx.fillStyle = hullGrad;
  ctx.beginPath();
  ctx.moveTo(-28, 2);
  ctx.lineTo(28, 2);
  ctx.quadraticCurveTo(32, 8, 28, 12);
  ctx.lineTo(-28, 12);
  ctx.quadraticCurveTo(-32, 8, -28, 2);
  ctx.fill();
  ctx.strokeStyle = '#6b4e0a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Mast
  ctx.strokeStyle = '#6b4e0a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-5, 2);
  ctx.lineTo(-5, -22);
  ctx.stroke();

  // Sail
  const sailColor = gameState === 'completed' ? '#ffd93d' : '#f8f4e0';
  const sailGrad = ctx.createLinearGradient(-5, -22, 15, 0);
  sailGrad.addColorStop(0, sailColor);
  sailGrad.addColorStop(1, '#e8dcc4');
  ctx.fillStyle = sailGrad;
  ctx.beginPath();
  ctx.moveTo(-5, -22);
  ctx.lineTo(16, -5);
  ctx.lineTo(14, 2);
  ctx.lineTo(-5, 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Passengers on ferry
  for (let i = 0; i < Math.min(progress, 4); i++) {
    const pX = -15 + i * 10;
    const pY = 7;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pX, pY - 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ddd';
    ctx.fillRect(pX - 2, pY, 4, 6);
  }

  ctx.restore();
}

function drawParticles() {
  particles.forEach((p, i) => {
    ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.opacity})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI * 2);
    ctx.fill();
  });

  // Ambient particles
  ambientParticles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (0.7 + Math.sin(p.pulse) * 0.3), 0, Math.PI * 2);
    ctx.fill();
    p.pulse += p.pulseSpeed;
  });

  // Water ripples
  waterRipples.forEach(r => {
    const currentRadius = r.radius * (1 + Math.sin(time * 0.01) * 0.3);
    ctx.beginPath();
    ctx.arc(r.x, r.y, currentRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity * (0.5 + Math.sin(time * 0.02) * 0.5)})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

function drawBeatIndicator() {
  if (gameState !== 'playing') return;

  const beatPhase = (time * beatInterval) % beatInterval / beatInterval;
  if (beatPhase < 0.15) {
    const intensity = 1 - beatPhase / 0.15;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const beatGrad = ctx.createRadialGradient(cx, cy, 50, cx, cy, 150 + intensity * 50);
    beatGrad.addColorStop(0, `rgba(78, 205, 196, ${intensity * 0.15})`);
    beatGrad.addColorStop(1, 'rgba(78, 205, 196, 0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 150 + intensity * 50, 0, Math.PI * 2);
    ctx.fillStyle = beatGrad;
    ctx.fill();
  }
}

// === UPDATE FUNCTIONS ===
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
    p.vy += 0.02; // gravity
    p.radius *= 0.995;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }

  ambientParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y < canvas.height * 0.3) p.y = canvas.height * 0.3;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
  });
}

function updateWater() {
  waterRipples.forEach(r => {
    if (Math.random() < 0.005) {
      r.opacity = 0.1 + Math.random() * 0.1;
      r.radius = 20 + Math.random() * 60;
    }
  });
}

function updateDockPulses() {
  // Visual pulse rings from docks when beat occurs
  dockPulses.forEach((p, i) => {
    const cx = docks[p.dockIndex].x;
    const cy = docks[p.dockIndex].y + Math.sin(time * docks[p.dockIndex].bobSpeed);
    p.radius += p.speed;
    p.opacity -= 0.02;
    if (p.opacity <= 0) {
      dockPulses.splice(i, 1);
    }
  });

  dockPulses.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.cx, p.cy, p.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${hexToRgb(DOCK_COLORS[p.dockIndex]).join(',')}, ${p.opacity})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

// === GAME LOGIC ===
function updateGame() {
  time++;

  if (gameState === 'playing') {
    // Ferry bob
    ferry.bobAngle += ferry.bobSpeed;

    // Move ferry if moving
    if (ferry.isMoving) {
      const dx = ferry.targetX - ferry.x;
      const dy = ferry.targetY - ferry.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 4;

      if (dist > speed) {
        ferry.x += (dx / dist) * speed;
        ferry.y += (dy / dist) * speed;
      } else {
        ferry.isMoving = false;
        ferry.x = ferry.targetX;
        ferry.y = ferry.targetY;
        completeDockVisit();
      }
    }

    beatTimer += 16.67; // approximate ms per frame
    if (beatTimer >= beatInterval) {
      beatTimer = 0;
      // Spawn occasional pulse rings
      const randomDock = docks[Math.floor(Math.random() * docks.length)];
      dockPulses.push({
        dockIndex: randomDock.index,
        cx: randomDock.x,
        cy: randomDock.y,
        radius: randomDock.radius,
        opacity: 0.4,
        speed: 2
      });
    }

    // Spawn ambient particles
    if (Math.random() < 0.05) {
      particles.push({
        x: ferry.x + (Math.random() - 0.5) * 40,
        y: ferry.y + Math.random() * 10,
        vx: (Math.random() - 0.5) * 1,
        vy: -Math.random() * 1 - 0.5,
        radius: 2 + Math.random() * 2,
        color: `hsl(${170 + Math.random() * 30}, 70%, 60%)`,
        r: hexToRgb(`hsl(${170 + Math.random() * 30}, 70%, 60%)`),
        g: 0,
        b: 0,
        life: 1
      });
    }
  }

  updateParticles();
  updateWater();
  updateDockPulses();
}

function completeDockVisit() {
  const dock = docks.findIndex(d =>
    Math.abs(d.x - ferry.x) < 10 &&
    Math.abs(d.y - ferry.y) < 10
  );

  if (dock >= 0 && !docks[dock].hasPassenger) {
    docks[dock].hasPassenger = true;
    progress++;
    passengers.push({...dock, x: ferry.x, y: ferry.y - 20});
    playPassengerChord(dock);
    playSplashSound();

    // Celebration particles
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: docks[dock].x,
        y: docks[dock].y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        radius: 3 + Math.random() * 3,
        color: docks[dock].color,
        r: hexToRgb(docks[dock].color)[0],
        g: hexToRgb(docks[dock].color)[1],
        b: hexToRgb(docks[dock].color)[2],
        life: 1
      });
    }

    updateUI();
    updateEvidence();

    if (progress >= TARGET_PASSENGERS) {
      completeGame();
    }
  }
}

// === INPUT HANDLING ===
canvas.addEventListener('click', (event) => {
  if (gameState !== 'playing') return;

  const mx = event.clientX;
  const my = event.clientY;

  // Check if click is near a dock
  let targetDock = null;
  let minDist = Infinity;

  docks.forEach(dock => {
    const dx = mx - dock.x;
    const dy = my - (dock.y + Math.sin(time * dock.bobSpeed + dock.pulsePhase) * 5);
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < dock.radius * 2.5 && dist < minDist && !dock.hasPassenger) {
      minDist = dist;
      targetDock = dock;
    }
  });

  if (targetDock) {
    // Move ferry to dock
    ferry.targetX = targetDock.x;
    ferry.targetY = targetDock.y;
    ferry.isMoving = true;
    playLaunchSound();
  }
});

// === UTILITY FUNCTIONS ===
function hexToRgb(hex) {
  if (hex.startsWith('hsl')) {
    // Simple HSL to RGB conversion
    const part = hex.match(/hsl\((\d+\.?\d*),\s*(\d+\.?\d*)%,\s*(\d+\.?\d*)%\)/);
    if (!part) return [255, 255, 255];
    const h = parseFloat(part[1]);
    const s = parseFloat(part[2]) / 100;
    const l = parseFloat(part[3]) / 100;

    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));

    return [
      Math.round(f(0) * 255),
      Math.round(f(8) * 255),
      Math.round(f(4) * 255)
    ];
  }

  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? [
    parseInt(result[1], 16),
    parseInt(result[2], 16),
    parseInt(result[3], 16)
  ] : [255, 255, 255];
}

// === MAIN LOOP ===
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  drawBackground(cx, cy);
  drawBeatIndicator();
  drawDocks();
  drawParticles();
  drawFerry();

  updateGame();

  requestAnimationFrame(gameLoop);
}

// === POLYFILLS ===
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
    if (typeof radius === 'undefined') radius = 5;
    if (typeof radius === 'number') radius = [radius, radius, radius, radius];
    this.moveTo(x + radius[0], y);
    this.lineTo(x + width - radius[1], y);
    this.quadraticCurveTo(x + width, y, x + width, y + radius[1]);
    this.lineTo(x + width, y + height - radius[2]);
    this.quadraticCurveTo(x + width, y + height, x + width - radius[2], y + height);
    this.lineTo(x + radius[3], y + height);
    this.quadraticCurveTo(x, y + height, x, y + height - radius[3]);
    this.lineTo(x, y + radius[0]);
    this.quadraticCurveTo(x, y, x + radius[0], y);
    this.closePath();
  };
}

// === INITIALIZATION ===
initGame();
gameLoop();

</script>
