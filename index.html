<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signal Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #instructions {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #7a9a8a;
    font-size: 14px;
    text-align: center;
    pointer-events: none;
    opacity: 0.8;
    transition: opacity 1s;
  }
  #restart-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    background: rgba(20, 40, 30, 0.9);
    color: #5fd5a8;
    border: 2px solid #3a7a5a;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s, transform 0.2s;
    pointer-events: none;
    z-index: 10;
  }
  #restart-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  #restart-btn:hover {
    background: rgba(30, 70, 50, 0.95);
    transform: translateX(-50%) scale(1.05);
  }
  #signal-indicator {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: #8aff8a;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #signal-indicator.visible {
    opacity: 1;
  }
  #debrief {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s;
    pointer-events: none;
    z-index: 10;
  }
  #debrief.visible {
    opacity: 1;
    pointer-events: all;
  }
  #debrief h2 {
    color: #7af5c8;
    font-size: 28px;
    margin-bottom: 15px;
    text-shadow: 0 0 20px rgba(100, 245, 200, 0.5);
  }
  #debrief p {
    color: #8ab8a8;
    font-size: 16px;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  #debrief .score {
    color: #ffd58a;
    font-size: 18px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="instructions">Click the signal points on the dial to grow your plant</div>
  <div id="signal-indicator"></div>
  <div id="debrief">
    <h2 id="debrief-title"></h2>
    <p id="debrief-text"></p>
    <div class="score" id="debrief-score"></div>
  </div>
  <button id="restart-btn">🌱 Grow Again</button>
</div>
<script>
(function() {
  "use strict";

  // --- Audio Engine (Web Audio API, no dependencies) ---
  const AudioEngine = (() => {
    let ctx = null;
    let started = false;
    const gains = {};

    function init() {
      if (ctx) return;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      gains.main = ctx.createGain();
      gains.main.connect(ctx.destination);
      gains.main.gain.value = 0.6;
      gains.bass = ctx.createGain();
      gains.bass.connect(ctx.destination);
      gains.bass.gain.value = 0.4;
      gains.bloom = ctx.createGain();
      gains.bloom.connect(ctx.destination);
      gains.bloom.gain.value = 0;
      gains.particle = ctx.createGain();
      gains.particle.connect(ctx.destination);
      gains.particle.gain.value = 0.2;
    }

    function start() {
      if (!started) {
        init();
        ctx.resume().then(() => { started = true; });
      }
    }

    function playTone(freq, duration, type, vol, target) {
      if (!ctx || !started) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(target || gains.main);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    }

    function playClick(x) {
      const freqs = [220, 277, 330, 392];
      const idx = Math.floor(Math.random() * 4);
      playTone(freqs[idx], 0.15, 'sine', 0.25);
    }

    let bassOsc = null;
    function startBassLoop() {
      if (!ctx || !started) return;
      if (bassOsc) try { bassOsc.stop(); } catch(e) {}
      // Create a looping bass
      bassOsc = ctx.createOscillator();
      bassOsc.type = 'triangle';
      bassOsc.frequency.value = 65;
      const bassGain = ctx.createGain();
      bassGain.gain.value = 0.15;
      bassOsc.connect(bassGain);
      bassGain.connect(gains.bass);
      bassOsc.start();
      // Slow LFO for texture
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.3;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 15;
      lfo.connect(lfoGain);
      lfoGain.connect(bassOsc.frequency);
      lfo.start();
    }

    function playBloomNote(freq, duration, vol) {
      playTone(freq, duration || 1.2, 'sine', vol || 0.35);
      playTone(freq * 1.5, duration || 1.0, 'sine', (vol || 0.35) * 0.4);
    }

    function setBloomIntensity(v) {
      if (gains.bloom) {
        gains.bloom.gain.linearRampToValueAtTime(v, ctx.currentTime + 0.5);
      }
    }

    function playParticulate(count) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const freq = 400 + Math.random() * 800;
          playTone(freq, 0.1, 'sine', 0.08, gains.particle);
        }, i * 50);
      }
    }

    return { start, playClick, startBassLoop, playBloomNote, setBloomIntensity, playParticulate };
  })();

  // --- Canvas Setup ---
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Game State ---
  const DIAL_RADIUS = 200;
  const SIGNAL_POINTS = 4;
  const SIGNAL_DURATION = 2200; // ms a signal is visible
  const SIGNAL_GAP = 1800; // gap between signals
  const TOTAL_SIGNALS = 8; // total signals per run
  const MATCH_DISTANCE = 70; // px tolerance

  let state = {
    phase: 'idle', // idle, signal, bloom
    signals: [],
    signalIndex: 0,
    signalTimer: 0,
    matches: 0,
    plant: {
      stage: 0, // 0-7, increasing with matches
      growth: 0, // 0.0 - 1.0 smooth growth
      sway: 0,
      swayDir: 0,
      leaves: [],
      branches: [],
      glow: 0,
    },
    lastSignalTime: 0,
    matchFlash: 0,
    missFlash: 0,
    particles: [],
    startTime: 0,
    timer: 0,
    bloomAnim: 0,
    runComplete: false,
    score: 0,
  };

  let lastTime = 0;
  let signalPhaseTimer = 0;
  let waitingForSignal = true;

  // Dial signal point positions
  function getSignalPositions() {
    const positions = [];
    for (let i = 0; i < SIGNAL_POINTS; i++) {
      const angle = -(Math.PI / 2) + (i * 2 * Math.PI / SIGNAL_POINTS);
      positions.push({
        x: cx + Math.cos(angle) * DIAL_RADIUS,
        y: cy + Math.sin(angle) * DIAL_RADIUS,
      });
    }
    return positions;
  }

  // Plant growth states
  const plantStates = [
    { // Stage 0 - seed
      leaves: 0, branches: 0, height: 0, width: 2, glow: 0,
    },
    { // Stage 1 - sprout
      leaves: 2, branches: 0, height: 20, width: 2, glow: 0.1,
    },
    { // Stage 2 - early growth
      leaves: 4, branches: 1, height: 50, width: 3, glow: 0.2,
    },
    { // Stage 3 - growing
      leaves: 6, branches: 2, height: 90, width: 4, glow: 0.35,
    },
    { // Stage 4 - branching out
      leaves: 10, branches: 4, height: 130, width: 5, glow: 0.5,
    },
    { // Stage 5 - lush
      leaves: 14, branches: 6, height: 170, width: 6, glow: 0.65,
    },
    { // Stage 6 - nearly bloomed
      leaves: 18, branches: 8, height: 200, width: 7, glow: 0.8,
    },
    { // Stage 7 - full bloom!
      leaves: 24, branches: 12, height: 230, width: 9, glow: 1.0,
    },
  ];

  // Generate plant silhouette based on stage
  function generatePlantPath(stage) {
    const ps = plantStates[stage];
    const trunkH = ps.height;
    const trunkW = ps.width;
    const midY = cy + 120; // Ground line

    let path = new Path2D();

    // Main trunk
    path.moveTo(cx - trunkW, midY);
    path.lineTo(cx - trunkW * 0.5, midY - trunkH * 0.3);
    path.lineTo(cx - trunkW * 0.3, midY - trunkH * 0.7);
    path.lineTo(cx, midY - trunkH);
    path.lineTo(cx + trunkW * 0.3, midY - trunkH * 0.7);
    path.lineTo(cx + trunkW * 0.5, midY - trunkH * 0.3);
    path.lineTo(cx + trunkW, midY);

    // Branches
    for (let b = 0; b < Math.min(ps.branches, 12); b++) {
      const t = 0.25 + (b / ps.branches) * 0.65;
      const by = midY - trunkH * t;
      const side = b % 2 === 0 ? -1 : 1;
      const branchLen = 20 + (ps.width * 2) * t;
      const angle = side * (0.4 + (b % 3) * 0.15);
      const bEndX = cx + Math.cos(angle - Math.PI / 2) * branchLen * side;
      const bEndY = by - Math.abs(Math.sin(angle)) * branchLen;

      path.moveTo(cx + side * trunkW * (0.3 + t * 0.5), by);
      path.lineTo(bEndX, bEndY);
      // Leaf clusters at branch ends
      if (b < ps.leaves) {
        const leafSize = 4 + Math.random() * 6;
        path.moveTo(bEndX + side * leafSize, bEndY);
        path.lineTo(bEndX, bEndY - leafSize);
        path.lineTo(bEndX - side * leafSize * 0.5, bEndY + leafSize * 0.3);
        path.lineTo(bEndX, bEndY + leafSize * 0.1);
      }
    }

    // Top flower/bud (only in later stages)
    if (stage >= 5) {
      const bloomSize = 8 + (stage - 5) * 5;
      path.moveTo(cx, midY - trunkH - bloomSize);
      path.quadraticCurveTo(cx - bloomSize * 1.2, midY - trunkH, cx, midY - trunkH + bloomSize * 0.5);
      path.quadraticCurveTo(cx + bloomSize * 1.2, midY - trunkH, cx, midY - trunkH - bloomSize);
    }

    path.closePath();
    return path;
  }

  // --- Drawing ---
  function drawBackground() {
    // Deep space garden
    const grad = ctx.createRadialGradient(cx, cy + 50, 50, cx, cy + 50, H);
    grad.addColorStop(0, '#0f1a14');
    grad.addColorStop(0.6, '#080c10');
    grad.addColorStop(1, '#040608');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Subtle stars
    ctx.fillStyle = 'rgba(100, 140, 120, 0.3)';
    if (!drawBackground.stars) {
      drawBackground.stars = [];
      for (let i = 0; i < 50; i++) {
        drawBackground.stars.push({
          x: Math.random() * W,
          y: Math.random() * H * 0.6,
          r: 0.5 + Math.random() * 1.5,
          pulse: Math.random() * Math.PI * 2,
        });
      }
    }
    for (const s of drawBackground.stars) {
      s.pulse += 0.02;
      const alpha = 0.2 + Math.sin(s.pulse) * 0.15;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ground line
    const groundY = cy + 120;
    ctx.strokeStyle = 'rgba(60, 100, 80, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 300, groundY);
    ctx.lineTo(cx + 300, groundY);
    ctx.stroke();

    // Ground subtle glow
    const groundGrad = ctx.createRadialGradient(cx, groundY, 10, cx, groundY, 150);
    groundGrad.addColorStop(0, 'rgba(40, 80, 60, 0.15)');
    groundGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(cx - 200, groundY - 30, 400, 90);
  }

  function drawDial() {
    const dialY = cy + 120;
    const dialR = DIAL_RADIUS;

    // Dial glow
    ctx.save();
    ctx.shadowColor = 'rgba(50, 120, 90, 0.3)';
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(cx, cy, dialR + 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(40, 80, 60, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Dial circle
    ctx.beginPath();
    ctx.arc(cx, cy, dialR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(50, 90, 70, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(cx, cy, dialR * 0.85, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(40, 75, 55, 0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Signal point positions
    const positions = getSignalPositions();
    const activePos = state.signalIndex < state.signals.length ? state.signals[state.signalIndex].target : null;

    for (let i = 0; i < SIGNAL_POINTS; i++) {
      const p = positions[i];
      const isActive = activePos === i;
      const isMatched = activePos === i && isSignalActive() && state.signalMatched;

      // Signal ring
      if (isActive) {
        const flash = Math.sin(Date.now() * 0.008) * 0.4 + 0.6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100, 255, 160, ${flash * 0.3})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(80, 240, 150, ${flash * 0.5})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#75ffb0';
        ctx.fill();

        // Pulsing ring
        const pulseR = 18 + (Date.now() % SIGNAL_DURATION) / SIGNAL_DURATION * 30;
        ctx.beginPath();
        ctx.arc(p.x, p.y, pulseR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(120, 255, 180, ${0.4 * flash})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      } else if (state.signalIndex > 0 && state.signals[state.signalIndex - 1].target === i) {
        // Previously matched dots glow dimmer
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(80, 180, 130, 0.4)';
        ctx.fill();
      } else {
        // Inactive dots
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(60, 100, 80, 0.3)';
        ctx.fill();
      }
    }
  }

  function drawPlant() {
    const stage = Math.min(Math.floor(state.plant.growth * 7.99), 7);
    const ps = plantStates[stage];

    // Growth interpolation within stage
    const t = state.plant.growth * 7 - stage; // 0 to 1 within stage

    ctx.save();
    ctx.translate(0, ps.sway);

    // Glow behind plant
    if (ps.glow > 0) {
      const glowGrad = ctx.createRadialGradient(cx, cy + 50 - ps.height * 0.5, 10, cx, cy + 50 - ps.height * 0.5, ps.height * 1.5);
      const gAlpha = ps.glow * (0.15 + state.matchFlash * 0.3);
      glowGrad.addColorStop(0, `rgba(100, 240, 180, ${gAlpha})`);
      glowGrad.addColorStop(0.5, `rgba(60, 180, 130, ${gAlpha * 0.4})`);
      glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(cx - 250, cy + 50 - ps.height * 2, 500, ps.height * 2.5);
    }

    // Draw plant silhouette
    const plantPath = generatePlantPath(stage);

    // Fill with gradient
    const plantGrad = ctx.createLinearGradient(cx, cy + 120, cx, cy + 120 - ps.height);
    plantGrad.addColorStop(0, `rgba(25, 60, 40, ${0.8 + ps.glow * 0.2})`);
    plantGrad.addColorStop(0.5, `rgba(40, 100, 70, ${0.7 + ps.glow * 0.3})`);
    plantGrad.addColorStop(1, `rgba(60, 160, 110, ${0.6 + ps.glow * 0.4})`);

    ctx.fillStyle = plantGrad;
    ctx.fill(plantPath);

    // Outline glow
    ctx.strokeStyle = `rgba(100, 240, 170, ${0.3 + ps.glow * 0.5})`;
    ctx.lineWidth = 1.5;
    ctx.stroke(plantPath);

    // Bloom effect for late stages
    if (stage >= 5 && state.bloomAnim > 0) {
      const bloomR = 15 + Math.sin(Date.now() * 0.005) * 5;
      const bx = cx;
      const by = cy + 120 - ps.height;

      // Blooming petals
      const petalCount = stage >= 6 ? 8 : 5;
      for (let p = 0; p < petalCount; p++) {
        const pAngle = (p / petalCount) * Math.PI * 2 + Date.now() * 0.001;
        const pr = bloomR * (0.8 + state.bloomAnim * 0.4);
        const px = bx + Math.cos(pAngle) * pr;
        const py = by + Math.sin(pAngle) * pr;

        ctx.beginPath();
        ctx.ellipse(px, py, pr * 0.6, pr * 0.3, pAngle, 0, Math.PI * 2);
        const petalGrad = ctx.createRadialGradient(px, py, 0, px, py, pr * 0.6);
        petalGrad.addColorStop(0, `rgba(180, 255, 200, ${state.bloomAnim * 0.6 * ps.glow})`);
        petalGrad.addColorStop(1, `rgba(80, 200, 140, ${state.bloomAnim * 0.3 * ps.glow})`);
        ctx.fillStyle = petalGrad;
        ctx.fill();
      }
    }

    // Floating particles around bloom
    if (stage >= 6) {
      for (let i = 0; i < 8; i++) {
        const pt = Date.now() * 0.001 + i * 0.8;
        const pr = 30 + Math.sin(pt * 1.5 + i) * 20 + stage * 5;
        const pa = pt * 0.7 + i;
        const px = bx + Math.cos(pa) * pr;
        const py = by + Math.sin(pa) * pr;
        const alpha = 0.2 + Math.sin(pt * 2 + i) * 0.15;

        ctx.beginPath();
        ctx.arc(px, py, 2 + Math.sin(pt + i) * 1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140, 255, 200, ${alpha})`;
        ctx.fill();
      }
    }

    ctx.restore();
  }

  function drawParticles() {
    for (const p of state.particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
      ctx.fill();
    }
  }

  function drawProgressBar() {
    const barW = 200;
    const barH = 6;
    const barX = cx - barW / 2;
    const barY = cy + DIAL_RADIUS + 40;

    // Background
    ctx.fillStyle = 'rgba(30, 50, 40, 0.6)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 3);
    ctx.fill();

    // Progress
    const progress = state.plant.growth / 7;
    if (progress > 0) {
      const progGrad = ctx.createLinearGradient(barX, 0, barX + barW * progress, 0);
      progGrad.addColorStop(0, '#3a8a6a');
      progGrad.addColorStop(1, '#75ffc8');
      ctx.fillStyle = progGrad;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * Math.min(progress, 1), barH, 3);
      ctx.fill();

      // Glow on progress bar
      ctx.save();
      ctx.shadowColor = '#75ffc8';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(barX + barW * Math.min(progress, 1), barY + barH / 2, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#95ffd8';
      ctx.fill();
      ctx.restore();
    }
  }

  function drawTimer() {
    const elapsed = Date.now() - state.startTime;
    const remaining = Math.max(0, 90000 - elapsed);
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    ctx.fillStyle = 'rgba(80, 140, 110, 0.6)';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, cx, cy + DIAL_RADIUS + 65);
  }

  // --- Sound ---
  const sounds = {
    match: null,
    bloom: null,
    root: null,
  };

  function createSound(data) {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    ac.decodeAudioData(new Uint8Array(data), (buffer) => {
      sounds[data.id] = buffer;
    });
    return data.id;
  }

  function playSound(id, vol = 1.0) {
    if (sounds[id] && AudioEngine) {
      AudioEngine.start();
      const src = AudioEngine.ctx.createBufferSource();
      src.buffer = sounds[id];
      const gain = AudioEngine.ctx.createGain();
      gain.gain.value = vol;
      src.connect(gain);
      gain.connect(AudioEngine.ctx.destination);
      src.start(0);
    }
  }

  // Generate sounds using Web Audio API
  function generateMatchSound() {
    if (!AudioEngine.ctx) return;
    const ac = AudioEngine.ctx;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(780, ac.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.3);
  }

  function generateBloomSound() {
    if (!AudioEngine.ctx) return;
    const ac = AudioEngine.ctx;
    const notes = [262, 330, 392, 523];
    for (let i = 0; i < notes.length; i++) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[i];
      const t = ac.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 1.3);
    }
  }

  function generateBassDrone() {
    if (!AudioEngine.ctx) return;
    AudioEngine.startBassLoop();
  }

  function generateClickSound(freq) {
    if (!AudioEngine.ctx) return;
    const ac = AudioEngine.ctx;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.12);
  }

  // --- Game Logic ---
  let isSignalActive = () => {
    if (state.phase !== 'signal') return false;
    return Date.now() - state.signalStartTime < SIGNAL_DURATION;
  };

  function spawnMatchParticles(x, y, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        r: 1 + Math.random() * 3,
        life: 1,
        color: `100, 255, ${150 + Math.floor(Math.random() * 100)}`,
      });
    }
  }

  function generateSignalTarget() {
    return Math.floor(Math.random() * SIGNAL_POINTS);
  }

  function startSignal() {
    state.phase = 'signal';
    state.signalIndex++;
    state.signalMatched = false;
    state.signalStartTime = Date.now();
    state.signals.push({
      target: generateSignalTarget(),
      matched: false,
    });

    const indicator = document.getElementById('signal-indicator');
    indicator.textContent = `Signal ${state.signalIndex} / ${TOTAL_SIGNALS}`;
    indicator.classList.add('visible');

    generateBassDrone();
  }

  function endSignal() {
    if (state.phase !== 'signal') return;
    const sig = state.signals[state.signalIndex - 1];
    if (!sig.matched) {
      state.missFlash = 1;
    }

    state.phase = 'waiting';
    signalPhaseTimer = Date.now() + SIGNAL_GAP;
  }

  function checkMatch(x, y) {
    if (state.phase !== 'signal' || state.signalMatched) return false;
    const targetIdx = state.signals[state.signalIndex - 1].target;
    const positions = getSignalPositions();
    const targetPos = positions[targetIdx];
    const dist = Math.hypot(x - targetPos.x, y - targetPos.y);
    return dist <= MATCH_DISTANCE;
  }

  function triggerMatch() {
    state.signalMatched = true;
    const sig = state.signals[state.signalIndex - 1];
    sig.matched = true;
    state.matches++;

    const targetIdx = sig.target;
    const positions = getSignalPositions();
    const tp = positions[targetIdx];
    spawnMatchParticles(tp.x, tp.y, 20);

    generateMatchSound();
    AudioEngine.playClick(tp.x);
    AudioEngine.playParticulate(5);
    state.matchFlash = 1;

    // Grow plant
    state.plant.growth = Math.min(state.plant.growth + 1, 7.99);

    // Check if all signals done or bloom achieved
    if (state.matches >= 7) {
      triggerBloom();
    } else if (state.signalIndex >= TOTAL_SIGNALS) {
      // End without bloom
      triggerEnd(false);
    }
  }

  function triggerBloom() {
    state.phase = 'bloom';
    state.bloomAnim = 0;
    state.matchFlash = 1.5;
    state.score = Math.min(100, state.matches * 12);

    document.getElementById('signal-indicator').classList.remove('visible');

    generateBloomSound();
    AudioEngine.setBloomIntensity(0.8);
    AudioEngine.playParticulate(40);
  }

  function triggerEnd(success) {
    state.runComplete = true;
    state.phase = 'done';
    state.score = Math.min(100, Math.round((state.matches / TOTAL_SIGNALS) * 100));

    AudioEngine.setBloomIntensity(0);

    const debrief = document.getElementById('debrief');
    const title = document.getElementById('debrief-title');
    const text = document.getElementById('debrief-text');
    const score = document.getElementById('debrief-score');

    score.textContent = `Signals Matched: ${state.matches} / ${TOTAL_SIGNALS}`;

    if (success) {
      title.textContent = '🌸 Full Bloom!';
      text.textContent = 'Your garden has flourished with radiant energy. The electronic plant thrives, its signals woven perfectly with the garden\'s frequency.';
    } else {
      title.textContent = '🌱 Still Sprouting';
      text.textContent = 'The plant has begun growing but needs more signal matches to reach full bloom. Its frequency is incomplete.';
    }

    debrief.classList.add('visible');
    document.getElementById('restart-btn').classList.add('visible');
  }

  // --- Main Loop ---
  function update(dt) {
    const now = Date.now();

    // Timer
    if (!state.runComplete && now - state.startTime > 90000) {
      triggerEnd(false);
    }

    // Signal phase management
    if (state.phase === 'signal') {
      if (now - state.signalStartTime > SIGNAL_DURATION) {
        endSignal();
      }
    } else if (state.phase === 'waiting') {
      if (now >= signalPhaseTimer && state.signalIndex < TOTAL_SIGNALS) {
        startSignal();
      }
    } else if (state.phase === 'idle') {
      // Auto-start after a brief pause
      if (now - state.startTime > 1500) {
        startSignal();
      }
    }

    // Bloom animation
    if (state.phase === 'bloom') {
      state.bloomAnim = Math.min(1, state.bloomAnim + dt * 0.5);
      if (state.bloomAnim >= 1 && !state.runComplete) {
        setTimeout(() => triggerEnd(true), 2000);
      }
    }

    // Plant sway
    state.plant.swayDir += (Math.sin(now * 0.001) * 0.5 - state.plant.swayDir) * 0.05;
    state.plant.sway = state.plant.swayDir * 3;

    // Update particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.02; // gravity
      p.life -= dt * 1.2;
      if (p.life <= 0) state.particles.splice(i, 1);
    }

    // Fade flashes
    state.matchFlash *= 0.95;
    state.missFlash *= 0.9;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    // Plant glow pulse during match
    if (state.phase === 'signal' && state.signalMatched) {
      const extraGlow = Math.sin(Date.now() * 0.01) * 0.3;
      state.plant.glow += extraGlow * 0.1;
    }

    drawPlant();
    drawDial();
    drawParticles();
    drawProgressBar();
    drawTimer();

    // Signal timing indicator
    if (state.phase === 'signal') {
      const elapsed = Date.now() - state.signalStartTime;
      const timeLeft = Math.max(0, SIGNAL_DURATION - elapsed);
      const barW = 120;
      const barX = cx - barW / 2;
      const barY = cy - DIAL_RADIUS - 25;

      ctx.fillStyle = 'rgba(30, 50, 40, 0.6)';
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW, 4, 2);
      ctx.fill();

      ctx.fillStyle = `rgba(100, 240, 170, 0.7)`;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * (timeLeft / SIGNAL_DURATION), 4, 2);
      ctx.fill();
    }

    // Miss/Match flash overlay
    if (state.missFlash > 0.05) {
      ctx.fillStyle = `rgba(200, 50, 50, ${state.missFlash * 0.15})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (state.matchFlash > 0.05) {
      ctx.fillStyle = `rgba(80, 255, 150, ${state.matchFlash * 0.1})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;

    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  // --- Input ---
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    AudioEngine.start();

    if (state.runComplete) return;

    // Check if click is on a signal point
    const positions = getSignalPositions();
    let matched = false;

    if (state.phase === 'signal') {
      if (checkMatch(x, y)) {
        triggerMatch();
        matched = true;
      }
    }

    // Play click sound regardless
    // Find closest signal point (not just for matching)
    let closestDist = Infinity;
    let closestIdx = -1;
    for (let i = 0; i < positions.length; i++) {
      const d = Math.hypot(x - positions[i].x, y - positions[i].y);
      if (d < closestDist) {
        closestDist = d;
        closestIdx = i;
      }
    }

    // Play a click based on position if it's within reasonable range
    if (closestDist < MATCH_DISTANCE + 10 && !matched) {
      const freqs = [220, 277, 330, 392];
      generateClickSound(freqs[closestIdx === -1 ? 0 : closestIdx]);

      // Spawn small particles
      if (positions[closestIdx]) {
        const sp = positions[closestIdx];
        spawnMatchParticles(sp.x, sp.y, 5);
      }
    }
  });

  document.getElementById('restart-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    resetGame();
  });

  function resetGame() {
    state = {
      phase: 'idle',
      signals: [],
      signalIndex: 0,
      signalTimer: 0,
      signals: [],
      signalIndex: 0,
      signalStartTime: 0,
      signalMatched: false,
      matchFlash: 0,
      missFlash: 0,
      particles: [],
      startTime: 0,
      timer: 0,
      bloomAnim: 0,
      runComplete: false,
      score: 0,
      matches: 0,
      plant: {
        stage: 0,
        growth: 0,
        sway: 0,
        swayDir: 0,
        leaves: [],
        branches: [],
        glow: 0,
      },
    };

    drawBackground.stars = null;

    // Reset dial visual
    document.getElementById('signal-indicator').classList.remove('visible');
    document.getElementById('debrief').classList.remove('visible');
    document.getElementById('restart-btn').classList.remove('visible');
    document.getElementById('instructions').style.opacity = '0.8';

    state.startTime = Date.now();
    state.phase = 'idle';

    AudioEngine.setBloomIntensity(0);
  }

  // --- Start ---
  resetGame();
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
