<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Georgia', serif; }
canvas { display: block; cursor: none; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start; padding-top: 20px;
}
#score-display {
  color: #ffd700; font-size: 22px; text-shadow: 0 0 10px rgba(255,215,0,0.5);
  opacity: 0.85; letter-spacing: 2px;
}
#info-text {
  color: #8899bb; font-size: 14px; margin-top: 8px; opacity: 0.7;
}
#message-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; pointer-events: none; opacity: 0;
  transition: opacity 0.5s;
}
#message-overlay.visible { opacity: 1; pointer-events: auto; }
#message-overlay h1 {
  color: #ffd700; font-size: 36px; margin-bottom: 12px;
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
}
#message-overlay p {
  color: #aabbdd; font-size: 18px; margin-bottom: 20px;
}
#restart-btn {
  background: linear-gradient(135deg, #2a3a5c, #1a2a4c);
  color: #ffd700; border: 1px solid #ffd70044;
  padding: 12px 32px; font-size: 16px; cursor: pointer;
  border-radius: 8px; pointer-events: auto; transition: all 0.3s;
  font-family: 'Georgia', serif;
}
#restart-btn:hover { background: linear-gradient(135deg, #3a4a7c, #2a3a6c); box-shadow: 0 0 15px #ffd70044; }
#start-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; background: rgba(10,14,26,0.9);
  pointer-events: auto; cursor: pointer;
}
#start-overlay h1 {
  color: #ffd700; font-size: 42px; margin-bottom: 16px;
  text-shadow: 0 0 30px rgba(255,215,0,0.5);
}
#start-overlay p {
  color: #8899bb; font-size: 18px; margin-bottom: 8px;
}
#start-overlay .hint {
  color: #6688aa; font-size: 14px; margin-top: 20px;
  animation: pulse-hint 2s ease-in-out infinite;
}
@keyframes pulse-hint {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}
#pulse-indicator {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; pointer-events: none;
}
.pulse-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #1a2a4c; border: 2px solid #334;
  transition: all 0.3s;
}
.pulse-dot.collected {
  background: #ffd700; border-color: #ffd700;
  box-shadow: 0 0 10px #ffd70088;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="score-display">Pulses: 0 / 3</div>
  <div id="info-text">Guide your moth to magnetic flowers</div>
  <div id="pulse-indicator">
    <div class="pulse-dot" id="dot0"></div>
    <div class="pulse-dot" id="dot1"></div>
    <div class="pulse-dot" id="dot2"></div>
  </div>
</div>
<div id="message-overlay">
  <h1 id="msg-title"></h1>
  <p id="msg-body"></p>
  <button id="restart-btn">Fly Again ✦</button>
</div>
<div id="start-overlay">
  <h1>✦ Magnetic Moth ✦</h1>
  <p>A tiny creature seeks light among magnetic flowers</p>
  <p>Click anywhere to begin</p>
  <div class="hint">Collect 3 pulses to complete your journey</div>
</div>

<script>
// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, vol, type='sine', rampEndFreq) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (rampEndFreq) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(rampEndFreq,20), audioCtx.currentTime + duration);
  }
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playCollect() {
  playTone(523, 0.15, 0.15, 'sine', 880);
  setTimeout(() => playTone(659, 0.15, 0.12, 'sine', 990), 80);
}

function playFail() {
  playTone(200, 0.6, 0.1, 'sawtooth', 60);
}

function playPayoff() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playTone(f, 0.3, 0.12, 'sine', f * 1.2), i * 120);
  });
}

function playAmbient() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 180;
  gain.gain.value = 0.015;
  lfo.type = 'sine';
  lfo.frequency.value = 0.3;
  lfoGain.gain.value = 8;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  lfo.start();
  return { osc, gain, lfo, lfoGain };
}

let ambientSound = null;

// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== GAME STATE =====
let moths = [];
let flowers = [];
let particles = [];
let magnetPulses = [];
let pulseCount = 0;
let gameStarted = false;
let gameEnded = false;
let gameOverType = '';
let startTime = 0;
let mouse = { x: W / 2, y: H / 2 };
let gameTime = 0;
const MAX_PULSES = 3;
const END_TIME = 75000; // ~75 seconds game

// ===== CLASSES =====
class Moth {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.size = 8;
    this.wingAngle = 0;
    this.trail = [];
    this.glow = 0.5;
  }

  update(dt, targetX, targetY) {
    // Smooth follow
    const dx = targetX - this.x;
    const dy = targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = Math.min(dist * 0.03, 6);
    if (dist > 2) {
      this.vx += (dx / dist) * speed * 0.15;
      this.vy += (dy / dist) * speed * 0.15;
    }
    // Damping
    this.vx *= 0.88;
    this.vy *= 0.88;
    this.x += this.vx;
    this.y += this.vy;
    // Clamp
    this.x = Math.max(this.size, Math.min(W - this.size, this.x));
    this.y = Math.max(this.size, Math.min(H - this.size, this.y));
    // Wings
    this.wingAngle += 0.3 + gameTime * 0.00005;
    // Trail
    this.trail.push({ x: this.x, y: this.y, age: 0 });
    if (this.trail.length > 20) this.trail.shift();
    this.trail.forEach(p => p.age += dt * 0.001);
    // Glow pulse
    this.glow = 0.4 + Math.sin(gameTime * 0.005) * 0.2;
  }

  draw() {
    // Draw trail
    this.trail.forEach((p, i) => {
      const a = Math.max(0, 1 - p.age * 1.5) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 230, 150, ${a})`;
      ctx.fill();
    });

    const scale = 1 + Math.sin(this.wingAngle) * 0.3;

    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 40);
    grad.addColorStop(0, `rgba(255, 220, 100, ${this.glow * 0.5})`);
    grad.addColorStop(1, 'rgba(255, 220, 100, 0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, 40, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Body
    ctx.save();
    ctx.translate(this.x, this.y);
    const angle = Math.atan2(this.vy, this.vx);
    ctx.rotate(angle);

    // Wings
    ctx.fillStyle = 'rgba(255, 240, 180, 0.7)';
    ctx.beginPath();
    ctx.ellipse(-2, -6 * scale, 8 * scale, 4 * scale, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-2, 6 * scale, 8 * scale, 4 * scale, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#ffe8aa';
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#ffcc66';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(5, -2);
    ctx.quadraticCurveTo(12, -8, 10, -10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(5, 2);
    ctx.quadraticCurveTo(12, 8, 10, 10);
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(5, -2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, 2, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

class MagneticFlower {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 0=pulse, 1=drain, 2=shield
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.baseSize = 20 + Math.random() * 10;
    this.collected = false;
    this.collectAnim = 0;
    this.rotation = Math.random() * Math.PI * 2;
    // Color based on type
    if (type === 0) {
      this.color1 = '#ffd700'; this.color2 = '#ff8c00'; this.pulseColor = '#ffd700';
    } else if (type === 1) {
      this.color1 = '#8b45a8'; this.color2 = '#4a0060'; this.pulseColor = '#8b45a8';
    } else {
      this.color1 = '#44dd88'; this.color2 = '#008844'; this.pulseColor = '#44dd88';
    }
  }

  update(dt) {
    this.pulsePhase += dt * 0.003;
    this.rotation += dt * 0.0005;
    if (this.collected) {
      this.collectAnim += dt * 0.003;
    }
    this.pulsePhase += 0.001 * (1 + gameTime * 0.00002); // escalates
  }

  draw() {
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.25;
    const size = this.baseSize * pulse;

    if (this.collected) {
      const alpha = Math.max(0, 1 - this.collectAnim);
      const s = size * (1 + this.collectAnim * 3);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation * 3);
      // Burst effect
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(Math.cos(i * Math.PI / 3) * s * 0.5, Math.sin(i * Math.PI / 3) * s * 0.5, 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color1;
        ctx.fill();
      }
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    // Glow
    const glowSize = size * 2.5;
    const glow = ctx.createRadialGradient(0, 0, size * 0.3, 0, 0, glowSize);
    glow.addColorStop(0, this.pulseColor + '66');
    glow.addColorStop(1, this.pulseColor + '00');
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Petals
    const petalCount = this.type === 0 ? 7 : this.type === 1 ? 5 : 8;
    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2;
      ctx.save();
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.ellipse(size * 0.6, 0, size * 0.5, size * 0.2, 0, 0, Math.PI * 2);
      const g = ctx.createLinearGradient(0, -size * 0.2, 0, size * 0.2);
      g.addColorStop(0, this.color1);
      g.addColorStop(1, this.color2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    }

    // Center
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Type indicator
    ctx.fillStyle = '#000';
    ctx.font = `${size * 0.35}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (this.type === 0) ctx.fillText('✦', 0, 0);
    else if (this.type === 1) ctx.fillText('✕', 0, 0);
    else ctx.fillText('◆', 0, 0);

    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, vx, vy, life) {
    this.x = x; this.y = y; this.color = color;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
  }
  update(dt) {
    this.x += this.vx * dt * 0.06;
    this.y += this.vy * dt * 0.06;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life -= dt;
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2 * a, 0, Math.PI * 2);
    ctx.fillStyle = this.color + Math.floor(a * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }
}

// ===== GAME FUNCTIONS =====
let mouseX = W / 2, mouseY = H / 2;
let trailPoints = [];

function spawnFlowers() {
  flowers = [];
  const flowerCount = 10 + Math.floor(Math.random() * 5);
  for (let i = 0; i < flowerCount; i++) {
    let x, y, tries = 0;
    let type = i < 5 ? 0 : (i < 7 ? 1 : 2);
    do {
      x = 60 + Math.random() * (W - 120);
      y = 80 + Math.random() * (H - 160);
      tries++;
    } while (Math.hypot(x - W / 2, y - H / 2) < 100 && tries < 20);
    flowers.push(new MagneticFlower(x, y, type));
  }
}

function resetGame() {
  pulseCount = 0;
  gameTime = 0;
  gameStarted = false;
  gameEnded = false;
  gameOverType = '';
  particles = [];
  magnetPulses = [];
  moths = [new Moth(W / 2, H / 2)];
  spawnFlowers();
  updatePulseUI();
  document.getElementById('message-overlay').classList.remove('visible');
  document.getElementById('score-display').textContent = `Pulses: 0 / ${MAX_PULSES}`;
}

function showMessage(title, body, isWin) {
  gameEnded = true;
  gameOverType = isWin ? 'win' : 'lose';
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  const overlay = document.getElementById('message-overlay');
  overlay.classList.add('visible');
}

function updatePulseUI() {
  for (let i = 0; i < MAX_PULSES; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('collected', i < pulseCount);
  }
}

// ===== BACKGROUND STARS =====
const stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    size: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.5
  });
}

function drawBackground(dt) {
  // Dark gradient background
  const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#0f1628');
  grad.addColorStop(1, '#080c18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.twinkle += s.speed * dt * 0.001;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 240, ${alpha})`;
    ctx.fill();
  });

  // Subtle magnetic field lines
  ctx.strokeStyle = 'rgba(100, 120, 180, 0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const y = 50 + i * (H / 8);
    ctx.beginPath();
    for (let x = 0; x < W; x += 10) {
      const wave = Math.sin(x * 0.008 + gameTime * 0.001 + i) * 20;
      if (x === 0) ctx.moveTo(x, y + wave);
      else ctx.lineTo(x, y + wave);
    }
    ctx.stroke();
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  if (gameStarted && !gameEnded) {
    gameTime += dt;
    // Check end conditions
    if (pulseCount >= MAX_PULSES) {
      // Victory!
      playPayoff();
      // Spawn celebration particles
      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push(new Particle(W / 2, H / 2, '#ffd700',
          Math.cos(angle) * speed, Math.sin(angle) * speed, 1500 + Math.random() * 1000));
      }
      showMessage('✦ Radiant Ascent ✦', 'Your moth gathered all magnetic pulses and ascended into the luminous deep.', true);
    } else if (gameTime >= END_TIME) {
      playFail();
      showMessage('Fading Light', `Your moth gathered ${pulseCount} of ${MAX_PULSES} pulses before the magnetic field dissipated. Return to the flower bed and try again.`, false);
    }

    // Update moths
    moths.forEach(m => m.update(dt, mouseX, mouseY));

    // Update flowers
    flowers.forEach(f => f.update(dt));

    // Check collection
    moths.forEach(m => {
      flowers.forEach(f => {
        if (!f.collected) {
          const dist = Math.hypot(m.x - f.x, m.y - f.y);
          if (dist < m.size + f.baseSize * 0.8) {
            f.collected = true;
            if (f.type === 0) {
              pulseCount++;
              updatePulseUI();
              playCollect();
              // Particles
              for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push(new Particle(f.x, f.y, '#ffd700',
                  Math.cos(angle) * (1 + Math.random() * 2),
                  Math.sin(angle) * (1 + Math.random() * 2), 800 + Math.random() * 400));
              }
            } else if (f.type === 1) {
              // Drain - lose a pulse if possible
              if (pulseCount > 0) {
                pulseCount--;
                updatePulseUI();
                playTone(100, 0.3, 0.1, 'sawtooth');
              }
              for (let i = 0; i < 10; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push(new Particle(f.x, f.y, '#8b45a8',
                  Math.cos(angle) * 2, Math.sin(angle) * 2, 600));
              }
            } else if (f.type === 2) {
              // Shield - minor speed boost
              moths.forEach(m => { m.vx *= 1.3; m.vy *= 1.3; });
              for (let i = 0; i < 10; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push(new Particle(f.x, f.y, '#44dd88',
                  Math.cos(angle) * 2, Math.sin(angle) * 2, 500));
              }
            }
          }
        }
      });
    });

    // Magnetic attraction for pulse flowers (optional path choice)
    const attractFlowers = flowers.filter(f => !f.collected && f.type === 0);
    if (attractFlowers.length > 0 && gameTime > 15000) {
      // At later game, pulse flowers have stronger magnetism
      const strength = Math.min(0.0003 * gameTime * 0.001, 0.008);
      moths.forEach(m => {
        let ax = 0, ay = 0;
        attractFlowers.forEach(f => {
          const dx = f.x - m.x;
          const dy = f.y - m.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 10) {
            ax += (dx / dist) * strength * (1 / Math.max(dist / 200, 0.5));
            ay += (dy / dist) * strength * (1 / Math.max(dist / 200, 0.5));
          }
        });
        m.vx += ax;
        m.vy += ay;
      });
    }

    // Drain flowers repel
    const drainFlowers = flowers.filter(f => !f.collected && f.type === 1);
    if (drainFlowers.length > 0) {
      moths.forEach(m => {
        drainFlowers.forEach(f => {
          const dx = m.x - f.x;
          const dy = m.y - f.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 200 && dist > 10) {
            m.vx += (dx / dist) * 0.08;
            m.vy += (dy / dist) * 0.08;
          }
        });
      });
    }

    // Escalation: drain flowers get more aggressive over time
    if (gameTime > 30000) {
      drainFlowers.forEach(f => {
        f.baseSize += dt * 0.002;
      });
    }
  }

  // Update particles always
  particles = particles.filter(p => {
    p.update(dt);
    return p.life > 0;
  });

  // ===== RENDER =====
  drawBackground(dt);

  // Draw flowers
  flowers.forEach(f => f.draw());

  // Draw moths
  moths.forEach(m => m.draw());

  // Draw particles
  particles.forEach(p => p.draw());

  // Draw magnet field lines between moth and nearest pulse flower (if any)
  if (gameStarted && !gameEnded) {
    const nearestPulse = flowers.filter(f => !f.collected && f.type === 0)
      .sort((a, b) => Math.hypot(a.x - moths[0].x, a.y - moths[0].y) - Math.hypot(b.x - moths[0].x, b.y - moths[0].y))[0];
    if (nearestPulse && gameTime > 15000) {
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 10]);
      const dist = Math.hypot(nearestPulse.x - moths[0].x, nearestPulse.y - moths[0].y);
      if (dist < 400) {
        ctx.beginPath();
        for (let t = 0; t <= 1; t += 0.02) {
          const cx = moths[0].x + (nearestPulse.x - moths[0].x) * t + Math.sin(t * 8 + gameTime * 0.005) * dist * 0.05;
          const cy = moths[0].y + (nearestPulse.y - moths[0].y) * t + Math.cos(t * 8 + gameTime * 0.005) * dist * 0.05;
          if (t === 0) ctx.moveTo(cx, cy);
          else ctx.lineTo(cx, cy);
        }
        ctx.stroke();
      }
      ctx.setLineDash([]);
    }
  }

  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });

// Start overlay
document.getElementById('start-overlay').addEventListener('click', () => {
  initAudio();
  ambientSound = playAmbient();
  document.getElementById('start-overlay').style.display = 'none';
  gameStarted = true;
  resetGame();
  gameStarted = true;
});

document.getElementById('start-overlay').addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  ambientSound = playAmbient();
  document.getElementById('start-overlay').style.display = 'none';
  gameStarted = true;
  resetGame();
  gameStarted = true;
}, { passive: false });

// Restart button
document.getElementById('restart-btn').addEventListener('click', () => {
  initAudio();
  resetGame();
  gameStarted = true;
});

document.getElementById('restart-btn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  resetGame();
  gameStarted = true;
}, { passive: false });

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ===== START =====
resetGame();
requestAnimationFrame(gameLoop);
</script>
