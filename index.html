<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    cursor: pointer;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
  }
  #score-display {
    color: #e0e8ff;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    letter-spacing: 2px;
    opacity: 0.9;
  }
  #restart-btn {
    pointer-events: auto;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #e0e8ff;
    padding: 10px 28px;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(20px);
  }
  #restart-btn.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #restart-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #e0e8ff;
    font-size: 22px;
    text-align: center;
    text-shadow: 0 0 20px rgba(100,150,255,0.7);
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
    letter-spacing: 1px;
    line-height: 1.6;
  }
  #message.visible { opacity: 1; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
  <div id="score-display"></div>
  <div id="message"></div>
  <button id="restart-btn">↻ Play Again</button>
</div>

<script>
(function() {
  // ========== EVIDENCE API ==========
  let evidenceState = {
    schema_version: 1,
    phase: 'initial',
    progress: 0,
    target: 25,
    completed: false,
    restart_count: 0
  };
  window.__factoryxEvidence = function() {
    return { ...evidenceState };
  };

  // ========== CANVAS SETUP ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score-display');
  const msgEl = document.getElementById('message');
  const restartBtn = document.getElementById('restart-btn');

  let W, H, CX, CY;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // ========== AUDIO ENGINE ==========
  let audioCtx = null;
  let audioStarted = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playChimeTone(freq, duration, vol) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    // Main tone - sine with attack/decay
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.002, t + duration);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol * 0.15, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);

    // Overtone for glassiness
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 3.01, t);
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(vol * 0.03, t + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + duration * 0.5);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + duration * 0.5);
  }

  function playPayoffChord() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((f, i) => {
      setTimeout(() => playChimeTone(f, 3.0, 0.4), i * 100);
    });
    // Final bass
    setTimeout(() => {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(130.81, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 4);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 4);
    }, 400);
  }

  function playRainSound(intensity) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.3;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1)) * intensity * 0.03;
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800 + Math.random() * 400, t);
    filter.Q.setValueAtTime(2, t);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    source.connect(filter).connect(gain).connect(audioCtx.destination);
    source.start(t);
  }

  // ========== GAME STATE ==========
  const DIAL_RADIUS = 90;
  const CHIME_COUNT = 5;
  const CHIME_RADIUS = Math.min(W, H) * 0.28;
  const CHIME_HITS_NEEDED = 5;
  const TARGET_CHIME = 3; // index of the locked chime

  // Pentatonic scale frequencies
  const CHIME_FREQS = [261.63, 293.66, 329.63, 392.00, 440.00]; // C D E G A

  let chimes = [];
  let drops = [];
  let particles = [];
  let dialAngle = 0;
  let dialTargetAngle = 0;
  let dialAnimating = false;
  let lockedChime = -1;
  let score = 0;
  let gamePhase = 'initial'; // initial, playing, completed
  let time = 0;
  let rainIntensity = 1;
  let shakeX = 0, shakeY = 0;
  let payoffParticles = [];
  let sunburstAngle = 0;
  let sunburstVisible = 0;

  function initChimes() {
    chimes = [];
    for (let i = 0; i < CHIME_COUNT; i++) {
      const angle = (Math.PI * 2 / CHIME_COUNT) * i - Math.PI / 2;
      const chimeX = CX + Math.cos(angle) * CHIME_RADIUS;
      const chimeY = CY + Math.sin(angle) * CHIME_RADIUS;
      chimes.push({
        x: chimeX,
        y: chimeY,
        angle: angle,
        hits: 0,
        needed: CHIME_HITS_NEEDED,
        unlocked: i !== TARGET_CHIME,
        frequency: CHIME_FREQS[i],
        glow: 0,
        lockedIcon: i === TARGET_CHIME ? '🔒' : null
      });
    }
    lockedChime = TARGET_CHIME;
  }

  function reset() {
    score = 0;
    dialAngle = 0;
    dialTargetAngle = 0;
    gamePhase = 'initial';
    rainIntensity = 1;
    drops = [];
    particles = [];
    payoffParticles = [];
    sunburstVisible = 0;
    evidenceState = {
      schema_version: 1,
      phase: 'initial',
      progress: 0,
      target: CHIME_COUNT * CHIME_HITS_NEEDED,
      completed: false,
      restart_count: evidenceState.restart_count + 1
    };
    initChimes();
    updateScore();
    msgEl.classList.remove('visible');
    restartBtn.classList.remove('visible');
  }

  function updateScore() {
    score = chimes.reduce((s, c) => s + c.hits, 0);
    evidenceState.progress = score;
    evidenceState.phase = gamePhase;
    evidenceState.completed = gamePhase === 'completed';
    scoreEl.textContent = `${score} / ${evidenceState.target}`;
  }

  // ========== DROP MANAGEMENT ==========
  function spawnDrop() {
    if (gamePhase !== 'playing') return;
    const spacing = W / 20;
    const x = Math.random() * W;
    const y = -20;
    const speed = 1.5 + Math.random() * 1.5 + rainIntensity * 0.5;
    const targetChime = Math.floor(Math.random() * CHIME_COUNT);
    drops.push({
      x: x,
      y: y,
      speed: speed,
      targetChime: targetChime,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 2 + Math.random() * 2,
      size: 3 + Math.random() * 2
    });
  }

  let lastDropTime = 0;
  let dropInterval = 600;

  // ========== PARTICLES ==========
  function spawnParticles(x, y, color, count, spread) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = spread * (0.5 + Math.random());
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.02,
        color: color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function spawnPayoffParticles() {
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      const colors = ['#ffd700', '#ff6b6b', '#6bffa8', '#6bb5ff', '#d6a3ff', '#fff'];
      payoffParticles.push({
        x: CX,
        y: CY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.005 + Math.random() * 0.01,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 3 + Math.random() * 5
      });
    }
  }

  // ========== INTERACTION ==========
  canvas.addEventListener('click', (e) => {
    initAudio();
    if (!audioStarted) {
      audioStarted = true;
      if (gamePhase === 'initial') {
        gamePhase = 'playing';
        evidenceState.phase = 'playing';
        msgEl.classList.remove('visible');
      }
    }

    if (gamePhase === 'completed') {
      reset();
      return;
    }

    if (gamePhase !== 'playing') return;

    const mx = e.clientX;
    const my = e.clientY;

    // Check if dial was clicked (rotate it)
    const dx = mx - CX;
    const dy = my - CY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < DIAL_RADIUS + 30 && dist > 30) {
      // Rotate dial towards click
      const angle = Math.atan2(dy, dx);
      dialTargetAngle = angle;
      dialAnimating = true;
      spawnParticles(CX + dx, CY + dy, '#88aaff', 5, 1.5);
      return;
    }

    // Check if chime was clicked
    for (let i = 0; i < chimes.length; i++) {
      const c = chimes[i];
      const cdx = mx - c.x;
      const cdy = my - c.y;
      const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
      if (cdist < 35) {
        // Can only click unlocked chimes or the correct locked chime
        if (!c.unlocked && c !== chimes[lockedChime]) continue;
        if (c === chimes[lockedChime] && !isDialAligned()) continue;

        c.hits++;
        c.glow = 1;
        score += 1;

        playChimeTone(c.frequency, 1.5, 0.6);
        spawnParticles(c.x, c.y, '#aaddff', 8, 2);

        // Shake for locked chime unlock
        if (c === chimes[lockedChime] && c.hits >= CHIME_HITS_NEEDED) {
          c.unlocked = true;
          shakeX = (Math.random() - 0.5) * 15;
          shakeY = (Math.random() - 0.5) * 15;
          playChimeTone(c.frequency * 2, 0.5, 0.3);
          spawnParticles(c.x, c.y, '#ffd700', 20, 4);
          msgEl.textContent = '✨ The chime unlocks! ✨';
          msgEl.classList.add('visible');
          setTimeout(() => msgEl.classList.remove('visible'), 2000);
        }

        updateScore();

        // Check for payoff
        if (score >= evidenceState.target) {
          triggerPayoff();
        }
        return;
      }
    }
  });

  restartBtn.addEventListener('click', () => {
    reset();
  });

  function isDialAligned() {
    const lockedChimeObj = chimes[lockedChime];
    const diff = Math.abs(normalizeAngle(dialAngle - lockedChimeObj.angle));
    return diff < 0.4;
  }

  function normalizeAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function triggerPayoff() {
    gamePhase = 'completed';
    evidenceState.phase = 'completed';
    evidenceState.completed = true;
    playPayoffChord();
    spawnPayoffParticles();
    sunburstVisible = 1;
    msgEl.textContent = '🌈 Rain stops. A melody blooms... 🌈';
    msgEl.classList.add('visible');
    rainIntensity = 0;
    setTimeout(() => {
      msgEl.textContent = '🎵 A gentle symphony from the rain 🎵';
    }, 3000);
    setTimeout(() => {
      restartBtn.classList.add('visible');
    }, 3000);
  }

  // ========== GAME LOOP ==========
  let lastTime = 0;

  function update(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 16.67, 3);
    lastTime = timestamp;
    time += dt;

    // Spawn drops
    if (gamePhase === 'playing') {
      const spawnRate = Math.max(80, dropInterval - rainIntensity * 80);
      if (timestamp - lastDropTime > spawnRate) {
        spawnDrop();
        lastDropTime = timestamp;
        // Increase rain intensity over time
        rainIntensity = 1 + (score / evidenceState.target) * 2;
        dropInterval = Math.max(200, dropInterval - 2);
      }
    }

    // Dial rotation animation
    if (dialAnimating) {
      const diff = dialTargetAngle - dialAngle;
      if (Math.abs(diff) < 0.01) {
        dialAngle = dialTargetAngle;
        dialAnimating = false;
      } else {
        dialAngle += diff * 0.15 * dt;
      }
    }

    // Update drops
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.y += d.speed * dt;
      d.wobble += d.wobbleSpeed * 0.05 * dt;
      d.x += Math.sin(d.wobble) * 0.5 * dt;

      // Check collision with chimes
      for (let j = 0; j < chimes.length; j++) {
        const c = chimes[j];
        const dx = d.x - c.x;
        const dy = d.y - c.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 30) {
          // Drop hits this chime if it's not the target and chime accepts random drops
          if (j !== d.targetChime && Math.random() < 0.4) {
            if (!c.unlocked && c !== chimes[lockedChime]) continue;
            if (c === chimes[lockedChime] && !isDialAligned()) continue;

            c.hits++;
            c.glow = 1;
            score += 1;
            playChimeTone(c.frequency, 0.5, 0.3);
            spawnParticles(c.x, c.y, '#88ccff', 3, 1);
            updateScore();

            if (score >= evidenceState.target) {
              triggerPayoff();
            }
          }
          drops.splice(i, 1);
          break;
        }
      }

      // Remove off-screen drops
      if (d.y > H + 20) {
        drops.splice(i, 1);
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.05 * dt;
      p.life -= p.decay * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Update payoff particles
    for (let i = payoffParticles.length - 1; i >= 0; i--) {
      const p = payoffParticles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 0.02 * dt;
      p.life -= p.decay * dt;
      if (p.life <= 0) payoffParticles.splice(i, 1);
    }

    // Sunburst animation
    if (sunburstVisible > 0) {
      sunburstAngle += 0.01 * dt;
      sunburstVisible -= 0.001 * dt;
    }

    // Screen shake decay
    shakeX *= 0.9;
    shakeY *= 0.9;

    // Chime glow decay
    chimes.forEach(c => {
      if (c.glow > 0) c.glow -= 0.03 * dt;
    });

    render();
    requestAnimationFrame(update);
  }

  // ========== RENDERING ==========
  function render() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background - dark rain sky
    const bgGrad = ctx.createRadialGradient(CX, CY, 50, CX, CY, Math.max(W, H));
    bgGrad.addColorStop(0, '#2a2a4a');
    bgGrad.addColorStop(1, '#0f0f1f');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Ground/well
    const wellY = CY + CHIME_RADIUS + 80;
    const wellGrad = ctx.createRadialGradient(CX, wellY + 40, 10, CX, wellY + 40, 200);
    wellGrad.addColorStop(0, '#1a2a3e');
    wellGrad.addColorStop(1, '#0a1520');
    ctx.fillStyle = wellGrad;
    ctx.beginPath();
    ctx.ellipse(CX, wellY + 40, 200, 60, 0, 0, Math.PI * 2);
    ctx.fill();

    // Water ripples in well
    ctx.strokeStyle = 'rgba(100, 160, 220, 0.3)';
    ctx.lineWidth = 1;
    for (let r = 0; r < 3; r++) {
      const rippleR = 40 + r * 50 + Math.sin(time * 0.02 + r) * 10;
      ctx.beginPath();
      ctx.ellipse(CX, wellY + 40, rippleR, rippleR * 0.3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Sunburst (payoff)
    if (sunburstVisible > 0) {
      ctx.save();
      ctx.globalAlpha = sunburstVisible * 0.4;
      for (let i = 0; i < 12; i++) {
        const a = sunburstAngle + (Math.PI * 2 / 12) * i;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + Math.cos(a) * 500, CY + Math.sin(a) * 500);
        ctx.strokeStyle = `hsl(${(i * 30 + time) % 360}, 70%, 70%)`;
        ctx.lineWidth = 8;
        ctx.stroke();
      }
      ctx.restore();
    }

    // Draw rain drops
    drops.forEach(d => {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y - d.size * 2);
      ctx.lineTo(d.x, d.y + d.size);
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
      ctx.lineWidth = d.size * 0.6;
      ctx.lineCap = 'round';
      ctx.stroke();
    });

    // Draw chimes (glasses on strings)
    chimes.forEach((c, i) => {
      ctx.save();
      ctx.translate(c.x, c.y);

      // String (thin line from top)
      ctx.beginPath();
      ctx.moveTo(0, -60);
      ctx.lineTo(0, 0);
      ctx.strokeStyle = 'rgba(200, 200, 220, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Lock icon
      if (c.lockedIcon && !c.unlocked) {
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ff6b6b';
        ctx.fillText(c.lockedIcon, 0, -40);
      }

      // Unlock indicator
      if (!c.unlocked && isDialAligned()) {
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('↻', 0, -40);
      }

      // Unlock ring pulse
      if (c === chimes[lockedChime] && isDialAligned()) {
        const pulse = Math.sin(time * 0.1) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(0, 0, 35, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 215, 0, ${pulse})`;
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      // Glass body - translucent rounded rectangle shape
      const glow = c.glow;
      ctx.beginPath();
      ctx.moveTo(-15, -25);
      ctx.lineTo(-18, 15);
      ctx.quadraticCurveTo(-20, 25, -15, 28);
      ctx.lineTo(15, 28);
      ctx.quadraticCurveTo(20, 25, 18, 15);
      ctx.lineTo(15, -25);
      ctx.closePath();

      // Glass fill
      const glassAlpha = 0.2 + glow * 0.3;
      const glassColor = c.unlocked ? `rgba(100, 180, 255, ${glassAlpha})` : `rgba(255, 100, 100, ${glassAlpha})`;
      ctx.fillStyle = glassColor;
      ctx.fill();

      // Glass highlight
      ctx.strokeStyle = `rgba(200, 230, 255, ${0.4 + glow * 0.5})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Inner glow
      if (glow > 0) {
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = glow * 30;
        ctx.fillStyle = `rgba(150, 220, 255, ${glow * 0.3})`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Progress dots
      for (let d = 0; d < c.needed; d++) {
        const dotProgress = d < c.hits;
        ctx.beginPath();
        ctx.arc(-8 + d * 8, 22, 3, 0, Math.PI * 2);
        ctx.fillStyle = dotProgress ? '#66ddff' : 'rgba(100, 150, 200, 0.3)';
        ctx.fill();
      }

      ctx.restore();
    });

    // Draw dial in center
    ctx.save();
    ctx.translate(CX, CY);

    // Dial outer ring
    ctx.beginPath();
    ctx.arc(0, 0, DIAL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(30, 40, 60, 0.9)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(100, 160, 220, 0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Dial inner decorative rings
    ctx.beginPath();
    ctx.arc(0, 0, DIAL_RADIUS * 0.7, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(100, 160, 220, 0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Dial markings
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 / 12) * i;
      const x1 = Math.cos(a) * (DIAL_RADIUS - 15);
      const y1 = Math.sin(a) * (DIAL_RADIUS - 15);
      const x2 = Math.cos(a) * (DIAL_RADIUS - 5);
      const y2 = Math.sin(a) * (DIAL_RADIUS - 5);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(150, 190, 230, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Dial rotation group
    ctx.rotate(dialAngle);
    // Dial handle/pointer
    ctx.beginPath();
    ctx.arc(DIAL_RADIUS * 0.5, 0, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#4488cc';
    ctx.fill();
    ctx.strokeStyle = '#88bbff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(DIAL_RADIUS * 0.5, 0);
    ctx.strokeStyle = 'rgba(100, 160, 220, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();

    // Dial center gem
    ctx.beginPath();
    ctx.arc(CX, CY, 6, 0, Math.PI * 2);
    const gemGrad = ctx.createRadialGradient(CX - 2, CY - 2, 1, CX, CY, 6);
    gemGrad.addColorStop(0, '#aaddff');
    gemGrad.addColorStop(1, '#4488cc');
    ctx.fillStyle = gemGrad;
    ctx.fill();

    // Draw particles
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Draw payoff particles
    payoffParticles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
      gradient.addColorStop(0, p.color);
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Title
    if (gamePhase === 'initial') {
      ctx.save();
      ctx.font = 'bold 28px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e0e8ff';
      ctx.fillText('RAIN DIAL', CX, CY - 150);
      ctx.font = '14px "Segoe UI", sans-serif';
      ctx.fillStyle = '#8899bb';
      ctx.fillText('Click the dial to rotate it', CX, CY + DIAL_RADIUS + 40);
      ctx.fillText('Click chimes to ring them', CX, CY + DIAL_RADIUS + 60);
      ctx.fillText('Match the dial to the 🔒 chime', CX, CY + DIAL_RADIUS + 80);
      ctx.fillText('to unlock it — ring all chimes to play a melody', CX, CY + DIAL_RADIUS + 100);
      ctx.restore();
    } else if (gamePhase === 'playing') {
      // Instruction hint
      if (score < 5) {
        ctx.save();
        ctx.font = '15px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(150, 180, 220, 0.7)';
        ctx.fillText('Click the dial to rotate, click chimes to ring them', CX, CY + DIAL_RADIUS + 40);
        ctx.restore();
      }
    }

    ctx.restore();
  }

  // ========== INIT ==========
  reset();
  requestAnimationFrame(update);

})();
</script>
</body>
</html>
