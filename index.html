<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magnetic Moth</title>
     <style>
         :root {
             --bg-deep: #05050e;
             --bg-near: #0f111a;
             --text-col: #e0e0ff;
             --moth-glow: #d4f0ff;
             --flower-neo: #ff5e9a;
             --flower-psy: #a37eff;
             --flower-vol: #ff9e3d;
         }
        
         * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-col);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: none;
         }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
         }

         #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 14, 0.85);
            z-index: 10;
            transition: opacity 0.5s ease;
         }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px var(--moth-glow);
            opacity: 0.9;
         }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.7;
         }

        button {
            background: transparent;
            color: var(--moth-glow);
            border: 2px solid var(--moth-glow);
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
            outline: none;
            box-shadow: 0 0 15px rgba(212, 240, 255, 0.2);
         }

        button:hover {
            background: var(--moth-glow);
            color: var(--bg-deep);
            box-shadow: 0 0 30px rgba(212, 240, 255, 0.6);
         }

         #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            font-size: 1rem;
            pointer-events: none;
            opacity: 0.8;
         }

         .hidden {
            opacity: 0;
            pointer-events: none !important;
         }
     </style>
</head>
<body>

     <div id="hud" class="hidden">
         <div>PROXIMITY: <span id="score-val">0</span> / 3</div>
         <div style="font-size: 0.8em; opacity: 0.5">PRESS [R] TO RESTART</div>
     </div>

     <canvas id="game"></canvas>

     <div id="ui-layer">
         <h1 id="title-text">MAGNETIC MOTH</h1>
         <p id="sub-text">Guide the Moth. Seek the Pulses.</p>
         <button id="action-btn">INITIATE</button>
     </div>

     <script type="module">
     /**
      * MAGNETIC MOTH
      * A self-contained 60-second browser experience.
      * Audio is synthesized via Web Audio API (no external assets).
      * Visuals are Canvas API (no external assets).
      */

     // --- CONFIGURATION ---
     const CFG = {
         FPS: 60,
         FLOWERS: 5,
         REQUIRED_SCORE: 3,
         MOTION_SMOOTHING: 0.08, // Lag factor for fluid feel
         COLORS: {
             bg: '#05050e',
             grid: '#121622',
             moth: '#d4f0ff',
             flowers: ['#ff5e9a', '#a37eff', '#ff9e3d', '#44facc', '#f0f060']
          }
     };

     // --- AUDIO SYSTEM (Web Audio API) ---
     class AudioSys {
         constructor() {
             this.ctx = null;
             this.masterGain = null;
             this.droneOsc = null;
             this.droneGain = null;
             this.initialized = false;
          }

         init() {
             if (this.initialized) return;
             const Ac = window.AudioContext || window.webkitAudioContext;
             if (!Ac) return;
             this.ctx = new Ac();
             this.masterGain = this.ctx.createGain();
             this.masterGain.gain.value = 0.5;
             this.masterGain.connect(this.ctx.destination);
             
              // Ambient Drone
             this.droneOsc = this.ctx.createOscillator();
             this.droneGain = this.ctx.createGain();
             this.droneOsc.type = 'sine';
             this.droneOsc.frequency.value = 55; // Low A
             this.droneGain.gain.value = 0.1;
             
              // LFO for drone wobble
             const lfo = this.ctx.createOscillator();
             lfo.type = 'sine';
             lfo.frequency.value = 0.2;
             const lfoGain = this.ctx.createGain();
             lfoGain.gain.value = 5;
             lfo.connect(lfoGain);
             lfoGain.connect(this.droneOsc.frequency);
             lfo.start();

             this.droneOsc.connect(this.droneGain);
             this.droneGain.connect(this.masterGain);
             this.droneOsc.start();
             this.initialized = true;
          }

         playPickup() {
             if (!this.initialized) return;
             const osc = this.ctx.createOscillator();
             const gain = this.ctx.createGain();
             
              // Pleasant major fifth chord
             osc.type = 'triangle';
             osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
             osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
             
             gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
             gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
             
             osc.connect(gain);
             gain.connect(this.masterGain);
             osc.start();
             osc.stop(this.ctx.currentTime + 1.0);
          }

         playFail() {
             if (!this.initialized) return;
             const osc = this.ctx.createOscillator();
             const gain = this.ctx.createGain();
             osc.type = 'sawtooth';
             osc.frequency.setValueAtTime(100, this.ctx.currentTime);
             osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.5);
             gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
             gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
             osc.connect(gain);
             gain.connect(this.masterGain);
             osc.start();
             osc.stop(this.ctx.currentTime + 0.6);
          }

         playWin() {
             if (!this.initialized) return;
              // Arpeggio sweep
             const now = this.ctx.currentTime;
              [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                 const osc = this.ctx.createOscillator();
                 const gain = this.ctx.createGain();
                 osc.type = 'sine';
                 osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0, now + i * 0.1);
                 gain.gain.linearRampToValueAtTime(0.15, now + i * 0.1 + 0.05);
                 gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 1.5);
                 
                 osc.connect(gain);
                 gain.connect(this.masterGain);
                 osc.start(now + i * 0.1);
                 osc.stop(now + i * 0.1 + 2);
              });
          }
     }

     // --- GAME ENGINE ---

     class Game {
         constructor() {
             this.canvas = document.getElementById('game');
             this.ctx = this.canvas.getContext('2d');
             this.uiLayer = document.getElementById('ui-layer');
             this.hud = document.getElementById('hud');
             this.scoreEl = document.getElementById('score-val');
             this.titleEl = document.getElementById('title-text');
             this.subEl = document.getElementById('sub-text');
             this.btn = document.getElementById('action-btn');

             this.audio = new AudioSys();
             this.width = 0;
             this.height = 0;
             this.isRunning = false;
             this.time = 0;
             this.score = 0;
             this.mouse = { x: 0, y: 0 };
             
             // Entities
             this.moth = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, trails: [] };
             this.flowers = [];
             this.particles = [];

             // Setup listeners
             this.resize();
             window.addEventListener('resize', () => this.resize());
             this.btn.addEventListener('click', () => this.start());
             window.addEventListener('mousemove', (e) => {
                 this.mouse.x = e.clientX;
                 this.mouse.y = e.clientY;
             });

             // Keyboard restart
             window.addEventListener('keydown', (e) => {
                 if (e.key.toLowerCase() === 'r' && !this.isRunning) {
                     this.start();
                 }
             });

             // Loop
             requestAnimationFrame((t) => this.loop(t));
         }

         resize() {
             this.width = window.innerWidth;
             this.height = window.innerHeight;
             this.canvas.width = this.width;
             this.canvas.height = this.height;
             
             // Initialize Moth position if not already set (first load)
             if (this.moth.x === 0 && this.moth.y === 0) {
                 this.moth.x = this.width / 2;
                 this.moth.y = this.height / 2;
             }
         }

         start() {
             this.audio.init(); // Unlock AudioContext on gesture
             this.isRunning = true;
             this.score = 0;
             this.time = 0;
             this.uiLayer.classList.add('hidden');
             this.hud.classList.remove('hidden');
             this.scoreEl.innerText = '0';
             
             // Reset entities
             this.moth = { 
                 x: this.width / 2, 
                 y: this.height / 2, 
                 vx: 0, 
                 vy: 0, 
                 angle: 0, 
                 trails: [] 
             };
             
             // Generate Flowers
             this.flowers = [];
             for(let i=0; i<CFG.FLOWERS; i++) {
                 this.spawnFlower();
             }
             
             this.particles = [];
         }

         spawnFlower() {
             const margin = 100;
             this.flowers.push({
                 x: margin + Math.random() * (this.width - margin * 2),
                 y: margin + Math.random() * (this.height - margin * 2),
                 color: CFG.COLORS.flowers[Math.floor(Math.random() * CFG.COLORS.flowers.length)],
                 phase: Math.random() * Math.PI * 2,
                 radius: 40, // Hitbox
                 glow: 0
             });
         }

         spawnParticles(x, y, color, count) {
             for(let i=0; i<count; i++) {
                 const angle = Math.random() * Math.PI * 2;
                 const speed = Math.random() * 4 + 2;
                 this.particles.push({
                     x: x,
                     y: y,
                     vx: Math.cos(angle) * speed,
                     vy: Math.sin(angle) * speed,
                     life: 1.0,
                     color: color,
                     size: Math.random() * 4 + 1
                 });
             }
         }

         update() {
             if (!this.isRunning) return;
             this.time += 1/60;

             // --- Physics ---
             // Moth attraction to mouse (Spring force)
             const dx = this.mouse.x - this.moth.x;
             const dy = this.mouse.y - this.moth.y;
             
             // Magnetic field logic: 
             // If near a flower, the "North-Pole" of the moth flips, repelling it from that flower
             // If far, it's an "Iron-Filings" attraction to mouse
             
             let repulsionX = 0;
             let repulsionY = 0;
             let isNearFlower = false;

             this.flowers.forEach(f => {
                 const fDx = this.moth.x - f.x;
                 const fDy = this.moth.y - f.y;
                 const dist = Math.sqrt(fDx*fDx + fDy*fDy);
                 
                 if (dist < f.radius + 50) {
                     // Magnetic Repulsion
                     const strength = (1000 / (dist * dist)) * 200;
                     repulsionX += fDx * strength;
                     repulsionY += fDy * strength;
                     isNearFlower = true;
                 }
                 
                 // Pulse animation
                 f.phase += 0.05 + (this.time > 20 ? 0.1 : 0); // Speed up after 20s
             });

             // Apply forces
             this.moth.vx += dx * CFG.MOTION_SMOOTHING * 0.1;
             this.moth.vy += dy * CFG.MOTION_SMOOTHING * 0.1;
             
             // Add repulsion
             this.moth.vx += repulsionX * 0.05;
             this.moth.vy += repulsionY * 0.05;
             
             // Drag
             this.moth.vx *= 0.92;
             this.moth.vy *= 0.92;
             
             this.moth.x += this.moth.vx;
             this.moth.y += this.moth.vy;
             
             // Calculate angle for drawing
             if (Math.abs(this.moth.vx) > 0.1 || Math.abs(this.moth.vy) > 0.1) {
                 this.moth.angle = Math.atan2(this.moth.vy, this.moth.vx);
             }
             
             // Trail logic
             this.moth.trails.push({x: this.moth.x, y: this.moth.y, a: 1.0});
             if (this.moth.trails.length > 20) this.moth.trails.shift();
             this.moth.trails.forEach(t => t.a -= 0.05);

             // --- Collision / Gameplay ---
             for(let i=this.flowers.length-1; i>=0; i--) {
                 const f = this.flowers[i];
                 const dist = Math.sqrt((this.moth.x - f.x)**2 + (this.moth.y - f.y)**2);
                 if (dist < f.radius + 10) { // Collision
                     // Collect
                     this.spawnParticles(f.x, f.y, f.color, 20);
                     this.flowers.splice(i, 1);
                     this.score++;
                     this.scoreEl.innerText = this.score;
                     this.audio.playPickup();
                     
                     if (this.score >= CFG.REQUIRED_SCORE) {
                         this.handleWin();
                     } else {
                         // Spawn a replacement to keep the board alive but maintain difficulty
                         this.spawnFlower();
                     }
                 }
             }
             
             // Check bounds
             if (this.moth.x < 0 || this.moth.x > this.width || this.moth.y < 0 || this.moth.y > this.height) {
                 // Bounce or Game Over? Let's keep it friendly, bounce softly
                 if(this.moth.x < 0) { this.moth.x = 0; this.moth.vx *= -1; }
                 if(this.moth.x > this.width) { this.moth.x = this.width; this.moth.vx *= -1; }
                 if(this.moth.y < 0) { this.moth.y = 0; this.moth.vy *= -1; }
                 if(this.moth.y > this.height) { this.moth.y = this.height; this.moth.vy *= -1; }
             }

             // Particles update
             for(let i=this.particles.length-1; i>=0; i--) {
                 const p = this.particles[i];
                 p.x += p.vx;
                 p.y += p.vy;
                 p.life -= 0.02;
                 if(p.life <= 0) this.particles.splice(i, 1);
             }
         }

         draw(ctx) {
             // Clear with fade for trails
             ctx.fillStyle = CFG.COLORS.bg;
             ctx.fillRect(0, 0, this.width, this.height);
             
             // Draw Grid (Context)
             ctx.strokeStyle = CFG.COLORS.grid;
             ctx.lineWidth = 1;
             const gridSize = 50;
             
             // Moving grid effect
             const offsetX = -(this.time * 20) % gridSize;
             const offsetY = -(this.time * 10) % gridSize;
             
             ctx.beginPath();
             for(let x = offsetX; x < this.width; x += gridSize) {
                 ctx.moveTo(x, 0); ctx.lineTo(x, this.height);
             }
             for(let y = offsetY; y < this.height; y += gridSize) {
                 ctx.moveTo(0, y); ctx.lineTo(this.width, y);
             }
             ctx.stroke();

             // Draw Flowers (Magnetic Fields)
             this.flowers.forEach(f => {
                 // Draw field lines
                 ctx.save();
                 ctx.translate(f.x, f.y);
                 ctx.rotate(this.time * 0.5);
                 ctx.strokeStyle = f.color;
                 ctx.globalAlpha = 0.3;
                 for(let i=0; i<4; i++) {
                     ctx.beginPath();
                     ctx.ellipse(0, 0, f.radius * 1.5, f.radius * 0.5, (Math.PI/2) * i, 0, Math.PI*2);
                     ctx.stroke();
                 }
                 ctx.restore();
                 
                 // Pulse ring
                 const pulseSize = (Math.sin(this.time * 3 + f.phase) + 1) * 10 + f.radius;
                 ctx.beginPath();
                 ctx.arc(f.x, f.y, pulseSize, 0, Math.PI * 2);
                 ctx.strokeStyle = f.color;
                 ctx.lineWidth = 2;
                 ctx.globalAlpha = 0.4;
                 ctx.stroke();
                 
                 // Core
                 ctx.beginPath();
                 ctx.arc(f.x, f.y, 8, 0, Math.PI*2);
                 ctx.fillStyle = '#fff';
                 ctx.globalAlpha = 0.8;
                 ctx.fill();
             });
             
             // Draw Particles
             this.particles.forEach(p => {
                 ctx.fillStyle = p.color;
                 ctx.globalAlpha = p.life;
                 ctx.beginPath();
                 ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                 ctx.fill();
             });
             
             // Draw Moth Trails
             if (this.moth.trails.length > 1) {
                 ctx.beginPath();
                 ctx.moveTo(this.moth.trails[0].x, this.moth.trails[0].y);
                 for (let i = 1; i < this.moth.trails.length; i++) {
                     ctx.lineTo(this.moth.trails[i].x, this.moth.trails[i].y);
                 }
                 ctx.strokeStyle = 'rgba(212, 240, 255, 0.3)';
                 ctx.lineWidth = 4;
                 ctx.stroke();
             }

             // Draw Moth
             const mx = this.moth.x;
             const my = this.moth.y;
             const ang = this.moth.angle;

             ctx.save();
             ctx.translate(mx, my);
             ctx.rotate(ang);
             
             // Glow
             const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
             grad.addColorStop(0, '#fff');
             grad.addColorStop(0.4, CFG.COLORS.moth);
             grad.addColorStop(1, 'transparent');
             ctx.fillStyle = grad;
             ctx.beginPath();
             ctx.arc(0, 0, 30, 0, Math.PI*2);
             ctx.fill();
             
             // Wings
             ctx.fillStyle = '#fff';
             const wingX = Math.sin(this.time * 20) * 10; // Flutter
             ctx.beginPath();
             ctx.ellipse(-5, -10 + wingX, 12, 20, Math.PI/4, 0, Math.PI*2);
             ctx.ellipse(-5, 10 - wingX, 12, 20, -Math.PI/4, 0, Math.PI*2);
             ctx.fill();
             
             // Body
             ctx.fillStyle = '#000';
             ctx.beginPath();
             ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI*2);
             ctx.fill();
             
             ctx.restore();
         }

         handleWin() {
             this.isRunning = false;
             this.audio.playWin();
             this.titleEl.innerText = "COLLECTION COMPLETE";
             this.subEl.innerText = "The magnetic field is stabilized.";
             this.btn.innerText = "START ANOTHER RUN";
             this.uiLayer.classList.remove('hidden');
             this.hud.classList.add('hidden');
         }

         loop(timestamp) {
             this.update();
             this.draw(this.ctx);
             requestAnimationFrame((t) => this.loop(t));
         }
     }

     // --- INITIALIZATION ---
     window.onload = () => {
         const game = new Game();
     };
     </script>
</body>
</html>
