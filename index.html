<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbit Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// ORBIT POSTCARD
// A slingshot satellite game through 3 luminous rings.
// ============================================================

(function() {
  "use strict";

  // --- canvas setup ---
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy;

  function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- audio system (Web Audio API, procedural) ---
  let audioCtx;
  const audioStarted = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, dur, type, vol, detune) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  function playChord(freqs, dur, vol) {
    freqs.forEach((f, i) => playTone(f, dur, 'sine', vol * 0.3, i % 2 === 0 ? 2 : -2));
  }

  // ambient pad
  let padOsc, padGain, padLFO;
  function startAmbient() {
    if (!audioCtx || padOsc) return;
    padOsc = audioCtx.createOscillator();
    padGain = audioCtx.createGain();
    padLFO = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    padOsc.type = 'sine';
    padOsc.frequency.value = 80;
    padLFO.type = 'sine';
    padLFO.frequency.value = 0.3;
    lfoGain.gain.value = 8;
    padLFO.connect(lfoGain);
    lfoGain.connect(padOsc.frequency);
    padGain.gain.value = 0.04;
    padOsc.connect(padGain);
    padGain.connect(audioCtx.destination);
    padOsc.start();
    padLFO.start();
  }

  function stopAmbient() {
    if (padOsc) { padOsc.stop(); padOsc = null; }
    if (padLFO) { padLFO.stop(); padLFO = null; }
  }

  // ring pass sound
  function playPassSound(ringIndex) {
    const baseFreq = 440 + ringIndex * 220;
    playChord([baseFreq, baseFreq * 1.5, baseFreq * 2], 0.8, 0.2);
    playTone(baseFreq * 3, 0.3, 'triangle', 0.08);
  }

  // failure sound
  function playFailSound() {
    playTone(150, 0.6, 'sawtooth', 0.15, -10);
    playTone(120, 0.8, 'square', 0.08);
  }

  // restart sound
  function playRestartSound() {
    playChord([523, 659, 784], 0.5, 0.15);
  }

  // payoff sound
  function playPayoffSound() {
    const now = audioCtx ? audioCtx.currentTime : 0;
    const notes = [523, 659, 784, 1047, 1175, 1319];
    notes.forEach((f, i) => {
      setTimeout(() => {
        playTone(f, 1.2, 'sine', 0.12);
        playTone(f * 0.5, 1.5, 'triangle', 0.08);
      }, i * 120);
    });
  }

  // --- game state ---
  const RING_COUNT = 3;
  let state = 'initial'; // initial | playing | passed | payoff | failed | restart
  let progress = 0;
  let restartCount = 0;
  let satellite = { x: 0, y: 0, vx: 0, vy: 0, trail: [] };
  let rings = [];
  let slingshot = { active: false, fromX: 0, fromY: 0, toX: 0, toY: 0 };
  let particles = [];
  let time = 0;
  let bgStars = [];
  let glowIntensity = 0;
  let finishTimer = 0;
  let shakeTimer = 0;
  let shakeX = 0, shakeY = 0;
  let slowmoFactor = 1;
  let slowmoTimer = 0;

  // ring definitions at specific distances
  const RING_DISTANCES = [0.28, 0.55, 0.82];
  const RING_COLORS = ['#00e5ff', '#7c4dff', '#ff6090'];
  const RING_GLOW = ['#00e5ff44', '#7c4dff44', '#ff609044'];

  function initBgStars() {
    bgStars = [];
    for (let i = 0; i < 200; i++) {
      bgStars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.005
      });
    }
  }
  initBgStars();

  function initRings() {
    rings = [];
    for (let i = 0; i < RING_COUNT; i++) {
      const dist = RING_DISTANCES[i];
      const baseY = cy - H * dist * 0.6;
      rings.push({
        baseX: cx + Math.sin(dist * 5) * 100,
        baseY: baseY,
        radius: 50 + i * 15,
        active: true,
        passed: false,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.01 + i * 0.005
      });
    }
  }

  function resetGame() {
    state = 'initial';
    progress = 0;
    satellite.x = cx;
    satellite.y = cy + H * 0.35;
    satellite.vx = 0;
    satellite.vy = 0;
    satellite.trail = [];
    glowIntensity = 0;
    finishTimer = 0;
    slowmoFactor = 1;
    slowmoTimer = 0;
    shakeTimer = 0;
    particles = [];
    initRings();
    stopAmbient();
  }

  resetGame();

  // --- evidence API ---
  window.__factoryxEvidence = function() {
    return {
      schema_version: 1,
      phase: state,
      progress: progress,
      target: 3,
      completed: state === 'payoff',
      restart_count: restartCount
    };
  };

  // --- input handling ---
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    if (e.touches) {
      return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  canvas.addEventListener('mousedown', (e) => handleInput(getPos(e)));
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(getPos(e)); }, { passive: false });

  function handleInput(pos) {
    initAudio();

    // Start audio on first interaction (before screenshot requirement)
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    // Emit a sound on every interaction
    if (state === 'initial') {
      playPassSound(-1); // start sound
      state = 'playing';
      startAmbient();
      return;
    }

    if (state === 'playing') {
      // Slingshot launch
      if (!slingshot.active) {
        slingshot.active = true;
        slingshot.fromX = satellite.x;
        slingshot.fromY = satellite.y;
        slingshot.toX = pos.x;
        slingshot.toY = pos.y;
        playTone(300, 0.2, 'sine', 0.1);
        return;
      }
      // Launch with the slingshot vector
      launchSatellite();
      return;
    }

    if (state === 'payoff') {
      // Wait for the finale to finish, then restart
      if (finishTimer > 2) {
        restartCount++;
        playRestartSound();
        state = 'initial';
        progress = 0;
        satellite.trail = [];
        particles = [];
        initBgStars();
        initRings();
        satellite.x = cx;
        satellite.y = cy + H * 0.35;
        satellite.vx = 0;
        satellite.vy = 0;
        glowIntensity = 0;
        finishTimer = 0;
        return;
      }
    }

    if (state === 'failed') {
      // Click to restart
      restartCount++;
      playRestartSound();
      state = 'initial';
      progress = 0;
      satellite.trail = [];
      particles = [];
      initBgStars();
      initRings();
      satellite.x = cx;
      satellite.y = cy + H * 0.35;
      satellite.vx = 0;
      satellite.vy = 0;
      glowIntensity = 0;
      finishTimer = 0;
      shakeTimer = 0;
      return;
    }
  }

  function launchSatellite() {
    const dx = slingshot.fromX - slingshot.toX;
    const dy = slingshot.fromY - slingshot.toY;
    const power = Math.min(Math.sqrt(dx * dx + dy * dy), 400) / 400;
    satellite.vx = dx * 0.012 * (0.6 + power * 0.5);
    satellite.vy = dy * 0.012 * (0.6 + power * 0.5);
    slingshot.active = false;

    // Play launch sound
    playTone(200, 0.3, 'triangle', 0.15);
    playTone(400, 0.15, 'sine', 0.1);

    // Create launch particles
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push({
        x: satellite.x,
        y: satellite.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        color: '#00e5ff',
        r: Math.random() * 3 + 1
      });
    }
  }

  // --- update ---
  function update(dt) {
    time += dt;

    if (state === 'playing') {
      // Apply gravity toward center
      const toCenterX = cx - satellite.x;
      const toCenterY = cy - satellite.y;
      const dist = Math.sqrt(toCenterX * toCenterX + toCenterY * toCenterY);
      const gravity = 80 / (dist * dist + 1000);
      satellite.vx += toCenterX / dist * gravity * dt * 60;
      satellite.vy += toCenterY / dist * gravity * dt * 60;

      // Slow dampening
      satellite.vx *= 0.999;
      satellite.vy *= 0.999;

      satellite.x += satellite.vx * dt * 60;
      satellite.y += satellite.vy * dt * 60;

      // Trail
      satellite.trail.push({ x: satellite.x, y: satellite.y, age: 0 });
      if (satellite.trail.length > 80) satellite.trail.shift();
      satellite.trail.forEach(p => p.age += dt);

      // Ring collision
      for (let i = 0; i < RING_COUNT; i++) {
        const ring = rings[i];
        if (!ring.active || ring.passed) continue;

        const ringX = ring.baseX + Math.sin(time * ring.wobbleSpeed + ring.wobble) * 30;
        const ringY = ring.baseY + Math.cos(time * ring.wobbleSpeed * 1.3 + ring.wobble) * 20;
        const dx = satellite.x - ringX;
        const dy = satellite.y - ringY;
        const d = Math.sqrt(dx * dx + dy * dy);

        if (d < ring.radius * 0.4) {
          // Passed through ring
          ring.passed = true;
          progress = i + 1;
          glowIntensity = 1.5;
          playPassSound(i);

          // Explosion particles
          for (let j = 0; j < 30; j++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5 + 2;
            particles.push({
              x: ringX,
              y: ringY,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1,
              decay: 0.01 + Math.random() * 0.02,
              color: RING_COLORS[i],
              r: Math.random() * 4 + 2
            });
          }

          // Slow-mo moment
          slowmoFactor = 0.2;
          slowmoTimer = 0.8;

          if (i === RING_COUNT - 1) {
            // Passed all rings
            setTimeout(() => {
              state = 'payoff';
              finishTimer = 0;
              slowmoFactor = 0.15;
              slowmoTimer = 4;
              playPayoffSound();
            }, 500);
          }
        }
      }

      // Check if satellite is too far away (lost)
      if (dist > Math.max(W, H) * 0.7) {
        state = 'failed';
        playFailSound();
        shakeTimer = 0.5;
      }
    }

    // Update slingshot line position if active
    if (slingshot.active) {
      // line follows the from/to coords
    }

    // Update particles
    particles.forEach(p => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);

    // Glow decay
    if (glowIntensity > 0) {
      glowIntensity *= 0.95;
      if (glowIntensity < 0.01) glowIntensity = 0;
    }

    // Slow-mo timer
    if (slowmoTimer > 0) {
      slowmoTimer -= dt;
      if (slowmoTimer <= 0) {
        slowmoFactor = 1;
      }
    }

    // Shake
    if (shakeTimer > 0) {
      shakeTimer -= dt;
      shakeX = (Math.random() - 0.5) * 10 * (shakeTimer / 0.5);
      shakeY = (Math.random() - 0.5) * 10 * (shakeTimer / 0.5);
    } else {
      shakeX = 0;
      shakeY = 0;
    }

    // Payoff timer
    if (state === 'payoff') {
      finishTimer += dt;
    }

    // Star twinkle
    bgStars.forEach(s => {
      s.twinkle += s.speed;
    });
  }

  // --- render ---
  function render() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background: deep space gradient
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    bgGrad.addColorStop(0, '#1a1a3e');
    bgGrad.addColorStop(0.5, '#0e0e2a');
    bgGrad.addColorStop(1, '#050510');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Stars
    bgStars.forEach(s => {
      const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
    });

    // Draw rings
    for (let i = 0; i < RING_COUNT; i++) {
      const ring = rings[i];
      const ringX = ring.baseX + Math.sin(time * ring.wobbleSpeed + ring.wobble) * 30;
      const ringY = ring.baseY + Math.cos(time * ring.wobbleSpeed * 1.3 + ring.wobble) * 20;

      ring._drawX = ringX;
      ring._drawY = ringY;

      if (!ring.active) continue;

      // Outer glow
      const glowR = ring.radius + 20 + glowIntensity * 30;
      const ringGlow = ctx.createRadialGradient(ringX, ringY, ring.radius * 0.5, ringX, ringY, glowR);
      const glowAlpha = ring.passed ? 0.15 : 0.25 + Math.sin(time * 2 + i) * 0.1;
      ringGlow.addColorStop(0, RING_GLOW[i]);
      ringGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = ringGlow;
      ctx.beginPath();
      ctx.arc(ringX, ringY, glowR, 0, Math.PI * 2);
      ctx.fill();

      // Ring
      ctx.lineWidth = ring.passed ? 4 : 3;
      ctx.strokeStyle = ring.passed ? '#ffffff' : RING_COLORS[i];
      ctx.beginPath();
      ctx.arc(ringX, ringY, ring.radius, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      if (!ring.passed) {
        ctx.lineWidth = 1;
        ctx.strokeStyle = RING_COLORS[i] + '44';
        ctx.beginPath();
        ctx.arc(ringX, ringY, ring.radius - 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Ring number/label
      ctx.fillStyle = ring.passed ? '#ffffffaa' : RING_COLORS[i];
      ctx.font = `${14 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Ring ${i + 1}`, ringX, ringY);
    }

    // Draw launch pad on ground
    const padX = cx;
    const padY = cy + H * 0.35;
    const padW = 60 * devicePixelRatio;
    const padH = 15 * devicePixelRatio;

    ctx.fillStyle = '#2a2a4e';
    ctx.fillRect(padX - padW/2, padY, padW, padH);

    // Launch tower
    ctx.fillStyle = '#3a3a5e';
    ctx.fillRect(padX - 3 * devicePixelRatio, padY - 40 * devicePixelRatio, 6 * devicePixelRatio, 40 * devicePixelRatio);

    // Satellite (if playing or payoff)
    if (state === 'playing' || state === 'payoff' || state === 'failed') {
      // Trail
      satellite.trail.forEach((p, idx) => {
        const alpha = (idx / satellite.trail.length) * 0.6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 * devicePixelRatio * (idx / satellite.trail.length), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 229, 255, ${alpha})`;
        ctx.fill();
      });

      // Satellite glow
      const satGlow = ctx.createRadialGradient(satellite.x, satellite.y, 0, satellite.x, satellite.y, 30 * devicePixelRatio);
      satGlow.addColorStop(0, 'rgba(0, 229, 255, 0.3)');
      satGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = satGlow;
      ctx.beginPath();
      ctx.arc(satellite.x, satellite.y, 30 * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();

      // Satellite body
      ctx.save();
      ctx.translate(satellite.x, satellite.y);
      ctx.rotate(Math.atan2(satellite.vy, satellite.vx));
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, 0, 6 * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();

      // Solar panels
      ctx.fillStyle = '#1a1aff';
      ctx.fillRect(-12 * devicePixelRatio, -3 * devicePixelRatio, 6 * devicePixelRatio, 6 * devicePixelRatio);
      ctx.fillRect(6 * devicePixelRatio, -3 * devicePixelRatio, 6 * devicePixelRatio, 6 * devicePixelRatio);

      // Antenna
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -6 * devicePixelRatio);
      ctx.lineTo(0, -14 * devicePixelRatio);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, -14 * devicePixelRatio, 2 * devicePixelRatio, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4444';
      ctx.fill();

      ctx.restore();
    }

    // Draw slingshot line
    if (slingshot.active && state === 'playing') {
      ctx.strokeStyle = '#ffffff66';
      ctx.lineWidth = 2 * devicePixelRatio;
      ctx.setLineDash([8 * devicePixelRatio, 4 * devicePixelRatio]);
      ctx.beginPath();
      ctx.moveTo(slingshot.fromX, slingshot.fromY);
      ctx.lineTo(slingshot.toX, slingshot.toY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrow at target
      const dx = slingshot.fromX - slingshot.toX;
      const dy = slingshot.fromY - slingshot.toY;
      const angle = Math.atan2(dy, dx);
      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      ctx.moveTo(slingshot.toX + Math.cos(angle) * 15, slingshot.toY + Math.sin(angle) * 15);
      ctx.lineTo(slingshot.toX + Math.cos(angle + 2.5) * 10, slingshot.toY + Math.sin(angle + 2.5) * 10);
      ctx.lineTo(slingshot.toX + Math.cos(angle - 2.5) * 10, slingshot.toY + Math.sin(angle - 2.5) * 10);
      ctx.fill();
    }

    // Draw particles
    particles.forEach(p => {
      ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * devicePixelRatio * p.life, 0, Math.PI * 2);
      ctx.fill();
    });

    // --- UI overlay ---
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (state === 'initial') {
      // Title
      ctx.fillStyle = '#00e5ff';
      ctx.font = `bold ${42 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillText('ORBIT POSTCARD', cx, cy - H * 0.15);

      // Subtitle
      ctx.fillStyle = '#ffffff88';
      ctx.font = `${18 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillText('Click anywhere to launch your satellite', cx, cy - H * 0.08);

      // Instructions
      ctx.fillStyle = '#ffffff44';
      ctx.font = `${14 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillText('Click the satellite and drag to aim, release to launch', cx, cy);
      ctx.fillText('Guide it through all 3 luminous rings', cx, cy + H * 0.04);

      // Satellite icon
      ctx.save();
      ctx.translate(cx, cy + H * 0.12);
      ctx.scale(2, 2);
      const t = time;
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(-14, -3, 7, 6);
      ctx.fillRect(7, -3, 7, 6);
      ctx.restore();

    } else if (state === 'payoff') {
      finishTimer += 0.016; // approx

      // Postcard effect - bright flash then compose
      if (finishTimer < 0.3) {
        const flashAlpha = 1 - finishTimer / 0.3;
        ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha * 0.8})`;
        ctx.fillRect(-10, -10, W + 20, H + 20);
      }

      // Postcard frame
      const frameAlpha = Math.min(1, finishTimer * 1.5);
      const frameMargin = 40 * devicePixelRatio;
      ctx.strokeStyle = `rgba(255, 255, 255, ${frameAlpha * 0.3})`;
      ctx.lineWidth = 2 * devicePixelRatio;
      ctx.strokeRect(frameMargin, frameMargin, W - frameMargin * 2, H - frameMargin * 2);

      // Inner frame line
      const innerMargin = 50 * devicePixelRatio;
      ctx.strokeStyle = `rgba(255, 255, 255, ${frameAlpha * 0.15})`;
      ctx.strokeRect(innerMargin, innerMargin, W - innerMargin * 2, H - innerMargin * 2);

      if (finishTimer > 0.8) {
        const textAlpha = Math.min(1, (finishTimer - 0.8) * 2);

        // Postcard message
        ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`;
        ctx.font = `bold ${36 * devicePixelRatio}px 'Segoe UI', sans-serif`;
        ctx.fillText('✦ ORBIT COMPLETE ✦', cx, cy - H * 0.12);

        ctx.font = `${20 * devicePixelRatio}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = `rgba(0, 229, 255, ${textAlpha})`;
        ctx.fillText('Three rings cleared', cx, cy - H * 0.05);

        ctx.font = `${16 * devicePixelRatio}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha * 0.7})`;
        ctx.fillText('Your satellite orbits eternal.', cx, cy + H * 0.02);

        // Restart prompt
        if (finishTimer > 2) {
          const restartAlpha = Math.min(1, (finishTimer - 2) * 2);
          const pulse = 0.7 + Math.sin(time * 3) * 0.3;
          ctx.fillStyle = `rgba(255, 255, 255, ${restartAlpha * pulse})`;
          ctx.font = `${18 * devicePixelRatio}px 'Segoe UI', sans-serif`;
          ctx.fillText('Click anywhere to launch again', cx, cy + H * 0.1);
        }
      }
    }

    if (state === 'failed') {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.font = `bold ${36 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillText('SATELLITE LOST', cx, cy - H * 0.05);

      ctx.font = `${20 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillStyle = 'rgba(255, 100, 100, 0.9)';
      ctx.fillText('Signal lost in deep space', cx, cy + H * 0.02);

      ctx.font = `${16 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.fillText('Click to try again', cx, cy + H * 0.09);
    }

    // Progress indicator (top right)
    if (state === 'playing' || state === 'payoff') {
      const indicatorX = W - 60 * devicePixelRatio;
      const indicatorY = 60 * devicePixelRatio;
      for (let i = 0; i < RING_COUNT; i++) {
        ctx.beginPath();
        ctx.arc(indicatorX + i * 25 * devicePixelRatio, indicatorY, 8 * devicePixelRatio, 0, Math.PI * 2);
        if (i < progress) {
          ctx.fillStyle = RING_COLORS[i];
        } else {
          ctx.fillStyle = '#ffffff22';
        }
        ctx.fill();
        ctx.strokeStyle = '#ffffff44';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // Restart button (visible when playing or failed)
    if (state === 'playing' || state === 'failed' || state === 'payoff') {
      const btnW = 120 * devicePixelRatio;
      const btnH = 36 * devicePixelRatio;
      const btnX = W - btnW - 20 * devicePixelRatio;
      const btnY = H - btnH - 20 * devicePixelRatio;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, btnW, btnH, 8 * devicePixelRatio);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.font = `${14 * devicePixelRatio}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('↺ Restart', btnX + btnW / 2, btnY + btnH / 2);
    }

    ctx.restore();
  }

  // --- main loop ---
  let lastTime = 0;

  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05) * slowmoFactor;
    lastTime = timestamp;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
  }

  // roundRect polyfill
  if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      this.moveTo(x + r[0], y);
      this.lineTo(x + w - r[1], y);
      this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
      this.lineTo(x + w, y + h - r[2]);
      this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
      this.lineTo(x + r[3], y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
      this.lineTo(x, y + r[0]);
      this.quadraticCurveTo(x, y, x + r[0], y);
      this.closePath();
    };
  }

  // Restart button handler (click detection on button area)
  canvas.addEventListener('click', (e) => {
    const pos = getPos(e);
    const btnW = 120 * devicePixelRatio;
    const btnH = 36 * devicePixelRatio;
    const btnX = W - btnW - 20 * devicePixelRatio;
    const btnY = H - btnH - 20 * devicePixelRatio;

    if (pos.x >= btnX && pos.x <= btnX + btnW && pos.y >= btnY && pos.y <= btnY + btnH) {
      // Restart from button
      restartCount++;
      playRestartSound();
      state = 'initial';
      progress = 0;
      satellite.trail = [];
      particles = [];
      initBgStars();
      initRings();
      satellite.x = cx;
      satellite.y = cy + H * 0.35;
      satellite.vx = 0;
      satellite.vy = 0;
      glowIntensity = 0;
      finishTimer = 0;
      shakeTimer = 0;
    }
  });

  // Touch handler for restart button
  canvas.addEventListener('touchend', (e) => {
    const pos = getPos(e);
    const btnW = 120 * devicePixelRatio;
    const btnH = 36 * devicePixelRatio;
    const btnX = W - btnW - 20 * devicePixelRatio;
    const btnY = H - btnH - 20 * devicePixelRatio;

    if (pos.x >= btnX && pos.x <= btnX + btnW && pos.y >= btnY && pos.y <= btnY + btnH) {
      restartCount++;
      playRestartSound();
      state = 'initial';
      progress = 0;
      satellite.trail = [];
      particles = [];
      initBgStars();
      initRings();
      satellite.x = cx;
      satellite.y = cy + H * 0.35;
      satellite.vx = 0;
      satellite.vy = 0;
      glowIntensity = 0;
      finishTimer = 0;
      shakeTimer = 0;
    }
  });

  // Start the game loop
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
