<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rain Dial</title>
<style>
  :root {
    --bg: #0f111a;
    --dial-bg: #1a1c29;
    --dial-ring: #2a2d40;
    --text: #e0e6ed;
    --accent: #5ec4c4;
    --success: #78dca9;
    --danger: #ff6b6b;
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  #game-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 1 / 1;
  }
  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    background: radial-gradient(circle at center, #222536 0%, #0f111a 100%);
    cursor: pointer;
  }
  .ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(15, 17, 26, 0.9);
    border-radius: 50%;
    z-index: 10;
    transition: opacity 0.5s;
    pointer-events: none; /* Let clicks pass through when hidden */
    opacity: 0;
  }
  .ui-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  h1 {
    font-size: 2.5rem;
    margin: 0 0 10px 0;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(94, 196, 196, 0.4);
  }
  p {
    font-size: 1.2rem;
    text-align: center;
    max-width: 80%;
    line-height: 1.4;
    margin-bottom: 20px;
    color: #a0a8b8;
  }
  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 32px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 15px rgba(94, 196, 196, 0.3);
  }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(94, 196, 196, 0.6);
  }
  .btn:active {
    transform: scale(0.95);
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #hud.visible { opacity: 1; }
  .stat { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas" width="800" height="800"></canvas>
  
  <div id="hud">
    <div class="stat">Score: <span id="scoreVal">0</span></div>
    <div class="stat">Chimes: <span id="chimeVal">0</span>/4</div>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="ui-overlay visible">
    <h1>Rain Dial</h1>
    <p>Click the chimes around the dial to route the rain.<br>Solve the pattern to quiet the storm.</p>
    <button class="btn" id="startBtn">Start Game</button>
  </div>

  <!-- Victory Screen -->
  <div id="winScreen" class="ui-overlay">
    <h1>Storm Quelled</h1>
    <p>You resonated with the rain. The chimes are silent.</p>
    <button class="btn" id="restartWinBtn">Play Again</button>
  </div>

  <!-- Game Over Screen -->
  <div id="loseScreen" class="ui-overlay">
    <h1 style="color: var(--danger)">Storm Surge</h1>
    <p>The rain was too heavy. The chimes are overwhelmed.</p>
    <button class="btn" id="restartLoseBtn">Try Again</button>
  </div>
</div>

<script>
/**
 * RAIN DIAL - A 60-90s one-screen browser game.
 * Concept: Route falling drops to glass chimes by turning the dial.
 */

// --- Configuration ---
const CANVAS_SIZE = 800;
const CENTER = { x: 400, y: 400 };
const DIAL_RADIUS = 120;
const CHIME_RADIUS = 280; // Distance from center to chime centers
const CHIME_RADIUS_SIZE = 45;
const DROP_SPAWN_RADIUS_MIN = DIAL_RADIUS;
const DROP_SPAWN_RADIUS_MAX = 50; // Falls from center outwards

// Audio Context
let audioCtx = null;
let masterGain = null;

// Game State
const state = {
  screen: 'start', // start, playing, win, lose
  score: 0,
  startTime: 0,
  dials: [0, 0, 0, 0], // Current angles (0 = neutral)
  targetDials: [0, 0, 0, 0], // Required angles (+-90deg)
  drops: [],
  particles: [],
  shake: 0,
  chimeActivated: [false, false, false, false],
  time: 0,
  spawnerTimer: 0
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const elements = {
  hud: document.getElementById('hud'),
  score: document.getElementById('scoreVal'),
  chimes: document.getElementById('chimeVal'),
  start: document.getElementById('startScreen'),
  win: document.getElementById('winScreen'),
  lose: document.getElementById('loseScreen')
};

// --- Audio System (Web Audio API) ---
function initAudio() {
  if (audioCtx) return;
  const A = window.AudioContext || window.webkitAudioContext;
  audioCtx = new A();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8; // Prevent clipping
  masterGain.connect(audioCtx.destination);
}

// Create a specific chime sound (Glassy triangle wave)
function playChimeSound(quintIndex) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  
  // Pentatonic scale-ish frequencies for chimes
  const freqs = [523.25, 587.33, 659.25, 783.99]; // C5, D5, E5, G5
  const freq = freqs[quintIndex] || 500;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'triangle'; // Glassy
  osc.frequency.setValueAtTime(freq, t);
  // Slight detune for richness
  osc.detune.setValueAtTime(Math.random() * 10 - 5, t);

  filter.type = 'highpass';
  filter.frequency.setValueAtTime(800, t);

  // Envelope: Sharp attack, slow decay
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);

  osc.start(t);
  osc.stop(t + 2.5);
}

// Rain/Rumble noise
let rainNode = null;
let rainGain = null;

function startRainNoise() {
  if (rainNode) return;
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    output[i] = Math.random() * 2 - 1;
  }

  rainNode = audioCtx.createBufferSource();
  rainNode.buffer = buffer;
  rainNode.loop = true;
  
  rainGain = audioCtx.createGain();
  rainGain.gain.value = 0.0; // Start silent

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;

  rainNode.connect(filter);
  filter.connect(rainGain);
  rainGain.connect(masterGain);
  rainNode.start();
}

function updateRain(intensity) {
  if (!rainGain) return;
  // Target frequency goes up with difficulty, volume goes up
  const targetFreq = 300 + (intensity * 800);
  const targetVol = 0.05 + (intensity * 0.15);
  
  rainGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.2);
  rainGain.gain.linearRampToValueAtTime(Math.min(0.15 + (intensity*0.3), 0.5), audioCtx.currentTime + 0.1);
  rainGain.gain.exponentialRampToValueAtTime(Math.max(0.01, 0.15 + (intensity*0.3)), audioCtx.currentTime + 1.0);
  
  rainNode.playbackRate.value = 0.5 + (intensity * 1.0);
}

// --- Game Logic ---

function resetGame() {
  state.score = 0;
  state.dials = [0, 0, 0, 0];
  state.chimeActivated = [false, false, false, false];
  state.drops = [];
  state.particles = [];
  state.shake = 0;
  state.startTime = performance.now();
  state.time = 0;
  state.spawnerTimer = 0;
  
  // Generate a sequence of chimes to activate (length 4-6)
  // Actually, we will use a sequential approach: Activate all 4 chimes in a specific order or pattern?
  // Let's stick to the brief: "Discover and complete a short resonant pattern".
  // Mechanic: You have 3 attempts per chime. If a drop hits an unactivated chime, it damages it.
  // If all 4 are activated, win.
  
  // To make it a "pattern": The chimes light up in a circle sequence to teach rhythm?
  // Let's go simpler: Randomly spawn drops. Clicking chimes turns them "on" (activates).
  // But we need to route. So: 
  // 1. Chimes start grey.
  // 2. Target angles are random +/- 90 degrees per dial.
  // 3. Player clicks chimes to rotate dial.
  // 4. Drops come out. If they pass through a channel aligned with chime i, chime i activates.
  // 5. All 4 must activate to win.
  
  for(let i=0; i<4; i++) {
    state.targetDials[i] = Math.floor(Math.random() * 4) * 90; // 0, 90, 180, or 270
  }
  
  updateHUD();
  elements.hud.classList.add('visible');
  elements.start.classList.remove('visible');
  elements.win.classList.remove('visible');
  elements.lose.classList.remove('visible');
  
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  startRainNoise();
}

function updateHUD() {
  elements.score.innerText = state.score;
  const activatedCount = state.chimeActivated.filter(b => b).length;
  elements.chimes.innerText = activatedCount;
  elements.chimes.style.color = activatedCount === 4 ? 'var(--success)' : 'var(--accent)';
}

// --- Rendering ---

function drawDial(x, y, radius, angle, isActive, isActiveColor) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);
  
  // Base
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1c29';
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#333';
  ctx.stroke();

  // Channels
  // We have 4 openings (N, E, S, W)
  // The player rotates the dial. We want to know if the dial channel aligns with the fixed chime position.
  // Actually, simpler visual: The Dial has a hole. Clicking rotates the dial.
  // The "Chime" is fixed. The "Dial" rotates.
  
  // Draw the dial body
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.strokeStyle = isActive ? isActiveColor : '#444';
  ctx.lineWidth = 4;
  ctx.stroke();

  // Draw the "Window/Gap" relative to rotation
  // We'll draw 4 "pipes" sticking out
  for(let i=0; i<4; i++) {
    const a = i * 90;
    ctx.save();
    ctx.rotate(a * Math.PI / 180);
    ctx.beginPath();
    ctx.rect(-15, 10, 30, radius - 10);
    ctx.fillStyle = '#0f111a';
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawChime(x, y, radius, angle, isActive) {
  ctx.save();
  ctx.translate(x, y);
  
  const color = isActive ? '#78dca9' : '#e0e6ed';
  const glow = isActive ? 'rgba(120, 220, 169, 0.6)' : 'rgba(224, 230, 237, 0.2)';
  
  // Glow
  ctx.shadowBlur = 20;
  ctx.shadowColor = glow;
  
  // Chime body (rounded rect)
  ctx.fillStyle = '#151720';
  ctx.fillRect(-radius/2, -radius, radius, radius*2);
  
  ctx.lineWidth = 3;
  ctx.strokeStyle = color;
  ctx.strokeRect(-radius/2, -radius, radius, radius*2);
  
  // Inner line (string)
  ctx.beginPath();
  ctx.moveTo(0, -radius);
  ctx.lineTo(0, radius/2);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Visual indicator of "Active"
  if(isActive) {
    ctx.fillStyle = color;
    ctx.fillRect(-radius/2 + 5, -radius/2, radius - 10, 4);
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBackground(ctx) {
  // Rain
  ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
  ctx.lineWidth = 1;
  for(let p of state.particles) {
    if(p.type === 'rain') {
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x, p.y + 15);
      ctx.stroke();
    }
  }
}

// --- Main Loop ---

let lastTime = 0;
let dropTimer = 0;

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (state.screen !== 'playing') return;

  update(dt, timestamp);
  render(timestamp);

  requestAnimationFrame(loop);
}

function update(dt, now) {
  state.time += dt;

  // 1. Spawning Drops
  // Difficulty increases over time
  const elapsed = (now - state.startTime) / 1000;
  const difficulty = Math.min(elapsed / 60, 1); // 0 to 1 over 60s
  
  dropTimer += dt;
  const spawnInterval = 1500 - (difficulty * 1000); // Speed up from 1.5s to 0.5s
  
  if (dropTimer > spawnInterval) {
    spawnDrop();
    dropTimer = 0;
  }

  // 2. Update Drops
  for (let i = state.drops.length - 1; i >= 0; i--) {
    const d = state.drops[i];
    d.y += d.speed * (dt / 16);
    
    // Check if drop entered a chime zone
    // We pre-calculated which chime this drop belongs to based on dial rotation
    // Actually, drops spawn from the center window aligned with the dial.
    // So if dial channel 0 is pointing to Chime 0 (top), drop goes to Chime 0.
    // But dial rotation is relative.
    
    // Let's define chime angles: Top=270, Right=0, Bottom=90, Left=180
    // Standard Canvas angle: 0 is Right.
    const chimeAngles = [270, 0, 90, 180]; 
    const targetChimeIndex = d.targetChime; // 0..3
    
    // Check collision
    const dist = Math.sqrt(Math.pow(d.x - CENTER.x, 2) + Math.pow(d.y - CENTER.y, 2));
    
    if (dist > CHIME_RADIUS - CHIME_RADIUS_SIZE) {
      // Hit Chime
      handleChimeHit(targetChimeIndex);
      state.drops.splice(i, 1);
      continue;
    }
    
    // Missed or fell off screen
    if (d.y > CANVAS_SIZE + 50 || d.x < -50 || d.x > CANVAS_SIZE + 50) {
      state.drops.splice(i, 1);
      // Penalty for dropping? Maybe just lose score or nothing. 
      // Let's say if it falls off, it's lost rain.
      state.score = Math.max(0, state.score - 5);
      updateHUD();
    }
  }

  // 3. Particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) state.particles.splice(i, 1);
  }

  // 4. Shake decay
  if (state.shake > 0) state.shake *= 0.9;
  if (state.shake < 0.5) state.shake = 0;

  // 5. Rain noise volume
  const dropDensity = state.drops.length / 20; // normalizing
  updateRain(Math.min(density + dropDensity, 1));
}

function spawnDrop() {
  // Pick a random dial channel index (0..3)
  // The drop will travel along the angle determined by THAT dial's rotation.
  
  // Wait, the mechanics: "Clicking around one large central dial turns it".
  // If I click Chime 1 (Right), it rotates Dial 1. That opens the channel for Chime 1.
  
  // So, randomly spawn a drop that *needs* to go to a random chime.
  const targetIndex = Math.floor(Math.random() * 4);
  
  // Current angle of that specific dial
  const angle = state.dials[targetIndex];
  
  // Convert angle to radians
  const rad = (angle - 90) * Math.PI / 180; // -90 to make 0deg point up
  
  const x = CENTER.x + Math.cos(rad) * (DIAL_RADIUS + 20);
  const y = CENTER.y + Math.sin(rad) * (DIAL_RADIUS + 20);
  
  state.drops.push({
    x: x,
    y: y,
    targetChime: targetIndex,
    speed: 4 + Math.random() * 2,
    angle: rad,
    color: state.chimeActivated[targetIndex] ? '#78dca9' : '#5ec4c4'
  });
}

function handleChimeHit(chimeIndex) {
  const chime = state.dials[chimeIndex];
  const target = state.targetDials[chimeIndex];
  const diff = Math.abs(((chime - target + 180) % 360) - 180); // Normalize to -180..180
    
  if (diff < 45) {
    // Success
    if (!state.chimeActivated[chimeIndex]) {
      state.chimeActivated[chimeIndex] = true;
      state.score += 100;
      playChimeSound(chimeIndex);
      createParticles(CENTER.x + Math.cos(state.dials[chimeIndex] - 90) * CHIME_RADIUS, 
                      CENTER.y + Math.sin(state.dials[chimeIndex] - 90) * CHIME_RADIUS, 
                      '#78dca9', 20);
      updateHUD();
      
      // Check Win
      if (state.chimeActivated.every(b => b)) {
        endGame(true);
      }
    } else {
      // Already done, give small points
      state.score += 10;
      playChimeSound(chimeIndex); // Softer/same sound?
    }
  } else {
    // Miss
    state.score -= 20;
    playFailSound(); // Noise
    state.shake = 15;
    createParticles(CENTER.x + Math.cos(state.dials[chimeIndex] - 90) * CHIME_RADIUS, 
                    CENTER.y + Math.sin(state.dials[chimeIndex] - 90) * CHIME_RADIUS, 
                    '#ff6b6b', 10);
    updateHUD();
    
    if (state.score <= -100) {
      endGame(false);
    }
  }
}

function playFailSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100, t);
  osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t);
  osc.stop(t + 0.3);
}

function createParticles(x, y, color, count) {
  for(let i=0; i<count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4;
    state.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color: color
    });
  }
}

function render(timestamp) {
  // Clear with shake
  const shakeX = (Math.random() - 0.5) * state.shake;
  const shakeY = (Math.random() - 0.5) * state.shake;
  
  ctx.save();
  ctx.translate(shakeX, shakeY);
  
  // Background
  ctx.fillStyle = '#0f111a';
  ctx.fillRect(-10, -10, CANVAS_SIZE + 20, CANVAS_SIZE + 20);
  
  drawBackground(ctx);
  
  // Draw Chimes (Static positions)
  // Top (270), Right (0), Bottom (90), Left (180)
  const positions = [
    { x: CENTER.x, y: CENTER.y - CHIME_RADIUS, idx: 0 }, // Top
    { x: CENTER.x + CHIME_RADIUS, y: CENTER.y, idx: 1 }, // Right
    { x: CENTER.x, y: CENTER.y + CHIME_RADIUS, idx: 2 }, // Bottom
    { x: CENTER.x - CHIME_RADIUS, y: CENTER.y, idx: 3 }  // Left
  ];
  
  positions.forEach(p => {
    drawChime(p.x, p.y, CHIME_RADIUS_SIZE, 0, state.chimeActivated[p.idx]);
    
    // Target Indicator
    const targetAngle = state.targetDials[p.idx] - 90; 
    // Visualizing the target angle on the chime? 
    // Or a small ring around the chime indicating the dial needs to align with THIS chime.
    // Actually, the dial rotation determines WHERE the drop goes.
    // So if Dial 0 is at 0deg, it points RIGHT.
    // If the Chime is at TOP, we need Dial 0 to be 270deg (or -90).
    
    // Highlight the TARGET slot for that chime on the dial visual later
  });
  
  // Draw Dial (Center)
  drawDial(CENTER.x, CENTER.y, DIAL_RADIUS, state.dials[0] + state.dials[1] + state.dials[2] + state.dials[3], false); // Total rotation
  
  // Draw individual dial segments on the main dial to show alignment
  // We draw 4 channels on the main dial.
  // Actually, let's treat the 4 "buttons" around the dial as the dials themselves.
  // This simplifies the mental model: Click Top -> Rotates Top Channel.
  
  // Re-dial: 4 small concentric rings? 
  // Let's stick to the main dial. 
  // The "Dial" is one wheel. Clicking a quadrant rotates the WHOLE wheel.
  // This matches "Turn it to route".
  
  // Let's visualize the 4 channels on the dial clearly
  for(let i=0; i<4; i++) {
    const angleDeg = state.dials[i] + (i * 90); // Offset for channel position? No, dial rotates as a unit.
    // Actually, if I click the "Top" dial control, only the Top Channel rotates.
    // So we have 4 independent sliders.
    
    // Let's draw 4 small dials around the center.
    // Chime 0 (Top): Dial 0.
    // Chime 1 (Right): Dial 1.
  }
  
  // Refined Dial Visuals: 4 small dials arranged in a circle
  const dialR = 60;
  for(let i=0; i<4; i++) {
    const angleDeg = (i * 90) - 90; // 0, 90, 180, 270 relative to center (-90 for top)
    const rad = angleDeg * Math.PI / 180;
    const dx = CENTER.x + Math.cos(rad) * dialR;
    const dy = CENTER.y + Math.sin(rad) * dialR;
    
    drawDial(dx, dy, 35, state.dials[i], state.targetDials[i] === state.dials[i], '#5ec4c4');
    
    // Draw alignment line to chime if aligned
    if (state.targetDials[i] === state.dials[i]) {
      const chPos = positions[i];
      ctx.beginPath();
      ctx.moveTo(dx, dy);
      ctx.lineTo(chPos.x, chPos.y);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.stroke();
    }
  }

  // Draw Drops
  for(let d of state.drops) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI*2);
    ctx.fill();
    // Trail
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 15, 2, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Draw Particles
  for(let p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  ctx.restore();
}

function endGame(win) {
  state.screen = win ? 'win' : 'lose';
  elements.hud.classList.remove('visible');
  if (win) {
    elements.win.classList.add('visible');
  } else {
    elements.lose.classList.add('visible');
  }
}

// --- Input ---

// Mapping visual quadrants to dial indexes
// Top Quad -> Dial 0
// Right Quad -> Dial 1
// Bottom Quad -> Dial 2
// Left Quad -> Dial 3

function handleInteraction(x, y) {
  // Check if click is within the main dial area
  const dx = x - CENTER.x;
  const dy = y - CENTER.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  
  if (dist > DIAL_RADIUS + 50) return;
  
  // Calculate angle
  let angle = Math.atan2(dy, dx) * 180 / Math.PI;
  // Normalize 0..360 where 0 is Top (since atan2 0 is Right)
  // atan2: 0 is Right, 90 is Bottom, 180 is Left, -90/270 is Top.
  // We want Top=0, Right=1, Bottom=2, Left=3
  
  // Offset by 90 degrees
  angle = (angle + 90) % 360;
  if (angle < 0) angle += 360;
  
  const quadrant = Math.floor(angle / 90);
  
  // Rotate the corresponding dial
  state.dials[quadrant] = (state.dials[quadrant] + 90) % 360;
  
  // Play a small tick sound
  if(audioCtx) {
     const t = audioCtx.currentTime;
     const osc = audioCtx.createOscillator();
     const gain = audioCtx.createGain();
     osc.frequency.value = 800 + (quadrant * 100);
     gain.gain.setValueAtTime(0.1, t);
     gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
     osc.connect(gain);
     gain.connect(masterGain);
     osc.start();
     osc.stop(t + 0.1);
  }

  // Check for immediate match (just in case)
  const target = state.targetDials[quadrant];
  if (state.dials[quadrant] === target && !state.chimeActivated[quadrant]) {
     handleChimeHit(quadrant);
  }
}

canvas.addEventListener('click', (e) => {
  if (state.screen !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_SIZE / rect.width;
  const scaleY = CANVAS_SIZE / rect.height;
  
  handleInteraction(
    (e.clientX - rect.left) * scaleX,
    (e.clientY - rect.top) * scaleY
  );
});

// Start / Restart Buttons
document.getElementById('startBtn').addEventListener('click', () => {
  initAudio();
  resetGame();
  requestAnimationFrame(loop);
});

document.getElementById('restartWinBtn').addEventListener('click', () => {
  resetGame();
});

document.getElementById('restartLoseBtn').addEventListener('click', () => {
  resetGame();
});

// Initial Render
ctx.fillStyle = '#0f111a';
ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

</script>
