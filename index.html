<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Moth</title>
    <style>
        :root {
            --bg: #09090e;
            --ui-text: #e0e0f0;
            --ui-accent: #aaccff;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background: radial-gradient(circle at center, #141420 0%, #050508 100%);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .screen {
            background: rgba(10, 15, 25, 0.85);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(100, 120, 150, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
            pointer-events: auto;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(150, 200, 255, 0.6);
        }
        p {
            color: #aab;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 30px;
            max-width: 400px;
        }
        button {
            background: linear-gradient(135deg, #2a3b5c, #1a253a);
            color: #d0e0ff;
            border: 1px solid #3a5070;
            padding: 12px 36px;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(80, 130, 200, 0.2);
        }
        button:hover {
            background: linear-gradient(135deg, #3a4c70, #2a3b5c);
            box-shadow: 0 0 25px rgba(80, 130, 200, 0.5);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .hud-item {
            color: rgba(200, 210, 230, 0.7);
            font-size: 14px;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        #score-display {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(100, 180, 255, 0.6);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="hud">
            <div class="hud-item">DISTANCE: <span id="dist-display">0.0 m</span></div>
            <div class="hud-item">PULSES: <span id="score-display">0 / 3</span></div>
        </div>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>Magnetic Moth</h1>
                <p>The garden is sleeping. Guide the moth through the magnetic flowers.<br>
                Move the pointer slowly to navigate. Collect <strong>3 pulses</strong> to wake the garden.</p>
                <button id="btn-start">Begin</button>
            </div>
            <div id="end-screen" class="screen hidden">
                <h1 id="end-title">Awakened</h1>
                <p id="end-msg">The magnetic field has stabilized. The garden pulses with light.</p>
                <p id="end-stats" style="color: #688;"></p>
                <button id="btn-restart">Collect Again</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * MAGNETIC MOTH
         * A self-contained browser game.
         */

        // --- Audio Engine (Web Audio API) ---
        const Audio = (() => {
            let ctx = null;
            let masterGain = null;
            let mothAmbience = null;

            const init = () => {
                if (ctx) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = ctx.createGain();
                masterGain.gain.value = 0.3; // Master volume
                masterGain.connect(ctx.destination);
            };

            const stop = () => {
                if (mothAmbience) {
                    try {
                        mothAmbience.gain.setTargetAtTime(0, ctx.currentTime, 0.5);
                        setTimeout(() => {
                            if(mothAmbience) mothAmbience.stop();
                            mothAmbience = null;
                        }, 1000);
                    } catch(e) {}
                }
            };

            // Drone/Ambience for the Moth
            const startMothAmbience = () => {
                if (!ctx) return;
                
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc1.type = 'sine';
                osc1.frequency.value = 110; // A2
                osc2.type = 'triangle';
                osc2.frequency.value = 165; // E3

                gain.gain.value = 0.0;
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(masterGain);
                
                gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 2); // Fade in
                osc1.start();
                osc2.start();
                
                mothAmbience = { gain, osc1, osc2 };
            };

            // Chime for Flower Pulse
            const playPulse = (pitch = 1) => {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440 * pitch, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880 * pitch, ctx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start();
                osc.stop(ctx.currentTime + 2);
            };

            // Payoff Chord
            const playPayoff = () => {
                if (!ctx) return;
                const freqs = [220, 277, 330, 440]; // Am7 chord
                freqs.forEach((f, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = f;
                    gain.gain.setValueAtTime(0, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 1);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 4);
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start();
                    osc.stop(ctx.currentTime + 5);
                });
            };

            return { init, stop, startMothAmbience, playPulse, playPayoff };
        })();

        // --- Game Engine ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // State
        let state = 'IDLE'; // IDLE, PLAYING, END
        let startTime = 0;
        let score = 0;
        const REQUIRED_PULSES = 3;
        
        // Entities
        const moth = { x: 0, y: 0, targetX: 0, targetY: 0, size: 12, pulse: 0 };
        const flowers = [];
        let particles = [];
        let stars = [];

        // Input
        let mouseX = 0, mouseY = 0;

        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (state === 'IDLE') {
                moth.x = canvas.width / 2;
                moth.y = canvas.height / 2;
                moth.targetX = moth.x;
                moth.targetY = moth.y;
            }
            generateStars();
        };

        const generateStars = () => {
            stars = [];
            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    alpha: Math.random()
                });
            }
        };

        const initGame = () => {
            score = 0;
            startTime = Date.now();
            flowers.length = 0;
            particles = [];
            
            moth.x = canvas.width / 2;
            moth.y = canvas.height / 2;
            moth.targetX = moth.x;
            moth.targetY = moth.y;

            // Place first two flowers
            spawnFlower();
            spawnFlower();

            // Hide UI
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('hud').style.display = 'flex';
            
            state = 'PLAYING';
            Audio.startMothAmbience();
        };

        const spawnFlower = () => {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            const margin = 100;
            
            switch(side) {
                case 0: x = margin + Math.random() * (canvas.width - margin*2); y = margin; break;
                case 1: x = canvas.width - margin; y = margin + Math.random() * (canvas.height - margin*2); break;
                case 2: x = margin + Math.random() * (canvas.width - margin*2); y = canvas.height - margin; break;
                case 3: x = margin; y = margin + Math.random() * (canvas.height - margin*2); break;
            }
            
            // Try to avoid overlapping too much
            let attempts = 0;
            while(attempts < 10) {
                let overlap = false;
                for(let f of flowers) {
                    const d = Math.hypot(f.x - x, f.y - y);
                    if(d < 150) { overlap = true; break; }
                }
                if(overlap) {
                    x += (Math.random() - 0.5) * 100;
                    y += (Math.random() - 0.5) * 100;
                } else {
                    break;
                }
                attempts++;
            }

            // Only spawn if we haven't reached max required yet
            if (flowers.length < REQUIRED_PULSES) {
                flowers.push({
                    x, y, 
                    radius: 25, 
                    pulsePhase: Math.random() * Math.PI * 2,
                    color: `hsl(${Math.random()*60 + 150}, 80%, 70%)`,
                    collected: false,
                    collectedTime: null
                });
            }
        };

        const createParticles = (x, y, color, count = 10) => {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    color
                });
            }
        };

        const update = () => {
            if (state !== 'PLAYING') return;

            // Moth Movement (Easing)
            const dx = moth.targetX - moth.x;
            const dy = moth.targetY - moth.y;
            const dist = Math.hypot(dx, dy);
            const ease = 0.08;
            
            moth.x += dx * ease;
            moth.y += dy * ease;

            // Moth Pulse
            moth.pulse += 0.05;

            // Flower Logic
            flowers.forEach((f, index) => {
                if (f.collected) return;

                // Magnetic Pull
                const fx = f.x - moth.x;
                const fy = f.y - moth.y;
                const fDist = Math.hypot(fx, fy);
                
                // Gentle drift towards flower if close (magnetic feel)
                if (fDist < 300) {
                    moth.targetX += fx * 0.01;
                    moth.targetY += fy * 0.01;
                }

                // Collision
                if (fDist < moth.size + f.radius) {
                    f.collected = true;
                    f.collectedTime = Date.now();
                    score++;
                    Audio.playPulse(1 + (score * 0.2)); // Pitch up with each collect
                    createParticles(f.x, f.y, f.color, 20);
                    
                    // Update UI
                    document.getElementById('score-display').textContent = `${score} / ${REQUIRED_PULSES}`;
                    
                    // Check End Game
                    if (score >= REQUIRED_PULSES) {
                        endGame(true);
                    } else {
                        spawnFlower();
                    }
                }
            });

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        };

        const draw = () => {
            // Clear
            ctx.fillStyle = '#09090e'; // Match CSS
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = s.alpha * 0.5;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            if (state === 'PLAYING' || state === 'END') {
                // Flowers
                const time = Date.now() * 0.001;
                flowers.forEach(f => {
                    if (f.collected) {
                        // Draw fading remnant
                        ctx.globalAlpha = 0.2;
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, f.radius * 2, 0, Math.PI*2);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        return;
                    }

                    const pulse = Math.sin(time * 2 + f.pulsePhase) * 0.3 + 1;
                    
                    // Glow
                    ctx.shadowBlur = 30 * pulse;
                    ctx.shadowColor = f.color;
                    
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    
                    // Petal shape
                    const petals = 5;
                    const outerRadius = 15 * pulse;
                    const innerRadius = 8 * pulse;
                    
                    for(let i=0; i<petals*2; i++) {
                        const r = i%2 === 0 ? outerRadius : innerRadius;
                        const a = (Math.PI * i / petals) - (Math.PI/2) + time*0.2;
                        const px = f.x + Math.cos(a) * r;
                        const py = f.y + Math.sin(a) * r;
                        if(i===0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Center
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 4, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                });

                // Moth
                const mothPulse = Math.sin(moth.pulse * 5) * 0.2 + 1;
                
                // Tail / Trail
                ctx.strokeStyle = `rgba(100, 180, 255, ${0.1 + Math.sin(time)*0.05})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(moth.x, moth.y);
                // Simple trailing logic could be expanded, here just a pulse ring
                ctx.stroke();

                // Glow
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#88ddff';
                
                // Body
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(moth.x, moth.y, moth.size * mothPulse, 0, Math.PI * 2);
                ctx.fill();
                
                // Core
                ctx.fillStyle = '#aaddff';
                ctx.beginPath();
                ctx.arc(moth.x, moth.y, moth.size * 0.4 * mothPulse, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;

                // Particles
                particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 2, 2);
                    ctx.globalAlpha = 1;
                });
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        };

        const endGame = (success) => {
            state = 'END';
            Audio.playPayoff();
            
            const endScreen = document.getElementById('end-screen');
            const endTitle = document.getElementById('end-title');
            const endMsg = document.getElementById('end-msg');
            const endStats = document.getElementById('end-stats');
            
            const durationMs = Date.now() - startTime;
            const durationSec = (durationMs / 1000).toFixed(1);
            
            endScreen.classList.remove('hidden');
            document.getElementById('hud').style.display = 'none';
            
            if (success) {
                endTitle.textContent = "Garden Awakened";
                endMsg.textContent = "The magnetic field is stable. The petals are open.";
            } else {
                endTitle.textContent = "Lost Pulse";
                endMsg.textContent = "The moth drifted too far from the magnetic field.";
            }
            
            endStats.textContent = `Time: ${durationSec}s | Pulses: ${score}`;
        };

        // --- Events ---
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            if (state === 'PLAYING') {
                moth.targetX = e.clientX;
                moth.targetY = e.clientY;
            }
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            if (state === 'PLAYING') {
                e.preventDefault();
                moth.targetX = e.touches[0].clientX;
                moth.targetY = e.touches[0].clientY;
            }
        }, { passive: false });

        document.getElementById('btn-start').addEventListener('click', () => {
            Audio.init();
            initGame();
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            Audio.init();
            initGame();
        });

        // --- Init ---
        resize();
        document.getElementById('start-screen').classList.remove('hidden');
        draw(); // Start loop

    </script>
</body>
</html>
