<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }
  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #restartBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #8af;
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.3s;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }
  #restartBtn.visible {
    opacity: 1;
    pointer-events: all;
  }
  #restartBtn:hover {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }
  #evidence-display {
    position: fixed;
    top: 10px;
    right: 10px;
    color: rgba(255,255,255,0.2);
    font-size: 10px;
    text-align: right;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<button id="restartBtn" onclick="restartGame()">RESTART SEED</button>
<div id="evidence-display"></div>

<script>
// ============================================================
// SIGNAL GARDEN — A 60-90 second one-screen browser game
// Click different points on the tuning dial to grow your plant.
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restartBtn');
const evidenceDisplay = document.getElementById('evidence-display');

// --- State ---
let W, H, cx, cy;
let audioCtx = null;
let masterGain = null;
let started = false;
let phase = 'initial'; // 'initial', 'playing', 'completed'
let progress = 0;
const TARGET = 10;
let restartCount = 0;
let gameTime = 0;
let lastTime = 0;
let bloomParticles = [];
let signalWaves = [];
let plantSegments = [];
let dialAngle = 0;
let activeSignal = null;
let signalWindowOpen = false;
let signalWindowTimer = 0;
let signalWindowDuration = 3000;
let signalWindowGap = 4000;
let matchedCount = 0;
let plantHeight = 0;
let plantTargetHeight = 600;
let leafCount = 0;
let glowIntensity = 0;
let pressureLevel = 0;
let bloomAnim = 0;
let completed = false;
let particles = [];
let backgroundStars = [];
let currentFrequency = 0;
let tuningDialRadius = 80;
let hoverDial = false;
let shakeAmount = 0;
let ambientDrone = null;
let bloomOscillators = [];

// Signal zones - different colors/notes on the dial
const signalZones = [
  { angle: 0, color: '#ff6b8a', freq: 220, name: 'C4', label: 'Warmth' },
  { angle: Math.PI / 3, color: '#ffd166', freq: 261.6, name: 'E4', label: 'Gold' },
  { angle: 2 * Math.PI / 3, color: '#a8e6cf', freq: 329.6, name: 'G4', label: 'Mint' },
  { angle: Math.PI, color: '#6bc5f2', freq: 349.2, name: 'F4', label: 'Sky' },
  { angle: 4 * Math.PI / 3, color: '#c77dff', freq: 440, name: 'A4', label: 'Violet' },
  { angle: 5 * Math.PI / 3, color: '#ffb347', freq: 493.9, name: 'B4', label: 'Amber' }
];

// --- Initialization ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2 + 50;
}

window.addEventListener('resize', resize);
resize();

// Background stars
for (let i = 0; i < 120; i++) {
  backgroundStars.push({
    x: Math.random() * 3000 - 500,
    y: Math.random() * 2000 - 500,
    size: Math.random() * 1.5 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.005 + 0.002
  });
}

// --- Audio System ---
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
  
  // Ambient drone
  ambientDrone = audioCtx.createOscillator();
  ambientDrone.type = 'sine';
  ambientDrone.frequency.value = 80;
  const droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.08;
  ambientDrone.connect(droneGain);
  droneGain.connect(masterGain);
  ambientDrone.start();
  
  // LFO for drone
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.3;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 15;
  lfo.connect(lfoGain);
  lfoGain.connect(ambientDrone.frequency);
  lfo.start();
}

function playNote(freq, duration = 0.5, vol = 0.15, type = 'sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  osc.type = type;
  osc.frequency.value = freq;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playMatchSound() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Rich chord on match
  const freqs = [currentFrequency, currentFrequency * 1.5, currentFrequency * 2];
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = f;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + 1.5);
  });
}

function playBloom() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Crescendo bloom - ascending scale
  const scale = [261.6, 329.6, 392, 523.3, 659.3, 784, 1047];
  scale.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = i < 3 ? 'sine' : 'triangle';
    osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    const t = now + i * 0.15;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.12, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 2);
  });
  
  // Add shimmer
  for (let i = 0; i < 8; i++) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 1200 + Math.random() * 1500;
    const gain = audioCtx.createGain();
    const t = now + Math.random() * 0.5;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.03, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 1);
  }
}

function playClick() {
  if (!audioCtx) return;
  playNote(currentFrequency || 220, 0.2, 0.08, 'sine');
}

function playSignalWindowOpen() {
  if (!audioCtx) return;
  playNote(440, 0.3, 0.05, 'triangle');
}

function playSignalWindowClose() {
  if (!audioCtx) return;
  playNote(220, 0.3, 0.05, 'triangle');
}

// --- Drawing Functions ---

function drawBackground(dt) {
  // Dark gradient background
  const bgGrad = ctx.createRadialGradient(cx, cy - 100, 50, cx, cy, Math.max(W, H));
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(0.5, '#0f0f1a');
  bgGrad.addColorStop(1, '#060610');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  backgroundStars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawTuningDial() {
  if (phase === 'initial' || phase === 'completed') return;
  
  const dialX = cx;
  const dialY = cy + 10;
  const r = tuningDialRadius;
  
  // Dial outer ring
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(dialX, dialY, r, 0, Math.PI * 2);
  ctx.stroke();
  
  // Signal zones
  signalZones.forEach(zone => {
    ctx.fillStyle = zone.color + '30';
    ctx.beginPath();
    ctx.moveTo(dialX, dialY);
    ctx.arc(dialX, dialY, r, 
      zone.angle - 0.2, 
      zone.angle + 0.2);
    ctx.closePath();
    ctx.fill();
    
    // Zone indicator
    const ix = dialX + Math.cos(zone.angle) * (r - 10);
    const iy = dialY + Math.sin(zone.angle) * (r - 10);
    ctx.fillStyle = zone.color + '60';
    ctx.beginPath();
    ctx.arc(ix, iy, 4, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Active signal window
  if (signalWindowOpen && activeSignal) {
    const angle = activeSignal.angle + Math.sin(gameTime * 0.005) * 0.05;
    ctx.strokeStyle = activeSignal.color + 'aa';
    ctx.lineWidth = 3;
    ctx.shadowColor = activeSignal.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(dialX, dialY, r, angle - 0.4, angle + 0.4);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  
  // Hover indicator
  if (hoverDial && phase === 'playing') {
    const pointerAngle = dialAngle;
    const px = dialX + Math.cos(pointerAngle) * (r + 15);
    const py = dialY + Math.sin(pointerAngle) * (r + 15);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Dial center
  ctx.fillStyle = '#2a2a3e';
  ctx.beginPath();
  ctx.arc(dialX, dialY, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#4a4a6e';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Progress display
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`TUNING: ${matchedCount}/${TARGET}`, dialX, dialY + r + 25);
}

function drawPlant() {
  if (phase === 'initial') {
    // Show seed
    ctx.fillStyle = '#3a3a5e';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 40, 8, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5a5a8e';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // Subtle glow
    const seedGlow = ctx.createRadialGradient(cx, cy + 40, 0, cx, cy + 40, 30);
    seedGlow.addColorStop(0, 'rgba(150,150,200,0.2)');
    seedGlow.addColorStop(1, 'rgba(150,150,200,0)');
    ctx.fillStyle = seedGlow;
    ctx.fill();
    return;
  }
  
  // Draw growth stages from bottom up
  const baseX = cx;
  const baseY = cy + 40;
  
  // Main stem
  const stemHeight = plantHeight;
  ctx.strokeStyle = `hsl(${160 + glowIntensity * 60}, 60%, ${30 + glowIntensity * 20}%)`;
  ctx.lineWidth = 3 + glowIntensity * 2;
  ctx.lineCap = 'round';
  
  // Twisting stem with bezier curves
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  const segments = 12;
  const segHeight = stemHeight / segments;
  for (let i = 1; i <= segments; i++) {
    const t = i / segments;
    const xOff = Math.sin(gameTime * 0.001 + i * 0.3) * (5 + t * 10);
    const x = baseX + xOff;
    const y = baseY - i * segHeight;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  // Stem glow
  ctx.shadowColor = `hsl(${160 + glowIntensity * 60}, 80%, 50%)`;
  ctx.shadowBlur = 5 + glowIntensity * 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Leaves
  for (let i = 0; i < leafCount; i++) {
    const leafT = (i + 1) / (leafCount + 1);
    const segIdx = Math.floor(leafT * segments);
    const segT = (leafT * segments) - segIdx;
    const x1 = baseX + Math.sin(gameTime * 0.001 + segIdx * 0.3) * (5 + segIdx * 10 / segments * 10);
    const y1 = baseY - segIdx * segHeight;
    
    const side = i % 2 === 0 ? 1 : -1;
    const leafSize = 8 + leafT * 15 + glowIntensity * 5;
    const leafAngle = side * (0.5 + leafT * 0.5);
    
    const leafX = x1 + Math.cos(leafAngle) * leafSize;
    const leafY = y1 + Math.sin(leafAngle) * leafSize;
    
    // Leaf shape
    const hue = 160 + leafT * 80 + glowIntensity * 40;
    ctx.fillStyle = `hsl(${hue}, ${50 + glowIntensity * 30}%, ${35 + leafT * 20}%)`;
    ctx.beginPath();
    ctx.ellipse(leafX, leafY, leafSize * 0.6, leafSize * 0.3, leafAngle, 0, Math.PI * 2);
    ctx.fill();
    
    // Leaf vein
    ctx.strokeStyle = `hsla(${hue}, 60%, 60%, 0.5)`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(leafX, leafY);
    ctx.stroke();
  }
  
  // Top bud/blossom area
  const topX = baseX + Math.sin(gameTime * 0.001 + segments * 0.3) * (5 + segments * 10 / segments * 10);
  const topY = baseY - stemHeight;
  
  // Bud layers
  if (matchedCount > 0) {
    const budSize = 5 + matchedCount * 4;
    const petalCount = Math.min(matchedCount * 2, 12);
    
    for (let p = 0; p < petalCount; p++) {
      const angle = (p / petalCount) * Math.PI * 2 + gameTime * 0.0005;
      const px = topX + Math.cos(angle) * budSize;
      const py = topY + Math.sin(angle) * budSize;
      
      const hue = (p / petalCount) * 360 + glowIntensity * 60;
      ctx.fillStyle = `hsla(${hue}, 70%, 50%, ${0.4 + glowIntensity * 0.4})`;
      ctx.beginPath();
      ctx.ellipse(px, py, budSize * 0.5, budSize * 0.3, angle + Math.PI / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Center glow
    const centerGlow = ctx.createRadialGradient(topX, topY, 0, topX, topY, budSize * 1.5);
    centerGlow.addColorStop(0, `hsla(${60 + glowIntensity * 60}, 80%, 60%, ${0.3 + glowIntensity * 0.4})`);
    centerGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = centerGlow;
    ctx.beginPath();
    ctx.arc(topX, topY, budSize * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles(dt) {
  particles.forEach((p, i) => {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.life -= dt * p.decay;
    p.vy += 0.01 * dt * 60; // gravity
    
    if (p.life <= 0) {
      particles.splice(i, 1);
      return;
    }
    
    ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.life * 0.7})`;
    const size = p.size * p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Signal waves
  signalWaves.forEach((w, i) => {
    w.radius += w.speed * dt * 60;
    w.alpha -= dt * 0.8;
    
    if (w.alpha <= 0) {
      signalWaves.splice(i, 1);
      return;
    }
    
    ctx.strokeStyle = `${w.color}${Math.floor(w.alpha * 255).toString(16).padStart(2, '0')}`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
    ctx.stroke();
  });
  
  // Bloom burst particles
  bloomParticles.forEach((bp, i) => {
    bp.x += bp.vx * dt * 60;
    bp.y += bp.vy * dt * 60;
    bp.life -= dt * 0.5;
    bp.vy += 0.005 * dt * 60;
    
    if (bp.life <= 0) {
      bloomParticles.splice(i, 1);
      return;
    }
    
    const hue = bp.baseHue + bp.life * 60;
    ctx.fillStyle = `hsla(${hue}, 80%, 65%, ${bp.life * 0.8})`;
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, bp.size * (0.3 + bp.life * 0.7), 0, Math.PI * 2);
    ctx.fill();
    
    // Glow trail
    ctx.shadowColor = `hsla(${hue}, 90%, 65%, ${bp.life * 0.5})`;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawSignalIndicator() {
  // Top center: signal indicator
  if (phase === 'playing' && activeSignal) {
    const text = `SIGNAL: ${activeSignal.name} — ${activeSignal.label}`;
    ctx.fillStyle = activeSignal.color;
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowColor = activeSignal.color;
    ctx.shadowBlur = 10;
    ctx.fillText(text, cx, 40);
    ctx.shadowBlur = 0;
    
    // Progress bar at bottom
    const barW = 300;
    const barH = 6;
    const barX = cx - barW / 2;
    const barY = H - 50;
    
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(barX, barY, barW, barH);
    
    const fillW = (matchedCount / TARGET) * barW;
    const grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
    grad.addColorStop(0, '#4488ff');
    grad.addColorStop(0.5, '#44ffaa');
    grad.addColorStop(1, '#ff44aa');
    ctx.fillStyle = grad;
    ctx.fillRect(barX, barY, fillW, barH);
    
    // Signal window open indicator
    if (signalWindowOpen) {
      ctx.fillStyle = activeSignal.color;
      ctx.font = '12px Courier New';
      ctx.textAlign = 'center';
      const pulse = Math.sin(gameTime * 0.01) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillText('⬥ TUNE NOW ⬥', cx, barY - 15);
      ctx.globalAlpha = 1;
    }
  }
}

function drawGameOver() {
  if (phase !== 'completed') return;
  
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);
  
  // Bloom message
  const msg = completed ? 'BLOOM COMPLETE' : 'SEED WITHERED';
  const subMsg = completed ? 'Your garden has flowered.' : 'The signals faded. Try again.';
  
  ctx.fillStyle = completed ? '#66ffaa' : '#ff6666';
  ctx.font = '28px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowColor = completed ? '#66ffaa' : '#ff6666';
  ctx.shadowBlur = 20;
  ctx.fillText(msg, cx, cy - 80);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '14px Courier New';
  ctx.fillText(subMsg, cx, cy - 45);
  
  // Show restart button
  restartBtn.classList.add('visible');
}

// --- Game Logic ---

function spawnParticles(x, y, count, color, spread = 3) {
  const rgb = hexToRgb(color);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.005 + Math.random() * 0.01,
      size: 2 + Math.random() * 4,
      r: rgb.r, g: rgb.g, b: rgb.b
    });
  }
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? {
    r: parseInt(result[1], 16),
    g: parseInt(result[2], 16),
    b: parseInt(result[3], 16)
  } : { r: 255, g: 255, b: 255 };
}

function startSignalWindow() {
  const zone = signalZones[Math.floor(Math.random() * signalZones.length)];
  activeSignal = zone;
  signalWindowOpen = true;
  signalWindowTimer = signalWindowDuration;
  playSignalWindowOpen();
}

function stopSignalWindow() {
  signalWindowOpen = false;
  playSignalWindowClose();
}

function handleClick(e) {
  if (phase === 'initial') {
    // Start game
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    phase = 'playing';
    started = true;
    playNote(440, 0.5, 0.1);
    
    // Seed particles
    spawnParticles(cx, cy + 40, 20, '#88aaff', 2);
    
    setTimeout(() => startSignalWindow(), 1500);
    return;
  }
  
  if (phase === 'completed') {
    return; // Handled by restart button
  }
  
  // Play click sound
  dialAngle = Math.atan2(e.clientY - (cy + 10), e.clientX - cx);
  playClick();
  
  // Check if click is on the dial
  const clickX = e.clientX;
  const clickY = e.clientY;
  const dialX = cx;
  const dialY = cy + 10;
  const dist = Math.sqrt((clickX - dialX) ** 2 + (clickY - dialY) ** 2);
  
  if (dist > tuningDialRadius - 30 || dist < tuningDialRadius - 20) return;
  
  // Determine which zone was clicked
  let angle = Math.atan2(clickY - dialY, clickX - dialX);
  if (angle < 0) angle += Math.PI * 2;
  
  let matched = false;
  for (const zone of signalZones) {
    let diff = Math.abs(angle - zone.angle);
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    
    if (diff < 0.35) {
      // Clicked this zone
      if (signalWindowOpen && activeSignal === zone) {
        // Perfect match!
        matched = true;
        matchedCount++;
        progress = matchedCount;
        currentFrequency = zone.freq;
        
        // Effects
        spawnParticles(clickX, clickY, 30, zone.color, 5);
        spawnParticles(dialX, dialY, 15, '#ffffff', 3);
        signalWaves.push({
          x: dialX, y: dialY,
          radius: tuningDialRadius,
          alpha: 1,
          speed: 3,
          color: zone.color
        });
        
        // Advance plant
        plantHeight = Math.min((matchedCount / TARGET) * plantTargetHeight, plantTargetHeight);
        leafCount = Math.floor(matchedCount * 1.5);
        glowIntensity = matchedCount / TARGET;
        
        playMatchSound();
        
        // Check for completion
        if (matchedCount >= TARGET) {
          completeGame(true);
          return;
        }
      } else {
        // Wrong zone or no window open
        // Minor negative feedback
        shakeAmount = 5;
        spawnParticles(clickX, clickY, 10, '#ff4444', 2);
        playNote(110, 0.3, 0.05, 'sawtooth');
        
        // Reset progress on wrong click (adds pressure)
        matchedCount = Math.max(0, matchedCount - 1);
        progress = matchedCount;
        plantHeight = Math.max(plantHeight - 30, 60);
        leafCount = Math.max(leafCount - 1, 0);
        glowIntensity = Math.max(0, matchedCount / TARGET);
      }
      break;
    }
  }
  
  if (!matched && signalWindowOpen) {
    // Clicked empty space during active window
    shakeAmount = 3;
    playNote(165, 0.3, 0.03, 'sawtooth');
  }
}

function completeGame(success) {
  phase = 'completed';
  completed = success;
  
  if (success) {
    // Bloom payoff
    playBloom();
    
    // Massive particle burst
    for (let ring = 0; ring < 5; ring++) {
      setTimeout(() => {
        const hue = ring * 40;
        for (let i = 0; i < 40; i++) {
          const angle = (i / 40) * Math.PI * 2;
          const speed = 2 + ring;
          bloomParticles.push({
            x: cx,
            y: cy + 40 - plantHeight,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 3 + Math.random() * 5,
            baseHue: hue + Math.random() * 30
          });
        }
      }, ring * 200);
    }
    
    // Signal waves
    signalWaves.push({
      x: cx, y: cy + 40 - plantHeight,
      radius: 10,
      alpha: 1,
      speed: 5,
      color: '#66ffaa'
    });
  } else {
    playNote(88, 1, 0.1, 'sawtooth');
    signalWaves.push({
      x: cx, y: cy + 40,
      radius: 10,
      alpha: 0.6,
      speed: 2,
      color: '#ff4466'
    });
  }
}

function restartGame() {
  restartCount++;
  phase = 'initial';
  progress = 0;
  matchedCount = 0;
  plantHeight = 0;
  leafCount = 0;
  glowIntensity = 0;
  bloomAnim = 0;
  completed = false;
  particles = [];
  signalWaves = [];
  bloomParticles = [];
  activeSignal = null;
  signalWindowOpen = false;
  currentFrequency = 0;
  
  restartBtn.classList.remove('visible');
  started = false;
}

// --- Main Game Loop ---

function update(dt) {
  gameTime += dt * 1000;
  
  if (phase === 'playing') {
    // Signal window timer
    if (signalWindowOpen) {
      signalWindowTimer -= dt * 1000;
      if (signalWindowTimer <= 0) {
        stopSignalWindow();
        // Missed a signal - lose progress
        matchedCount = Math.max(0, matchedCount - 1);
        progress = matchedCount;
        plantHeight = Math.max(60, plantHeight - 40);
        leafCount = Math.max(0, leafCount - 1);
        glowIntensity = Math.max(0, matchedCount / TARGET);
      }
    } else {
      // Schedule next signal window
      signalWindowTimer -= dt * 1000;
      if (signalWindowTimer <= 0) {
        // Make windows tighter over time (escalation)
        const progressFactor = matchedCount / TARGET;
        signalWindowDuration = 3000 - progressFactor * 1500; // Gets shorter
        signalWindowGap = 4000 - progressFactor * 2000; // Gaps get shorter too
        signalWindowTimer = signalWindowGap;
        startSignalWindow();
      }
    }
    
    // Gentle pressure: slowly decrease plant if idle
    if (matchedCount > 0) {
      plantHeight = Math.max(60, plantHeight - dt * 2);
      leafCount = Math.max(0, Math.floor(plantHeight / 40));
    }
    
    // Check timeout (total game time)
    if (gameTime > 90000 && matchedCount < TARGET) {
      completeGame(false);
    }
  }
  
  // Shake decay
  if (shakeAmount > 0) {
    shakeAmount *= 0.9;
    if (shakeAmount < 0.1) shakeAmount = 0;
  }
  
  // Ambient drone modulation based on progress
  if (ambientDrone && audioCtx) {
    const baseFreq = 80 + matchedCount * 10;
    ambientDrone.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.1);
  }
}

function render(dt) {
  ctx.save();
  
  // Apply shake
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
  }
  
  drawBackground(dt);
  drawPlant();
  drawTuningDial();
  drawSignalIndicator();
  drawParticles(dt);
  
  // Title/overlay for initial state
  if (phase === 'initial') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '20px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('SIGNAL GARDEN', cx, cy - 60);
    ctx.font = '12px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('Click to begin', cx, cy - 35);
    ctx.fillText('Tune the dial to grow your plant', cx, cy - 15);
  }
  
  drawGameOver();
  
  ctx.restore();
}

// --- Evidence API ---
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: phase,
    progress: progress,
    target: TARGET,
    completed: completed || false,
    restart_count: restartCount
  };
};

// --- Game Loop ---
function gameLoop(timestamp) {
  const dt = lastTime ? (timestamp - lastTime) / 1000 : 0.016;
  lastTime = timestamp;
  
  update(Math.min(dt, 0.05));
  render(Math.min(dt, 0.05));
  
  requestAnimationFrame(gameLoop);
}

// --- Event Listeners ---
canvas.addEventListener('click', handleClick);
canvas.addEventListener('mousemove', (e) => {
  const dialX = cx;
  const dialY = cy + 10;
  const dist = Math.sqrt((e.clientX - dialX) ** 2 + (e.clientY - dialY) ** 2);
  hoverDial = dist > tuningDialRadius - 30 && dist < tuningDialRadius + 20;
  canvas.style.cursor = hoverDial ? 'pointer' : 'crosshair';
});

// --- Start ---
gameLoop(0);

</script>
