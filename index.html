<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #c8f0c0;
    user-select: none;
  }
  #game {
    width: 100vw;
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    cursor: pointer;
  }
  #info {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0.7;
    font-size: 14px;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #restart-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(100,255,100,0.3);
    color: #8fdf8a;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0.6;
    transition: all 0.3s;
    pointer-events: auto;
  }
  #restart-btn:hover {
    opacity: 1;
    background: rgba(100,255,100,0.15);
    border-color: rgba(100,255,100,0.6);
  }
  #title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    letter-spacing: 4px;
    opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="title">SIGNAL GARDEN</div>
  <div id="info">click the dial to tune the signal</div>
  <button id="restart-btn">RESTART</button>
</div>

<script>
(function() {
  'use strict';

  // === DOM ELEMENTS ===
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const info = document.getElementById('info');
  const restartBtn = document.getElementById('restart-btn');
  const titleEl = document.getElementById('title');

  // === CANVAS SETUP ===
  const W = 1400;
  const H = 900;
  canvas.width = W;
  canvas.height = H;

  function resize() {
    const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // === SIGNAL DATA ===
  const SIGNAL_CENTERS = [
    { angle: -Math.PI / 3,  color: '#ff6b6b', label: 'ROOT-FREQ', desc: 'ground harmonic' },
    { angle: 0,             color: '#6bff8b', label: 'STEM-FREQ', desc: 'growth carrier' },
    { angle: Math.PI / 3,  color: '#6bb8ff', label: 'LEAF-FREQ', desc: 'luminal band' }
  ];
  const SIGNAL_WIDTH = 0.28; // radians

  // === GAME STATE ===
  let state = {
    phase: 'initial', // initial, playing, completed
    progress: 0,
    target: 3,
    completed: false,
    restartCount: 0,
    dialAngle: 0,
    dialLocked: false,
    signalsMatched: [false, false, false],
    bloom: 0,         // 0 to 1
    particles: [],
    plantGrowth: [0, 0, 0], // growth of each plant part
    plantPhase: 0,    // animation phase
    emitAngle: 0,
    emitTimer: 0,
    emitParticle: null,
    hoveredSignal: -1,
    pulsePhase: 0,
    starPhase: 0,
    completedTimer: 0,
    shakeX: 0,
    shakeY: 0
  };

  // === AUDIO ENGINE ===
  let audioCtx = null;
  let audioStarted = false;
  let masterGain = null;
  let ambientGain = null;
  let droneGain = null;
  let toneGain = null;
  let chimeGain = null;
  let droneOsc = null;
  let droneOsc2 = null;
  let ambientOsc = null;
  let ambientOsc2 = null;
  let signalOsc = null;
  let signalLfo = null;
  let rootPlayed = false;
  let stemPlayed = false;
  let leafPlayed = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);

    // Ambient pad
    ambientGain = audioCtx.createGain();
    ambientGain.gain.value = 0;
    ambientOsc = audioCtx.createOscillator();
    ambientOsc.type = 'sine';
    ambientOsc.frequency.value = 80;
    ambientOsc2 = audioCtx.createOscillator();
    ambientOsc2.type = 'sine';
    ambientOsc2.frequency.value = 82;
    ambientGain.connect(masterGain);
    ambientOsc.connect(ambientGain);
    ambientOsc2.connect(ambientGain);
    ambientOsc.start();
    ambientOsc2.start();

    // Drone
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0;
    droneOsc = audioCtx.createOscillator();
    droneOsc.type = 'triangle';
    droneOsc.frequency.value = 110;
    droneOsc2 = audioCtx.createOscillator();
    droneOsc2.type = 'sine';
    droneOsc2.frequency.value = 55;
    droneGain.connect(masterGain);
    droneOsc.connect(droneGain);
    droneOsc2.connect(droneGain);
    droneOsc.start();
    droneOsc2.start();

    // Signal tone
    toneGain = audioCtx.createGain();
    toneGain.gain.value = 0;
    signalOsc = audioCtx.createOscillator();
    signalOsc.type = 'sine';
    signalLfo = audioCtx.createOscillator();
    signalLfo.type = 'sine';
    signalLfo.frequency.value = 6;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 40;
    signalLfo.connect(lfoGain);
    lfoGain.connect(signalOsc.frequency);
    signalOsc.connect(toneGain);
    toneGain.connect(masterGain);
    signalOsc.start();
    signalLfo.start();
  }

  function startAudioForReal() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!audioStarted) {
      audioStarted = true;
    }
  }

  // Play a specific frequency tone when a signal is matched
  function playSignalTone(signalIndex) {
    if (!audioCtx) return;
    startAudioForReal();

    const freqs = [130.81, 196.00, 261.63]; // C3, G3, C4
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freqs[signalIndex];
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.15, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + 1.5);

    // Harmonic
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.value = freqs[signalIndex] * 2.01;
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.06, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc2.connect(gain2);
    gain2.connect(masterGain);
    osc2.start(now);
    osc2.stop(now + 1.0);

    // Ascending chime for leaf
    if (signalIndex === 2) {
      const osc3 = audioCtx.createOscillator();
      const gain3 = audioCtx.createGain();
      osc3.type = 'sine';
      osc3.frequency.setValueAtTime(freqs[signalIndex] * 3, now);
      osc3.frequency.linearRampToValueAtTime(freqs[signalIndex] * 4, now + 0.2);
      gain3.gain.setValueAtTime(0.08, now);
      gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc3.connect(gain3);
      gain3.connect(masterGain);
      osc3.start(now);
      osc3.stop(now + 0.8);
    }
  }

  // Play bloom sound
  function playBloomSound() {
    if (!audioCtx) return;
    startAudioForReal();
    const now = audioCtx.currentTime;
    const freqs = [130.81, 164.81, 196.00, 261.63, 329.63, 392.00, 523.25];
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const t = now + i * 0.08;
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(t);
      osc.stop(t + 2.5);
    });
    // Sub bass
    const sub = audioCtx.createOscillator();
    const subGain = audioCtx.createGain();
    sub.type = 'sine';
    sub.frequency.value = 35;
    subGain.gain.setValueAtTime(0.3, now);
    subGain.gain.exponentialRampToValueAtTime(0.001, now + 3);
    sub.connect(subGain);
    subGain.connect(masterGain);
    sub.start(now);
    sub.stop(now + 3);
  }

  // === PARTICLE SYSTEM ===
  function addParticle(x, y, color, vx, vy, life, size) {
    state.particles.push({
      x, y, color, vx, vy, life, maxLife: life, size: size || 3
    });
  }

  function emitParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 3;
      addParticle(x, y, color,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        0.5 + Math.random() * 1.5,
        2 + Math.random() * 4
      );
    }
  }

  // === SIGNAL HIT DETECTION ===
  function getSignalAtAngle(angle) {
    const a = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    let best = -1;
    let bestDist = Infinity;
    for (let i = 0; i < SIGNAL_CENTERS.length; i++) {
      let center = SIGNAL_CENTERS[i].angle;
      if (center < 0) center += Math.PI * 2;
      let diff = Math.abs(a - center);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      if (diff < SIGNAL_WIDTH / 2 && diff < bestDist) {
        bestDist = diff;
        best = i;
      }
    }
    return best;
  }

  // === PLANT DRAWING ===
  function drawPlant(growth, phase, time) {
    const cx = W / 2;
    const cy = H / 2 + 80;

    // Three parts: root (down), stem (up), leaf (right)
    const parts = [
      { angle: Math.PI / 2,  len: 100 * growth[0], width: 8 * growth[0], color: '#8b5e3c' }, // roots/down
      { angle: -Math.PI / 2, len: 160 * growth[1], width: 6 * growth[1], color: '#2d8b3c' }, // stem/up
      { angle: 0,            len: 100 * growth[2], width: 4 * growth[2], color: '#3cb87a' }  // leaf/right
    ];

    // Draw roots
    if (growth[0] > 0.01) {
      const segments = 8;
      for (let i = 0; i < segments; i++) {
        const t = i / segments;
        const a = Math.PI / 2 + (Math.sin(time * 1.5 + i * 0.7) * 0.15 * growth[0]);
        const r = (t * parts[0].len);
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        ctx.beginPath();
        ctx.arc(x, y, 3 * growth[0] * (1 - t * 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${139 + i * 7}, ${94 + i * 4}, ${60 + i * 3}, ${0.8 - t * 0.3})`;
        ctx.fill();
        // root branches
        if (i > 2 && i < segments - 1) {
          const branchAngle = (i % 2 === 0 ? 1 : -1) * 0.5;
          const bLen = 25 * growth[0] * (1 - t);
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + Math.cos(a + branchAngle) * bLen, y + Math.sin(a + branchAngle) * bLen);
          ctx.strokeStyle = `rgba(${139}, ${94}, ${60}, ${0.5 * (1-t)})`;
          ctx.lineWidth = 2 * (1 - t);
          ctx.stroke();
          // leaf at end
          if (i >= 4) {
            const lx = x + Math.cos(a + branchAngle) * bLen;
            const ly = y + Math.sin(a + branchAngle) * bLen;
            ctx.beginPath();
            ctx.ellipse(lx, ly, 8 * growth[0], 4 * growth[0], a + branchAngle, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${100 + i * 10}, ${140 + i * 5}, ${80}, ${0.6})`;
            ctx.fill();
          }
        }
      }
    }

    // Draw stem
    if (growth[1] > 0.01) {
      const segments = 15;
      const sway = Math.sin(time * 1.2) * 8 * growth[1];
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      for (let i = 1; i <= segments; i++) {
        const t = i / segments;
        const a = -Math.PI / 2 + Math.sin(time * 1.5 + t * 3) * 0.08 * t * growth[1];
        const r = t * parts[1].len;
        const x = cx + Math.cos(a) * (r + sway * t);
        const y = cy + Math.sin(a) * r;
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${45}, ${139}, ${60}, ${0.9})`;
      ctx.lineWidth = parts[1].width;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Stem glow
      ctx.strokeStyle = `rgba(${45}, ${255}, ${60}, ${0.2 * growth[1]})`;
      ctx.lineWidth = parts[1].width + 6;
      ctx.stroke();

      // Nodes on stem
      for (let i = 2; i <= segments - 2; i++) {
        if (i % 3 === 0) {
          const t = i / segments;
          const a = -Math.PI / 2 + Math.sin(time * 1.5 + t * 3) * 0.08 * t * growth[1];
          const r = t * parts[1].len;
          const x = cx + Math.cos(a) * (r + sway * t);
          const y = cy + Math.sin(a) * r;
          ctx.beginPath();
          ctx.ellipse(x, y, 5, 3, a + Math.PI / 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${80 + i * 5}, ${180 + i * 3}, ${60}, ${0.4 * growth[1]})`;
          ctx.fill();
        }
      }

      // Leaf if stem is grown enough and leaf is growing
      if (growth[2] > 0.05) {
        const topX = cx + sway;
        const topY = cy - parts[1].len;
        const leafSize = 35 * growth[2];
        // Draw leaf blade
        ctx.save();
        ctx.translate(topX, topY);
        ctx.rotate(0 + Math.sin(time * 2) * 0.1);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(leafSize * 0.5, -leafSize * 0.6, leafSize, 0);
        ctx.quadraticCurveTo(leafSize * 0.5, leafSize * 0.3, 0, 0);
        ctx.fillStyle = `rgba(${60}, ${184}, ${122}, ${0.7 * growth[2]})`;
        ctx.fill();
        // Leaf vein
        ctx.beginPath();
        ctx.moveTo(2, 0);
        ctx.lineTo(leafSize - 5, 0);
        ctx.strokeStyle = `rgba(${100}, ${220}, ${160}, ${0.5 * growth[2]})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Side veins
        for (let v = 2; v <= 4; v++) {
          const vt = v / 5;
          ctx.beginPath();
          ctx.moveTo(vt * leafSize, 0);
          ctx.quadraticCurveTo(vt * leafSize + 8, -leafSize * 0.2, vt * leafSize + 5, -leafSize * 0.35);
          ctx.strokeStyle = `rgba(${100}, ${220}, ${160}, ${0.3 * growth[2]})`;
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(vt * leafSize, 0);
          ctx.quadraticCurveTo(vt * leafSize + 8, leafSize * 0.2, vt * leafSize + 5, leafSize * 0.3);
          ctx.stroke();
        }
        // Leaf glow
        ctx.beginPath();
        ctx.ellipse(leafSize * 0.45, 0, leafSize * 0.5, leafSize * 0.3, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${80}, ${255}, ${140}, ${0.08 * growth[2]})`;
        ctx.fill();
        ctx.restore();
      }

      // Tip glow that pulses
      const tipX = cx + sway;
      const tipY = cy - parts[1].len;
      const pulse = 0.3 + Math.sin(time * 3) * 0.15;
      const grad = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 15);
      grad.addColorStop(0, `rgba(${100 + growth[1]*155}, ${200 + growth[1]*55}, ${80}, ${pulse * growth[1]})`);
      grad.addColorStop(1, 'rgba(100,200,80,0)');
      ctx.beginPath();
      ctx.arc(tipX, tipY, 15, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Center node
    const nodeSize = 8 + growth[1] * 5 + Math.sin(time * 2) * 2;
    const nodeGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nodeSize);
    nodeGrad.addColorStop(0, 'rgba(180,255,180,0.9)');
    nodeGrad.addColorStop(0.5, 'rgba(80,200,100,0.5)');
    nodeGrad.addColorStop(1, 'rgba(40,120,60,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, nodeSize, 0, Math.PI * 2);
    ctx.fillStyle = nodeGrad;
    ctx.fill();
  }

  function drawBloom(time) {
    const cx = W / 2;
    const cy = H / 2 + 80;

    // Bloom aura
    const bloomSize = 200 + Math.sin(time * 2) * 30;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, bloomSize);
    grad.addColorStop(0, 'rgba(200,255,180,0.3)');
    grad.addColorStop(0.3, 'rgba(100,255,150,0.15)');
    grad.addColorStop(0.6, 'rgba(60,200,120,0.05)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, bloomSize, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Orbiting petals
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + time * 0.5;
      const dist = 80 + Math.sin(time * 2 + i) * 20;
      const px = cx + Math.cos(angle) * dist;
      const py = cy + Math.sin(angle) * dist;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle + Math.PI / 2);
      ctx.beginPath();
      ctx.ellipse(0, 0, 20, 8, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${150 + i * 10}, ${220 + i * 3}, ${120}, ${0.4 + Math.sin(time * 3 + i) * 0.2})`;
      ctx.fill();
      ctx.restore();
    }

    // Sparkle particles from bloom
    if (Math.random() < 0.3) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      addParticle(
        cx + Math.cos(angle) * dist,
        cy + Math.sin(angle) * dist,
        `hsl(${80 + Math.random() * 40}, 100%, 80%)`,
        Math.cos(angle) * 0.5,
        Math.sin(angle) * 0.5,
        0.5 + Math.random() * 0.5,
        2
      );
    }
  }

  // === DIAL DRAWING ===
  function drawDial(time) {
    const cx = W / 2;
    const cy = H / 2;
    const radius = 160;

    // Outer ring glow
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 25, 0, Math.PI * 2);
    const outerGrad = ctx.createRadialGradient(cx, cy, radius + 10, cx, cy, radius + 25);
    outerGrad.addColorStop(0, 'rgba(20,30,20,0)');
    outerGrad.addColorStop(1, 'rgba(20,40,20,0.5)');
    ctx.fillStyle = outerGrad;
    ctx.fill();
    ctx.restore();

    // Dial background
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = '#0d1510';
    ctx.fill();
    ctx.strokeStyle = '#2a3a2a';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Signal arcs
    SIGNAL_CENTERS.forEach((sig, i) => {
      const startAngle = sig.angle - SIGNAL_WIDTH / 2;
      const endAngle = sig.angle + SIGNAL_WIDTH / 2;

      // Signal glow
      const pulse = 0.3 + Math.sin(time * 3 + i) * 0.15;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, startAngle, endAngle);
      ctx.strokeStyle = sig.color;
      ctx.globalAlpha = pulse * 0.6;
      ctx.lineWidth = 6;
      ctx.shadowColor = sig.color;
      ctx.shadowBlur = 20;
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
      ctx.restore();

      // Matched arc (thicker)
      if (state.signalsMatched[i]) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.strokeStyle = sig.color;
        ctx.globalAlpha = 0.3 + Math.sin(time * 4 + i) * 0.1;
        ctx.lineWidth = 18;
        ctx.stroke();
        ctx.restore();
      }

      // Center dot for signal
      const dotX = cx + Math.cos(sig.angle) * (radius - 15);
      const dotY = cy + Math.sin(sig.angle) * (radius - 15);
      ctx.beginPath();
      ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
      ctx.fillStyle = state.signalsMatched[i] ? sig.color : `rgba(${hexToRgb(sig.color)}, 0.3)`;
      ctx.fill();
    });

    // Tick marks
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * Math.PI * 2;
      const inner = radius - 12;
      const outer = radius - 18;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
      ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
      ctx.strokeStyle = i % 5 === 0 ? '#3a5a3a' : '#1a2a1a';
      ctx.lineWidth = i % 5 === 0 ? 2 : 1;
      ctx.stroke();
    }

    // Indicator needle
    const needleLen = radius - 25;
    const endX = cx + Math.cos(state.dialAngle) * needleLen;
    const endY = cy + Math.sin(state.dialAngle) * needleLen;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Center cap
    ctx.beginPath();
    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
    ctx.fillStyle = '#1a2a1a';
    ctx.fill();
    ctx.strokeStyle = '#3a5a3a';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `${r},${g},${b}`;
  }

  // === BACKGROUND ===
  function drawBackground(time) {
    // Dark gradient background
    const grad = ctx.createRadialGradient(W/2, H/2 + 100, 50, W/2, H/2 + 100, W * 0.7);
    grad.addColorStop(0, '#0f1a0f');
    grad.addColorStop(0.5, '#0a120a');
    grad.addColorStop(1, '#050a05');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars / particles in background
    if (Math.random() < 0.1) {
      addParticle(
        Math.random() * W,
        Math.random() * H,
        'rgba(120,180,120,0.3)',
        (Math.random() - 0.5) * 0.2,
        (Math.random() - 0.5) * 0.2 - 0.1,
        3 + Math.random() * 5,
        1 + Math.random() * 2
      );
    }

    // Soil/ground area
    ctx.beginPath();
    ctx.moveTo(0, H/2 + 120);
    ctx.quadraticCurveTo(W/2, H/2 + 100, W, H/2 + 120);
    ctx.quadraticCurveTo(W, H/2 + 160, W, H/2 + 180);
    ctx.lineTo(0, H/2 + 180);
    ctx.lineTo(0, H/2 + 120);
    ctx.fillStyle = '#0a0e08';
    ctx.fill();
    ctx.strokeStyle = '#1a2a1a';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Ground particles
    for (let i = 0; i < 20; i++) {
      const gx = (i / 20) * W + (Math.sin(time + i) * 5);
      const gy = H/2 + 140 + Math.sin(i * 0.7) * 20;
      ctx.beginPath();
      ctx.arc(gx, gy, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${80 + i * 3}, ${100 + i * 2}, ${60}, ${0.4})`;
      ctx.fill();
    }
  }

  // === UI / TEXT ===
  function drawUI(time) {
    // Progress indicator
    const indicatorX = W / 2;
    const indicatorY = H - 60;

    // Signal labels on dial
    SIGNAL_CENTERS.forEach((sig, i) => {
      const lx = W / 2 + Math.cos(sig.angle) * (190);
      const ly = H / 2 + Math.sin(sig.angle) * (190);
      ctx.font = '11px Courier New';
      ctx.fillStyle = state.signalsMatched[i] ? sig.color : `rgba(${hexToRgb(sig.color)}, 0.5)`;
      ctx.textAlign = 'center';
      ctx.fillText(sig.label, lx, ly - 5);
      ctx.font = '9px Courier New';
      ctx.fillStyle = `rgba(150,150,150,0.5)`;
      ctx.fillText(sig.desc, lx, ly + 8);
    });

    // Bottom info text
    if (state.phase === 'initial') {
      ctx.font = '14px Courier New';
      ctx.fillStyle = 'rgba(150,200,150,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText('Click anywhere to tune a signal frequency...', W/2, H - 30);
    } else if (state.phase === 'playing') {
      ctx.font = '13px Courier New';
      ctx.fillStyle = 'rgba(150,200,150,0.5)';
      ctx.textAlign = 'center';
      const remaining = state.target - state.progress;
      ctx.fillText(`${remaining} signal${remaining !== 1 ? 's' : ''} remaining...`, W/2, H - 30);
    } else if (state.phase === 'completed') {
      ctx.font = '16px Courier New';
      const alpha = Math.max(0.4, Math.min(1, 0.4 + Math.sin(time * 3) * 0.3));
      ctx.fillStyle = `rgba(180,255,160,${alpha})`;
      ctx.textAlign = 'center';
      ctx.fillText('The garden has bloomed.', W/2, H - 50);
      ctx.font = '12px Courier New';
      ctx.fillStyle = `rgba(150,200,150,0.5)`;
      ctx.fillText('Click RESTART to grow again', W/2, H - 30);
    }
  }

  // === MAIN GAME LOOP ===
  let lastTime = 0;
  let globalTime = 0;
  let emitAngleTarget = 0;

  function gameLoop(timestamp) {
    const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
    lastTime = timestamp;
    globalTime += dt;

    // Update
    state.pulsePhase += dt * 2;
    state.starPhase += dt;

    // Update particles
    state.particles = state.particles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= dt;
      p.vx *= 0.98;
      p.vy *= 0.98;
      return p.life > 0;
    });

    // Emit particles occasionally during playing
    if (state.phase === 'playing') {
      if (Math.random() < 0.05) {
        const angle = Math.random() * Math.PI * 2;
        const r = 30 + Math.random() * 40;
        addParticle(
          W/2 + Math.cos(angle) * r,
          H/2 + Math.sin(angle) * r,
          `rgba(${80 + Math.random()*100}, ${150 + Math.random()*100}, ${80 + Math.random()*50}, 0.5)`,
          Math.cos(angle) * 0.3,
          Math.sin(angle) * 0.3,
          1,
          1.5
        );
      }
    }

    // Bloom animation
    if (state.phase === 'playing') {
      state.bloom = Math.min(1, state.progress / state.target);
    } else if (state.phase === 'completed') {
      state.completedTimer += dt;
      if (state.bloom < 1) state.bloom = Math.min(1, state.bloom + dt * 0.5);
    }

    // Shake decay
    state.shakeX *= 0.9;
    state.shakeY *= 0.9;

    // Plant growth animation
    state.plantPhase += dt;
    for (let i = 0; i < 3; i++) {
      if (state.signalsMatched[i] && state.plantGrowth[i] < 1) {
        state.plantGrowth[i] = Math.min(1, state.plantGrowth[i] + dt * 0.8);
      }
    }

    // Draw
    ctx.save();
    ctx.translate(state.shakeX, state.shakeY);

    drawBackground(globalTime);

    // Draw plant (behind dial)
    drawPlant(state.plantGrowth, state.plantPhase, globalTime);

    // Draw bloom effect
    if (state.bloom > 0.1) {
      drawBloom(globalTime);
    }

    // Draw dial (on top)
    drawDial(globalTime);

    // Draw particles
    state.particles.forEach(p => {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fillStyle = p.color.includes('rgba') ? p.color : `rgba(${hexToRgb(p.color)},${alpha})`;
      ctx.fill();
    });

    // Draw emit indicator
    if (state.phase === 'playing' || state.phase === 'completed') {
      // Show current signal being targeted (nearest to dial)
      const nearestSig = getSignalAtAngle(state.dialAngle);
      if (nearestSig >= 0 && !state.signalsMatched[nearestSig]) {
        const sig = SIGNAL_CENTERS[nearestSig];
        const pulse = 0.5 + Math.sin(globalTime * 5) * 0.3;
        ctx.beginPath();
        ctx.arc(
          W/2 + Math.cos(sig.angle) * 170,
          H/2 + Math.sin(sig.angle) * 170,
          8, 0, Math.PI * 2
        );
        ctx.fillStyle = `rgba(${hexToRgb(sig.color)}, ${pulse})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(
          W/2 + Math.cos(sig.angle) * 170,
          H/2 + Math.sin(sig.angle) * 170,
          14, 0, Math.PI * 2
        );
        ctx.strokeStyle = `rgba(${hexToRgb(sig.color)}, ${pulse * 0.5})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    drawUI(globalTime);
    ctx.restore();

    requestAnimationFrame(gameLoop);
  }

  // === INPUT HANDLING ===
  let isDragging = false;

  canvas.addEventListener('mousedown', (e) => {
    if (state.phase === 'initial') {
      // Start game
      state.phase = 'playing';
      state.progress = 0;
      state.completed = false;
      state.bloom = 0;
      state.plantGrowth = [0, 0, 0];
      state.signalsMatched = [false, false, false];
      state.completedTimer = 0;
      // Reset dial
      // Start audio
      startAudioForReal();
      if (audioCtx) audioCtx.resume();

      // Play an initial ambient tone to satisfy audio requirement
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(65, now);
      osc.frequency.linearRampToValueAtTime(85, now + 0.5);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now);
      osc.stop(now + 1.5);

      info.textContent = 'tune the signals...';
      info.style.opacity = 1;
      titleEl.style.opacity = 0.3;
    }

    isDragging = true;
    updateDialFromPointer(e);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      updateDialFromPointer(e);
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    if (isDragging) {
      isDragging = false;
      checkSignalHit();
    }
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const mouseEvent = new MouseEvent('mousedown', {
      clientX: touch.clientX,
      clientY: touch.clientY
    });
    isDragging = true;
    updateDialFromPointer(mouseEvent);
    canvas.dispatchEvent(mouseEvent);
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    updateDialFromPointer({
      clientX: touch.clientX,
      clientY: touch.clientY
    });
  });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    isDragging = false;
    checkSignalHit();
  });

  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function updateDialFromPointer(e) {
    const coords = getCanvasCoords(e);
    const dx = coords.x - W / 2;
    const dy = coords.y - H / 2;
    state.dialAngle = Math.atan2(dy, dx);
  }

  function checkSignalHit() {
    if (state.phase !== 'playing') return;

    let nearestIdx = -1;
    let nearestDist = Infinity;

    for (let i = 0; i < SIGNAL_CENTERS.length; i++) {
      if (state.signalsMatched[i]) continue;
      let center = SIGNAL_CENTERS[i].angle;
      if (center < 0) center += Math.PI * 2;
      let a = ((state.dialAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let diff = Math.abs(a - center);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      if (diff < SIGNAL_WIDTH / 2 + 0.05 && diff < nearestDist) {
        nearestDist = diff;
        nearestIdx = i;
      }
    }

    if (nearestIdx >= 0) {
      // Hit!
      state.signalsMatched[nearestIdx] = true;
      state.progress++;

      // Visual feedback
      const sig = SIGNAL_CENTERS[nearestIdx];
      emitParticles(
        W/2 + Math.cos(sig.angle) * 160,
        H/2 + Math.sin(sig.angle) * 180,
        30,
        sig.color
      );

      // Shake
      state.shakeX = (Math.random() - 0.5) * 6;
      state.shakeY = (Math.random() - 0.5) * 6;

      // Audio
      playSignalTone(nearestIdx);

      // Update info
      if (state.progress >= state.target) {
        state.phase = 'completed';
        info.textContent = '';
        titleEl.textContent = '✦ BLOOM ✦';
        titleEl.style.opacity = 1;
        titleEl.style.color = '#a0ff8f';
        playBloomSound();
      } else {
        info.textContent = `${state.target - state.progress} signal${state.target - state.progress !== 1 ? 's' : ''} remaining...`;
      }
    }
  }

  // Restart button
  restartBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    state.phase = 'initial';
    state.progress = 0;
    state.completed = false;
    state.bloom = 0;
    state.plantGrowth = [0, 0, 0];
    state.signalsMatched = [false, false, false];
    state.completedTimer = 0;
    state.restartCount++;
    state.particles = [];
    info.textContent = 'click anywhere to tune a signal frequency...';
    info.style.opacity = 0.7;
    titleEl.style.opacity = 0.5;
    titleEl.style.color = '#c8f0c0';
    titleEl.textContent = 'SIGNAL GARDEN';
  });

  // === EVIDENCE API ===
  window.__factoryxEvidence = function() {
    return {
      schema_version: 1,
      phase: state.phase,
      progress: state.progress,
      target: state.target,
      completed: state.completed,
      restart_count: state.restartCount
    };
  };

  // === START ===
  requestAnimationFrame(gameLoop);

})();
</script>
