<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0a0a1a; 
    overflow: hidden; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: none;
  }
  canvas { display: block; }
  #ui-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 10;
  }
  #restart-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.5s, background 0.3s;
    z-index: 20;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #restart-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
    opacity: 1 !important;
  }
  #restart-btn.visible { opacity: 1; }
  #start-hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.7);
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: pulse-text 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 15;
  }
  @keyframes pulse-text {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
  #progress-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 15;
  }
  .pulse-indicator {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
  }
  .pulse-indicator.collected {
    background: #ffe066;
    border-color: #fff;
    transform: scale(1.1);
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-layer"></div>
<div id="progress-bar">
  <div class="pulse-indicator" id="ind-0"></div>
  <div class="pulse-indicator" id="ind-1"></div>
  <div class="pulse-indicator" id="ind-2"></div>
</div>
<div id="start-hint">click to begin</div>
<button id="restart-btn">Restart</button>

<script>
(function() {
  // ─── AUDIO ENGINE ─────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  }

  // Flight thrum - low drone
  let flightOsc = null, flightGain = null;
  function startFlightSound() {
    if (!audioCtx) return;
    flightOsc = audioCtx.createOscillator();
    flightGain = audioCtx.createGain();
    flightOsc.type = 'sine';
    flightOsc.frequency.value = 80;
    flightGain.gain.value = 0;
    flightOsc.connect(flightGain);
    flightGain.connect(masterGain);
    flightOsc.start();
    flightGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.5);
  }

  function stopFlightSound() {
    if (flightGain) {
      flightGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      setTimeout(() => {
        if (flightOsc) { flightOsc.stop(); flightOsc = null; }
        flightGain = null;
      }, 350);
    }
  }

  // Collect chime
  function playCollectChime() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.exponentialRampToValueAtTime(1047, now + 0.15);
    osc.frequency.exponentialRampToValueAtTime(1318, now + 0.3);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.8);
  }

  // Payoff fanfare
  function playPayoffMusic() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = [523, 659, 784, 1047, 784, 1047, 1319];
    const durations = [0.2, 0.2, 0.2, 0.5, 0.2, 0.2, 0.6];
    let t = now;
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.setValueAtTime(0.001, t + durations[i] * 0.9);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(t);
      osc.stop(t + durations[i]);
      t += durations[i];
    });
  }

  // Background ambience - gentle wind
  function startAmbience() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.015;
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.3;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    source.start();
    window._ambienceSource = source;
  }

  // Pulse warning sound
  function playPulseWarning() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.4);
  }

  // ─── CANVAS SETUP ─────────────────────────────────────────
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ─── GAME STATE ───────────────────────────────────────────
  let state = {
    phase: 'initial', // initial, playing, completed
    progress: 0,
    target: 3,
    completed: false,
    restartCount: 0,
    mothX: W / 2,
    mothY: H / 2,
    targetX: W / 2,
    targetY: H / 2,
    mouseX: W / 2,
    mouseY: H / 2,
    flowers: [],
    particles: [],
    stars: [],
    mouseXSmooth: W / 2,
    mouseYSmooth: H / 2,
    startTime: 0,
    elapsed: 0,
    collecting: null,
    collectAnim: 0,
    payoffAnim: 0,
    payoffActive: false,
    screenShake: 0,
    trail: [],
    flowerPulsePhase: 0,
    pressure: 1,
    gameOver: false,
    gameOverTimer: 0,
  };

  const MOTH_RADIUS = 12;
  const FLOWER_RADIUS_MIN = 25;
  const FLOWER_RADIUS_MAX_START = 45;
  const FLOWER_SPEED = 2;
  const MOTH_LERP = 0.08;

  // ─── DRAWING HELPERS ──────────────────────────────────────
  function drawMoth(x, y, time, glow) {
    ctx.save();
    ctx.translate(x, y);
    const angle = Math.atan2(state.mouseYSmooth - y, state.mouseXSmooth - x);
    ctx.rotate(angle);

    // Glow
    if (glow) {
      const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, MOTH_RADIUS * 3);
      grd.addColorStop(0, 'rgba(255, 230, 100, 0.3)');
      grd.addColorStop(1, 'rgba(255, 230, 100, 0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(0, 0, MOTH_RADIUS * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = '#ffe864';
    ctx.beginPath();
    ctx.ellipse(0, 0, MOTH_RADIUS * 0.4, MOTH_RADIUS, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    const wingFlap = Math.sin(time * 12) * 0.3 + 0.7;
    ctx.save();
    ctx.scale(1, wingFlap);
    // Left wing
    ctx.fillStyle = 'rgba(255, 200, 100, 0.85)';
    ctx.beginPath();
    ctx.ellipse(-MOTH_RADIUS * 0.8, -MOTH_RADIUS * 0.3, MOTH_RADIUS * 1.2, MOTH_RADIUS * 0.7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 180, 50, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Right wing
    ctx.beginPath();
    ctx.ellipse(MOTH_RADIUS * 0.8, -MOTH_RADIUS * 0.3, MOTH_RADIUS * 1.2, MOTH_RADIUS * 0.7, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Wing pattern
    ctx.fillStyle = 'rgba(255, 150, 50, 0.5)';
    ctx.beginPath();
    ctx.arc(-MOTH_RADIUS * 0.9, -MOTH_RADIUS * 0.4, 3, 0, Math.PI * 2);
    ctx.arc(MOTH_RADIUS * 0.9, -MOTH_RADIUS * 0.4, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawFlower(flower, time, collected) {
    const { x, y, pulsePhase, collectedAnim } = flower;
    const pulse = Math.sin(pulsePhase) * 0.3 + 0.7;
    const radius = FLOWER_RADIUS_MIN + (FLOWER_RADIUS_MAX_START - FLOWER_RADIUS_MIN) * pulse;

    ctx.save();
    ctx.translate(x, y);

    // Pulsing aura (danger zone)
    const auraGrd = ctx.createRadialGradient(0, 0, radius * 0.5, 0, 0, radius);
    auraGrd.addColorStop(0, `rgba(200, 100, 255, ${0.15 * pulse})`);
    auraGrd.addColorStop(1, 'rgba(200, 100, 255, 0)');
    ctx.fillStyle = auraGrd;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fill();

    // Petals
    const petalCount = 6;
    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2 + time * 0.5;
      const px = Math.cos(angle) * radius * 0.7;
      const py = Math.sin(angle) * radius * 0.7;
      ctx.fillStyle = `hsla(${280 + Math.sin(time + i) * 20}, 80%, ${60 + pulse * 20}%, ${0.8 * pulse})`;
      ctx.beginPath();
      ctx.ellipse(px, py, radius * 0.35, radius * 0.2, angle, 0, Math.PI * 2);
      ctx.fill();
    }

    // Center
    const centerGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.3);
    centerGrd.addColorStop(0, '#ffe066');
    centerGrd.addColorStop(1, '#ff9900');
    ctx.fillStyle = centerGrd;
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Collected animation
    if (collectedAnim !== undefined && collectedAnim > 0) {
      const scale = 1 + collectedAnim * 2;
      const alpha = 1 - collectedAnim;
      ctx.save();
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;
      // Burst ring
      ctx.strokeStyle = `rgba(255, 224, 100, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, radius * (1 + collectedAnim * 3), 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  // ─── INITIALIZATION ───────────────────────────────────────
  function initStars() {
    state.stars = [];
    for (let i = 0; i < 120; i++) {
      state.stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
      });
    }
  }

  function initFlowers() {
    state.flowers = [];
    const margin = 100;
    for (let i = 0; i < 3; i++) {
      state.flowers.push({
        x: margin + Math.random() * (W - margin * 2),
        y: margin + Math.random() * (H - margin * 2),
        pulsePhase: Math.random() * Math.PI * 2,
        collected: false,
        collectedAnim: 0,
        collectedProgress: i, // track order
      });
    }
  }

  function initParticles() {
    state.particles = [];
  }

  function initAmbientParticles() {
    state.particles = [];
    for (let i = 0; i < 40; i++) {
      state.particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 2 + 0.5,
        alpha: Math.random() * 0.3 + 0.05,
      });
    }
  }

  function resetGame() {
    state.phase = 'initial';
    state.progress = 0;
    state.completed = false;
    state.mothX = W / 2;
    state.mothY = H / 2;
    state.mouseX = W / 2;
    state.mouseY = H / 2;
    state.mouseXSmooth = W / 2;
    state.mouseYSmooth = H / 2;
    state.collectAnim = 0;
    state.payoffAnim = 0;
    state.payoffActive = false;
    state.screenShake = 0;
    state.trail = [];
    state.flowerPulsePhase = 0;
    state.pressure = 1;
    state.gameOver = false;
    state.gameOverTimer = 0;
    state.elapsed = 0;
    state.startTime = 0;
    initStars();
    initFlowers();
    initAmbientParticles();
    document.getElementById('ind-0').classList.remove('collected');
    document.getElementById('ind-1').classList.remove('collected');
    document.getElementById('ind-2').classList.remove('collected');
    document.getElementById('restart-btn').classList.remove('visible');
    document.getElementById('start-hint').style.display = window.innerWidth ? 'block' : 'none';
  }

  // ─── BACKGROUND ───────────────────────────────────────────
  function drawBackground(time) {
    // Deep night sky gradient
    const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    grd.addColorStop(0, '#1a1a3a');
    grd.addColorStop(0.5, '#0d0d2a');
    grd.addColorStop(1, '#060615');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Stars
    state.stars.forEach(s => {
      s.twinkle += s.twinkleSpeed;
      const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
      ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // Nebula hint
    ctx.save();
    ctx.globalAlpha = 0.04;
    const nebGrd = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, 200);
    nebGrd.addColorStop(0, '#6644aa');
    nebGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = nebGrd;
    ctx.fillRect(0, 0, W, H);
    const nebGrd2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 0, W * 0.7, H * 0.6, 250);
    nebGrd2.addColorStop(0, '#4433aa');
    nebGrd2.addColorStop(1, 'transparent');
    ctx.fillStyle = nebGrd2;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ─── GAME LOOP ────────────────────────────────────────────
  let lastTime = 0;
  let started = false;

  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
    lastTime = timestamp;

    const time = timestamp / 1000;

    // Update pressure
    if (state.phase === 'playing') {
      state.elapsed += dt;
      state.pressure = 1 + state.elapsed * 0.03;
    }

    // Smooth mouse
    state.mouseXSmooth += (state.mouseX - state.mouseXSmooth) * 0.12;
    state.mouseYSmooth += (state.mouseY - state.mouseYSmooth) * 0.12;

    // Screen shake
    let shakeX = 0, shakeY = 0;
    if (state.screenShake > 0) {
      shakeX = (Math.random() - 0.5) * state.screenShake * 10;
      shakeY = (Math.random() - 0.5) * state.screenShake * 10;
      state.screenShake *= 0.9;
      if (state.screenShake < 0.01) state.screenShake = 0;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBackground(time);

    if (state.phase === 'playing' || state.phase === 'completed') {
      // Ambient particles
      state.particles.forEach(p => {
        p.x += p.vx + (state.mouseX - W/2) * 0.002;
        p.y += p.vy + (state.mouseY - H/2) * 0.002;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
        ctx.fillStyle = `rgba(180, 170, 220, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });

      // Moth trail
      if (state.phase === 'playing') {
        state.trail.push({ x: state.mothX, y: state.mothY, t: time });
        if (state.trail.length > 30) state.trail.shift();
      }

      // Draw trail
      if (state.trail.length > 2) {
        for (let i = 1; i < state.trail.length; i++) {
          const t = i / state.trail.length;
          ctx.strokeStyle = `rgba(255, 230, 100, ${t * 0.3})`;
          ctx.lineWidth = 1 + t * 2;
          ctx.beginPath();
          ctx.moveTo(state.trail[i-1].x, state.trail[i-1].y);
          ctx.lineTo(state.trail[i].x, state.trail[i].y);
          ctx.stroke();
        }
      }

      // Draw flowers
      state.flowers.forEach((flower, i) => {
        if (flower.collected) {
          if (flower.collectedAnim < 1) {
            flower.collectedAnim += dt * 1.5;
          }
          if (flower.collectedAnim >= 1) return;
          drawFlower(flower, time, true);
        } else {
          flower.pulsePhase += dt * (1.5 + state.pressure * 0.5);
          drawFlower(flower, time, false);
        }
      });

      if (state.phase === 'playing') {
        // Move moth
        const dx = state.mouseXSmooth - state.mothX;
        const dy = state.mouseYSmooth - state.mothY;
        state.mothX += dx * MOTH_LERP;
        state.mothY += dy * MOTH_LERP;

        // Keep moth in bounds
        state.mothX = Math.max(MOTH_RADIUS, Math.min(W - MOTH_RADIUS, state.mothX));
        state.mothY = Math.max(MOTH_RADIUS, Math.min(H - MOTH_RADIUS, state.mothY));

        // Update ambient particles wind
        state.particles.forEach(p => {
          p.x += Math.cos(time + p.y * 0.01) * 0.1;
          p.y += Math.sin(time + p.x * 0.01) * 0.1;
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H;
          if (p.y > H) p.y = 0;
        });

        // Check flower collections
        state.flowers.forEach((flower, i) => {
          if (flower.collected) return;
          const ddx = state.mothX - flower.x;
          const ddy = state.mothY - flower.y;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy);
          if (dist < MOTH_RADIUS + FLOWER_RADIUS_MIN + 10) {
            // Collect!
            flower.collected = true;
            state.progress = state.flowers.filter(f => f.collected).length;
            flower.collectedAnim = 0;
            playCollectChime();
            state.screenShake = 0.5;

            // Spawn burst particles
            for (let j = 0; j < 20; j++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = Math.random() * 4 + 1;
              state.particles.push({
                x: flower.x,
                y: flower.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                r: Math.random() * 3 + 1,
                alpha: 1,
                life: 1,
                isBurst: true,
                color: `hsl(${40 + Math.random() * 20}, ${80 + Math.random()*20}%, ${70 + Math.random()*20}%)`,
              });
            }

            document.getElementById(`ind-${i}`).classList.add('collected');

            // Check for all collected
            if (state.progress >= 3) {
              triggerPayoff();
            }
          }
        });

        // Danger pulse warning - if flower radius expands, play warning
        state.flowers.forEach(flower => {
          if (flower.collected) return;
          const pulseVal = Math.sin(flower.pulsePhase);
          if (pulseVal > 0.9 && Math.random() < 0.02 * state.pressure) {
            playPulseWarning();
          }
        });

        // Update burst particles
        state.particles = state.particles.filter(p => {
          if (!p.isBurst) return true;
          p.x += p.vx;
          p.y += p.vy;
          p.life -= dt * 0.8;
          p.alpha = Math.max(0, p.life);
          if (p.life <= 0) return false;
          ctx.fillStyle = p.color || `rgba(255, 224, 100, ${p.alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * p.alpha, 0, Math.PI * 2);
          ctx.fill();
          return true;
        });

        // Draw trail on canvas
      }

      // Draw moth
      drawMoth(state.mothX, state.mothY, time, true);

      // Magnetic field lines effect
      if (state.phase === 'playing') {
        state.flowers.forEach(flower => {
          if (flower.collected) return;
          ctx.save();
          ctx.globalAlpha = 0.06;
          ctx.strokeStyle = '#c864ff';
          ctx.lineWidth = 1;
          for (let r = 30; r < 200; r += 15) {
            ctx.beginPath();
            const pulseOffset = Math.sin(flower.pulsePhase) * 10;
            ctx.arc(flower.x, flower.y, r + pulseOffset, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        });
      }

      // Payoff animation
      if (state.payoffActive) {
        state.payoffAnim += dt * 0.8;
        const a = state.payoffAnim;
        // Expand and brighten
        const glow = Math.min(1, a * 2);
        ctx.save();
        ctx.globalAlpha = glow * 0.3;
        const glowGrd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.5);
        glowGrd.addColorStop(0, '#ffe066');
        glowGrd.addColorStop(0.5, '#ff9900');
        glowGrd.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrd;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();

        // Payoff particles
        for (let i = 0; i < 5; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 3;
          state.particles.push({
            x: W/2, y: H/2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: Math.random() * 4 + 1,
            alpha: 1,
            life: 1,
            isBurst: true,
            color: `hsl(${Math.random()*60 + 30}, 90%, 75%)`,
          });
        }

        // Text
        if (a > 0.5) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, (a - 0.5) * 3);
          ctx.fillStyle = '#ffe066';
          ctx.font = 'bold 36px "Segoe UI", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = '#ff9900';
          ctx.shadowBlur = 20;
          ctx.fillText('✦ Pulses Gathered ✦', W/2, H/2 - 40);
          ctx.font = '18px "Segoe UI", sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.shadowBlur = 0;
          ctx.fillText('The magnetic field harmonizes', W/2, H/2);
          ctx.restore();
        }

        // End game
        if (a >= 3) {
          state.phase = 'completed';
          state.completed = true;
          state.payoffActive = false;
          stopFlightSound();
          document.getElementById('restart-btn').classList.add('visible');
        }
      }

      // Update non-burst particles
      state.particles.forEach(p => {
        if (!p.isBurst) return;
        // handled above
      });
    }

    ctx.restore();

    requestAnimationFrame(gameLoop);
  }

  function triggerPayoff() {
    state.payoffActive = true;
    state.payoffAnim = 0;
    stopFlightSound();
    playPayoffMusic();
    state.screenShake = 2;

    // Massive burst
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2;
      state.particles.push({
        x: W/2 + (Math.random()-0.5)*100,
        y: H/2 + (Math.random()-0.5)*100,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: Math.random() * 4 + 1,
        alpha: 1,
        life: 1,
        isBurst: true,
        color: `hsl(${Math.random()*60 + 30}, ${80+Math.random()*20}%, ${60+Math.random()*30}%)`,
      });
    }
  }

  // ─── INPUT HANDLING ───────────────────────────────────────
  canvas.addEventListener('mousemove', (e) => {
    state.mouseX = e.clientX;
    state.mouseY = e.clientY;
  });

  canvas.addEventListener('click', (e) => {
    if (state.phase === 'initial') {
      // Start game
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      state.phase = 'playing';
      state.startTime = performance.now() / 1000;
      state.elapsed = 0;
      started = true;
      startFlightSound();
      startAmbience();
      document.getElementById('start-hint').style.display = 'none';
      state.mothX = e.clientX;
      state.mothY = e.clientY;
    }
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    state.restartCount++;
    if (window._ambienceSource) {
      try { window._ambienceSource.stop(); } catch(e) {}
      window._ambienceSource = null;
    }
    stopFlightSound();
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startFlightSound();
    startAmbience();
    resetGame();
  });

  // ─── FACTORY EVIDENCE ─────────────────────────────────────
  window.__factoryxEvidence = function() {
    return {
      schema_version: 1,
      phase: state.phase,
      progress: state.progress,
      target: state.target,
      completed: state.completed,
      restart_count: state.restartCount,
    };
  };

  // ─── INIT ─────────────────────────────────────────────────
  initStars();
  initFlowers();
  initAmbientParticles();
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
