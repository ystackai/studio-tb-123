<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: none;
    user-select: none;
  }
  canvas { display: block; }
  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  #start-prompt {
    color: #c8e6ff;
    font-size: 1.2em;
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
    text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
  }
  #score-panel {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #a0d4ff;
    font-size: 14px;
    z-index: 5;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s;
    text-shadow: 0 0 10px rgba(100, 200, 255, 0.4);
  }
  #score-panel.visible { opacity: 1; }
  #restart-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    background: rgba(30, 60, 90, 0.85);
    color: #a0d4ff;
    border: 1px solid rgba(100, 200, 255, 0.3);
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s, background 0.3s;
    z-index: 10;
    pointer-events: none;
  }
  #restart-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  #restart-btn:hover {
    background: rgba(40, 80, 120, 0.95);
  }
  #end-message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 1.5em;
    text-align: center;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.8s;
    pointer-events: none;
  }
  #end-message.visible { opacity: 1; }
  #end-message .subtitle {
    font-size: 0.6em;
    color: #a0d4ff;
    margin-top: 10px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="ui-overlay">
  <div id="start-prompt">Click anywhere to begin • Guide the moth through the magnetic flowers</div>
</div>
<div id="score-panel">
  <span>Pulses: <span id="pulse-count">0</span> / 3</span>
</div>
<div id="end-message">
  <div id="end-title"></div>
  <div class="subtitle" id="end-subtitle"></div>
</div>
<button id="restart-btn">Collect Again</button>

<script>
(function() {
  "use strict";

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const startPrompt = document.getElementById('start-prompt');
  const scorePanel = document.getElementById('score-panel');
  const pulseCount = document.getElementById('pulse-count');
  const restartBtn = document.getElementById('restart-btn');
  const endMessage = document.getElementById('end-message');
  const endTitle = document.getElementById('end-title');
  const endSubtitle = document.getElementById('end-subtitle');

  const BASE_SHAS = [
    "d46be63fbffea815da0fed1e6eb4d8c39dba359e",
    "bc17f27f13e153e05eb9b34ee7f8c7b5a2de6b82"
  ];

  let W, H;
  let gameRunning = false;
  let gameOver = false;
  let gameStarted = false;
  let audioCtx = null;
  let masterGain = null;
  let startedAudio = false;

  // Moth
  let moth = { x: 0, y: 0, vx: 0, vy: 0, targetX: 400, targetY: 300, collected: 0, glowPhase: 0, wingPhase: 0 };

  // Flowers
  let flowers = [];
  let time = 0;
  let particles = [];

  // Camera
  let camX = 0, camY = 0;
  const WORLD_W = 2400;
  const WORLD_H = 1800;

  // Stars (background)
  let stars = [];

  // Background nebula color
  const NEBULA_COLORS = ['#0a0a2a', '#0f0520', '#150a2a'];

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function initStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: randomBetween(0, WORLD_W),
        y: randomBetween(0, WORLD_H),
        size: randomBetween(0.5, 2),
        twinkle: randomBetween(0, Math.PI * 2),
        speed: randomBetween(0.3, 1.5)
      });
    }
  }

  function createFlowers() {
    flowers = [];
    const patterns = [
      // Concentric rings
      { positions: [[1200, 1000]] },
      // Diagonal corridor
      { positions: [[800, 400], [1400, 900], [1600, 1300]] },
      // Zigzag pattern
      { positions: [[600, 300], [1000, 500], [1300, 700], [1100, 1000], [1400, 1300]] },
      // Spiral-like
      { positions: [[1000, 1000], [1200, 800], [1400, 850], [1350, 1100], [1500, 1250]] },
    ];

    const patternIdx = Math.floor(Math.random() * patterns.length);
    const positions = patterns[patternIdx].positions;

    for (let i = 0; i < positions.length; i++) {
      const [fx, fy] = positions[i];
      const pulseSpeed = randomBetween(1.5, 3);
      const pulseRadius = randomBetween(25, 40);
      flower: flower = {
        x: fx, y: fy,
        pulseSpeed,
        pulseRadius,
        baseRadius: randomBetween(18, 28),
        hue: randomBetween(280, 340), // purples, magentas
        collected: false,
        collectAnim: 0,
        petals: Math.floor(randomBetween(5, 9)),
        // Petal arrangement varies per flower
        petalCount: Math.floor(randomBetween(5, 9)),
        // Magnetic attraction strength
        magnetStrength: 2 + i * 0.5,
        rotationOffset: randomBetween(0, Math.PI * 2),
        // Color layers
        outerHue: (flower.hue + 20) % 360,
        innerHue: (flower.hue - 15 + 360) % 360,
      };
    }
  }

  function createFlower(x, y, pulseSpeed, pulseRadius, baseRadius, hue) {
    return {
      x, y,
      pulseSpeed, pulseRadius,
      baseRadius,
      hue,
      collected: false,
      collectAnim: 0,
      petalCount: Math.floor(randomBetween(5, 9)),
      magnetStrength: 2,
      rotationOffset: randomBetween(0, Math.PI * 2),
      outerHue: (hue + 20) % 360,
      innerHue: (hue - 15 + 360) % 360,
    };
  }

  function initFlowers() {
    flowers = [];
    const patterns = [
      // Concentric rings
      function() {
        const base = [400, 300];
        for (let r = 0; r < 3; r++) {
          const count = 3 + r * 2;
          const radius = 120 + r * 80;
          for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            flowers.push(createFlower(
              base[0] + Math.cos(angle) * radius,
              base[1] + Math.sin(angle) * radius,
              randomBetween(1.5, 2.5),
              randomBetween(25, 35),
              randomBetween(18, 28),
              randomBetween(280, 330)
            ));
          }
        }
      },
      // Diagonal corridor
      function() {
        for (let i = 0; i < 5; i++) {
          const progress = i / 4;
          flowers.push(createFlower(
            300 + progress * 600,
            200 + progress * 400,
            randomBetween(1.8, 2.8),
            randomBetween(25, 35),
            randomBetween(18, 28),
            randomBetween(285, 325)
          ));
        }
      },
      // Wandering path
      function() {
        const points = [[350, 250], [600, 350], [500, 500], [750, 550], [700, 700], [900, 650]];
        points.forEach(([x, y]) => {
          flowers.push(createFlower(x, y, randomBetween(1.5, 3), randomBetween(25, 35), randomBetween(18, 28), randomBetween(280, 340)));
        });
      },
      // Spiral-ish pattern
      function() {
        const cx = 500, cy = 400;
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const dist = 80 + i * 50;
          flowers.push(createFlower(
            cx + Math.cos(angle) * dist,
            cy + Math.sin(angle) * dist,
            randomBetween(1.5, 2.5),
            randomBetween(25, 35),
            randomBetween(18, 28),
            randomBetween(280, 340)
          ));
        }
      },
    ];

    const idx = Math.floor(Math.random() * patterns.length);
    patterns[idx]();

    // Vary difficulty: collect requirement scales with flower count
    if (flowers.length > 5) {
      flowers.forEach((f, i) => {
        f.magnetStrength = 1.5 + i * 0.4;
      });
    }
  }

  function spawnParticles(x, y, count, color, speed, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = speed * randomBetween(0.5, 1.5);
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        color,
        life: life || randomBetween(0.5, 1.5),
        maxLife: life || randomBetween(0.5, 1.5),
        size: randomBetween(2, 5)
      });
    }
  }

  // Audio system
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }

  function playHumi(freq, duration, gain) {
    try {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.1);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
      osc.connect(g);
      g.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
  }

  function playChime(freqStart, freqEnd, duration, gain) {
    try {
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc2.type = 'sine';
      osc.frequency.value = freqStart;
      osc2.frequency.value = freqStart * 1.5;
      osc.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
      osc2.frequency.linearRampToValueAtTime(freqEnd * 1.5, audioCtx.currentTime + duration);
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.05);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
      osc.connect(g);
      osc2.connect(g);
      g.connect(masterGain);
      osc.start();
      osc2.start();
      osc.stop(audioCtx.currentTime + duration);
      osc2.stop(audioCtx.currentTime + duration);
    } catch(e) {}
  }

  function playCollectSound() {
    playChime(600, 900, 0.4, 0.15);
  }

  function playPayoffSound() {
    [523, 659, 784, 1047, 1319].forEach((freq, i) => {
      setTimeout(() => {
        playChime(freq, freq * 1.2, 0.6, 0.12);
      }, i * 120);
    });
  }

  function playGameOverSound() {
    playChime(400, 200, 0.8, 0.1);
  }

  function playAmbientHum() {
    if (!startedAudio) return;
    playHumi(80 + Math.sin(time * 0.5) * 20, 0.3, 0.02);
  }

  // Draw functions
  function drawBackground() {
    // Gradient background
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#1a0a30');
    grad.addColorStop(0.5, '#0d0520');
    grad.addColorStop(1, '#050210');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars() {
    stars.forEach(star => {
      const sx = star.x - camX;
      const sy = star.y - camY;
      if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;

      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(star.twinkle + time * star.speed));
      ctx.fillStyle = `rgba(200, 220, 255, ${twinkle * 0.6})`;
      ctx.beginPath();
      ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawFlower(flower) {
    const fx = flower.x - camX;
    const fy = flower.y - camY;

    if (fx < -100 || fx > W + 100 || fy < -100 || fy > H + 100) return;

    // Collect animation - shrinking and spinning
    if (flower.collected) {
      flower.collectAnim += 0.05;
      const scale = 1 - flower.collectAnim;
      if (scale <= 0) return;
      ctx.save();
      ctx.translate(fx, fy);
      ctx.scale(scale, scale);
      ctx.globalAlpha = scale;
      drawOneFlower(0, 0, flower, 1);
      ctx.restore();
      return;
    }

    // Pulsing glow
    const pulse = Math.sin(time * flower.pulseSpeed) * 0.5 + 0.5;
    const glowRadius = flower.pulseRadius + pulse * 15;

    // Outer glow
    const glowGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, glowRadius * 2);
    glowGrad.addColorStop(0, `hsla(${flower.hue}, 80%, 60%, ${0.15 + pulse * 0.1})`);
    glowGrad.addColorStop(0.5, `hsla(${flower.hue}, 70%, 40%, ${0.05 + pulse * 0.03})`);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(fx, fy, glowRadius * 2, 0, Math.PI * 2);
    ctx.fill();

    // Draw petals
    drawOneFlower(fx, fy, flower, 1 + pulse * 0.1);

    // Magnetic field lines (subtle)
    const fieldOpacity = 0.05 + pulse * 0.05;
    ctx.strokeStyle = `hsla(${flower.hue}, 60%, 50%, ${fieldOpacity})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const r = 30 + i * 20 + pulse * 10;
      ctx.beginPath();
      ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawOneFlower(x, y, flower, scale) {
    const baseR = flower.baseRadius * scale;
    const petalCount = flower.petalCount;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(flower.rotationOffset + time * 0.1);

    // Outer petals
    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2;
      const petalLen = baseR * 1.8;
      const petalWidth = baseR * 0.6;

      ctx.save();
      ctx.rotate(angle);
      ctx.translate(petalLen * 0.4, 0);

      // Petal gradient
      const petalGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, petalLen);
      petalGrad.addColorStop(0, `hsla(${flower.innerHue}, 85%, 70%, 0.9)`);
      petalGrad.addColorStop(0.5, `hsla(${flower.hue}, 75%, 55%, 0.7)`);
      petalGrad.addColorStop(1, `hsla(${flower.outerHue}, 65%, 45%, 0)`);

      ctx.fillStyle = petalGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, petalLen, petalWidth, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Center
    const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 0.5);
    centerGrad.addColorStop(0, '#ffffff');
    centerGrad.addColorStop(0.5, `hsla(${flower.hue}, 80%, 75%, 0.9)`);
    centerGrad.addColorStop(1, `hsla(${flower.hue}, 60%, 50%, 0)`);

    ctx.fillStyle = centerGrad;
    ctx.beginPath();
    ctx.arc(0, 0, baseR * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawMoth() {
    const mx = moth.x - camX;
    const my = moth.y - camY;

    ctx.save();
    ctx.translate(mx, my);

    // Wing animation
    const wingAngle = Math.sin(moth.wingPhase) * 0.4;
    const bodyAngle = Math.atan2(moth.vy, moth.vx) + Math.PI / 2;

    // Glow aura
    const glowSize = 25 + moth.glowPhase * 5;
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
    glowGrad.addColorStop(0, 'rgba(255, 255, 150, 0.3)');
    glowGrad.addColorStop(0.5, 'rgba(200, 180, 255, 0.1)');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.save();
    ctx.rotate(bodyAngle);

    // Body glow
    const bodyGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 12);
    bodyGlow.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
    bodyGlow.addColorStop(0.5, 'rgba(200, 180, 255, 0.3)');
    bodyGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = bodyGlow;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#aabbdd';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Left wing
    ctx.save();
    ctx.rotate(wingAngle);
    ctx.fillStyle = 'rgba(180, 160, 255, 0.7)';
    ctx.beginPath();
    ctx.moveTo(-2, -2);
    ctx.quadraticCurveTo(-20, -15, -15, -3);
    ctx.quadraticCurveTo(-10, -2, -2, 0);
    ctx.fillStyle = 'rgba(180, 160, 255, 0.6)';
    ctx.fill();

    // Wing pattern
    ctx.fillStyle = 'rgba(255, 220, 150, 0.5)';
    ctx.beginPath();
    ctx.arc(-12, -5, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(100, 150, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(-16, -2, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Right wing
    ctx.save();
    ctx.rotate(-wingAngle);
    ctx.fillStyle = 'rgba(180, 160, 255, 0.6)';
    ctx.beginPath();
    ctx.moveTo(-2, 2);
    ctx.quadraticCurveTo(-20, 15, -15, 3);
    ctx.quadraticCurveTo(-10, 2, -2, 0);
    ctx.fill();

    // Wing pattern
    ctx.fillStyle = 'rgba(255, 220, 150, 0.5)';
    ctx.beginPath();
    ctx.arc(-12, 5, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(100, 150, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(-16, 2, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Antennae
    ctx.strokeStyle = 'rgba(200, 200, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(5, -1);
    ctx.quadraticCurveTo(15 + Math.sin(time * 3) * 2, -8, 18, -10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(5, 1);
    ctx.quadraticCurveTo(15 + Math.cos(time * 3) * 2, 8, 18, 10);
    ctx.stroke();

    ctx.restore(); // body rotation
    ctx.restore(); // moth position
  }

  function drawParticles() {
    particles.forEach(p => {
      const px = p.x - camX;
      const py = p.y - camY;
      if (px < -10 || px > W + 10 || py < -10 || py > H + 10) return;

      const lifeRatio = p.life / p.maxLife;
      const alpha = lifeRatio;
      const size = p.size * lifeRatio;

      ctx.fillStyle = p.color.replace('ALPHA', alpha);
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.life -= dt;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  }

  function updateMoth(dt) {
    // Magnetic attraction to nearest flower
    let closestDist = Infinity;
    let closestFlower = null;

    flowers.forEach(f => {
      if (f.collected) return;
      const dx = f.x - moth.x;
      const dy = f.y - moth.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < closestDist) {
        closestDist = dist;
        closestFlower = f;
      }
    });

    if (closestFlower) {
      const dx = closestFlower.x - moth.x;
      const dy = closestFlower.y - moth.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const strength = closestFlower.magnetStrength / (1 + dist * 0.005);

      moth.vx += (dx / dist) * strength * dt * 60;
      moth.vy += (dy / dist) * strength * dt * 60;
    }

    // Mouse influence - gentle pull
    if (gameRunning) {
      const dx = moth.targetX - moth.x;
      const dy = moth.targetY - moth.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 50) {
        moth.vx += (dx / dist) * 0.3 * dt * 60;
        moth.vy += (dy / dist) * 0.3 * dt * 60;
      } else if (dist < 30) {
        // Repel if too close to mouse
        moth.vx -= (dx / dist) * 0.2 * dt * 60;
        moth.vy -= (dy / dist) * 0.2 * dt * 60;
      }
    }

    // Damping
    moth.vx *= 0.95;
    moth.vy *= 0.95;

    // Speed limit
    const speed = Math.sqrt(moth.vx * moth.vx + moth.vy * moth.vy);
    const maxSpeed = 5;
    if (speed > maxSpeed) {
      moth.vx = (moth.vx / speed) * maxSpeed;
      moth.vy = (moth.vy / speed) * maxSpeed;
    }

    moth.x += moth.vx;
    moth.y += moth.vy;

    // Boundary clamping
    moth.x = Math.max(30, Math.min(WORLD_W - 30, moth.x));
    moth.y = Math.max(30, Math.min(WORLD_H - 30, moth.y));

    // Animation phases
    moth.wingPhase += 0.3 + Math.abs(moth.vx) * 0.05;
    moth.glowPhase = Math.sin(time * 2) * 0.5 + 0.5;

    // Check flower collection
    flowers.forEach(f => {
      if (f.collected) return;
      const dx = f.x - moth.x;
      const dy = f.y - moth.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < f.baseRadius + 15) {
        f.collected = true;
        moth.collected++;
        pulseCount.textContent = moth.collected;

        // Particles
        spawnParticles(f.x, f.y, 20, 'hsla(300, 70%, 70%, ALPHA)', 3, 1);
        spawnParticles(f.x, f.y, 10, 'hsla(200, 80%, 80%, ALPHA)', 2, 1.2);

        playCollectSound();

        // Check for win condition
        if (moth.collected >= 3) {
          triggerPayoff();
        } else if (moth.collected >= 5 && moth.collected < 8) {
          // Escalation: more flowers appear, pressure increases
          spawnParticles(WORLD_W / 2, WORLD_H / 2, 30, 'hsla(320, 80%, 60%, ALPHA)', 4, 1.5);
        } else if (moth.collected >= 8) {
          // More frequent flower spawning
        }
      }
    });
  }

  function triggerPayoff() {
    if (gameOver) return;
    gameOver = true;
    gameRunning = false;

    // Big particle burst
    const cx = moth.x;
    const cy = moth.y;
    for (let i = 0; i < 50; i++) {
      const angle = (i / 50) * Math.PI * 2;
      const speed = randomBetween(2, 6);
      const colors = [
        'hsla(300, 80%, 70%, ALPHA)',
        'hsla(40, 90%, 75%, ALPHA)',
        'hsla(180, 80%, 70%, ALPHA)',
        'hsla(260, 90%, 75%, ALPHA)',
        'hsla(60, 95%, 80%, ALPHA)'
      ];
      spawnParticles(cx, cy, 3, colors[Math.floor(Math.random() * colors.length)], speed, 2.5);
    }

    playPayoffSound();

    setTimeout(() => {
      endTitle.textContent = '✨ Pollen Collected! ✨';
      endSubtitle.textContent = `The moth gathered ${moth.collected} magnetic pulses and glowed brightly.`;
      endMessage.classList.add('visible');
      restartBtn.classList.add('visible');
      scorePanel.classList.remove('visible');
    }, 500);
  }

  let ambientTimer = 0;
  function updateAmbient(dt) {
    ambientTimer += dt;
    if (ambientTimer > 2 && startedAudio) {
      ambientTimer = 0;
      playAmbientHum();
    }
  }

  function updateCamera() {
    const targetX = moth.x - W / 2;
    const targetY = moth.y - H / 2;
    camX += (targetX - camX) * 0.05;
    camY += (targetY - camY) * 0.05;
  }

  // Main game loop
  let lastTime = 0;
  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (gameRunning) {
      time += dt;
      updateMoth(dt);
      updateParticles(dt);
      updateCamera();
    }

    // Draw
    drawBackground();
    drawStars();

    // Draw subtle grid/magnetic field
    ctx.strokeStyle = 'rgba(100, 150, 200, 0.03)';
    ctx.lineWidth = 1;
    const gridSize = 100;
    const startGX = -(camX % gridSize);
    const startGY = -(camY % gridSize);
    for (let x = startGX; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = startGY; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    flowers.forEach(drawFlower);
    if (gameRunning || gameOver) drawMoth();
    drawParticles();
    updateAmbient(dt);

    requestAnimationFrame(gameLoop);
  }

  // Event handlers
  canvas.addEventListener('mousemove', (e) => {
    if (!gameRunning) return;
    moth.targetX = e.clientX;
    moth.targetY = e.clientY;
  });

  canvas.addEventListener('click', (e) => {
    initAudio();
    startedAudio = true;

    if (!gameStarted) {
      gameStarted = true;
      gameRunning = true;
      startPrompt.style.display = 'none';
      scorePanel.classList.add('visible');
      return;
    }

    if (gameOver) {
      resetGame();
    }
  });

  restartBtn.addEventListener('click', () => {
    resetGame();
  });

  window.addEventListener('resize', resize);

  function resetGame() {
    moth = { x: 200, y: 200, vx: 0, vy: 0, targetX: W / 2, targetY: H / 2, collected: 0, glowPhase: 0, wingPhase: 0 };
    camX = moth.x - W / 2;
    camY = moth.y - H / 2;
    gameOver = false;
    gameRunning = true;
    time = 0;
    ambientTimer = 0;
    particles = [];
    pulseCount.textContent = '0';
    endMessage.classList.remove('visible');
    restartBtn.classList.remove('visible');
    scorePanel.classList.add('visible');
    initFlowers();
  }

  // Initialize
  resize();
  moth.x = 200;
  moth.y = 200;
  camX = moth.x - W / 2;
  camY = moth.y - H / 2;
  initStars();
  initFlowers();
  requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
