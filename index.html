<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; cursor: none; }
  #ui-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #start-prompt {
    color: #c8e6ff; font-size: 1.8em; text-shadow: 0 0 20px #4a9eff;
    font-weight: 300; letter-spacing: 0.05em;
    animation: pulse-text 2s ease-in-out infinite;
    pointer-events: auto; cursor: pointer;
  }
  @keyframes pulse-text {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  #hud {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: #a0d0ff; font-size: 14px; letter-spacing: 0.1em;
    text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
    display: none;
  }
  #restart-btn {
    pointer-events: auto; cursor: pointer;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(200,230,255,0.3);
    color: #c8e6ff; padding: 10px 28px; border-radius: 25px;
    font-size: 1em; letter-spacing: 0.08em; transition: all 0.3s;
    display: none;
  }
  #restart-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(200,230,255,0.6); }
  #payoff-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: auto;
  }
  #payoff-screen h1 {
    color: #ffd97a; font-size: 2.4em; font-weight: 300;
    text-shadow: 0 0 30px #ffd97a, 0 0 60px #ff9933;
    margin-bottom: 10px; letter-spacing: 0.04em;
  }
  #payoff-screen p {
    color: #c8e6ff; font-size: 1.1em; margin-bottom: 30px;
    text-shadow: 0 0 10px rgba(74,158,255,0.4);
  }
  #debrief {
    color: #a0d0ff; font-size: 0.9em; margin-top: 8px; opacity: 0.7;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-layer">
  <div id="start-prompt">Click anywhere to awaken the moth</div>
  <div id="hud">Pulses: <span id="pulse-count">0</span> / 3</div>
  <div id="payoff-screen">
    <h1 id="payoff-title">Aurora Bloom</h1>
    <p id="payoff-subtitle">Your guidance has awakened the garden.</p>
    <div id="debrief"></div>
    <br>
    <button id="restart-btn">✦ Begin Anew ✦</button>
  </div>
</div>
<script>
(function(){
"use strict";

// === Evidence API ===
const evidence = {
  _state: { schema_version: 1, phase: 'initial', progress: 0, target: 3, completed: false, restart_count: 0 },
  get() { return { ...this._state }; },
  set(p) { Object.assign(this._state, p); }
};
window.__factoryxEvidence = () => evidence.get();

// === Canvas Setup ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === Audio Engine ===
let audioCtx = null;
let masterGain = null;
let ambientNodes = [];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, duration, type, vol, detune) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playCollectSound(index) {
  const baseFreqs = [523.25, 659.25, 783.99]; // C5, E5, G5
  playTone(baseFreqs[index] || 783.99, 0.6, 'sine', 0.2);
  playTone((baseFreqs[index] || 783.99) * 2, 0.4, 'sine', 0.08, 5);
  // Shimmer
  playTone((baseFreqs[index] || 783.99) * 3.15, 0.3, 'triangle', 0.05, 12);
}

function playPayoffSound() {
  const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
  notes.forEach((f, i) => {
    setTimeout(() => {
      playTone(f, 1.2, 'sine', 0.15);
      playTone(f * 1.003, 1.0, 'sine', 0.06, 8);
      playTone(f * 2, 0.8, 'triangle', 0.04);
    }, i * 120);
  });
  // Deep drone
  setTimeout(() => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 82.41;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(); osc.stop(audioCtx.currentTime + 3);
  }, 600);
}

function playAmbientDrone() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 80;
  gain.gain.value = 0.04;
  osc.connect(gain); gain.connect(masterGain);
  osc.start();
  ambientNodes.push({ osc, gain });

  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = 120;
  gain2.gain.value = 0.025;
  osc2.connect(gain2); gain2.connect(masterGain);
  osc2.start();
  ambientNodes.push({ osc: osc2, gain: gain2 });
}

function playMoveWhoosh() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

let moveWhooshTimer = 0;

// === Flowers (Magnetic Pulses) ===
function createFlowers(count) {
  const flowers = [];
  for (let i = 0; i < count; i++) {
    const margin = 80;
    flowers.push({
      x: margin + Math.random() * (W - 2 * margin),
      y: margin + 40 + Math.random() * (H - 2 * margin - 40),
      radius: 18 + Math.random() * 12,
      collected: false,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 1.5 + Math.random() * 1.5,
      hue: 200 + Math.random() * 60, // blue-purple range
      petalCount: 5 + Math.floor(Math.random() * 3),
      magnetRadius: 120 + Math.random() * 60,
      glowIntensity: 0
    });
  }
  return flowers;
}

// === Particle Effects ===
let particles = [];

function spawnParticles(x, y, count, color, spread, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = spread * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: life || 1.0,
      maxLife: life || 1.0,
      color,
      size: 1 + Math.random() * 3
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= dt * 1.2;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = (p.life / p.maxLife) * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// === Moth ===
let moth = {
  x: W / 2, y: H / 2,
  targetX: W / 2, targetY: H / 2,
  angle: 0, wingPhase: 0,
  trail: []
};

// === Background stars ===
let stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    size: 0.5 + Math.random() * 1.5,
    twinklePhase: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.5 + Math.random() * 2
  });
}

// === Background aurora gradient ===
function drawBackground(time) {
  const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#0d1130');
  grad.addColorStop(0.5, '#0a0e25');
  grad.addColorStop(1, '#050510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle aurora
  ctx.globalAlpha = 0.06;
  const auroraGrad = ctx.createLinearGradient(0, 0, W, H * 0.6);
  auroraGrad.addColorStop(0, '#1a3a6a');
  auroraGrad.addColorStop(0.5, '#2a1a4a');
  auroraGrad.addColorStop(1, '#1a3a6a');
  ctx.fillStyle = auroraGrad;
  ctx.fillRect(0, 0, W, H * 0.6);
  ctx.globalAlpha = 1;

  // Stars
  for (const s of stars) {
    const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(s.twinklePhase + time * s.twinkleSpeed));
    ctx.globalAlpha = twinkle * 0.7;
    ctx.fillStyle = '#d0d8ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === Draw Flower ===
function drawFlower(f, time, collected) {
  const { x, y, radius, pulsePhase, pulseSpeed, hue, petalCount, glowIntensity } = f;
  const pulse = collected ? Math.sin(time * 3) * 0.3 + 0.7 : Math.sin(time * pulseSpeed + pulsePhase) * 0.3 + 0.7;
  const r = radius * pulse;

  if (collected) {
    // Collected: fading glow
    ctx.globalAlpha = 0.4;
  }

  ctx.save();
  ctx.translate(x, y);

  // Outer glow
  const glowSize = r * 3 * (collected ? 0.3 + pulse * 0.3 : 1);
  const glow = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, glowSize);
  glow.addColorStop(0, `hsla(${hue}, 80%, 70%, ${collected ? 0.15 : 0.4})`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
  ctx.fill();

  // Petals
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2 + time * 0.3 * pulse;
    const petalR = r * (0.6 + pulse * 0.4);
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = `hsla(${hue + i * 8}, 70%, ${collected ? 50 : 60}%, ${collected ? 0.3 : 0.6})`;
    ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.5)`;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.ellipse(0, -petalR * 0.5, petalR * 0.25, petalR * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Center
  ctx.shadowColor = `hsla(${hue}, 90%, 80%, 0.8)`;
  ctx.shadowBlur = 15;
  const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
  centerGrad.addColorStop(0, `hsla(${hue + 30}, 90%, 85%, ${collected ? 0.5 : 0.9})`);
  centerGrad.addColorStop(1, `hsla(${hue}, 60%, 50%, ${collected ? 0.1 : 0.4})`);
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// === Draw Moth ===
function drawMoth(time) {
  const { x, y, angle, wingPhase } = moth;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Glow aura
  const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 50);
  auraGrad.addColorStop(0, 'rgba(180, 220, 255, 0.25)');
  auraGrad.addColorStop(0.5, 'rgba(120, 180, 255, 0.08)');
  auraGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 50, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  const wingFlap = Math.sin(wingPhase) * 0.4 + 0.6;
  ctx.fillStyle = 'rgba(200, 230, 255, 0.7)';
  ctx.shadowColor = 'rgba(150, 200, 255, 0.6)';
  ctx.shadowBlur = 15;

  // Left wing
  ctx.save();
  ctx.scale(-1, 1);
  ctx.rotate(wingFlap * 0.5);
  ctx.beginPath();
  ctx.moveTo(0, -5);
  ctx.bezierCurveTo(15, -25, 40, -18, 30, 0);
  ctx.bezierCurveTo(40, 18, 15, 25, 0, 5);
  ctx.fill();
  ctx.restore();

  // Right wing
  ctx.save();
  ctx.rotate(-wingFlap * 0.5);
  ctx.beginPath();
  ctx.moveTo(0, -5);
  ctx.bezierCurveTo(15, -25, 40, -18, 30, 0);
  ctx.bezierCurveTo(40, 18, 15, 25, 0, 5);
  ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = '#e0eeff';
  ctx.shadowColor = '#a0d0ff';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye glow
  ctx.fillStyle = '#ffffff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(0, -8, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
  ctx.shadowBlur = 0;
}

// === Draw Trail ===
function drawTrail() {
  if (moth.trail.length < 2) return;
  ctx.strokeStyle = 'rgba(160, 200, 255, 0.15)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(moth.trail[0].x, moth.trail[0].y);
  for (let i = 1; i < moth.trail.length; i++) {
    ctx.lineTo(moth.trail[i].x, moth.trail[i].y);
  }
  ctx.stroke();

  // Draw dots along trail
  for (let i = 0; i < moth.trail.length; i++) {
    const t = moth.trail[i];
    const age = 1 - (i / moth.trail.length);
    ctx.globalAlpha = age * 0.4;
    ctx.fillStyle = '#a0d0ff';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 1.5 * age, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Magnetism effect lines
function drawMagnetismLines() {
  if (game.state !== 'playing') return;
  for (const f of flowers) {
    if (f.collected) continue;
    const dx = moth.x - f.x;
    const dy = moth.y - f.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < f.magnetRadius) {
      const alpha = (1 - dist / f.magnetRadius) * 0.2;
      ctx.strokeStyle = `hsla(${f.hue}, 60%, 70%, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.beginPath();
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(moth.x, moth.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// === Game State ===
const game = {
  state: 'initial', // initial, playing, payoff
  flowers: [],
  collectedCount: 0,
  start_time: 0,
  elapsed: 0,
  mouseX: W / 2,
  mouseY: H / 2,
  lastMoveWhoosh: 0
};

function initGame() {
  game.state = 'initial';
  game.collectedCount = 0;
  game.flowers = createFlowers(5);
  particles = [];
  moth.x = W / 2;
  moth.y = H / 2;
  moth.trail = [];
  evidence.set({ phase: 'initial', progress: 0, completed: false, restart_count: evidence.get().restart_count });

  document.getElementById('start-prompt').style.display = 'block';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('payoff-screen').style.display = 'none';
  document.getElementById('pulse-count').textContent = '0';
}

function startGame() {
  if (game.state === 'playing') return;
  initAudio();
  playAmbientDrone();
  game.state = 'playing';
  game.start_time = performance.now();
  evidence.set({ phase: 'playing', progress: 0 });
  document.getElementById('start-prompt').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
}

function triggerPayoff(won) {
  game.state = 'payoff';
  evidence.set({ phase: 'completed', progress: 3, completed: true });

  // Big particle burst
  for (let i = 0; i < 60; i++) {
    spawnParticles(moth.x, moth.y, 1, 
      `hsl(${40 + Math.random() * 30}, 90%, ${60 + Math.random() * 30}%)`,
      4, 2);
  }

  // Also burst from each flower
  for (const f of game.flowers) {
    if (f.collected) {
      for (let i = 0; i < 20; i++) {
        spawnParticles(f.x, f.y, 1,
          `hsl(${f.hue}, 80%, 70%)`, 3, 1.5);
      }
    }
  }

  playPayoffSound();

  setTimeout(() => {
    const title = document.getElementById('payoff-title');
    const subtitle = document.getElementById('payoff-subtitle');
    const debrief = document.getElementById('debrief');
    title.textContent = '✦ Aurora Bloom ✦';
    subtitle.textContent = 'Your guidance has awakened the garden.';
    debrief.textContent = `Moth guided through 5 magnetic flowers. All pulses harmonized.`;
    document.getElementById('restart-btn').style.display = 'inline-block';
    document.getElementById('payoff-screen').style.display = 'flex';
  }, 1500);
}

function triggerFailure() {
  game.state = 'payoff';
  evidence.set({ phase: 'completed', progress: game.collectedCount, completed: false });

  const title = document.getElementById('payoff-title');
  const subtitle = document.getElementById('payoff-subtitle');
  const debrief = document.getElementById('debrief');
  title.textContent = 'Faded Pulse';
  subtitle.textContent = `The moths return to rest. ${game.collectedCount} of 3 pulses collected.`;
  debrief.textContent = 'The magnetic field grew too distant. Try again with closer guidance.';
  document.getElementById('restart-btn').style.display = 'inline-block';
  document.getElementById('payoff-screen').style.display = 'flex';
}

// === Input ===
canvas.addEventListener('mousemove', (e) => {
  game.mouseX = e.clientX;
  game.mouseY = e.clientY;

  if (game.state === 'initial') {
    startGame();
  }

  if (game.state === 'playing') {
    const now = performance.now();
    if (now - game.lastMoveWhoosh > 800) {
      playMoveWhoosh();
      game.lastMoveWhoosh = now;
    }
  }
});

canvas.addEventListener('click', (e) => {
  game.mouseX = e.clientX;
  game.mouseY = e.clientY;
  if (game.state === 'initial') {
    startGame();
  }
});

document.getElementById('restart-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  playCollectSound(0);
  evidence._state.restart_count++;
  initGame();
  evidence.set({ phase: 'initial', progress: 0 });
});

// === Main Loop ===
let lastTime = performance.now();

function update(dt) {
  if (game.state === 'playing') {
    game.elapsed = (performance.now() - game.start_time) / 1000;

    // Escape velocity pressure: moths drift away from center if uncollected
    const time = game.elapsed;
    const escapeRate = Math.min(time / 60, 1); // ramps to full over 60s

    for (const f of game.flowers) {
      if (f.collected) continue;
      // Flowers gently drift toward edges
      const edgePullX = (f.x - W / 2) * escapeRate * 0.0003;
      const edgePullY = (f.y - H / 2) * escapeRate * 0.0003;
      f.x += edgePullX * dt * 60;
      f.y += edgePullY * dt * 60;

      // Clamp to canvas
      f.x = Math.max(f.radius, Math.min(W - f.radius, f.x));
      f.y = Math.max(f.radius, Math.min(H - f.radius, f.y));
    }

    // Moth follows mouse with eased interpolation
    const easeSpeed = 4.5; // higher = snappier
    moth.targetX = game.mouseX;
    moth.targetY = game.mouseY;
    moth.x += (moth.targetX - moth.x) * easeSpeed * dt;
    moth.y += (moth.targetY - moth.y) * easeSpeed * dt;

    // Wing animation
    moth.wingPhase += dt * 12;

    // Calculate angle toward movement
    const dx = moth.targetX - moth.x;
    const dy = moth.targetY - moth.y;
    const targetAngle = Math.atan2(dy, dx);
    // Smooth angle
    let angleDiff = targetAngle - moth.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    moth.angle += angleDiff * Math.min(dt * 8, 1);

    // Trail
    moth.trail.push({ x: moth.x, y: moth.y });
    if (moth.trail.length > 30) moth.trail.shift();

    // Check flower collection
    for (const f of game.flowers) {
      if (f.collected) continue;
      const dist = Math.hypot(moth.x - f.x, moth.y - f.y);
      if (dist < f.radius + 15) {
        f.collected = true;
        game.collectedCount++;
        evidence.set({ progress: game.collectedCount });
        document.getElementById('pulse-count').textContent = game.collectedCount;

        // Burst
        spawnParticles(f.x, f.y, 25, `hsl(${f.hue}, 80%, 70%)`, 3, 1.5);

        playCollectSound(game.collectedCount - 1);

        if (game.collectedCount >= 3) {
          triggerPayoff(true);
          return;
        }
      }
    }

    // Failure condition: elapsed > 90s and insufficient collection
    if (game.elapsed > 90 && game.collectedCount < 3) {
      triggerFailure();
      return;
    }

    // Escalation: after 30s, flowers move faster and attract weaker
    if (game.elapsed > 30) {
      for (const f of game.flowers) {
        if (!f.collected) {
          f.pulseSpeed = 2.5 + (game.elapsed - 30) * 0.05;
          f.magnetRadius = Math.max(60, f.magnetRadius - 0.15);
        }
      }
    }
  }

  updateParticles(dt);
}

function render(time) {
  const t = time / 1000;
  drawBackground(t);
  drawMagnetismLines();
  drawTrail();

  for (const f of game.flowers) {
    drawFlower(f, t, f.collected);
  }

  if (game.state !== 'initial') {
    drawMoth(t);
  }

  drawParticles();
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}

// === Start ===
initGame();
requestAnimationFrame(loop);

})();
</script>
</body>
