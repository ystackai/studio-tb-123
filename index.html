<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1e2e; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  #ui-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }
  #begin-btn, #restart-btn {
    pointer-events: all; cursor: pointer;
    background: rgba(180,210,240,0.15); border: 2px solid rgba(180,210,240,0.4);
    color: #c0daf0; padding: 16px 40px; font-size: 22px; border-radius: 30px;
    letter-spacing: 1px; transition: all 0.3s; backdrop-filter: blur(6px);
  }
  #begin-btn:hover, #restart-btn:hover {
    background: rgba(180,210,240,0.3); border-color: rgba(180,210,240,0.7);
    transform: scale(1.05);
  }
  .hidden { display: none !important; }
  #score-display {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(200,220,240,0.7); font-size: 16px; z-index: 5;
    letter-spacing: 2px; text-transform: uppercase;
  }
  #progress-bar-container {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; z-index: 5; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%; border-radius: 3px;
    background: linear-gradient(90deg, #6ab0e8, #a0d8f0);
    transition: width 0.3s ease-out;
  }
  #payoff-text {
    color: #c0e0ff; font-size: 28px; letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(160,216,240,0.6);
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(160,216,240,0.4); }
    to { text-shadow: 0 0 40px rgba(160,216,240,0.9), 0 0 80px rgba(160,216,240,0.3); }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="score-display"></div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="ui-overlay">
  <button id="begin-btn">▶ Start the Rain</button>
  <div id="payoff-text" class="hidden"><span id="payoff-label"></span></div>
  <button id="restart-btn" class="hidden">↻ Play Again</button>
</div>

<script>
// === RAIN DIAL - Complete Self-Contained Game ===
// This should feel like a cozy, tactile instrument where you guide rain through glass tubes to create a gentle, satisfying melody.

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('ui-overlay');
const beginBtn = document.getElementById('begin-btn');
const restartBtn = document.getElementById('restart-btn');
const payoffText = document.getElementById('payoff-text');
const payoffLabel = document.getElementById('payoff-label');
const scoreDisplay = document.getElementById('score-display');
const progressBar = document.getElementById('progress-bar-container')
  ? document.getElementById('progress-bar') : null;

// FactoryX Evidence API
let evidenceState = {
  schema_version: 1,
  phase: 'initial',
  progress: 0,
  target: 0,
  completed: false,
  restart_count: 0
};

function exposeEvidence() {
  return { ...evidenceState };
}
window.__factoryxEvidence = exposeEvidence;

// Resize handling
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Audio system
let audioCtx = null;
let masterGain = null;
let rainAmbience = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
}

// Chime notes - pentatonic scale
const CHIME_NOTES = [
  { freq: 523.25, name: 'C5' },
  { freq: 587.33, name: 'D5' },
  { freq: 659.25, name: 'E5' },
  { freq: 783.99, name: 'G5' },
  { freq: 880.00, name: 'A5' },
  { freq: 1046.50, name: 'C6' }
];

function playChime(noteIndex, volume = 0.3) {
  if (!audioCtx) return;
  const note = CHIME_NOTES[noteIndex % CHIME_NOTES.length];
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  
  osc.type = 'sine';
  osc.frequency.value = note.freq;
  
  filter.type = 'lowpass';
  filter.frequency.value = 3000;
  filter.Q.value = 5;
  
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
  
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 2.5);
  
  // Add a harmonic
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = note.freq * 2;
  gain2.gain.setValueAtTime(volume * 0.15, audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
  osc2.connect(gain2);
  gain2.connect(masterGain);
  osc2.start();
  osc2.stop(audioCtx.currentTime + 1.5);
}

function playClickSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playDripSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function startRainAmbience() {
  if (!audioCtx || rainAmbience) return;
  
  // White noise rain
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3;
  }
  
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  
  const gain = audioCtx.createGain();
  gain.gain.value = 0.06;
  
  source.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  source.start();
  rainAmbience = { source, gain, filter };
}

function stopRainAmbience() {
  if (rainAmbience) {
    rainAmbience.source.stop();
    rainAmbience = null;
  }
}

// Game constants
const DIAL_RADIUS = 80;
const DIAL_CENTER_X_RATIO = 0.5;
const DIAL_CENTER_Y_RATIO = 0.45;
const CHIME_COUNT = 6;
const PAYOFF_TARGET = 6;
const PATH_ANGLE_OFFSET = -Math.PI / 2; // Start from top

// Game state
let gameState = {
  phase: 'initial', // initial, playing, payingOff, done
  dialAngle: 0,
  targetDialAngle: 0,
  progress: 0,
  chimesActivated: [false, false, false, false, false, false],
  chimeGlow: [0, 0, 0, 0, 0, 0],
  drops: [],
  lastDropTime: 0,
  dropInterval: 2500,
  startTime: 0,
  particles: [],
  payoffTimer: 0,
  restartCount: 0,
  // Pattern: the chimes in order they need to be hit (top-to-bottom order)
  pattern: [],
  patternStep: 0,
  escalationLevel: 0,
  backgroundStars: [],
  lastTime: 0,
};

function initPattern() {
  // Create a memorizable pattern - e.g., C, E, A, G, E, C
  const patternIndices = [0, 2, 4, 3, 2, 0];
  gameState.pattern = patternIndices;
  gameState.patternStep = 0;
  gameState.chimesActivated = [false, false, false, false, false, false];
  gameState.chimeGlow = [0, 0, 0, 0, 0, 0];
  gameState.progress = 0;
  gameState.escalationLevel = 0;
}

function initBackgroundStars() {
  gameState.backgroundStars = [];
  for (let i = 0; i < 80; i++) {
    gameState.backgroundStars.push({
      x: Math.random(),
      y: Math.random(),
      size: Math.random() * 2 + 0.5,
      twinkleSpeed: Math.random() * 2 + 1,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}

function resetGame() {
  gameState.phase = 'playing';
  gameState.dialAngle = 0;
  gameState.targetDialAngle = 0;
  gameState.drops = [];
  gameState.particles = [];
  gameState.lastDropTime = 0;
  gameState.dropInterval = 2800;
  gameState.payoffTimer = 0;
  gameState.lastTime = 0;
  evidenceState.phase = 'playing';
  evidenceState.completed = false;
  
  initPattern();
  initBackgroundStars();
  
  evidenceState.progress = 0;
  evidenceState.target = PAYOFF_TARGET;
  
  overlay.classList.add('hidden');
  beginBtn.classList.add('hidden');
  restartBtn.classList.add('hidden');
  payoffText.classList.add('hidden');
  
  if (progressBar) {
    progressBar.style.width = '0%';
  }
  scoreDisplay.textContent = '';
}

function startGame() {
  initAudio();
  resetGame();
  state.lastDropTime = performance.now();
  gameState.lastDropTime = performance.now();
  startRainAmbience();
}

// Calculate chime positions around the dial
function getChimePositions() {
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  const radius = Math.min(canvas.width, canvas.height) * 0.32;
  
  const positions = [];
  for (let i = 0; i < CHIME_COUNT; i++) {
    const angle = PATH_ANGLE_OFFSET + (i / CHIME_COUNT) * Math.PI * 2;
    positions.push({
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      angle: angle
    });
  }
  return positions;
}

// Dial positions (outer ring positions)
function getDialPositions() {
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  const radius = Math.min(canvas.width, canvas.height) * 0.38;
  
  const positions = [];
  for (let i = 0; i < CHIME_COUNT; i++) {
    const angle = PATH_ANGLE_OFFSET + (i / CHIME_COUNT) * Math.PI * 2;
    positions.push({
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      angle: angle
    });
  }
  return positions;
}

function createDrop(targetChimeIndex, chimePos) {
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  
  gameState.drops.push({
    x: cx,
    y: cy - 10,
    targetChimeIndex: targetChimeIndex,
    chimePos: chimePos,
    progress: 0,
    speed: 0.003 + gameState.escalationLevel * 0.001,
    trail: [],
    alive: true
  });
}

function addParticle(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    gameState.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      color: color,
      size: Math.random() * 3 + 1
    });
  }
}

// Handle dial click
canvas.addEventListener('click', (e) => {
  if (gameState.phase !== 'playing') return;
  
  const mx = e.clientX;
  const my = e.clientY;
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  const radius = Math.min(canvas.width, canvas.height) * 0.38;
  
  // Check if click is near a dial position
  const dialPositions = getDialPositions();
  let closestIdx = -1;
  let closestDist = Infinity;
  
  for (let i = 0; i < dialPositions.length; i++) {
    const dx = mx - dialPositions[i].x;
    const dy = my - dialPositions[i].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 60 && dist < closestDist) {
      closestDist = dist;
      closestIdx = i;
    }
  }
  
  if (closestIdx >= 0) {
    playClickSound();
    // Set dial to route to this chime
    gameState.targetDialAngle = dialPositions[closestIdx].angle;
    
    // Route drop to this chime
    const chimePositions = getChimePositions();
    createDrop(closestIdx, chimePositions[closestIdx]);
    
    // Add a meaningful decision trace if pattern matching
    // (pattern matching is checked when drop arrives)
  }
});

// Begin button
beginBtn.addEventListener('click', () => {
  startGame();
});

// Restart button
restartBtn.addEventListener('click', () => {
  gameState.restartCount++;
  evidenceState.restart_count = gameState.restartCount;
  stopRainAmbience();
  
  setTimeout(() => {
    resetGame();
  }, 1500);
});

// Pattern hint system - show hints when player is stuck
let hintTimer = 0;
const HINT_INTERVAL = 15000; // Show hint every 15 seconds

function checkPatternMatch(dropIdx) {
  if (gameState.patternStep >= gameState.pattern.length) return;
  
  if (dropIdx === gameState.pattern[gameState.patternStep]) {
    // Correct!
    gameState.patternStep++;
    gameState.chimesActivated[dropIdx] = true;
    gameState.chimeGlow[dropIdx] = 1.0;
    gameState.progress++;
    
    evidenceState.progress = gameState.progress;
    
    // Update evidence
    evidenceState.phase = 'playing';
    
    playChime(dropIdx, 0.4);
    
    // Particle burst
    const chimePositions = getChimePositions();
    const pos = chimePositions[dropIdx];
    addParticle(pos.x, pos.y, 'rgba(160,216,240,0.8)', 15);
    
    // Increase pressure
    if (gameState.progress > 2) {
      gameState.escalationLevel = 1;
      gameState.dropInterval = 2200;
    }
    if (gameState.progress > 4) {
      gameState.escalationLevel = 2;
      gameState.dropInterval = 1600;
    }
    
    // Check for payoff
    if (gameState.progress >= PAYOFF_TARGET) {
      triggerPayoff();
    }
    
    scoreDisplay.textContent = `${gameState.progress} / ${PAYOFF_TARGET}`;
  } else {
    // Wrong chime - drip sound, no glow
    playDripSound();
    // Reset pattern step (gentle - allow them to redo)
    gameState.patternStep = 0;
    
    // Red hint display
    hintTimer = 0;
  }
}

function triggerPayoff() {
  gameState.phase = 'payingOff';
  evidenceState.phase = 'completed';
  evidenceState.completed = true;
  evidenceState.progress = PAYOFF_TARGET;
  
  // Play all chimes in sequence as a melody
  let delay = 0;
  for (let i = 0; i < CHIME_COUNT; i++) {
    const idx = i;
    setTimeout(() => {
      playChime(idx, 0.35);
      const chimePositions = getChimePositions();
      addParticle(chimePositions[idx].x, chimePositions[idx].y, 'rgba(200,230,255,0.9)', 12);
    }, delay);
    delay += 250;
  }
  
  // Show payoff text
  setTimeout(() => {
    overlay.classList.remove('hidden');
    payoffText.classList.remove('hidden');
    // Use the pattern as the "song name"
    const songName = '✨ Rain Song Complete ✨';
    const subtext = 'You played it beautifully. Tap ✕ to play again.';
    payoffLabel.innerHTML = `${songName}<br><span style="font-size:16px;opacity:0.6">${subtext}</span>`;
    restartBtn.classList.remove('hidden');
  }, delay + 500);
}

// Drawing functions
function drawBackground(time) {
  // Deep gradient background
  const grad = ctx.createRadialGradient(
    canvas.width * 0.5, canvas.height * 0.4, 0,
    canvas.width * 0.5, canvas.height * 0.4, canvas.width * 0.8
  );
  grad.addColorStop(0, '#1e2840');
  grad.addColorStop(1, '#0e1220');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Stars
  for (const star of gameState.backgroundStars) {
    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 0.001 * star.twinkleSpeed + star.twinkleOffset));
    ctx.globalAlpha = twinkle * 0.6;
    ctx.fillStyle = '#c0d8f0';
    ctx.beginPath();
    ctx.arc(star.x * canvas.width, star.y * canvas.height * 0.7 + canvas.height * 0.15, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawChimes(time) {
  const chimePositions = getChimePositions();
  
  for (let i = 0; i < CHIME_COUNT; i++) {
    const pos = chimePositions[i];
    const glow = gameState.chimeGlow[i];
    
    // Draw tube (glass)
    ctx.save();
    
    // Tube glow
    if (glow > 0) {
      const glowGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 50 + glow * 30);
      glowGrad.addColorStop(0, `rgba(160,216,240,${glow * 0.4})`);
      glowGrad.addColorStop(1, 'rgba(160,216,240,0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 50 + glow * 30, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Glass tube
    const tubeWidth = 20;
    const tubeHeight = 60;
    const rx = pos.x - tubeWidth / 2;
    const ry = pos.y - tubeHeight / 2;
    
    // Tube body with glass effect
    const tubeGrad = ctx.createLinearGradient(rx, ry, rx + tubeWidth, ry);
    tubeGrad.addColorStop(0, 'rgba(140,180,210,0.15)');
    tubeGrad.addColorStop(0.5, 'rgba(180,210,240,0.25)');
    tubeGrad.addColorStop(1, 'rgba(140,180,210,0.15)');
    
    ctx.fillStyle = tubeGrad;
    ctx.strokeStyle = `rgba(180,210,240,${0.3 + glow * 0.4})`;
    ctx.lineWidth = 1.5;
    
    roundedRect(ctx, rx, ry, tubeWidth, tubeHeight, 10);
    ctx.fill();
    ctx.stroke();
    
    // Collectible inside tube
    if (!gameState.chimesActivated[i] || glow > 0) {
      const collectY = pos.y + tubeHeight / 2 - 12;
      const waterLevel = gameState.chimesActivated[i] ? 0.8 : 0.3;
      
      // Water in tube
      const waterH = tubeHeight * waterLevel * (gameState.chimesActivated[i] ? glow : 0.3 + glow * 0.7);
      if (waterH > 2) {
        const waterGrad = ctx.createLinearGradient(rx, collectY, rx, collectY + waterH);
        waterGrad.addColorStop(0, `rgba(100,180,240,${0.3 + glow * 0.3})`);
        waterGrad.addColorStop(1, `rgba(50,130,200,${0.15 + glow * 0.15})`);
        ctx.fillStyle = waterGrad;
        
        ctx.beginPath();
        const innerRx = rx + 3;
        const innerRy = collectY + tubeHeight - waterH + 3;
        const innerW = tubeWidth - 6;
        const innerH = waterH - 6;
        if (innerH > 0) {
          roundedRect(ctx, innerRx, innerRy, innerW, innerH, 7);
          ctx.fill();
        }
      }
      
      // Water surface shimmer
      if (waterH > 10) {
        ctx.fillStyle = `rgba(200,230,255,${0.1 + Math.sin(time * 0.003 + i) * 0.05})`;
        ctx.beginPath();
        const surfY = collectY + tubeHeight - waterH + 5;
        roundedRect(ctx, rx + 3, surfY, tubeWidth - 6, 4, 2);
        ctx.fill();
      }
    }
    
    // Chime label (subtle)
    ctx.fillStyle = `rgba(180,210,240,${0.3 + glow * 0.5})`;
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    const noteName = ['C', 'D', 'E', 'G', 'A', 'C'][i];
    ctx.fillText(noteName, pos.x, pos.y + tubeHeight / 2 + 18);
    
    ctx.restore();
  }
}

function drawDial(time) {
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  
  // Outer ring background
  const outerGrad = ctx.createRadialGradient(cx, cy, DIAL_RADIUS - 15, cx, cy, DIAL_RADIUS + 15);
  outerGrad.addColorStop(0, 'rgba(60,80,110,0.3)');
  outerGrad.addColorStop(0.5, 'rgba(80,110,140,0.15)');
  outerGrad.addColorStop(1, 'rgba(60,80,110,0.2)');
  ctx.fillStyle = outerGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, DIAL_RADIUS + 15, 0, Math.PI * 2);
  ctx.fill();
  
  // Dial knob
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(gameState.dialAngle);
  
  // Knob body
  const knobGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 18);
  knobGrad.addColorStop(0, 'rgba(200,225,245,0.9)');
  knobGrad.addColorStop(1, 'rgba(120,160,200,0.7)');
  ctx.fillStyle = knobGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(200,225,245,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Indicator line pointing outward
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, DIAL_RADIUS - 5);
  ctx.strokeStyle = 'rgba(200,225,245,0.7)';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  // Small dot at end of indicator
  ctx.fillStyle = 'rgba(200,225,245,0.9)';
  ctx.beginPath();
  ctx.arc(0, DIAL_RADIUS - 10, 4, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
  
  // Dial position markers
  const dialPositions = getDialPositions();
  for (let i = 0; i < dialPositions.length; i++) {
    const pos = dialPositions[i];
    const angleToMarker = Math.atan2(pos.y - cy, pos.x - cx);
    const dx = pos.x - cx;
    const dy = pos.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    // Marker dot
    const markerX = cx + (dx / dist) * (DIAL_RADIUS + 2);
    const markerY = cy + (dy / dist) * (DIAL_RADIUS + 2);
    
    ctx.beginPath();
    ctx.arc(markerX, markerY, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(140,170,200,0.4)';
    ctx.fill();
  }
}

function drawDrops(time) {
  for (const drop of gameState.drops) {
    if (!drop.alive) continue;
    
    // Calculate current position along the path
    const t = drop.progress;
    const cx = canvas.width * DIAL_CENTER_X_RATIO;
    const cy = canvas.height * DIAL_CENTER_Y_RATIO;
    
    // Drop falls from dial center area through the tube to the chime
    const startX = cx;
    const startY = cy - 5;
    const endX = drop.chimePos.x;
    const endY = drop.chimePos.y;
    
    // Smooth curve path
    const midX = (startX + endX) / 2 + (Math.sin(time * 0.002 + drop.targetChimeIndex) * 20);
    const midY = (startY + endY) / 2 - 30;
    
    const x = bezierPoint(startX, midX, endX, t);
    const y = bezierPoint(startY, midY, endY, t);
    
    drawRainDrop(x, y, drop.targetChimeIndex, t);
  }
}

function bezierPoint(p0, p1, p2, t) {
  const mt = 1 - t;
  return mt * mt * p0 + 2 * mt * t * p1 + t * t * p2;
}

function drawRainDrop(x, y, chimeIdx, t) {
  ctx.save();
  
  // Trail
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 5; i++) {
    const trailT = Math.max(0, t - i * 0.03);
    const trailX = x - Math.sin(t * 8 + i) * 1;
    const trailY = y - 4 * i;
    ctx.fillStyle = '#6ab0e8';
    ctx.beginPath();
    ctx.arc(trailX, trailY, 2 - i * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Main drop - teardrop shape
  ctx.globalAlpha = 0.9;
  const dropGrad = ctx.createRadialGradient(x - 1, y - 1, 0, x, y, 8);
  dropGrad.addColorStop(0, 'rgba(200,230,255,1)');
  dropGrad.addColorStop(0.5, '#6ab0e8');
  dropGrad.addColorStop(1, '#3a80b8');
  ctx.fillStyle = dropGrad;
  
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fill();
  
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(x - 2, y - 2, 2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

function drawParticles() {
  for (const p of gameState.particles) {
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Update functions
function updateDial(dt) {
  // Smoothly rotate dial toward target
  let diff = gameState.targetDialAngle - gameState.dialAngle;
  // Normalize to [-PI, PI]
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  gameState.dialAngle += diff * 0.12;
}

function updateDrops(dt, time) {
  for (let i = gameState.drops.length - 1; i >= 0; i--) {
    const drop = gameState.drops[i];
    if (!drop.alive) continue;
    
    drop.progress += drop.speed * dt * 0.06;
    
    if (drop.progress >= 1) {
      // Drop arrived at target chime
      drop.alive = false;
      checkPatternMatch(drop.targetChimeIndex);
      
      // Remove after a moment
      setTimeout(() => {
        const idx = gameState.drops.indexOf(drop);
        if (idx >= 0) gameState.drops.splice(idx, 1);
      }, 100);
    }
  }
}

function updateParticles(dt) {
  for (let i = gameState.particles.length - 1; i >= 0; i--) {
    const p = gameState.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02; // gravity
    p.life -= p.decay;
    if (p.life <= 0) {
      gameState.particles.splice(i, 1);
    }
  }
}

function updateGlow(dt) {
  for (let i = 0; i < CHIME_COUNT; i++) {
    if (gameState.chimeGlow[i] > 0) {
      gameState.chimeGlow[i] = Math.max(0, gameState.chimeGlow[i] - 0.015 * dt * 0.06);
    }
  }
}

function checkPattern() {
  // Called when a drop hits a chime
  if (gameState.phase !== 'playing') return;
  
  // Drop arrival is handled in updateDrops via checkPatternMatch
}

function spawnDrop(time) {
  if (gameState.phase !== 'playing') return;
  
  // Only spawn drops when player hasn't filled them all
  if (gameState.progress >= PAYOFF_TARGET) return;
  
  // Choose which chime to spawn for (not just random - bias toward pattern)
  if (gameState.patternStep < gameState.pattern.length) {
    // Spawn for the next pattern chime
    const targetChime = gameState.pattern[gameState.patternStep];
    const chimePositions = getChimePositions();
    createDrop(targetChime, chimePositions[targetChime]);
  } else {
    // Shouldn't happen but safety
    const chimePositions = getChimePositions();
    const idx = Math.floor(Math.random() * CHIME_COUNT);
    createDrop(idx, chimePositions[idx]);
  }
}

// Main game loop
let lastFrameTime = 0;

function gameLoop(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min(timestamp - lastFrameTime, 50); // Cap delta
  lastFrameTime = timestamp;
  
  // Update
  if (gameState.phase === 'playing' || gameState.phase === 'payingOff') {
    updateDial(dt);
    updateDrops(dt, timestamp);
    updateParticles(dt);
    updateGlow(dt);
    
    // Spawn drops during playing phase
    if (gameState.phase === 'playing') {
      hintTimer += dt;
      if (timestamp - gameState.lastDropTime > gameState.dropInterval) {
        spawnDrop(timestamp);
        gameState.lastDropTime = timestamp;
      }
    }
  }
  
  // Draw
  drawBackground(timestamp);
  
  if (gameState.phase !== 'initial') {
    drawChimes(timestamp);
    drawDial(timestamp);
    drawDrops(timestamp);
    drawParticles();
    
    // Draw connecting lines from dial to tubes
    drawConnections(timestamp);
  }
  
  requestAnimationFrame(gameLoop);
}

function drawConnections(time) {
  const cx = canvas.width * DIAL_CENTER_X_RATIO;
  const cy = canvas.height * DIAL_CENTER_Y_RATIO;
  const chimePositions = getChimePositions();
  
  for (let i = 0; i < CHIME_COUNT; i++) {
    const pos = chimePositions[i];
    const angle = Math.atan2(pos.y - cy, pos.x - cx);
    
    // Draw faint path line from dial area to chime
    const lineAlpha = 0.08 + Math.sin(time * 0.001 + i * 1.2) * 0.03;
    ctx.strokeStyle = `rgba(140,180,220,${lineAlpha})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    
    const startX = cx + Math.cos(angle) * 30;
    const startY = cy + Math.sin(angle) * 30;
    const midX = (startX + pos.x) / 2 + Math.sin(time * 0.002 + i) * 10;
    const midY = (startY + pos.y) / 2 - 15;
    
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(midX, midY, pos.x, pos.y - 25);
    ctx.stroke();
    
    ctx.setLineDash([]);
  }
}

// Evidence update for progression display
function updateEvidenceUI() {
  if (progressBar && gameState.phase === 'playing') {
    const pct = (gameState.progress / evidenceState.target) * 100;
    progressBar.style.width = `${Math.min(pct, 100)}%`;
  }
}

// Override game loop to include evidence UI updates
const originalLoop = gameLoop;
let uiUpdateTimer = 0;

function enhancedGameLoop(timestamp) {
  originalLoop(timestamp);
  
  uiUpdateTimer += timestamp - (lastFrameTime || timestamp);
  if (uiUpdateTimer > 300) {
    uiUpdateTimer = 0;
    updateEvidenceUI();
  }
}

// Handle evidence state changes
function updateEvidence(override = {}) {
  evidenceState = { ...evidenceState, ...override };
  window.__factoryxEvidence = exposeEvidence;
}

// Start the game loop
requestAnimationFrame(enhancedGameLoop);

// Initial state
evidenceState.target = PAYOFF_TARGET;

// Handle window resize for dial/chime repositioning
window.addEventListener('resize', () => {
  resize();
  updateEvidenceUI();
});

</script>
