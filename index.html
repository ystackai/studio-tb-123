<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Postcard</title>
    <style>
        :root {
            --bg-color: #0b0d14;
            --ui-font: 'Courier New', Courier, monospace;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--ui-font);
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .interactive {
            pointer-events: auto;
        }
        #start-screen, #end-screen {
            background: rgba(11, 13, 20, 0.85);
            padding: 2rem;
            border: 1px solid #334;
            border-radius: 4px;
            text-align: center;
            color: #fff;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
        }
        h1 {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #7df;
            text-shadow: 0 0 10px rgba(119, 255, 255, 0.5);
        }
        p {
            margin-bottom: 1.5rem;
            line-height: 1.5;
            color: #aac;
        }
        button {
            background: transparent;
            color: #7df;
            border: 1px solid #7df;
            padding: 10px 20px;
            font-family: var(--ui-font);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            background: #7df;
            color: #000;
            box-shadow: 0 0 15px rgba(119, 255, 255, 0.5);
        }
        #postcard-text {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 1s ease;
        }
        #postcard-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas"></canvas>
    <canvas id="fx-canvas" style="position:absolute; top:0; left:0; pointer-events:none; mix-blend-mode: screen;"></canvas>
    
    <div id="ui-layer">
        <div id="start-screen" class="interactive">
            <h1>Orbit Postcard</h1>
            <p>Click the sky to slingshot your satellite<br>through three luminous rings.</p>
            <button id="btn-start">Launch Sequence</button>
        </div>
        
        <div id="end-screen" class="interactive hidden">
            <h1 id="end-title">Arrival Confirmed</h1>
            <p id="postcard-text">From the void,<br>a new perspective.</p>
            <button id="btn-restart">New Orbit</button>
        </div>

        <div id="hint">Click anywhere to choose launch vector</div>
    </div>
</div>

<script>
/**
 * Orbit Postcard
 * A complete self-contained browser game.
 */

// --- Configuration ---
const CONFIG = {
    colors: {
        bg: '#0b0d14',
        satellite: '#fff',
        planet: '#4a6b95',
        planetRing: 'rgba(74, 107, 149, 0.3)',
        rings: ['#ff4757', '#ffa502', '#2ed573'], // Red, Orange, Green
        trail: 'rgba(119, 255, 255, 0.4)',
        star: '#fff'
    },
    satelliteSize: 6,
    planetRadius: 40,
    ringRadiuses: [150, 220, 290],
    launchSpeed: 6,
    trailDuration: 40
};

// --- Audio Engine (Procedural) ---
const AudioEngine = {
    ctx: null,
    masterGain: null,
    
    init() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.4;
        this.masterGain.connect(this.ctx.destination);
    },

    playAmbient() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();
        
        osc.type = 'sine';
        osc.frequency.value = 60;
        filter.type = 'lowpass';
        filter.frequency.value = 200;
        
        // LFO for movement
        const lfo = this.ctx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.1;
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 20;
        lfo.connect(lfoGain);
        lfoGain.connect(filter.frequency);
        lfo.start();

        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 2);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        
        // Store to stop later if needed
        this.ambientNodes = { osc, lfo };
    },

    playLaunch() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.3);
        
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.4);
    },

    playRingPass(index, ringX, ringY) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        // Different tones for different rings
        const baseFreq = 440 + (index * 150); 
        
        osc.type = index === 2 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(baseFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, this.ctx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.0);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 1.2);
    },

    playVictory() {
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        
        [440, 554, 659, 880].forEach((freq, i) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0, now + i*0.15);
            gain.gain.linearRampToValueAtTime(0.15, now + i*0.15 + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.15 + 1.5);
            
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start(now + i*0.15);
            osc.stop(now + i*0.15 + 1.5);
        });
    }
};

// --- Game Objects ---

class Star {
    constructor(w, h) {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 1.5;
        this.alpha = Math.random();
    }
    draw(ctx) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.color = color;
        this.life = Math.random() * 60 + 30;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 1/this.life;
    }
    draw(ctx) {
        ctx.fillStyle = this.color.replace('1)', `${this.alpha})`);
        ctx.beginPath();
        ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
        ctx.fill();
    }
}

class Satellite {
    constructor(game) {
        this.game = game;
        this.reset();
    }

    reset() {
        this.x = this.game.width / 2;
        this.y = this.game.height;
        this.vx = 0;
        this.vy = 0;
        this.trail = [];
        this.ringIndex = 0;
        this.state = 'aiming'; // aiming, orbiting, finished
        this.angle = 0; // For orbiting animation
    }

    launch(angle) {
        this.vx = Math.cos(angle) * CONFIG.launchSpeed;
        this.vy = Math.sin(angle) * CONFIG.launchSpeed;
        this.state = 'orbiting';
        AudioEngine.playLaunch();
    }

    update() {
        if (this.state === 'aiming') return;

        // Trail history
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > CONFIG.trailDuration) this.trail.shift();

        // Move
        this.x += this.vx;
        this.y += this.vy;

        // Screen wrapping (if it flies way off, bring it back or fail? 
        // Let's keep it simple: if it goes too far, it fails, but usually rings are central)
        
        // Check Ring Passes
        const center = { x: this.game.width / 2, y: this.game.height / 2 };
        const distToCenter = Math.hypot(this.x - center.x, this.y - center.y);
        
        if (this.state === 'orbiting' && this.ringIndex < 3) {
            const ringR = CONFIG.ringRadiuses[this.ringIndex] + CONFIG.satelliteSize;
            const prevDist = Math.hypot(
                (this.x - this.vx) - center.x, 
                (this.y - this.vy) - center.y
            );
            
            // Check crossing
            if (prevDist >= ringR && distToCenter <= ringR * 0.95) {
                this.passRing(this.ringIndex);
            }
        }

        // Success condition: Passed all rings
        if (this.state === 'orbiting' && this.ringIndex === 3) {
            this.finish();
        }
        
        // Out of bounds check
        if (this.x < -100 || this.x > this.game.width + 100 || 
            this.y < -100 || this.y > this.game.height + 100) {
            this.finish(true); // Fail
        }
    }

    passRing(index) {
        AudioEngine.playRingPass(index);
        this.ringIndex++;
        
        // Particle burst
        for(let i=0; i<20; i++) {
            this.game.particles.push(new Particle(this.x, this.y, `rgba(255,255,255,1)`));
        }
        
        // Visual impact: shake camera slightly
        this.game.shake = 10;
    }

    finish(failed = false) {
        this.state = 'finished';
        this.finished = failed;
        this.game.endGame(failed);
    }

    draw() {
        // Draw Trail
        if (this.trail.length > 1) {
            this.game.ctx.beginPath();
            this.game.ctx.strokeStyle = CONFIG.colors.trail;
            this.game.ctx.lineWidth = 2;
            this.game.ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) {
                this.game.ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            this.game.ctx.stroke();
        }

        // Draw Satellite
        this.game.ctx.save();
        this.game.ctx.translate(this.x, this.y);
        
        // Simple geometric satellite shape
        this.game.ctx.fillStyle = CONFIG.colors.satellite;
        this.game.ctx.beginPath();
        this.game.ctx.moveTo(0, -CONFIG.satelliteSize);
        this.game.ctx.lineTo(CONFIG.satelliteSize, CONFIG.satelliteSize);
        this.game.ctx.lineTo(-CONFIG.satelliteSize, CONFIG.satelliteSize);
        this.game.ctx.fill();
        
        // Engine glow
        if (this.state !== 'finished') {
            this.game.ctx.fillStyle = `rgba(119, 255, 255, ${Math.random() * 0.5 + 0.3})`;
            this.game.ctx.beginPath();
            this.game.ctx.arc(0, CONFIG.satelliteSize * 2, 3, 0, Math.PI*2);
            this.game.ctx.fill();
        }
        
        this.game.ctx.restore();
    }
}

class PostcardRing {
    constructor(index, center, radius) {
        this.index = index;
        this.center = center;
        this.radius = radius;
        this.passed = false;
        this.color = CONFIG.colors.rings[index];
        this.rotation = 0;
    }

    update() {
        this.rotation += 0.005 * (this.index + 1);
        if (this.passed) {
            this.rotation += 0.02; // Spin faster when passed
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.center.x, this.center.y);
        ctx.rotate(this.rotation);

        ctx.beginPath();
        // Draw an elliptical ring
        ctx.scale(1, 0.6); 
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        
        ctx.lineWidth = this.passed ? 2 : 4;
        ctx.strokeStyle = this.passed ? 'rgba(255,255,255,0.2)' : this.color;
        ctx.stroke();
        
        // Glow if not passed
        if (!this.passed) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.fxCanvas = document.getElementById('fx-canvas');
        this.fxCtx = this.fxCanvas.getContext('2d');
        
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.stars = [];
        for(let i=0; i<100; i++) this.stars.push(new Star(this.width, this.height));
        
        this.particles = [];
        this.shake = 0;
        
        this.center = { x: this.width/2, y: this.height/2 };
        this.rings = CONFIG.ringRadiuses.map((r, i) => new PostcardRing(i, this.center, r));
        
        this.satellite = new Satellite(this);
        
        this.state = 'start'; // start, playing, end
        this.setupInput();
        
        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.fxCanvas.width = this.width;
        this.fxCanvas.height = this.height;
        this.center = { x: this.width/2, y: this.height/2 };
        this.satellite.x = this.width/2;
        this.satellite.y = this.height - 50;
        // Re-init rings on resize to center them
        this.rings = CONFIG.ringRadiuses.map((r, i) => new PostcardRing(i, this.center, r));
    }

    setupInput() {
        const handle = (e) => {
            if (this.state !== 'playing') return;
            
            const rect = this.canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            
            // Determine angle from satellite to click
            const dx = x - this.satellite.x;
            const dy = y - this.satellite.y;
            const angle = Math.atan2(dy, dx);
            
            this.satellite.launch(angle);
            document.getElementById('hint').style.opacity = 0;
        };
        
        this.canvas.addEventListener('mousedown', handle);
        this.canvas.addEventListener('touchstart', handle);
        
        // Buttons
        document.getElementById('btn-start').addEventListener('click', () => {
            AudioEngine.init();
            AudioEngine.playAmbient();
            this.startGame();
        });
        
        document.getElementById('btn-restart').addEventListener('click', () => {
            this.resetUI();
            this.startGame();
        });
    }

    startGame() {
        this.state = 'playing';
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        this.satellite.reset();
        this.satellite.x = this.width/2;
        this.satellite.y = this.height - 100;
        this.satellite.state = 'aiming';
        this.particles = [];
        this.shake = 0;
        this.rings.forEach(r => { r.passed = false; });
        document.getElementById('hint').style.opacity = 1;
    }

    resetUI() {
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        this.state = 'start';
        document.getElementById('hint').style.opacity = 0;
    }

    endGame(failed) {
        this.state = 'end';
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const postcardText = document.getElementById('postcard-text');
        
        endScreen.classList.remove('hidden');
        
        if (failed) {
            endTitle.innerText = "Signal Lost";
            postcardText.innerText = "The satellite drifted into the void. Try a steeper vector.";
            postcardText.style.color = "#ff6b81";
        } else {
            endTitle.innerText = "Arrival Confirmed";
            postcardText.innerText = "Three rings breached. A new perspective achieved.";
            postcardText.style.color = "#2ed573";
            AudioEngine.playVictory();
            
            // Celebration particles
            for(let i=0; i<100; i++) {
                this.particles.push(new Particle(this.width/2, this.height/2, 'rgba(255,255,255,1)'));
            }
        }
    }

    drawBackground() {
        // Clear with slight fade for motion blur effect? No, crisp is better for this style.
        this.ctx.fillStyle = CONFIG.colors.bg;
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        this.stars.forEach(s => s.draw(this.ctx));
        
        // Draw Planet
        this.ctx.save();
        this.ctx.translate(this.center.x, this.center.y);
        
        // Planet body
        const grad = this.ctx.createRadialGradient(0, 0, 10, 0, 0, CONFIG.planetRadius);
        grad.addColorStop(0, '#7a9bd6');
        grad.addColorStop(1, '#2a4b75');
        this.ctx.fillStyle = grad;
        this.ctx.beginPath();
        this.ctx.arc(0, 0, CONFIG.planetRadius, 0, Math.PI*2);
        this.ctx.fill();
        
        this.ctx.restore();
    }

    drawFX() {
        this.fxCtx.clearRect(0, 0, this.width, this.height);
        
        // Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.update();
            p.draw(this.fxCtx);
            if (p.alpha <= 0) this.particles.splice(i, 1);
        }
    }

    loop() {
        // Logic
        this.satellite.update();
        this.rings.forEach(r => r.update());
        
        // Update particles even if game over for explosion effect
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].alpha <= 0) this.particles.splice(i, 1);
        }

        // Render
        this.ctx.save();
        
        // Screen shake
        if (this.shake > 0) {
            const dx = (Math.random() - 0.5) * this.shake;
            const dy = (Math.random() - 0.5) * this.shake;
            this.ctx.translate(dx, dy);
            this.shake *= 0.9;
            if (this.shake < 0.5) this.shake = 0;
        }
        
        this.drawBackground();
        
        // Draw Rings
        this.rings.forEach(r => r.draw(this.ctx));
        
        // Draw Satellite
        this.satellite.draw();
        
        // Draw Aim Line (Aiming state)
        if (this.state === 'playing' && this.satellite.state === 'aiming') {
            // Just show the satellite pulsing or a subtle guide
            this.ctx.save();
            this.ctx.translate(this.satellite.x, this.satellite.y);
            this.ctx.beginPath();
            this.ctx.arc(0, 0, CONFIG.satelliteSize + 5, 0, Math.PI*2);
            this.ctx.strokeStyle = 'rgba(119, 255, 255, 0.3)';
            this.ctx.stroke();
            this.ctx.restore();
        }
        
        this.ctx.restore();
        
        // FX Layer
        this.drawFX();
        
        requestAnimationFrame(this.loop);
    }
}

// --- Global Scope ---
window.onload = () => {
    window.game = new Game();
};
</script>

</body>
</html>
