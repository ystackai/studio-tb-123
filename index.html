<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // FactoryX evidence state
  let evidence = {
    schema_version: 1,
    phase: 'initial',
    progress: 0,
    target: 10,
    completed: false,
    restart_count: 0
  };
  window.__factoryxEvidence = function() { return { ...evidence }; };

  let W, H, cx, cy;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // Audio engine
  let audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, duration, type, volume, detune) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (detune) osc.frequency.detune.setValueAtTime(detune, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playCollect() {
    playTone(520, 0.15, 'sine', 0.2);
    setTimeout(() => playTone(780, 0.2, 'sine', 0.15), 80);
  }

  function playPayoff() {
    const now = audioCtx.currentTime;
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.4, 'sine', 0.18), i * 100);
    });
    setTimeout(() => {
      playTone(208, 1.5, 'triangle', 0.12);
      playTone(311, 1.5, 'sine', 0.08);
    }, 500);
  }

  function playRestart() {
    playTone(440, 0.1, 'sine', 0.1);
    playTone(330, 0.1, 'sine', 0.1);
    playTone(440, 0.15, 'sine', 0.1);
  }

  function playHover() {
    playTone(880, 0.06, 'sine', 0.04);
  }

  function playMiss() {
    playTone(150, 0.3, 'sawtooth', 0.08);
  }

  // Moth player
  const moth = { x: cx, y: cy, radius: 12, targetX: cx, targetY: cy, angle: 0 };

  // Flowers / pulses
  let flowers = [];
  const FLOWER_TARGET = 10;

  function dist(a, b) {
    return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
  }

  function initGame() {
    evidence.phase = 'initial';
    evidence.progress = 0;
    evidence.completed = false;
    evidence.restart_count = 0;
    moth.x = cx;
    moth.y = cy;
    moth.angle = 0;
    flowers = [];
    // Generate flowers scattered across the screen
    const cols = Math.ceil(Math.sqrt(FLOWER_TARGET * (W / H)));
    const rows = Math.ceil(FLOWER_TARGET / cols);
    const spacingX = W / (cols + 1);
    const spacingY = H / (rows + 1);
    let count = 0;
    for (let r = 0; r < rows && count < FLOWER_TARGET; r++) {
      for (let c = 0; c < cols && count < FLOWER_TARGET; c++) {
        const fx = spacingX * (c + 1) + (Math.random() - 0.5) * spacingX * 0.6;
        const fy = spacingY * (r + 2) + (Math.random() - 0.5) * spacingY * 0.6;
        const phase = Math.random() * Math.PI * 2;
        flowers.push({
          x: fx, y: fy,
          collected: false,
          radius: 18,
          pulsePhase: phase,
          pulseSpeed: 0.02 + Math.random() * 0.02,
          pulseAmplitude: 4 + Math.random() * 4,
          hue: 100 + Math.random() * 60, // greens and yellows
          collectedTime: 0,
          angle: phase // rotation for petals
        });
        count++;
      }
    }
  }

  // Stars background
  const stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * 2000,
      y: Math.random() * 1200,
      r: 0.5 + Math.random() * 1.5,
      twinkleSpeed: 0.01 + Math.random() * 0.03,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }

  // Particles for effects
  let particles = [];
  function spawnParticles(x, y, hue, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        hue: hue + Math.random() * 30 - 15,
        size: 1.5 + Math.random() * 3
      });
    }
  }

  // Input
  let mouseX = cx, mouseY = cy;
  let hasStarted = false;
  let gameOver = false;
  let gameTime = 0;

  canvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  canvas.addEventListener('click', (e) => {
    const clickX = e.clientX;
    const clickY = e.clientY;

    if (!hasStarted) {
      initAudio();
      initGame();
      hasStarted = true;
      evidence.phase = 'playing';
      return;
    }

    if (gameOver) {
      // Restart
      initGame();
      hasStarted = true;
      evidence.phase = 'playing';
      evidence.restart_count++;
      playRestart();
      return;
    }

    // Check if clicking a flower (alternative action: magnetize - slows down nearby flowers)
    let clickedFlower = false;
    for (const flower of flowers) {
      if (flower.collected) continue;
      const d = dist({ x: clickX, y: clickY }, flower);
      if (d < flower.radius + 15) {
        // Magnetize: temporarily attracts the moth toward this flower
        flower.magnetized = true;
        setTimeout(() => { flower.magnetized = false; }, 2000);
        playHover();
        spawnParticles(flower.x, flower.y, flower.hue, 5);
        clickedFlower = true;
        break;
      }
    }

    if (!clickedFlower) {
      // Miss click - small penalty feedback
      playMiss();
      // Spawn a small dust particle at click
      spawnParticles(clickX, clickY, 30, 3);
    }
  });

  // Touch support
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const clickX = t.clientX;
    const clickY = t.clientY;

    if (!hasStarted) {
      initAudio();
      initGame();
      hasStarted = true;
      evidence.phase = 'playing';
      return;
    }

    if (gameOver) {
      initGame();
      hasStarted = true;
      evidence.phase = 'playing';
      evidence.restart_count++;
      playRestart();
      return;
    }

    let clickedFlower = false;
    for (const flower of flowers) {
      if (flower.collected) continue;
      const d = dist({ x: clickX, y: clickY }, flower);
      if (d < flower.radius + 20) {
        flower.magnetized = true;
        setTimeout(() => { flower.magnetized = false; }, 2000);
        playHover();
        spawnParticles(flower.x, flower.y, flower.hue, 5);
        clickedFlower = true;
        break;
      }
    }
    if (!clickedFlower) {
      playMiss();
      spawnParticles(clickX, clickY, 30, 3);
    }
  }, { passive: false });

  // Time tracking
  let startTime = 0;
  const STARTUP_DELAY = 3000; // 3 seconds before flowers disappear if not started

  // Draw function
  function draw() {
    // Background gradient - deep night sky
    const bgGrad = ctx.createRadialGradient(cx, cy * 0.6, 50, cx, cy, Math.max(W, H));
    bgGrad.addColorStop(0, '#1a1f3a');
    bgGrad.addColorStop(1, '#0a0e1a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    for (const star of stars) {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(star.twinklePhase + gameTime * star.twinkleSpeed * 60));
      ctx.beginPath();
      ctx.arc(star.x % W, star.y % H, star.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 210, 255, ${twinkle * 0.6})`;
      ctx.fill();
    }

    // Draw subtle magnetic field lines
    if (hasStarted && !gameOver) {
      ctx.save();
      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 8; i++) {
        const angle = (gameTime * 0.2 + i * Math.PI / 4);
        const r1 = 50;
        const r2 = 300;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r1, r2, angle, 0, Math.PI * 2);
        ctx.strokeStyle = '#6644ff';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();
    }

    // Draw flowers/pulses
    let collectedCount = 0;
    for (const flower of flowers) {
      if (flower.collected) {
        collectedCount++;
        // Draw collected flower - fading
        const fade = Math.max(0, 1 - flower.collectedTime / 60);
        ctx.save();
        ctx.globalAlpha = fade * 0.5;
        ctx.translate(flower.x, flower.y);
        ctx.rotate(flower.angle);
        for (let p = 0; p < 5; p++) {
          const pa = (p / 5) * Math.PI * 2;
          ctx.beginPath();
          ctx.ellipse(0, 0, 8, 14, pa, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${flower.hue}, 80%, 70%, ${fade * 0.5})`;
          ctx.fill();
        }
        ctx.restore();
        continue;
      }

      flower.angle += 0.005;
      const pulse = Math.sin(flowers ? gameTime : 0 * flower.pulseSpeed * 60 + flower.pulsePhase);
      const actualRadius = flower.radius + pulse * flower.pulseAmplitude;

      // Draw flower glow
      const glowGrad = ctx.createRadialGradient(flower.x, flower.y, 0, flower.x, flower.y, actualRadius * 3);
      glowGrad.addColorStop(0, `hsla(${flower.hue}, 90%, 60%, ${0.25 + pulse * 0.1})`);
      glowGrad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(flower.x, flower.y, actualRadius * 3, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      // Draw flower petals
      ctx.save();
      ctx.translate(flower.x, flower.y);
      ctx.rotate(flower.angle);
      // Outer petals
      for (let p = 0; p < 5; p++) {
        const pa = (p / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(Math.cos(pa) * 10, Math.sin(pa) * 10, 8, 14, pa, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${flower.hue}, 80%, 65%, ${0.7 + pulse * 0.15})`;
        ctx.fill();
      }
      // Center
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${flower.hue - 20}, 90%, 80%, ${0.9 + pulse * 0.1})`;
      ctx.fill();
      ctx.restore();

      // Magnetic attraction line if magnetized
      if (flower.magnetized) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(moth.x, moth.y);
        ctx.lineTo(flower.x, flower.y);
        ctx.strokeStyle = `hsla(${flower.hue}, 100%, 70%, ${0.3 + Math.sin(gameTime * 10) * 0.1})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // Draw moth
    const mothPulse = 0.8 + Math.sin(gameTime * 3) * 0.2;
    // Moth glow
    const mothGlow = ctx.createRadialGradient(moth.x, moth.y, 0, moth.x, moth.y, 40);
    mothGlow.addColorStop(0, `rgba(255, 220, 100, ${0.3 * mothPulse})`);
    mothGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(moth.x, moth.y, 40, 0, Math.PI * 2);
    ctx.fillStyle = mothGlow;
    ctx.fill();

    // Draw moth body
    ctx.save();
    ctx.translate(moth.x, moth.y);
    ctx.rotate(moth.angle);

    // Wings
    const wingAngle = Math.sin(gameTime * 12) * 0.3;
    // Left wing
    ctx.save();
    ctx.rotate(-wingAngle);
    ctx.beginPath();
    ctx.ellipse(-8, -4, 14, 8, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 230, 150, ${0.5 * mothPulse})`;
    ctx.fill();
    ctx.restore();
    // Right wing
    ctx.save();
    ctx.rotate(wingAngle);
    ctx.beginPath();
    ctx.ellipse(8, -4, 14, 8, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 230, 150, ${0.5 * mothPulse})`;
    ctx.fill();
    ctx.restore();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 240, 180, ${0.9 * mothPulse})`;
    ctx.fill();
    ctx.restore();

    // Draw particles
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.life})`;
      ctx.fill();
    }

    // HUD - progress counter
    if (hasStarted && !gameOver) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`Flowers: ${collectedCount} / ${FLOWER_TARGET}`, 20, 30);
    }

    // Initial state - "Click to begin"
    if (!hasStarted) {
      ctx.fillStyle = 'rgba(200, 210, 255, 0.9)';
      ctx.font = '28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Magnetic Moth', cx, cy - 40);

      ctx.font = '16px sans-serif';
      ctx.fillStyle = 'rgba(180, 190, 220, 0.8)';
      ctx.fillText('Guide the moth to collect magnetic flowers', cx, cy);
      ctx.fillText('Move mouse to steer • Click flowers to magnetize them', cx, cy + 30);

      const btnPulse = 0.7 + Math.sin(gameTime * 2) * 0.3;
      ctx.beginPath();
      const btnX = cx - 80, btnY = cy + 70, btnW = 160, btnH = 40;
      ctx.moveTo(btnX + 20, btnY);
      ctx.lineTo(btnX + btnW - 20, btnY);
      ctx.quadraticCurveTo(btnX + btnW, btnY, btnX + btnW, btnY + 20);
      ctx.lineTo(btnX + btnW, btnY + btnH - 20);
      ctx.quadraticCurveTo(btnX + btnW, btnY + btnH, btnX + btnW - 20, btnY + btnH);
      ctx.lineTo(btnX + 20, btnY + btnH);
      ctx.quadraticCurveTo(btnX, btnY + btnH, btnX, btnY + btnH - 20);
      ctx.lineTo(btnX, btnY + 20);
      ctx.quadraticCurveTo(btnX, btnY, btnX + 20, btnY);
      ctx.closePath();
      ctx.fillStyle = `hsla(220, 70%, 60%, ${0.3 + btnPulse * 0.15})`;
      ctx.fill();
      ctx.strokeStyle = `hsla(220, 70%, 70%, ${btnPulse})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = '16px sans-serif';
      ctx.fillText('Begin the journey', cx, cy + 95);
    }

    // Payoff overlay
    if (gameOver && evidence.completed) {
      ctx.fillStyle = 'rgba(10, 14, 26, 0.7)';
      ctx.fillRect(0, 0, W, H);

      const fadeIn = Math.min(1, gameTime - gameTimeAtWin);
      ctx.globalAlpha = fadeIn;

      // Big payoff glow
      const payoffGlow = ctx.createRadialGradient(cx, cy - 50, 0, cx, cy - 50, 200);
      payoffGlow.addColorStop(0, 'rgba(255, 255, 150, 0.3)');
      payoffGlow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(cx, cy - 50, 200, 0, Math.PI * 2);
      ctx.fillStyle = payoffGlow;
      ctx.fill();

      ctx.fillStyle = 'rgba(255, 240, 180, 0.95)';
      ctx.font = '36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('✦ The Moth Finds Home ✦', cx, cy - 60);

      ctx.fillStyle = 'rgba(200, 220, 255, 0.8)';
      ctx.font = '18px sans-serif';
      ctx.fillText('All magnetic flowers collected!', cx, cy - 10);

      ctx.fillStyle = 'rgba(180, 200, 240, 0.7)';
      ctx.font = '14px sans-serif';
      ctx.fillText(`Restart count: ${evidence.restart_count}`, cx, cy + 30);

      ctx.globalAlpha = 1;

      // Restart button
      const btnPulse = 0.7 + Math.sin(gameTime * 2) * 0.3;
      const rBtnX = cx - 90, rBtnY = cy + 60, rBtnW = 180, rBtnH = 40;
      ctx.beginPath();
      ctx.moveTo(rBtnX + 20, rBtnY);
      ctx.lineTo(rBtnX + rBtnW - 20, rBtnY);
      ctx.quadraticCurveTo(rBtnX + rBtnW, rBtnY, rBtnX + rBtnW, rBtnY + 20);
      ctx.lineTo(rBtnX + rBtnW, rBtnY + rBtnH - 20);
      ctx.quadraticCurveTo(rBtnX + rBtnW, rBtnY + rBtnH, rBtnX + rBtnW - 20, rBtnY + rBtnH);
      ctx.lineTo(rBtnX + 20, rBtnY + rBtnH);
      ctx.quadraticCurveTo(rBtnX, rBtnY + rBtnH, rBtnX, rBtnY + rBtnH - 20);
      ctx.lineTo(rBtnX, rBtnY + 20);
      ctx.quadraticCurveTo(rBtnX, rBtnY, rBtnX + 20, rBtnY);
      ctx.closePath();
      ctx.fillStyle = `hsla(120, 60%, 50%, ${0.2 + btnPulse * 0.15})`;
      ctx.fill();
      ctx.strokeStyle = `hsla(120, 60%, 65%, ${btnPulse})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = '16px sans-serif';
      ctx.fillText('Play Again', cx, rBtnY + 26);
    }

    // Timeout state
    if (gameOver && !evidence.completed) {
      ctx.fillStyle = 'rgba(10, 14, 26, 0.7)';
      ctx.fillRect(0, 0, W, H);

      const fadeIn = Math.min(1, gameTime - gameTimeAtWin);

      ctx.fillStyle = 'rgba(255, 150, 150, 0.9)';
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('The Moth Drifts Away...', cx, cy - 50);

      ctx.fillStyle = 'rgba(200, 200, 220, 0.7)';
      ctx.font = '16px sans-serif';
      ctx.fillText(`${collectedCount} / ${FLOWER_TARGET} flowers collected`, cx, cy);

      ctx.fillStyle = 'rgba(255, 200, 150, 0.8)';
      ctx.font = '14px sans-serif';
      ctx.fillText('Collect all flowers before they go dark!', cx, cy + 35);

      // Restart button
      const btnPulse = 0.7 + Math.sin(gameTime * 2) * 0.3;
      const rBtnX = cx - 90, rBtnY = cy + 70, rBtnW = 180, rBtnH = 40;
      ctx.beginPath();
      ctx.moveTo(rBtnX + 20, rBtnY);
      ctx.lineTo(rBtnX + rBtnW - 20, rBtnY);
      ctx.quadraticCurveTo(rBtnX + rBtnW, rBtnY, rBtnX + rBtnW, rBtnY + 20);
      ctx.lineTo(rBtnX + rBtnW, rBtnY + rBtnH - 20);
      ctx.quadraticCurveTo(rBtnX + rBtnW, rBtnY + rBtnH, rBtnX + rBtnW - 20, rBtnY + rBtnH);
      ctx.lineTo(rBtnX + 20, rBtnY + rBtnH);
      ctx.quadraticCurveTo(rBtnX, rBtnY + rBtnH, rBtnX, rBtnY + rBtnH - 20);
      ctx.lineTo(rBtnX, rBtnY + 20);
      ctx.quadraticCurveTo(rBtnX, rBtnY, rBtnX + 20, rBtnY);
      ctx.closePath();
      ctx.fillStyle = `hsla(220, 60%, 50%, ${0.2 + btnPulse * 0.15})`;
      ctx.fill();
      ctx.strokeStyle = `hsla(220, 60%, 65%, ${btnPulse})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = '16px sans-serif';
      ctx.fillText('Try Again', cx, rBtnY + 26);
    }
  }

  // Update function
  let gameTimeAtWin = 0;
  let lastTime = 0;

  function update(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dtMs = timestamp - lastTime;
    lastTime = timestamp;
    gameTime += dtMs / 1000;

    if (hasStarted && !gameOver) {
      // Move moth toward mouse with some lag
      const dx = mouseX - moth.x;
      const dy = mouseY - moth.y;
      const mag = Math.sqrt(dx * dx + dy * dy);
      const speed = Math.min(4, mag * 0.04);
      if (mag > 1) {
        moth.x += (dx / mag) * speed;
        moth.y += (dy / mag) * speed;
      }
      moth.angle = Math.atan2(dy, dx);

      // Check flower collection
      for (const flower of flowers) {
        if (flower.collected) {
          flower.collectedTime += dtMs / 16;
          continue;
        }
        const d = dist(moth, flower);
        if (d < flower.radius + moth.radius + 5) {
          flower.collected = true;
          playCollect();
          spawnParticles(flower.x, flower.y, flower.hue, 20);
        }
        // If magnetized, attract the moth toward it
        if (flower.magnetized && !flower.collected) {
          const mx = flower.x - moth.x;
          const my = flower.y - moth.y;
          const mmag = Math.sqrt(mx * mx + my * my);
          if (mmag > 1) {
            moth.x += (mx / mmag) * 2;
            moth.y += (my / mmag) * 2;
          }
        }
      }

      // Check win condition
      const collectedCount = flowers.filter(f => f.collected).length;
      evidence.progress = collectedCount;

      if (collectedCount >= FLOWER_TARGET) {
        evidence.completed = true;
        evidence.phase = 'completed';
        gameOver = true;
        gameTimeAtWin = gameTime;
        playPayoff();
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }

    draw();
    requestAnimationFrame(update);
  }

  initGame();
  requestAnimationFrame(update);

})();
</script>
</body>
</html>
