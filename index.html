<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orbit Postcard</title>
    <style>
        :root {
            --bg: #05050a;
            --ui-text: #e0e0ff;
            --accent: #00f3ff;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 10, 0.85);
            pointer-events: auto;
            transition: opacity 0.5s ease;
            z-index: 10;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            color: var(--accent);
            font-size: clamp(2rem, 5vw, 4rem);
            text-shadow: 0 0 20px var(--accent);
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 4px;
        }
        p {
            color: #8888aa;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
            padding: 0 20px;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 30px var(--accent);
        }
        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #556688;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="score-display">SCORE: 0</div>

    <div id="ui-layer">
        <div id="start-screen" class="screen">
            <h1>ORBIT POSTCARD</h1>
            <p>Slingshot a satellite through three luminous rings.</p>
            <p style="font-size: 0.9em; margin-top: 15px; color: #556;">Click and drag to aim. Release to launch.</p>
            <button id="start-btn">INITIATE</button>
        </div>

        <div id="end-screen" class="screen hidden">
            <h1 id="end-title">POSTCARD RECEIVED</h1>
            <p id="end-reason">You navigated the cosmos.</p>
            <p id="final-score" style="font-size: 2rem; color: var(--accent); margin-top: 20px;">0</p>
            <button id="restart-btn">RE-ORBIT</button>
        </div>
    </div>
</div>

<script>
/**
 * ORBIT POSTCARD
 * A single-file browser game.
 * 
 * Concepts:
 * - Slingshot mechanic: Click/drag sets velocity vector.
 * - Physics: Gravity from center, frictionless vacuum.
 * - Audio: Web Audio API for procedural ambient sounds and SFX.
 * - Visuals: Canvas 2D with glow filters and particle systems.
 */

// --- CONFIGURATION ---
const CONFIG = {
    ringRadii: [120, 240, 360],
    ringWidth: 50,
    gapAngle: Math.PI / 4, // Size of the gap in radians
    satelliteRadius: 6,
    centerRadius: 30,
    colors: ['#ff0055', '#00f3ff', '#f5f53d'], // Ring colors
    bgColors: ['#05050a', '#020205']
};

// --- AUDIO SYSTEM ---
class AudioSys {
    constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.isInitialized = false;
    }

    init() {
        if (this.isInitialized) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.4;
        this.masterGain.connect(this.ctx.destination);
        this.isInitialized = true;
    }

    playTone(freq, type, duration, delay = 0, vol = 0.3) {
        if (!this.isInitialized) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime + delay);
        
        gain.gain.setValueAtTime(0, this.ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + delay + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + delay + duration);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        
        osc.start(this.ctx.currentTime + delay);
        osc.stop(this.ctx.currentTime + delay + duration);
    }

    playAmbient() {
        if (!this.isInitialized) return;
        // Create a deep space drone
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();

        osc1.type = 'sine';
        osc2.type = 'triangle';
        osc1.frequency.value = 55;
        osc2.frequency.value = 56; // Slight detune for beating

        filter.type = 'lowpass';
        filter.frequency.value = 200;
        filter.Q.value = 5;

        gain.gain.value = 0.1;

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);

        osc1.start();
        osc2.start();
        
        // LFO for filter
        const lfo = this.ctx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.1;
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 100;
        lfo.connect(lfoGain);
        lfoGain.connect(filter.frequency);
        lfo.start();

        this.ambientNodes = { osc1, osc2, gain, lfo };
    }

    stopAmbient() {
        if (this.ambientNodes) {
            const { osc1, osc2, lfo } = this.ambientNodes;
            osc1.stop();
            osc2.stop();
            lfo.stop();
        }
    }

    playLaunch() {
        this.playTone(880, 'sine', 0.1, 0, 0.2);
        this.playTone(440, 'triangle', 0.3, 0.05, 0.1);
    }

    playRingHit(index) {
        const baseFreq = 440 * Math.pow(2, index / 4); // Pentatonic-ish scale
        this.playTone(baseFreq, 'sine', 0.5, 0, 0.4);
        this.playTone(baseFreq * 2, 'triangle', 0.5, 0.05, 0.2);
    }

    playWin() {
        [0, 0.1, 0.2].forEach((delay, i) => {
            this.playTone(440, 'sine', 0.5, delay, 0.3);
            this.playTone(554, 'sine', 0.5, delay + 0.05, 0.3); // C# - happy major
            this.playTone(659, 'sine', 0.8, delay + 0.1, 0.3); // E
        });
    }

    playFail() {
        [0, 0.15].forEach((delay, i) => {
            this.playTone(200, 'sawtooth', 0.3, delay, 0.15);
        });
    }
}

// --- VISUALS & PARTICLES ---
class Particle {
    constructor(x, y, color, speed, life) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * speed;
        this.life = life;
        this.maxLife = life;
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
    }

    update(dt) {
        this.x += this.vx * dt * 60;
        this.y += this.vy * dt * 60;
        this.life -= dt;
    }

    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class Star {
    constructor(w, h) {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 2;
        this.alpha = Math.random();
        this.twinkleSpeed = 0.02 + Math.random() * 0.05;
    }

    draw(ctx, canvasW, canvasH) {
        this.alpha += this.twinkleSpeed;
        const glow = (Math.sin(this.alpha) + 1) / 2; // 0 to 1
        
        ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + glow * 0.7})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// --- GAME ENGINE ---
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        
        this.audio = new AudioSys();
        this.particles = [];
        this.stars = [];
        
        this.state = 'START'; // START, AIMING, PLAYING, END
        this.satellite = { x: 0, y: 0, vx: 0, vy: 0, radius: CONFIG.satelliteRadius };
        this.rings = [];
        this.currentRingIdx = 0;
        this.dragStart = null;
        this.dragCurrent = null;
        
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        // Generate stars
        for(let i=0; i<100; i++) {
            this.stars.push(new Star(this.width, this.height));
        }

        // Bind events
        this.canvas.addEventListener('mousedown', this.handleInputStart.bind(this));
        this.canvas.addEventListener('mousemove', this.handleInputMove.bind(this));
        window.addEventListener('mouseup', this.handleInputEnd.bind(this));
        
        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.handleInputStart(e.touches[0]);
        }, {passive: false});
        this.canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            this.handleInputMove(e.touches[0]);
        }, {passive: false});
        window.addEventListener('touchend', this.handleInputEnd.bind(this));

        document.getElementById('start-btn').addEventListener('click', () => this.start());
        document.getElementById('restart-btn').addEventListener('click', () => this.start());

        // Animation Loop
        this.lastTime = 0;
        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.centerX = this.width / 2;
        this.centerY = this.height / 2;
        
        // Reposition start satellite based on screen size but keep it in playable area
        if (this.state === 'START') {
             // Just reset position visually
             this.satellite.x = this.width * 0.15;
             this.satellite.y = this.height * 0.85; 
        }
    }

    initGame() {
        this.audio.init();
        this.audio.playAmbient();
        
        this.currentRingIdx = 0;
        this.rings = [];
        
        const maxR = Math.min(this.width, this.height) * 0.4;
        
        // Create rings
        CONFIG.ringRadii.forEach((r, i) => {
            this.rings.push({
                radius: r,
                gapStart: Math.random() * Math.PI * 2, // Random gap position
                color: CONFIG.colors[i],
                passed: false,
                glow: 0
            });
        });

        // Set satellite start position
        // Place satellite at a specific angle relative to the first ring's gap to ensure playability
        // But to keep it "random" yet fair, we place it where it's easy to draw a line
        const angle = Math.PI * 0.75; // Bottom left area
        const dist = 80;
        this.satellite.x = this.centerX + Math.cos(angle) * dist;
        this.satellite.y = this.centerY + Math.sin(angle) * dist;
        this.satellite.vx = 0;
        this.satellite.vy = 0;
        
        this.score = 0;
        this.updateScore();
    }

    start() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('score-display').classList.add('visible');
        
        this.initGame();
        this.state = 'AIMING';
        
        if (this.audio.ctx && this.audio.ctx.state === 'suspended') {
            this.audio.ctx.resume();
        }
    }

    handleInputStart(e) {
        if (this.state !== 'AIMING') return;
        
        const rect = this.canvas.getBoundingClientRect();
        const clientX = e.clientX || e.pageX;
        const clientY = e.clientY || e.pageY;
        
        this.dragStart = { x: clientX - rect.left, y: clientY - rect.top };
        this.dragCurrent = { ...this.dragStart };
    }

    handleInputMove(e) {
        if (this.state !== 'AIMING' || !this.dragStart) return;
        
        const rect = this.canvas.getBoundingClientRect();
        const clientX = e.clientX || e.pageX;
        const clientY = e.clientY || e.pageY;
        
        this.dragCurrent = { x: clientX - rect.left, y: clientY - rect.top };
    }

    handleInputEnd() {
        if (this.state !== 'AIMING' || !this.dragStart) return;
        
        // Calculate vector
        const dx = this.dragStart.x - this.dragCurrent.x;
        const dy = this.dragStart.y - this.dragCurrent.y;
        
        // Scale factor for power
        const power = 0.15;
        const maxPow = 20;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const scale = Math.min(dist * power, maxPow);
        
        if (dist < 10) {
            // Too short, reset drag
            this.dragStart = null;
            return;
        }
        
        const angle = Math.atan2(dy, dx);
        this.satellite.vx = Math.cos(angle) * scale;
        this.satellite.vy = Math.sin(angle) * scale;
        
        this.audio.playLaunch();
        this.state = 'PLAYING';
        this.dragStart = null;
        this.dragCurrent = null;
    }

    update(dt) {
        // Update Particles
        this.particles = this.particles.filter(p => p.life > 0);
        this.particles.forEach(p => p.update(dt));

        if (this.state === 'PLAYING') {
            // Physics
            this.satellite.x += this.satellite.vx;
            this.satellite.y += this.satellite.vy;
            
            // Check bounds for failure
            const distFromCenter = Math.sqrt(
                Math.pow(this.satellite.x - this.centerX, 2) + 
                Math.pow(this.satellite.y - this.centerY, 2)
            );
            
            const maxDist = Math.max(this.width, this.height) * 0.6;
            
            if (distFromCenter > maxDist) {
                this.endGame(false, "Signal lost in deep space.");
            } else {
                this.checkRingCollisions(distFromCenter);
            }
        }
    }

    checkRingCollisions(currentDist) {
        // We only care about the current ring
        const ring = this.rings[this.currentRingIdx];
        if (!ring) return; // All passed
        
        const rInside = ring.radius - ring.gapAngle/2;
        const rOutside = ring.radius + ring.gapAngle/2;
        
        // Check if satellite crosses the ring radius
        // We need to look at previous position vs current position
        // But for simplicity with the loop, we track distance.
        // Actually, let's just check if current dist matches ring radius approx.
        
        if (Math.abs(currentDist - ring.radius) < this.satellite.radius + 5) {
            
            // Calculate satellite angle relative to center
            const angleToSat = Math.atan2(this.satellite.y - this.centerY, this.satellite.x - this.centerX);
            
            // Normalize angles to 0-2PI
            let ringAngle = ring.gapStart % (Math.PI * 2);
            let satAngle = angleToSat % (Math.PI * 2);
            
            // Calculate distance between angles
            const angleDiff = Math.abs(satAngle - ringAngle);
            
            // Check if within gap (gap is CONFIG.gapAngle wide)
            // If angleDiff is small, we are in the gap.
            // However, we need to handle wrap-around (0/2PI)
            let diff = Math.abs(satAngle - ringAngle) % (Math.PI * 2);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            
            // The sat must also be passing THROUGH the ring, not just at the radius
            // We assume if we are close to radius, we are hitting it.
            // If angleDiff < gapAngle/2, it's a pass.
            
            const halfGap = CONFIG.gapAngle / 2;
            
            if (diff < halfGap) {
                // SUCCESS
                this.handleRingSuccess(ring, config.rings[this.currentRingIdx].radius); // Pass radius for particle spawn
                this.currentRingIdx++;
                
                this.satellite.vx *= 1.05; // Slight speed up
                this.satellite.vy *= 1.05;
                
                if (this.currentRingIdx >= this.rings.length) {
                    this.endGame(true, "Postcard delivered successfully.");
                }
            } else {
                // FAILURE
                this.handleRingFailure();
                this.endGame(false, "Collision detected with orbit barrier.");
            }
        }
    }

    handleRingSuccess(ring, radius) {
        ring.passed = true;
        ring.glow = 1.0;
        this.score += 1000;
        this.updateScore();
        this.triggerExplosion(this.satellite.x, this.satellite.y, ring.color);
        this.audio.playRingHit(this.currentRingIdx);
    }
    
    handleRingFailure() {
        this.triggerExplosion(this.satellite.x, this.satellite.y, '#ff0000');
        this.audio.playFail();
    }

    triggerExplosion(x, y, color) {
        for (let i = 0; i < 20; i++) {
            this.particles.push(new Particle(x, y, color, 5, 0.5 + Math.random() * 0.5));
        }
    }

    updateScore() {
        document.getElementById('score-display').innerText = `SCORE: ${this.score}`;
    }

    endGame(success, reason) {
        this.state = 'END';
        this.audio.stopAmbient();
        
        const endScreen = document.getElementById('end-screen');
        const endTitle = document.getElementById('end-title');
        const endReason = document.getElementById('end-reason');
        const finalScore = document.getElementById('final-score');
        
        endScreen.classList.remove('hidden');
        endTitle.style.color = success ? CONFIG.colors[CONFIG.colors.length-1] : '#ff4444';
        endTitle.innerText = success ? "SIGNAL RECEIVED" : "SIGNAL LOST";
        endReason.innerText = reason;
        finalScore.innerText = this.score;
        
        if (success) {
            this.audio.playWin();
        }
    }

    draw() {
        // Clear
        this.ctx.fillStyle = CONFIG.bgColors[0];
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        // Draw Stars
        this.stars.forEach(star => star.draw(this.ctx, this.width, this.height));
        
        // Draw Rings
        this.rings.forEach((ring, i) => {
            if (i < this.currentRingIdx) return; // Skip passed rings (or fade them)
            
            this.ctx.beginPath();
            
            // Draw Arc with hole
            const gapHalf = CONFIG.gapAngle / 2;
            // We need to draw the arc, skipping the gap
            // Arc: gapStart+gapHalf to gapStart-gapHalf+2PI
            const start = ring.gapStart + gapHalf;
            const end = ring.gapStart - gapHalf + (Math.PI * 2);
            
            this.ctx.arc(
                this.centerX, this.centerY, 
                ring.radius, 
                start, end
            );
            
            this.ctx.strokeStyle = ring.color;
            this.ctx.lineWidth = ring.glow > 0 ? 20 : 6;
            this.ctx.lineCap = 'round';
            this.ctx.shadowBlur = ring.glow > 0 ? 30 : 10;
            this.ctx.shadowColor = ring.color;
            this.ctx.stroke();
            
            // Decay glow
            if (ring.glow > 0) ring.glow -= 0.05;
            if (ring.glow < 0) ring.glow = 0;
            
            this.ctx.shadowBlur = 0;
            
            // Draw "Target" reticle if aiming at this ring? 
            // No, keep it abstract.
        });

        // Draw Slingshot Line
        if (this.state === 'AIMING' && this.dragStart && this.dragCurrent) {
            this.ctx.beginPath();
            this.ctx.moveTo(this.satellite.x, this.satellite.y);
            this.ctx.lineTo(this.dragCurrent.x, this.dragCurrent.y);
            
            // Dashed line for aiming
            this.ctx.setLineDash([5, 5]);
            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            this.ctx.lineWidth = 2;
            this.ctx.stroke();
            this.ctx.setLineDash([]);
            
            // Draw dragStart circle
            this.ctx.beginPath();
            this.ctx.arc(this.dragStart.x, this.dragStart.y, 5, 0, Math.PI*2);
            this.ctx.fillStyle = '#fff';
            this.ctx.fill();
        }

        // Draw Satellite
        if (this.state !== 'END' || !document.getElementById('end-screen').classList.contains('hidden')) {
            this.ctx.beginPath();
            this.ctx.arc(this.satellite.x, this.satellite.y, this.satellite.radius, 0, Math.PI * 2);
            this.ctx.fillStyle = '#fff';
            this.ctx.shadowBlur = 15;
            this.ctx.shadowColor = '#fff';
            this.ctx.fill();
            this.ctx.shadowBlur = 0;
            
            // Inner colored core
            this.ctx.beginPath();
            this.ctx.arc(this.satellite.x, this.satellite.y, this.satellite.radius/2, 0, Math.PI * 2);
            this.ctx.fillStyle = this.state === 'AIMING' ? '#00f3ff' : '#f5f53d';
            this.ctx.fill();
        }

        // Draw Particles
        this.particles.forEach(p => p.draw(this.ctx));
    }

    loop(timestamp) {
        const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
        this.lastTime = timestamp;
        
        this.update(dt);
        this.draw();
        
        requestAnimationFrame(this.loop);
    }
}

// Start Game
window.onload = () => {
    const game = new Game();
};
</script>
</body>
</html>
