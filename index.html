<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magnetic Moth</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --accent: #00ffcc;
            --danger: #ff3366;
            --gold: #ffd700;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            border-radius: 4px;
            cursor: none; 
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .centered-text {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px var(--accent);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .visible {
            opacity: 1;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 4px;
            color: var(--accent);
        }
        p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 20px;
        }
        .hidden {
            display: none;
        }
        #restart-btn {
            pointer-events: auto;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            font-size: 1rem;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 2px;
        }
        #restart-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent);
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--accent);
            font-size: 1.2rem;
            pointer-events: none;
            text-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud" class="hidden">PULSES: <span id="score">0</span>/3</div>
        <div id="ui-layer"></div>
    </div>

    <script>
        /**
         * MAGNETIC MOTH
         * A 60-90 second tactile experience.
         * 
         * Creative Intent: "This should feel like a compact illustrated toy 
         * with tactile choices, rising pressure, and a memorable payoff."
         */

        // --- Constants ---
        const WIDTH = 1200;
        const HEIGHT = 800;
        const GOAL_PULSES = 3;
        const COLORS = {
            bg: '#0a0b10',
            mothCore: '#ffffff',
            mothGlow: '#00ffcc',
            flowerCenter: '#ff3366',
            flowerPulse: '#ff3366',
            flowerAura: 'rgba(255, 51, 102, 0.1)',
            warning: '#ffaa00'
        };

        // --- Audio Engine (Web Audio API) ---
        const AudioEngine = {
            ctx: null,
            masterGain: null,
            isInit: false,

            init() {
                if (this.isInit) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.4; // Master volume
                this.masterGain.connect(this.ctx.destination);
                this.isInit = true;
                this.startAmbience();
            },

            // Soft, evolving drone for atmosphere
            startAmbience() {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.value = 60; // Low drone
                
                filter.type = 'lowpass';
                filter.frequency.value = 200;
                filter.Q.value = 5;

                gain.gain.value = 0.15;

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                osc.start();

                // LFO for the filter to make it breathe
                const lfo = this.ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.1;
                const lfoGain = this.ctx.createGain();
                lfoGain.gain.value = 100;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();
            },

            // Tactile "Pop" for collecting a pulse
            playCollect() {
                if (!this.isInit) return;
                const t = this.ctx.currentTime;
                
                // Main tone
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.exponentialRampToValueAtTime(1760, t + 0.1);

                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);

                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + 0.4);

                // Harmonic shimmer
                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(1760, t);
                osc2.frequency.linearRampToValueAtTime(880, t + 0.5);
                gain2.gain.setValueAtTime(0.1, t);
                gain2.gain.linearRampToValueAtTime(0.001, t + 0.5);
                osc2.connect(gain2);
                gain2.connect(this.masterGain);
                osc2.start(t);
                osc2.stop(t + 0.5);
            },

            // Warning buzz for hazards
            playWarning() {
                if (!this.isInit) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, t);
                osc.frequency.linearRampToValueAtTime(100, t + 0.1);
                
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.1);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + 0.1);
            },

            // Victory chord
            playWin() {
                if (!this.isInit) return;
                const t = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C Major
                
                notes.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.1, t + 0.2);
                    gain.gain.linearRampToValueAtTime(0, t + 2.0);
                    
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t + i * 0.05);
                    osc.stop(t + 2.5);
                });
                
                // High shimmer
                const shimmer = this.ctx.createOscillator();
                const shimmerGain = this.ctx.createGain();
                shimmer.type = 'triangle';
                shimmer.frequency.value = 2600;
                shimmerGain.gain.setValueAtTime(0, t);
                shimmerGain.gain.linearRampToValueAtTime(0.05, t + 0.5);
                shimmerGain.gain.linearRampToValueAtTime(0, t + 3.0);
                shimmer.connect(shimmerGain);
                shimmerGain.connect(this.masterGain);
                shimmer.start(t);
                shimmer.stop(t + 3.5);
            },

            // Failure buzz
            playLoss() {
                if (!this.isInit) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.linearRampToValueAtTime(50, t + 0.8);
                
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.linearRampToValueAtTime(0.001, t + 0.8);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                osc.start(t);
                osc.stop(t + 0.8);
            }
        };

        // --- Game State ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const hud = document.getElementById('hud');
        const scoreEl = document.getElementById('score');

        let state = 'START'; // START, PLAYING, WON, LOST
        let score = 0;
        let gameTime = 0;
        let particles = [];
        
        const mouse = { x: WIDTH / 2, y: HEIGHT / 2 };
        
        // Player Moth
        const moth = {
            x: WIDTH / 2,
            y: HEIGHT / 2,
            radius: 12,
            trail: [],
            pulseTimer: 0
        };

        // Game Objects
        let flowers = []; // Collectibles
        let hazards = []; // Threats
        let pulseParticles = []; // Visual effect for collection

        // --- Setup ---
        function resize() {
            // Scale canvas to fit window while maintaining aspect ratio
            const aspect = WIDTH / HEIGHT;
            let w = window.innerWidth;
            let h = window.innerHeight;

            if (w / h > aspect) {
                w = h * aspect;
            } else {
                h = w / aspect;
            }

            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }

        window.addEventListener('resize', resize);
        resize();

        // --- Input ---
        window.addEventListener('mousemove', (e) => {
            if (state !== 'PLAYING') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            const scaleY = HEIGHT / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
            
            // Ensure first movement starts the timer if needed (though usually click starts everything)
        });

        function startGame() {
            AudioEngine.init();
            state = 'PLAYING';
            score = 0;
            gameTime = 0;
            moth.x = WIDTH / 2;
            moth.y = HEIGHT / 2;
            moth.trail = [];
            flowers = [];
            hazards = [];
            particles = [];
            
            // Initial safe zone
            spawnFlower(WIDTH/2, HEIGHT/2);
            
            hud.classList.remove('hidden');
            uiLayer.innerHTML = '';
            updateScore();
        }

        function restartGame() {
            startGame();
        }

        // --- Game Logic ---

        function spawnFlower(x, y, isHazard = false) {
            const flower = {
                x: x || Math.random() * (WIDTH - 200) + 100,
                y: y || Math.random() * (HEIGHT - 200) + 100,
                radius: isHazard ? 15 : 20,
                phase: Math.random() * Math.PI * 2,
                isHazard: isHazard,
                pulseSpeed: isHazard ? 0.15 : 0.05
            };
            if (isHazard) {
                hazards.push(flower);
                AudioEngine.playWarning(); // Initial warning sound
            } else {
                flowers.push(flower);
            }
        }

        function updateScore() {
            scoreEl.innerText = score;
        }

        function gameOver(won) {
            state = won ? 'WON' : 'LOST';
            hud.classList.add('hidden');
            
            let html = '';
            if (won) {
                AudioEngine.playWin();
                html = `
                    <div class="centered-text visible">
                        <h1>RESURRECTED</h1>
                        <p>The Magnetic Fields are harmonized.</p>
                        <button id="restart-btn" onclick="restartGame()">Fly Again</button>
                    </div>
                `;
            } else {
                AudioEngine.playLoss();
                html = `
                    <div class="centered-text visible">
                        <h1 style="color: var(--danger); text-shadow: 0 0 10px var(--danger);">DISCHARGED</h1>
                        <p>Static shock absorbed your essence.</p>
                        <button id="restart-btn" onclick="restartGame()">Try Again</button>
                    </div>
                `;
            }
            uiLayer.innerHTML = html;
        }

        function update() {
            if (state !== 'PLAYING') return;

            gameTime++;

            // 1. Difficulty Scaling / Escalation
            // Hazards spawn more frequently as time goes on
            if (gameTime % 300 === 0 && flowers.length < 4) {
                spawnFlower(null, null, true);
            }

            // 2. Move Moth (Lerp towards mouse with delay)
            const dx = mouse.x - moth.x;
            const dy = mouse.y - moth.y;
            
            // Calculate distance for speed variation (slow start, fast glide)
            const dist = Math.sqrt(dx*dx + dy*dy);
            const speed = 0.06; // Lerp factor
            
            moth.x += dx * speed;
            moth.y += dy * speed;

            // Clamp to screen
            moth.x = Math.max(moth.radius, Math.min(WIDTH - moth.radius, moth.x));
            moth.y = Math.max(moth.radius, Math.min(HEIGHT - moth.radius, moth.y));

            // Trail Logic
            moth.trail.push({x: moth.x, y: moth.y});
            if (moth.trail.length > 20) moth.trail.shift();

            // Pulse Visual
            moth.pulseTimer = (moth.pulseTimer + 0.1) % (Math.PI * 2);

            // 3. Interactions
            // Check Flowers
            for (let i = flowers.length - 1; i >= 0; i--) {
                const f = flowers[i];
                const fdx = moth.x - f.x;
                const fdy = moth.y - f.y;
                const fDist = Math.sqrt(fdx*fdx + fdy*fdy);

                // Magnetic attraction effect: Flowers gently pull moth
                if (fDist < 150) {
                    moth.x += fdx * 0.01;
                    moth.y += fdy * 0.01;
                }

                if (fDist < moth.radius + f.radius) {
                    // Collect
                    flowers.splice(i, 1);
                    score++;
                    updateScore();
                    AudioEngine.playCollect();
                    createParticles(f.x, f.y, COLORS.accent, 10);
                    
                    if (score >= GOAL_PULSES) {
                        setTimeout(() => gameOver(true), 600);
                    } else {
                        // Spawn next one further away
                        spawnFlower(null, null, false);
                    }
                }
            }

            // Check Hazards
            for (const h of hazards) {
                const hdx = moth.x - h.x;
                const hdy = moth.y - h.y;
                const hDist = Math.sqrt(hdx*hdx + hdy*hdy);

                // Magnetic repulsion effect: Hazards push moth away
                if (hDist < 200) {
                    moth.x -= hdx * 0.02;
                    moth.y -= hdy * 0.02;
                }

                if (hDist < moth.radius + h.radius) {
                    gameOver(false);
                }
            }

            // 4. Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 3 + 1
                });
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Draw Grid (Subtle background)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x < WIDTH; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < HEIGHT; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WIDTH, y);
                ctx.stroke();
            }

            if (state === 'PLAYING' || state === 'WON' || state === 'LOST') {
                drawMoth();
                drawFlowers();
                drawHazards();
                drawParticles();
            } else {
                drawTitle();
            }
            
            requestAnimationFrame(draw);
            update();
        }

        function drawMoth() {
            // Trail
            ctx.beginPath();
            if (moth.trail.length > 0) {
                ctx.moveTo(moth.trail[0].x, moth.trail[0].y);
                for (let i = 1; i < moth.trail.length; i++) {
                    ctx.lineTo(moth.trail[i].x, moth.trail[i].y);
                }
            }
            ctx.strokeStyle = `rgba(0, 255, 204, 0.3)`;
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            if (moth.trail.length > 0) {
                ctx.moveTo(moth.trail[0].x, moth.trail[0].y);
                for (let i = 1; i < moth.trail.length; i++) {
                    ctx.lineTo(moth.trail[i].x, moth.trail[i].y);
                }
            }
            ctx.strokeStyle = `rgba(0, 255, 204, 0.1)`;
            ctx.lineWidth = 12;
            ctx.stroke();

            // Glow
            const glowSize = moth.radius * 2 + Math.sin(moth.pulseTimer) * 5;
            const gradient = ctx.createRadialGradient(moth.x, moth.y, moth.radius, moth.x, moth.y, glowSize);
            gradient.addColorStop(0, 'rgba(0, 255, 204, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 255, 204, 0)');
            
            ctx.beginPath();
            ctx.arc(moth.x, moth.y, glowSize, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(moth.x, moth.y, moth.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.mothCore;
            ctx.fill();
            
            // Antennae
            ctx.beginPath();
            ctx.moveTo(moth.x, moth.y - moth.radius);
            ctx.quadraticCurveTo(moth.x - 10, moth.y - 25, moth.x - 15, moth.y - 20);
            ctx.moveTo(moth.x, moth.y - moth.radius);
            ctx.quadraticCurveTo(moth.x + 10, moth.y - 25, moth.x + 15, moth.y - 20);
            ctx.strokeStyle = COLORS.mothGlow;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawFlowers() {
            const t = Date.now() / 1000;
            
            flowers.forEach(f => {
                // Pulsing size
                const pulse = Math.sin(t * 2 + f.phase) * 5;
                const r = f.radius + pulse;

                // Aura
                ctx.beginPath();
                ctx.arc(f.x, f.y, r * 2, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.flowerAura;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(f.x, f.y, r * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                // Petals (Rotating)
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + t;
                    const px = f.x + Math.cos(angle) * r;
                    const py = f.y + Math.sin(angle) * r;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, r * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = COLORS.flowerPulse;
                    ctx.fill();
                }
            });
        }

        function drawHazards() {
            const t = Date.now() / 500;
            
            hazards.forEach(h => {
                const pulse = Math.sin(t + h.phase) * 3;
                const r = h.radius + pulse;

                // Spiky look
                ctx.beginPath();
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const innerR = r * 0.6;
                    const outerR = r;
                    
                    ctx.lineTo(
                        h.x + Math.cos(angle) * outerR,
                        h.y + Math.sin(angle) * outerR
                    );
                    ctx.lineTo(
                        h.x + Math.cos(angle + Math.PI/12) * innerR,
                        h.y + Math.sin(angle + Math.PI/12) * innerR
                    );
                }
                ctx.closePath();
                ctx.fillStyle = COLORS.danger;
                ctx.fill();
                
                // Warning ring
                ctx.beginPath();
                ctx.arc(h.x, h.y, r * 2, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255, 51, 102, ${0.2 + Math.sin(t*3)*0.1})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });
        }

        function drawTitle() {
            // Background glow
            const gradient = ctx.createRadialGradient(WIDTH/2, HEIGHT/2, 100, WIDTH/2, HEIGHT/2, 600);
            gradient.addColorStop(0, 'rgba(0, 255, 204, 0.05)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0,0,WIDTH,HEIGHT);

            // Floating Moth Animation
            const t = Date.now() / 1000;
            const mx = WIDTH/2 + Math.sin(t) * 50;
            const my = HEIGHT/2 + Math.cos(t * 1.5) * 30;
            
            ctx.beginPath();
            ctx.arc(mx, my, 15, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(mx, my, 40 + Math.sin(t*2)*5, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0,255,204,0.2)';
            ctx.fill();

            // Text
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.font = 'bold 48px Courier New';
            ctx.fillStyle = '#00ffcc';
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 20;
            ctx.fillText('MAGNETIC MOTH', WIDTH/2, HEIGHT/2 - 40);
            
            ctx.shadowBlur = 0;
            ctx.font = '20px Courier New';
            ctx.fillStyle = '#aaa';
            ctx.fillText('Guide the moth through the magnetic flowers.', WIDTH/2, HEIGHT/2 + 10);
            
            ctx.font = '16px Courier New';
            ctx.fillStyle = '#666';
            ctx.fillText('Collect 3 pulses to resurrect. Avoid static shocks.', WIDTH/2, HEIGHT/2 + 40);

            // Start Prompt
            const blink = Math.sin(t * 4) > 0;
            if (blink) {
                ctx.font = 'bold 24px Courier New';
                ctx.fillStyle = '#fff';
                ctx.fillText('CLICK TO START', WIDTH/2, HEIGHT/2 + 100);
            }
        }

        // --- Interaction Handling ---
        window.addEventListener('click', () => {
            if (state === 'START') {
                startGame();
            }
        });

        // Keyboard restart for accessibility
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                if (state !== 'PLAYING') {
                    restartGame();
                }
            }
        });

        // Start the loop
        draw(); // This begins the requestAnimationFrame loop
    </script>
</body>
</html>
