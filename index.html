<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Moth</title>
<style>
  :root {
    --bg: #0f111a;
    --text: #e0e6ed;
    --accent: #a8f0c6;
  }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: var(--bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    user-select: none;
  }
  canvas {
    display: block;
    cursor: none;
  }
  #ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .title {
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px rgba(168, 240, 198, 0.4);
    opacity: 0.9;
  }
  .subtitle {
    font-size: 1.2rem;
    opacity: 0.6;
    margin-bottom: 3rem;
  }
  .btn {
    pointer-events: auto;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 32px;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(168, 240, 198, 0.6);
  }
  #payoff-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 17, 26, 0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #payoff-overlay.visible {
    display: flex;
    opacity: 1;
  }
  .payoff-title {
    font-size: 2.5rem;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .payoff-desc {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    max-width: 600px;
    line-height: 1.6;
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 0.9rem;
    opacity: 0.7;
    pointer-events: none;
    display: none;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <span id="pulse-count">0</span> / 3 Pulses
</div>

<div id="ui-layer">
  <div id="start-screen">
    <h1 class="title">MAGNETIC MOTH</h1>
    <div class="subtitle">Guide the moth to the magnetic flowers</div>
    <button class="btn" id="start-btn">Begin Exploration</button>
  </div>
</div>

<div id="payoff-overlay">
  <h2 class="payoff-title">Harmony Restored</h2>
  <p class="payoff-desc">The magnetic field stabilizes. The garden blooms in resonance with your touch.</p>
  <button class="btn" id="restart-btn">Explore Again</button>
</div>

<script>
/**
 * MAGNETIC MOTH
 * 
 * This should feel like a compact illustrated toy with tactile choices, 
 * rising pressure, and a memorable payoff.
 * 
 * Technical notes:
 * - Single file, no external dependencies.
 * - Canvas 2D for rendering.
 * - Web Audio API for procedural sound design.
 * - RequestAnimationFrame loop.
 */

// --- FactoryX Evidence Interface ---
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: gameState.phase,
    progress: gameState.collectedPulses,
    target: gameState.targetPulses,
    completed: gameState.phase === 'completed',
    restart_count: gameState.restartCount
  };
};

// --- Configuration ---
const CONFIG = {
  width: 1200,
  height: 800,
  mothSpeed: 0.08, // Lerp factor
  mothFriction: 0.92,
  flowerRadius: 25,
  targetPulses: 3,
  colors: {
    bg: '#0f111a',
    moth: '#a8f0c6',
    mothCore: '#ffffff',
    flower: '#ff9d00',
    flowerInner: '#ffeb3b',
    particle: '#a8f0c6',
    text: '#e0e6ed'
  }
};

// --- Audio System (Web Audio API) ---
let audioCtx = null;
let masterGain = null;
let droneOsc = null;
let droneGain = null;

function initAudio() {
  if (audioCtx) return;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioCtx();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);
  
  // Ambient Drone
  droneOsc = audioCtx.createOscillator();
  droneGain = audioCtx.createGain();
  droneOsc.type = 'sine';
  droneOsc.frequency.value = 60;
  droneGain.gain.value = 0.15;
  droneOsc.connect(droneGain);
  droneGain.connect(masterGain);
  
  // Modulate drone slightly for "breathing" effect
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.2;
  lfoGain.gain.value = 10;
  lfo.connect(lfoGain);
  lfoGain.connect(droneOsc.frequency);
  lfo.start();
  
  droneOsc.start();
}

function playCollectSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = 'triangle';
  // Pentatonic scale notes based on collection count
  const baseFreq = 440 + (gameState.collectedPulses * 110); 
  osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, audioCtx.currentTime + 0.1);
  
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  
  osc.connect(gain);
  gain.connect(masterGain);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
  
  // Add a second harmonic
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(baseFreq * 2, audioCtx.currentTime);
  gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  osc2.connect(gain2);
  gain2.connect(masterGain);
  osc2.start();
  osc2.stop(audioCtx.currentTime + 0.4);
}

function playPayoffSound() {
  if (!audioCtx) return;
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C major arpeggio
  const now = audioCtx.currentTime;
  
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    
    const startTime = now + (i * 0.1);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, startTime + 1.5);
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(startTime);
    osc.stop(startTime + 1.5);
  });
  
  // Boost drone volume for payoff
  droneGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1);
}

// --- Game State ---
const gameState = {
  phase: 'initial', // initial, playing, completed
  collectedPulses: 0,
  targetPulses: CONFIG.targetPulses,
  restartCount: 0,
  startTime: 0
};

// --- Canvas Setup ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  CONFIG.width = canvas.width;
  CONFIG.height = canvas.height;
  resetFlowerPositions();
}
window.addEventListener('resize', resize);
resize();

// --- Entities ---
const moth = {
  x: 0,
  y: 0,
  vx: 0,
  vy: 0,
  radius: 8,
  angle: 0,
  wingAngle: 0,
  wingSpeed: 0.2
};

let flowers = [];
let particles = [];
let mouseX = CONFIG.width / 2;
let mouseY = CONFIG.height / 2;
let isPointerActive = false;

function createFlowers() {
  flowers = [];
  const margin = 100;
  for (let i = 0; i < CONFIG.targetPulses; i++) {
    flowers.push({
      x: margin + Math.random() * (CONFIG.width - margin * 2),
      y: margin + Math.random() * (CONFIG.height - margin * 2),
      pulse: Math.random() * Math.PI * 2,
      collected: false,
      color: CONFIG.colors.flower
    });
  }
}

function resetFlowerPositions() {
  // Keep existing flowers for continuity if resizing during play, 
  // but ensure they are within bounds
  flowers.forEach(f => {
    f.x = Math.max(100, Math.min(CONFIG.width - 100, f.x));
    f.y = Math.max(100, Math.min(CONFIG.height - 100, f.y));
  });
}

function initGame() {
  gameState.collectedPulses = 0;
  gameState.phase = 'playing';
  gameState.startTime = Date.now();
  
  // Start moth near center
  moth.x = CONFIG.width / 2;
  moth.y = CONFIG.height / 2;
  moth.vx = 0;
  moth.vy = 0;
  
  mouseX = CONFIG.width / 2;
  mouseY = CONFIG.height / 2;
  isPointerActive = false;
  
  createFlowers();
  particles = [];
  
  // UI updates
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('payoff-overlay').classList.remove('visible');
  document.getElementById('hud').style.display = 'block';
  document.getElementById('pulse-count').textContent = '0';
  
  // Start audio on first interaction (handled in click handler)
  
  window.__factoryxEvidence();
}

function restartGame() {
  gameState.restartCount++;
  // Reset drone volume
  if (droneGain) {
    droneGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime);
  }
  initGame();
}

// --- Input Handling ---
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  isPointerActive = true;
});

// Start game on first click anywhere if in initial state
window.addEventListener('click', (e) => {
  if (gameState.phase === 'initial') {
    initAudio();
    initGame();
  }
});

document.getElementById('start-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  initAudio();
  initGame();
});

document.getElementById('restart-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  restartGame();
});

// --- Particle System ---
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: Math.random() * 0.02 + 0.01,
      color: color || CONFIG.colors.particle,
      size: Math.random() * 3 + 1
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;
    
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

// --- Background Stars ---
const stars = [];
for(let i=0; i<100; i++) {
  stars.push({
    x: Math.random() * CONFIG.width,
    y: Math.random() * CONFIG.height,
    size: Math.random() * 1.5,
    alpha: Math.random()
  });
}

// --- Main Game Loop ---
let lastTime = 0;

function update(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = (timestamp - lastTime) / 16.67; // Normalize to ~60fps
  lastTime = timestamp;
  
  if (gameState.phase === 'playing') {
    // Moth Physics (Magnetic attraction to mouse)
    const dx = mouseX - moth.x;
    const dy = mouseY - moth.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if (dist > 5) {
      // Magnetic force: stronger when closer, but dampened
      const force = Math.min(dt * CONFIG.mothSpeed, 1.5);
      moth.vx += (dx / dist) * force;
      moth.vy += (dy / dist) * force;
    }
    
    // Friction
    moth.vx *= CONFIG.mothFriction;
    moth.vy *= CONFIG.mothFriction;
    
    // Update position
    moth.x += moth.vx * dt;
    moth.y += moth.vy * dt;
    
    // Rotation for visual flair
    if (dist > 5) {
      moth.angle = Math.atan2(dy, dx) + Math.PI / 2;
    }
    
    // Wing flapping
    moth.wingAngle += moth.wingSpeed * dt * (1 + Math.abs(moth.vx) + Math.abs(moth.vy));
    
    // Keep in bounds
    moth.x = Math.max(moth.radius, Math.min(CONFIG.width - moth.radius, moth.x));
    moth.y = Math.max(moth.radius, Math.min(CONFIG.height - moth.radius, moth.y));
    
    // Flower Collision
    flowers.forEach(f => {
      if (f.collected) return;
      
      const fDx = moth.x - f.x;
      const fDy = moth.y - f.y;
      const fDist = Math.sqrt(fDx*fDx + fDy*fDy);
      
      // Magnetic pull towards flower when close
      if (fDist < 150) {
        const pull = (150 - fDist) / 150 * 0.5;
        moth.vx -= (fDx / fDist) * pull;
        moth.vy -= (fDy / fDist) * pull;
      }
      
      // Collection
      if (fDist < CONFIG.flowerRadius + moth.radius) {
        f.collected = true;
        gameState.collectedPulses++;
        document.getElementById('pulse-count').textContent = gameState.collectedPulses;
        playCollectSound();
        spawnParticles(f.x, f.y, 20, CONFIG.colors.flowerInner);
        
        if (gameState.collectedPulses >= gameState.targetPulses) {
          setTimeout(finishGame, 500);
        }
      }
      
      f.pulse += 0.05 * dt;
    });
    
    updateParticles();
  }
  
  draw();
  requestAnimationFrame(update);
}

function draw() {
  // Clear
  ctx.fillStyle = CONFIG.colors.bg;
  ctx.fillRect(0, 0, CONFIG.width, CONFIG.height);
  
  // Draw Stars
  stars.forEach(star => {
    ctx.globalAlpha = star.alpha * (0.5 + 0.5 * Math.sin(Date.now() * 0.001 + star.x));
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  
  if (gameState.phase === 'playing' || gameState.phase === 'completed') {
    // Draw Flowers
    flowers.forEach(f => {
      if (f.collected) return;
      
      const pulseSize = Math.sin(f.pulse) * 5;
      const radius = CONFIG.flowerRadius + pulseSize;
      
      // Outer glow
      ctx.beginPath();
      ctx.arc(f.x, f.y, radius + 15, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 157, 0, 0.1)';
      ctx.fill();
      
      // Petals
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.pulse * 0.5);
      for (let i = 0; i < 5; i++) {
        ctx.rotate((Math.PI * 2) / 5);
        ctx.beginPath();
        ctx.ellipse(0, radius/2, radius/3, radius/1.5, 0, 0, Math.PI*2);
        ctx.fillStyle = CONFIG.colors.flower;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 235, 59, 0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();
      
      // Center
      ctx.beginPath();
      ctx.arc(f.x, f.y, CONFIG.flowerRadius/3, 0, Math.PI * 2);
      ctx.fillStyle = CONFIG.colors.flowerInner;
      ctx.fill();
    });
    
    // Draw Moth
    ctx.save();
    ctx.translate(moth.x, moth.y);
    ctx.rotate(moth.angle);
    
    // Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = CONFIG.colors.moth;
    
    // Body
    ctx.fillStyle = CONFIG.colors.mothCore;
    ctx.beginPath();
    ctx.ellipse(0, 0, 4, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Wings
    const wingY = Math.sin(moth.wingAngle) * 6;
    ctx.fillStyle = CONFIG.colors.moth;
    
    // Left Wing
    ctx.beginPath();
    ctx.ellipse(-8, -2, 10, 16 + wingY, -0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Right Wing
    ctx.beginPath();
    ctx.ellipse(8, -2, 10, 16 + wingY, 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Antennae
    ctx.strokeStyle = CONFIG.colors.moth;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(-5, -20, -10, -15);
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(5, -20, 10, -15);
    ctx.stroke();
    
    ctx.restore();
    
    // Draw Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    // Draw subtle magnetic field lines between moth and flowers if close
    ctx.strokeStyle = 'rgba(168, 240, 198, 0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 15]);
    flowers.forEach(f => {
      if (!f.collected) {
        const dist = Math.sqrt((moth.x-f.x)**2 + (moth.y-f.y)**2);
        if (dist < 250) {
          ctx.globalAlpha = 1 - (dist/250);
          ctx.beginPath();
          ctx.moveTo(moth.x, moth.y);
          // Bezier curve for magnetic effect
          const cx = (moth.x + f.x)/2;
          const cy = (moth.y + f.y)/2 + dist/4;
          ctx.quadraticCurveTo(cx, cy, f.x, f.y);
          ctx.stroke();
        }
      }
    });
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }
}

function finishGame() {
  gameState.phase = 'completed';
  playPayoffSound();
  
  // Big particle burst
  for(let i=0; i<50; i++) {
    spawnParticles(moth.x, moth.y, 1, CONFIG.colors.moth);
  }
  
  // Show overlay after short delay
  setTimeout(() => {
    document.getElementById('payoff-overlay').classList.add('visible');
    window.__factoryxEvidence();
  }, 1000);
}

// --- Initialization ---
requestAnimationFrame(update);

</script>
</body>
</html>
