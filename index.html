<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
  body {
    margin: 0; padding: 0;
    background: #0f1218;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #8899aa;
  }
  #game-container {
    position: relative;
    width: 1100px;
    height: 800px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    border-radius: 12px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #1a1e26;
  }
  #ui-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .title {
    margin-top: 40px;
    font-size: 32px;
    font-weight: 300;
    color: #a0c4e0;
    text-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
    letter-spacing: 4px;
    opacity: 0.9;
  }
  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.6;
  }
  #restart-btn {
    position: absolute;
    bottom: 60px;
    right: 60px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a303a, #1a1e26);
    border: 2px solid #3a404c;
    color: #6a7a8a;
    font-size: 24px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #restart-btn:hover {
    background: linear-gradient(135deg, #3a404c, #2a303a);
    border-color: #5a6a7a;
    color: #8899aa;
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(100,150,200,0.2);
  }
  #restart-btn:active {
    transform: scale(0.95);
  }
  #payoff-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: radial-gradient(circle at center, rgba(30, 60, 90, 0.3), transparent 70%);
  }
  #payoff-text {
    font-size: 48px;
    font-weight: 300;
    color: #e0f0ff;
    text-shadow: 0 0 40px rgba(100, 200, 255, 0.5);
    opacity: 0;
    transform: scale(0.9);
    transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
  }
  #payoff-text.show {
    opacity: 1;
    transform: scale(1);
  }
  #payoff-sub {
    margin-top: 20px;
    font-size: 16px;
    color: #8899aa;
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }
  #payoff-sub.show {
    opacity: 0.8;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="1100" height="800"></canvas>
  <div id="ui-layer">
    <div class="title">RAIN DIAL</div>
    <div class="subtitle">align the arms to guide the chimes</div>
    <div id="payoff-overlay">
      <div id="payoff-text">Melody Complete</div>
      <div id="payoff-sub">The garden sings again</div>
    </div>
  </div>
  <button id="restart-btn" title="Restart">↺</button>
</div>

<script>
// ===== AUDIO ENGINE =====
const AudioEngine = (() => {
  let ctx = null;
  let masterGain = null;
  let rainGain = null;
  let started = false;

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(ctx.destination);
    
    // Rain ambience - filtered noise
    const bufferSize = 2 * ctx.sampleRate;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }
    
    const rainSource = ctx.createBufferSource();
    rainSource.buffer = noiseBuffer;
    rainSource.loop = true;
    const rainFilter = ctx.createBiquadFilter();
    rainFilter.type = 'bandpass';
    rainFilter.frequency.value = 800;
    rainFilter.Q.value = 0.5;
    rainGain = ctx.createGain();
    rainGain.gain.value = 0;
    rainSource.connect(rainFilter);
    rainFilter.connect(rainGain);
    rainGain.connect(masterGain);
    rainSource.start();
    
    started = true;
  }

  function startRain() {
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    rainGain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.5);
  }

  function playChime(freq) {
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.998, t + 2.0);
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 2.5);
    
    // Harmonic
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2, t);
    gain2.gain.setValueAtTime(0.1, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc2.connect(gain2);
    gain2.connect(masterGain);
    osc2.start(t);
    osc2.stop(t + 1.5);
  }

  function playClick() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(300, t + 0.1);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.15);
  }

  function playPayoff() {
    if (!ctx) return;
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      setTimeout(() => playChime(freq), i * 200);
    });
  }

  function stopRain() {
    if (!rainGain) return;
    rainGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
  }

  return { init, startRain, playChime, playClick, playPayoff, stopRain };
})();

// ===== GAME STATE =====
const TARGET_CHIMES = [0, 1, 2]; // All 3 chimes must be played
const chimes = [];
const drops = [];
const particles = [];
let state = {
  phase: 'initial', // initial, playing, completed
  progress: 0,
  target: TARGET_CHIMES.length,
  completed: false,
  restartCount: 0,
  dialAngle: 0,
  dialTargetAngle: 0,
  time: 0
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Chime definitions
function createChimes() {
  chimes.length = 0;
  const cx = 550, cy = 400;
  const radius = 200;
  const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5
  
  for (let i = 0; i < 3; i++) {
    const angle = (Math.PI * 2 / 3) * i - Math.PI / 2;
    chimes.push({
      angle: angle,
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
      frequency: frequencies[i],
      hit: false,
      hitTime: 0,
      glow: 0,
      baseAngle: angle
    });
  }
}

function resetGame() {
  state.phase = 'initial';
  state.progress = 0;
  state.completed = false;
  state.restartCount++;
  state.dialAngle = 0;
  state.dialTargetAngle = 0;
  state.time = 0;
  drops.length = 0;
  particles.length = 0;
  createChimes();
  AudioEngine.stopRain();
  document.getElementById('payoff-overlay').style.display = 'none';
  document.getElementById('payoff-overlay').querySelector('#payoff-text').classList.remove('show');
  document.getElementById('payoff-overlay').querySelector('#payoff-sub').classList.remove('show');
}

// ===== DIAL INTERACTION =====
const DIAL_CX = 550;
const DIAL_CY = 400;
const DIAL_RADIUS = 70;

function getDialAngle(x, y) {
  return Math.atan2(y - DIAL_CY, x - DIAL_CX);
}

function snapToNearestArm(angle) {
  // 3 arms at 120 degree intervals starting from -90deg (top)
  const armIndices = [-Math.PI/2, -Math.PI/2 + Math.PI*2/3, -Math.PI/2 + Math.PI*4/3];
  let best = armIndices[0];
  let bestDist = Math.PI * 2;
  
  for (const armAngle of armIndices) {
    let diff = angle - armAngle;
    // Normalize to -PI to PI
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    if (Math.abs(diff) < bestDist) {
      bestDist = Math.abs(diff);
      best = armAngle;
    }
  }
  return best;
}

document.getElementById('game-container').addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  // Check restart button
  const btnRect = document.getElementById('restart-btn').getBoundingClientRect();
  const btnCX = (btnRect.left - rect.left) + btnRect.width/2;
  const btnCY = (btnRect.top - rect.top) + btnRect.height/2;
  const btnDist = Math.hypot(x - btnCX, y - btnCY);
  
  if (btnDist < 40) {
    resetGame();
    return;
  }
  
  // Check if click is near the dial area (within outer ring)
  const dialDist = Math.hypot(x - DIAL_CX, y - DIAL_CY);
  if (dialDist < DIAL_RADIUS + 80 && dialDist > DIAL_RADIUS - 10) {
    // Click around the dial
    const angle = getDialAngle(x, y);
    const snapped = snapToNearestArm(angle);
    state.dialTargetAngle = snapped;
    
    if (state.phase === 'initial') {
      state.phase = 'playing';
      AudioEngine.init();
      AudioEngine.startRain();
      AudioEngine.playClick();
    } else if (state.phase === 'playing') {
      AudioEngine.playClick();
    }
  }
});

// ===== PARTICLE SYSTEM =====
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 2 + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

// ===== DROP SYSTEM =====
function spawnDrop() {
  const targetChime = chimes[Math.floor(Math.random() * 3)];
  // Spawn from above, targeting general area near the chime
  const spawnX = targetChime.x + (Math.random() - 0.5) * 100;
  drops.push({
    x: spawnX,
    y: -20,
    targetChime,
    speed: 1.5 + Math.random() * 0.5,
    active: true,
    hit: false,
    trail: []
  });
}

// ===== RENDERING =====
function drawBackground() {
  // Dark gradient background
  const grad = ctx.createRadialGradient(550, 400, 100, 550, 400, 500);
  grad.addColorStop(0, '#1e2530');
  grad.addColorStop(1, '#0f1218');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1100, 800);
  
  // Subtle rain streaks everywhere
  ctx.strokeStyle = 'rgba(100, 150, 200, 0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 40; i++) {
    const rx = (Math.sin(i * 73.7 + state.time * 0.01) * 0.5 + 0.5) * 1100;
    const ry = ((state.time * 0.3 + i * 37) % 820);
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx - 2, ry + 15);
    ctx.stroke();
  }
}

function drawDial() {
  const cx = DIAL_CX, cy = DIAL_CY, r = DIAL_RADIUS;
  
  // Outer ring
  ctx.strokeStyle = 'rgba(100, 160, 220, 0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, r + 25, 0, Math.PI * 2);
  ctx.stroke();
  
  // Dial body
  const bodyGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  bodyGrad.addColorStop(0, '#2a3545');
  bodyGrad.addColorStop(0.7, '#1a2535');
  bodyGrad.addColorStop(1, '#15202a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(100, 160, 220, 0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Arms (3 at 120 degree intervals, rotated by dialAngle)
  for (let i = 0; i < 3; i++) {
    const angle = state.dialAngle + (Math.PI * 2 / 3) * i - Math.PI / 2;
    const endX = cx + Math.cos(angle) * (r + 50);
    const endY = cy + Math.sin(angle) * (r + 50);
    
    // Arm line
    ctx.strokeStyle = 'rgba(140, 190, 240, 0.7)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    
    // Arm tip (glowing orb)
    ctx.fillStyle = 'rgba(140, 200, 255, 0.9)';
    ctx.shadowColor = 'rgba(100, 180, 255, 0.8)';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(endX, endY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Inner circle decoration at arm tip
    ctx.strokeStyle = 'rgba(140, 190, 240, 0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(endX, endY, 10, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  // Center hub
  const hubGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15);
  hubGrad.addColorStop(0, '#4a6a8a');
  hubGrad.addColorStop(1, '#2a3a5a');
  ctx.fillStyle = hubGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(140, 200, 255, 0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawChimes() {
  for (const chime of chimes) {
    const timeSinceHit = state.time - chime.hitTime;
    const pulse = chime.glow > 0 ? Math.max(0, chime.glow) : 0;
    
    const baseX = chime.x;
    const baseY = chime.y;
    
    // Chime body - glass tube
    const tubeLength = 60 + pulse * 10;
    const tubeWidth = 12;
    
    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(chime.baseAngle + Math.PI/2);
    
    // Glow effect when hit
    if (pulse > 0) {
      ctx.shadowColor = `rgba(100, 220, 255, ${pulse * 0.6})`;
      ctx.shadowBlur = 30 * pulse;
    }
    
    // Glass tube
    const tubeGrad = ctx.createLinearGradient(-tubeWidth/2, 0, tubeWidth/2, 0);
    tubeGrad.addColorStop(0, `rgba(120, 180, 220, ${0.6 + pulse * 0.3})`);
    tubeGrad.addColorStop(0.5, `rgba(160, 210, 240, ${0.8 + pulse * 0.2})`);
    tubeGrad.addColorStop(1, `rgba(100, 160, 200, ${0.5 + pulse * 0.3})`);
    
    ctx.fillStyle = tubeGrad;
    ctx.beginPath();
    ctx.roundRect(-tubeWidth/2, -tubeLength/2, tubeWidth, tubeLength, 6);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    
    // Top cap
    ctx.fillStyle = `rgba(140, 180, 210, 0.8)`;
    ctx.beginPath();
    ctx.roundRect(-tubeWidth/2 - 3, -tubeLength/2 - 5, tubeWidth + 6, 8, 3);
    ctx.fill();
    
    // String
    ctx.strokeStyle = `rgba(160, 190, 210, 0.4)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -tubeLength/2 - 5);
    ctx.lineTo(0, -tubeLength/2 - 30);
    ctx.stroke();
    
    ctx.restore();
    
    // Hit indicator ring
    if (chime.hit && pulse > 0) {
      const ringRadius = 30 + (1 - pulse) * 40;
      ctx.strokeStyle = `rgba(100, 220, 255, ${pulse * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(chime.x, chime.y, ringRadius, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    // Progress dot if hit
    if (chime.hit) {
      ctx.fillStyle = 'rgba(100, 220, 255, 0.8)';
      ctx.beginPath();
      ctx.arc(chime.x, chime.y + 50, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawDrops() {
  for (const drop of drops) {
    if (!drop.active) continue;
    
    // Trail
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (drop.trail.length > 0) {
      ctx.moveTo(drop.trail[0].x, drop.trail[0].y);
      for (let i = 1; i < drop.trail.length; i++) {
        ctx.lineTo(drop.trail[i].x, drop.trail[i].y);
      }
    }
    ctx.stroke();
    
    // Drop head
    const gradient = ctx.createRadialGradient(drop.x, drop.y, 0, drop.x, drop.y, 8);
    gradient.addColorStop(0, 'rgba(150, 210, 255, 0.9)');
    gradient.addColorStop(0.5, 'rgba(100, 180, 255, 0.6)');
    gradient.addColorStop(1, 'rgba(80, 140, 220, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(drop.x, drop.y, 8, 0, Math.PI * 2);
    ctx.fill();
    
    // Drop shape (teardrop)
    ctx.fillStyle = 'rgba(140, 200, 255, 0.7)';
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y - 10);
    ctx.quadraticCurveTo(drop.x + 6, drop.y + 2, drop.x, drop.y + 4);
    ctx.quadraticCurveTo(drop.x - 6, drop.y + 2, drop.x, drop.y - 10);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += 0.02; // slight gravity
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

// ===== GAME LOGIC =====
let lastDropTime = 0;
let dropInterval = 2000;

function updateGame(dt) {
  state.time += dt;
  
  // Smooth dial rotation
  if (Math.abs(state.dialAngle - state.dialTargetAngle) > 0.001) {
    const diff = state.dialTargetAngle - state.dialAngle;
    state.dialAngle += diff * 0.08;
  } else {
    state.dialAngle = state.dialTargetAngle;
  }
  
  // Spawn drops
  if (state.phase === 'playing' && state.time - lastDropTime > dropInterval) {
    spawnDrop();
    lastDropTime = state.time;
    // Gradually increase drop frequency (escalation)
    if (dropInterval > 1000) {
      dropInterval -= 50;
    }
  }
  
  // Update drops
  for (let i = drops.length - 1; i >= 0; i--) {
    const drop = drops[i];
    if (!drop.active) continue;
    
    // Move drop toward its target chime
    const dx = drop.targetChime.x - drop.x;
    const dy = drop.targetChime.y - drop.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist < 30) {
      // Check alignment with dial
      const chimeAngle = drop.targetChime.baseAngle;
      const armAngle = state.dialAngle;
      
      // Normalize angles
      let angleDiff = chimeAngle - armAngle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      
      if (Math.abs(angleDiff) < 0.3 && !drop.hit) {
        // Drop hits the chime!
        drop.hit = true;
        drop.active = false;
        drop.targetChime.hit = true;
        drop.targetChime.hitTime = state.time;
        drop.targetChime.glow = 1;
        
        AudioEngine.playChime(drop.targetChime.frequency);
        spawnParticles(drop.targetChime.x, drop.targetChime.y, '140,220,255', 15);
        spawnParticles(drop.targetChime.x, drop.targetChime.y, '255,255,255', 8);
        
        state.progress++;
        
        if (state.progress >= state.target) {
          // PAYOFF!
          state.phase = 'completed';
          state.completed = true;
          AudioEngine.playPayoff();
          AudioEngine.stopRain();
          
          // Show payoff overlay
          const overlay = document.getElementById('payoff-overlay');
          overlay.style.display = 'flex';
          setTimeout(() => {
            document.getElementById('payoff-text').classList.add('show');
            document.getElementById('payoff-sub').classList.add('show');
          }, 100);
          
          // Spawn celebration particles
          for (let j = 0; j < 5; j++) {
            setTimeout(() => {
              spawnParticles(
                550 + Math.cos(j * Math.PI * 2 / 5) * 200,
                400 + Math.sin(j * Math.PI * 2 / 5) * 200,
                '100,255,220', 
                20
              );
            }, j * 200);
          }
        }
      } else if (dist < 30) {
        // Drop falls past without alignment - it dissipates
        drop.hit = true;
        drop.active = false;
        spawnParticles(drop.x, drop.y, '100,150,200', 5);
      }
      continue;
    }
    
    const speed = drop.speed;
    drop.x += (dx / dist) * speed;
    drop.y += (dy / dist) * speed;
    
    // Trail
    drop.trail.push({ x: drop.x, y: drop.y });
    if (drop.trail.length > 10) drop.trail.shift();
    
    // Remove drops that go off screen
    if (drop.y > 820 || drop.x < -50 || drop.x > 1150) {
      drop.active = false;
    }
  }
  
  // Decay chime glow
  for (const chime of chimes) {
    if (chime.glow > 0) {
      chime.glow -= 0.01;
    }
  }
  
  updateParticles();
}

// ===== MAIN LOOP =====
function gameLoop() {
  const now = performance.now();
  const dt = now - (gameLoop.lastTime || now);
  gameLoop.lastTime = now;
  
  updateGame(dt);
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawDrops();
  drawChimes();
  drawDial();
  drawParticles();
  
  // Draw progress indicator (small dots near dial)
  ctx.fillStyle = 'rgba(140, 200, 255, 0.4)';
  for (let i = 0; i < state.target; i++) {
    const angle = -Math.PI/2 + (Math.PI * 2 / state.target) * i;
    const dotX = DIAL_CX + Math.cos(angle) * (DIAL_RADIUS + 45);
    const dotY = DIAL_CY + Math.sin(angle) * (DIAL_RADIUS + 45);
    ctx.beginPath();
    ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
    if (i < state.progress) {
      ctx.fillStyle = 'rgba(100, 220, 255, 0.9)';
      ctx.fill();
      ctx.shadowColor = 'rgba(100, 220, 255, 0.5)';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(140, 200, 255, 0.3)';
      ctx.fill();
    }
  }
  
  requestAnimationFrame(gameLoop);
}

// ===== __factoryxEvidence =====
window.__factoryxEvidence = () => {
  return {
    schema_version: 1,
    phase: state.phase,
    progress: state.progress,
    target: state.target,
    completed: state.completed,
    restart_count: state.restartCount
  };
};

// ===== INIT =====
function init() {
  createChimes();
  lastDropTime = 0;
  dropInterval = 2000;
  gameLoop();
}

init();
</script>
