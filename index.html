<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Beat Ferry</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
canvas { display: block; cursor: pointer; touch-action: none; }
</style>

<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- Resolution ---
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// --- Audio Engine (Web Audio API, entirely self-contained) ---
let audioCtx = null;
let masterGain = null;
let isAudioInit = false;

function initAudio(){
  if(isAudioInit) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);
  isAudioInit = true;
}

// Pentatonic-ish scale for musicality
const BASE_NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.26];
// Bass frequencies for harmony
const BASS_NOTES = [87.31, 98.00, 110.00, 130.81, 146.83];

const VOICE_TRACKS = [
  { baseFreq: BASE_NOTES[0], type: "sine", octave: 1, name: "Drone" },
  { baseFreq: BASE_NOTES[2], type: "triangle", octave: 1, name: "Bell" },
  { baseFreq: BASE_NOTES[3], type: "square", octave: 0.5, name: "Warm Pad" },
  { baseFreq: BASE_NOTES[5], type: "sine", octave: 0.75, name: "Shimmer" },
  { baseFreq: BASE_NOTES[6], type: "triangle", octave: 0.5, name: "Chime" },
  { baseFreq: BASE_NOTES[7], type: "sine", octave: 0.25, name: "Air" },
  { baseFreq: BASS_NOTES[0], type: "sine", octave: 1, name: "Bass" },
  { baseFreq: BASS_NOTES[2], type: "triangle", octave: 1, name: "Pulse Bass" },
];

const activeVoices = [];
let currentScaleIdx = [0,1,2,3]; // which scale notes are active
let scaleLevel = 0;

function playNote(freq, duration, type, vol, detune){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  if(detune) osc.detune.value = detune;
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
  gain.gain.linearRampToValueAtTime(Math.max(vol*0.3, 0.001), audioCtx.currentTime + duration*0.7);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playSfx(type){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  if(type === "launch"){
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(600, t+0.3);
    g.gain.setValueAtTime(0.15, t);
    g.gain.linearRampToValueAtTime(0, t+0.3);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(t+0.3);
  } else if(type === "land"){
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.linearRampToValueAtTime(800, t+0.15);
    osc.frequency.linearRampToValueAtTime(600, t+0.4);
    g.gain.setValueAtTime(0.2, t);
    g.gain.linearRampToValueAtTime(0, t+0.4);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(t+0.4);
  } else if(type === "bad"){
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(80, t+0.5);
    g.gain.setValueAtTime(0.2, t);
    g.gain.linearRampToValueAtTime(0, t+0.5);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(t+0.5);
  } else if(type === "payoff"){
    // Rich chord
    const notes = [523.25, 659.26, 783.99, 1046.5];
    notes.forEach((f,i)=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = i < 2 ? "sine" : "triangle";
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.12, t+0.1);
      g.gain.linearRampToValueAtTime(0.001, t+3);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t+3);
    });
    // Shimmer
    for(let i=0;i<4;i++){
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1200 + Math.random()*800;
      g.gain.setValueAtTime(0.05, t);
      g.gain.linearRampToValueAtTime(0, t+2);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t+2);
    }
  } else if(type === "restart"){
    [261.63, 329.63, 392.00].forEach((f,i)=>{
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.12, t+ i*0.12);
      g.gain.linearRampToValueAtTime(0, t+i*0.12+0.3);
      osc.connect(g); g.connect(masterGain);
      osc.start(t+i*0.12); osc.stop(t+i*0.12+0.3);
    });
  }
}

// Background ambient pulse
let ambientInterval = null;
function startAmbient(){
  if(ambientInterval) return;
  let beat = 0;
  ambientInterval = setInterval(()=>{
    if(!audioCtx || game.state !== "playing") return;
    const bpb = 2000 / Math.max(1, scaleLevel+1); // speed up with progress
    const freq = BASS_NOTES[beat % BASS_NOTES.length];
    playNote(freq, 0.4, "sine", 0.06);
    beat++;
  }, 600);
}

function stopAmbient(){
  if(ambientInterval){ clearInterval(ambientInterval); ambientInterval=null; }
}

// --- Game State ---
const TARGET_PASSES = 6;
let game = {
  state: "initial", // initial, playing, completed, failed
  progress: 0,
  passCount: 0,
  restartCount: 0,
  ferry: { x: 0, y: 0, targetX: 0, targetY: 0, moving: false, speed: 3.5, bobPhase: 0 },
  targets: [],
  particles: [],
  wavePhase: 0,
  pulseTimer: 0,
  score: 0,
  passengers: 0,
  activeVoices: 0,
  harborProgress: 0, // 0 to 1 for final performance
  message: "",
  messageTimer: 0,
  time: 0,
  lastTime: 0,
  difficulty: 1,
  combo: 0,
  shakeTimer: 0,
};

function resetGame(){
  game.state = "initial";
  game.progress = 0;
  game.passCount = 0;
  game.restartCount++;
  game.ferry.x = W * 0.15;
  game.ferry.y = H * 0.55;
  game.ferry.targetX = W * 0.15;
  game.ferry.targetY = H * 0.55;
  game.ferry.moving = false;
  game.ferry.bobPhase = 0;
  game.targets = [];
  game.particles = [];
  game.wavePhase = 0;
  game.pulseTimer = 0;
  game.score = 0;
  game.passengers = 0;
  game.activeVoices = 0;
  game.harborProgress = 0;
  game.message = "";
  game.messageTimer = 0;
  game.time = 0;
  game.difficulty = 1;
  game.combo = 0;
  game.shakeTimer = 0;
  currentScaleIdx = [0,1,2,3];
  scaleLevel = 0;
  activeVoices.length = 0;
  stopAmbient();
}

// --- Target / Pool of Light Generation ---
function spawnTarget(){
  const margin = 80;
  const y = margin + Math.random() * (H - margin*2);
  const speed = (1.5 + game.difficulty * 0.6) * (Math.random()*0.5+0.75);
  const fromLeft = Math.random() > 0.5;
  const radius = 35 + Math.random()*20;
  const hue = 200 + game.passCount * 25 + Math.random()*30;
  const target = {
    x: fromLeft ? -radius : W + radius,
    y: y,
    vx: fromLeft ? speed : -speed,
    radius: radius,
    hue: hue,
    pulsePhase: Math.random() * Math.PI * 2,
    fromLeft: fromLeft,
    alive: true,
    landed: false,
    id: Date.now() + Math.random(),
    beatPulse: 0,
  };
  game.targets.push(target);
  return target;
}

function spawnParticles(x, y, count, hue, speed){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const spd = speed*(0.5+Math.random());
    game.particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 0.5,
      life: 1,
      decay: 0.015 + Math.random()*0.025,
      hue: hue + Math.random()*40 - 20,
      size: 2+Math.random()*4,
    });
  }
}

// --- Drawing Helpers ---
function drawWave(yBase, phase, color, alpha, amplitude, freq){
  ctx.beginPath();
  ctx.moveTo(0, H);
  for(let x=0;x<=W;x+=4){
    const yy = yBase + Math.sin(x*freq + phase)*amplitude + Math.sin(x*freq*0.5+phase*0.7)*amplitude*0.4;
    ctx.lineTo(x, yy);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.fillStyle = color;
  ctx.globalAlpha = alpha;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawFerry(x, y, bob, time){
  const bx = Math.sin(bob)*3;
  const by = Math.sin(bob*1.3)*2;
  const cx = x + bx;
  const cy = y + by;

  // Hull
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(0, 18, 30, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Hull body
  const hullGrad = ctx.createLinearGradient(-25, -5, -25, 15);
  hullGrad.addColorStop(0, "#5a3e28");
  hullGrad.addColorStop(0.5, "#8B6914");
  hullGrad.addColorStop(1, "#4a3018");
  ctx.fillStyle = hullGrad;
  ctx.beginPath();
  ctx.moveTo(-25, 5);
  ctx.quadraticCurveTo(-28, -2, -20, -5);
  ctx.lineTo(22, -5);
  ctx.quadraticCurveTo(30, -2, 28, 5);
  ctx.quadraticCurveTo(25, 12, 0, 14);
  ctx.quadraticCurveTo(-25, 12, -25, 5);
  ctx.fill();
  ctx.strokeStyle = "#3a2510";
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cabin
  ctx.fillStyle = "#f0e6d0";
  ctx.fillRect(-8, -18, 16, 13);
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(-5, -16, 10, 8);
  ctx.fillStyle = "#f0e6d0";
  ctx.fillRect(-10, -19, 20, 3);

  // Mast & sail
  ctx.strokeStyle = "#5a3e28";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -19);
  ctx.lineTo(0, -32);
  ctx.stroke();

  const sway = Math.sin(time*1.5)*5;
  ctx.fillStyle = "rgba(255,250,230,0.85)";
  ctx.beginPath();
  ctx.moveTo(0, -32);
  ctx.quadraticCurveTo(12+sway, -25, 8, -18);
  ctx.lineTo(0, -19);
  ctx.fill();

  // Glow on movement
  if(game.ferry.moving){
    ctx.shadowColor = "#4488ff";
    ctx.shadowBlur = 20;
    ctx.fillStyle = "rgba(100,160,255,0.15)";
    ctx.beginPath();
    ctx.ellipse(0, 15, 35, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawTargetPool(target, time){
  const { x, y, radius, hue, pulsePhase, beatPulse } = target;
  const pulse = 1 + Math.sin(time*3 + pulsePhase)*0.15 + beatPulse*0.2;
  const r = radius * pulse;

  // Outer glow
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r*2);
  grad.addColorStop(0, `hsla(${hue}, 80%, 65%, 0.4)`);
  grad.addColorStop(0.5, `hsla(${hue}, 70%, 50%, 0.15)`);
  grad.addColorStop(1, `hsla(${hue}, 60%, 40%, 0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r*2, 0, Math.PI*2);
  ctx.fill();

  // Core
  const coreGrad = ctx.createRadialGradient(x, y, 0, x, y, r*0.5);
  coreGrad.addColorStop(0, `hsla(${hue}, 90%, 85%, 0.9)`);
  coreGrad.addColorStop(1, `hsla(${hue}, 80%, 60%, 0.3)`);
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(x, y, r*0.5, 0, Math.PI*2);
  ctx.fill();

  // Ring
  ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${0.4+beatPulse*0.4})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, r*0.8, 0, Math.PI*2);
  ctx.stroke();

  if(target.landed){
    ctx.fillStyle = `hsla(${hue}, 90%, 90%, ${Math.max(0, 1-time*0.05)})`;
    ctx.font = "bold 16px system-ui";
    ctx.textAlign = "center";
    ctx.fillText("+1 "+(game.combo>1?`×${game.combo} COMBO!`:"Passenger!"), x, y-r*1.5-10);
  }
}

// --- Harbor / Payoff Scene ---
function drawHarbor(time){
  // Deep water
  const waterGrad = ctx.createLinearGradient(0, H*0.4, 0, H);
  waterGrad.addColorStop(0, "#0a1628");
  waterGrad.addColorStop(0.5, "#152238");
  waterGrad.addColorStop(1, "#1a2a44");
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, 0, W, H);

  drawWave(H*0.6, time*0.5, "rgba(30,60,100,0.3)", 0.5, 8, 0.008);
  drawWave(H*0.65+Math.sin(time*0.3)*5, time*0.7, "rgba(40,70,120,0.4)", 0.4, 6, 0.01);

  // Stars
  const starSeed = 12345;
  for(let i=0;i<60;i++){
    const sx = ((starSeed*(i+1)*7) % W);
    const sy = ((starSeed*(i+3)*11) % (H*0.4));
    const twinkle = 0.3 + 0.7*Math.abs(Math.sin(time*1.5 + i*0.5));
    ctx.fillStyle = `rgba(255,255,230,${twinkle*0.6})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Dock / harbor structure
  ctx.fillStyle = "#2a1f14";
  ctx.fillRect(W*0.35, H*0.52, W*0.3, H*0.12);
  ctx.fillStyle = "#3d2f1f";
  for(let i=0;i<5;i++){
    ctx.fillRect(W*0.37+i*W*0.055, H*0.54, 8, 40);
  }

  // Lights on the dock
  const colors = ["#ff8844","#44ff88","#4488ff","#ff4488","#ffcc44","#8844ff"];
  for(let i=0;i<6;i++){
    const lx = W*0.37+i*W*0.055+4;
    const ly = H*0.51;
    const glow = 0.5+0.5*Math.sin(time*3+i*0.8);
    ctx.fillStyle = colors[i];
    ctx.globalAlpha = glow * 0.8;
    ctx.beginPath();
    ctx.arc(lx, ly, 6, 0, Math.PI*2);
    ctx.fill();
    const lg = ctx.createRadialGradient(lx,ly,0,lx,ly,30);
    lg.addColorStop(0, colors[i]);
    lg.addColorStop(1, "transparent");
    ctx.fillStyle = lg;
    ctx.globalAlpha = glow*0.3;
    ctx.beginPath();
    ctx.arc(lx, ly, 30, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Ferry at dock
  drawFerry(W*0.48, H*0.50, time*2, time);

  // Musicians
  const mColors = ["#ff6644","#44dd88","#4488ff","#ffcc22","#dd44aa","#8844ff"];
  for(let i=0;i<6;i++){
    const mx = W*0.38+i*W*0.04;
    const my = H*0.54+Math.sin(time*2+i*1.2)*4;
    const bob = Math.sin(time*3+i*0.7)*3;
    ctx.fillStyle = mColors[i];
    // Body
    ctx.beginPath();
    ctx.arc(mx, my-bob-5, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(mx-3, my-bob, 6, 10);
    // Instrument glow
    ctx.shadowColor = mColors[i];
    ctx.shadowBlur = 12;
    ctx.fillStyle = `hsla(${(time*50+i*60)%360},80%,60%,${0.5+0.5*Math.sin(time*4+i)})`;
    ctx.beginPath();
    ctx.arc(mx+8, my-bob-3, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Music notes floating up
  for(let i=0;i<8;i++){
    const nx = W*0.35+((time*30+i*70)%W*0.3);
    const ny = H*0.52 - ((time*40+i*50)%(H*0.4));
    const alpha = Math.max(0, 1-((time*40+i*50)%(H*0.4))/(H*0.4));
    ctx.fillStyle = `hsla(${(i*45+time*30)%360},70%,70%,${alpha*0.7})`;
    ctx.font = `${14+Math.sin(time+i)*4}px system-ui`;
    ctx.fillText(["♪","♫","♩","♬","🎵","🎶","𝅘𝅥","𝅗𝅥"][i%8], nx, ny);
  }

  // Finale text
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffe8cc";
  ctx.font = "bold 28px system-ui, sans-serif";
  ctx.fillText("The Harbor Sings", W/2, H*0.22);
  ctx.font = "16px system-ui, sans-serif";
  ctx.fillStyle = "#aabbcc";
  ctx.fillText(`${game.passCount} crossings, ${game.score} points, ${game.passengers} passengers brought to life`, W/2, H*0.27);
  ctx.fillText("The light finds its way home.", W/2, H*0.31);

  // Restart prompt
  const blink = Math.sin(time*3)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${blink*0.8})`;
  ctx.font = "bold 20px system-ui, sans-serif";
  ctx.fillText("Tap anywhere to sail again", W/2, H*0.88);
}

// --- Title / Start Screen ---
function drawTitleScreen(time){
  // Water background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, "#0e1530");
  bg.addColorStop(0.4, "#1a2540");
  bg.addColorStop(1, "#0a1020");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<100;i++){
    const sx = (i*137.5)%W;
    const sy = (i*97.3)%(H*0.45);
    const tw = 0.4+0.6*Math.abs(Math.sin(time*1.2+i*0.3));
    ctx.fillStyle = `rgba(255,255,230,${tw})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  drawWave(H*0.55, time*0.4, "rgba(20,40,80,0.5)", 0.6, 12, 0.006);
  drawWave(H*0.58+Math.sin(time*0.3)*5, time*0.6, "rgba(25,50,90,0.4)", 0.5, 10, 0.008);

  // Title
  ctx.textAlign = "center";
  ctx.fillStyle = "#f0e0c0";
  ctx.font = `bold ${Math.min(52, W*0.07)}px system-ui, sans-serif`;
  ctx.fillText("🚢 Beat Ferry", W/2, H*0.25);

  ctx.font = `${Math.min(18, W*0.03)}px system-ui, sans-serif`;
  ctx.fillStyle = "#8899aa";
  ctx.fillText("Sail the ferry between pools of light", W/2, H*0.32);

  // Animated ferry on title
  const ferryX = W*0.5+Math.sin(time*0.8)*80;
  const ferryY = H*0.48+Math.sin(time*1.5)*3;
  drawFerry(ferryX, ferryY, time*2, time);

  // Pulsing light pools
  for(let i=0;i<3;i++){
    const tx = W*0.5+Math.sin(time*0.5+i*Math.PI*2/3)*120;
    const ty = H*0.65+i*25;
    const pulse = 1+Math.sin(time*2.5+i)*0.2;
    const grad = ctx.createRadialGradient(tx,ty,0,tx,ty,40*pulse);
    grad.addColorStop(0, `hsla(${200+i*40},80%,70%,0.4)`);
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(tx,ty,40*pulse,0,Math.PI*2);
    ctx.fill();
  }

  // Start text
  const blink = Math.abs(Math.sin(time*3))*0.5+0.5;
  ctx.fillStyle = `rgba(255,255,255,${blink})`;
  ctx.font = `bold ${Math.min(24, W*0.04)}px system-ui, sans-serif`;
  ctx.fillText("Tap anywhere to set sail", W/2, H*0.85);
  ctx.font = `${Math.min(14, W*0.025)}px system-ui, sans-serif`;
  ctx.fillStyle = "#667788";
  ctx.fillText("Click to launch • Time your landings on the beat", W/2, H*0.90);
}

// --- Game Over screens ---
function drawCompletedScreen(time){
  drawHarbor(time);
}

function drawFailedScreen(time, reason){
  // Darker version of water
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, "#1a0a0a");
  bg.addColorStop(0.5, "#251010");
  bg.addColorStop(1, "#0a0808");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  drawWave(H*0.6, time*0.3, "rgba(60,20,20,0.4)", 0.6, 10, 0.007);
  drawWave(H*0.63+Math.sin(time)*5, time*0.4, "rgba(80,30,30,0.3)", 0.5, 8, 0.009);

  ctx.textAlign = "center";
  ctx.fillStyle = "#ff6644";
  ctx.font = `bold ${Math.min(42, W*0.06)}px system-ui, sans-serif`;
  ctx.fillText("Lost at Sea", W/2, H*0.3);

  ctx.fillStyle = "#cc8866";
  ctx.font = `${Math.min(18, W*0.03)}px system-ui, sans-serif`;
  ctx.fillText(reason, W/2, H*0.38);

  ctx.fillStyle = "#8899aa";
  ctx.font = `${Math.min(16, W*0.025)}px system-ui, sans-serif`;
  ctx.fillText(`${game.passCount} crossings completed`, W/2, H*0.44);

  const blink = Math.sin(time*3)*0.3+0.7;
  ctx.fillStyle = `rgba(255,255,255,${blink})`;
  ctx.font = `bold ${Math.min(22, W*0.035)}px system-ui, sans-serif`;
  ctx.fillText("Tap to try again", W/2, H*0.75);
}

// --- HUD ---
function drawHUD(time){
  // Top bar
  ctx.fillStyle = "rgba(10,15,30,0.5)";
  ctx.fillRect(0,0,W,40);

  ctx.textAlign = "left";
  ctx.fillStyle = "#aabbcc";
  ctx.font = "14px system-ui, sans-serif";
  ctx.fillText(`Passages: ${game.passCount}/${TARGET_PASSES}`, 15, 25);

  ctx.textAlign = "center";
  ctx.fillText(`♪ ${game.score} pts  |  👤 ${game.passengers}`, W/2, 25);

  ctx.textAlign = "right";
  // Progress bar
  const progressWidth = Math.min(120, W*0.15);
  ctx.fillStyle = "rgba(255,255,255,0.1)";
  ctx.fillRect(W-140, 12, progressWidth, 16);
  const fillColor = game.passCount >= TARGET_PASSES ? "#44dd88" : "#4488ff";
  ctx.fillStyle = fillColor;
  ctx.fillRect(W-140, 12, progressWidth*(game.passCount/TARGET_PASSES), 16);
  ctx.fillStyle = "#fff";
  ctx.font = "11px system-ui, sans-serif";
  ctx.fillText(`${game.passCount}/${TARGET_PASSES}`, W-80, 25);

  // Active voices indicator
  if(game.activeVoices > 0){
    ctx.fillStyle = "#ffcc44";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText(`♪×${game.activeVoices} active`, W-20, 42);
  }
}

// --- Input Handling ---
function handleInput(clickX, clickY){
  if(!isAudioInit) initAudio();
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();

  if(game.state === "initial"){
    game.state = "playing";
    game.time = 0;
    game.lastTime = performance.now()/1000;
    game.ferry.x = W*0.15;
    game.ferry.y = H*0.55;
    game.ferry.targetX = W*0.15;
    game.ferry.targetY = H*0.55;
    game.ferry.moving = false;
    playSfx("restart");
    startAmbient();
    return;
  }

  if(game.state === "completed" || game.state === "failed"){
    resetGame();
    game.state = "initial";
    playSfx("restart");
    return;
  }

  if(game.state === "playing"){
    // Launch ferry toward click position (constrained vertically)
    if(game.ferry.moving) return; // already moving, wait for landing attempt
    // Set target to click X, with Y constrained to keep ferry on water
    const targetY = Math.max(H*0.35, Math.min(H*0.7, clickY));
    game.ferry.targetX = clickX;
    game.ferry.targetY = targetY;
    game.ferry.moving = true;
    playSfx("launch");
    game.combo = 0; // reset combo on new attempt
  }
}

canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  handleInput(x, y);
});
canvas.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  handleInput(touch.clientX - rect.left, touch.clientY - rect.top);
}, {passive:false});

// --- Update Loop ---
function update(dt){
  game.time += dt;
  game.wavePhase += dt * 0.8;
  game.ferry.bobPhase += dt * 2;
  game.pulseTimer += dt;

  // Spawn targets
  const spawnRate = Math.max(1.2, 3.5 - game.passCount * 0.3);
  if(game.targets.filter(t=>t.alive && !t.landed).length < 3 + game.passCount){
    if(game.pulseTimer > spawnRate){
      game.pulseTimer = 0;
      spawnTarget();
    }
  }

  // Move ferry if traveling
  if(game.ferry.moving){
    const dx = game.ferry.targetX - game.ferry.x;
    const dy = game.ferry.targetY - game.ferry.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const speed = game.ferry.speed * (1+ game.difficulty*0.15);
    if(dist < speed*dt*60){
      game.ferry.x = game.ferry.targetX;
      game.ferry.y = game.ferry.targetY;
      game.ferry.moving = false;
      // Check landing
      checkLanding();
    } else {
      game.ferry.x += (dx/dist)*speed*dt*60;
      game.ferry.y += (dy/dist)*speed*dt*60;
    }
  }

  // Update targets
  game.targets.forEach(t=>{
    if(!t.alive || t.landed) return;
    t.x += t.vx * dt * 60 * (1 + game.difficulty*0.1);
    t.pulsePhase += dt * 2.5;
    t.beatPulse = Math.max(0, t.beatPulse - dt*3);

    // Off screen?
    if((t.fromLeft && t.x > W+t.radius*2) || (!t.fromLeft && t.x < -t.radius*2)){
      t.alive = false;
      game.combo = 0;
    }
  });

  // Update particles
  game.particles.forEach(p=>{
    p.x += p.vx*dt*60;
    p.y += p.vy*dt*60;
    p.vy += 0.02*dt*60;
    p.life -= p.decay*dt*60;
  });
  game.particles = game.particles.filter(p=>p.life>0);

  // Harbor progression toward completion
  if(game.passCount >= TARGET_PASSES && game.state === "playing"){
    game.harborProgress = Math.min(1, game.harborProgress+dt*0.5);
    if(game.harborProgress >= 0.95){
      game.state = "completed";
      playSfx("payoff");
      stopAmbient();
    }
  }

  // Message timer
  if(game.messageTimer > 0){
    game.messageTimer -= dt;
  }

  // Shake timer
  if(game.shakeTimer > 0) game.shakeTimer -= dt;

  // Clean up targets
  game.targets = game.targets.filter(t=>t.alive || t.landed);
}

function checkLanding(){
  let bestTarget = null;
  let bestDist = Infinity;
  const ferry = game.ferry;

  game.targets.forEach(t=>{
    if(!t.alive || t.landed) return;
    const dx = ferry.x - t.x;
    const dy = ferry.y - t.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < t.radius + 25 && d < bestDist){
      bestTarget = t;
      bestDist = d;
    }
  });

  if(bestTarget){
    // Successful landing
    game.combo++;
    const comboMult = Math.min(game.combo, 5);
    game.score += 10 * comboMult;
    game.passengers += comboMult;
    game.passCount++;
    bestTarget.landed = true;
    bestTarget.beatPulse = 1;
    spawnParticles(bestTarget.x, bestTarget.y, 20*comboMult, bestTarget.hue, 3);

    // Add voice
    addVoice(bestTarget.hue);

    game.message = comboMult > 1 ? `Combo ×${comboMult}! +${10*comboMult} pts` : "Nice landing!";
    game.messageTimer = 2;
  } else {
    // Miss - ferry goes into open water
    game.shakeTimer = 0.3;
    playSfx("bad");
    game.combo = 0;
    spawnParticles(ferry.x, ferry.y, 10, 0, 2);

    // Check for fail condition (too many misses - ferry damaged)
    // We track "misses" differently - every miss that's far from any target
    // Fail if ferry drifts too far or too many misses. We'll use a simple counter:
    // The game ends with failure if too many target swipes miss AND progress is low
    // But let's make it more generous: fail only if time runs out - we track elapsed time
  }

  // Check fail condition: ferry stuck, too much time elapsed without progress
  const elapsed = game.time;
  if(elapsed > 95 && game.passCount < TARGET_PASSES - 1){
    game.state = "failed";
    stopAmbient();
  }
}

function addVoice(hue){
  if(game.activeVoices >= 8) return;
  const track = activeVoices.length % VOICE_TRACKS.length;
  activeVoices.push({
    track: VOICE_TRACKS[track],
    phase: Math.random()*Math.PI*2,
    hue: hue,
  });
  game.activeVoices = activeVoices.length;
}

// Ambient voice notes
let voiceNoteTimer = 0;
function updateVoices(dt){
  voiceNoteTimer += dt;
  if(voiceNoteTimer < 0.6/game.activeVoices) return;
  voiceNoteTimer = 0;
  activeVoices.forEach(v=>{
    if(Math.random() < 0.3){
      const noteIdx = v.track.baseFreq < BASE_NOTES[4] ? 
        Math.floor(Math.random()*BASS_NOTES.length) :
        Math.floor(Math.random()*BASE_NOTES.length);
      const freq = noteIdx < BASS_NOTES.length ? BASS_NOTES[noteIdx] : BASE_NOTES[noteIdx];
      playNote(freq, 0.8, v.track.type, 0.04, Math.random()*20-10);
    }
  });
}

// --- Main Render Loop ---
let lastFrameTime = performance.now()/1000;

function gameLoop(now){
  const nowS = now/1000;
  const dt = Math.min(0.05, nowS - lastFrameTime);
  lastFrameTime = nowS;

  if(game.state === "initial"){
    drawTitleScreen(nowS);
  } else if(game.state === "playing") {
    update(dt);
    updateVoices(dt);
    drawPlaying(nowS);
  } else if(game.state === "completed"){
    game.time += dt;
    drawCompletedScreen(game.time);
  } else if(game.state === "failed"){
    game.time += dt;
    drawFailedScreen(game.time, "The sea swallowed your ferry. Not all passages find the harbor, but each one brings back music.");
  }

  requestAnimationFrame(gameLoop);
}

function drawPlaying(time){
  // Water background
  const bg = ctx.createLinearGradient(0,H*0.3,0,H);
  bg.addColorStop(0, "#0a1628");
  bg.addColorStop(1, "#12203a");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Sky gradient at top
  const sky = ctx.createLinearGradient(0,0,0,H*0.35);
  sky.addColorStop(0, "#0e1035");
  sky.addColorStop(1, "transparent");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H*0.4);

  // Stars
  for(let i=0;i<80;i++){
    const sx = ((i*137.5)%W);
    const sy = ((i*97.3)%(H*0.3));
    const tw = 0.3+0.7*Math.abs(Math.sin(time*1.3+i*0.4));
    ctx.fillStyle = `rgba(255,255,230,${tw*0.5})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Apply shake
  ctx.save();
  if(game.shakeTimer > 0){
    ctx.translate(Math.random()*6-3, Math.random()*6-3);
  }

  // Water waves
  drawWave(H*0.45, game.wavePhase, "rgba(20,45,80,0.35)", 0.5, 10, 0.007);
  drawWave(H*0.48+Math.sin(time*0.4)*3, game.wavePhase*1.2, "rgba(30,55,100,0.4)", 0.4, 8, 0.009);

  // Target pools
  game.targets.forEach(t=>{
    if(t.alive) drawTargetPool(t, time);
  });

  // Particles
  game.particles.forEach(p=>{
    ctx.fillStyle = `hsla(${p.hue},70%,70%,${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
    ctx.fill();
  });

  // Ferry
  if(game.state !== "failed" || game.passCount > 0){
    drawFerry(game.ferry.x, game.ferry.y, game.ferry.bobPhase, time);
  }

  ctx.restore();

  // Message
  if(game.messageTimer > 0){
    const alpha = Math.min(1, game.messageTimer);
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = `bold 22px system-ui, sans-serif`;
    ctx.fillText(game.message, W/2, H*0.25);
  }

  // Difficulty indicator
  ctx.textAlign = "left";
  ctx.fillStyle = "#556677";
  ctx.font = "13px system-ui, sans-serif";
  if(game.passCount > 2){
    ctx.fillText("⚡ Waves growing stronger...", 15, H-15);
  }

  drawHUD(time);

  // Active voice indicator with waveform bars
  if(game.activeVoices > 0 && game.activeVoices <= 8){
    const barCount = game.activeVoices;
    const barWidth = 4;
    const barGap = 3;
    const startX = 15;
    const barY = H*0.55 + 25;
    for(let i=0;i<Math.min(barCount,15);i++){
      const h = 5+Math.abs(Math.sin(time*3+i*0.8))*25;
      ctx.fillStyle = `hsla(${200+i*25},80%,60%,0.6)`;
      ctx.fillRect(startX+i*(barWidth+barGap), barY-h, barWidth, h);
    }
  }
}

// --- FactoryX Evidence API ---
window.__factoryxEvidence = function(){
  return {
    schema_version: 1,
    phase: game.state === "initial" ? "initial" : game.state === "playing" ? "playing" : "completed",
    progress: game.passCount,
    target: TARGET_PASSES,
    completed: game.state === "completed",
    restart_count: game.restartCount,
  };
};

// --- Start ---
resetGame();
requestAnimationFrame(gameLoop);

})();
</script>
