<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Moth</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            color: #d0e8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: none;
        }
        #gameCanvas {
            box-shadow: 0 0 50px rgba(100, 255, 218, 0.1);
            border-radius: 12px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            opacity: 0.6;
        }
        .title {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #64ffda;
        }
        .score {
            font-size: 48px;
            font-weight: bold;
            margin-top: 5px;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.8);
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #restart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 24px;
            background: #64ffda;
            color: #050505;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.9);
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="title">Magnetic Moth</div>
        <div class="score" id="scoreEl">0 / 3</div>
    </div>
    <div id="instructions">Move mouse to guide. Collect the pulses.</div>
    <button id="restart-btn">Recharge Flux</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- Audio Engine (Web Audio API) ---
        const AudioEngine = {
            ctx: null,
            masterGain: null,
            droneOsc: null,
            droneGain: null,
            
            init() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.3;
                this.masterGain.connect(this.ctx.destination);
                
                // Background Drone
                this.droneOsc = this.ctx.createOscillator();
                this.droneGain = this.ctx.createGain();
                this.droneOsc.type = 'sine';
                this.droneOsc.frequency.value = 55; // Low A
                this.droneGain.gain.value = 0;
                
                // Sub-oscillator for texture
                const sub = this.ctx.createOscillator();
                const subGain = this.ctx.createGain();
                sub.type = 'triangle';
                sub.frequency.value = 27.5;
                subGain.gain.value = 0;
                
                this.droneOsc.connect(this.droneGain);
                this.droneGain.connect(this.masterGain);
                
                sub.connect(subGain);
                subGain.connect(this.masterGain);
                
                this.droneOsc.start();
                sub.start();
                
                // Fade in drone
                this.droneGain.gain.setTargetAtTime(0.15, this.ctx.currentTime, 2);
                subGain.gain.setTargetAtTime(0.1, this.ctx.currentTime, 2);
            },

            playCollect(pitch = 1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440 * pitch, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880 * pitch, this.ctx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            },

            playFail() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.5);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            },

            playWin() {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                [0, 0.1, 0.2, 0.3, 0.6].forEach((delay, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    // Major arpeggio
                    const freq = [523.25, 659.25, 783.99, 1046.50, 1318.51][i]; 
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, t + delay);
                    gain.gain.linearRampToValueAtTime(0.2, t + delay + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 1.0);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(t + delay);
                    osc.stop(t + delay + 1.0);
                });
                
                // Power down drone
                if(this.droneGain) {
                    this.droneGain.gain.setTargetAtTime(0, t, 1.0);
                }
            }
        };

        // --- Particle System ---
        class Particle {
            constructor(x, y, color, speed) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * speed;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // --- Game Entities ---
        class Moth {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.radius = 12;
                this.trail = [];
                this.pulse = 0;
            }

            update() {
                // Magnetic attraction to cursor
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                
                this.x += dx * 0.08;
                this.y += dy * 0.08;

                // Trail accumulation
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 15) this.trail.shift();
                
                // Pulsing aura
                this.pulse = Math.sin(Date.now() * 0.01) * 5;
            }

            draw(ctx) {
                // Draw trail
                ctx.beginPath();
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const size = (i / this.trail.length) * this.radius;
                    ctx.fillStyle = `rgba(100, 255, 218, ${i / this.trail.length * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw body
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#64ffda';
                ctx.fillStyle = '#e0fcf7';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + this.pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.targetRadius = 25;
                this.collected = false;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.color = `hsl(${Math.random() * 60 + 180}, 80%, 60%)`; // Teals to Purples
            }

            update(dt) {
                if (this.radius < this.targetRadius) {
                    this.radius += dt * 1.5;
                }
                
                // Magnetic pulse animation
                this.pulsePhase += dt * 2;
                // "Magnetic" visual: slight breathing
            }

            draw(ctx) {
                if (this.collected) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Outer glow
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;
                
                // Petals
                const petalCount = 7;
                ctx.fillStyle = this.color;
                for (let i = 0; i < petalCount; i++) {
                    ctx.save();
                    const angle = (Math.PI * 2 / petalCount) * i + (this.pulsePhase * 0.2);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, this.radius * 0.6, 8, this.radius * 0.9, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // Core
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();

                // Magnetic field ripples
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;
                const rippleSize = (Math.sin(this.pulsePhase) + 1) * 10 + 30;
                ctx.beginPath();
                ctx.arc(0, 0, rippleSize, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        // --- Main Game State ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreEl');
        const restartBtn = document.getElementById('restart-btn');
        const instructions = document.getElementById('instructions');

        let width, height;
        let gameState = 'START'; // START, PLAYING, WON
        let moths = [];
        let flowers = [];
        let particles = [];
        let score = 0;
        let lastTime = 0;

        // Resize
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input
        let mouseX = width / 2;
        let mouseY = height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            if (gameState === 'START') {
                startGame();
                AudioEngine.init();
            } else if (gameState === 'WON') {
                startGame();
            }
        });

        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            scoreEl.innerText = '0 / 3';
            scoreEl.style.opacity = 1;
            restartBtn.style.display = 'none';
            instructions.style.opacity = 1;
            instructions.innerText = "Guide the Moth. Collect 3 Pulses.";
            
            moths = [new Moth(width/2, height/2)];
            flowers = [];
            particles = [];
            
            // Spawn initial flowers
            spawnFlowers(3);
        }

        function spawnFlowers(count) {
            for (let i = 0; i < count; i++) {
                const margin = 50;
                const x = margin + Math.random() * (width - margin * 2);
                const y = margin + Math.random() * (height - margin * 2);
                flowers.push(new Flower(x, y));
            }
        }

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, 5));
            }
        }

        function gameOver() {
            // If we wanted a lose state, but the brief focuses on success payoff.
            // We will treat "game over" as just a reset on double tap or error, 
            // but primarily we focus on the WIN state.
        }

        function winGame() {
            gameState = 'WON';
            scoreEl.innerText = 'COMPLETE';
            scoreEl.style.color = '#fff';
            scoreEl.style.textShadow = '0 0 30px #fff';
            instructions.style.opacity = 0;
            
            restartBtn.style.display = 'block';
            
            // Big finale
            createExplosion(width/2, height/2, '#64ffda', 100);
            createExplosion(width/2, height/2, '#ffffff', 50);
            
            AudioEngine.playWin();
        }

        // --- Game Loop ---
        function loop(timestamp) {
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            // Clear
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Trails effect
            ctx.fillRect(0, 0, width, height);

            if (gameState === 'PLAYING' || gameState === 'WON') {
                
                // Update Moth(s)
                moths.forEach(m => {
                    m.targetX = mouseX;
                    m.targetY = mouseY;
                    m.update();
                    m.draw(ctx);
                });

                // Update Flowers & Collisions
                for (let i = flowers.length - 1; i >= 0; i--) {
                    const f = flowers[i];
                    f.update(dt);
                    f.draw(ctx);

                    if (!f.collected) {
                        const dx = moths[0].x - f.x;
                        const dy = moths[0].y - f.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);

                        // Magnetic Pull if close
                        if (dist < 150) {
                            const angle = Math.atan2(dy, dx);
                            const force = (150 - dist) * 0.02;
                            moths[0].x += Math.cos(angle) * force;
                            moths[0].y += Math.sin(angle) * force;
                        }

                        if (dist < moths[0].radius + f.radius) {
                            f.collected = true;
                            score++;
                            scoreEl.innerText = `${score} / 3`;
                            createExplosion(f.x, f.y, f.color, 15);
                            AudioEngine.playCollect(1 + (score * 0.5));
                            
                            // Remove flower
                            flowers.splice(i, 1);

                            if (score >= 3) {
                                winGame();
                            } else {
                                // Spawn another one to keep it going until 3
                                const margin = 50;
                                flowers.push(new Flower(
                                    margin + Math.random() * (width - margin * 2),
                                    margin + Math.random() * (height - margin * 2)
                                ));
                            }
                        }
                    }
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Start Screen UI
            if (gameState === 'START') {
                ctx.fillStyle = '#d0e8ff';
                ctx.font = '24px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Click to Start', width/2, height/2 + 50);
            }

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

    </script>
</body>
</html>
