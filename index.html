<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Dial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    overflow: hidden;
    font-family: 'Georgia', serif;
    cursor: default;
    user-select: none;
  }
  canvas { display: block; }
  #restart-btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    border: 2px solid #7ba7c9;
    border-radius: 25px;
    background: rgba(15, 25, 50, 0.85);
    color: #a8d4f0;
    font-family: 'Georgia', serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
  }
  #restart-btn:hover {
    background: rgba(30, 60, 100, 0.95);
    color: #d0eaff;
    border-color: #a8d4f0;
    box-shadow: 0 0 20px rgba(100, 180, 255, 0.3);
  }
  #restart-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<button id="restart-btn">✦ Play Again</button>
<script>
// ============================================================
// RAIN DIAL - A 60-90 second one-screen browser game
// Click around the central dial to route falling drops into chimes
// ============================================================

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restart-btn');

let W, H, CX, CY;

const CHIME_COUNT = 7;
const CHIME_SPREAD = 130; // degrees from center

const NOTE_FREQS = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77];
const TARGET_SEQUENCE_LENGTHS = [3, 5, 7, 8, 10, 12];
const TARGET_SEQUENCE_DURATION = 700; // ms between drops in sequence
const WIN_SEQUENCE_DURATION = 200; // faster for final sequence

const STATE = {
  INITIAL: 'initial',
  PLAYING: 'playing',
  SEQUENCE_PLAYING: 'sequence_playing',
  PLAY_INPUT: 'play_input',
  PAUSED: 'paused',
  PAUSED_WIN: 'paused_win',
  WIN: 'win',
  LOSS: 'loss',
};

let game = {
  state: STATE.INITIAL,
  dialAngle: 0,
  dialTargetAngle: 0,
  dialSpeed: 0,
  dialVelocity: 0,
  dropRadius: 6,
  chimes: [],
  drops: [],
  particles: [],
  rainDrops: [],
  targetSequence: [],
  currentStep: 0,
  progress: 0,
  target: 0,
  completed: false,
  restartCount: 0,
  phase: 'initial',
  score: 0,
  combo: 0,
  screenShake: 0,
  time: 0,
  lastTime: 0,
  audioStarted: false,
  audioCtx: null,
  masterGain: null,
  rainGain: null,
  ambientGain: null,
  rainNodes: [],
  winNoteTimes: [],
};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// --- Audio Engine ---
function initAudio() {
  if (game.audioStarted) return;
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  game.audioCtx = audioCtx;
  game.audioStarted = true;

  game.masterGain = audioCtx.createGain();
  game.masterGain.gain.value = 0.7;
  game.masterGain.connect(audioCtx.destination);

  // Rain ambience
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.5;
  }

  game.rainGain = audioCtx.createGain();
  game.rainGain.gain.value = 0; // starts silent, fades in
  game.rainGain.connect(game.masterGain);

  // Filter rain to sound like rain
  const rainFilter = audioCtx.createBiquadFilter();
  rainFilter.type = 'bandpass';
  rainFilter.frequency.value = 3000;
  rainFilter.Q.value = 0.5;
  rainFilter.connect(game.rainGain);

  const rainSource = audioCtx.createBufferSource();
  rainSource.buffer = noiseBuffer;
  rainSource.loop = true;
  rainSource.connect(rainFilter);
  rainSource.start();
  game.rainNodes = [rainSource];
  game.rainFilter = rainFilter;

  // Subtle ambient tone
  const ambOsc = audioCtx.createOscillator();
  ambOsc.type = 'sine';
  ambOsc.frequency.value = 150;
  game.ambientGain = audioCtx.createGain();
  game.ambientGain.gain.value = 0.03;
  ambOsc.connect(game.ambientGain);
  game.ambientGain.connect(game.masterGain);
  ambOsc.start();
  game.rainNodes.push(ambOsc);
}

function playChimeNote(index, velocity = 1) {
  if (!game.audioCtx || !game.audioStarted) return;
  const audioCtx = game.audioCtx;
  const freq = NOTE_FREQS[index % NOTE_FREQS.length];

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.3 * velocity, audioCtx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);

  // Add harmonics for glass quality
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;
  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0, audioCtx.currentTime);
  gain2.gain.linearRampToValueAtTime(0.1 * velocity, audioCtx.currentTime + 0.005);
  gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(game.masterGain);
  gain2.connect(game.masterGain);

  osc.start(audioCtx.currentTime);
  osc2.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 1.5);
  osc2.stop(audioCtx.currentTime + 0.8);

  // Visual ripple
  const chime = game.chimes[index % game.chimes.length];
  if (chime) {
    chime.ripple = 1;
    chime.glow = 1;
  }

  // Spark particles
  if (!chime) return;
  for (let i = 0; i < 8; i++) {
    game.particles.push({
      x: chime.x,
      y: chime.y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      color: `hsl(${200 + Math.random() * 40}, 80%, ${70 + Math.random() * 20}%)`,
      size: 2 + Math.random() * 3,
    });
  }
}

function playTick() {
  if (!game.audioCtx || !game.audioStarted) return;
  const audioCtx = game.audioCtx;
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = 1200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(game.masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.1);
}

function playWinMelody() {
  if (!game.audioCtx || !game.audioStarted) return;
  const audioCtx = game.audioCtx;
  const notes = [523.25, 659.25, 783.99, 880, 783.99, 1046.5];
  notes.forEach((freq, i) => {
    const delay = (200 + i * 120) / 1000;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + delay + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.6);
    osc.connect(gain);
    gain.connect(game.masterGain);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + 0.7);
    game.winNoteTimes.push({ t: audioCtx.currentTime + delay, freq });
  });
}

function playLossSound() {
  if (!game.audioCtx || !game.audioStarted) return;
  const audioCtx = game.audioCtx;
  for (let i = 0; i < 3; i++) {
    const delay = (200 + i * 150) / 1000;
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 200 - i * 40;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + 0.5);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(game.masterGain);
    osc.start(audioCtx.currentTime + delay);
    osc.stop(audioCtx.currentTime + delay + 0.6);
  }
}

// --- Game Setup ---
function setupChimes() {
  game.chimes = [];
  const radius = Math.min(W, H) * 0.25;
  for (let i = 0; i < CHIME_COUNT; i++) {
    const angleDeg = -90 + (CHIME_SPREAD / 2) + (i / (CHIME_COUNT - 1)) * CHIME_SPREAD;
    const angleRad = angleDeg * Math.PI / 180;
    const chime = {
      x: CX + Math.cos(angleRad) * radius,
      y: CY + Math.sin(angleRad) * radius,
      angle: angleDeg,
      radius: radius,
      index: i,
      ripple: 0,
      glow: 0,
      height: 30 + Math.random() * 20,
      width: 4 + Math.random() * 2,
      hue: 200 + i * 8,
    };
    game.chimes.push(chime);
  }
}

function generateTargetSequence(length) {
  const seq = [];
  for (let i = 0; i < length; i++) {
    seq.push(Math.floor(Math.random() * CHIME_COUNT));
  }
  return seq;
}

function startPlay() {
  initAudio();
  game.rainGain.gain.linearRampToValueAtTime(0.15, game.audioCtx.currentTime + 2);

  const seqLength = TARGET_SEQUENCE_LENGTHS[Math.floor(Math.random() * TARGET_SEQUENCE_LENGTHS.length)];
  game.targetSequence = generateTargetSequence(seqLength);
  game.target = game.targetSequence.length;
  game.progress = 0;
  game.currentStep = 0;
  game.score = 0;
  game.combo = 0;
  game.state = STATE.SEQUENCE_PLAYING;
  game.phase = 'playing';
  game.completed = false;
  game.dropRadius = 6;

  // Play the sequence
  playSequence();
}

function playSequence() {
  if (game.state !== STATE.SEQUENCE_PLAYING) return;
  if (game.currentStep >= game.targetSequence.length) {
    game.state = STATE.PLAY_INPUT;
    game.phase = 'playing';
    return;
  }

  const noteIndex = game.targetSequence[game.currentStep];
  const chime = game.chimes[noteIndex];

  // Visual cue on the chime
  chime.ripple = 1.5;
  chime.glow = 2;

  // Play the note after a short visual flash
  setTimeout(() => {
    if (game.state === STATE.SEQUENCE_PLAYING) {
      playChimeNote(noteIndex, 0.8);
    }
    game.currentStep++;
    setTimeout(playSequence, TARGET_SEQUENCE_DURATION);
  }, 300);
}

function checkDrop(chimeIndex) {
  if (game.state !== STATE.PLAY_INPUT) return;
  const expected = game.targetSequence[game.currentStep];
  if (chimeIndex === expected) {
    game.progress++;
    game.score += 10 + game.combo * 5;
    game.combo++;
    game.currentStep++;
    playChimeNote(chimeIndex, 1 + game.combo * 0.1);

    if (game.progress >= game.target) {
      triggerWin();
    }
  } else {
    game.combo = 0;
    game.screenShake = 10;
    playLossSound();
    // Visual feedback - wrong chime shakes
    game.chimes[chimeIndex].ripple = 0.3;
  }
}

function triggerWin() {
  game.state = STATE.WIN;
  game.phase = 'completed';
  game.completed = true;
  game.screenShake = 5;
  playWinMelody();

  // Big particle burst from center
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    game.particles.push({
      x: CX,
      y: CY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.005 + Math.random() * 0.01,
      color: `hsl(${190 + Math.random() * 60}, 90%, ${60 + Math.random() * 30}%)`,
      size: 2 + Math.random() * 4,
    });
  }

  setTimeout(() => {
    restartBtn.classList.add('visible');
  }, 2000);
}

function triggerLoss() {
  // Not used in current design - all games are winnable
}

function restart() {
  game.restartCount++;
  game.state = STATE.SEQUENCE_PLAYING;
  game.phase = 'playing';
  game.completed = false;
  game.progress = 0;
  game.drops = [];
  game.particles = [];
  game.dialAngle = 0;
  game.dialTargetAngle = 0;
  game.dialVelocity = 0;
  game.screenShake = 0;

  const seqLength = TARGET_SEQUENCE_LENGTHS[Math.floor(Math.random() * TARGET_SEQUENCE_LENGTHS.length)];
  game.targetSequence = generateTargetSequence(seqLength);
  game.target = game.targetSequence.length;
  game.currentStep = 0;
  game.score = 0;
  game.combo = 0;

  restartBtn.classList.remove('visible');
  playSequence();
}

// --- Rain System ---
function initRain() {
  game.rainDrops = [];
  for (let i = 0; i < 200; i++) {
    game.rainDrops.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 2 + Math.random() * 4,
      length: 10 + Math.random() * 20,
      opacity: 0.1 + Math.random() * 0.3,
    });
  }
}

function updateRain(dt) {
  for (const drop of game.rainDrops) {
    drop.y += drop.speed * dt * 60;
    drop.x -= 0.3 * dt * 60; // slight wind
    if (drop.y > H + 10) {
      drop.y = -drop.length;
      drop.x = Math.random() * W;
    }
    if (drop.x < -20) {
      drop.x = W + 10;
    }
  }
}

// --- Drop Routing ---
function getChimeFromAngle(angleDeg) {
  let best = 0;
  let bestDist = Infinity;
  for (let i = 0; i < CHIME_COUNT; i++) {
    const diff = Math.abs(angleDeg - game.chimes[i].angle);
    const normDiff = diff > 180 ? 360 - diff : diff;
    if (normDiff < bestDist) {
      bestDist = normDiff;
      best = i;
    }
  }
  return best;
}

function updateDrops(dt) {
  if (game.state !== STATE.PLAY_INPUT && game.state !== STATE.SEQUENCE_PLAYING) return;

  // Spawn drops at center
  if (Math.random() < 0.03 * (1 + game.progress / game.target)) {
    game.drops.push({
      x: CX,
      y: CY,
      vy: 1.5 + Math.random() * 0.5,
      vx: 0,
      life: 1,
      routed: false,
      routedChime: -1,
    });
  }

  for (let i = game.drops.length - 1; i >= 0; i--) {
    const drop = game.drops[i];
    drop.vy += 0.02 * dt * 60; // gravity
    drop.x += drop.vx * dt * 60;
    drop.y += drop.vy * dt * 60;

    // Stop if reached a chime
    const dx = drop.x - game.chimes[drop.routedChime]?.x || 999;
    const dy = drop.y - game.chimes[drop.routedChime]?.y || 999;
    if (drop.routed) {
      if (Math.sqrt(dx * dx + dy * dy) < 20) {
        game.drops.splice(i, 1);
      }
      continue;
    }

    // Check if drop reaches chime plane
    if (drop.y >= CY && !drop.routeChecked) {
      // Route to nearest chime based on dial angle
      const angleDeg = ((game.dialAngle % 360) + 360) % 360;
      const dropAngle = Math.atan2(drop.y - CY, drop.x - CX) * 180 / Math.PI;
      const diff = dropAngle - angleDeg;
      const normDiff = ((diff % 360) + 540) % 360 - 180;

      if (Math.abs(normDiff) < 45) {
        drop.routeChecked = true;
        drop.routed = true;
        drop.routedChime = getChimeFromAngle(angleDeg);
      }
    }

    // Chime catch
    if (drop.routed && drop.routedChime >= 0) {
      const chime = game.chimes[drop.routedChime];
      if (chime && Math.abs(drop.x - chime.x) < 20 && Math.abs(drop.y - chime.y) < 20) {
        checkDrop(drop.routedChime);
        game.drops.splice(i, 1);
        continue;
      }
    }

    // Off screen
    if (drop.y > H + 50 || drop.x < -50 || drop.x > W + 50) {
      game.drops.splice(i, 1);
    }
  }
}

function updateParticles(dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.life -= p.decay * dt * 60;
    if (p.life <= 0) {
      game.particles.splice(i, 1);
    }
  }
}

function updateChimes(dt) {
  for (const chime of game.chimes) {
    if (chime.ripple > 0) chime.ripple = Math.max(0, chime.ripple - 0.008 * dt * 60);
    if (chime.glow > 0) chime.glow = Math.max(0, chime.glow - 0.01 * dt * 60);
  }
}

// --- Drawing ---
function drawBackground(dt) {
  // Dark gradient background
  const grad = ctx.createRadialGradient(CX, CY, 50, CX, CY, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#121a2e');
  grad.addColorStop(1, '#060a14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Draw rain
  ctx.save();
  for (const drop of game.rainDrops) {
    ctx.strokeStyle = `rgba(140, 180, 220, ${drop.opacity})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x - 2, drop.y + drop.length);
    ctx.stroke();
  }
  ctx.restore();
}

function drawChimes() {
  for (const chime of game.chimes) {
    const angleRad = chime.angle * Math.PI / 180;

    // Glow effect
    if (chime.glow > 0) {
      ctx.save();
      ctx.globalAlpha = chime.glow * 0.3;
      ctx.beginPath();
      ctx.arc(chime.x, chime.y, 30 + chime.ripple * 20, 0, Math.PI * 2);
      const glowGrad = ctx.createRadialGradient(chime.x, chime.y, 0, chime.x, chime.y, 30 + chime.ripple * 20);
      glowGrad.addColorStop(0, `hsla(${chime.hue}, 80%, 70%, 0.5)`);
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.fill();
      ctx.restore();
    }

    // Chime body - glass tube
    ctx.save();
    ctx.translate(chime.x, chime.y);

    // Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(-chime.width * 0.6 + 2, -chime.height * 0.5 + 2, chime.width * 1.2, chime.height);

    // Glass tube
    const glassGrad = ctx.createLinearGradient(-chime.width, 0, chime.width, 0);
    glassGrad.addColorStop(0, 'rgba(140, 190, 230, 0.3)');
    glassGrad.addColorStop(0.3, 'rgba(200, 230, 255, 0.6)');
    glassGrad.addColorStop(0.5, `hsla(${chime.hue}, 60%, 80%, 0.8)`);
    glassGrad.addColorStop(0.7, 'rgba(200, 230, 255, 0.6)');
    glassGrad.addColorStop(1, 'rgba(140, 190, 230, 0.3)');

    const rippleOffset = chime.ripple * 4;
    ctx.fillStyle = glassGrad;
    ctx.beginPath();
    ctx.roundRect(-chime.width + rippleOffset, -chime.height * 0.5, chime.width * 2 - rippleOffset * 2, chime.height, 3);
    ctx.fill();

    // Rim highlight
    ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 + chime.ripple * 0.5})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Inner line for glass effect
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(-chime.width * 0.5, -chime.height * 0.4);
    ctx.lineTo(-chime.width * 0.5, chime.height * 0.4);
    ctx.stroke();

    ctx.restore();
  }
}

function drawDial() {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(game.dialAngle * Math.PI / 180);

  // Outer ring
  ctx.beginPath();
  ctx.arc(0, 0, 60, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(100, 160, 220, 0.4)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Fill ring
  ctx.beginPath();
  ctx.arc(0, 0, 60, 0, Math.PI * 2);
  const dialGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, 55);
  dialGrad.addColorStop(0, 'rgba(40, 80, 130, 0.4)');
  dialGrad.addColorStop(1, 'rgba(20, 50, 90, 0.2)');
  ctx.fillStyle = dialGrad;
  ctx.fill();

  // Inner decorative lines
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * 45, Math.sin(angle) * 45);
    ctx.lineTo(Math.cos(angle) * 55, Math.sin(angle) * 55);
    ctx.strokeStyle = 'rgba(120, 180, 230, 0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Pointer - indicates direction of flow
  ctx.beginPath();
  ctx.moveTo(0, -60);
  ctx.lineTo(-8, -50);
  ctx.lineTo(8, -50);
  ctx.closePath();
  ctx.fillStyle = game.state === STATE.PLAY_INPUT ? '#5bc0eb' : 'rgba(100, 150, 200, 0.5)';
  ctx.fill();

  // Center dot
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(160, 200, 240, 0.8)';
  ctx.fill();

  // Arrow showing route direction
  const arrowAngle = -Math.PI / 2 + Math.PI * game.progress / Math.max(game.target, 1);
  const arrowLen = 50 + 20 * (game.progress / Math.max(game.target, 1));
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(arrowAngle) * arrowLen, Math.sin(arrowAngle) * arrowLen);
  ctx.strokeStyle = `rgba(100, 220, 255, ${0.3 + 0.3 * (game.progress / Math.max(game.target, 1))})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

function drawDrops() {
  for (const drop of game.drops) {
    ctx.save();
    ctx.translate(drop.x, drop.y);

    // Drop glow
    ctx.beginPath();
    const dropGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, drop.radius * 2);
    dropGrad.addColorStop(0, 'rgba(140, 200, 255, 0.8)');
    dropGrad.addColorStop(0.5, 'rgba(100, 170, 240, 0.3)');
    dropGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = dropGrad;
    ctx.arc(0, 0, drop.radius * 2, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(0, 0, drop.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 220, 255, 0.9)';
    ctx.fill();

    ctx.restore();
  }
}

function drawParticles() {
  for (const p of game.particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  // Progress bar
  const barWidth = Math.min(300, W * 0.3);
  const barX = CX - barWidth / 2;
  const barY = H - 50;
  const barHeight = 6;

  ctx.fillStyle = 'rgba(30, 50, 80, 0.6)';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth, barHeight, 3);
  ctx.fill();

  const progress = game.target > 0 ? game.progress / game.target : 0;
  const barGrad = ctx.createLinearGradient(barX, 0, barX + barWidth * progress, 0);
  barGrad.addColorStop(0, 'rgba(80, 180, 240, 0.8)');
  barGrad.addColorStop(1, 'rgba(140, 220, 255, 0.9)');
  ctx.fillStyle = barGrad;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barWidth * progress, barHeight, 3);
  ctx.fill();

  // Score
  if (game.score > 0) {
    ctx.fillStyle = 'rgba(180, 220, 255, 0.7)';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(`${game.score} pts`, CX, barY - 15);
  }

  // Combo
  if (game.combo > 1 && game.state === STATE.PLAY_INPUT) {
    ctx.fillStyle = `rgba(100, 255, 200, ${0.5 + 0.3 * Math.sin(game.time * 5)})`;
    ctx.font = '12px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(`Combo x${game.combo}`, CX, barY + 30);
  }
}

function drawPrompt() {
  if (game.state === STATE.INITIAL) {
    ctx.fillStyle = 'rgba(180, 210, 240, 0.9)';
    ctx.font = 'italic 24px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Rain Dial', CX, CY - 60);

    ctx.fillStyle = 'rgba(140, 180, 220, 0.7)';
    ctx.font = '16px Georgia';
    ctx.fillText('Click anywhere to begin', CX, CY - 20);

    ctx.fillStyle = 'rgba(120, 160, 200, 0.5)';
    ctx.font = '14px Georgia';
    ctx.fillText('Click around the dial to route rain into the chimes', CX, CY + 30);
    ctx.fillText('Listen to the melody, then reproduce it', CX, CY + 55);

    drawDial();
    return;
  }

  if (game.state === STATE.SEQUENCE_PLAYING) {
    ctx.fillStyle = 'rgba(140, 180, 220, 0.5)';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Listen...', CX, CY + 100);
    return;
  }

  if (game.state === STATE.PLAY_INPUT) {
    const pulse = 0.7 + 0.3 * Math.sin(game.time * 3);
    ctx.fillStyle = `rgba(100, 200, 255, ${pulse})`;
    ctx.font = 'italic 18px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Route the rain — click around the dial', CX, CY + 110);

    const steps = game.targetSequence.length;
    const remain = game.target - game.progress;
    ctx.fillStyle = 'rgba(140, 180, 220, 0.6)';
    ctx.font = '13px Georgia';
    ctx.fillText(`${remain} of ${steps} drops to catch`, CX, CY + 130);
    return;
  }

  if (game.state === STATE.WIN) {
    const pulse = 0.8 + 0.2 * Math.sin(game.time * 2);
    ctx.fillStyle = `rgba(180, 240, 255, ${pulse})`;
    ctx.font = 'italic 28px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('✨ Melody Complete ✨', CX, CY - 80);

    ctx.fillStyle = 'rgba(160, 210, 250, 0.8)';
    ctx.font = '16px Georgia';
    ctx.fillText(`Score: ${game.score}`, CX, CY - 40);
    ctx.fillText(`Restart: ${game.restartCount}`, CX, CY - 15);

    ctx.fillStyle = 'rgba(120, 180, 220, 0.6)';
    ctx.font = '13px Georgia';
    ctx.fillText('Press the play button to try again', CX, CY + 30);
  }
}

// --- Main Loop ---
function update(dt) {
  const dtMs = dt;

  game.time += dt / 1000;

  // Dial physics
  const dialDiff = game.dialTargetAngle - game.dialAngle;
  game.dialVelocity += dialDiff * 0.05 * dtMs * 0.1;
  game.dialVelocity *= 0.85; // damping
  game.dialAngle += game.dialVelocity;
  game.dialAngle = ((game.dialAngle % 360) + 360) % 360;

  // Screen shake
  if (game.screenShake > 0) {
    game.screenShake *= 0.9;
  }

  updateRain(dtMs);
  updateDrops(dtMs);
  updateParticles(dtMs);
  updateChimes(dtMs);
}

function draw() {
  ctx.save();

  // Screen shake
  if (game.screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * game.screenShake,
      (Math.random() - 0.5) * game.screenShake
    );
  }

  drawBackground();
  drawChimes();
  drawDrops();
  drawParticles();
  drawDial();
  drawHUD();
  drawPrompt();

  ctx.restore();
}

function gameLoop(timestamp) {
  if (!game.lastTime) game.lastTime = timestamp;
  const dt = Math.min(timestamp - game.lastTime, 50); // cap delta
  game.lastTime = timestamp;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

// --- Input ---
canvas.addEventListener('click', (e) => {
  if (game.state === STATE.INITIAL) {
    startPlay();
    return;
  }

  if (game.state !== STATE.PLAY_INPUT) return;

  // Calculate angle from center to click
  const dx = e.clientX - CX;
  const dy = e.clientY - CY;
  const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;

  // Route the dial
  game.dialTargetAngle = angleDeg;
  playTick();
});

restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  restart();
});

// Round rect polyfill
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
    return this;
  };
}

// --- Expose Evidence ---
window.__factoryxEvidence = function() {
  return {
    schema_version: 1,
    phase: game.phase,
    progress: game.progress,
    target: game.target,
    completed: game.completed,
    restart_count: game.restartCount,
  };
};

// --- Start ---
initRain();
setupChimes();
requestAnimationFrame(gameLoop);
</script>
</body>
