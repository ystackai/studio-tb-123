<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; media-src data: blob:; font-src data:; connect-src 'none'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Garden</title>
<style>
  :root {
    --bg: #0a0a0f;
    --accent: #00ffcc;
    --danger: #ff0055;
    --ui-text: #e0e0e0;
  }
  body {
    margin: 0;
    padding: 0;
    background-color: var(--bg);
    color: var(--ui-text);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
  }
  #game-container {
    position: relative;
    width: 1200px;
    height: 800px;
    box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    touch-action: none;
  }
  #ui-layer {
    position: absolute;
    top: 20px;
    left: 20px;
    pointer-events: none;
  }
  .hud-text {
    font-size: 18px;
    opacity: 0.8;
    margin-bottom: 5px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
  #restart-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    color: var(--ui-text);
    border: 2px solid #444;
    padding: 10px 30px;
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 4px;
    opacity: 0.6;
  }
  #restart-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    opacity: 1;
    box-shadow: 0 0 15px rgba(0,255,204,0.3);
  }
  #start-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 15, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    transition: opacity 0.5s;
  }
  #start-overlay h1 {
    font-size: 48px;
    color: var(--accent);
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(0,255,204,0.5);
    letter-spacing: 4px;
  }
  #start-overlay p {
    font-size: 20px;
    max-width: 600px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
    color: #aaa;
  }
  #start-btn {
    padding: 15px 40px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-size: 24px;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.3s;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #start-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 30px rgba(0,255,204,0.6);
  }
  .hidden {
    opacity: 0;
    pointer-events: none;
  }
  #status-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    text-shadow: 0 0 10px currentColor;
  }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas" width="1200" height="800"></canvas>
  
  <div id="ui-layer">
    <div class="hud-text">SIGNAL GARDEN</div>
    <div class="hud-text">Sync: <span id="sync-val">0</span>%</div>
    <div class="hud-text">Target: 100%</div>
  </div>

  <div id="status-message"></div>

  <div id="start-overlay">
    <h1>SIGNAL GARDEN</h1>
    <p>
      A strange electronic plant is waiting for your frequency.<br>
      Drag the dial to tune the signal into the window.<br>
      Hold the signal to help it grow. Match the rhythm to bloom.
    </p>
    <button id="start-btn">INITIALIZE SEQUENCE</button>
  </div>

  <button id="restart-btn">RESET SIGNAL</button>
</div>

<script>
/**
 * SIGNAL GARDEN
 * 
 * This should feel like a compact illustrated toy with tactile choices, 
 * rising pressure, and a memorable payoff.
 * 
 * Core Loop:
 * 1. A signal window appears (visual ring + audio tone).
 * 2. Player drags the tuning knob to match the angle.
 * 3. Holding within the window grows the plant.
 * 4. Windows get tighter/faster as progress increases.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const WIDTH = canvas.width;
const HEIGHT = canvas.height;
const CENTER_X = WIDTH / 2;
const CENTER_Y = HEIGHT / 2;

// Game State
const state = {
  phase: 'initial', // initial, playing, completed, failed
  progress: 0,
  target: 100,
  restartCount: 0,
  startTime: 0,
  lastFrameTime: 0,
  signalWindowStart: 0,
  signalWindowEnd: 0,
  signalWindowActive: false,
  signalAngle: 0,
  signalWidth: 0.6, // radians, starts wide
  knobAngle: 0,
  knobDragging: false,
  isSynced: false,
  bloomScale: 1,
  particleSystem: [],
  plantParts: [],
  messageTimer: 0,
  currentMessage: '',
  difficulty: 1,
  lastWindowTime: 0,
  windowDuration: 6000, // ms to fill
  windowTimeout: 4000, // ms to stay in window before shifting
};

// Audio Context
let audioCtx = null;
let masterGain = null;
let bgDrone = null;

// Visual Styles
const COLORS = {
  bg: '#0a0a0f',
  plantBase: '#00ffcc',
  plantLeak: '#ff0055',
  signalOk: '#00ffcc',
  signalFail: '#ff0055',
  knob: '#ffffff',
  text: '#e0e0e0'
};

// --- Audio Engine ---

function initAudio() {
  if (audioCtx) return;
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
  startDrone();
}

function startDrone() {
  if (bgDrone) { bgDrone.stop(); }
  bgDrone = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  bgDrone.type = 'sawtooth';
  bgDrone.frequency.value = 55; // Low A
  gain.gain.value = 0.05;
  bgDrone.connect(gain);
  gain.connect(masterGain);
  bgDrone.start();
}

function playSignalTone(isGood) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  // Frequency based on signal angle for musicality
  const baseFreq = 220 + (state.signalAngle * 100); 
  osc.frequency.value = isGood ? baseFreq : baseFreq * 1.5; // Dissonant if wrong
  osc.type = isGood ? 'sine' : 'square';
  
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

function playGrowthSound(intensity) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(100 + intensity * 200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20 + intensity * 100, audioCtx.currentTime + 0.1);
  
  gain.gain.setValueAtTime(0.05 + intensity * 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playPayoffSound() {
  if (!audioCtx) return;
  // Arpeggio
  const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63];
  const now = audioCtx.currentTime;
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.1, now + i * 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.4);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now + i * 0.05);
    osc.stop(now + i * 0.05 + 0.5);
  });
}

function playStartSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

// --- Visual Engine: Plant ---

class PlantPart {
  constructor(x, y, angle, length, thickness, color, delay) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.targetLength = length;
    this.currentLength = 0;
    this.thickness = thickness;
    this.color = color;
    this.delay = delay;
    this.finished = false;
  }

  update(dt, intensity) {
    if (this.delay > 0) {
      this.delay -= dt;
      return;
    }
    if (this.currentLength < this.targetLength) {
      const speed = 100 + (intensity * 200);
      this.currentLength += speed * dt * 0.1;
      if (this.currentLength >= this.targetLength) {
        this.currentLength = this.targetLength;
        this.finished = true;
      }
    }
  }

  draw(ctx) {
    if (this.delay > 0) return;
    
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    const endX = this.x + Math.cos(this.angle) * this.currentLength;
    const endY = this.y + Math.sin(this.angle) * this.currentLength;
    ctx.lineTo(endX, endY);
    ctx.lineWidth = this.thickness;
    ctx.strokeStyle = this.color;
    ctx.lineCap = 'round';
    ctx.stroke();
    
    // Glowing tip
    if (this.currentLength > 0) {
      ctx.beginPath();
      ctx.arc(endX, endY, this.thickness * 2, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = 0.6;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    
    if (this.finished) {
      // Branch out
      if (Math.random() < 0.01 && this.currentLength > 50) {
        const newAngle = this.angle + (Math.random() - 0.5) * 1;
        const newLen = this.currentLength * 0.7;
        state.plantParts.push(new PlantPart(endX, endY, newAngle, newLen, this.thickness * 0.5, this.color, 0));
      }
    }
  }
}

function resetPlant() {
  state.plantParts = [];
  // Base stem
  state.plantParts.push(new PlantPart(CENTER_X, HEIGHT - 100, -Math.PI/2, 150, 8, COLORS.plantBase, 0));
}

function drawPlant(ctx) {
  const intensity = state.progress / state.target;
  
  // Main stem grows based on progress
  const basePart = state.plantParts[0];
  if (basePart) {
    basePart.targetLength = 150 + (intensity * 100);
    basePart.update(0.016, intensity);
  }

  state.plantParts.forEach(part => part.draw(ctx));
  
  // Draw "bloom" if progress is high
  if (state.progress > 80) {
    const bloomProgress = (state.progress - 80) / 20;
    ctx.save();
    ctx.translate(CENTER_X, HEIGHT - 250 - (bloomProgress * 20));
    ctx.rotate(state.signalAngle);
    
    // Outer glow
    ctx.shadowBlur = 30 * bloomProgress;
    ctx.shadowColor = COLORS.plantBase;
    
    // Petals
    for (let i = 0; i < 8 * (state.progress > 95 ? 1.5 : 1); i++) {
      ctx.beginPath();
      ctx.ellipse(0, -40 - (bloomProgress * 20), 20 + (bloomProgress * 10), 60 + (bloomProgress * 30), (i / 8) * Math.PI * 2, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.plantBase;
      ctx.globalAlpha = 0.3 * bloomProgress;
      ctx.fill();
    }
    
    // Center core
    ctx.beginPath();
    ctx.arc(0, 0, 15 + (bloomProgress * 10), 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.8 * bloomProgress + 0.2;
    ctx.fill();
    
    ctx.restore();
  }
}

// --- Visual Engine: Dial & UI ---

const DIAL_X = 200;
const DIAL_Y = 600;
const DIAL_RADIUS = 80;

function drawDial(ctx) {
  ctx.save();
  ctx.translate(DIAL_X, DIAL_Y);
  
  // Background ring
  ctx.beginPath();
  ctx.arc(0, 0, DIAL_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 10;
  ctx.fill();
  ctx.stroke();
  
  // Signal Window
  if (state.signalWindowActive) {
    ctx.beginPath();
    ctx.arc(0, 0, DIAL_RADIUS, state.signalWindowStart, state.signalWindowEnd);
    ctx.strokeStyle = state.isSynced ? COLORS.signalOk : COLORS.signalFail;
    ctx.lineWidth = 15;
    ctx.shadowBlur = 20;
    ctx.shadowColor = state.isSynced ? COLORS.signalOk : COLORS.signalFail;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  
  // Tick marks
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (DIAL_RADIUS - 20), Math.sin(a) * (DIAL_RADIUS - 20));
    ctx.lineTo(Math.cos(a) * (DIAL_RADIUS - 5), Math.sin(a) * (DIAL_RADIUS - 5));
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  
  // Knob
  ctx.rotate(state.knobAngle);
  ctx.beginPath();
  ctx.moveTo(0, 10);
  ctx.lineTo(0, -DIAL_RADIUS + 10);
  ctx.strokeStyle = COLORS.knob;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  // Center hub
  ctx.beginPath();
  ctx.arc(0, 0, 15, 0, Math.PI * 2);
  ctx.fillStyle = '#222';
  ctx.fill();
  ctx.strokeStyle = COLORS.knob;
  ctx.stroke();
  
  ctx.restore();
}

function drawBackground(ctx) {
  // Dark tech grid
  ctx.strokeStyle = '#1a1a24';
  ctx.lineWidth = 1;
  
  const gridSize = 40;
  for (let x = 0; x < WIDTH; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, HEIGHT);
    ctx.stroke();
  }
  for (let y = 0; y < HEIGHT; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WIDTH, y);
    ctx.stroke();
  }
  
  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < HEIGHT; y += 4) {
    ctx.fillRect(0, y, WIDTH, 2);
  }
}

// --- Game Logic ---

function update(dt) {
  if (state.phase !== 'playing') return;
  
  const now = state.lastFrameTime = performance.now();
  
  // Signal Window Logic
  if (!state.signalWindowActive) {
    // Start a new signal window
    state.signalWindowActive = true;
    state.signalAngle = Math.random() * Math.PI * 2;
    // Width narrows as progress increases
    state.signalWidth = 0.6 - (state.progress / state.target) * 0.3; 
    state.signalWindowStart = state.signalAngle - state.signalWidth;
    state.signalWindowEnd = state.signalAngle + state.signalWidth;
    state.lastWindowTime = now;
    playSignalTone(true);
  } else {
    // Check if we are still synced
    let currentAngle = state.knobAngle % (Math.PI * 2);
    if (currentAngle < 0) currentAngle += Math.PI * 2;
    
    let isSynced = false;
    const start = Math.max(state.signalWindowStart, state.signalWindowEnd - Math.PI*2) > 0 ? state.signalWindowStart : state.signalWindowStart + Math.PI*2;
    // Normalize window to 0-2PI for easier check
    // Simpler: check angular distance
    
    const diff = Math.abs(currentAngle - state.signalAngle);
    const wrapDiff = Math.PI * 2 - diff;
    const minDiff = Math.min(diff, wrapDiff);
    
    isSynced = minDiff < state.signalWidth / 2;
    state.isSynced = isSynced;
    
    if (isSynced) {
      // Grow!
      const speed = 5 + (state.difficulty * 2);
      state.progress += speed * dt;
      
      // Spawn particles
      if (Math.random() < 0.2) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 100;
        state.particleSystem.push({
          x: CENTER_X + Math.cos(angle) * dist,
          y: CENTER_Y + Math.sin(angle) * dist,
          vx: Math.cos(angle) * 50,
          vy: Math.sin(angle) * 50,
          life: 1.0,
          color: COLORS.plantBase
        });
      }
    }
    
    // Dynamic difficulty: if held too long, window moves
    const timeHeld = now - state.lastWindowTime;
    if (timeHeld > state.windowTimeout - (state.progress * 10)) {
      state.signalWindowEnd += 0.5; // Move window
      state.signalWindowStart = state.signalWindowEnd - state.signalWidth;
    }
  }
  
  // Update particles
  for (let i = state.particleSystem.length - 1; i >= 0; i--) {
    const p = state.particleSystem[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 0.5;
    if (p.life <= 0) {
      state.particleSystem.splice(i, 1);
    }
  }
  
  // Update Plant
  state.plantParts.forEach(part => part.update(dt, state.progress / state.target));
  
  // Check Win/Loss
  if (state.progress >= state.target) {
    state.progress = state.target;
    state.phase = 'completed';
    playPayoffSound();
    showMessage("SIGNAL SYNCHRONIZED\nBLOOM COMPLETE", COLORS.plantBase);
  } else if (!state.isSynced && state.signalWindowActive) {
    // Decay
    state.progress = Math.max(0, state.progress - 5 * dt);
    if (state.progress <= 0) {
      state.phase = 'failed';
      showMessage("SIGNAL LOST\nSYSTEM FAILURE", COLORS.signalFail);
    }
  }
  
  // UI Update
  document.getElementById('sync-val').textContent = Math.floor(state.progress);
  
  // Particle Rendering is done in draw, but update is here
}

function showMessage(text, color) {
  const el = document.getElementById('status-message');
  el.innerHTML = text.replace('\n', '<br>');
  el.style.color = color;
  el.style.opacity = 1;
  state.messageTimer = 3;
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  
  drawBackground(ctx);
  
  // Draw Dial
  drawDial(ctx);
  
  // Draw Plant
  drawPlant(ctx);
  
  // Draw Particles
  state.particleSystem.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 3, 3);
    ctx.globalAlpha = 1;
  });
  
  // Draw Message fade out
  if (state.messageTimer > 0) {
    state.messageTimer -= 0.016;
    if (state.messageTimer <= 0) {
      document.getElementById('status-message').style.opacity = 0;
    }
  }
  
  // End Screen Overlay
  if (state.phase === 'completed' || state.phase === 'failed') {
    ctx.fillStyle = 'rgba(10, 10, 15, 0.7)';
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    
    ctx.fillStyle = state.phase === 'completed' ? COLORS.plantBase : COLORS.signalFail;
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(state.phase === 'completed' ? 'SYNCHRONIZED' : 'SIGNAL LOST', CENTER_X, CENTER_Y - 50);
    
    ctx.fillStyle = '#fff';
    ctx.font = '24px Courier New';
    ctx.fillText('Restart to try again', CENTER_X, CENTER_Y + 20);
  }
  
  requestAnimationFrame(loop);
}

let lastTime = performance.now();
function loop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  
  update(dt);
  draw();
}

// --- Input Handling ---

function getAngleFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  
  const x = (clientX - rect.left) * scaleX - DIAL_X;
  const y = (clientY - rect.top) * scaleY - DIAL_Y;
  return Math.atan2(y, x);
}

canvas.addEventListener('mousedown', (e) => {
  if (state.phase === 'initial') return;
  state.knobDragging = true;
  state.knobAngle = getAngleFromEvent(e);
});

canvas.addEventListener('mousemove', (e) => {
  if (state.knobDragging && state.phase === 'playing') {
    const newAngle = getAngleFromEvent(e);
    state.knobAngle = newAngle;
  }
});

window.addEventListener('mouseup', () => {
  state.knobDragging = false;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state.phase === 'initial') return;
  state.knobDragging = true;
  state.knobAngle = getAngleFromEvent(e);
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (state.knobDragging && state.phase === 'playing') {
    state.knobAngle = getAngleFromEvent(e);
  }
}, {passive: false});

canvas.addEventListener('touchend', () => {
  state.knobDragging = false;
});

// --- Game Flow ---

function startGame() {
  initAudio();
  playStartSound();
  
  state.phase = 'playing';
  state.progress = 0;
  state.restartCount++;
  state.signalWindowActive = false;
  state.plantParts = [];
  state.particleSystem = [];
  resetPlant();
  
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('status-message').style.opacity = 0;
  
  lastTime = performance.now();
}

function resetGame() {
  startGame();
  state.phase = 'playing'; // Keep it playing or return to initial? Brief says "restart... clean new run".
  // To be clear, let's show the overlay again for clarity on restart
  document.getElementById('start-overlay').classList.remove('hidden');
  document.getElementById('start-overlay').querySelector('p').innerText = "Signal Reset. Re-engage tuning dial.";
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', resetGame);

// --- Evidence Contract ---

window.__factoryxEvidence = () => {
  return {
    schema_version: 1,
    phase: state.phase,
    progress: state.progress,
    target: state.target,
    completed: state.phase === 'completed',
    restart_count: state.restartCount
  };
};

// Start render loop immediately for background visuals, but wait for start button for audio/state
requestAnimationFrame(loop);

</script>
</body>
</html>
